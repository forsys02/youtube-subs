t": 297.391, "end": 299.538, "text": "왜 오픈 모델이 필요할까요?"}, {"start": 299.588, "end": 302.939, "text": "세상에는 엄청난 양의 정보가 기초가 되어 존재하고 있고,"}, {"start": 302.99, "end": 306.639, "text": "그것들을 이런 모델들의 토대에 쌓아야 하기 때문입니다."}, {"start": 306.689, "end": 309.74, "text": "그러고 나서 도메인에 맞게 최적화해야 하죠."}, {"start": 309.79, "end": 313.588, "text": "만약 모든 헬스케어 기업이"}, {"start": 313.591, "end": 316.838, "text": "바닥부터 자신들만의 파운데이션 모델을 직접 만들려고 한다면,"}, {"start": 316.889, "end": 323.338, "text": "그렇게 할 시간이나 돈, 자본 투자가 충분하지 않을 겁니다."}, {"start": 323.389, "end": 331.838, "text": "그래서 엔비디아 같은 기업들이 AI 오픈 소스에 가장 많이 기여하고 있는 곳 중 하나가 된 거죠. 모델뿐만 아니라"}, {"start": 331.889, "end": 338.338, "text": "현재 650개 이상, 아마 700개에 가까운 오픈 모델을 사용할 수 있습니다."}, {"start": 338.389, "end": 346.838, "text": "하지만 저희는 여러분을 돕기 위해 이 모델들을 훨씬 더 많은 도구와 데이터로 보완하고 있습니다."}, {"start": 346.889, "end": 351.639, "text": "저희는 몇몇 핵심 분야에서 파운데이션 모델을 구축하고 있는데, 사실 헬스케어를 생각해보면"}, {"start": 351.689, "end": 355.978, "text": "수많은 애플리케이션의 상위 집합이라고 할 수 있습니다."}, {"start": 356.028, "end": 361.68, "text": "왼쪽을 보시면 언어 모델과 에이전트를 위한 니모트론(Nemotron)이 있고요."}, {"start": 361.73, "end": 364.18, "text": "어스 투(Earth-2)도 있지만, 이건 물리학에 가깝습니다."}, {"start": 364.23, "end": 369.377, "text": "헬스케어 분야에서도 물리학에 기반한 연구가 정말 많이 이뤄지거든요."}, {"start": 369.427, "end": 373.379, "text": "생물학 AI인 바이오니모(BioNeMo)는 꽤 오래전부터 개발해 왔죠."}, {"start": 373.43, "end": 377.18, "text": "그리고 그 반대편에는 오늘 중점적으로 다룰 물리적 AI 세계가 있습니다."}, {"start": 377.23, "end": 384.379, "text": "헬스케어 분야에서 할 수 있는 게 정말 많거든요. 인실리코(in silico) 연구도 그렇지만..."}, {"start": 384.43, "end": 387.778, "text": "실제 물리적 세계에서 반드시 이뤄져야 할 일들이 산더미 같습니다."}, {"start": 387.829, "end": 391.18, "text": "그래서 세계 파운데이션 모델인 코스모스(Cosmos)가 있고,"}, {"start": 391.23, "end": 396.978, "text": "특정 분야에 최적화될 수 있는 범용 로봇 두뇌 모델, 그루트(GR00T)가 있습니다."}, {"start": 397.028, "end": 398.877, "text": "도메인별로 특화된 애플리케이션을 위해서 말이죠."}, {"start": 398.927, "end": 404.379, "text": "물론 자동차 산업과 자율주행차를 위한 알파마요(Alpamayo)도 있는데,"}, {"start": 404.43, "end": 410.68, "text": "여기서 얻은 자동화 기술은 헬스케어의 핵심 분야에도 적용할 수 있습니다."}, {"start": 410.73, "end": 412.379, "text": "수술용 로봇 공학 같은 분야 말이죠."}, {"start": 412.43, "end": 418.778, "text": "앞서 말했듯이 AI는 단순히 모델 하나로 끝나지 않습니다. 배포할 때는 더더욱 그렇죠."}, {"start": 418.829, "end": 422.677, "text": "저희가 처한 환경처럼 규제가 엄격한 곳에서는요."}, {"start": 422.728, "end": 426.379, "text": "오늘 오신 많은 연사분께서도 말씀하시겠지만,"}, {"start": 426.43, "end": 429.23, "text": "여러분이 의학계에 진출해서"}, {"start": 429.129, "end": 431.079, "text": "특정 분야를 깊게 파고드는 것처럼,"}, {"start": 431.129, "end": 434.379, "text": "혹은 과학 분야에서 전문성을 기르는 것처럼,"}, {"start": 434.43, "end": 437.74, "text": "이 모델들도 모두 전문화 과정이 필요합니다."}, {"start": 437.79, "end": 440.139, "text": "저희는 막대한 투자를 아끼지 않고"}, {"start": 440.189, "end": 442.939, "text": "이 놀라운 모델들을 개발했습니다."}, {"start": 442.99, "end": 445.338, "text": "그리고 이를 여러분께 오픈 소스로 공개했죠."}, {"start": 445.389, "end": 448.237, "text": "관련 데이터와 모든 도구도 함께 말입니다."}, {"start": 448.288, "end": 450.841, "text": "덕분에 여러분은 모델을 직접 커스터마이징하여"}, {"start": 450.891, "end": 452.139, "text": "정말 정교한 방식으로 활용할 수 있습니다."}, {"start": 452.189, "end": 454.439, "text": "특화된 기능을 구현할 수도 있고"}, {"start": 454.49, "end": 457.538, "text": "다양한 비용 최적화 방안도 찾아낼 수 있죠."}, {"start": 457.588, "end": 462.939, "text": "또한 전반적인 시스템의 높은 정확도를 확보할 수 있는"}, {"start": 462.99, "end": 464.439, "text": "수많은 가능성이 열려 있습니다."}, {"start": 464.49, "end": 466.889, "text": "수많은 산업 분야에서"}, {"start": 466.891, "end": 468.439, "text": "투명성과 제어권은 매우 중요합니다."}, {"start": 468.49, "end": 470.439, "text": "그리고 당연히 여러 면에서"}, {"start": 470.49, "end": 472.24, "text": "데이터 주권이 보장되어야 하죠."}, {"start": 472.29, "end": 475.838, "text": "자사 데이터를 지적 재산으로 보호하려는"}, {"start": 475.889, "end": 480.838, "text": "대형 제약회사나 국가 차원의 데이터 주권을 위해서 말입니다."}, {"start": 480.889, "end": 484.939, "text": "젠슨도 이에 대해 언급했고, 캐리 브리스키의 강연에서도"}, {"start": 484.99, "end": 486.338, "text": "확인하실 수 있습니다."}, {"start": 486.389, "end": 493.49, "text": "저희의 엔비디아 에이전트 툴킷과 니모트론 오픈 모델은"}, {"start": 493.588, "end": 494.978, "text": "에이전틱 AI를 위한 전체 라이프사이클을 지원합니다."}, {"start": 495.028, "end": 496.68, "text": "완전한 엔드 투 엔드 과정입니다."}, {"start": 496.73, "end": 498.778, "text": "시작은 역시 데이터부터죠."}, {"start": 498.829, "end": 502.98, "text": "모든 오픈 모델에서 데이터로 시작하는 이 패턴이 반복되는 걸 보시게 될 겁니다."}, {"start": 503.031, "end": 503.98, "text": "바로 데이터에서 말이죠."}, {"start": 504.031, "end": 511.979, "text": "실제 데이터를 수집할 수도 있지만, 어떤 분야든 합성 데이터에 대한 엄청난 수요가 존재합니다."}, {"start": 512.029, "end": 516.98, "text": "젠슨과 팀원들이 놀라운 신규 모델들을 대거 발표했습니다."}, {"start": 517.029, "end": 523.98, "text": "이미 많은 기업이 네모트론 나노를 사용 중이지만, 방금 슈퍼와 울트라를 발표했죠."}, {"start": 524.029, "end": 529.98, "text": "이 오픈 모델들은 이제 멀티모달 AI 언어 모델의 최전선에 도달했습니다."}, {"start": 530.029, "end": 532.579, "text": "아주 쉽게 커스터마이징할 수 있는 방법도 있습니다."}, {"start": 532.629, "end": 536.827, "text": "이제 이 모델들을 가져다가..."}, {"start": 536.827, "end": 538.378, "text": "체육관에 넣을 수 있는 놀라운 방법들이 있죠."}, {"start": 538.427, "end": 543.18, "text": "모델을 단련시켜서 특정 기술에 특화되도록 만드는 겁니다."}, {"start": 543.23, "end": 547.281, "text": "그리고 '블루프린트'라는 것을 만드는데,"}, {"start": 547.331, "end": 550.579, "text": "이건 일종의 레퍼런스 애플리케이션입니다."}, {"start": 550.629, "end": 553.879, "text": "이 요소들을 어떻게 조합해 업무를 수행할까요?"}, {"start": 553.928, "end": 556.379, "text": "그중 하나가 바로 'IQ'입니다."}, {"start": 556.428, "end": 567.379, "text": "회사의 모든 데이터 소스를 에이전트에게 연결해, 그 모든 정보를 바탕으로 심층 연구를 수행한다고 상상해 보세요."}, {"start": 567.428, "end": 573.379, "text": "기존 오픈 모델로 심층 연구를 하듯이, 여러분 고유의 데이터로도 가능하게 하는 거죠."}, {"start": 573.428, "end": 575.379, "text": "그를 위한 블루프린트를 제작했습니다."}, {"start": 575.428, "end": 583.3389999999999, "text": "이 모든 도구가 에이전트 기반 디지털 헬스 혁명을 위한 토대가 되었습니다."}, {"start": 583.389, "end": 589.04, "text": "저희는 이 분야의 가장 놀라운 기업들과 함께 일하게 되어 정말 기쁩니다."}, {"start": 589.09, "end": 592.24, "text": "아시다시피, 저희는 엔비디아 인셉션 프로그램을 운영하고 있죠."}, {"start": 592.29, "end": 598.44, "text": "현재 5,000개가 넘는 기업으로 성장했으며, 그중 2,000개 이상이 디지털 헬스 분야 기업들입니다."}, {"start": 598.49, "end": 607.14, "text": "헬스케어 분야 AI 매출의 85%가 스타트업 기업들로 유입되고 있는데, 그 이유는 그들이"}, {"start": 607.19, "end": 612.94, "text": "완전히 고정관념을 깨는 사고로 세상에서 가장 어려운 문제들을 해결하고 있기 때문입니다."}, {"start": 612.99, "end": 616.44, "text": "그리고 그들은 이를 놀라운 규모로 해내고 있습니다."}, {"start": 616.49, "end": 618.741, "text": "그래서 저희는 하이디 헬스(Heidi Health)와 협력 중입니다."}, {"start": 618.791, "end": 624.187, "text": "이곳은 다국어 임상 문서화 플랫폼을 제공합니다."}, {"start": 624.288, "end": 633.288, "text": "매주 240만 건의 대화를 처리하며 190개국에 걸쳐 서비스를 제공하고 있죠."}, {"start": 633.288, "end": 636.54, "text": "다음으로 오픈 에비던스(Open Evidence)의 다니엘이 제 바로 뒤에 나올 예정입니다."}, {"start": 636.59, "end": 642.84, "text": "이 서비스는 불과 12~18개월 만에 미국 임상의의 약 50%가 사용하게 되었습니다."}, {"start": 642.889, "end": 645.889, "text": "주로 의학 지식을 통합하고"}, {"start": 645.989, "end": 650.439, "text": "상담 내용을 의사들의 진료 맥락에 맞게 구성하는 데 활용되죠."}, {"start": 650.489, "end": 653.24, "text": "신뢰할 수 있는 의학 지식을 바탕으로 말입니다."}, {"start": 653.29, "end": 657.038, "text": "이를 통해 실시간으로 업데이트되는 의학 지식 말뭉치를 구축하여,"}, {"start": 657.088, "end": 659.038, "text": "정보가 끊임없이 변하기 때문에"}, {"start": 659.088, "end": 660.84, "text": "이를 의사들에게 즉시 전달하고 있습니다."}, {"start": 660.889, "end": 664.638, "text": "소드 헬스(Sword Health) 역시 부스와"}, {"start": 664.687, "end": 669.638, "text": "전시장에서 만나보실 수 있는 놀라운 AI 케어 기업입니다."}, {"start": 669.687, "end": 674.379, "text": "실제로 엔비디아는 물리 치료를 위해 소드 헬스의 서비스를 이용하는 고객이기도 합니다."}, {"start": 674.428, "end": 680.979, "text": "현재 70만 명 이상의 회원을 진료하고 있으며, 누적 세션 수는 1,000만 회가 넘습니다."}, {"start": 681.028, "end": 685.68, "text": "그리고 바로 지난달에는 새로운 정신 건강 플랫폼을 출시했죠."}, {"start": 685.73, "end": 694.179, "text": "이 플랫폼들은 스마트폰에서 우버 같은 앱을 다운로드할 때처럼 아주 간편하게 배포할 수 있습니다."}, {"start": 694.229, "end": 695.579, "text": "설치도 쉽고,"}, {"start": 695.629, "end": 698.18, "text": "사용법을 익히기도 매우 간단하죠."}, {"start": 698.23, "end": 703.78, "text": "진입 장벽이 전혀 없는 셈이죠. 게다가 아키텍처 덕분에 확장성도 매우 뛰어납니다."}, {"start": 703.83, "end": 706.06, "text": "그래서 이들은 엔비디아의..."}, {"start": 706.11, "end": 714.2, "text": "에이전트 툴킷을 활용해 맞춤형 도메인 특화 시스템을 구축하고 있습니다. 저희는 이들과 협력해 비용 최적화 작업도 진행하고 있죠."}, {"start": 714.25, "end": 719.98, "text": "젠슨 황 CEO가 '추론의 왕'처럼 양팔을 번쩍 들고 있던 모습을 기억하실지 모르겠네요."}, {"start": 720.029, "end": 726.879, "text": "엔비디아는 추론에 정말 전력을 다하고 있습니다. 방금 말씀하신 라운드 로빈 방식의..."}, {"start": 726.928, "end": 731.18, "text": "에이전트 다이어그램을 보면, 그 모든 요소 하나하나가 추론을 수행하고 있죠."}, {"start": 731.23, "end": 734.881, "text": "이제는 멀티 턴 방식에 멀티 시스템 에이전트 단계까지 왔습니다."}, {"start": 734.931, "end": 739.979, "text": "추론은 해결하기 매우 까다로운 문제지만, 저희는 이 분야에 깊이 집중하고 있습니다."}, {"start": 740.028, "end": 745.281, "text": "저희는 기업들이 이러한 시스템의 놀라운 성능을 활용할 수 있도록 협력하고 있습니다."}, {"start": 745.331, "end": 750.18, "text": "기술 도입이 폭발적으로 늘어나는 동시에, 의료 시스템이 이를 충분히..."}, {"start": 750.23, "end": 752.179, "text": "수용할 수 있는 방향으로 말이죠."}, {"start": 752.229, "end": 758.58, "text": "저희는 아이큐비아(IQVIA)와 꽤 오랫동안 협력해 왔는데요. 이번 GTC에서..."}, {"start": 758.629, "end": 759.881, "text": "'IQVIA.ai'를 발표했습니다."}, {"start": 759.931, "end": 762.979, "text": "이것은 그들의 통합 에이전트 플랫폼입니다."}, {"start": 763.028, "end": 768.219, "text": "엔비디아 에이전트 툴킷의 다양한 기능들을 하나의 플랫폼으로 통합한 결과물이죠."}, {"start": 768.269, "end": 774.219, "text": "물론 여기 계신 많은 분처럼 랭체인(LangChain)을 사용해"}, {"start": 774.269, "end": 780.219, "text": "에이전트를 신속하게 구축하고 있죠. 다양한 워크플로우에 걸쳐 150개의 에이전트를요."}, {"start": 780.269, "end": 785.219, "text": "이들은 수십 년간 구축해 온 방대한 데이터 소스와 데이터 네트워크를 보유하고 있습니다."}, {"start": 785.269, "end": 791.219, "text": "임상 연구 분야에서 깊은 전문 지식을 갖추고 있으며, 본질적으로는"}, {"start": 791.269, "end": 796.219, "text": "데이터 검토부터 현장 지원까지 모든 작업을 수행하는 전문 에이전트를 구축하고 있습니다."}, {"start": 796.269, "end": 802.219, "text": "제약 영업 사원들이 이전과는 차원이 다른 의미 있는 대화를 나눌 수 있도록 돕는 도구나,"}, {"start": 802.269, "end": 804.82, "text": "다양한 목적의 문헌 검토 등"}, {"start": 804.87, "end": 807.518, "text": "규제 환경에서 필요한 모든 업무를 지원하죠."}, {"start": 807.567, "end": 811.219, "text": "제가 특히 좋아하는 사례 중 하나는 임상 시험의"}, {"start": 811.269, "end": 812.719, "text": "시험 기관 선정에 관한 것입니다."}, {"start": 812.769, "end": 815.02, "text": "적합한 모든 기관을 찾으려고 노력 중인데,"}, {"start": 815.07, "end": 817.82, "text": "예전에는 이런 작업에 수주가 걸리곤 했습니다."}, {"start": 817.87, "end": 820.02, "text": "하지만 이제는 그 기간을 며칠 단위로 단축하고 있죠."}, {"start": 820.07, "end": 822.121, "text": "임상 시험이 지연되지 않는"}, {"start": 822.171, "end": 825.619, "text": "하루하루가 그야말로 수익과 직결됩니다."}, {"start": 825.668, "end": 828.219, "text": "수백만 달러의 가치가 걸린 일이니까요."}, {"start": 828.269, "end": 833.219, "text": "그래서 아이큐비아(IQVIA).ai는 새로운 통합 에이전틱 AI 플랫폼을 선보였고,"}, {"start": 833.269, "end": 834.619, "text": "그 구조는 이렇습니다."}, {"start": 834.668, "end": 838.921, "text": "젠슨이 말했듯이, '서비스형 소프트웨어(SaaS)'에서"}, {"start": 838.971, "end": 841.78, "text": "'서비스형 에이전트(Agentic as a Service)' 플랫폼으로 진화하는 방식이죠."}, {"start": 841.83, "end": 844.878, "text": "이곳에서 실시간으로 구현되고 있습니다."}, {"start": 844.927, "end": 850.928, "text": "이것이 바로 전 세계 의료 인프라가 나아갈 미래입니다."}, {"start": 850.927, "end": 854.679, "text": "다시 말씀드리지만, 더 이상 설치하는 데만 수년이 걸리는"}, {"start": 854.729, "end": 857.379, "text": "거대한 단일 애플리케이션의 시대가 아닙니다."}, {"start": 857.428, "end": 860.679, "text": "앞으로는 다양한 애플리케이션이 모자이크처럼 연결될 것입니다."}, {"start": 860.729, "end": 863.579, "text": "고도의 전문성을 갖춘 앱들이 저마다 정교하고"}, {"start": 863.629, "end": 865.98, "text": "독창적인 방식으로 구동되는 구조죠."}, {"start": 866.029, "end": 869.68, "text": "이는 말 그대로 의료 서비스의 시작부터 끝까지 책임집니다."}, {"start": 869.73, "end": 872.778, "text": "환자가 병원 문을 들어서는 순간이나,"}, {"start": 872.827, "end": 877.18, "text": "혹은 도움을 받기 위해 전화를 거는 그 시점부터 시작해서"}, {"start": 877.23, "end": 880.781, "text": "환자와 의료진의 경험을 개선하는 과정은 물론이고요."}, {"start": 880.831, "end": 883.579, "text": "보이지 않는 곳의 업무 흐름부터, 아까 언급했던"}, {"start": 883.629, "end": 886.48, "text": "임상 및 지능형 애플리케이션에 이르기까지 전부 아우릅니다."}, {"start": 886.529, "end": 890.28, "text": "그리고 퇴원한 후에도 환자 관리가 놀랍고도 의미 있는 방식으로"}, {"start": 890.33, "end": 894.58, "text": "지속될 수 있도록 보장하는 방법까지 고민하고 있습니다."}, {"start": 894.629, "end": 901.479, "text": "이제 디지털 헬스 에이전트의 시대가 열렸습니다. 예상하시겠지만, 자율형 AI(Agentic AI)는"}, {"start": 901.528, "end": 903.68, "text": "이미 모든 분야로 뻗어 나가고 있습니다."}, {"start": 903.73, "end": 907.978, "text": "그럼 AI가 과학 분야에서 어떻게 새로운 패러다임을 만들고 있는지 살펴볼까요?"}, {"start": 908.028, "end": 911.281, "text": "과학 연구는 막대한 비용과 시간이 소요되는 작업입니다."}, {"start": 911.331, "end": 916.009, "text": "논문을 읽고, 분석을 수행하고, 가설을 검증해야 하죠."}, {"start": 916.058, "end": 923.009, "text": "에디슨 사이언티픽은 6개월의 연구 주기를 단 하루로 단축하는 AI 과학자, '코스모스'를 개발하고 있습니다."}, {"start": 923.058, "end": 926.709, "text": "코스모스는 단순한 단일 모델이 아닙니다."}, {"start": 926.759, "end": 932.7090000000001, "text": "엔비디아의 AI 모델과 컴퓨팅 기술, CUDA 라이브러리 기반으로 구동되는 에이전트들의 통합 시스템이죠."}, {"start": 932.759, "end": 940.7090000000001, "text": "맞춤형 오픈 소스 네모트론 모델이 전문 작업을 수행하고, 클라우드 모델이 범용 지능을 제공합니다."}, {"start": 940.759, "end": 945.7090000000001, "text": "뇌의 미세한 유전적 변화가 어떻게 알츠하이머로 이어지는지 알아보라는 프롬프트에서 시작되죠."}, {"start": 945.759, "end": 955.511, "text": "에디슨 문헌 에이전트는 네모트론 파스를 활용해 수백만 건의 논문과 특허, 임상 시험 기록을 스캔하여"}, {"start": 955.561, "end": 959.109, "text": "텍스트, 도표, 수식을 각각 분류해 냅니다."}, {"start": 959.158, "end": 964.109, "text": "이를 바탕으로 프론티어 모델은 수십 년간 축적된 알츠하이머 연구 데이터에서 통찰을 추출합니다."}, {"start": 964.158, "end": 970.109, "text": "에디슨 분석 에이전트는 CUDA 라이브러리로 가속화된 대규모 생물학 데이터를 처리하며,"}, {"start": 970.158, "end": 978.109, "text": "cuML과 cuDF를 거쳐 네모트론이 세포 사멸과 관련된 유의미한 유전적 패턴을 식별합니다."}, {"start": 978.158, "end": 989.109, "text": "마지막으로 에디슨 분자 에이전트는 네모 RL로 학습된 모델을 사용해 화학 구조를 분석하고 세포 사멸을 막을 분자를 제안하죠."}, {"start": 989.158, "end": 1002.46, "text": "에디슨은 알츠하이머 치료 연구를 진전시키는 한편, 모든 과학 분야에서 발견의 속도를 높이고 있습니다."}, {"start": 1002.46, "end": 1005.41, "text": "여: 정말 놀랍네요. 에디슨 팀 오셨나요? 다들 여기 와 계신가요?"}, {"start": 1005.46, "end": 1011.9110000000001, "text": "여: 오셨군요! 네, 좋습니다. 샘, 만나서 반가워요. 정말 멋지네요."}, {"start": 1011.961, "end": 1019.109, "text": "여: 여러분, 우리가 과학을 위해 하려는 일은 정말 경이롭습니다. 방금 보셨듯이 6개월의..."}, {"start": 1019.158, "end": 1025.911, "text": "여: ...업무가 단 하루 만에 압축된다면, 우리는 또 다른 엄청난 도전에 직면하게 될 겁니다."}, {"start": 1025.961, "end": 1031.911, "text": "여: 이런 혁신적인 과학적 아이디어를 얻고 나면, 그다음에 할 일은 바로 검증입니다."}, {"start": 1031.961, "end": 1037.209, "text": "여: 미래에는 아이디어를 검증하는 두 가지 방법이 있을 겁니다. 우선..."}, {"start": 1037.259, "end": 1044.209, "text": "여: 제가 '디지털 드라이 랩'이라 부르는 가상 공간에서 테스트하고, 그다음 실제 세상인..."}, {"start": 1044.259, "end": 1052.18, "text": "여: 생명과학 실험실에서 검증하는 것이죠. 생명과학은 수조 달러 규모의 거대한 산업입니다."}, {"start": 1052.23, "end": 1058.58, "text": "놀라운 기술과 함께 이곳에서 아주 다른 모습으로 변모하는 걸 보고 계십니다. 방금 보신 건..."}, {"start": 1058.63, "end": 1065.778, "text": "에디슨과 그들의 AI 과학자들입니다. 이 과학자들은 디지털 AI..."}, {"start": 1065.828, "end": 1070.18, "text": "신약 개발 팩토리로 안내할 것입니다. 여기서 저희는 '바이오 니모(BioNeMo)'에서의 노력에 대해 많은 이야기를 나눌 것이고,"}, {"start": 1070.23, "end": 1075.279, "text": "이어서 실험실 자동화 분야에서 어떤 일이 일어나고 있는지에 대해서도 조금 이야기해 보겠습니다."}, {"start": 1075.329, "end": 1083.279, "text": "이제 우리는 생물학 분야의 '추론 모델' 시대로 접어들고 있습니다. 현재 우리는 본질적으로 3세대 단계에 와 있습니다."}, {"start": 1083.329, "end": 1089.778, "text": "묘하게도 GPT와 비슷한 패턴을 따르고 있죠. GPT-3에서..."}, {"start": 1089.828, "end": 1096.077, "text": "3.5를 거쳐 4로 넘어오면서 언어 모델의 추론 능력이 본격적으로 구체화되기 시작했는데,"}, {"start": 1096.127, "end": 1102.38, "text": "이제 생물학 분야도 그 시대에 도달했습니다. 처음에는 구조 예측이었고, 두 번째는..."}, {"start": 1102.43, "end": 1108.68, "text": "진정한 '데 노보(de novo)' 디자인이었죠. 그리고 이제 우리는 '상호작용 디자인' 단계에 들어섰습니다."}, {"start": 1108.73, "end": 1112.381, "text": "저희는 추론에 대해 많은 이야기를 나눌 예정입니다. 정말 흥미진진한 시기죠."}, {"start": 1112.431, "end": 1119.679, "text": "사실 모든 산업에서 AI의 발목을 잡는 요소 중 하나는 바로 데이터입니다."}, {"start": 1119.729, "end": 1126.278, "text": "노벨상을 수상했던 알파폴드의 순간과, 정말 독보적인 도구였던 알파폴드를 기억하신다면..."}, {"start": 1126.327, "end": 1132.88, "text": "예측 결과가 실험 데이터 수준의 정확도에 도달했기 때문에 노벨상을 받을 수 있었던 것이죠."}, {"start": 1132.93, "end": 1139.18, "text": "실험 수준의 정확도에 도달할 수 있는 모델이 있다면, 그 모델을..."}, {"start": 1139.23, "end": 1141.68, "text": "데이터 생성기로 전환할 수 있습니다. 그렇지 않나요?"}, {"start": 1141.73, "end": 1144.08, "text": "그러기 위해선 먼저 현실 세계의 데이터가 필요합니다."}, {"start": 1144.13, "end": 1146.88, "text": "단백질 데이터베이스와 같은 데이터베이스를 구축하기 위해"}, {"start": 1146.93, "end": 1149.98, "text": "지난 50년 동안 수많은 실험이 이루어졌습니다."}, {"start": 1150.029, "end": 1153.88, "text": "그러한 노력이 있었기에 알파폴드 2가 탄생할 수 있었죠."}, {"start": 1153.93, "end": 1156.229, "text": "그리고 일단 알파폴드 2가 탄생한 이후에는..."}, {"start": 1156.278, "end": 1158.63, "text": "추론 단계에서 활용이 가능해졌고"}, {"start": 1158.68, "end": 1163.68, "text": "2억 개의 데이터를 합성해 낼 수 있었습니다"}, {"start": 1163.68, "end": 1167.827, "text": "기존에 존재하던 20만 개의 단백질 구조와 비교하면 엄청난 수치죠"}, {"start": 1167.877, "end": 1172.129, "text": "그 덕분에 이전 슬라이드에서 보신 모든 모델이 탄생할 수 있었습니다"}, {"start": 1172.179, "end": 1180.528, "text": "젠슨이 앞서 언급한 이 개념은 '컴퓨팅이 곧 데이터'라는 사실을 명확히 보여줍니다"}, {"start": 1180.578, "end": 1187.028, "text": "모델의 정확도와 성능이 향상됨에 따라 이를 활용해 데이터를 생성하고"}, {"start": 1187.078, "end": 1191.528, "text": "다양한 작업을 위해 모델을 사후 학습시킬 수 있습니다"}, {"start": 1191.577, "end": 1196.63, "text": "방금 AlphaFold 2로 이를 수행하는 법을 보여드렸는데, 구글 딥마인드 팀이 바로 그 일을 해냈죠"}, {"start": 1196.68, "end": 1203.028, "text": "저희는 오랫동안 이 문제에 매달려 왔습니다. 여전히 비용이 상당히 많이 든다는 점을 인지하고 있었거든요"}, {"start": 1203.077, "end": 1206.331, "text": "AlphaFold 2를 실행하는 데 드는 연산 비용 말이죠"}, {"start": 1206.381, "end": 1210.528, "text": "그래서 지난 몇 년간 매우 중요한 라이브러리들을 개발해 왔습니다"}, {"start": 1210.578, "end": 1215.528, "text": "젠슨이 언급한 cuEquivariance는 이제 모든 단백질 모델의 근간이 되었습니다"}, {"start": 1215.578, "end": 1218.93, "text": "이 모델들은 3D 기하학적 구조를 이해합니다"}, {"start": 1218.98, "end": 1226.729, "text": "저희는 GPU MSA를 개발했습니다. 기존에는 MSA가 CPU에서 작동해 AlphaFold의 큰 병목 구간이었거든요"}, {"start": 1226.778, "end": 1230.83, "text": "그 모든 과정을 GPU로 옮겼고, 세 번째로는 당연히 저희의 모든..."}, {"start": 1230.88, "end": 1235.827, "text": "AlphaFold 2의 AI 핵심인 추론 과정을 가능한 한 빠르게 만들었습니다"}, {"start": 1235.877, "end": 1242.83, "text": "인간이 할 수 있는 최대치까지요. 그 결과 100배 이상의 속도 향상을 이뤄냈죠"}, {"start": 1242.88, "end": 1248.729, "text": "이러한 성능 향상 덕분에 이제 이 모델을 사용해 훨씬 더 복잡한 데이터 세트를"}, {"start": 1248.778, "end": 1255.43, "text": "생성하는 것을 상상할 수 있게 되었습니다. 그래서 새로운 AlphaFold 단백질..."}, {"start": 1255.48, "end": 1261.548, "text": "복합체 데이터 세트를 이번 GTC에서 발표하게 되어 매우 기쁩니다. 저희는..."}, {"start": 1261.598, "end": 1269.2, "text": "EMBL-EBI는 구글 딥마인드 및 서울대학교와 협력해"}, {"start": 1261.598, "end": 1269.2, "text": "이 놀라운 데이터셋을 구축했습니다."}, {"start": 1269.2, "end": 1276.097, "text": "다운로드 가능한 3,000만 개의 단백질 복합체 데이터셋이죠."}, {"start": 1269.2, "end": 1276.097, "text": "EMBL 팀은 이 정교하고—"}, {"start": 1276.098, "end": 1282.999, "text": "—매우 높은 수준의 품질을 자랑하는 170만 개의"}, {"start": 1276.098, "end": 1282.999, "text": "대화형 구조를 웹사이트에 공개하고 있습니다."}, {"start": 1282.999, "end": 1289.7, "text": "이들은 바로 복합체입니다. 이전 세대는 사실"}, {"start": 1282.999, "end": 1289.7, "text": "단일 분자인 단량체 단백질에 집중했었죠."}, {"start": 1289.7, "end": 1299.5, "text": "이제 우리는 복합체를 다룹니다. 이런 구조를 예측하려면"}, {"start": 1289.7, "end": 1299.5, "text": "본질적으로 100배 더 많은 연산량이 필요하죠."}, {"start": 1299.499, "end": 1307.298, "text": "이토록 방대한 데이터셋으로 이제 무엇을 할 수 있는지"}, {"start": 1299.499, "end": 1307.298, "text": "지켜보는 건 정말 경이로운 일이며 공개하게 되어 기쁩니다."}, {"start": 1307.298, "end": 1311.249, "text": "이러한 추론의 여정을 계속 이어 나가는 모습을 상상해 보세요."}, {"start": 1311.298, "end": 1315.298, "text": "오늘 저희는 Proteina 제품군의"}, {"start": 1311.298, "end": 1315.298, "text": "새로운 모델도 발표합니다."}, {"start": 1315.298, "end": 1319.248, "text": "바로 3세대 모델인 'Proteina Complexa'입니다."}, {"start": 1319.298, "end": 1323.248, "text": "이 모델은 단백질 디자인 추론 모델입니다."}, {"start": 1323.298, "end": 1327.248, "text": "이 모델의 입력을 살펴보면, 먼저 표적 단백질과"}, {"start": 1327.298, "end": 1331.248, "text": "결합 부위인 핫스팟, 그리고 몇 가지 디자인 매개변수를 받습니다."}, {"start": 1331.298, "end": 1334.248, "text": "탐색 방식과 원하는 디자인 개수 등을 설정하죠."}, {"start": 1334.298, "end": 1339.248, "text": "그러면 AI가 내부적으로 단백질의 초안을 생성합니다."}, {"start": 1339.298, "end": 1344.798, "text": "그런 다음 내장된 채점 시스템을 통해"}, {"start": 1339.298, "end": 1344.798, "text": "끊임없이 테스트하고 정교하게 다듬습니다."}, {"start": 1344.798, "end": 1345.198, "text": "원자 수준까지 물리 법칙을 준수하는 완벽한 구조를 찾을 때까지"}, {"start": 1344.798, "end": 1351.397, "text": "계속해서 수정을 반복하죠."}, {"start": 1351.397, "end": 1353.65, "text": "아주 미세한 원자 수준까지 말입니다."}, {"start": 1353.7, "end": 1360.0, "text": "여기서 일어나는 과정은 모델에게"}, {"start": 1353.7, "end": 1360.0, "text": "'생각하는 능력'을 부여하는 것과 같습니다."}, {"start": 1360.0, "end": 1363.95, "text": "아마 들어보셨을 '테스트 시간 연산'이라는 과정이죠."}, {"start": 1364.0, "end": 1367.699, "text": "마치 우리가 무언가를 생각할 때"}, {"start": 1364.0, "end": 1367.709, "text": "시간을 들여 조금 더 깊이 고민하는 것과 같습니다."}, {"start": 1367.759, "end": 1370.807, "text": "보통 더 나은 아이디어를 몇 가지 내놓곤 하죠."}, {"start": 1370.857, "end": 1377.009, "text": "그래서 결과적으로, 컴퓨팅 파워가 강력할수록 설계 범위를 더 넓힐 수 있습니다."}, {"start": 1377.058, "end": 1381.008, "text": "그리고 이 단백질 복합체 모델은 사실 매우 효율적입니다."}, {"start": 1381.057, "end": 1392.008, "text": "같은 계열의 이전 모델과 비교해 보면, 동일한 연산 자원으로 기본적으로 두 배 더 많은 바인더를 계산할 수 있죠."}, {"start": 1392.057, "end": 1398.008, "text": "'Proteina Complexa'의 체크포인트와 구축 방식은 모두 공개되어 있습니다."}, {"start": 1398.057, "end": 1409.008, "text": "저희는 훌륭한 파트너들과 협력했을 뿐만 아니라, 모델의 성능이 워낙 뛰어나서 많은 파트너들과 함께 실험적 검증을 진행했습니다."}, {"start": 1409.057, "end": 1411.008, "text": "이 모델이 과연 얼마나 좋을까요?"}, {"start": 1411.057, "end": 1416.008, "text": "보시다시피 여기서 아주 놀라운 검증 결과를 확인하실 수 있습니다."}, {"start": 1416.057, "end": 1423.611, "text": "철저한 테스트를 거쳤는데요, 오른쪽을 보시면 100만 개 이상의 바인더가 테스트되었습니다."}, {"start": 1423.661, "end": 1430.11, "text": "Viva 팀은 매우 까다로운 타겟을 대상으로 16개의 바인더를 성공적으로 생성해 냈습니다."}, {"start": 1430.16, "end": 1433.509, "text": "바로 근육 위축 질환과 관련된 타겟이었죠."}, {"start": 1433.558, "end": 1438.807, "text": "그리고 케임브리지 대학교에서는 최초로 컴퓨터 설계를 통해"}, {"start": 1438.857, "end": 1443.509, "text": "탄수화물 항원에 결합할 수 있는 단백질을 만들어 냈습니다."}, {"start": 1443.558, "end": 1448.91, "text": "이 모든 놀라운 결과는 논문에 실려 있습니다. 우리가 '인 실리코' 방식으로"}, {"start": 1448.96, "end": 1456.259, "text": "무엇을 할 수 있는지 보는 건 정말 놀랍죠. 최신 기술인"}, {"start": 1456.161, "end": 1458.91, "text": "추론 및 테스트 단계의 연산 능력을 활용해 더 많은 설계안을 내놓고 있습니다."}, {"start": 1458.96, "end": 1464.509, "text": "우리는 이제 명백히 생물학의 '추론 시대'에 살고 있습니다."}, {"start": 1464.558, "end": 1467.11, "text": "이제 우리가 생각해야 할 것은 컴퓨팅입니다."}, {"start": 1467.16, "end": 1468.91, "text": "세 가지 문제가 있습니다."}, {"start": 1468.96, "end": 1470.469, "text": "AI에는 세 가지 도전 과제가 있죠."}, {"start": 1470.519, "end": 1474.37, "text": "바로 데이터와 알고리즘, 그리고 연산 능력입니다."}, {"start": 1474.42, "end": 1479.67, "text": "저희가 전 세계를 돕기 위해 해결해야 했던 과제 중 하나는 더 거대한 규모의"}, {"start": 1479.72, "end": 1481.371, "text": "단백질 구조를 계산해 내는 능력이었죠."}, {"start": 1481.421, "end": 1486.768, "text": "그래서 저희는 '컨텍스트 병렬화(Context Parallelism)'라고 불리는 프레임워크를 개발했습니다."}, {"start": 1486.817, "end": 1492.671, "text": "이는 본질적으로 우리가 예측할 수 있는 컨텍스트 창의 한계를 뛰어넘게 해줍니다."}, {"start": 1492.721, "end": 1497.171, "text": "이 기술은 거대한 분자 복합체를 여러 GPU에 분산하여 처리합니다."}, {"start": 1497.221, "end": 1502.969, "text": "덕분에 말 그대로 무한한 능력과 무한한 컨텍스트 창을 확보하게 된 것이죠."}, {"start": 1503.019, "end": 1505.47, "text": "이전에는 단일 GPU의 성능에만 의존해야 했기 때문에,"}, {"start": 1505.519, "end": 1508.969, "text": "저희가 탐구하고자 했던 일부 단백질들은"}, {"start": 1509.019, "end": 1510.869, "text": "컴퓨터로 처리하는 것 자체가 불가능했습니다."}, {"start": 1510.919, "end": 1511.869, "text": "아예 실현 불가능한 일이었죠."}, {"start": 1511.919, "end": 1514.17, "text": "하지만 이제는 말 그대로 무한한 가능성이 열렸습니다."}, {"start": 1514.22, "end": 1516.071, "text": "저희는 훌륭한 연구진들과 함께 협력하며,"}, {"start": 1516.121, "end": 1519.769, "text": "현장에서 실제로 설계 작업을 수행하는"}, {"start": 1519.818, "end": 1522.768, "text": "뛰어난 전문가들과 다시 한번 손을 잡았습니다."}, {"start": 1522.817, "end": 1524.268, "text": "그리고 그들은 자신들의 모델을 테스트했고,"}, {"start": 1524.317, "end": 1527.268, "text": "정말이지 믿기지 않을 정도로 놀라운 결과를 얻었습니다."}, {"start": 1527.317, "end": 1530.469, "text": "이처럼 저희는 다시 한번 이 놀라운 혁신들을 하나로 묶었습니다."}, {"start": 1530.519, "end": 1537.169, "text": "그것이 데이터든, 멋진 모델이든, 혹은 컨텍스트 병렬화 같은 기술이든, 아니면"}, {"start": 1537.219, "end": 1543.548, "text": "실제 운영 환경에 도입되는 최적화된 표준 모델들의 매우 효율적인 추론 방식이든 말이죠."}, {"start": 1543.598, "end": 1548.95, "text": "분석 파이프라인을 구축하는 완전히 새로운 방식들을 고민하는 단계까지 왔습니다."}, {"start": 1549.0, "end": 1553.851, "text": "이제 설계도에서나 꿈꿨던 일들을 상상치 못한 속도로 처리할 수 있게 됐죠. 그래서 NVIDIA의"}, {"start": 1553.901, "end": 1562.25, "text": "BioNeMo는 엄청난 속도로 확장하고 있습니다. 팀을 키우고 전 세계의 훌륭한 파트너들과 협력하며"}, {"start": 1562.299, "end": 1569.548, "text": "제가 '디지털 드라이 랩'이라 부르는 이 환경의 역량을 나날이 강화하고 있습니다. 오늘 젠슨이"}, {"start": 1569.598, "end": 1577.548, "text": "AI 팩토리에 대해 언급했듯이, BioNeMo와 그 기능들, 그리고 우리가 생성할 수많은 데이터와"}, {"start": 1577.597, "end": 1582.65, "text": "우리가 생성하게 될 모든 과학적 아이디어들은 반드시 필요할 것입니다."}, {"start": 1582.7, "end": 1583.65, "text": "AI 과학자들과 함께 말이죠."}, {"start": 1583.7, "end": 1586.95, "text": "생명과학 전반에 걸쳐 AI 팩토리가 필요하게 될 것이며"}, {"start": 1587.0, "end": 1591.35, "text": "이는 R&D 프로세스를 근본적으로 변화시키고 있습니다."}, {"start": 1591.4, "end": 1597.749, "text": "또한 매우 중요한 것은, 컴퓨터상에서 탄생한 이 모든 훌륭한 아이디어들이"}, {"start": 1597.798, "end": 1599.749, "text": "결국 현실 세계로 구현되어야 한다는 점입니다."}, {"start": 1599.798, "end": 1600.95, "text": "하지만 여기에는 병목 현상이 존재하며,"}, {"start": 1601.0, "end": 1604.25, "text": "실험실에서 이 점을 명확히 인지해야 합니다."}, {"start": 1604.299, "end": 1607.749, "text": "그래서 실험실 자동화가 매우 뜨거운 화두가 되었죠."}, {"start": 1607.798, "end": 1611.75, "text": "마침 써모 피셔(Thermo Fisher) 동료분들도 여기 와 계시는군요."}, {"start": 1611.799, "end": 1615.15, "text": "바로 이 지점에서 '에이전틱 AI'가 '피지컬 AI'와 만나게 됩니다."}, {"start": 1615.2, "end": 1620.0, "text": "공간 이해력과 추론, 계획 능력이 필요하며"}, {"start": 1620.0, "end": 1624.75, "text": "물리적 실행 능력 또한 갖춰야 합니다. 젠슨의 기조연설에서 보신"}, {"start": 1624.799, "end": 1627.548, "text": "피지컬 AI의 기술력은 이 분야에도 완벽히 적용됩니다."}, {"start": 1627.598, "end": 1633.91, "text": "저희는 이 분야의 훌륭한 기업들과 협력하며 NVIDIA 기술을 기반으로 성과를 내고 있습니다."}, {"start": 1633.96, "end": 1640.308, "text": "HighRes는 인지 기능을 매우 강력한 방식으로 활용하여"}, {"start": 1640.358, "end": 1641.311, "text": "환경에 적응하도록 지원합니다"}, {"start": 1641.361, "end": 1647.308, "text": "일종의 외부 중심(outside-in) 방식을 사용해 연구실 내 정밀도를 높이고"}, {"start": 1647.358, "end": 1652.509, "text": "전문 분야의 정교한 작업을 수행하며 다양한 연구실 환경에 적응하죠"}, {"start": 1652.559, "end": 1659.611, "text": "Tecan은 네모트론(Nemotron)을 활용해 놀라운 오케스트레이션 엔진을 구축 중입니다. 연구실의 모든..."}, {"start": 1659.661, "end": 1666.61, "text": "데이터를 취합해 이해도와 운영 효율을 높이죠, 정말 놀랍습니다. 그리고 세 번째 요소는"}, {"start": 1666.66, "end": 1674.11, "text": "연구실에서 실제로 행동하는 것입니다. 이를 위해 '시각-언어-행동 모델'이라는 두뇌를 구축해야 하죠"}, {"start": 1674.16, "end": 1681.611, "text": "로봇의 두뇌가 작업 맥락을 이해하고 이러한 환경에 적응할 수 있어야 하니까요"}, {"start": 1681.661, "end": 1687.911, "text": "Opentrons도 이번 GTC에 참여했습니다. 부스에 멋진 데모가 있고, 이미 현장에는..."}, {"start": 1687.961, "end": 1693.557, "text": "수만 대의 기기가 이 기술들을 활용해"}, {"start": 1693.659, "end": 1700.21, "text": "연구실 자동화에 지능을 더하고 있습니다. 개별 벤치탑 연구실에서부터"}, {"start": 1700.259, "end": 1705.811, "text": "전체 공정을 어떻게 정교하게 자동화할 것인지까지 확장하고 있죠"}, {"start": 1705.861, "end": 1710.611, "text": "이것이 바로 '웨트 랩(wet lab)'의 차세대 물결이기도 합니다"}, {"start": 1710.661, "end": 1716.008, "text": "말씀드린 이러한 놀라운 혁신들을 통해 저희는 전통적인 R&D 방식을"}, {"start": 1716.057, "end": 1723.209, "text": "처음부터 끝까지 완전히 AI 중심(AI-native)의 방식으로 근본적으로 전환하고 있습니다"}, {"start": 1723.259, "end": 1728.557, "text": "과학 연구 방식이든, 분자 시뮬레이션이나"}, {"start": 1728.557, "end": 1736.509, "text": "분자 테스트 방식이든 모든 곳에 AI가 있습니다. AI 팩토리는 필수적이죠. 그리고 오늘..."}, {"start": 1736.558, "end": 1741.411, "text": "발표하게 되어 정말 기쁩니다. 로슈(Roche) 팀 어디 계시죠? 조명이 참 밝네요. 여러분, 반갑습니다!"}, {"start": 1741.461, "end": 1746.759, "text": "로슈는 NVIDIA AI 팩토리를 확장하여"}, {"start": 1746.759, "end": 1748.91, "text": "치료제 및 진단 개발을 가속화하고 있습니다"}, {"start": 1748.96, "end": 1750.709, "text": "바로 그 이유 때문입니다."}, {"start": 1750.759, "end": 1752.91, "text": "우리가 지금까지 나눈 모든 이야기들이죠."}, {"start": 1752.96, "end": 1758.11, "text": "로슈는 AI 팩토리 규모를 3배로 확장하여, 3,500대 이상의"}, {"start": 1758.16, "end": 1761.911, "text": "엔비디아 블랙웰을 미국과 유럽 전역의 사업장에 도입합니다."}, {"start": 1761.961, "end": 1767.509, "text": "이제 AI는 제넨텍의 실험 프로세스(lab-in-the-loop)에 완전히 통합되었습니다."}, {"start": 1767.558, "end": 1769.808, "text": "그들의 모든 전략은 활용에 초점을 맞추고 있습니다."}, {"start": 1769.858, "end": 1771.009, "text": "우리는 바이오니모(BioNeMo)를 적극 활용하고 있으며,"}, {"start": 1771.059, "end": 1774.909, "text": "로슈와 협력해 모든 AI 모델 설계를 최적화하고 있죠."}, {"start": 1774.959, "end": 1778.11, "text": "덕분에 높은 처리량으로 실제 생산에 즉시 투입할 수 있습니다."}, {"start": 1778.16, "end": 1780.709, "text": "로슈의 제조 부문에서도 활용하고 있습니다."}, {"start": 1780.759, "end": 1783.61, "text": "엔비디아 옴니버스 라이브러리를 통해 고정밀"}, {"start": 1783.66, "end": 1787.508, "text": "디지털 트윈을 구축하고 최적화 작업을 진행합니다."}, {"start": 1787.557, "end": 1792.557, "text": "실제 제조 공장이 세워지기도 전에 말이죠."}, {"start": 1792.557, "end": 1794.41, "text": "놀라운 성과를 내고 있는 진단 사업부 역시,"}, {"start": 1794.46, "end": 1796.709, "text": "저희가 오랫동안 함께 일해 온 파트너입니다."}, {"start": 1796.759, "end": 1800.709, "text": "제 오랜 친구인 척이 여기 와 있네요. 그는 현재..."}, {"start": 1800.759, "end": 1803.709, "text": "엔비디아 패러브릭스와 가속 컴퓨팅 플랫폼을 사용해"}, {"start": 1803.759, "end": 1807.308, "text": "혁신적인 신규 진단 플랫폼을 구축하고,"}, {"start": 1807.358, "end": 1811.91, "text": "방대한 규모의 유전체 분석 워크로드를 수행하고 있습니다."}, {"start": 1811.96, "end": 1816.59, "text": "로슈 팀과 우리의 오랜 협력을 확장하게 되어 매우 기쁩니다."}, {"start": 1816.64, "end": 1821.289, "text": "2023년이었던 것 같네요, 저희가 발표했던 건..."}, {"start": 1821.339, "end": 1825.689, "text": "제넨텍과 함께한 GTC였죠. 이제 보시다시피 완전히 스며들었습니다."}, {"start": 1825.739, "end": 1831.091, "text": "로슈 그룹 전체에 말이죠. 정말 놀랍고, 여러분과 계속 협력하면서..."}, {"start": 1831.141, "end": 1832.091, "text": "여러분이 해낼 일들을 지켜보는 게 정말 기대됩니다."}, {"start": 1832.141, "end": 1837.288, "text": "자, 이제 마지막 섹션인 헬스케어 분야로 넘어가 보겠습니다."}, {"start": 1837.338, "end": 1841.09, "text": "물리적 AI를 통해 글로벌 헬스케어의 규모를 확장해야 합니다."}, {"start": 1841.14, "end": 1845.788, "text": "말씀하신 것처럼 수많은 멋진 아이디어를 내놓겠지만, 진정한 승부처는..."}, {"start": 1845.838, "end": 1848.289, "text": "바로 현실 세계, 물리적인 세상입니다."}, {"start": 1848.339, "end": 1855.091, "text": "로봇을 훈련시키는 것을 다시 생각해 보면, 가장 큰 과제 중 하나는..."}, {"start": 1855.141, "end": 1867.091, "text": "데이터입니다. 실제 데이터조차 구하기가 매우 어렵죠. 게다가 로봇 한 대가 작동하기 위해 필요한 세상의 그 수많은 변수를 생각하면..."}, {"start": 1867.141, "end": 1881.09, "text": "16만 개의 각기 다른 병원이 있고 수술실도 저마다 다르게 생겼습니다. 의료 절차는 7만 2천 개나 되더군요. 직접 찾아봤는데 그렇게 많은 줄은 저도 몰랐습니다."}, {"start": 1881.14, "end": 1885.09, "text": "그런 의료 절차에 쓰이는 의료 기기는 또 얼마나 많겠습니까?"}, {"start": 1885.14, "end": 1891.09, "text": "그러니 변수가 너무나도 방대해서 거의 불가능해 보일 정도죠."}, {"start": 1891.14, "end": 1901.09, "text": "그래서 저희는 이 혁명을 이끌 로봇들이 실제로 등장하게 될 미래를 보고 있습니다. 최소한 세 가지 종류의 로봇이요."}, {"start": 1901.14, "end": 1909.09, "text": "첫 번째는 '로봇으로서의 인프라'입니다. 전에도 말했지만, 병원 자체가 하나의 로봇이 되는 겁니다."}, {"start": 1909.14, "end": 1915.137, "text": "병원 안에서 일어나는 모든 일을 파악하게 되겠죠."}, {"start": 1915.14, "end": 1918.69, "text": "두 번째 유형은 서비스 및 배송 로봇입니다."}, {"start": 1918.74, "end": 1924.289, "text": "병원 내부에서 실제 업무를 수행하기 위해 움직이는 로봇들이죠."}, {"start": 1924.339, "end": 1930.091, "text": "그리고 세 번째는 임상 분야에 특화된 보조 로봇들입니다."}, {"start": 1930.141, "end": 1936.13, "text": "인간의 능력을 아주 정교하게 보충해 주는 역할을 할 텐데, 우리에게 꼭 필요한 기술이죠."}, {"start": 1936.18, "end": 1941.13, "text": "잘 아시다시피, 전 세계의 수많은 지역이 수술은커녕 외과 의사조차 만나지 못하는 실정입니다."}, {"start": 1941.18, "end": 1945.13, "text": "그래서 어떻게 하면 이런 의료 서비스를 전 세계 더 많은 곳으로 확대할 수 있을까요?"}, {"start": 1945.18, "end": 1946.13, "text": "그 과제를 반드시 해결해야만 하죠."}, {"start": 1946.18, "end": 1948.13, "text": "보시다시피 여기에는 세 가지 핵심 계층이 있습니다."}, {"start": 1948.18, "end": 1952.13, "text": "우선 '프로젝트 리오(Project Rio)'부터 시작하겠습니다."}, {"start": 1952.18, "end": 1960.13, "text": "엔비디아의 디지털 디바이스 팀은 훌륭한 파트너들과 함께 시스템을 구축했습니다."}, {"start": 1960.18, "end": 1966.23, "text": "파라투스, 어드벤트 헬스, 라이트빔과 협력해 병원 자동화의 청사진을 구현했죠."}, {"start": 1966.279, "end": 1967.23, "text": "자동화 말입니다."}, {"start": 1967.279, "end": 1972.229, "text": "먼저 병원에 꼭 필요한 '디지털 트윈'을 구축하는 과정부터 설명해 드립니다."}, {"start": 1972.278, "end": 1973.331, "text": "반드시 필요한 단계죠."}, {"start": 1973.381, "end": 1978.23, "text": "디지털 트윈이 준비되면 데이터를 수집하는 것은 물론, 엄청난 양의 데이터를 직접 생성할 수도 있습니다."}, {"start": 1978.279, "end": 1979.23, "text": "데이터 생성 말이죠."}, {"start": 1979.279, "end": 1983.83, "text": "그다음에는 다양한 유형의 로봇이 학습할 수 있도록 인공지능 정책을 훈련시키게 됩니다."}, {"start": 1983.88, "end": 1986.528, "text": "일종의 '두뇌'를 만드는 과정입니다."}, {"start": 1986.578, "end": 1990.13, "text": "그 두뇌는 병원 전체를 관리하거나 서비스 로봇을 제어할 수도 있고,"}, {"start": 1990.18, "end": 1991.729, "text": "임상 진단을 보조할 수도 있습니다."}, {"start": 1991.778, "end": 1996.728, "text": "이제 '리오'가 실제로 어떻게 작동하는지 직접 확인해 보시죠."}, {"start": 1996.778, "end": 2000.729, "text": "오늘날 병원들은 만성적인 인력 부족 문제에 직면해 있습니다."}, {"start": 2000.778, "end": 2003.429, "text": "미래에는 로봇이 의사나 간호사와 유기적으로 협력하며"}, {"start": 2003.479, "end": 2007.11, "text": "의료 현장의 효율성을 획기적으로 높여줄 것입니다."}, {"start": 2007.16, "end": 2008.509, "text": "...및 성과를 개선합니다."}, {"start": 2008.558, "end": 2011.41, "text": "하지만 로봇이 도움을 주기 위해서는 먼저 병원 자체가"}, {"start": 2011.46, "end": 2013.91, "text": "학습 가능한 환경이 되어야 합니다."}, {"start": 2013.96, "end": 2018.111, "text": "'프로젝트 리오'는 스마트 병원 자동화와"}, {"start": 2018.161, "end": 2020.11, "text": "피지컬 AI 개발을 위한 청사진입니다."}, {"start": 2020.16, "end": 2028.11, "text": "먼저 NVIDIA Omniverse와 Isaac Sim이 병원을 물리적으로 정확하고 시뮬레이션 가능한 디지털 트윈으로 재구축합니다."}, {"start": 2028.16, "end": 2032.71, "text": "그다음 원격 조작과 실제 데이터를 통해 기술을 습득합니다."}, {"start": 2032.759, "end": 2038.709, "text": "이어 MimicGen이 수집된 데이터를 확장해 학습 데이터 세트를 대폭 늘립니다."}, {"start": 2038.759, "end": 2045.111, "text": "동시에 Cosmos Transfer가 레이아웃, 조명, 사물 배치를 무작위로 설정합니다."}, {"start": 2045.161, "end": 2050.51, "text": "실사 수준의 도메인 전이는 가상과 현실의 간극을 메워 정교한 정렬을 보장합니다."}, {"start": 2050.561, "end": 2055.407, "text": "Isaac Lab 내부에서 로봇은 모방 학습과 강화 학습을 통해 훈련하며"}, {"start": 2055.458, "end": 2061.309, "text": "GR00T를 통해 기술을 실제 행동으로 일반화합니다. 수천 개의 병렬 실험이"}, {"start": 2061.36, "end": 2068.909, "text": "동시에 진행되어 정밀도, 타이밍, 안전을 위한 정책을 최적화하죠. 예외 상황이 도입되고"}, {"start": 2068.96, "end": 2075.829, "text": "다양한 환경 변화를 시뮬레이션합니다. 시뮬레이션에서 검증되면 정책은 하드웨어로 옮겨집니다."}, {"start": 2075.88, "end": 2082.829, "text": "로봇이 병원에 투입될 때쯤이면 이미 시뮬레이션상에서 충분히 가동된 상태가 됩니다."}, {"start": 2082.88, "end": 2091.829, "text": "Paratoss AI, Lightwheel, AdventHealth와 함께 프로젝트 리오는 오늘날 이미 스마트 병원 환경을 구동하고 있습니다."}, {"start": 2091.88, "end": 2095.829, "text": "병원에서는 끊임없이 실제 경험이 생성되고"}, {"start": 2095.88, "end": 2100.227, "text": "프로젝트 리오는 이를 즉시 배포 가능한 인공지능으로 변환합니다."}, {"start": 2100.277, "end": 2103.528, "text": "여: [박수] 정말 훌륭합니다, 여러분. 다들 수고 많으셨어요."}, {"start": 2103.579, "end": 2105.568, "text": "여: 반갑습니다, 여기 Paratoss 팀도 와 계시네요."}, {"start": 2105.619, "end": 2110.769, "text": "방금 보신 그 기술은 현재 어드벤트 헬스(Advent Health)에 실제로 도입되어 사용 중입니다."}, {"start": 2110.82, "end": 2115.971, "text": "이곳에선 현실 세계에 매우 빠르게 적용되고 있는데요. 첨단 워크플로와..."}, {"start": 2116.021, "end": 2117.568, "text": "도구들을 갖추고 있기 때문입니다."}, {"start": 2117.619, "end": 2123.568, "text": "오늘 저희는 또 하나의 매우 중요한 데이터 세트를 발표하고자 합니다."}, {"start": 2123.619, "end": 2130.467, "text": "수술 로봇 공학 분야에서 세계 최초이자 최대 규모를 자랑하는 데이터 세트입니다."}, {"start": 2130.518, "end": 2139.418, "text": "전 세계 35개 이상의 협력 기관이 참여하여 놀라운 기여를 해주신 덕분에..."}, {"start": 2139.418, "end": 2143.17, "text": "사상 처음으로 이런 데이터 세트를 구축할 수 있었습니다."}, {"start": 2143.221, "end": 2144.971, "text": "이제 '오픈 에이치(Open-H)'에 대해 설명해 드리겠습니다."}, {"start": 2145.021, "end": 2153.269, "text": "오픈 에이치는 750시간 이상의 수술 영상과 운동학 데이터가 결합된 형태입니다."}, {"start": 2153.32, "end": 2159.968, "text": "이 데이터는 11가지의 다양한 물리적 형태를 포함하고 있으며, 이를 통해 저희는..."}, {"start": 2160.018, "end": 2164.07, "text": "지금부터 보여드릴 놀라운 일들을 해낼 수 있었습니다. 동종 최초의 시도이며,"}, {"start": 2164.121, "end": 2169.769, "text": "수많은 분의 도움이 있었습니다. 물론 CMR 서지컬(CMR Surgical)과"}, {"start": 2169.82, "end": 2175.971, "text": "문 서지컬(Moon Surgical), 존스 홉킨스 대학교를 비롯한 많은 분께 깊은 감사를 드립니다."}, {"start": 2176.021, "end": 2183.468, "text": "저희가 전 세계를 하나로 모으고 이런 강력한 데이터 세트를 구축하는..."}, {"start": 2183.518, "end": 2188.869, "text": "통합자 역할을 수행하며 그 잠재력을 확인하게 되어 매우 기쁩니다. 데이터가 확보되면,"}, {"start": 2188.92, "end": 2191.068, "text": "그게 바로 첫 번째 과제를 해결한 셈입니다."}, {"start": 2191.119, "end": 2194.219, "text": "정말 놀라운 데이터 세트죠."}, {"start": 2194.219, "end": 2198.269, "text": "그다음으로 해야 할 일은 바로 '두뇌'를 훈련시키는 것입니다."}, {"start": 2198.32, "end": 2202.971, "text": "그래서 저희는 로봇 두뇌 모델을 '그루트 에이치(GR00T-H)'라고 부릅니다."}, {"start": 2203.021, "end": 2205.289, "text": "시각적으로 기억하기 쉽게 붙인 이름이죠."}, {"start": 2205.34, "end": 2207.289, "text": "저희의 모든 제품 이름들과 함께 말이죠."}, {"start": 2207.34, "end": 2212.387, "text": "그래서 GR00T-H는 최초의 일반화 가능한 시각 언어..."}, {"start": 2212.438, "end": 2217.59, "text": "행동 모델이자 수술 로봇을 위한 시각 언어 행동 모델입니다."}, {"start": 2217.641, "end": 2220.489, "text": "작동 원리는 이미지를 입력값으로 넣고,"}, {"start": 2220.539, "end": 2223.239, "text": "언어 프롬프트를 주면,"}, {"start": 2223.239, "end": 2226.889, "text": "기본적으로 그에 맞는 행동을 출력하는 식이죠."}, {"start": 2226.94, "end": 2230.289, "text": "이것은 해당 분야에서 최초로 선보이는 놀라운 모델로,"}, {"start": 2230.34, "end": 2233.689, "text": "NVIDIA의 리더보드급 모델인 GR00T을 바탕으로"}, {"start": 2233.739, "end": 2237.088, "text": "비디오 데이터를 활용해 사후 학습을 거쳐서,"}, {"start": 2237.139, "end": 2238.49, "text": "수술 로봇용으로 만들었습니다."}, {"start": 2238.541, "end": 2240.989, "text": "이름 뒤에 붙은 '-H'는 헬스케어(Healthcare)를 뜻합니다."}, {"start": 2241.039, "end": 2243.588, "text": "다시 한번 강조하지만, 이 모든 기술은 여러분이 활용하시도록"}, {"start": 2243.639, "end": 2245.389, "text": "완전히 개방되어 있습니다."}, {"start": 2245.44, "end": 2252.49, "text": "다음으로, 저희가 확보한 데이터는 750시간 분량입니다. 세상에 존재하던 기존의"}, {"start": 2252.541, "end": 2255.289, "text": "2~3시간 정도의 데이터보다는 훨씬 많으니 꽤 방대하게 들리겠지만,"}, {"start": 2255.34, "end": 2260.389, "text": "제가 앞서 설명해 드린 16만 개의 각기 다른 병원과 수술실이라는"}, {"start": 2260.44, "end": 2262.088, "text": "복잡한 상황을 감당하기엔 여전히 부족합니다."}, {"start": 2262.139, "end": 2269.489, "text": "그래서 저희는 'Cosmos-H'라는 방대한 기술 제품군을 개발했습니다. NVIDIA의 Cosmos는"}, {"start": 2269.539, "end": 2271.088, "text": "저희의 월드 파운데이션 모델입니다."}, {"start": 2271.139, "end": 2274.25, "text": "다른 모델들이 맥락을 파악할 수 있도록 도와주는 역할을 하죠."}, {"start": 2274.3, "end": 2277.048, "text": "그래서 이것들은 세계적인 파운데이션 모델입니다."}, {"start": 2277.099, "end": 2280.75, "text": "수술 데이터 생성, 특히 수술 분야를 위한 것이죠."}, {"start": 2280.8, "end": 2284.048, "text": "아시다시피 해부학적 구조의 변형에 관한"}, {"start": 2284.099, "end": 2288.048, "text": "코드를 작성하는 것은 수십 년간의 난제였습니다."}, {"start": 2288.099, "end": 2290.648, "text": "그리고 우리는 여기서 그 장벽을 허물고자 합니다."}, {"start": 2290.699, "end": 2295.449, "text": "첫 번째는 '코스모스-H 수술 트랜스퍼'입니다."}, {"start": 2295.5, "end": 2296.451, "text": "그게 무슨 뜻일까요?"}, {"start": 2296.501, "end": 2299.048, "text": "본질적으로 하나의 기술을 습득해"}, {"start": 2299.099, "end": 2300.548, "text": "그것을 연습한다는 뜻입니다."}, {"start": 2300.599, "end": 2302.648, "text": "아주 다양한 환경에서 말이죠."}, {"start": 2302.699, "end": 2306.148, "text": "'하나의 기술, 여러 환경'. 이것이 하나의 데이터 세트입니다."}, {"start": 2306.199, "end": 2308.849, "text": "또 다른 데이터 세트는 어떤 주체가 취할"}, {"start": 2308.9, "end": 2310.849, "text": "다음 동작을 예측하고 싶을 때 사용합니다."}, {"start": 2310.9, "end": 2313.199, "text": "단일 환경 내에서"}, {"start": 2313.199, "end": 2315.148, "text": "여러 기술을 연습하도록 하는 것이죠."}, {"start": 2315.199, "end": 2317.451, "text": "그런 다음 이 데이터 세트들을 가져와서"}, {"start": 2317.501, "end": 2320.25, "text": "여러분의 'Groot-H' 브레인 모델을 강화할 수 있습니다."}, {"start": 2320.3, "end": 2321.849, "text": "이제는 수많은 다양한 시나리오로부터"}, {"start": 2321.9, "end": 2323.048, "text": "학습할 수 있기 때문입니다."}, {"start": 2323.099, "end": 2324.648, "text": "이전에는 본 적 없는 것들이죠."}, {"start": 2324.699, "end": 2326.25, "text": "예외적인 사례들도 도입하고"}, {"start": 2326.3, "end": 2327.947, "text": "수술실의 연기 같은 변수도 넣고 있죠."}, {"start": 2327.998, "end": 2330.548, "text": "실제 수술 중에 일어나는 모든 상황을 구현해서"}, {"start": 2330.599, "end": 2333.548, "text": "인공지능 모델이 계속해서 발전할 수 있게 하는 겁니다."}, {"start": 2333.599, "end": 2335.548, "text": "더 많은 기술을 학습시키는 과정이죠."}, {"start": 2335.599, "end": 2338.548, "text": "그리고 여기, 또 하나의 놀라운 모델이 있습니다."}, {"start": 2338.599, "end": 2342.548, "text": "세계 최초의 '수술 시뮬레이터' 모델이죠."}, {"start": 2342.599, "end": 2346.548, "text": "이제 가상 환경(in silico)에서 수많은 기술과"}, {"start": 2346.599, "end": 2351.548, "text": "다양한 환경을 토대로 로봇의 제어 정책을 정밀하게 평가할 수 있습니다."}, {"start": 2351.599, "end": 2355.548, "text": "실제 현장에 도입하기 전에 가상 세계에서 모든 검증을 마치는 거죠."}, {"start": 2355.599, "end": 2359.548, "text": "자, 이 모든 요소를 하나로 합치면 어떤 모습일까요?"}, {"start": 2359.599, "end": 2366.05, "text": "의료 로봇 분야를 위한 세계 최초이자 유일한 '물리적 AI 엔드 투 엔드 플랫폼'이 탄생합니다."}, {"start": 2366.101, "end": 2368.449, "text": "특정 의료 도메인에 특화된 로봇 기술이죠."}, {"start": 2368.5, "end": 2371.247, "text": "자율주행 자동차 분야의 놀라운 기술적 돌파구와"}, {"start": 2371.297, "end": 2376.15, "text": "범용 로봇 공학의 혁신을 가져와 의료 분야에 최적화하고 있습니다."}, {"start": 2376.201, "end": 2382.449, "text": "여러분이 바로 활용할 수 있게 모든 레시피와 데이터, 기초 모델을 제공해서"}, {"start": 2382.5, "end": 2386.75, "text": "의료 로봇 공학의 지평을 진정으로 넓혀가고자 합니다."}, {"start": 2386.8, "end": 2391.648, "text": "제가 늘 말씀드리듯, 의료 로봇은 앞으로 정말 다양한 모습으로 진화할 겁니다."}, {"start": 2391.699, "end": 2393.048, "text": "그래서 저희가 이 플랫폼을 구축한 것이고,"}, {"start": 2393.099, "end": 2396.329, "text": "깃허브와 허깅페이스에서 이 모든 결과물을 확인하실 수 있습니다."}, {"start": 2396.38, "end": 2398.628, "text": "모든 레시피를 공개하고 있습니다."}, {"start": 2398.679, "end": 2402.528, "text": "목요일에 개발자 데이가 있는데 많은 분이 참석하실 겁니다."}, {"start": 2402.579, "end": 2408.23, "text": "그래서 앞으로도 계속 확장을 거듭하며 여러분께 필요한 것을 제공할 수 있기를 바랍니다."}, {"start": 2408.28, "end": 2413.528, "text": "말씀드렸듯이, 의료 로봇 공학이 아우르는 로봇 기술의 범위는..."}, {"start": 2413.579, "end": 2420.128, "text": "병원 자체가 로봇이 되고 병실이 로봇이 되기도 하죠. 수술 로봇, 영상 진단 로봇도 있고,"}, {"start": 2420.179, "end": 2426.431, "text": "간호 로봇, 간병 로봇 등 온갖 종류의 로봇을 보게 될 것입니다."}, {"start": 2426.481, "end": 2432.579, "text": "이를 통해 첫째로, 의료 전문가들이 전문 지식이"}, {"start": 2432.579, "end": 2437.23, "text": "크게 필요치 않은 일에서 벗어나 본연의 업무에 집중할 수 있게 할 것이며,"}, {"start": 2437.28, "end": 2441.53, "text": "환자의 경험을 아주 실질적인 방식으로 변화시킬 것입니다."}, {"start": 2441.581, "end": 2445.927, "text": "따라서 우리는 AI를 통해 의료 서비스의 규모를 확장하고 있습니다."}, {"start": 2445.978, "end": 2448.931, "text": "우리 모두는 의료 접근성을 높이길 원합니다."}, {"start": 2448.981, "end": 2451.03, "text": "우리 모두는 의료 서비스를 개선하길 원합니다."}, {"start": 2451.081, "end": 2456.329, "text": "우리 모두는 필요한 때에 필요한 정보로 무장하기를 원하죠."}, {"start": 2456.38, "end": 2460.18, "text": "그리고 지금이 바로 그 적기입니다."}];
let player;
function onYouTubeIframeAPIReady(){
    player=new YT.Player('player',{
        videoId:videoId,
        playerVars:{autoplay:1,controls:1,rel:0,modestbranding:1,fs:0,disablekb:1,cc_load_policy:3},
        events:{
            'onReady': function(e){ 
                // [V160.4] 유튜브 기본 자막이 같이 켜져서 두 개로 겹쳐 보이는 현상 방지 🐾
                try { e.target.unloadModule("captions"); } catch(err) {} 
            },
            'onStateChange':onPlayerStateChange
        }
    });
}

// [V160.1] AI냥: 유튜브 고유 단축키 무력화 후, 'f' 키 등 사용자 편의 조작을 가로채서 자체 전체화면 실행! 🐱✨
window.addEventListener('keydown', function(e) {
    if (!player || !player.getPlayerState || typeof player.getDuration !== 'function') return;

    // Ctrl + ArrowLeft: Previous Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowLeft') {
        const t = player.getCurrentTime();
        let target = Math.max(0, t - 5);
        for(let i = subs.length - 1; i >= 0; i--) {
            if(subs[i].start < t - 1.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    // Ctrl + ArrowRight: Next Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowRight') {
        const t = player.getCurrentTime();
        let target = t + 5;
        for(let i = 0; i < subs.length; i++) {
            if(subs[i].start > t + 0.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    if (e.key.toLowerCase() === 'f') {
        toggleFullScreen();
        e.preventDefault();
    } else if (e.key === ' ' || e.key.toLowerCase() === 'k') {
        if (player.getPlayerState() === 1) player.pauseVideo();
        else player.playVideo();
        e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
        player.seekTo(player.getCurrentTime() - 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowRight') {
        player.seekTo(player.getCurrentTime() + 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowUp') {
        player.setVolume(player.getVolume() + 5);
        e.preventDefault();
    } else if (e.key === 'ArrowDown') {
        player.setVolume(player.getVolume() - 5);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'm') {
        player.isMuted() ? player.unMute() : player.mute();
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'j') {
        player.seekTo(player.getCurrentTime() - 10, true);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'l') {
        player.seekTo(player.getCurrentTime() + 10, true);
        e.preventDefault();
    } else if (e.key >= '0' && e.key <= '9') {
        const fraction = parseInt(e.key) / 10;
        player.seekTo(player.getDuration() * fraction, true);
        e.preventDefault();
    }
});

// iframe 클릭 시 빼앗긴 포커스를 0.1초 뒤에 훔쳐와서 'f' 등 단축키가 계속 먹히도록 유지! 🕵️‍♂️✨
window.addEventListener('blur', function() {
    setTimeout(() => {
        if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
            window.focus();
        }
    }, 100);
});
let syncInterval;
let activityTimeout;
function resetActivity() {
    const fsBtn = document.getElementById('fs-btn');
    const subsEl = document.getElementById('subtitles');
    if(fsBtn) fsBtn.classList.remove('fade-out');
    if(subsEl) subsEl.classList.remove('ui-hidden');
    clearTimeout(activityTimeout);
    if (player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING) {
        activityTimeout = setTimeout(() => {
            if(fsBtn) fsBtn.classList.add('fade-out');
            if(subsEl) subsEl.classList.add('ui-hidden');
        }, 3000);
    }
}
document.addEventListener('mousemove', resetActivity);
document.addEventListener('touchstart', resetActivity, {passive: true});
document.addEventListener('keydown', resetActivity);
window.addEventListener('blur', resetActivity);
window.addEventListener('focus', resetActivity);

function onPlayerStateChange(event){
    resetActivity();
    if(event.data==YT.PlayerState.PLAYING){
        if(!syncInterval) syncInterval=setInterval(updateSubs,100);
    }else{
        clearInterval(syncInterval); syncInterval=null;
    }
}
function updateSubs(){
    const t=player.getCurrentTime();
    let currentHtml="";
    let activeSubs = [];
    for(let i=0;i<subs.length;i++){
        if(t>=subs[i].start && t<=subs[i].end){
            activeSubs.push(subs[i]);
        }
    }
    if(activeSubs.length > 0){
        // [V160.5] AI 번역 생성 시 자막 시간이 미세하게 겹쳐(Overlap) 동일한 내용이 두 줄로 출력되는 현상 방지! 
        // 겹치는 자막 중 가장 마지막 매칭 항목 하나만 렌더링 🐾
        let bestSub = activeSubs[activeSubs.length - 1];
        currentHtml = `<div class="sub-line">${bestSub.text}</div><br>`;
    }
    if(document.getElementById('subtitles').innerHTML !== currentHtml){
        document.getElementById('subtitles').innerHTML=currentHtml;
    }
}

let isDragging=false, startY, currentBottom, subEl=document.getElementById('subtitles');
document.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchstart', dragStart, {passive:false});
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('touchend', dragEnd);

function dragStart(e) {
    if(!e.target.classList.contains('sub-line')) return;
    isDragging = true;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    startY = clientY;
    let style = window.getComputedStyle(subEl);
    currentBottom = parseFloat(style.bottom) || 0;
    subEl.classList.add('dragging');
    e.preventDefault();
}
function dragMove(e) {
    if(!isDragging) return;
    // [FIX] iframe 등에 의해 mouseup 이벤트를 놓쳤지만 마우스 버튼은 떼어진 경우 강제 드래그 종료! 🛡️✨
    if(e.type.includes('mouse') && e.buttons === 0) {
        dragEnd(e);
        return;
    }
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    let dy = clientY - startY;
    subEl.style.bottom = (currentBottom - dy) + 'px';
    if(e.cancelable) e.preventDefault();
}
function dragEnd(e) {
    isDragging = false;
    subEl.classList.remove('dragging');
}

// [Wheel / Pinch to Zoom for Font Size]
let currentFontSize = 4.5;
let initialDist = 0;
let initialFontSize = 4.5;

document.addEventListener('wheel', (e) => {
    if(e.target.closest('#subtitles') || e.target.classList.contains('sub-line')) {
        e.preventDefault();
        currentFontSize += e.deltaY < 0 ? 0.2 : -0.2;
        currentFontSize = Math.max(1, Math.min(20, currentFontSize));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
    }
}, {passive: false});

document.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialFontSize = currentFontSize;
        e.preventDefault();
    }
}, {passive: false});

document.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        let scale = currentDist / initialDist;
        currentFontSize = Math.max(1, Math.min(20, initialFontSize * scale));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
        e.preventDefault();
    }
}, {passive: false});
