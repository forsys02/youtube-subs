const videoId="DsewHeVbL-0";
const subs=[{"start": 0.0, "end": 11.099, "text": "데미스 허사비스와의 대담을 위해 이 자리에 모여주신 여러분을 뵙게 되어 정말 기쁩니다."}, {"start": 11.099, "end": 18.15, "text": "특히 오늘 존 레빈 총장님께서 이 '파이어사이드 챗'을 이끌어 주시게 되어 매우 영광입니다."}, {"start": 18.201, "end": 26.15, "text": "스탠퍼드 대학교를 특별하게 만드는 요소 중 하나는, 가장 중요한 아이디어 중 일부가"}, {"start": 26.201, "end": 32.151, "text": "단일 단과대학이나 학문 분야가 아닌, 여러 학교와 부서가 만나는 지점에서 탄생한다는 점입니다."}, {"start": 32.201, "end": 45.651, "text": "인공지능의 발전이 사회의 거의 모든 영역을 재편하기 시작한 지금, 이러한 대학 간 협업의 정신은 그 어느 때보다 중요합니다."}, {"start": 45.701, "end": 50.249, "text": "그리고 의학 분야만큼 그 영향력이 큰 곳은 없을 것입니다."}, {"start": 50.298, "end": 56.249, "text": "저는 경영대학원(GSB)과 스탠퍼드 의과대학의 긴밀한 파트너십을 통해 이를 몸소 느끼고 있습니다."}, {"start": 56.298, "end": 74.249, "text": "이들은 사회과학자, 과학자, 임상의, 엔지니어, 혁신가들을 한데 모아 예방부터 생존에 이르는 환자의 여정을 혁신함으로써, 암의 혁신과 치료를 재구상하려는 놀라운 노력을 기울이고 있습니다."}, {"start": 74.299, "end": 81.249, "text": "그 비전은 매우 야심 차며, 위대한 대학의 모든 역량이 함께 발휘되어야 실현 가능할 것입니다."}, {"start": 81.299, "end": 88.451, "text": "스탠퍼드의 강점은 단순히 개별 분야의 탁월함에 그치지 않고, 그 분야들을 연결하는 능력에 있습니다."}, {"start": 88.501, "end": 100.451, "text": "우리는 AI 연구자들과 의사들을, 조직의 리더들과 과학자들을, 그리고 기업가들과 인류의 웰빙에 깊이 헌신하는 사람들을 연결하고 있습니다."}, {"start": 100.501, "end": 107.35, "text": "이것이 바로 오늘 이 대담이 그토록 중요하게 느껴지는 이유 중 하나입니다."}, {"start": 107.4, "end": 113.15, "text": "데미스 허사비스는 인공지능 연구자이자 기업가, 그리고 노벨상 수상자로서"}, {"start": 113.2, "end": 116.95, "text": "바로 이러한 교차점에서 활약하고 있는 인물입니다."}, {"start": 117.0, "end": 124.549, "text": "그는 세계 최고의 AI 연구 기업 중 하나인 구글 딥마인드의 공동 창립자이자 CEO입니다."}, {"start": 124.599, "end": 128.048, "text": "딥마인드는 2010년에 설립되었으며,"}, {"start": 128.098, "end": 131.447, "text": "2014년에 구글에 인수되었습니다."}, {"start": 131.497, "end": 134.949, "text": "현재 이 기업은 구글 AI 연구의 중심이 되었으며"}, {"start": 135.0, "end": 138.149, "text": "이 분야를 정의하는 몇몇 획기적인 성과들을"}, {"start": 138.199, "end": 140.098, "text": "거두었습니다."}, {"start": 140.06, "end": 142.608, "text": "이러한 혁신 중에는 알파고가 있습니다."}, {"start": 142.65800000000002, "end": 145.209, "text": "세계 챔피언을 꺾은 최초의"}, {"start": 145.25900000000001, "end": 148.00900000000001, "text": "바둑 프로그램이죠. 그리고 알파폴드도 있습니다."}, {"start": 148.06, "end": 150.707, "text": "50년 동안 난제로 남아있던"}, {"start": 150.758, "end": 152.81, "text": "단백질 구조 예측 문제를 해결했죠."}, {"start": 152.86, "end": 157.81, "text": "단백질의 3차원 입체 구조를 정확하게 예측함으로써 말입니다."}, {"start": 157.86, "end": 163.90800000000002, "text": "이는 질병의 이해와 신약 개발에 엄청난 영향을 미친 혁신이었습니다."}, {"start": 163.959, "end": 172.90800000000002, "text": "이 업적으로 데미스는 존 점퍼, 데이비드 베이커와 함께 2024년 노벨 화학상을 받았습니다."}, {"start": 172.959, "end": 177.507, "text": "그는 또한 왕립학회와 왕립공학한림원의 회원이기도 합니다."}, {"start": 177.55700000000002, "end": 180.808, "text": "그리고 2024년, 인공지능 분야에 기여한 공로로"}, {"start": 180.859, "end": 183.208, "text": "기사 작위를 수여받았습니다."}, {"start": 183.258, "end": 186.108, "text": "그는 또한 '타임 100' 리스트에 선정되어"}, {"start": 186.158, "end": 189.909, "text": "세계에서 가장 영향력 있는 인물로 여러 차례 뽑혔습니다."}, {"start": 189.96, "end": 194.209, "text": "2017년과 2025년을 포함해서 말이죠."}, {"start": 194.25900000000001, "end": 198.00900000000001, "text": "하지만 지금 스탠퍼드에서의 이 순간이 특히 흥미로운 이유는"}, {"start": 198.06, "end": 200.507, "text": "이곳에서의 AI에 대한 논의가"}, {"start": 200.557, "end": 203.411, "text": "단지 기술적 능력에만 국한되지 않았기 때문입니다."}, {"start": 203.461, "end": 206.709, "text": "그것은 인류의 번영에 관한 것이기도 했습니다."}, {"start": 206.75900000000001, "end": 208.81, "text": "수년 전, 페이페이 리 교수와"}, {"start": 208.86, "end": 213.00900000000001, "text": "제니퍼 아커 교수는 스탠퍼드에서 강의를 시작했습니다."}, {"start": 213.06, "end": 219.00900000000001, "text": "인류의 번영을 위한 AI, 그리고 이를 둘러싼 심오한 질문들에 대해 말씀드리겠습니다."}, {"start": 219.06, "end": 221.31, "text": "인간다움이란 무엇인가?"}, {"start": 221.36, "end": 223.608, "text": "번영이란 어떤 모습인가?"}, {"start": 223.65800000000002, "end": 229.308, "text": "그리고 기술은 언제 우리의 목표를 돕고, 또 언제 방해하는가?"}, {"start": 229.359, "end": 233.51, "text": "이 연구를 통해 얻은 한 가지 깨달음이 제 가슴속에 깊이 남았습니다."}, {"start": 233.561, "end": 236.207, "text": "그것은 바로 어떤 형태의 마찰은"}, {"start": 236.258, "end": 238.409, "text": "사실 삶을 지탱하는 필수적인 하중이라는 점입니다."}, {"start": 238.46, "end": 240.608, "text": "적절한 단어를 찾으려 애쓰고,"}, {"start": 240.658, "end": 243.608, "text": "어려운 대화에서 오는 불편함을 견디며,"}, {"start": 243.658, "end": 246.209, "text": "새로운 것을 배우는 고단한 과정은"}, {"start": 246.25900000000001, "end": 249.209, "text": "제거해야 할 비효율이 아닙니다."}, {"start": 249.25900000000001, "end": 252.06, "text": "오히려 그것은"}, {"start": 252.06, "end": 255.25900000000001, "text": "성장과 주체성, 회복 탄력성,"}, {"start": 255.359, "end": 257.11, "text": "그리고 의미가 피어나는 소중한 경험입니다."}, {"start": 257.161, "end": 260.908, "text": "이것이 오늘 우리의 논의가 그토록 중요한 이유이기도 합니다."}, {"start": 260.959, "end": 264.608, "text": "스탠퍼드에서 AI의 발전은 결코 추상적인 개념이 아닙니다."}, {"start": 264.658, "end": 270.858, "text": "이미 우리가 발견과 진단, 리더십, 학습, 그리고"}, {"start": 270.86, "end": 273.008, "text": "인간의 잠재력 그 자체를 바라보는 방식을 바꾸고 있죠."}, {"start": 273.058, "end": 278.81, "text": "또한 AI의 발전은 판단력에 관한 더 큰 질문들을 마주하게 하며,"}, {"start": 278.86, "end": 285.829, "text": "윤리와 제도, 그리고 기술을 통해 궁극적으로 어떤 삶을 만들어갈지 고민하게 합니다."}, {"start": 285.879, "end": 291.228, "text": "여: 와주셔서 감사합니다. 이제 존 레빈 총장님과"}, {"start": 291.278, "end": 293.23, "text": "여: 데미스 하사비스 님을 무대로 모시겠습니다. 함께 환영해 주세요."}, {"start": 293.281, "end": 298.68, "text": "[박수 소리]"}, {"start": 299.079, "end": 306.43, "text": "남: 데미스, 스탠퍼드에 오신 걸 환영합니다. 와주셔서 정말 고마워요."}, {"start": 306.48, "end": 313.68, "text": "데미스: 기쁜 마음으로 왔습니다. 와주신 여러분 모두 감사합니다."}, {"start": 315.177, "end": 317.127, "text": "남: 이렇게 응해 주셔서 정말 감사합니다."}, {"start": 317.177, "end": 320.127, "text": "남: 우선 제가 질문을 몇 가지 드리고,"}, {"start": 320.177, "end": 327.127, "text": "남: 학생분들의 질문도 받아보겠습니다. 데미스 님의 생각을 들을 수 있어 기대되네요."}, {"start": 327.177, "end": 333.829, "text": "남: 그럼 시작해 볼까요. 최근 영화나 책 등에서 데미스 님의 이야기가 많이 다뤄졌었죠."}, {"start": 333.879, "end": 341.93, "text": "남: 많은 분이 데미스 님의 행보를 이미 잘 아시겠지만, 정말이지 놀라운 수준입니다."}, {"start": 341.98, "end": 351.43, "text": "남: 체스 신동, 게임 개발자, 과학자, 기술 기업가이자 리더, 그리고 노벨상 수상자까지 말입니다."}, {"start": 351.48, "end": 358.728, "text": "남: 이게 아직 커리어의 전반부일 뿐이라니요. 만약 지금까지 해온 이 다양한 일들을"}, {"start": 358.778, "end": 361.028, "text": "남: 하나로 꿰뚫는 연결 고리를 찾는다면,"}, {"start": 361.079, "end": 364.0, "text": "남: 무엇이라고 할 수 있을까요?"}, {"start": 364.05, "end": 367.8, "text": "데미스: 음, 얼핏 보기에는 서로 전혀 관련 없어 보이는 분야들이지만,"}, {"start": 367.85, "end": 371.598, "text": "데미스: 사실 몇 가지 공통된 맥락이 있다고 생각합니다."}, {"start": 371.649, "end": 374.5, "text": "데미스: 무엇보다 저는 창의성과 기술이 만나는"}, {"start": 374.55, "end": 377.5, "text": "데미스: 접점에서 일하는 것을 항상 즐겨왔습니다."}, {"start": 377.55, "end": 379.5, "text": "데미스: 아주 넓은 의미에서 말이죠."}, {"start": 379.55, "end": 383.5, "text": "데미스: 실제 게임 산업, 그러니까 비디오 게임 산업은"}, {"start": 383.55, "end": 386.699, "text": "데미스: 90년대 당시 제 커리어의 아주 초기 단계였는데,"}, {"start": 386.75, "end": 394.228, "text": "데미스: 최첨단 기술을 활용하는 모든 산업군 중에서 가장 창의적인 공간 중 하나였습니다."}, {"start": 394.278, "end": 400.829, "text": "기술과 예술, 디자인을 접목해 완전히 새로운 형태의 엔터테인먼트 매체를 창조하려 했죠."}, {"start": 400.879, "end": 403.228, "text": "정말 환상적인 시간들이었습니다."}, {"start": 403.278, "end": 409.028, "text": "사실 제 커리어에서 가장 즐거웠던 순간 중 하나가 90년대 초반이었거든요."}, {"start": 409.079, "end": 415.329, "text": "제가 몰두했던 체스와 뇌과학 같은 것들... 그 모든 건 어릴 적부터 가진"}, {"start": 415.379, "end": 420.129, "text": "AI와 AGI(범용 인공지능) 연구가 세상에서 가장 중요하고 흥미로운 일이라는"}, {"start": 420.18, "end": 423.93, "text": "생각에서 비롯되었습니다. 평생을 바칠 가치가 있는 일이라고 믿었죠."}, {"start": 423.98, "end": 428.129, "text": "십 대 때는 SF 소설에 푹 빠져 살았던 것 같아요."}, {"start": 428.18, "end": 433.43, "text": "'괴델, 에셔, 바흐' 같은 책들이나 제가 존경하는 과학자들의"}, {"start": 433.48, "end": 436.228, "text": "전기를 읽으면서요. 앨런 튜링이나 리처드 파인만 같은 분들 말이죠."}, {"start": 436.278, "end": 441.228, "text": "그 모든 경험이 우리 주변의 세상을 깊이 있게 이해하고자 하는"}, {"start": 441.278, "end": 447.129, "text": "영감을 주었습니다. AI 개발은 과학을 위한 궁극적인 도구를 만들겠다는"}, {"start": 447.18, "end": 453.329, "text": "제 사명의 실천이었습니다. 인생은 짧기에 저는 모든 경험을"}, {"start": 453.379, "end": 458.879, "text": "재활용하고 재구성해서, 지난 30년 넘게 지켜온"}, {"start": 458.879, "end": 465.379, "text": "북극성 같은 거대한 사명을 위해 쏟아부었습니다."}, {"start": 465.379, "end": 470.329, "text": "체스 훈련은 비즈니스를 구상하고 계획을 세우는 밑바탕이 되었고,"}, {"start": 470.379, "end": 475.829, "text": "거대한 야심을 실현 가능한 단계로 나누는 법도 가르쳐주었죠. 체스식 사고방식 덕분입니다."}, {"start": 475.879, "end": 481.93, "text": "게임을 활용하고 직접 개발하면서 대규모 엔지니어링 프로젝트와"}, {"start": 481.98, "end": 488.329, "text": "기업 운영, 스타트업을 배웠고, 그런 창의성을 공학과 융합했습니다."}, {"start": 488.379, "end": 492.728, "text": "사실 지금의 AI 연구도 마찬가지예요. 일종의 공학 과학이니까요."}, {"start": 492.778, "end": 499.329, "text": "창의적인 작업과 과학적 탐구를 최첨단 공학 기술과 결합하는 것이죠. 이 모든 게 하나로 어우러진 결과입니다. 그리고 마지막으로..."}, {"start": 499.379, "end": 503.129, "text": "남1: 다들 아시겠지만 딥마인드 초기에는 게임을 시험장으로 삼았습니다"}, {"start": 503.18, "end": 505.427, "text": "알고리즘 아이디어를 테스트하기 위한 완벽한 공간이었죠"}, {"start": 505.478, "end": 510.73, "text": "남1: 가장 유명한 사례는 알파고일 텐데, 제 생각에 알파고는..."}, {"start": 510.781, "end": 515.93, "text": "남1: 벌써 10주년이 되었더군요. 지금 돌아보면 현대 AI 시대의 서막이었던 것 같습니다"}, {"start": 515.98, "end": 524.58, "text": "남2: 2010년경 본격적으로 AI 분야에 뛰어들며 딥마인드를 창업하셨을 때"}, {"start": 524.577, "end": 529.929, "text": "남2: 아주 야심 찬 비전이 있으셨죠. 먼저 지능의 문제를 해결하고"}, {"start": 529.979, "end": 532.629, "text": "남2: 그다음에 나머지 모든 문제를 해결하겠다는 것이었습니다"}, {"start": 532.678, "end": 536.58, "text": "[웃음]"}, {"start": 534.58, "end": 536.531, "text": "남2: 어떻게 되어가고 있나요?"}, {"start": 536.581, "end": 540.08, "text": "[웃음]"}, {"start": 538.177, "end": 540.128, "text": "남1: 글쎄요, 시간이 좀 흐르긴 했네요"}, {"start": 540.177, "end": 542.33, "text": "남2: 계획대로 진행된 부분은 무엇이고"}, {"start": 542.379, "end": 544.93, "text": "남2: 계획과 다르게 흘러간 부분은 무엇인가요?"}, {"start": 544.98, "end": 552.229, "text": "남1: 음, 전체적인 큰 흐름은 믿기지 않을 정도로 아주 잘 진행되었습니다"}, {"start": 552.278, "end": 560.229, "text": "남1: 2010년에 딥마인드를 시작했을 때를 상상해 보세요. 당시 영국에는 벤처 캐피털이 거의 없었는데"}, {"start": 560.278, "end": 564.43, "text": "남1: 그런 곳들에 이런 사업 계획을 들고 갔었죠. 말 그대로..."}, {"start": 564.48, "end": 568.229, "text": "남1: 1단계는 지능 해결, 2단계는 그걸로 모든 문제 해결이었습니다. 다들 황당해했죠"}, {"start": 568.278, "end": 576.531, "text": "남1: 하지만 우린 진심이었어요. 실제로 지금 그때의 미션 성명서 내용대로 정확히 가고 있습니다"}, {"start": 576.581, "end": 578.729, "text": "남1: 왜냐하면..."}, {"start": 578.778, "end": 582.03, "text": "남1: '지능을 해결한다'는 건 범용 인공지능(AGI)을 구축한다는 뜻이었거든요"}, {"start": 582.08, "end": 585.131, "text": "남1: 이상적으로는 지능의 본질을 이해하는 과정이기도 합니다"}, {"start": 585.181, "end": 588.229, "text": "남1: AGI를 구축하는 과정에서, 그리고 어쩌면 AGI를 활용해서 말이죠"}, {"start": 588.278, "end": 593.15, "text": "남1: 우리 인간의 뇌와 마음을 더 깊이 이해하는 데 도움을 받으려는 겁니다"}, {"start": 593.2, "end": 594.95, "text": "의식의 본질이라든지,"}, {"start": 595.0, "end": 597.05, "text": "창의성이나 꿈 같은 것들 말이죠. 이런 것들은 모두"}, {"start": 597.1, "end": 598.55, "text": "인간 정신의 심오한 미스터리입니다."}, {"start": 598.6, "end": 600.148, "text": "제가 신경과학을 공부한 이유 중 하나는"}, {"start": 600.197, "end": 603.298, "text": "뇌의 메커니즘을 이해함으로써"}, {"start": 603.201, "end": 606.349, "text": "알고리즘에 대한 영감을 얻기 위해서였습니다."}, {"start": 606.399, "end": 609.549, "text": "그래서 첫 번째 단계는 AGI를 구축하는 것이었고,"}, {"start": 609.599, "end": 612.749, "text": "그다음 단계에서 벌어질 일들을 항상 염두에 뒀죠."}, {"start": 612.798, "end": 615.849, "text": "당연하게도 이건 범용 기술이니까요."}, {"start": 615.899, "end": 618.65, "text": "어쩌면 '궁극의' 범용 기술일지도 모릅니다."}, {"start": 618.7, "end": 620.849, "text": "그리고 이것이 올바르게 설계되어"}, {"start": 620.899, "end": 623.751, "text": "매우 광범위한 학습 시스템이 된다면,"}, {"start": 623.801, "end": 626.45, "text": "과연 적용 범위의 한계가 어디까지일까요?"}, {"start": 626.5, "end": 629.05, "text": "사실상 거의 모든 분야에 적용이 가능할 겁니다."}, {"start": 629.1, "end": 631.249, "text": "그게 바로 제가 꿈꾸던 것이었죠."}, {"start": 631.298, "end": 633.751, "text": "그리고 지금 그 결실이 나타나고 있다고 생각합니다."}, {"start": 633.801, "end": 638.151, "text": "특히 두 번째 단계인 과학과 의학의 발전이 제 핵심 목표였습니다."}, {"start": 638.201, "end": 641.449, "text": "모든 문제를 해결하기 위해 AI를 사용한다는 건 그런 의미였어요."}, {"start": 641.499, "end": 645.05, "text": "과학의 거대한 난제들, 그 전부를 말입니다."}, {"start": 645.1, "end": 648.27, "text": "전 그 모든 것에 매료되었고, 직접 해결하고 싶었습니다."}, {"start": 648.32, "end": 649.869, "text": "시간의 본질, 그리고 현실의 본질."}, {"start": 649.918, "end": 651.67, "text": "아마 그게 가장 근본적인 질문일 겁니다."}, {"start": 651.72, "end": 655.67, "text": "저는 학창 시절에 물리학을 정말 좋아했어요."}, {"start": 655.72, "end": 656.969, "text": "제가 가장 좋아하던 과목이었죠."}, {"start": 657.019, "end": 658.869, "text": "거대한 질문들에 관심을 갖게 되면"}, {"start": 658.918, "end": 660.869, "text": "결국 물리학을 공부하게 되는 것 같아요."}, {"start": 660.918, "end": 666.67, "text": "하지만 세상엔 흥미롭고 거대한 질문이 너무나 많다는 걸 깨달았습니다."}, {"start": 666.72, "end": 671.469, "text": "한 사람의 일생 동안 그 모든 걸 어떻게 다 다루겠어요?"}, {"start": 671.519, "end": 674.069, "text": "그래서 제 관점에선 새로운 도구를 만드는 게 필요했습니다."}, {"start": 674.119, "end": 677.469, "text": "최고의 과학자와 전문가들을 도와서"}, {"start": 677.519, "end": 681.669, "text": "그들이 연구하는 분야에서 훨씬 더 빠른 진전을 이루고"}, {"start": 681.719, "end": 684.469, "text": "그들이 맞닥뜨린 거대하고 중요한 질문들을 해결할 수 있도록요."}, {"start": 684.519, "end": 690.12, "text": "물론 AI 그 자체도 정말 매혹적인 결과물입니다."}, {"start": 690.119, "end": 695.671, "text": "그 자체로 연구할 가치가 충분한 과학적 대상이자, 거의 새로운 분야라고 할 수 있죠."}, {"start": 695.721, "end": 701.418, "text": "그래서 제게는 인생을 바치기에"}, {"start": 701.418, "end": 706.069, "text": "가장 매력적이고 중요한 일입니다. 설령 잘 안 풀렸더라도 계속했을 거예요."}, {"start": 706.119, "end": 711.369, "text": "학계든 어디서든 이 일을 할 방법을 어떻게든 찾아냈을 겁니다."}, {"start": 711.418, "end": 716.869, "text": "제 평생을 바쳐 일하기로 계획했던 분야니까요. 예전에 했던 모든 일은"}, {"start": 716.918, "end": 721.869, "text": "딥마인드 같은 도전을 하기 위해 경험과 지식을 쌓는"}, {"start": 721.918, "end": 727.709, "text": "다양한 과정이었다고 생각합니다. 2010년 즈음 저희가 준비됐다고 느꼈을 때 시작할 수 있게 말이죠."}, {"start": 727.759, "end": 732.81, "text": "...빠른 발전이죠. 그리고 물론 '다른 모든 문제를 해결하는 데 사용한다'는 두 번째 목표는 이제..."}, {"start": 732.86, "end": 737.61, "text": "과학과 의학의 범주를 넘어 훨씬 광범위해졌습니다. 제가 개인적으로 이곳에서 집중해 온 분야이기도 하고,"}, {"start": 737.659, "end": 743.908, "text": "조직 전체를 운영하며 추구해 온 방향이기도 하죠. 하지만 분명 생산성을 비롯해"}, {"start": 743.957, "end": 748.908, "text": "과학과 의학 이외의 세상의 많은 것들에 있어서도 놀라운 도구가 될 것입니다."}, {"start": 748.957, "end": 757.91, "text": "인터뷰어: 딥마인드에서 다양한 모델들을 구축해 오시면서, 처음에는 게임으로 시작해 과학 분야로 넓혀 가셨는데요."}, {"start": 757.96, "end": 762.96, "text": "혹시 특별한 순간들이 있었나요?"}, {"start": 762.96, "end": 765.91, "text": "그러니까, 처음부터 강한 확신을 가지고 시작하셨겠지만요."}, {"start": 765.96, "end": 769.91, "text": "그래도 \"이게 진짜 통하겠구나\"라고 느끼게 된"}, {"start": 769.96, "end": 771.91, "text": "어떤 결정적인 시점들이 있었는지 궁금합니다."}, {"start": 771.96, "end": 775.2090000000001, "text": "알파고의 '37번째 수'라던가..."}, {"start": 775.259, "end": 778.2090000000001, "text": "데미스: 네, 사실 이게 안 될 것 같다고 생각했던 순간들도 꽤 많았습니다."}, {"start": 778.259, "end": 779.2090000000001, "text": "솔직히 말하면 그렇습니다."}, {"start": 779.259, "end": 783.549, "text": "그래서 유독 기억에 남는 몇몇 순간들이 있는데요."}, {"start": 783.599, "end": 787.15, "text": "저희가 게임으로 시작한 이유는 게임이 독립적인 체계를 갖추고 있기 때문입니다."}, {"start": 787.2, "end": 789.95, "text": "애초에 인간이 다른 인간에게"}, {"start": 790.0, "end": 794.15, "text": "도전 과제를 주거나 즐거움을 주기 위해 설계한 것이니까요."}, {"start": 794.2, "end": 795.35, "text": "게임은 흔히... 전 게임을 정말 좋아하는데요,"}, {"start": 795.399, "end": 800.35, "text": "실제 세상의 수많은 시나리오를 압축해 놓은 축소판과 같습니다."}, {"start": 800.399, "end": 805.251, "text": "바둑이나 포커, 체스를 생각해보세요. 전 늘 MBA나 경영 대학원 과정에"}, {"start": 805.301, "end": 810.629, "text": "필수 과목 중 하나로 게임 모듈이 포함되어야 한다고 생각하곤 했습니다."}, {"start": 810.678, "end": 815.98, "text": "'디플로머시' 같은 게임들을 연구해 보면"}, {"start": 815.98, "end": 816.379, "text": "실제 삶을 투영한 게임들의"}, {"start": 815.979, "end": 822.43, "text": "아주 흥미로운 측면들을 볼 수 있죠. 안전한 시나리오 속에서 여러 번 연습해 볼 수 있거든요"}, {"start": 822.48, "end": 827.33, "text": "게임이 정말 유용한 이유가 바로 그겁니다. 이건 학습 중인 AI 시스템에도"}, {"start": 827.379, "end": 834.631, "text": "그대로 적용되죠. 정돈된 환경에서 도전 과제를 수행하며 명확한 목적 함수를 가질 수 있으니까요"}, {"start": 834.681, "end": 839.03, "text": "이건 강화 학습 초기 단계에서도 매우 중요했습니다. 당시에는 거의 아무도"}, {"start": 839.08, "end": 843.729, "text": "규모가 큰 문제에 강화 학습을 적용하지 않았거든요. 그저"}, {"start": 843.778, "end": 848.53, "text": "학문적인 영역에 머물며 아주 작은 격자 세계 같은 단순한 문제에만 쓰였죠"}, {"start": 848.58, "end": 856.077, "text": "큰 규모로 확장될 수 있을지조차 불확실했습니다. 그래서 저희는 가장"}, {"start": 864.778, "end": 870.229, "text": "게임들이었습니다. 70년대 게임들인데, 그중에서도 가장 단순한 게임인"}, {"start": 870.278, "end": 876.93, "text": "'퐁(Pong)'으로 시작했습니다. 아시다시피 패들과 공, 두 개의 패들만 있는 게임이죠. 거기엔 내장된 AI"}, {"start": 876.98, "end": 883.629, "text": "시스템, 즉 상대방을 제어하는 내장 시스템이 있고 게임이 가진 모든 정보를 활용해요"}, {"start": 883.678, "end": 886.531, "text": "공의 위치 같은 정보를 바탕으로 패들을 움직이죠"}, {"start": 886.581, "end": 890.03, "text": "저희가 시도했던 건, 오로지 화면상의"}, {"start": 890.08, "end": 893.43, "text": "픽셀 데이터, 즉 가공되지 않은 데이터만으로"}, {"start": 893.48, "end": 896.43, "text": "시각적 입력값만 받고 다른 정보 없이 '퐁'을 플레이하는 것이었습니다"}, {"start": 896.48, "end": 900.329, "text": "프로그램 내부 정보에 접근할 수 있는"}, {"start": 900.379, "end": 903.031, "text": "어떤 특권적인 정보도 주지 않았죠. 공의 위치나 속도 같은"}, {"start": 903.081, "end": 905.03, "text": "프로그램은 당연히 알고 있는 그런 정보들 말이에요"}, {"start": 905.08, "end": 908.15, "text": "하지만 소위 DQN이라 불리는 시스템에는 그런 정보를 주지 않았습니다"}, {"start": 908.2, "end": 909.95, "text": "아타리 시스템에 대한 사전 정보는 하나도 없었죠."}, {"start": 910.0, "end": 912.55, "text": "그저 화면에 나타나는 2만 개의 픽셀 정보뿐이었어요."}, {"start": 912.6, "end": 917.251, "text": "2만 픽셀이라니, 지금 보면 참 보잘것없어 보이지만,"}, {"start": 917.301, "end": 921.151, "text": "2010년 당시에는 엄청난 양의 입력 데이터였습니다."}, {"start": 921.201, "end": 923.35, "text": "그렇게 복잡한 데이터를 다뤄본 전례도 없었고,"}, {"start": 923.399, "end": 926.05, "text": "처리해야 할 모든 프레임까지 합치면 훨씬 방대했죠."}, {"start": 926.1, "end": 929.349, "text": "한 6개월 정도였나, 아니 2개월쯤이었을까요?"}, {"start": 929.399, "end": 932.65, "text": "퐁(Pong) 게임에서 단 1점도 따지 못하던 시기가 있었어요."}, {"start": 932.7, "end": 933.151, "text": "그렇죠?"}, {"start": 933.201, "end": 935.65, "text": "배트를 그냥 이리저리 휘두르는 게 고작이었죠."}, {"start": 935.7, "end": 938.349, "text": "'세상에, 얘가 배트를 제대로 조종할 수는\""}, {"start": 938.399, "end": 939.15, "text": "있게 될까?' 싶을 정도였으니까요."}, {"start": 939.2, "end": 942.549, "text": "물론 AI는 게임에 대한 기본 개념조차 없었고요."}, {"start": 942.599, "end": 946.05, "text": "기본 내장된 AI한테 21 대 0으로 계속 완패하기만 했죠."}, {"start": 946.1, "end": 948.251, "text": "그래서 이걸 해결하기 위해 몇 가지 시도를"}, {"start": 948.301, "end": 949.45, "text": "해보기로 마음먹었습니다."}, {"start": 949.5, "end": 951.949, "text": "돈도 거의 없었고, 자금줄도 말라가고 있었어요."}, {"start": 951.999, "end": 957.2, "text": "당시 투자받은 수백만 달러라는 돈은..."}, {"start": 957.1, "end": 959.749, "text": "요즘 같으면 인턴 인건비로도 부족한 수준이지만요."}, {"start": 959.798, "end": 963.19, "text": "[웃음] 여러분 같은 학생들에게는 아주 좋은 소식이겠네요."}, {"start": 963.24, "end": 965.989, "text": "그게 우리 자금의 전부였어요"}, {"start": 966.038, "end": 970.139, "text": "월급도 한 푼 안 받고 버티고 있었죠"}, {"start": 970.239, "end": 974.189, "text": "돈은 점점 바닥나고 있었고 전 생각했어요"}, {"start": 974.239, "end": 977.189, "text": "'어쩌면 우리가 시대를 10년이나 너무 앞서간 걸까?'"}, {"start": 977.239, "end": 978.79, "text": "'아니면 20년은 앞선 걸지도 몰라'"}, {"start": 978.84, "end": 981.5889999999999, "text": "그러다 마법처럼 어느 지점에 도달하더니"}, {"start": 981.639, "end": 984.0889999999999, "text": "처음엔 운인가 싶었지만 계속해서 점수를 따더라고요"}, {"start": 984.139, "end": 985.79, "text": "그러더니 결국 게임에서 이기기 시작했죠"}, {"start": 985.84, "end": 988.5889999999999, "text": "그때 '이제 드디어 궤도에 올랐구나' 싶었습니다"}, {"start": 988.639, "end": 992.288, "text": "머신러닝 쪽 일을 하시는 분들은 아시겠지만"}, {"start": 992.338, "end": 996.689, "text": "일단 발판만 마련되면 보통은 힐 클라임 방식으로 나아갈 수 있습니다"}, {"start": 996.739, "end": 999.39, "text": "그게 제가 생각하는 AI의 역사이기도 하고요"}, {"start": 999.44, "end": 1003.489, "text": "일단 무언가 작동하기 시작하면 더 최적화할 방법은 있기 마련이죠"}, {"start": 1003.538, "end": 1005.39, "text": "아타리 게임에서도 그런 결과가 나왔습니다"}, {"start": 1005.44, "end": 1007.69, "text": "그게 저희의 첫 번째 큰 성과였죠"}, {"start": 1007.74, "end": 1012.891, "text": "저희의 첫 네이처 논문은 사실상 대규모로는 최초인"}, {"start": 1012.941, "end": 1014.69, "text": "심층 강화학습 모델에 관한 것이었습니다"}, {"start": 1014.74, "end": 1019.689, "text": "심층 학습을 결합해 도메인을 익히고 지각적 입력값과"}, {"start": 1019.739, "end": 1022.19, "text": "복잡한 데이터 속에서 패턴을 찾아낸 뒤"}, {"start": 1022.24, "end": 1026.83, "text": "그 위에 강화학습을 더해 의사결정을 내리고 행동하게 했죠"}, {"start": 1026.88, "end": 1027.83, "text": "...설계였죠."}, {"start": 1027.88, "end": 1032.83, "text": "그리고 물론 그 정점은 항상 우리의 목표였던 알파고였습니다."}, {"start": 1032.88, "end": 1034.83, "text": "이 프로젝트의 책임자였던 데이브 실버와 저는"}, {"start": 1034.88, "end": 1037.83, "text": "캠브리지 대학 시절부터 친구였어요."}, {"start": 1037.88, "end": 1042.83, "text": "학부 때부터 이에 대해 계속 이야기를 나누곤 했죠."}, {"start": 1042.88, "end": 1045.83, "text": "90년대 중반, 저희가 대학에 다닐 때 딥 블루와 카스파로프의 경기가 열렸거든요."}, {"start": 1045.88, "end": 1050.83, "text": "당연히 체스와 AI라는 두 가지 관점 모두에서 완전히 매료되었습니다."}, {"start": 1050.88, "end": 1054.83, "text": "하지만 전 딥 블루보다 카스파로프의 지능에 더 깊은 인상을 받았습니다."}, {"start": 1054.88, "end": 1058.83, "text": "왜냐하면 카스파로프는 그 놀라운 지능을 가진,"}, {"start": 1058.88, "end": 1060.88, "text": "역사상 가장 위대한"}, {"start": 1060.88, "end": 1062.83, "text": "체스 천재 중 한 명이니까요."}, {"start": 1062.88, "end": 1065.83, "text": "그는 옆에 있는 슈퍼컴퓨터라는 무차별 대입 방식의 기계에 맞서"}, {"start": 1065.88, "end": 1068.83, "text": "기본적으로 대등하게 경기를 펼칠 수 있었습니다."}, {"start": 1068.88, "end": 1070.83, "text": "하지만 물론 그는 두뇌를 활용해 다른 모든 일도 할 수 있었죠."}, {"start": 1070.88, "end": 1072.83, "text": "5개 국어를 구사하고,"}, {"start": 1072.88, "end": 1074.83, "text": "정치를 하거나 운전을 하는 등"}, {"start": 1074.88, "end": 1076.83, "text": "인간이 할 수 있는 모든 일을 말입니다."}, {"start": 1076.88, "end": 1078.83, "text": "제게는 그 점이 정말... 믿기지 않을 정도였어요."}, {"start": 1078.88, "end": 1080.83, "text": "훨씬 더 인상적이죠."}, {"start": 1080.88, "end": 1082.83, "text": "즉, 딥 블루 시스템에는 무언가 결여되어 있었던 겁니다."}, {"start": 1082.88, "end": 1086.028, "text": "그리고 분명 그런 기술들, 즉 전문가 시스템 기술은"}, {"start": 1086.078, "end": 1089.827, "text": "휴리스틱을 직접 설계한 뒤 그 위에 무차별 대입 검색을 적용하는 방식이죠"}, {"start": 1089.877, "end": 1092.631, "text": "오늘날 많은 전통적인 체스 프로그램이 여전히 이 방식으로 작동합니다"}, {"start": 1092.681, "end": 1095.327, "text": "체스에서는 통했지만 바둑에서는 한 번도 통한 적이 없었죠"}, {"start": 1095.377, "end": 1099.43, "text": "바둑은 너무나 심오한 게임이라 점수화할 수 있는 기물이 없거든요"}, {"start": 1099.48, "end": 1102.528, "text": "모든 돌의 가치가 같기에 오직 패턴과 직관의 영역입니다"}, {"start": 1102.577, "end": 1104.631, "text": "최고의 바둑 기사들도 그런 방식으로 대국을 하죠"}, {"start": 1104.681, "end": 1106.728, "text": "그래서 저희는 이런 생각을 했습니다"}, {"start": 1106.778, "end": 1110.33, "text": "'누군가 실제로 바둑에서 세계 챔피언 수준에 도달할 수 있다면?'"}, {"start": 1110.38, "end": 1114.028, "text": "사실 그 수준에 도달하는 것 자체가 목적은 아니었습니다"}, {"start": 1114.078, "end": 1119.528, "text": "그 과정에서 사용된 접근 방식이 정말 흥미로운 알고리즘적 접근법이 될 거라 생각했죠"}, {"start": 1119.578, "end": 1123.831, "text": "그리고 어쩌면 다른 분야로도 일반화될 수 있기를 바랐습니다"}, {"start": 1123.881, "end": 1126.129, "text": "그게 바로 알파고를 통해 입증된 결과였죠"}, {"start": 1126.179, "end": 1133.729, "text": "결과는 상상 이상이었습니다 2016년 이세돌 기사와의 대국에서 승리했을 뿐만 아니라"}, {"start": 1133.778, "end": 1139.429, "text": "이전에는 볼 수 없었던 새로운 전략들을 만들어냈기 때문입니다"}, {"start": 1139.479, "end": 1145.43, "text": "인류가 바둑을 발명한 지 2,000년이 넘었고 가장 오래된 게임이지만"}, {"start": 1145.48, "end": 1151.327, "text": "수백 년간 프로의 세계가 존재했음에도 우리는 그런 전략들을 발견하지 못했죠"}, {"start": 1151.377, "end": 1156.929, "text": "그야말로 충격적인 사건이었습니다 AI가 새로운 무언가를 내놓는 순간을 기다려 왔거든요"}, {"start": 1156.979, "end": 1163.729, "text": "창의성에도 여러 단계가 있겠지만 적어도 그것은 아주 참신한 아이디어였습니다"}, {"start": 1163.778, "end": 1168.578, "text": "제가 기다려온 바로 그 순간이었죠"}, {"start": 1168.558, "end": 1170.61, "text": "과학 연구에 AI를 활용하기 시작했죠."}, {"start": 1170.66, "end": 1173.509, "text": "그래서 서울에서 돌아오자마자"}, {"start": 1173.558, "end": 1175.508, "text": "알파폴드 프로젝트를 시작했습니다."}, {"start": 1175.557, "end": 1178.609, "text": "남: 자, 이제 과학 이야기를 좀 해보죠."}, {"start": 1178.659, "end": 1181.709, "text": "남: 그러고 나서 단백질 구조 예측 문제에 뛰어드셨는데"}, {"start": 1181.759, "end": 1184.709, "text": "남: 이번에도 데이터가 충분히 존재하고"}, {"start": 1184.759, "end": 1187.308, "text": "남: 목적 함수가 명확한 문제를 선택하셨어요."}, {"start": 1187.358, "end": 1190.111, "text": "남: 단백질 구조 예측이라는 관점에서 말이죠."}, {"start": 1190.161, "end": 1192.808, "text": "남: 그리고 그게 통했습니다."}, {"start": 1192.858, "end": 1196.509, "text": "남: 단백질 구조를 예측한다는 이 오래된 난제를"}, {"start": 1196.559, "end": 1198.807, "text": "남: 실제로 해결해 내신 거죠."}, {"start": 1198.857, "end": 1204.111, "text": "남: 알파폴드를 내놓으셨을 때 아주 흥미로운 결정을 하셨는데"}, {"start": 1204.161, "end": 1208.41, "text": "남: 과학계에 엄청난 성과였던 것은 물론이고"}, {"start": 1208.46, "end": 1211.308, "text": "남: 노벨상급의 과학적 돌파구였으며"}, {"start": 1211.358, "end": 1213.808, "text": "남: 분명 상업적 가치도 컸을 겁니다."}, {"start": 1213.858, "end": 1216.41, "text": "남: 그런데 그걸 그냥 무료로 공개하셨더군요."}, {"start": 1216.46, "end": 1219.807, "text": "남: 궁금합니다, 어떻게 그런 결정을 내리게 되셨나요?"}, {"start": 1219.857, "end": 1220.41, "text": "남: ..."}, {"start": 1220.46, "end": 1221.808, "text": "남: 다른 수익화 방식도 고민해 보셨는지,"}, {"start": 1221.858, "end": 1225.45, "text": "남: 왜 그냥 기부하듯 공개하신 건지 알고 싶습니다."}, {"start": 1225.5, "end": 1228.048, "text": "네, 그래서 저희는 단백질 구조 예측 문제를 선택했습니다."}, {"start": 1228.098, "end": 1232.048, "text": "사실 전 아주 오래전부터 이 문제에 관심을 두고 있었어요."}, {"start": 1232.098, "end": 1233.351, "text": "케임브리지 학부 시절부터 말이죠."}, {"start": 1233.401, "end": 1234.65, "text": "이 문제를 처음 접했을 당시에"}, {"start": 1234.7, "end": 1238.249, "text": "단백질 구조 예측 문제에 완전히 매료된"}, {"start": 1238.298, "end": 1240.051, "text": "생물학자 친구들이 몇 명 있었거든요."}, {"start": 1240.101, "end": 1243.151, "text": "그 친구들은 결국 다들 구조 생물학자가 되었죠."}, {"start": 1243.201, "end": 1244.748, "text": "당연히 그게 그들의 평생 직업이 되었고요."}, {"start": 1244.798, "end": 1246.65, "text": "특히 기억에 남는 한 친구가 있는데,"}, {"start": 1246.7, "end": 1249.249, "text": "펍에서 같이 테이블 축구 같은 걸 할 때마다"}, {"start": 1249.298, "end": 1251.551, "text": "입만 열면 그 문제 이야기를 하곤 했어요."}, {"start": 1251.601, "end": 1253.851, "text": "이 문제가 생물학에서 얼마나 중요한지에 대해 거의 집착 수준이었죠."}, {"start": 1253.901, "end": 1258.15, "text": "더 중요하게는, 이게 일종의 근본적인 문제라고 생각해요."}, {"start": 1258.2, "end": 1261.65, "text": "단백질의 구조를 파악하고 그 비밀을 풀 수만 있다면"}, {"start": 1261.7, "end": 1268.048, "text": "신약 개발과 같은 완전히 새로운 연구의 장이 열릴 테니까요."}, {"start": 1268.098, "end": 1273.249, "text": "저희가 추진하는 일 외에도 기초 생물학이나 질병의 이해 측면에서도요."}, {"start": 1273.298, "end": 1279.949, "text": "그래서 이 문제는 그 파급 효과를 생각할 때 정말 많은 시간과 노력을 들일 가치가 있었습니다."}, {"start": 1279.999, "end": 1284.048, "text": "저에게는 정말 매혹적인 문제로 느껴졌거든요."}, {"start": 1284.098, "end": 1291.898, "text": "마치 궁극의 퍼즐 같았죠. 아미노산 서열이... 그러니까 제 말은..."}, {"start": 1295.098, "end": 1300.17, "text": "정말이지 놀랍도록 흥미롭고 복잡한 분야입니다. 단백질을 들여다보면 볼수록 더 그렇죠."}, {"start": 1300.22, "end": 1305.671, "text": "정말 놀랍습니다. 생물학에 대한 경외심과 경이로움이 느껴져요. 이 믿기 힘든 작은 바이오..."}, {"start": 1305.721, "end": 1309.568, "text": "나노 기계들 말이죠. 아시다시피 모든 생명체는 단백질에 의존하고 있는데,"}, {"start": 1309.618, "end": 1312.268, "text": "단백질의 구조를 들여다보면 그 기능을 이해하기 시작하게 됩니다."}, {"start": 1312.317, "end": 1316.47, "text": "그래서 과학적 난제로서 제게는 아주 매력적이었죠."}, {"start": 1316.519, "end": 1320.568, "text": "그리고 명확한 목표도 있었습니다. 시스템 내의 자유 에너지를 최소화하는 식의..."}, {"start": 1320.618, "end": 1324.871, "text": "것인데, 아마 물리 법칙이 작용하는 방식일 겁니다. 그래서 우리 몸의 단백질들이..."}, {"start": 1324.921, "end": 1329.567, "text": "우리 몸속에서 매초 수십억 번씩, 수 밀리초 만에 접히는 거죠."}, {"start": 1329.617, "end": 1335.269, "text": "물리 법칙은 어떻게든 이걸 해결한 셈이에요. 그러니 분명 어떤..."}, {"start": 1335.319, "end": 1339.769, "text": "일종의 지형 같은 것을 학습해서 딥러닝 시스템으로 탐색을 안내할 수 있을 겁니다."}, {"start": 1339.818, "end": 1345.169, "text": "우리가 알파고로 바둑에서 최선의 수와 전략을 찾아낸 것처럼요."}, {"start": 1345.219, "end": 1350.768, "text": "바둑에는 우주의 원자 수보다 많은 경우의 수가 존재하지만, 단백질 구조는..."}, {"start": 1350.817, "end": 1355.769, "text": "그보다 탐색 범위가 훨씬 더 넓습니다. 하지만 합리적으로 범위를 좁힐 방법이 분명히 있죠."}, {"start": 1355.818, "end": 1360.268, "text": "딥러닝 모델을 이용해 일종의 휴리스틱을 학습하고 탐색을 안내함으로써,"}, {"start": 1360.317, "end": 1361.671, "text": "문제를 해결 가능한 수준으로 만드는 겁니다."}, {"start": 1361.721, "end": 1366.37, "text": "과학 분야에서도 정말 유사한 문제처럼 느껴졌습니다."}, {"start": 1366.42, "end": 1368.969, "text": "우리가 바둑에서 해결했던 문제와 말이죠."}, {"start": 1369.019, "end": 1371.769, "text": "동일한 접근 방식들을 어느 정도 적용하고,"}, {"start": 1371.818, "end": 1375.371, "text": "같은 이론들을 이 영역에 접목하는 것이었죠."}, {"start": 1375.421, "end": 1377.269, "text": "그리고 또 한 가지는, 당연하게도"}, {"start": 1377.318, "end": 1381.65, "text": "지난 50년간의 고된 결정학 및 구조 생물학 연구 결과가 있었다는 점입니다."}, {"start": 1381.7, "end": 1383.85, "text": "수많은 훌륭한 연구소와 연구원들의 노력이 있었죠."}, {"start": 1383.9, "end": 1387.499, "text": "그런 노력을 거듭한 끝에..."}, {"start": 1387.401, "end": 1393.248, "text": "주요 데이터베이스인 PDB에는 약 15만 개의 구조가 등록되어 있었는데, 사실 그리 많은 건 아닙니다."}, {"start": 1393.298, "end": 1396.847, "text": "물론 엄청난 노력이 들어간 결과지만, 단백질의 종류는..."}, {"start": 1396.897, "end": 1402.65, "text": "2억 개에 달하거든요. 머신러닝 시스템 입장에서 15만 개는 아주 적은 양의 데이터일 뿐이죠."}, {"start": 1402.7, "end": 1408.649, "text": "그래서 대부분의 사람들은 충분한 데이터를 확보하기까지 적어도 10년, 20년은 걸릴 거라 생각했습니다."}, {"start": 1408.699, "end": 1411.351, "text": "이 문제를 해결할 적절한 알고리즘도 필요했으니까요."}, {"start": 1411.401, "end": 1415.15, "text": "하지만 우리는 우리가 아는 모든 기술을 동원한다면..."}, {"start": 1415.2, "end": 1417.548, "text": "결국 진전을 이룰 수 있을 거라 믿었습니다."}, {"start": 1417.597, "end": 1419.449, "text": "그리고 실제로 그렇게 됐죠."}, {"start": 1419.499, "end": 1423.499, "text": "그 후 우리는 어떻게 해야..."}, {"start": 1423.499, "end": 1425.35, "text": "가장 큰 파급 효과를 낼 수 있을지 고민했습니다."}, {"start": 1425.4, "end": 1429.351, "text": "답은 명확했습니다. 모든 단백질 구조를 예측하는 것이었죠."}, {"start": 1429.401, "end": 1431.85, "text": "알파폴드는 정확할 뿐만 아니라..."}, {"start": 1431.9, "end": 1433.048, "text": "속도도 엄청나게 빨랐거든요."}, {"start": 1433.098, "end": 1435.347, "text": "단백질 구조 하나를 단 몇 초 만에 예측할 수 있었죠."}, {"start": 1435.397, "end": 1437.351, "text": "결국 우리는 유럽..."}, {"start": 1437.401, "end": 1441.347, "text": "케임브리지에 있는 유럽 생정보학 연구소(EMBL-EBI)와 협력하기로 했습니다."}, {"start": 1441.397, "end": 1443.449, "text": "그곳은 생물학 분야에서 가장 큰 데이터베이스들을 운영하는 곳인데..."}, {"start": 1443.499, "end": 1448.09, "text": "과학자들이 사용하는 그 방대한 데이터베이스에 2억 개의 단백질 구조 전체를 공개했습니다."}, {"start": 1448.14, "end": 1450.788, "text": "데이터베이스에 단백질 구조를 구축하고"}, {"start": 1450.838, "end": 1453.69, "text": "구글 검색처럼 아주 간단하게"}, {"start": 1453.74, "end": 1457.189, "text": "단백질 구조를 찾을 수 있게 했죠. 머신러닝 시스템이 산출한"}, {"start": 1457.239, "end": 1459.591, "text": "신뢰 구간도 함께 제공했는데, 이는"}, {"start": 1459.641, "end": 1462.288, "text": "시스템이 구조의 어느 부분을 확신하는지 보여주기에"}, {"start": 1462.338, "end": 1464.289, "text": "생물학자들에게 매우 중요합니다."}, {"start": 1464.339, "end": 1466.988, "text": "그래서 이 모든 것을 하나로 묶었죠."}, {"start": 1467.038, "end": 1470.889, "text": "물론 이건 경제적으로도 아주 귀중한 자산이 될 수 있었습니다."}, {"start": 1470.939, "end": 1472.889, "text": "수십억 달러 이상의 가치가 있었을지도 모르죠."}, {"start": 1472.939, "end": 1475.59, "text": "계산 방식에 따라 다르겠지만, 이를 실험으로 증명하려면"}, {"start": 1475.64, "end": 1477.39, "text": "측정조차 불가능한 비용이 들었을 겁니다."}, {"start": 1477.44, "end": 1480.49, "text": "독점 기술로 남겨뒀다면 그 가치가 엄청났겠지만"}, {"start": 1480.539, "end": 1483.389, "text": "저희 생각에는, 이 구조들을 세상에 공개함으로써"}, {"start": 1483.439, "end": 1486.288, "text": "얻을 수 있는 파급 효과의 극히 일부만을"}, {"start": 1486.338, "end": 1488.289, "text": "저희가 감당할 수 있을 것 같았습니다."}, {"start": 1488.339, "end": 1490.091, "text": "우리끼리만 해서는 말이죠."}, {"start": 1490.141, "end": 1492.788, "text": "전 세계 3백만 명의 연구자가 있고"}, {"start": 1492.838, "end": 1497.391, "text": "거의 매일 알파폴드를 사용합니다. 전 세계의 거의 모든 생물학자와 의학"}, {"start": 1497.441, "end": 1502.288, "text": "연구자들이 말이죠. 단일 기관이 그 모든 일을 해낼 수는 없기에"}, {"start": 1502.338, "end": 1507.65, "text": "공개하는 게 당연히 옳다고 생각했습니다. 첫 모델 훈련에 공공 데이터를 활용하기도 했고요."}, {"start": 1507.7, "end": 1512.351, "text": "알파폴드의 여러 버전을 거치면서 구조 생물학계에 이 자원을 환원하는 것이 마땅하다고 생각했습니다."}, {"start": 1512.401, "end": 1518.45, "text": "그들이 직접 구축해 온 자원을 더욱 증폭시킨 이 놀라운 자산을 다시 돌려주는 일이었죠."}, {"start": 1518.5, "end": 1524.45, "text": "그래서 제게는 고민할 여지도 없는 문제였고, 다행히도..."}, {"start": 1524.5, "end": 1529.851, "text": "구글 경영진 역시 과학을 사랑하고 이 취지를 온전히 이해해 주었습니다."}, {"start": 1529.901, "end": 1534.25, "text": "모든 기업이 이런 결정을 내리지는 않았을 겁니다. 그 점에 있어서 구글 측에 큰 공을 돌리고 싶네요."}, {"start": 1534.299, "end": 1539.65, "text": "논의도 아주 수월했죠. 그리고 저희는 이를 알파벳의 스핀오프 기업인"}, {"start": 1539.7, "end": 1545.85, "text": "'아이소모픽 랩스'를 통해 하류 단계까지 확장하려 노력해 왔습니다. 그곳에서는..."}, {"start": 1545.9, "end": 1548.548, "text": "알파폴드 수준의 획기적인 성과들을 여러 건 더 만들어내고 이를 통합하고 있습니다."}, {"start": 1548.598, "end": 1551.85, "text": "이를 통해 신약 개발을 가속화할 수 있는 방안을 모색 중이죠."}, {"start": 1551.9, "end": 1553.95, "text": "개발 기간을 몇 년에서 몇 개월로,"}, {"start": 1554.0, "end": 1558.65, "text": "어쩌면 단 몇 주까지 단축하는 것이 목표입니다. 단백질 구조 분석에서 그랬던 것처럼요."}, {"start": 1558.7, "end": 1561.449, "text": "예전에는 단 하나를 분석하는 데도 몇 년씩 걸리곤 했지만,"}, {"start": 1561.499, "end": 1563.45, "text": "이제는 몇 초 만에 해낼 수 있게 되었죠."}, {"start": 1563.5, "end": 1566.65, "text": "인공지능이 열어갈 미래에서 정말 기대되는 분야 중 하나군요."}, {"start": 1566.7, "end": 1567.65, "text": "인공지능과 함께 말이죠."}, {"start": 1567.7, "end": 1571.65, "text": "잠시 화제를 돌려, 이번 주 초에 하신 말씀에 대해 여쭤보고 싶습니다."}, {"start": 1571.7, "end": 1583.65, "text": "이번 주 뉴스에 크게 보도되었는데요, 구글의 대형 행사에서 우리가 '특이점의 산기슭'에 와 있다고 말씀하셨죠."}, {"start": 1583.7, "end": 1587.65, "text": "[웃음] 네, 그 표현이 꽤 회자되긴 했죠."}, {"start": 1587.7, "end": 1596.65, "text": "정말 화제였죠. 구글 홍보팀은 그리 달가워하지 않았을 수도 있겠다는 생각도 듭니다만."}, {"start": 1596.7, "end": 1601.69, "text": "어쨌든 그런 발언을 하셨으니, 구체적으로 어떤 의미였는지 설명해 주시겠습니까?"}, {"start": 1601.74, "end": 1609.49, "text": "네, 컨퍼런스를 마무리하며 드렸던 말씀은 우리가 지금 이 시기를 되돌아볼 때에 관한 것이었습니다."}, {"start": 1609.539, "end": 1617.587, "text": "아마 10년 뒤쯤 지금을 되돌아보면, 우리가 특이점의 초입에 서 있었다는 걸 깨닫게 될 겁니다."}, {"start": 1617.637, "end": 1621.587, "text": "제가 그 단어를 선택한 이유와 그 의미는 이렇습니다."}, {"start": 1621.637, "end": 1624.39, "text": "우선 AGI라는 기술이 있습니다."}, {"start": 1624.44, "end": 1626.99, "text": "우리는 차세대 인공지능을 AGI라고 불러왔죠."}, {"start": 1627.039, "end": 1629.788, "text": "진정한 의미의 범용 인공지능 말입니다."}, {"start": 1629.837, "end": 1631.891, "text": "그런 시대가 오기까지 불과 몇 년 남지 않았다고 믿습니다."}, {"start": 1631.941, "end": 1634.89, "text": "아마 2030년 전후가 되겠네요."}, {"start": 1634.94, "end": 1636.69, "text": "정말 생각만 해도 놀라운 일이죠."}, {"start": 1636.74, "end": 1641.14, "text": "그리고 그 시대는 정말 거대하고..."}, {"start": 1641.141, "end": 1643.69, "text": "혁신적인 기술이 될 것이고, 실질적으로는..."}, {"start": 1643.74, "end": 1645.89, "text": "인류의 새로운 시대가 열리는 셈입니다."}, {"start": 1645.94, "end": 1648.189, "text": "제가 싱귤래리티라고 말씀드린 건 바로 그런 의미입니다."}, {"start": 1648.239, "end": 1650.788, "text": "수많은 공상 과학 작가들이 집필해 왔던..."}, {"start": 1650.838, "end": 1652.788, "text": "그런 이야기들처럼 말이죠. 일종의..."}, {"start": 1652.837, "end": 1656.091, "text": "우리가 살아가게 될 시대를 묘사하는 겁니다."}, {"start": 1656.141, "end": 1659.288, "text": "AGI가 도래하는 바로 그 시점 전후를 말이죠."}, {"start": 1659.338, "end": 1662.891, "text": "그래서 올해가 바로 그 변화가 체감되는 해라고 할 수 있습니다."}, {"start": 1662.941, "end": 1664.891, "text": "제가 30년 동안 이 분야에서 일해왔음에도 불구하고 말이죠."}, {"start": 1664.941, "end": 1667.62, "text": "올해 에이전트들이 작동하는 방식만 봐도 그렇습니다."}, {"start": 1667.67, "end": 1671.219, "text": "도구 활용 측면에서도 정말 유용해지기 시작했습니다."}, {"start": 1671.269, "end": 1673.219, "text": "아시다시피 아직 초기 단계이긴 하지만,"}, {"start": 1673.269, "end": 1676.421, "text": "사람들의 업무 방식에 있어서는 진정으로 유용하죠."}, {"start": 1676.471, "end": 1679.019, "text": "그래서 우리는 어떤 추가적인 작업들이"}, {"start": 1679.068, "end": 1683.019, "text": "필요한지 파악할 수 있고, 주요 연구소들 모두 그 작업을 진행 중입니다."}, {"start": 1683.068, "end": 1687.019, "text": "이게 그 시작이라고 생각합니다만, 아직은 도입부일 뿐이에요. 여전히 할 일이 훨씬 많고"}, {"start": 1687.068, "end": 1692.019, "text": "이제 막 첫발을 뗀 수준이죠. 단순히 한 가지가 아니라 여러 다양한 기술들과"}, {"start": 1692.068, "end": 1698.019, "text": "제가 보는 여러 활용 사례들, 그리고 조금 먼 미래의 일이라 생각했던 것들이 이제 현실이 되어"}, {"start": 1698.068, "end": 1706.019, "text": "하나로 합쳐지고 있습니다. 그래서 종합적으로 보면, 제가 말씀드리고 싶었던 그런 느낌이 듭니다."}, {"start": 1706.068, "end": 1713.019, "text": "우리 사회가 이 이야기를 들어야 한다고 생각해요. 이게 무엇을 의미하는지 대비할 시간이 얼마 남지 않았기 때문입니다."}, {"start": 1713.068, "end": 1716.019, "text": "그리고 이건 엄청나게 심오한 변화가 될 겁니다."}, {"start": 1716.068, "end": 1719.019, "text": "제가 보기에 미래는 아직 쓰이지 않았지만,"}, {"start": 1719.068, "end": 1724.019, "text": "앞으로 몇 년이 어느 방향으로 나아갈지 결정짓는 매우 중요한 시기가 될 것입니다."}, {"start": 1724.068, "end": 1728.719, "text": "그리고 우리가 공동으로 어떤 모습을 원하는지도 중요하죠."}, {"start": 1728.769, "end": 1733.719, "text": "남: 사람들이 AI를 어떻게 인식하는지에 대한 설문조사를 보면,"}, {"start": 1733.769, "end": 1735.769, "text": "특히 이 나라에서는"}, {"start": 1735.769, "end": 1738.769, "text": "현재 매우 부정적입니다."}, {"start": 1738.769, "end": 1745.769, "text": "어쩌면 다른 국가들보다 이곳에서 더 부정적일 수도 있어요."}, {"start": 1745.769, "end": 1748.719, "text": "여기에는 아마 많은 요인이 작용하고 있을 텐데,"}, {"start": 1748.769, "end": 1752.68, "text": "개인 정보 보호나 국가 통제에 대한 우려 같은 것들이죠."}, {"start": 1752.73, "end": 1756.68, "text": "...테크 기업의 규모나 일자리 문제 같은 것들이요."}, {"start": 1756.73, "end": 1763.68, "text": "남: 어떻게 생각하세요? 세계 최고의 연구소 중 하나를 이끄는 입장에서..."}, {"start": 1763.73, "end": 1766.68, "text": "남: 이 기술에 대한 대중의 우려를 어떻게 보시는지 궁금합니다."}, {"start": 1766.73, "end": 1770.68, "text": "데미스: 대중이 우려하는 건 당연하다고 생각합니다."}, {"start": 1770.73, "end": 1775.68, "text": "데미스: 저 또한 이 기술의 특정 측면들에 대해서는 우려하고 있거든요."}, {"start": 1775.73, "end": 1777.68, "text": "데미스: AI는 '이중 용도'를 가진 기술이니까요."}, {"start": 1777.73, "end": 1779.68, "text": "데미스: 정말 엄청난 변화죠."}, {"start": 1779.73, "end": 1784.68, "text": "데미스: 저는 가끔 산업 혁명보다 10배는 더 큰 영향력을 가졌다고 설명하곤 합니다."}, {"start": 1784.73, "end": 1786.68, "text": "데미스: 심지어 속도는 10배나 더 빠르죠."}, {"start": 1786.73, "end": 1791.077, "text": "데미스: 100년이 걸릴 일이 단 10년 만에 일어나는 겁니다."}, {"start": 1791.127, "end": 1794.679, "text": "데미스: 즉, 산업 혁명보다 100배는 더 강력한 파급력인 셈이죠."}, {"start": 1794.729, "end": 1796.88, "text": "데미스: 솔직히 말하면 그것조차 과소평가일 수 있습니다."}, {"start": 1796.93, "end": 1800.679, "text": "데미스: 하지만 우리가 이해하고 감당하기엔 그 정도로도 충분히 벅찹니다."}, {"start": 1800.729, "end": 1806.13, "text": "데미스: 물론 아주 흥미진진한 면도 있습니다."}, {"start": 1806.13, "end": 1808.18, "text": "데미스: 앞으로 놀라운 일들이 많이 일어날 거예요."}, {"start": 1808.23, "end": 1810.68, "text": "데미스: 저희가 모든 질병을 해결하려 노력하는 것처럼요."}, {"start": 1810.73, "end": 1814.081, "text": "데미스: 오늘날 우리 사회가 직면한 많은 과제들..."}, {"start": 1814.131, "end": 1821.479, "text": "데미스: 기후부터 에너지, 질병까지 AI가 큰 도움이 될 거라 확신합니다. 만약..."}, {"start": 1821.528, "end": 1826.581, "text": "데미스: AI 같은 기술이 나오지 않았다면 이런 문제들이 훨씬 더 걱정됐을 겁니다."}, {"start": 1826.631, "end": 1834.84, "text": "데미스: 하지만 기술적인 면에서나 사회적인 면 모두에서 많은 변화와 혼란을 야기할 겁니다."}, {"start": 1834.89, "end": 1843.038, "text": "경제적, 철학적인 문제입니다. 아주 신중하게 고민하고 사회의 모든 구성원이"}, {"start": 1843.088, "end": 1847.538, "text": "한데 모여 논의해야 한다고 생각해요. 기술자들뿐만 아니라요."}, {"start": 1847.587, "end": 1849.738, "text": "기술과 그 안전성은 이 거대한 문제의 한 조각일 뿐입니다."}, {"start": 1849.788, "end": 1855.44, "text": "경제학자, 사회과학자, 인문학 전문가들이 모여 앞으로 어떤 일이"}, {"start": 1855.49, "end": 1857.44, "text": "일어날지 밑그림을 그려나가야 합니다."}, {"start": 1857.49, "end": 1861.739, "text": "이곳의 반응이 부정적인 이유 중 하나는 나라마다 상황이 다르기 때문이에요."}, {"start": 1861.788, "end": 1865.538, "text": "예를 들어, 얼마 전 인도 서밋에 다녀왔는데"}, {"start": 1865.588, "end": 1870.84, "text": "인도의 젊은 세대에게는 엄청난 인기를 끌고 있습니다."}, {"start": 1870.89, "end": 1874.44, "text": "기술의 민주화를 통해 얻을 기회를 봤기 때문이죠. 실리콘밸리에 가야만"}, {"start": 1874.49, "end": 1876.64, "text": "얻을 수 있었던 도구들을 모두가 갖게 된 겁니다."}, {"start": 1876.69, "end": 1880.139, "text": "정말 놀라운 순간입니다. 누구나 최첨단 연구소에서"}, {"start": 1880.189, "end": 1884.239, "text": "벌어지는 일을 거의 실시간으로 접할 수 있게 되었으니까요."}, {"start": 1884.288, "end": 1887.439, "text": "고작 몇 달 정도의 시차밖에 없죠. 정말 전례 없는 일입니다."}, {"start": 1887.489, "end": 1892.64, "text": "정말 놀라운 일들이지만, 제 동료들 중 일부가 이 상황을"}, {"start": 1892.69, "end": 1897.239, "text": "설명하는 방식에 문제가 있다고 생각합니다. 소통에 신중하지 못하고"}, {"start": 1897.288, "end": 1900.538, "text": "상황을 너무 확신하며 말하고 있어요."}, {"start": 1900.587, "end": 1905.587, "text": "하지만 사실은 엄청난 불확실성이 존재합니다."}, {"start": 1905.49, "end": 1910.64, "text": "그 자체가 우려스럽기도 하지만, 아직 아무것도 정해지지 않았다는 뜻이기도 하죠."}, {"start": 1910.69, "end": 1915.24, "text": "모든 것이 미지의 영역입니다. 누군가 확언한다 해도"}, {"start": 1915.289, "end": 1919.038, "text": "방향 정도는 제시할 수 있겠지만, 많은 부분은 결국..."}, {"start": 1919.088, "end": 1923.64, "text": "향후 몇 년간의 행보와 더불어, 오늘날의 청년들,"}, {"start": 1923.69, "end": 1927.44, "text": "여기 계신 많은 학생 여러분이 미래를 결정짓게 될 것입니다. 여러분은"}, {"start": 1927.49, "end": 1931.44, "text": "제가 '컴퓨터 네이티브'였던 것처럼, 이른바 'AI 네이티브'로 자라나는"}, {"start": 1931.49, "end": 1936.837, "text": "첫 번째 세대입니다. 그리고 모든 세대가 그랬듯, 여러분은 이 기술을 숙달해서"}, {"start": 1936.887, "end": 1943.439, "text": "엄청난 생산성을 발휘하게 될 것입니다. 사실 향후 10년 정도는..."}, {"start": 1943.489, "end": 1947.24, "text": "그 이후를 예측하긴 어렵지만, 이 기술들을 올바르게 활용한다면"}, {"start": 1947.289, "end": 1951.14, "text": "여러분은 거의 초능력을 갖게 될 것입니다. 발휘할 수 있는 창의성과 프로젝트의 양,"}, {"start": 1951.19, "end": 1953.34, "text": "그리고 개인이 해낼 수 있는 일의 양이 어마어마해질 테니까요."}, {"start": 1953.39, "end": 1955.538, "text": "하지만 그로 인해 직업의 본질이 바뀔 수도 있습니다."}, {"start": 1955.588, "end": 1958.239, "text": "대기업보다는 기업가 정신을 발휘하는 1인 기업이나 소규모 창업이"}, {"start": 1958.288, "end": 1959.64, "text": "더 많아질지도 모르죠."}, {"start": 1959.69, "end": 1960.34, "text": "잘은 모르겠지만요."}, {"start": 1960.39, "end": 1961.739, "text": "정말 많은 것이 변할 겁니다."}, {"start": 1961.788, "end": 1965.34, "text": "하지만 저는 사회가 하나로 뭉쳐서"}, {"start": 1965.39, "end": 1968.84, "text": "이러한 기하급수적인 변화를 진지하게 받아들여야 한다고 생각합니다."}, {"start": 1968.89, "end": 1971.24, "text": "기술자뿐만 아니라 경제학자를 비롯한 다양한 전문가들이 말이죠."}, {"start": 1971.289, "end": 1972.64, "text": "어젯밤에도 이에 대해 논의했었는데,"}, {"start": 1972.69, "end": 1974.94, "text": "우리는 지금 당장 이 문제를 진지하게 다뤄야 합니다."}, {"start": 1974.99, "end": 1977.24, "text": "그리고 '포스트 희소성(post-scarcity)' 시대가 온다면"}, {"start": 1977.289, "end": 1978.999, "text": "세상이 어떤 모습일지 그려나가기 시작해야 합니다."}, {"start": 1979.048, "end": 1982.7, "text": "예를 들어, 어떻게 하면 모두가 그 혜택을 누릴 수 있을까요?"}, {"start": 1982.75, "end": 1984.6, "text": "그 핵심은, 그러니까..."}, {"start": 1984.65, "end": 1987.65, "text": "소수의 사람이나"}, {"start": 1987.749, "end": 1991.548, "text": "일부 기업, 혹은 몇몇 국가들만"}, {"start": 1991.45, "end": 1992.301, "text": "이 기술의 혜택을 누려선 안 된다는 뜻입니다"}, {"start": 1992.351, "end": 1995.1, "text": "인류 전체에 영향을 미칠 일인 만큼 광범위해야 하죠"}, {"start": 1995.15, "end": 1998.2, "text": "모두에게 그 혜택이 골고루 돌아가야 합니다"}, {"start": 1998.25, "end": 1999.999, "text": "하지만 어떻게 그게 가능할까요?"}, {"start": 2000.048, "end": 2003.101, "text": "우리 중 많은 이들이 이에 대해 논의해 왔지만"}, {"start": 2003.151, "end": 2006.899, "text": "이제는 실질적인 답변과 구체적인 계획,"}, {"start": 2006.949, "end": 2008.499, "text": "그리고 실행이 필요한 시점입니다"}, {"start": 2008.548, "end": 2010.298, "text": "저 역시 제 소임을 다할 계획입니다"}, {"start": 2010.347, "end": 2013.399, "text": "지난 수년간 이 문제에 대해 깊이 고민하고"}, {"start": 2013.449, "end": 2016.9, "text": "계획을 세우며 영향력을 키워왔으니"}, {"start": 2016.95, "end": 2018.401, "text": "제가 할 수 있는 최선을 다하겠습니다"}, {"start": 2018.451, "end": 2020.2, "text": "물론 우리가 중요한 역할을 하곤 있지만"}, {"start": 2020.25, "end": 2022.2, "text": "이 분야의 유일한 참여자는 아닙니다"}, {"start": 2022.25, "end": 2024.95, "text": "하지만 희망적인 소식은"}, {"start": 2024.848, "end": 2026.901, "text": "모든 선도적인 연구소와"}, {"start": 2026.951, "end": 2029.25, "text": "그곳의 리더들이..."}, {"start": 2029.25, "end": 2030.9, "text": "많은 부분에서 의견이 엇갈리긴 해도,"}, {"start": 2030.95, "end": 2037.15, "text": "앞으로 닥칠 문제들에 대해서는 다들 우려하고 있습니다."}, {"start": 2037.147, "end": 2039.999, "text": "하지만 그들이... 그러니까,"}, {"start": 2040.048, "end": 2043.699, "text": "함께 모여 이런 문제들을 더 솔직하게 논의할 장이 필요합니다."}, {"start": 2043.749, "end": 2046.6, "text": "대중도 아마 그런 점을 느끼고 있을 거예요."}, {"start": 2046.65, "end": 2050.997, "text": "앞으로 일어날 일에 대해 다소 왜곡된 논의들이나,"}, {"start": 2051.047, "end": 2054.898, "text": "그런 메시지 이면에 숨겨진 어떤 의도 같은 것들 말이죠."}, {"start": 2054.949, "end": 2056.5, "text": "투자 유치라든가 다른 목적들 말이에요."}, {"start": 2056.55, "end": 2059.798, "text": "하지만 제 생각엔 이제 과학적인 방법론을 사용해,"}, {"start": 2059.849, "end": 2062.9, "text": "이 역사적인 순간에 대해 정말이지 철저하고"}, {"start": 2062.951, "end": 2064.597, "text": "신중하게 고민해야 한다고 봅니다."}, {"start": 2064.648, "end": 2067.201, "text": "그리고 마지막으로 덧붙이고 싶은 건,"}, {"start": 2067.251, "end": 2070.199, "text": "업계와 학계가 훨씬 더 명확하게"}, {"start": 2070.25, "end": 2074.4, "text": "그 혜택이 무엇인지 보여주어야 한다는 겁니다."}, {"start": 2074.451, "end": 2077.0, "text": "단순히 말로만 하는 게 아니라 직접 증명해 내야 하죠."}, {"start": 2077.05, "end": 2080.298, "text": "보건이나 의료, 과학 같은 분야에서요."}, {"start": 2080.349, "end": 2081.599, "text": "제가 보기에는 이런 것들이"}, {"start": 2081.65, "end": 2084.298, "text": "알파폴드처럼 명백하게 유익한 사례들이거든요."}, {"start": 2084.349, "end": 2085.497, "text": "하지만 아직 사례가 충분하지 않아요."}, {"start": 2085.547, "end": 2087.318, "text": "알파폴드 같은 사례가 20개는 더 나와야 합니다."}, {"start": 2087.369, "end": 2090.218, "text": "남1: 이제 우리는 가설 수준을 넘어서야 합니다."}, {"start": 2090.268, "end": 2092.119, "text": "남1: 암 정복에 대해 막연히 이야기하는 단계를 지나"}, {"start": 2092.17, "end": 2093.718, "text": "남1: 실제로 암을 정복해야 하죠."}, {"start": 2093.768, "end": 2104.717, "text": "남1: 대중에게 이런 점을 증명해야 한다고 생각해요. 여기 계신 많은 분처럼 이 일에 열광하는 사람들이—실제로 많은 분이 이 자리에 계시지만—왜 그렇게 열광하는지 말입니다."}, {"start": 2104.768, "end": 2108.717, "text": "남1: 왜 평생을 바쳐 이 일에 매진해 왔는지 보여줘야 하죠."}, {"start": 2108.768, "end": 2112.717, "text": "남1: 동시에 위험을 구체적으로 어떻게 완화해 나갈 것인지도요."}, {"start": 2112.768, "end": 2117.717, "text": "남1: 우리가 바라고 사회가 필요로 하는 그 놀라운 일들을 실현해 나가면서 말입니다."}, {"start": 2117.768, "end": 2125.918, "text": "남2: 정말 중요한 포인트네요. 만약 AI 혁신을 통해 눈에 보이는 실질적인 혜택이 실현된다면..."}, {"start": 2125.969, "end": 2131.019, "text": "남2: 가령 인류의 건강 증진이나 신약 개발 같은 분야에서 말이죠."}, {"start": 2131.07, "end": 2135.318, "text": "남2: 그러면 사람들의 인식도 어느 정도 바뀔 수 있을 겁니다."}, {"start": 2135.369, "end": 2141.82, "text": "남2: 그리고 지금과는 판이하게 다른 미래의 모습을 더 멀리 내다보자는 제안도 좋았습니다."}, {"start": 2141.871, "end": 2143.918, "text": "남2: 특히 생산성이라는 측면에서요."}, {"start": 2143.969, "end": 2146.619, "text": "남2: 사실 그렇게 미래를 전망하는 게 쉬운 일은 아닙니다."}, {"start": 2146.67, "end": 2151.418, "text": "남2: 사회과학 분야에서는 현재의 틀에 갇히지 않고"}, {"start": 2151.469, "end": 2153.418, "text": "남2: 미래를 앞서서 투영해 보기가 정말 어렵거든요."}, {"start": 2153.469, "end": 2158.718, "text": "남2: 대공황 시절, 우리 손주 세대의 경제적 가능성을 논했던 케인스의 명칼럼이 떠오르는군요."}, {"start": 2158.768, "end": 2159.718, "text": "남2: 우리 후손들의 미래 말입니다."}, {"start": 2159.768, "end": 2164.318, "text": "남2: 드문 사례긴 하지만, 어젯밤 말씀하신 것처럼 지금 우리에겐 또 다른 케인스가 필요한 시점일지도 모르겠네요."}, {"start": 2164.369, "end": 2170.519, "text": "남2: 어쩌면 여기 계신 청중분들 중에 그런 역할을 해주실 분이 계실지도 모르죠. [웃음]"}, {"start": 2170.57, "end": 2176.528, "text": "남2: 이제 질문을 하나 드릴게요. 오랫동안 말씀해 오신 것 중 하나가..."}, {"start": 2176.579, "end": 2182.98, "text": "남1: 선도 기업들이 어느 정도 스스로를 규제해야 한다는,"}, {"start": 2182.981, "end": 2189.028, "text": "남1: 그러니까 때로는 안전에 위협이 될 수도 있는 특정 기술의 출시를"}, {"start": 2189.079, "end": 2196.13, "text": "남1: 자제해야 한다는 의견에 대해서요. 지금 상황을 보면 기업들은 그야말로 숨 가쁜"}, {"start": 2196.181, "end": 2203.23, "text": "남1: 경쟁 중이죠. 모든 걸 쏟아붓고 있고 사활을 걸고 있습니다. 여전히 기업들이"}, {"start": 2203.28, "end": 2205.128, "text": "남1: 자율 규제를 해야 한다고 보시나요?"}, {"start": 2205.179, "end": 2209.329, "text": "남1: 아니면 정부가 개입해서 어떤 방식으로든 AI를"}, {"start": 2209.38, "end": 2210.23, "text": "남1: 규제해야 한다고 생각하시나요?"}, {"start": 2210.28, "end": 2213.329, "text": "남1: 과거에 말씀하셨던 것과 비교했을 때 현재의 역학 관계를"}, {"start": 2213.38, "end": 2214.327, "text": "남1: 어떻게 보고 계신가요?"}, {"start": 2214.378, "end": 2215.128, "text": "남2: 네."}, {"start": 2215.179, "end": 2218.528, "text": "남2: 우선 이에 대한 역사적 배경을 좀 말씀드리자면,"}, {"start": 2218.579, "end": 2222.329, "text": "남2: 이건 우리가 앞서 나눴던 기술의 발전 양상과는 좀 다릅니다."}, {"start": 2222.38, "end": 2224.829, "text": "남2: 기술 자체는 정말 놀라울 정도로 발전했다고 생각해요."}, {"start": 2224.88, "end": 2227.329, "text": "남2: 20년 전에 상상했던 것보다 훨씬 더 긍정적인 방향으로 말이죠."}, {"start": 2227.38, "end": 2231.528, "text": "남2: 하지만 기술이 태동하고 있는 지금의 환경은..."}, {"start": 2231.579, "end": 2234.128, "text": "남2: 결코 이상적이지 않습니다. 거리가 아주 멀죠."}, {"start": 2234.179, "end": 2236.73, "text": "남2: 전 이미 15년 전, 10년 전부터 이런 과열 경쟁이 일어날까 봐"}, {"start": 2236.78, "end": 2240.38, "text": "남2: 무척 걱정해 왔습니다."}, {"start": 2240.38, "end": 2242.23, "text": "남2: 이런 경쟁 구도가 형성되는 것에 대해서요."}, {"start": 2242.28, "end": 2244.889, "text": "남2: 점점 더 많은 사람과 기업들이 참여하게 되면서..."}, {"start": 2244.94, "end": 2247.889, "text": "야심 찬 기술 리더들이 늘어나면서"}, {"start": 2247.94, "end": 2250.889, "text": "제가 20년 넘게 알고 있던 사실을 그들도 깨닫기 시작했죠"}, {"start": 2250.94, "end": 2253.788, "text": "이 기술이 얼마나 중요해질 것인지를요"}, {"start": 2253.838, "end": 2255.489, "text": "이 방에서도 그런 이야기를 나눴었는데요"}, {"start": 2255.539, "end": 2259.188, "text": "이런 경쟁 구도가 가져올 위험성에 대해서 말이죠"}, {"start": 2259.239, "end": 2260.989, "text": "불행히도 기술이 발전해 온 방식 때문에"}, {"start": 2261.039, "end": 2263.09, "text": "결국 지금과 같은 상황에 이르게 됐습니다"}, {"start": 2263.141, "end": 2265.688, "text": "그래서 만약 제게 마법 지팡이가 있다면"}, {"start": 2265.739, "end": 2269.188, "text": "범용 인공지능(AGI)을 개발할 때"}, {"start": 2269.239, "end": 2273.09, "text": "좀 더 연구 중심적인 시설에서 만들었을 겁니다"}, {"start": 2273.141, "end": 2275.688, "text": "유럽입자물리연구소(CERN)처럼 최고의 인재들이 모여"}, {"start": 2275.739, "end": 2278.989, "text": "서로의 아이디어를 비판하고 검토하며"}, {"start": 2279.039, "end": 2282.09, "text": "과학적 방법론을 철저히 준수하고"}, {"start": 2282.141, "end": 2286.688, "text": "모든 단계를 완벽히 이해하며 테스트를 거쳤을 겁니다"}, {"start": 2286.739, "end": 2288.389, "text": "그렇다고 마냥 기다릴 필요는 없었겠죠"}, {"start": 2288.44, "end": 2292.389, "text": "물론 AGI의 등장은 10년 정도 늦춰졌겠지만요"}, {"start": 2292.44, "end": 2294.688, "text": "하지만 그 혜택을 누리기 위해 기다릴 필요는 없습니다"}, {"start": 2294.739, "end": 2297.09, "text": "사회적 혜택 말이죠, 그와 동시에"}, {"start": 2297.141, "end": 2299.889, "text": "기술의 일부를 떼어내어 특정 분야에"}, {"start": 2299.94, "end": 2302.769, "text": "활용할 수 있으니까요, 질병을 치료하는 알파폴드처럼요"}, {"start": 2302.82, "end": 2303.769, "text": "그건 충분히 가능한 일이죠, 그렇죠?"}, {"start": 2303.82, "end": 2306.869, "text": "알파폴드(AlphaFold)는 특화된 하이브리드 시스템이니까요."}, {"start": 2306.92, "end": 2310.967, "text": "범용 시스템들이 사용하는 수많은 아이디어를 차용하고 있지만,"}, {"start": 2311.018, "end": 2313.367, "text": "단백질 구조 예측(protein folding)에 특화되어 있죠."}, {"start": 2313.418, "end": 2315.769, "text": "사실 그게 제 비전이기도 했고, 보시다시피"}, {"start": 2315.82, "end": 2317.968, "text": "저희가 실제로 하고 있던 일도 바로 그거였으니까요."}, {"start": 2318.018, "end": 2321.668, "text": "그런데 챗봇이 모든 걸 바꿔놓았습니다. 실질적으로는,"}, {"start": 2321.719, "end": 2323.168, "text": "과학적인 측면에서 지난 15년 동안"}, {"start": 2323.219, "end": 2325.268, "text": "저에게는 아마 유일하게 놀라웠던 점이었을 텐데요."}, {"start": 2325.318, "end": 2328.968, "text": "트랜스포머(Transformers)가 언어 분야에서 얼마나 효과적인지 증명된 사실 말이죠."}, {"start": 2329.018, "end": 2331.42, "text": "언어를 따로 분리해내서"}, {"start": 2331.32, "end": 2333.668, "text": "그저 인터넷 데이터만으로도 학습할 수 있다는 사실요."}, {"start": 2333.719, "end": 2337.269, "text": "현실 세계에서의 로보틱스나 시뮬레이션 같은"}, {"start": 2337.32, "end": 2338.769, "text": "직접적인 행동 없이도 말이죠."}, {"start": 2338.82, "end": 2339.968, "text": "있잖아요, 이건 정말 흥미로운 지점이에요."}, {"start": 2340.018, "end": 2342.068, "text": "왜 그런지에 대해서는 나중에 다른 주제로 다뤄봐야겠네요."}, {"start": 2342.119, "end": 2343.869, "text": "저도 그에 대한 몇 가지 이론이 있거든요."}, {"start": 2343.92, "end": 2345.968, "text": "언어는 우리가 생각하는 것보다, 아니 언어학자들이"}, {"start": 2346.018, "end": 2347.668, "text": "예상했던 것보다 훨씬 더 현실에 뿌리를 두고 있습니다."}, {"start": 2347.719, "end": 2351.648, "text": "인간 테스터들의 강화 학습 피드백으로부터 오는 어떤 기반이..."}, {"start": 2351.699, "end": 2355.949, "text": "우리가 실제 세상에 발을 붙이고 있기 때문에, 어떤 것들에 대해 예, 아니오라고 할 때..."}, {"start": 2356.0, "end": 2363.05, "text": "우리의 기반이 매우 좁은 대역폭 방식으로 전달되지만, 결국 파운데이션 모델이 이해하는 방식을 수정하게 되죠."}, {"start": 2363.101, "end": 2368.449, "text": "제 생각에는 이런 예상치 못한 일들이 일어났고..."}, {"start": 2368.5, "end": 2373.75, "text": "그 덕분에 상업적으로 매우 중요한 기술이 되었습니다."}, {"start": 2373.8, "end": 2377.447, "text": "공학적 설계와 자본 등을 투입해 확장할 수 있게 되었죠. 우리가 오늘날 보고 있는 것처럼요."}, {"start": 2377.498, "end": 2381.75, "text": "그것이 역학 관계를 바꾸었고, 지금 우리가 마주한 상황을 만들었습니다. 아마도..."}, {"start": 2381.8, "end": 2386.849, "text": "제 생각에 지금까지 중 가장 치열한 경쟁 환경일 겁니다."}, {"start": 2386.9, "end": 2391.349, "text": "기술 산업이나 기술 시대 전체를 통틀어서도요. 어쩌면 역사학자들이나..."}, {"start": 2391.4, "end": 2394.949, "text": "경영대학원 사람들은 다르게 말할지도 모르겠지만, 정말 믿기 힘들 정도로..."}, {"start": 2395.0, "end": 2398.349, "text": "그 한복판에 있다는 건 정말 강렬한 경험입니다. 모든 참여자가..."}, {"start": 2398.4, "end": 2401.4, "text": "그렇게 느끼고 있을 겁니다."}, {"start": 2401.4, "end": 2405.349, "text": "게다가 그 위에는 지정학적 복잡성까지 얽혀 있죠."}, {"start": 2405.4, "end": 2408.349, "text": "그래서 이중적인 경쟁이 벌어지고 있는 셈입니다."}, {"start": 2408.4, "end": 2411.947, "text": "기업들 간의 경쟁이 있는데, 이건 그들에게..."}, {"start": 2411.998, "end": 2413.349, "text": "거의 생사가 걸린 문제죠."}, {"start": 2413.4, "end": 2416.349, "text": "그리고 미국과 중국의 역학 관계 같은 것들도 있고요, 그렇죠?"}, {"start": 2416.4, "end": 2417.349, "text": "지정학적 역학 관계 말입니다."}, {"start": 2417.4, "end": 2419.349, "text": "거기서도 경쟁이 벌어지고 있죠."}, {"start": 2419.4, "end": 2421.349, "text": "그래서 이중 구조로 되어 있는 겁니다."}, {"start": 2421.4, "end": 2422.369, "text": "아주 까다로운 문제죠."}, {"start": 2422.42, "end": 2427.42, "text": "하지만 전 아직 희망을 버리지 않았습니다."}, {"start": 2427.42, "end": 2429.869, "text": "어떤 식의 협력과 조정이 가능할 것이란 희망 말이죠."}, {"start": 2429.92, "end": 2432.17, "text": "저희는 연구소 책임자로서 분명히 이 문제에 대해 논의합니다."}, {"start": 2432.221, "end": 2434.968, "text": "안전 요소와 보안 요소들에 대해서 말입니다."}, {"start": 2435.018, "end": 2436.168, "text": "누구나 그것을 원하죠."}, {"start": 2436.219, "end": 2440.369, "text": "어느 국가도, 어느 누구도 재앙적인 상황이 벌어지는 걸 원치 않습니다."}, {"start": 2440.42, "end": 2442.57, "text": "문제는 우리가 일종의 '죄수의 딜레마'에 빠져 있다는 겁니다."}, {"start": 2442.621, "end": 2446.367, "text": "정의상, 누군가 더 많은 시간을 들여서"}, {"start": 2446.418, "end": 2448.968, "text": "무언가를 출시하거나 더 안전하게 만들려고 한다면"}, {"start": 2449.018, "end": 2451.619, "text": "그저 세상에 내놓고"}, {"start": 2451.621, "end": 2453.268, "text": "무슨 일이 일어나는지 지켜보는 것보다 훨씬 어렵기 때문이죠."}, {"start": 2453.318, "end": 2456.471, "text": "그래서 이탈자가 어느 정도 우위를 점하게 됩니다."}, {"start": 2456.521, "end": 2460.168, "text": "이것이 바로 '바닥을 향한 경쟁'의 고전적인 문제입니다."}, {"start": 2460.219, "end": 2462.568, "text": "우리는 어떻게든 상황을 바꿔야 하며, 그게 시급하다고 생각합니다."}, {"start": 2462.619, "end": 2468.168, "text": "그 해결책의 일부는 정부가 어떤 형태로든 개입하는 것이라고 봅니다."}, {"start": 2468.219, "end": 2472.968, "text": "물론 어려운 점은 규제와 관련된 모든 것들이 너무 느리다는 것이죠."}, {"start": 2473.018, "end": 2475.467, "text": "매주 새로운 것들이 쏟아져 나오니까요."}, {"start": 2475.518, "end": 2480.369, "text": "만약 2년 전에 무언가를 규제했다면, 지금은 완전히 구석기 시대 이야기처럼 들릴 겁니다."}, {"start": 2480.42, "end": 2483.369, "text": "그러니 거의 확실하게 잘못된 규제가 되었겠죠."}, {"start": 2483.42, "end": 2485.769, "text": "그래서 어떤 식으로 설계되어야 할지 저에게 몇 가지 아이디어가 있습니다."}, {"start": 2485.82, "end": 2487.568, "text": "올해 말에 이 부분에 대해 다시 이야기하게 되겠지만"}, {"start": 2487.619, "end": 2491.168, "text": "규제는 역동적이어야 합니다. 사실 '역동성'이라는 말은"}, {"start": 2491.219, "end": 2493.369, "text": "보통 규제라는 단어와는 잘 어울리지 않죠."}, {"start": 2493.42, "end": 2497.468, "text": "그래서 규제는 아주 가볍고 민첩해야 합니다."}, {"start": 2497.518, "end": 2501.369, "text": "최신 발전 상황을 즉각 반영할 수 있어야 하죠."}, {"start": 2501.42, "end": 2504.668, "text": "그래야 실제 위험이 존재하는 지점에 맞춰 적응할 수 있습니다."}, {"start": 2504.719, "end": 2507.07, "text": "막연히 짐작되는 위험이 아니라요."}, {"start": 2507.121, "end": 2510.568, "text": "나중에 보면 사실이 아니거나 핵심이 아닌 것으로 밝혀질 위험들 말이죠."}, {"start": 2510.619, "end": 2514.068, "text": "수년 전 방식은 AI에 통하지 않을 겁니다."}, {"start": 2514.119, "end": 2519.869, "text": "지금 당장도 내로라하는 과학자들이 점검 목록에 대해 합의하기란 쉽지 않을 거예요."}, {"start": 2519.92, "end": 2523.668, "text": "어떤 견제와 균형이 필요한지에 대한 목록 말이죠. 장담컨대 절대 합의하지 못할 겁니다."}, {"start": 2523.719, "end": 2524.668, "text": "무엇이 필요한지에 대해서요."}, {"start": 2524.719, "end": 2527.568, "text": "왜냐하면 아직 과학적인 정립이 끝나지 않았기 때문입니다."}, {"start": 2527.619, "end": 2536.318, "text": "부분적으로는 속도 때문이기도 하지만, 발전의 보폭이 우리가 그 기술을"}, {"start": 2536.32, "end": 2537.568, "text": "이해하는 속도보다 훨씬 앞서나가고 있기 때문이죠."}, {"start": 2537.619, "end": 2540.769, "text": "기술 경쟁의 역동성 속에서는 당연한 현상입니다."}, {"start": 2540.82, "end": 2544.968, "text": "하지만 어떻게든 그 사이의 균형을 다시 맞춰야 합니다."}, {"start": 2545.018, "end": 2548.471, "text": "그래서 제 생각에는 일종의... 정말로,"}, {"start": 2548.521, "end": 2551.67, "text": "이른바 '스마트 규제'가 필요합니다."}, {"start": 2551.721, "end": 2554.409, "text": "시대의 흐름에 맞춰 변하고 적응할 수 있는 역동적인 규제 말이죠."}, {"start": 2554.46, "end": 2558.907, "text": "남1: 아주 빠르게 진행될 텐데, 아마 주요 연구소들이 정보를 제공하겠죠."}, {"start": 2558.958, "end": 2564.608, "text": "남1: 그들은 현장에서 실제로 무슨 일이 벌어지는지 직접 보고 있으니까요."}, {"start": 2564.659, "end": 2566.809, "text": "남2: 맞습니다. 그 점이 정말... 제 생각에는,"}, {"start": 2566.86, "end": 2568.909, "text": "남2: 그와 관련해 논의할 내용이 훨씬 더 많습니다."}, {"start": 2568.96, "end": 2574.407, "text": "남2: AI 규제 시스템을 어떻게 구축할지, 그리고 어떤 방식으로 설계해야"}, {"start": 2574.458, "end": 2578.407, "text": "남2: 말씀하신 긍정적인 기술적 돌파구들을 저해하지 않을지에 대해서요."}, {"start": 2578.458, "end": 2579.407, "text": "남1: 정확합니다."}, {"start": 2579.458, "end": 2580.409, "text": "남2: 지정학적인 문제도 있죠."}, {"start": 2580.46, "end": 2581.409, "text": "남1: 우리는 그런 혁신을 원하잖아요, 그렇죠?"}, {"start": 2581.46, "end": 2582.409, "text": "남1: 질병 문제도 해결하고 싶어 하고요."}, {"start": 2582.46, "end": 2583.409, "text": "남2: 그러니까요, 정확히 그렇습니다."}, {"start": 2583.46, "end": 2587.907, "text": "남2: 어떻게 하면 부작용은 완화하면서 좋은 활용 사례들을 지원할 수 있을까요?"}, {"start": 2587.958, "end": 2592.01, "text": "남2: 올해 발표하실 구체적인 계획이 정말 기대되네요."}, {"start": 2592.061, "end": 2594.01, "text": "남2: 정말 훌륭할 것 같습니다."}, {"start": 2594.061, "end": 2597.01, "text": "남2: 덕분에 이곳 캠퍼스에서도 나눌 이야기가 많아지겠네요."}, {"start": 2597.061, "end": 2598.01, "text": "남1: 전 세계 어디서나 그렇겠죠."}, {"start": 2598.061, "end": 2601.21, "text": "남2: 학생들의 질문이 몇 가지 들어와 있는데요."}, {"start": 2601.26, "end": 2609.159, "text": "남2: 질문할 기회를 드리고 싶습니다."}, {"start": 2609.161, "end": 2610.309, "text": "학생: 안녕하세요, 데미스. 저는..."}, {"start": 2610.36, "end": 2613.128, "text": "학생: 경영대학원 2학년생인 아리스입니다."}, {"start": 2613.179, "end": 2614.429, "text": "남1: 제 질문은, 어떻게 하면"}, {"start": 2614.48, "end": 2617.528, "text": "남1: AI 기술의 한계를 넓히는 동시에"}, {"start": 2617.579, "end": 2619.929, "text": "남1: 의료 및 과학적 혜택이"}, {"start": 2619.98, "end": 2625.528, "text": "남1: 공평하게 돌아가도록 보장할 수 있을까 하는 겁니다."}, {"start": 2625.579, "end": 2627.38, "text": "남1: 아프리카나"}, {"start": 2627.38, "end": 2630.431, "text": "남1: 도움이 가장 절실한 남반구 지역들 말입니다."}, {"start": 2630.481, "end": 2635.431, "text": "남1: 하지만 보급이나 연구를 위한 인프라는 매우 제한적인 곳들이죠."}, {"start": 2635.481, "end": 2636.431, "text": "남2: 네."}, {"start": 2636.481, "end": 2638.429, "text": "남2: 사실 저희도 그 부분에 대해 고민을 많이 합니다."}, {"start": 2638.48, "end": 2641.429, "text": "남2: 한 가지 예를 들어보자면"}, {"start": 2641.48, "end": 2643.429, "text": "남2: 아까 말씀드렸던 알파폴드 이야기로 돌아가야겠네요."}, {"start": 2643.48, "end": 2647.429, "text": "남2: 아시다시피 저희는 모든 단백질 구조를 예측했고"}, {"start": 2647.48, "end": 2649.429, "text": "남2: 그 결과물을 데이터베이스에 공개했습니다."}, {"start": 2649.48, "end": 2651.429, "text": "남2: 전 세계 어디서든 누구나 볼 수 있게 말이죠."}, {"start": 2651.48, "end": 2654.429, "text": "남2: 덕분에 190개국에서 300만 명의 연구자가 이용하고 있습니다."}, {"start": 2654.48, "end": 2657.429, "text": "남2: 분명히 말씀드리자면, 거의 모든 국가의 모든 연구자가 사용하는 셈이죠."}, {"start": 2657.48, "end": 2664.431, "text": "남2: 덕분에 연구자들도... 사실 저희가 초기에 여러 협업을 지원하며 했던 아주 뜻깊은 일인데,"}, {"start": 2664.481, "end": 2666.431, "text": "남2: 알파폴드로 무엇을 할 수 있는지 잘 보여주었습니다."}, {"start": 2666.481, "end": 2672.431, "text": "남2: 저희는 스위스 WHO 산하의 '소외 질환 신약 개발 재단(DNDi)'과 협력했습니다."}, {"start": 2672.481, "end": 2679.449, "text": "남2: 그곳은 의료 시스템이 열악한 빈곤 지역의 질병을 연구하는 곳이죠."}, {"start": 2679.5, "end": 2685.449, "text": "아시다시피 일부 질병은 소외되고 있습니다. 대형 제약사가 이윤을 남길 수 없는"}, {"start": 2685.5, "end": 2688.5, "text": "그런 시장에서는 말이죠."}, {"start": 2688.5, "end": 2690.75, "text": "그래서 주로 영향을 미치는 질병들,"}, {"start": 2690.8, "end": 2693.349, "text": "세계의 특정 지역들에 국한된 질병들은"}, {"start": 2693.4, "end": 2697.15, "text": "연구 자원이 충분히 뒷받침되지 못합니다."}, {"start": 2697.201, "end": 2699.847, "text": "그래서 저희가 협력을 통해 할 수 있었던 일은..."}, {"start": 2699.898, "end": 2703.648, "text": "이 연구소 및 현지의 여러 대학과 협력하여"}, {"start": 2703.699, "end": 2707.949, "text": "구조를 직접 파악하려 애쓸 필요 없이 바로 건너뛰게 한 것입니다."}, {"start": 2708.0, "end": 2711.648, "text": "말라리아 바이러스나 지카 바이러스의 구조 같은 것들 말이죠."}, {"start": 2711.699, "end": 2713.048, "text": "예전 같으면 그런 구조를 밝히기 위해"}, {"start": 2713.099, "end": 2714.949, "text": "고된 구조 생물학 연구를 전부 수행해야 했을 텐데"}, {"start": 2715.0, "end": 2718.349, "text": "이제는 구조를 기정사실로 두고 즉시 치료제 개발에 착수할 수 있습니다."}, {"start": 2718.4, "end": 2722.55, "text": "덕분에 전체 공정 속도가 비약적으로 빨라졌죠."}, {"start": 2722.601, "end": 2728.347, "text": "관심 있는 구조를 토대로 바로 다음 단계로 나아갈 수 있게 된 겁니다. 마찬가지로..."}, {"start": 2728.398, "end": 2733.747, "text": "기후 변화의 영향을 받는 작물의 회복력 연구도 마찬가지입니다."}, {"start": 2733.797, "end": 2740.15, "text": "저희는 제니퍼 다우드나 연구소를 비롯한 여러 곳과 협력 중인데, 수많은 식물..."}, {"start": 2740.201, "end": 2744.849, "text": "단백질의 구조가 무엇인지 전혀 알지 못했기 때문입니다."}, {"start": 2744.9, "end": 2746.648, "text": "분명 대부분의 구조 연구는"}, {"start": 2746.699, "end": 2748.247, "text": "인간 단백질에만 집중되어 왔으니까요."}, {"start": 2748.297, "end": 2752.009, "text": "그래서 동물이나 식물 단백질은 데이터가 훨씬 적습니다."}, {"start": 2752.059, "end": 2752.71, "text": "...세상 밖으로요."}, {"start": 2752.76, "end": 2754.309, "text": "그래서 그들은 훨씬 더..."}, {"start": 2754.36, "end": 2758.608, "text": "그런 분야에서 훨씬 더 차별적인 영향력을 발휘할 수 있었죠."}, {"start": 2758.659, "end": 2762.21, "text": "그리고 마지막으로 덧붙이고 싶은 말은, 만약 우리가..."}, {"start": 2762.26, "end": 2764.807, "text": "이 지점이 바로 자본주의라는 엔진이"}, {"start": 2764.858, "end": 2770.409, "text": "선한 목적으로 쓰일 수 있는 부분이라 생각해요. 만약 우리가"}, {"start": 2770.46, "end": 2773.407, "text": "아이소모픽에서 개발 중인 신약 개발 플랫폼을"}, {"start": 2773.458, "end": 2775.708, "text": "제가 말씀드린 만큼 효율적으로 만들 수 있다면요."}, {"start": 2775.759, "end": 2777.21, "text": "개발 기간을 수년에서 수개월로 단축하고"}, {"start": 2777.26, "end": 2779.407, "text": "수십억 달러에 달하던 비용을"}, {"start": 2779.458, "end": 2781.407, "text": "수천만 달러 수준으로 줄일 수 있습니다."}, {"start": 2781.458, "end": 2783.407, "text": "어쩌면 단 몇백만 달러 수준까지도 가능하겠죠."}, {"start": 2783.458, "end": 2785.809, "text": "그렇게 되면 갑자기 아이소모픽을 통해 이런 일을 할 수 있게 될 겁니다."}, {"start": 2785.86, "end": 2788.009, "text": "우리가 흔히 아는 온갖 질병들을 치료하는 거죠."}, {"start": 2788.059, "end": 2789.71, "text": "주로 부유한 국가 사람들에게"}, {"start": 2789.76, "end": 2792.608, "text": "영향을 미치는 끔찍한 질병들을 고쳐서 수익을 창출하고"}, {"start": 2792.659, "end": 2794.409, "text": "그 수익은 다시 엔진의 동력이 될 겁니다."}, {"start": 2794.46, "end": 2796.71, "text": "하지만 그 후엔 자선적인 일도 할 수 있겠죠."}, {"start": 2796.76, "end": 2801.159, "text": "회사가 수익을 전혀 기대할 필요가 없는"}, {"start": 2801.26, "end": 2803.329, "text": "그런 질병들의 치료법도 찾아낼 수 있을 겁니다."}, {"start": 2803.38, "end": 2806.128, "text": "충분히 빠르고 가격도 저렴하기 때문에"}, {"start": 2806.179, "end": 2810.579, "text": "짧은 시간 안에 바로 처리될 수 있죠."}, {"start": 2810.579, "end": 2813.528, "text": "그래서 제가 꿈꾸는 방식은 바로 이런 거예요."}, {"start": 2813.579, "end": 2817.929, "text": "아이소모픽(Isomorphic)이 전 세계에 도움이 되게 하는 것이죠."}, {"start": 2817.98, "end": 2818.73, "text": "여: 안녕하세요, 데미스."}, {"start": 2818.78, "end": 2820.827, "text": "여: 시간 내서 저희와 이야기 나눠 주셔서 정말 감사합니다."}, {"start": 2820.878, "end": 2821.827, "text": "여: 제 이름은 미키이고,"}, {"start": 2821.878, "end": 2825.528, "text": "여: 도어 지속가능성 대학원 4학년 학생입니다."}, {"start": 2825.579, "end": 2829.528, "text": "여: 당신은 범용 인공지능(AGI)이 인류에게..."}, {"start": 2829.579, "end": 2832.227, "text": "여: 얼마나 혁신적인 기술이 될 수 있는지 광범위하게 설명하셨는데요."}, {"start": 2832.277, "end": 2839.478, "text": "여: 저는 AGI가 가져올 지적 개척과 생산성뿐만 아니라,"}, {"start": 2839.48, "end": 2846.829, "text": "여: 그 사회적 영향과 책임에 대해서는 어떻게 생각하시는지 궁금합니다."}, {"start": 2846.88, "end": 2854.277, "text": "여: 특히 AGI가 우리가 해결하려는 문제들을 어떻게 재정의하고,"}, {"start": 2854.277, "end": 2858.03, "text": "여: 사람들의 모습을 어떻게 바꿔놓을지, 그 파생 효과들에 대해서 말이죠."}, {"start": 2858.081, "end": 2859.03, "text": "여: 감사합니다."}, {"start": 2859.081, "end": 2866.028, "text": "남: 네, 질문 감사합니다. 저도 이 부분은 늘 생각하고 있고 처음부터 고민해 왔습니다."}, {"start": 2866.079, "end": 2874.679, "text": "남: 성공을 염두에 두고 계획했으니까요. 15, 20년 전에는 불가능해 보였겠지만요."}, {"start": 2874.73, "end": 2880.079, "text": "남: 그래서 이런 강연을 하고 이런 자리에서 사람들을 만나는 걸 좋아합니다."}, {"start": 2880.13, "end": 2886.278, "text": "남: 지금은 일종의 행동 촉구가 필요한 시점이에요. 매우 시급한 문제죠."}, {"start": 2886.329, "end": 2893.938, "text": "남: 우리가 초래할 2차적인 결과에 대해 진지하게 고민해야 합니다. 여기 계신 인문학 전공자분들도 포함해서요."}, {"start": 2893.989, "end": 2900.239, "text": "제 생각엔 지금이 적기입니다. 일단 기술을 제대로 정립해야 하지만..."}, {"start": 2900.289, "end": 2905.637, "text": "그게 해결되면 경제적 문제가 따르고, 그마저 해결되면 철학적인..."}, {"start": 2905.688, "end": 2911.838, "text": "인간의 조건에 관한 질문이 남죠. 전 아주 기대하고 있고..."}, {"start": 2911.889, "end": 2914.137, "text": "분명히 말씀드리자면, 전 아주 낙관적입니다."}, {"start": 2914.188, "end": 2916.239, "text": "'조심스러운 낙관론자'라고 표현하고 싶네요."}, {"start": 2916.289, "end": 2919.637, "text": "우리가 이 일을 잘 해낼 거라고 아주 낙관합니다."}, {"start": 2919.688, "end": 2922.039, "text": "전 인간의 독창성을 굳게 믿거든요."}, {"start": 2922.09, "end": 2923.438, "text": "특히 압박감이 심할 때 발휘되는 능력을요."}, {"start": 2923.489, "end": 2925.639, "text": "인류는 항상 답을 찾아왔다고 생각합니다."}, {"start": 2925.69, "end": 2928.139, "text": "위기에 처했을 때 말이죠. 지금이 바로 그때고요."}, {"start": 2928.19, "end": 2930.538, "text": "하지만 이제 정말 진지하게 임해야 합니다."}, {"start": 2930.588, "end": 2933.239, "text": "기술 업계는 이미 진지하게 받아들이고 있지만,"}, {"start": 2933.289, "end": 2935.639, "text": "사회의 다른 분야도 동참해야 합니다."}, {"start": 2935.69, "end": 2938.039, "text": "경제학자들을 보면 가끔 놀라운데,"}, {"start": 2938.09, "end": 2940.639, "text": "현재 상황에 관해 그들과 이야기해 보면"}, {"start": 2940.69, "end": 2942.139, "text": "상당히 회의적이거든요."}, {"start": 2942.19, "end": 2944.139, "text": "'GDP 어디에 반영되느냐'면서요."}, {"start": 2944.19, "end": 2947.338, "text": "이건 산업 혁명의 10배 규모예요."}, {"start": 2947.389, "end": 2949.938, "text": "지금부터 계획을 세워야 하지 않을까요?"}, {"start": 2949.989, "end": 2952.378, "text": "우리가 어젯밤에 이야기했듯, 그런 세상이 올 겁니다."}, {"start": 2952.429, "end": 2956.579, "text": "이 분야들에는 거인들이 필요하다고 생각합니다"}, {"start": 2956.63, "end": 2959.378, "text": "과거의 케인즈 같은 인물들 말이죠"}, {"start": 2959.429, "end": 2961.579, "text": "그런 체제가 왜 포스트 희소성 사회에서도 유지될까요?"}, {"start": 2961.63, "end": 2963.079, "text": "우리는 사상 처음으로 이런 세상을 맞이하게 될 겁니다"}, {"start": 2963.13, "end": 2964.98, "text": "기술만 제대로 갖춰진다면요, 우리가..."}, {"start": 2965.03, "end": 2968.48, "text": "인류 역사상 처음으로 비제로섬 사회에"}, {"start": 2968.53, "end": 2974.278, "text": "진입하게 될 겁니다. 새로운 경제 시스템이 필요하지 않겠어요? 당연히 필요하죠. 그리고 제 생각에..."}, {"start": 2974.329, "end": 2979.579, "text": "우리가 시도했던 그 어떤 시스템도 맞지 않을 겁니다. 전부 제로섬 게임이나"}, {"start": 2979.63, "end": 2988.878, "text": "한정되고 결핍된 세상을 전제로 만들어졌으니까요. 제가 말하는 건 별들을 여행하며 태양계에 있는"}, {"start": 2988.929, "end": 2993.48, "text": "모든 자원을 활용하는 것입니다. 지구의 한정된 자원만이 아니라요. 그리고 저는"}, {"start": 2993.53, "end": 2998.48, "text": "앞으로 10년, 20년, 30년 안에 기술만 뒷받침된다면 실제로 일어날 일이라고 봅니다."}, {"start": 2998.53, "end": 3001.38, "text": "그리고 그 모든 것 이후에는 훨씬 더 어려운 질문이 남습니다"}, {"start": 3001.431, "end": 3004.88, "text": "우리 사회를 어떻게 진화시키고 싶은지"}, {"start": 3004.931, "end": 3007.677, "text": "무엇이 미덕이고, 의미이며, 목적인가 하는 것들이죠."}, {"start": 3007.728, "end": 3010.378, "text": "여기에는 수많은 위대한 철학자들이 필요할 겁니다."}, {"start": 3010.429, "end": 3014.378, "text": "그래서 그분들과 그 분야에 계신 분들께 호소하고 싶습니다."}, {"start": 3014.429, "end": 3016.98, "text": "제 견해로는 지금이 그 어느 때보다도 흥미로운 시기입니다"}, {"start": 3017.03, "end": 3019.681, "text": "이런 종류의 프로젝트에 참여하고 있다면 말이죠."}, {"start": 3019.731, "end": 3021.778, "text": "여러분이 상황을 이해하고..."}, {"start": 3021.829, "end": 3025.858, "text": "정말 본능적으로 이해하고 그 흐름에 몸을 맡긴다면요."}, {"start": 3025.909, "end": 3029.458, "text": "여기서 실제로 어떤 일이 일어나고 있는지요."}, {"start": 3029.509, "end": 3030.96, "text": "네, 아주 좋은 질문이네요."}, {"start": 3031.01, "end": 3033.059, "text": "좋아요, 학생 질문 하나 더 받죠."}, {"start": 3033.11, "end": 3034.059, "text": "여: 안녕하세요, 데미스. 자나이라고 합니다."}, {"start": 3034.11, "end": 3036.057, "text": "여: MBA 과정 2학년 학생이에요."}, {"start": 3036.108, "end": 3039.659, "text": "여: 질문하고 싶은 건, AI가 이번 생에서"}, {"start": 3039.71, "end": 3040.759, "text": "여: 건드리지 않았으면 하는 게 있는지,"}, {"start": 3040.809, "end": 3043.059, "text": "여: 본인의 관점에서 무엇을 가장 소중히 여기시는지 궁금합니다."}, {"start": 3043.11, "end": 3045.21, "text": "여: 감사합니다."}, {"start": 3045.21, "end": 3046.259, "text": "남: 네, 정말 좋은 질문이네요."}, {"start": 3046.309, "end": 3053.708, "text": "남: 글쎄요, 과학계의 관점에서 보자면 AI는..."}, {"start": 3053.809, "end": 3054.96, "text": "남: 그런 분야의 기술이죠."}, {"start": 3055.01, "end": 3056.759, "text": "남: 완전한 범용 기술이잖아요."}, {"start": 3056.809, "end": 3059.059, "text": "남: 튜링 머신이라고 생각하면 됩니다."}, {"start": 3059.11, "end": 3060.259, "text": "남: 제가 평소 그렇게 생각하곤 하죠."}, {"start": 3060.309, "end": 3062.858, "text": "남: 대학 시절 제가 가장 좋아했던 강의였거든요."}, {"start": 3062.909, "end": 3066.76, "text": "남: 그리고 우리 인간의 정신도 사실 완전히 범용적이라고 생각해요."}, {"start": 3066.811, "end": 3068.76, "text": "남: 우리는 일종의 근사치 튜링 머신인 셈이죠."}, {"start": 3068.811, "end": 3071.159, "text": "남: 튜링이 보여줬듯이, 계산 가능한 것이라면..."}, {"start": 3071.21, "end": 3073.769, "text": "남: 무엇이든 튜링 머신이 계산할 수 있습니다."}, {"start": 3073.82, "end": 3076.468, "text": "우주에 존재하는 대부분의 것들,"}, {"start": 3076.518, "end": 3079.168, "text": "즉 비양자적인 것들은 모두 계산 가능합니다"}, {"start": 3079.219, "end": 3081.769, "text": "이는 우리가 지적 역량을 발휘할 수 있는"}, {"start": 3081.82, "end": 3083.369, "text": "대상의 범위가 매우 방대하다는 뜻이죠"}, {"start": 3083.42, "end": 3085.168, "text": "덕분에 우리는 현대 문명을 건설했습니다"}, {"start": 3085.219, "end": 3087.269, "text": "곰곰이 생각해보면 정말 기적 같은 일이죠"}, {"start": 3087.32, "end": 3088.967, "text": "하지만 우린 이에 대해 충분히 경탄하지 않는 것 같아요"}, {"start": 3089.018, "end": 3093.07, "text": "그런 경이로움을 충분히 오랫동안 간직하지 못하죠"}, {"start": 3093.121, "end": 3096.369, "text": "또한 우리가 구축 중인 시스템들 역시"}, {"start": 3096.42, "end": 3098.968, "text": "일종의 '튜링 완전'한 성능을 갖추게 될 것임을 의미합니다"}, {"start": 3099.018, "end": 3103.668, "text": "한 가지 말씀드리고 싶은 건, 앞으로 마주할 거대한 질문들에 대해"}, {"start": 3103.719, "end": 3107.269, "text": "더 많은 시간을 들여 고민하는 편이 좋겠다는 겁니다"}, {"start": 3107.32, "end": 3110.471, "text": "요즘 뜨거운 화두 중 하나인 '의식'을 예로 들어보죠"}, {"start": 3110.521, "end": 3115.568, "text": "의식은 철학이나 신경과학 분야에서도 여전히 정의하기 까다로운 문제입니다"}, {"start": 3115.619, "end": 3119.568, "text": "비록 그 핵심 요소가 무엇인지에 대한 직관은 우리 모두에게 있겠지만요"}, {"start": 3119.619, "end": 3126.769, "text": "제 생각에 현재의 시스템은 의식을 보여주지 않지만, 이에 동의하지 않는 이들도 있습니다"}, {"start": 3126.82, "end": 3131.968, "text": "AI가 침범하지 말아야 할 영역에 관해 제가 권하고 싶은 건"}, {"start": 3132.018, "end": 3137.369, "text": "우선 첫 시스템을 지능적인 '도구'로 만드는 겁니다. 그것만으로도 충분히 어려운 과제니까요"}, {"start": 3137.42, "end": 3143.568, "text": "그 자체가 이미 AGI이기 때문입니다. 그런 다음 그 도구를 활용해 신경과학이나"}, {"start": 3143.619, "end": 3148.73, "text": "철학 등을 연구하며 더욱 엄밀한 정의를 정립해 나가야 합니다"}, {"start": 3148.78, "end": 3154.028, "text": "남: ...의식과 같은 것들 말입니다. 가능하다고 봅니다. 그러고 나서..."}, {"start": 3154.079, "end": 3159.528, "text": "남: 그것을 검증하겠죠. 그러고 나면 아마 사회가 결정해야 할 겁니다. 두 번째 루비콘 강을 건너서..."}, {"start": 3159.579, "end": 3165.628, "text": "남: 우리에게 의식이 있는 것처럼 보이는 존재를 만들지 말지 말입니다. 그런 결정을 내리고 싶지 않을 수도 있죠."}, {"start": 3165.679, "end": 3171.329, "text": "남: 지능과 의식은 서로 분리될 수 있다고 생각합니다. 따라서 반드시..."}, {"start": 3171.38, "end": 3173.03, "text": "남: 지능형 시스템을 갖추기 위해 그럴 필요는 없죠."}, {"start": 3173.081, "end": 3174.23, "text": "남: 그건 선택의 문제라고 봅니다."}, {"start": 3174.28, "end": 3178.23, "text": "남: 우리 중 일부는... 아마 여러분도 느끼고 계실 텐데요,"}, {"start": 3178.28, "end": 3180.829, "text": "남: 주요 챗봇들을 사용해 보면,"}, {"start": 3180.88, "end": 3184.449, "text": "남: 의견 차이가 드러나는 것을요."}, {"start": 3184.5, "end": 3186.451, "text": "남: 제 견해로는 그 과정을..."}, {"start": 3186.501, "end": 3190.25, "text": "남: 두 단계로 나누는 것이 낫다고 봅니다. 인류에게는 둘 다 엄청난 일이지만,"}, {"start": 3190.3, "end": 3193.05, "text": "남: 둘을 하나로 섞기보다는요."}, {"start": 3193.101, "end": 3197.048, "text": "사회자: 데미스, 지금 강당에 많은 학생이 모여 있는데요."}, {"start": 3197.099, "end": 3201.849, "text": "사회자: 본인이 다시 학생 시절로 돌아간다면 무엇을 고민하고,"}, {"start": 3201.9, "end": 3206.349, "text": "사회자: 무엇을 공부할 것 같은가요? 학생들에게 어떤..."}, {"start": 3206.4, "end": 3210.269, "text": "사회자: 진로를 위한 공부 방향에 대해 어떤 조언을 해주고 싶으신가요?"}, {"start": 3210.32, "end": 3218.548, "text": "데미스: 음, 제가 지금 대학생이라면 정말 설렐 것 같네요. 제가 추천하는 건,"}, {"start": 3218.599, "end": 3222.849, "text": "데미스: 과학이나 STEM 분야, 수학, 컴퓨터 과학을 전공하는 분들이라면,"}, {"start": 3222.9, "end": 3229.65, "text": "데미스: 계속 그 길을 가라는 겁니다. 이런 도구들이 어떻게 만들어졌는지 이해한다면,"}, {"start": 3229.701, "end": 3233.059, "text": "데미스: 이것들을 훨씬 더 잘 활용하고 잠재력을 끌어낼 수 있을 테니까요."}, {"start": 3233.11, "end": 3238.059, "text": "적어도 향후 10년 동안은 이런 추세가 지속될 것으로 보입니다."}, {"start": 3238.11, "end": 3242.86, "text": "저는 우리가 이 상황을 부정하기보다는 받아들여야 한다고 생각해요."}, {"start": 3242.911, "end": 3247.659, "text": "이미 엎질러진 물이나 다름없으니, 이 도구들의 가능성에 집중해 보세요."}, {"start": 3247.71, "end": 3252.559, "text": "지금 선두적인 연구소들은 도구를 개발하느라 아주 바쁩니다."}, {"start": 3252.61, "end": 3257.958, "text": "그래서 이 도구들이 실제로 무엇을 할 수 있는지 다 파악하지도 못한 상태죠."}, {"start": 3258.009, "end": 3262.159, "text": "지금 당장의 도구들도요. 흔히들 '능력 과잉' 상태라고 부르기도 합니다."}, {"start": 3262.21, "end": 3267.559, "text": "다른 요소들과 어떻게 결합하느냐에 따라 잠재력은 무궁무진합니다."}, {"start": 3267.61, "end": 3271.559, "text": "여러분이 전문가인 분야와 접목해 보거나,"}, {"start": 3271.61, "end": 3277.358, "text": "업무 과정에 흥미로운 방식으로 녹여내 보세요. 여러분은 가장 강력한 무기를 가진 셈입니다."}, {"start": 3277.409, "end": 3281.559, "text": "그 도구가 여러분의 손안에 있으니까요. 개인으로서 할 수 있는 일이 훨씬 많아졌습니다."}, {"start": 3281.61, "end": 3287.557, "text": "인문학이나 제품 기획, 경영을 공부하는 분들에게는 창의성을 발휘할 기회가 될 거예요."}, {"start": 3287.608, "end": 3291.26, "text": "예전에는 코딩 실력이 없어서 포기했던 일들도,"}, {"start": 3291.311, "end": 3295.759, "text": "이제는 이 도구들을 통해 머릿속 구상을 얼마든지 실현할 수 있습니다."}, {"start": 3295.809, "end": 3296.759, "text": "그렇지 않나요?"}, {"start": 3296.809, "end": 3301.657, "text": "또한 코딩을 잘하는 분들도 백 배 이상의 성과를 낼 수 있다고 봅니다."}, {"start": 3301.708, "end": 3304.858, "text": "코딩 실력이 뒷받침된다면 훨씬 거대한 규모의 프로젝트를"}, {"start": 3304.909, "end": 3305.759, "text": "직접 수행할 수 있을 테니까요."}, {"start": 3305.809, "end": 3309.358, "text": "결국 기술의 민주화와 전문성 강화라는 두 마리 토끼를 다 잡는 셈이죠."}, {"start": 3309.409, "end": 3311.157, "text": "특정 분야의 전문가들에게도 마찬가지고요."}, {"start": 3311.208, "end": 3314.898, "text": "정말 놀라운 시대지만, 한편으로는 걱정되는 마음도 충분히 이해합니다."}, {"start": 3314.949, "end": 3316.298, "text": "모든 것이 변할 것이기 때문입니다."}, {"start": 3316.349, "end": 3318.099, "text": "그래서 제가 확실히 말씀드릴 수 있는 건,"}, {"start": 3318.15, "end": 3320.699, "text": "향후 10년 동안 모든 것이 변할 거라는 점입니다."}, {"start": 3320.75, "end": 3322.5, "text": "아마 사람들이 짐작하는 것보다 훨씬 더 많이요."}, {"start": 3322.55, "end": 3325.099, "text": "하지만 그런 거대한 변화가 일어나는 시기에는"}, {"start": 3325.15, "end": 3327.798, "text": "그만큼 엄청난 기회도 따르기 마련입니다."}, {"start": 3327.849, "end": 3328.898, "text": "반드시 그럴 수밖에 없죠."}, {"start": 3328.949, "end": 3329.699, "text": "그렇죠?"}, {"start": 3329.75, "end": 3331.197, "text": "이제 정말 세상은 여러분의 무대입니다."}, {"start": 3331.248, "end": 3332.597, "text": "지금 여러분이 조금 부럽기도 하네요."}, {"start": 3332.648, "end": 3335.697, "text": "여러분은 사상 첫 'AI 네이티브' 세대가 될 테니까요."}, {"start": 3335.748, "end": 3339.099, "text": "저희 세대가 컴퓨터와 인터넷 네이티브였던 것처럼 말이죠."}, {"start": 3339.15, "end": 3342.197, "text": "결국 여러분의 손에 달려 있습니다."}, {"start": 3342.248, "end": 3345.298, "text": "여기 계신 학생분들이 미래의 세상을"}, {"start": 3345.349, "end": 3351.798, "text": "어떻게 만들어 나갈지 말입니다. 올바른 관점으로 본다면 정말 설레는 시대라고 생각해요."}, {"start": 3351.849, "end": 3356.699, "text": "적절한 시각과 풍부한 상상력, 창의력을 발휘한다면요. 사실 이건 언제나"}, {"start": 3356.75, "end": 3364.5, "text": "맞는 말이었지만, 지금처럼 엄청난 변화의 시기에는 그런 점이 더 강조됩니다."}, {"start": 3364.55, "end": 3366.099, "text": "그런 변화가 그 점을 더 부각하죠."}, {"start": 3366.15, "end": 3370.5, "text": "남: 어제저녁에도 이야기했지만, 미래가 어떻게 될지 알 수 없는"}, {"start": 3370.55, "end": 3376.5, "text": "남: 격변의 시기에는 적응력을 갖추고 폭넓은 분야의 지식을 쌓아야 합니다."}, {"start": 3376.55, "end": 3380.739, "text": "남: 바야흐로 인문 교양 교육의 황금기가 도래할 것입니다."}, {"start": 3380.789, "end": 3386.639, "text": "그러니까 제 생각에 가장 중요한 건, 본인의 주도권을 믿고 밀어붙이는 거예요. 미래는 여전히..."}, {"start": 3386.69, "end": 3390.338, "text": "우리가 직접 써 내려가는 것이니까요. 그러니 그렇지 않다는 사람들의 말은 듣지 마세요."}, {"start": 3390.389, "end": 3391.889, "text": "네."}, {"start": 3391.891, "end": 3400.09, "text": "데미스, 함께해 주셔서 감사합니다. 정말 멋진 시간이었어요. [박수 소리]"}];
let player;
function onYouTubeIframeAPIReady(){
    player=new YT.Player('player',{
        videoId:videoId,
        playerVars:{autoplay:1,controls:1,rel:0,modestbranding:1,fs:0,disablekb:1,cc_load_policy:3},
        events:{
            'onReady': function(e){ 
                // [V160.4] 유튜브 기본 자막이 같이 켜져서 두 개로 겹쳐 보이는 현상 방지 🐾
                try { e.target.unloadModule("captions"); } catch(err) {} 
            },
            'onStateChange':onPlayerStateChange
        }
    });
}

// [V160.1] AI냥: 유튜브 고유 단축키 무력화 후, 'f' 키 등 사용자 편의 조작을 가로채서 자체 전체화면 실행! 🐱✨
window.addEventListener('keydown', function(e) {
    if (!player || !player.getPlayerState || typeof player.getDuration !== 'function') return;

    // Ctrl + ArrowLeft: Previous Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowLeft') {
        const t = player.getCurrentTime();
        let target = Math.max(0, t - 5);
        for(let i = subs.length - 1; i >= 0; i--) {
            if(subs[i].start < t - 1.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    // Ctrl + ArrowRight: Next Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowRight') {
        const t = player.getCurrentTime();
        let target = t + 5;
        for(let i = 0; i < subs.length; i++) {
            if(subs[i].start > t + 0.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    if (e.key.toLowerCase() === 'f') {
        toggleFullScreen();
        e.preventDefault();
    } else if (e.key === ' ' || e.key.toLowerCase() === 'k') {
        if (player.getPlayerState() === 1) player.pauseVideo();
        else player.playVideo();
        e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
        player.seekTo(player.getCurrentTime() - 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowRight') {
        player.seekTo(player.getCurrentTime() + 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowUp') {
        player.setVolume(player.getVolume() + 5);
        e.preventDefault();
    } else if (e.key === 'ArrowDown') {
        player.setVolume(player.getVolume() - 5);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'm') {
        player.isMuted() ? player.unMute() : player.mute();
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'j') {
        player.seekTo(player.getCurrentTime() - 10, true);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'l') {
        player.seekTo(player.getCurrentTime() + 10, true);
        e.preventDefault();
    } else if (e.key >= '0' && e.key <= '9') {
        const fraction = parseInt(e.key) / 10;
        player.seekTo(player.getDuration() * fraction, true);
        e.preventDefault();
    }
});

// iframe 클릭 시 빼앗긴 포커스를 0.1초 뒤에 훔쳐와서 'f' 등 단축키가 계속 먹히도록 유지! 🕵️‍♂️✨
window.addEventListener('blur', function() {
    setTimeout(() => {
        if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
            window.focus();
        }
    }, 100);
});
let syncInterval;
let activityTimeout;
function resetActivity() {
    const fsBtn = document.getElementById('fs-btn');
    const subsEl = document.getElementById('subtitles');
    if(fsBtn) fsBtn.classList.remove('fade-out');
    if(subsEl) subsEl.classList.remove('ui-hidden');
    clearTimeout(activityTimeout);
    if (player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING) {
        activityTimeout = setTimeout(() => {
            if(fsBtn) fsBtn.classList.add('fade-out');
            if(subsEl) subsEl.classList.add('ui-hidden');
        }, 3000);
    }
}
document.addEventListener('mousemove', resetActivity);
document.addEventListener('touchstart', resetActivity, {passive: true});
document.addEventListener('keydown', resetActivity);
window.addEventListener('blur', resetActivity);
window.addEventListener('focus', resetActivity);

function onPlayerStateChange(event){
    resetActivity();
    if(event.data==YT.PlayerState.PLAYING){
        if(!syncInterval) syncInterval=setInterval(updateSubs,100);
    }else{
        clearInterval(syncInterval); syncInterval=null;
    }
}
function updateSubs(){
    const t=player.getCurrentTime();
    let currentHtml="";
    let activeSubs = [];
    for(let i=0;i<subs.length;i++){
        if(t>=subs[i].start && t<=subs[i].end){
            activeSubs.push(subs[i]);
        }
    }
    if(activeSubs.length > 0){
        // [V160.5] AI 번역 생성 시 자막 시간이 미세하게 겹쳐(Overlap) 동일한 내용이 두 줄로 출력되는 현상 방지! 
        // 겹치는 자막 중 가장 마지막 매칭 항목 하나만 렌더링 🐾
        let bestSub = activeSubs[activeSubs.length - 1];
        currentHtml = `<div class="sub-line">${bestSub.text}</div><br>`;
    }
    if(document.getElementById('subtitles').innerHTML !== currentHtml){
        document.getElementById('subtitles').innerHTML=currentHtml;
    }
}

let isDragging=false, startY, currentBottom, subEl=document.getElementById('subtitles');
document.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchstart', dragStart, {passive:false});
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('touchend', dragEnd);

function dragStart(e) {
    if(!e.target.classList.contains('sub-line')) return;
    isDragging = true;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    startY = clientY;
    let style = window.getComputedStyle(subEl);
    currentBottom = parseFloat(style.bottom) || 0;
    subEl.classList.add('dragging');
    e.preventDefault();
}
function dragMove(e) {
    if(!isDragging) return;
    // [FIX] iframe 등에 의해 mouseup 이벤트를 놓쳤지만 마우스 버튼은 떼어진 경우 강제 드래그 종료! 🛡️✨
    if(e.type.includes('mouse') && e.buttons === 0) {
        dragEnd(e);
        return;
    }
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    let dy = clientY - startY;
    subEl.style.bottom = (currentBottom - dy) + 'px';
    if(e.cancelable) e.preventDefault();
}
function dragEnd(e) {
    isDragging = false;
    subEl.classList.remove('dragging');
}

// [Wheel / Pinch to Zoom for Font Size]
let currentFontSize = 4.5;
let initialDist = 0;
let initialFontSize = 4.5;

document.addEventListener('wheel', (e) => {
    if(e.target.closest('#subtitles') || e.target.classList.contains('sub-line')) {
        e.preventDefault();
        currentFontSize += e.deltaY < 0 ? 0.2 : -0.2;
        currentFontSize = Math.max(1, Math.min(20, currentFontSize));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
    }
}, {passive: false});

document.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialFontSize = currentFontSize;
        e.preventDefault();
    }
}, {passive: false});

document.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        let scale = currentDist / initialDist;
        currentFontSize = Math.max(1, Math.min(20, initialFontSize * scale));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
        e.preventDefault();
    }
}, {passive: false});
