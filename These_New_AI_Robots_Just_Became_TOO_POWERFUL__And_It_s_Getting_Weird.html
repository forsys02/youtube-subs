const subs=[{"start": 4.089, "end": 12.038, "text": "2026년, AI 로봇들이 한계를 넘어서고 있습니다. 보스턴 다이내믹스의 아틀라스는 이제 축구를 배우며 화려한 킥을 선보이고,"}, {"start": 12.089, "end": 18.939, "text": "소형 냉장고를 아무렇지도 않게 들어 올립니다. 피규어 03은 유튜브 생중계로 200시간 이상 작동하며"}, {"start": 18.989, "end": 26.64, "text": "실제 작업자처럼 택배 상자를 분류했죠. 유니트리의 G1은 이제 음성 명령을 듣고 실시간으로 반응합니다."}, {"start": 26.69, "end": 31.338, "text": "LG는 여러 로봇이 마치 하나의 연결된 창고 팀처럼 협업하는 모습을 보여주었습니다."}, {"start": 31.388, "end": 35.038, "text": "테슬라는 옵티머스 생산을 위해 프리몬트 라인을 준비 중이며,"}, {"start": 35.088, "end": 38.24, "text": "리맥스 루나는 로봇 슈퍼모델처럼 런웨이를 걸었습니다."}, {"start": 38.289, "end": 42.54, "text": "이런 변화 속에서 AI 리더들은 경고의 목소리를 내기 시작했습니다."}, {"start": 42.59, "end": 44.84, "text": "아틀라스 로봇이 방금 대대적인 업그레이드를 마쳤습니다."}, {"start": 44.89, "end": 46.84, "text": "이제 단순히 로봇처럼 움직이는 게 아니라,"}, {"start": 46.89, "end": 48.24, "text": "운동선수처럼 움직이죠."}, {"start": 48.289, "end": 51.54, "text": "보스턴 다이내믹스는 아틀라스가 축구 풋워크를 배우는 모습을 공개했는데,"}, {"start": 51.59, "end": 56.239, "text": "고난도 킥을 성공시키고 현실 같지 않은 균형 감각으로 움직입니다."}, {"start": 56.289, "end": 62.639, "text": "아틀라스는 100파운드가 넘는 소형 냉장고를 들고 회전한 뒤, 중심을 잃지 않고 바닥에 내려놓기도 했습니다."}, {"start": 62.689, "end": 67.338, "text": "또한 보스턴 다이내믹스는 아틀라스를 대량 생산하기 위한 계획도 밝혔습니다."}, {"start": 67.388, "end": 71.53999999999999, "text": "현대와 보스턴 다이내믹스는 '축구 학교'라는 새로운 시리즈를 런칭했습니다."}, {"start": 71.59, "end": 73.939, "text": "전체 타이틀은 한 가지 간단한 질문을 던집니다."}, {"start": 73.989, "end": 76.638, "text": "\"축구가 정말 로봇에게 움직이는 법을 가르칠 수 있을까?\""}, {"start": 76.688, "end": 80.84, "text": "이는 현대자동차의 공식 2026 FIFA 월드컵 캠페인의 일환입니다."}, {"start": 80.89, "end": 85.439, "text": "이미 네 개의 에피소드가 공개되었죠. 첫 번째 에피소드에서 아틀라스는 기초를 배웁니다."}, {"start": 85.489, "end": 89.239, "text": "과거 월드컵 영상을 연구하고 경기장에서 직접 풋워크를 따라 하죠."}, {"start": 89.289, "end": 92.84, "text": "드리블과 페인트 동작, 훈련은 물론 깜찍한 세리머니까지 보여주네요."}, {"start": 92.89, "end": 96.03999999999999, "text": "진짜 선수처럼 양팔을 번쩍 들고 한쪽 무릎을 굽히기도 합니다."}, {"start": 96.09, "end": 98.14099999999999, "text": "2화는 온통 '킥'에 관한 이야기입니다."}, {"start": 98.191, "end": 102.239, "text": "여기서 아틀라스는 협응력과 균형 감각, 정교함, 그리고 원초적인 힘을 단련하죠."}, {"start": 102.289, "end": 106.84, "text": "그리고 3화에선 '라보나' 기술을 선보였는데요. 축구를 잘 모르시는 분들을 위해 설명하자면,"}, {"start": 106.89, "end": 110.34, "text": "기술적으로 가장 현란하면서도 엄청난 신체 능력을 요구하는 기술 중 하나입니다."}, {"start": 110.39, "end": 114.439, "text": "한쪽 다리를 다른 쪽 다리 뒤로 꼬아서 공을 차야 하는 기술인데,"}, {"start": 114.489, "end": 117.439, "text": "이걸 깔끔하게 성공시키려면 그야말로 엘리트 수준의 컨트롤이 필요하죠."}, {"start": 117.489, "end": 118.739, "text": "그런데 아틀라스가 그걸 해냅니다."}, {"start": 118.789, "end": 122.939, "text": "방금 보신 모든 동작은 '엔터프라이즈' 버전 아틀라스가 보여준 것입니다."}, {"start": 122.989, "end": 124.939, "text": "우린 이미 유압식 아틀라스를 봤고,"}, {"start": 124.989, "end": 127.138, "text": "최초의 전기식 아틀라스도 확인했었죠."}, {"start": 127.188, "end": 130.239, "text": "둘 다 강력해 보였고 화려한 묘기도 가능했지만,"}, {"start": 130.289, "end": 133.339, "text": "이 엔터프라이즈 버전은 차원이 완전히 다릅니다."}, {"start": 133.389, "end": 136.44, "text": "엔터프라이즈 아틀라스는 사실 축구를 할 필요조차 없다는 걸 잊지 마세요."}, {"start": 136.49, "end": 138.638, "text": "원래 고된 산업 현장 업무를 위해 제작된 로봇이니까요."}, {"start": 138.688, "end": 141.54, "text": "그러니 이렇게 우아하게 움직이는 모습은 정말 놀라울 따름입니다."}, {"start": 141.591, "end": 146.44, "text": "정말 인상적이고 믿기 힘들 정도지만, 축구는 이번 주 소식의 절반에 불과합니다."}, {"start": 146.49, "end": 147.44, "text": "이번 주는 말이죠."}, {"start": 147.49, "end": 151.439, "text": "보스턴 다이내믹스에선 훨씬 더 육중한 무언가의 제작 비하인드도 공개했습니다."}, {"start": 151.49, "end": 155.439, "text": "영상 속 아틀라스는 100파운드가 넘는 미니 냉장고를 들어 올립니다."}, {"start": 155.49, "end": 160.138, "text": "몸을 굽혀 냉장고를 잡고, 든 상태에서 그대로 180도 회전하죠."}, {"start": 160.188, "end": 163.44, "text": "그러고는 균형을 단 한 번도 잃지 않고 냉장고를 내려놓습니다."}, {"start": 163.49, "end": 166.838, "text": "보통 두 사람이 해야 할 일이지만, 아틀라스는 혼자서 해냅니다."}, {"start": 166.889, "end": 168.539, "text": "그리고 여기 놀라운 사실이 하나 더 있습니다."}, {"start": 168.59, "end": 174.04, "text": "아틀라스는 주로 50~70파운드 사이의 무게로 훈련받았는데,"}, {"start": 174.091, "end": 175.64, "text": "테스트 중에 훨씬 더 무거운 냉장고를 다룬 겁니다."}, {"start": 175.691, "end": 178.44, "text": "이는 단순히 입력된 동작을 반복하는 게 아니라는 걸 증명하죠."}, {"start": 178.49, "end": 181.54, "text": "실시간으로 새로운 도전 과제에 적응하고 있었던 겁니다."}, {"start": 181.591, "end": 185.04, "text": "가장 놀라운 점은 아틀라스가 카메라를 거의 사용하지 않는다는 거예요."}, {"start": 185.091, "end": 188.939, "text": "대신 자신의 몸을 통해 무게와 압력, 그리고 균형을 직접 느낍니다."}, {"start": 188.99, "end": 192.439, "text": "이 감각은 '고유 수용 감각'이라 불리는데, 엔지니어들이 붙인 이름이죠."}, {"start": 192.49, "end": 197.338, "text": "단순히 말해, 아틀라스가 내부에서 자신의 관절 상태와 힘을 읽어낸다는 뜻입니다. 그런데 말입니다."}, {"start": 197.389, "end": 200.64, "text": "개발팀은 올해 말까지 이 목표를 달성할 계획이었는데요."}, {"start": 200.691, "end": 205.238, "text": "하지만 단 2주 만에 과제를 끝내버렸습니다. 그런데 진짜 흥미로운 부분은 따로 있습니다."}, {"start": 205.288, "end": 206.839, "text": "장기적인 관점에서 보면 말이죠."}, {"start": 206.889, "end": 210.838, "text": "솔직히 이 이야기는 아직 충분한 관심을 받지 못하고 있어요."}, {"start": 210.889, "end": 213.838, "text": "보스턴 다이내믹스는 단순히 인상적인 로봇을 만드는 게 아닙니다."}, {"start": 213.889, "end": 217.737, "text": "그들은 실제로 대량 생산이 가능한 로봇을 만들고 있는 것이고,"}, {"start": 217.788, "end": 221.399, "text": "이를 실현하기 위해 매우 정교한 공학적 선택을 내린 겁니다."}, {"start": 221.449, "end": 226.399, "text": "바로 액추에이터죠. 아틀라스의 전신은 단 두 종류의 부품으로만 구동됩니다. 사소한"}, {"start": 226.449, "end": 231.2, "text": "디테일 같지만, 제조 공정에선 가히 혁신적이라 할 수 있죠. 액추에이터를 단 두 종류로 표준화하면"}, {"start": 231.251, "end": 235.5, "text": "플랫폼 전반에 걸쳐 생산 효율이 높아지고 개선 속도가 빨라지며,"}, {"start": 235.55, "end": 240.697, "text": "대량 생산 시 비용을 획기적으로 절감할 수 있습니다. 또한 모두 회전형 액추에이터라"}, {"start": 240.747, "end": 245.899, "text": "시뮬레이션에서 정확하게 구현하기 훨씬 수월하죠. 이는 곧 보스턴 다이내믹스가"}, {"start": 245.949, "end": 249.298, "text": "새로운 로봇 동작을 얼마나 빨리 학습하고 실전에 배치할 수 있느냐로 직결됩니다."}, {"start": 249.348, "end": 252.399, "text": "다음은 몸 전체에 적용된 디자인 대칭성입니다."}, {"start": 252.449, "end": 254.298, "text": "양쪽 다리 구조가 서로 완전히 동일하고"}, {"start": 254.348, "end": 255.599, "text": "양팔 또한 마찬가지입니다."}, {"start": 255.65, "end": 260.0, "text": "어깨와 어깨, 골반과 골반의 구조 역시 완벽하게 대칭을 이루죠."}, {"start": 260.05, "end": 262.8, "text": "부품 종류가 적다는 건 공급망이 단순해진다는 뜻이며"}, {"start": 262.85, "end": 267.5, "text": "제조부터 현장 수리에 이르기까지 모든 단계에서 유지보수 문제는 줄어들고"}, {"start": 267.55, "end": 268.699, "text": "비용은 낮아집니다."}, {"start": 268.749, "end": 273.098, "text": "가장 앞서나간 설계 결정 중 하나는 아틀라스의 액추에이터가 무한"}, {"start": 273.149, "end": 274.098, "text": "회전이 가능하다는 점입니다."}, {"start": 274.149, "end": 277.098, "text": "관절의 모든 케이블을 제거함으로써 이를 실현했죠."}, {"start": 277.149, "end": 281.899, "text": "케이블은 로봇 하드웨어 고장을 일으키는 고질적이고 주요한 원인 중 하나였습니다."}, {"start": 281.949, "end": 283.699, "text": "마모되고, 꼬이고, 결국엔 끊어지니까요."}, {"start": 283.749, "end": 285.899, "text": "케이블을 없애면 고장 원인도 사라지는 법입니다."}, {"start": 285.949, "end": 292.879, "text": "그 결과, 아틀라스는 기존 휴머노이드가 흉내 낼 수 없는 방식으로 움직이며, 고객의 유지보수 비용 또한 획기적으로 낮출 수 있게 되었습니다."}, {"start": 292.93, "end": 295.68, "text": "발 부분에도 작지만 시사하는 바가 큰 디테일이 있습니다."}, {"start": 295.73, "end": 300.879, "text": "앞뒤가 대칭이라서 아틀라스는 전진과 후진을 똑같이 원활하게 할 수 있죠."}, {"start": 300.93, "end": 305.879, "text": "이런 설계 방식은 실제 산업 현장을 위해 로봇을 만들 때나 중요하지,"}, {"start": 305.93, "end": 306.879, "text": "단순히 전시용 무대에서는 필요 없습니다."}, {"start": 306.93, "end": 312.879, "text": "마지막으로 팔, 다리, 손, 머리는 모두 현장에서 몇 분 만에 교체 가능한 유닛입니다."}, {"start": 312.93, "end": 318.879, "text": "가동 중단이 큰 손실로 이어지는 대규모 운용 환경에서 이건 단순히 있으면 좋은 기능이 아니라,"}, {"start": 318.93, "end": 319.879, "text": "필수적인 요소입니다."}, {"start": 319.93, "end": 326.879, "text": "마지막 핵심이자 기술적으로 가장 중요한 건 시뮬레이션과 현실의 격차를 좁히기 위한 성과입니다."}, {"start": 326.93, "end": 329.879, "text": "이것은 로봇 공학계의 오랜 난제였습니다."}, {"start": 329.93, "end": 334.478, "text": "시뮬레이션에서 학습한 동작을 실제 하드웨어에 적용하면 실패하기 일쑤인데,"}, {"start": 334.528, "end": 338.879, "text": "현실에는 마찰, 지연, 센서 노이즈 등 수백 가지 변수가 존재하지만"}, {"start": 338.93, "end": 341.478, "text": "시뮬레이션은 이를 완벽하게 포착하지 못하기 때문이죠."}, {"start": 341.528, "end": 343.978, "text": "작은 차이가 모여 결국 커다란 실패로 이어지는 겁니다."}, {"start": 344.028, "end": 348.579, "text": "이번 세대 아틀라스를 통해 보스턴 다이내믹스는 그 격차를 해소하는 데"}, {"start": 348.629, "end": 350.778, "text": "아마 이 분야의 누구보다도 가까워졌습니다."}, {"start": 350.829, "end": 355.879, "text": "그 이유는 하드웨어 설계 덕분인데, 아틀라스는 단 두 종류의 대칭적이고"}, {"start": 355.93, "end": 361.781, "text": "예측 가능한 액추에이터만 사용하여 시뮬레이션에서 매우 정교한 모델링이 가능합니다."}, {"start": 361.831, "end": 364.079, "text": "시뮬레이션에서 되는 건 실제 로봇에서도 됩니다."}, {"start": 364.129, "end": 369.478, "text": "오늘 학습시켜 내일 배포하고, 데이터를 수집해 몇 시간 만에 개선하는 체계죠."}, {"start": 369.528, "end": 375.319, "text": "또한 도메인 랜덤화를 적용해, 아틀라스가 결코 완벽한 환경에서만 연습하지 않게 했습니다."}, {"start": 375.37, "end": 379.92, "text": "냉장고 무게는 매번 달라지고 바닥 마찰력도 변하며 내부 하중도 요동칩니다."}, {"start": 379.97, "end": 383.62, "text": "로봇은 매 순간 적응해야 하며, 이는 로봇의 강인함으로 이어지죠."}, {"start": 383.67, "end": 387.218, "text": "실제 세상에서 뭔가 어긋나더라도, 이미 시뮬레이션에서 수천 번의"}, {"start": 387.269, "end": 389.92, "text": "시행착오를 거친 후입니다."}, {"start": 389.97, "end": 393.819, "text": "덕분에 아틀라스는 원래 훈련받았던 것보다 30~50파운드나 더 무거운 냉장고를"}, {"start": 393.869, "end": 395.92, "text": "거뜬히 들어 올릴 수 있었습니다."}, {"start": 395.97, "end": 397.92, "text": "그 결과 놀라운 시스템이 구축됐죠."}, {"start": 397.971, "end": 401.721, "text": "제작팀은 오늘 새로운 기술을 훈련시키고 내일 바로 로봇에게 테스트할 수 있습니다."}, {"start": 401.771, "end": 405.718, "text": "그러고 나서 신선한 데이터를 수집해 다음 라운드에서 바로 기술을 연마하죠."}, {"start": 405.769, "end": 407.819, "text": "이 속도가 바로 이곳의 진정한 비밀 병기입니다."}, {"start": 407.87, "end": 412.019, "text": "덕분에 아틀라스는 시장의 어떤 경쟁자보다 빠르게 새로운 업무를 익힐 수 있습니다."}, {"start": 412.069, "end": 415.019, "text": "이제 잠시 물러나서 전체적인 그림을 한번 보시죠."}, {"start": 415.069, "end": 419.521, "text": "아틀라스는 축구를 하고 엄청난 무게를 들며 단 하루 만에 기술을 배웁니다."}, {"start": 419.571, "end": 422.721, "text": "그리고 이제는 양산과 판매가 가능하도록 설계되고 있죠."}, {"start": 422.771, "end": 426.019, "text": "연구용 장난감이 실제 현장의 일꾼으로 변모하는 과정이 바로 이렇습니다."}, {"start": 426.069, "end": 430.92, "text": "보스턴 다이내믹스가 아틀라스에게 축구를 가르치는 동안, 다른 회사는 조용히"}, {"start": 430.97, "end": 433.819, "text": "누구도 예상치 못한 승리를 쌓아가고 있었습니다."}, {"start": 433.87, "end": 436.92, "text": "'피규어'는 휴머노이드 경쟁의 진정한 승자가 누구인지 증명해 보였죠."}, {"start": 436.97, "end": 441.721, "text": "피규어 AI는 로봇 전체를 제어하는 단 하나의 AI 두뇌, '헬릭스 O2'를 구축했습니다. 완전히"}, {"start": 441.771, "end": 447.038, "text": "자율적이죠. 종이클립만큼 가벼운 감촉도 느끼는 7세대 손도 공개했습니다."}, {"start": 447.088, "end": 452.038, "text": "부품이 고장 나도 피규어 03를 똑바로 서 있게 해주는 시스템, '벌컨(Vulcan)'이 공개됐습니다."}, {"start": 452.088, "end": 455.838, "text": "또한 한 시간에 로봇 한 대를 찍어내는 새로운 공장도 건설했죠."}, {"start": 455.889, "end": 460.838, "text": "로봇 업계 대부분이 테슬라만 목 빠지게 기다리는 동안, 피규어는 조용히 5연승을 거머쥐었습니다."}, {"start": 460.889, "end": 465.038, "text": "그 다섯 가지 성과를 하나씩 살펴보죠. 영상을 다 보고 나면 이 회사가 왜 독보적인지..."}, {"start": 465.088, "end": 470.939, "text": "확실히 알게 되실 겁니다. 첫 번째는 '뇌'입니다. 피규어는 이를 '헬릭스(Helix) O2'라고 부르는데,"}, {"start": 470.99, "end": 473.139, "text": "로봇 전체를 동시에 제어하는 단 하나의 AI 모델입니다."}, {"start": 473.189, "end": 478.538, "text": "다리, 몸통, 머리, 팔, 그리고 손가락 하나하나까지 모두 하나의 시스템으로 작동하죠."}, {"start": 478.588, "end": 481.338, "text": "여러 프로그램을 덕지덕지 이어 붙인 기존 방식과는 차원이 다릅니다."}, {"start": 481.389, "end": 485.639, "text": "피규어는 10만 줄 이상의 수동 코드를 과감히 버리고, 시스템 전체를"}, {"start": 485.689, "end": 487.24, "text": "단일 신경망으로 교체했습니다."}, {"start": 487.29, "end": 488.838, "text": "그 결과, 완전한 자율성을 확보했죠."}, {"start": 488.889, "end": 493.24, "text": "이제 피규어 03는 식기세척기로 걸어가 그릇을 꺼내고, 주방을 가로질러 찬장에"}, {"start": 493.29, "end": 496.139, "text": "그릇을 쌓은 뒤, 다시 식기세척기에 그릇을 채워 넣을 수 있습니다."}, {"start": 496.189, "end": 500.24, "text": "사람의 손길 없이 4분 동안 연속으로 61번의 의사결정을 내린 셈입니다."}, {"start": 500.29, "end": 502.74, "text": "보통 이 단계가 로봇들이 가장 많이 실패하는 지점입니다."}, {"start": 502.79, "end": 505.838, "text": "초반의 작은 실수 하나가 전체 작업을 망쳐버리기 때문이죠."}, {"start": 505.889, "end": 510.439, "text": "하지만 헬릭스 O2는 작업을 계속 추적하며 멈추지 않고 실시간으로 조정합니다."}, {"start": 510.49, "end": 511.74, "text": "그리고 또 다른 놀라운 점이 있습니다."}, {"start": 511.79, "end": 513.64, "text": "바로 헬릭스 O2가 '느낄' 수 있다는 겁니다."}, {"start": 513.69, "end": 517.68, "text": "손가락 끝의 촉각 센서가 3그램 정도의 미세한 힘까지 감지해 냅니다."}, {"start": 517.73, "end": 519.68, "text": "이게 바로 종이 클립 한 개의 무게입니다."}, {"start": 519.73, "end": 523.58, "text": "이렇게 부드러운 손길로 소중한 안경을 다루는 로봇을 믿으시겠어요?"}, {"start": 523.629, "end": 526.68, "text": "댓글로 의견을 남겨주세요. 하지만 진짜 증거는 라이브 스트리밍에서 확인됐습니다."}, {"start": 526.73, "end": 532.98, "text": "지난 5월 14일, 피규어(Figure) 사는 밥, 프랭크, 개리라는 이름의 로봇 세 대를 생중계에 투입해"}, {"start": 533.029, "end": 535.478, "text": "산호세 창고에서 택배 분류 작업을 시켰습니다."}, {"start": 535.528, "end": 538.78, "text": "원래는 한 차례의 교대 근무를 충분히 보여줄 수 있는 8시간이 계획이었죠."}, {"start": 538.83, "end": 539.78, "text": "8시간이 지났습니다."}, {"start": 539.83, "end": 541.281, "text": "하지만 방송은 멈추지 않았고,"}, {"start": 541.331, "end": 542.729, "text": "24시간,"}, {"start": 542.83, "end": 543.78, "text": "72시간을 넘겼습니다."}, {"start": 543.83, "end": 546.881, "text": "그리고 7일, 8일, 9일째에도 로봇은 여전히 가동 중이었죠."}, {"start": 546.931, "end": 552.58, "text": "처음 72시간 동안에만 세 대의 로봇이 단 한 번의 시스템 오류 없이"}, {"start": 552.629, "end": 553.58, "text": "약 88,000개의 택배를 분류했습니다."}, {"start": 553.629, "end": 555.68, "text": "개리 혼자서만 약 만 개를 처리했죠."}, {"start": 555.73, "end": 559.68, "text": "개리는 배터리가 부족해지자 스스로 충전 스테이션으로 향했고, 그사이 다른"}, {"start": 559.73, "end": 561.781, "text": "피규어 03 로봇이 투입되어 업무를 이어받았습니다."}, {"start": 561.831, "end": 563.18, "text": "인간의 도움은 전혀 필요 없었습니다."}, {"start": 563.23, "end": 567.778, "text": "인간과 기계의 대결도 벌였는데, 인간 작업자가 아주 간발의 차로 이겼습니다."}, {"start": 567.827, "end": 572.079, "text": "택배 하나당 0.1초도 안 되는 차이였죠. 이런 결과는 편집으로 조작할 수 없습니다."}, {"start": 572.129, "end": 574.16, "text": "짧은 영상으로는 실패하는 장면을 교묘히 숨길 수 있으니까요."}, {"start": 574.21, "end": 578.86, "text": "9일간의 라이브 스트리밍에선 실수가 나오는 즉시 전부 중계됐지만, 실수는 거의 없었습니다."}, {"start": 578.909, "end": 580.16, "text": "두 번째 핵심은 '손'입니다."}, {"start": 580.21, "end": 582.56, "text": "피규어가 가장 자랑스러워하는 부분이죠."}, {"start": 582.61, "end": 587.46, "text": "여기서 중요한 점은, 정교한 조작 능력이야말로 로봇 공학에서 가장 어려운 문제라는 겁니다."}, {"start": 587.509, "end": 589.761, "text": "로봇을 걷게 만들 수 있는 기업은 많습니다."}, {"start": 589.811, "end": 592.759, "text": "하지만 인간처럼 손을 놀릴 수 있는 곳은 거의 없죠."}, {"start": 592.808, "end": 597.559, "text": "그래서 다른 이들이 보행 기술에 매달릴 때, 피규어는 3년 동안 조용히 손 연구에만 집중했습니다."}, {"start": 597.609, "end": 601.161, "text": "신제품은 3세대 바디에 7세대 손을 장착했습니다."}, {"start": 601.211, "end": 602.261, "text": "다시 한번 말씀드리죠."}, {"start": 602.311, "end": 605.261, "text": "로봇 본체보다 손의 기술력이 4세대나 앞서 있다는 뜻입니다."}, {"start": 605.311, "end": 606.959, "text": "각 손가락은 독립적으로 움직입니다."}, {"start": 607.009, "end": 610.56, "text": "엄지는 손바닥을 가로질러 회전하며 모든 손가락 끝에 닿을 수 있죠."}, {"start": 610.61, "end": 612.959, "text": "인간의 손을 다재다능하게 만드는 바로 그 원리입니다."}, {"start": 613.009, "end": 617.158, "text": "20도 이상의 자유도가 집약되어 있고, 손바닥 카메라를 통해 로봇은 머리를 쓰지 않고도"}, {"start": 617.207, "end": 621.261, "text": "자신의 손가락이 무엇을 하는지 볼 수 있으며, 손끝 센서는 단 3g의 압력까지"}, {"start": 621.311, "end": 622.86, "text": "미세하게 감지해 냅니다."}, {"start": 622.909, "end": 627.56, "text": "참고로 테슬라의 옵티머스 손은 현재 약 11도의 자유도를 가집니다."}, {"start": 627.61, "end": 628.758, "text": "피규어는 이미 20도를 넘어섰죠."}, {"start": 628.807, "end": 632.658, "text": "로봇이 종이집게보다 가벼운 압력까지 느낄 수 있다면, 주방의 유리잔도"}, {"start": 632.707, "end": 633.64, "text": "안심하고 맡길 수 있지 않을까요?"}, {"start": 633.69, "end": 634.8389999999999, "text": "아래 댓글로 정답을 남겨주세요."}, {"start": 634.889, "end": 636.5409999999999, "text": "세 번째 변화는 바로 '신뢰성'입니다."}, {"start": 636.591, "end": 640.738, "text": "이건 '벌컨'이라 불리는데, 부품 하나가 고장 나도 멈추지 않는 로봇이죠."}, {"start": 640.788, "end": 642.3389999999999, "text": "수년간 업계의 규칙은 냉혹했습니다."}, {"start": 642.389, "end": 647.638, "text": "휴머노이드 하체의 관절 하나만 망가져도 기체 전체가 균형을 잃고 쓰러졌죠."}, {"start": 647.687, "end": 648.638, "text": "작업은 거기서 끝이었습니다."}, {"start": 648.687, "end": 651.239, "text": "사람이 직접 들어와 바닥에 쓰러진 기체를 끌어내야 했죠."}, {"start": 651.288, "end": 652.34, "text": "벌컨은 그 규칙을 끝장냈습니다."}, {"start": 652.389, "end": 657.538, "text": "벌컨이 작동하면 '피규어 03'는 최대 3개의 관절이나 액추에이터를 잃어도 계속 서 있을 수 있고,"}, {"start": 657.588, "end": 659.44, "text": "계속 걷고 계속 일할 수 있습니다."}, {"start": 659.49, "end": 660.839, "text": "피규어 사는 이를 생중계로 증명했습니다."}, {"start": 660.889, "end": 665.14, "text": "피규어 03가 상자를 분류하는 동안 엔지니어가 무릎 고장을 일부러 일으켰죠."}, {"start": 665.19, "end": 667.541, "text": "하지만 로봇은 쓰러지지도, 멈춰 서지도 않았습니다."}, {"start": 667.591, "end": 672.741, "text": "피규어 03는 균형을 잡고 움직임을 조정하더니 절뚝거렸습니다. 정말 부상당한 사람처럼 말이죠."}, {"start": 672.791, "end": 675.54, "text": "그리곤 스스로 정비 구역으로 곧장 향했습니다."}, {"start": 675.59, "end": 680.041, "text": "옆에 있는 로봇이 무릎 관절을 잃고도 아무 일 없다는 듯 계속 일하는 모습,"}, {"start": 680.091, "end": 681.44, "text": "멋진가요, 아니면 섬뜩한가요?"}, {"start": 681.49, "end": 685.041, "text": "댓글로 알려주세요. 이게 왜 그토록 중요한지도 설명해 드릴게요."}, {"start": 685.091, "end": 689.44, "text": "피규어 사는 로봇들이 감시 없이 밤새 가동되는 무인 공장을 지향합니다."}, {"start": 689.49, "end": 693.479, "text": "그건 로봇이 공정 전체를 멈추는 대신 스스로 문제를 해결할 수 있어야만 가능..."}, {"start": 693.528, "end": 695.479, "text": "공정 라인 말이죠. 문제가 생길 때마다요."}, {"start": 695.528, "end": 698.079, "text": "다섯 번째이자 마지막 단계, '팩토리'입니다."}, {"start": 698.129, "end": 701.579, "text": "아무리 뛰어난 로봇이라도 생산할 수 없다면 아무런 의미가 없으니까요."}, {"start": 701.629, "end": 706.08, "text": "캘리포니아에 위치한 봇 큐(Bot-Q) 공장에서, 피규어(Figure)는 하루에 03 모델 한 대를 만들던 수준에서..."}, {"start": 706.129, "end": 708.479, "text": "이제 매 시간 한 대의 03 로봇을 생산하고 있습니다."}, {"start": 708.528, "end": 715.68, "text": "120일도 안 되는 4개월 만에 생산량이 24배나 급증한 수치이며, 350대 이상의 피규어 03 로봇이..."}, {"start": 715.73, "end": 717.579, "text": "이미 공장 문을 나서 출고되었습니다."}, {"start": 717.629, "end": 719.48, "text": "이 뒤에 숨겨진 숫자들은 실로 놀랍습니다."}, {"start": 719.529, "end": 725.08, "text": "150개 이상의 워크스테이션에서 구동되는 맞춤형 소프트웨어와 50곳 이상의 검사 포인트가..."}, {"start": 725.129, "end": 730.78, "text": "라인을 따라 배치되어 있고, 최종 합격률은 이미 80%를 넘어 매주 상승 중이죠."}, {"start": 730.83, "end": 737.68, "text": "배터리 라인 합격률은 99.3%에 달합니다. 9,000개 이상의 액추에이터가 제작되었고, 모든 로봇은..."}, {"start": 737.73, "end": 742.778, "text": "출고 승인 전 80가지 이상의 테스트를 거칩니다. 수천 번의 스쿼트 번인 세션과..."}, {"start": 742.827, "end": 747.479, "text": "숄더 프레스, 심지어 조깅까지 포함되죠. 결함이 있는 부품을 출고 전에 잡아내기 위해서입니다."}, {"start": 747.528, "end": 752.179, "text": "이것이 바로 과학 프로젝트와 실제 기업의 차이입니다. 누구나 로봇 한 대쯤은..."}, {"start": 752.229, "end": 753.179, "text": "영상으로 보여줄 수 있죠."}, {"start": 753.229, "end": 757.28, "text": "하지만 시간당 한 대를 만드는 건 차원이 다른 문제입니다. 자, 이제 이 다섯 가지를 합쳐보죠."}, {"start": 757.33, "end": 762.479, "text": "Helix O2를 탑재한 두뇌, 4세대를 앞서가는 손, 벌칸(Vulcan)의 신뢰성,"}, {"start": 762.528, "end": 767.179, "text": "이미 확정된 차세대 로봇, 그리고 매 시간 휴머노이드를 찍어내는 공장까지."}, {"start": 767.229, "end": 771.479, "text": "이건 단순한 운이 아니라, 모든 기술 스택이 동시에 맞물려 돌아가는 결과입니다."}, {"start": 771.528, "end": 774.92, "text": "그것이 바로 피규어가 현재 모든 경쟁사를 앞질러 나가는 이유입니다."}, {"start": 774.97, "end": 777.52, "text": "이 다섯 가지 소식 중 어떤 게 가장 인상 깊었나요?"}, {"start": 777.57, "end": 782.018, "text": "댓글로 알려주세요. 피규어만이 '팩토리 페이스'에 집착하는 건 아닙니다."}, {"start": 782.067, "end": 787.118, "text": "중국에선 한 기업이 피규어마저 느려 보이게 할 만큼 놀라운 수치를 달성했죠."}, {"start": 787.168, "end": 790.618, "text": "AI 휴머노이드 로봇은 이미 믿기 힘든 일들을 해내고 있습니다."}, {"start": 790.668, "end": 795.82, "text": "백플립, 공중제비, 날아차기는 물론이고 울퉁불퉁한 지형을 달리고 인간과 흡사한"}, {"start": 795.87, "end": 798.32, "text": "걸음걸이로 걷거나, 무거운 상자를 몇 시간씩 옮기기도 하죠."}, {"start": 798.37, "end": 800.521, "text": "하지만 누구도 예상치 못한 반전이 일어났습니다."}, {"start": 800.571, "end": 803.921, "text": "굴지의 휴머노이드 기업들이 이제 더 이상 시연 영상에만 매달리지 않는다는 거죠."}, {"start": 803.971, "end": 805.919, "text": "새로운 경쟁의 핵심은 바로 '대량 생산'입니다."}, {"start": 805.969, "end": 807.919, "text": "누가 이 로봇들을 대규모로 제작할 수 있을까요?"}, {"start": 807.969, "end": 809.52, "text": "누가 생산 속도를 맞출 수 있을까요?"}, {"start": 809.57, "end": 812.121, "text": "이제 그 단 하나의 지표가 승패를 결정짓게 되었습니다."}, {"start": 812.171, "end": 816.82, "text": "테슬라는 올해 프리몬트 공장을 개조해, 기존의 모델 S와 모델"}, {"start": 816.87, "end": 822.42, "text": "X 라인을 연간 100만 대 생산을 목표로 하는 최초의 대규모 옵티머스 생산 라인으로 전환 중입니다."}, {"start": 822.47, "end": 827.419, "text": "머스크는 기가 텍사스에 연간 1,000만 대의 로봇 생산을 목표로 하는"}, {"start": 827.469, "end": 828.419, "text": "제2공장 착공에도 들어갔습니다."}, {"start": 828.469, "end": 829.719, "text": "피규어는 이미 양산 체제에 돌입했습니다."}, {"start": 829.769, "end": 835.32, "text": "캘리포니아의 봇큐 시설에선 약 90분당 1대 꼴로 피규어 03을 생산하고 있으며,"}, {"start": 835.37, "end": 841.22, "text": "연간 12,000대 가동률로 4년간 10만 대의 로봇 생산을 목표로 하고 있습니다."}, {"start": 841.269, "end": 846.56, "text": "보스턴 다이내믹스는 지난 1월 보스턴에서 아틀라스 생산을 시작했고, 현대차는 연간 3만 대 규모의 공장을 계획 중입니다."}, {"start": 846.61, "end": 849.16, "text": "조지아주 사바나에 위치한 연간 1만 대 규모의 공장입니다."}, {"start": 849.21, "end": 850.16, "text": "바로 이 현장이죠."}, {"start": 850.21, "end": 852.36, "text": "그리고 엔진 AI가 본격적으로 이 사업에 뛰어들었습니다."}, {"start": 852.409, "end": 857.06, "text": "엔진 AI의 1만 대 규모 휴머노이드 생산 라인이 현재 심천에서 가동 중입니다."}, {"start": 857.11, "end": 860.16, "text": "첫 번째 T-800 모델들이 이미 생산 라인에서 쏟아져 나오고 있습니다."}, {"start": 860.21, "end": 863.1610000000001, "text": "15분마다 휴머노이드 한 대가 완성되는 속도입니다."}, {"start": 863.211, "end": 867.559, "text": "이 공장은 남산구 홍화링 산업단지에 위치해 있습니다."}, {"start": 867.609, "end": 872.759, "text": "엔진 AI는 연구, 하드웨어, 제조, 품질 관리,"}, {"start": 872.808, "end": 873.56, "text": "배송까지 전 과정을 자체적으로 운영합니다."}, {"start": 873.61, "end": 879.759, "text": "업그레이드된 라인은 효율을 40% 끌어올렸으며, 모든 T-800은 79가지 항목의 전방위적"}, {"start": 879.808, "end": 880.858, "text": "품질 검사를 거칩니다."}, {"start": 880.908, "end": 885.759, "text": "또한 공장에서는 테스트 기간 동안 46가지의 다양한 실제 작업 환경을 시뮬레이션합니다."}, {"start": 885.808, "end": 891.06, "text": "이 '15분'이라는 속도가 모든 것을 바꿉니다. 단가는 낮아지고, 배송은 빨라진다는 뜻이죠."}, {"start": 891.11, "end": 896.358, "text": "실제 공장 데이터는 매일 시스템으로 다시 피드백됩니다. 라인에서 생산되는"}, {"start": 896.408, "end": 899.258, "text": "모든 T-800은 다음 모델이 더 잘 움직일 수 있도록 학습시킵니다."}, {"start": 899.307, "end": 904.158, "text": "엔진 AI는 심천에서 멈추지 않습니다. 허난성 정저우에"}, {"start": 904.207, "end": 905.959, "text": "두 번째 글로벌 제조 허브를 확정 지었습니다."}, {"start": 906.009, "end": 911.261, "text": "JD.com이 주도한 이번 펀딩 라운드에서 약 10억 위안에 달하는"}, {"start": 911.311, "end": 917.56, "text": "총 자본이 투입되었습니다. 심천 라인은 시작일 뿐입니다. T-800은 더 이상 시제품이 아닙니다. T-800은 일정에 맞춰 생산되는"}, {"start": 917.61, "end": 922.959, "text": "제품입니다. 로봇을 빨리 만드는 것도 중요하지만, 실제로 대화를 시도하면 어떤 일이 벌어질까요?"}, {"start": 923.009, "end": 927.6610000000001, "text": "유니트리가 휴머노이드 로봇과 함께하는 삶이 실제로 어떤 모습일지 보여주는 데모를 공개했습니다."}, {"start": 927.711, "end": 933.559, "text": "로봇에게 명령을 내리면 로봇이 듣고, 내부의 AI가 그 말을 이해합니다."}, {"start": 933.609, "end": 938.761, "text": "그리고 로봇이 행동에 옮기죠. 이것이 전체 과정입니다. 유니트리는 G1 휴머노이드를 통해..."}, {"start": 938.811, "end": 942.761, "text": "한 사람이 말하고 로봇이 반응하는 모습을 정확히 보여주었습니다."}, {"start": 942.811, "end": 943.761, "text": "실시간으로 말이죠."}, {"start": 943.811, "end": 946.56, "text": "이것이 미래의 로봇에 대해 대부분의 사람들이 오해하고 있는 부분입니다."}, {"start": 946.61, "end": 950.36, "text": "사람들은 여전히 챗GPT처럼 앱을 열고 프롬프트를 입력하고..."}, {"start": 950.409, "end": 951.36, "text": "답변을 기다리는 방식을 떠올립니다."}, {"start": 951.409, "end": 953.858, "text": "하지만 실제 가정용 로봇은 그렇게 작동하지 않을 겁니다."}, {"start": 953.908, "end": 957.36, "text": "물이 필요할 때마다 휴대폰을 꺼낼 사람은 아무도 없을 테니까요."}, {"start": 957.409, "end": 960.358, "text": "식탁을 닦으려고 프롬프트를 입력할 사람도 없겠죠."}, {"start": 960.408, "end": 961.56, "text": "그냥 말만 하면 됩니다."}, {"start": 961.61, "end": 964.16, "text": "같이 사는 사람에게 말하는 것과 똑같은 방식으로요."}, {"start": 964.21, "end": 965.16, "text": "\"물 좀 가져다줘.\""}, {"start": 965.21, "end": 966.16, "text": "\"식탁 좀 닦아줘.\""}, {"start": 966.21, "end": 967.16, "text": "\"저 의자 좀 옮겨줘.\""}, {"start": 967.21, "end": 969.758, "text": "이것이 인간이 지시를 내리는 자연스러운 방식입니다."}, {"start": 969.807, "end": 973.959, "text": "그리고 그것이 가정용 로봇이 일상에 실제로 녹아들 수 있는 유일한 방법이죠."}, {"start": 974.009, "end": 977.959, "text": "이번 G1 데모는 이런 자연스러운 방식이 다가오고 있다는 첫 번째 실질적인 증거입니다."}, {"start": 978.009, "end": 980.359, "text": "그렇다면 G1 내부에서는 이 과정이 실제로 어떻게 작동할까요?"}, {"start": 980.408, "end": 982.959, "text": "단 몇 초 만에 일어나는 일련의 과정입니다."}, {"start": 983.009, "end": 983.959, "text": "사용자가 말을 하면"}, {"start": 984.009, "end": 986.059, "text": "G1의 마이크가 소리를 포착합니다."}, {"start": 986.109, "end": 989.059, "text": "G1 내부의 AI가 음성을 텍스트로 변환하고"}, {"start": 989.109, "end": 992.658, "text": "그 텍스트가 어떤 동작을 의미하는지 파악하죠."}, {"start": 992.707, "end": 996.559, "text": "그다음, 또 다른 AI 층이 전신 움직임을 생성합니다."}, {"start": 996.609, "end": 1001.358, "text": "전신 제어기가 균형을 잡는 동안 동작이 실행되고"}, {"start": 1001.408, "end": 1005.758, "text": "G1이 움직입니다. 모든 단계가 신속하고 유기적으로 맞물려야 하죠."}, {"start": 1005.807, "end": 1009.158, "text": "하나라도 어긋나면 명령을 무시하거나 넘어지고 맙니다."}, {"start": 1009.207, "end": 1011.06, "text": "G1은 이를 뒷받침할 하드웨어를 갖췄습니다."}, {"start": 1011.11, "end": 1016.9590000000001, "text": "4마이크 어레이, 소형 스피커, 와이파이 6, 블루투스, 8코어 CPU를 탑재했죠."}, {"start": 1017.009, "end": 1020.06, "text": "뎁스 카메라와 3D 라이다가 감지 기능을 담당합니다."}, {"start": 1020.11, "end": 1024.759, "text": "EDU 버전은 고성능 AI 작업을 위해 엔비디아 젯슨 오린 칩을 탑재할 수 있습니다."}, {"start": 1024.808, "end": 1027.66, "text": "미래의 가정용 로봇은 프롬프트나 리모컨이 아니라"}, {"start": 1027.71, "end": 1029.16, "text": "오직 목소리로 움직이게 될 겁니다."}, {"start": 1029.21, "end": 1031.557, "text": "G1은 그 미래를 처음으로 맛보여 주었죠."}, {"start": 1031.607, "end": 1034.36, "text": "소형 휴머노이드와 대화하는 것도 놀랍지만,"}, {"start": 1034.41, "end": 1036.558, "text": "직접 그 안에 탑승하는 모습을 상상해 보세요."}, {"start": 1036.608, "end": 1040.861, "text": "유니트리의 GD-O1 메카는 마치 애니메이션이 현실이 된 듯한 모습입니다."}, {"start": 1040.911, "end": 1042.038, "text": "중국이 본격적인 시장 공략에 나섰습니다."}, {"start": 1042.087, "end": 1046.837, "text": "영화 '트랜스포머'에서 막 튀어나온 듯한 이 기계는 조종석과 가격표까지 갖췄고,"}, {"start": 1046.887, "end": 1049.337, "text": "대량 생산이 가능하다는 제조사의 발표까지 이어졌습니다."}, {"start": 1049.387, "end": 1052.538, "text": "유니트리의 GD-01이 특별하게 느껴지는 이유가 바로 이것이죠."}, {"start": 1052.587, "end": 1055.84, "text": "이건 단순히 로봇에 그치지 않고, 사람들이 밖에서 지켜보는 가운데"}, {"start": 1055.89, "end": 1060.939, "text": "인간 조종사가 실제로 탑승해 로봇과 함께 걷고, 변신하며 움직이기 때문입니다."}, {"start": 1060.989, "end": 1065.938, "text": "유니트리는 GD-01을 세계 최초의 양산형 변신 메카로 홍보하고 있는데,"}, {"start": 1065.988, "end": 1068.538, "text": "시연 영상을 보면 그 주장이 현실처럼 느껴집니다."}, {"start": 1068.587, "end": 1072.836, "text": "조종사가 몸체에 내장된 조종석에 앉으면, 로봇은 휴머노이드처럼"}, {"start": 1072.886, "end": 1074.64, "text": "두 다리로 당당히 앞으로 걸어 나갑니다."}, {"start": 1074.69, "end": 1078.738, "text": "그러다 몸체 형태를 바꾸더니 네 발로 기어가는 모드로 전환하는데, 즉 하나의 로봇이"}, {"start": 1078.788, "end": 1082.939, "text": "사람을 태운 채로 두 가지 이동 방식을 자유자재로 오갈 수 있다는 뜻입니다."}, {"start": 1082.989, "end": 1085.64, "text": "그 압도적인 규모는 이 모든 상황을 더욱 진지하게 만듭니다."}, {"start": 1085.69, "end": 1091.64, "text": "GD-01은 조종사가 탑승했을 때 무게가 약 500kg에 달하는데, 이는 마치"}, {"start": 1091.69, "end": 1095.239, "text": "그랜드 피아노가 스스로 거리를 활보하는 모습을 보는 것과 같습니다."}, {"start": 1095.288, "end": 1099.638, "text": "유니트리에 따르면 본체는 고강도 합금을 사용했으며, 시연 중에는 기계를 가동해"}, {"start": 1099.688, "end": 1101.238, "text": "벽돌 담장을 단숨에 부수기도 했습니다."}, {"start": 1101.288, "end": 1104.44, "text": "이 장면이 중요한 이유는 유니트리가 단순한 움직임 그 이상을 보여주기 때문입니다."}, {"start": 1104.49, "end": 1108.439, "text": "로봇이 실제 물리적 충격을 견디고, 다시 힘을 전달할 수 있음을 증명한 것이죠."}, {"start": 1108.489, "end": 1110.94, "text": "가격 또한 이번 발표가 주목받는 또 다른 이유입니다."}, {"start": 1110.99, "end": 1117.798, "text": "유니트리는 GD-01의 가격을 약 65만 달러로 책정하고, 이를 군사용이 아닌 민간용 운송 수단으로 포지셔닝하고 있습니다."}, {"start": 1117.848, "end": 1119.999, "text": "단순한 일회성 무대 실험이 아닙니다."}, {"start": 1120.048, "end": 1123.899, "text": "내일부터 당장 일반 도로에서 메카를 운전하게 된다는 뜻은 아니지만,"}, {"start": 1123.949, "end": 1128.4, "text": "유니트리는 이를 소비자가 언젠가 예약하고 구매할 수 있는 제품으로 보고 있습니다."}, {"start": 1128.45, "end": 1130.597, "text": "이것은 유니트리의 더 큰 도약과도 일맥상통하죠."}, {"start": 1130.647, "end": 1135.097, "text": "이미 이 회사는 회전 발차기, 군무 같은 쿵후, 그리고 고난도 운동 동작을 하는"}, {"start": 1135.147, "end": 1137.5, "text": "휴머노이드를 선보이며 걷기 이상의 능력을 증명했습니다."}, {"start": 1137.549, "end": 1143.901, "text": "약 300만 달러에 시속 10km로 바퀴 이동을 하는 일본의 '아크엑스'와 비교하면,"}, {"start": 1143.951, "end": 1145.2, "text": "시속 10km 말이죠."}, {"start": 1145.25, "end": 1151.2, "text": "GDO1은 직접 걷고, 변신하며, 조종사까지 태우는 데다 가격은 훨씬 저렴해 더 공격적으로 느껴집니다."}, {"start": 1151.25, "end": 1154.597, "text": "그래서 GDO1은 단순한 시제품 이상의 의미를 갖습니다."}, {"start": 1154.647, "end": 1158.5, "text": "로봇이 이제 단순히 노동자나 공연자가 아니라는 걸 보여주니까요."}, {"start": 1158.549, "end": 1163.298, "text": "일부는 탈것이 되기 시작했고, 이는 메카의 미래를 생각보다 훨씬 더 가깝게 느끼게 합니다."}, {"start": 1163.348, "end": 1167.499, "text": "벽을 부수는 메카부터 발레를 추는 로봇까지,"}, {"start": 1167.548, "end": 1169.298, "text": "그 폭이 정말 어마어마하죠."}, {"start": 1169.347, "end": 1174.399, "text": "유비테크는 휴머노이드 로봇 '워커 S1'을 공개하며 발레"}, {"start": 1174.449, "end": 1175.399, "text": "공연까지 곁들였습니다."}, {"start": 1175.449, "end": 1181.0, "text": "유비테크는 2026년 중국 국제 공급망 박람회에서 워커 S1을 처음 공개했습니다."}, {"start": 1181.049, "end": 1183.798, "text": "전 세계에 이 로봇을 처음으로 선보인 자리였죠."}, {"start": 1183.848, "end": 1186.4, "text": "유비테크는 평범한 런칭 이벤트를 선택하지 않았습니다."}, {"start": 1186.45, "end": 1190.84, "text": "전문 무용수들과 함께 워커 S1을 무대에 세우고 전막 공연을..."}, {"start": 1190.89, "end": 1195.739, "text": "발레 루틴 속의 왈츠, 부드러운 회전, 동기화된 움직임, 그리고..."}, {"start": 1195.788, "end": 1200.44, "text": "옆 사람과의 정교한 협업까지. 이건 단순한 화려한 데뷔가 아닙니다. 발레는..."}, {"start": 1200.49, "end": 1205.837, "text": "휴머노이드 로봇에게 가장 가혹한 테스트 중 하나죠. 로봇은 한쪽 다리로 균형을 잡고, 떨림 없이 자세를 유지하며..."}, {"start": 1205.887, "end": 1211.038, "text": "적절한 순간에 팔다리를 움직여야 합니다. 인간 파트너의 리듬에 맞춰야 하죠. 계산 한 번만 틀려도..."}, {"start": 1211.087, "end": 1216.84, "text": "워커 C1은 관객들 앞에서 넘어지고 말 겁니다. 유비텍(UBTECH)이 공개 행사에서 발레를 선택한 이유가 바로 그것입니다."}, {"start": 1216.89, "end": 1222.239, "text": "핵심은 이 새로운 로봇이 실제 서비스 환경에서 필요한 정밀도로 움직일 수 있음을 증명하는 것이었습니다."}, {"start": 1222.288, "end": 1227.039, "text": "워커 C1은 호텔, 공항, 전시 센터와 같은 장소를 위해 제작되었습니다."}, {"start": 1227.089, "end": 1231.739, "text": "유비텍은 이 새로운 로봇을 엑스포 최초의 '실리콘 대변인'으로 명명했습니다."}, {"start": 1231.788, "end": 1234.038, "text": "워커 C1은 가이드 투어를 수행합니다."}, {"start": 1234.088, "end": 1236.038, "text": "손님을 맞이하고 정보를 제공하며,"}, {"start": 1236.088, "end": 1238.24, "text": "사람들을 한 장소에서 다른 장소로 안내하죠."}, {"start": 1238.289, "end": 1242.24, "text": "워커 C1은 작년에 출시된 워커 C의 업그레이드 버전입니다."}, {"start": 1242.289, "end": 1248.139, "text": "워커 C 베이스의 키는 163cm이며 몸무게는 약 43kg입니다."}, {"start": 1248.189, "end": 1252.939, "text": "신체는 20도의 자유도를 갖췄고, 보행 속도는 시속 6km에 달합니다."}, {"start": 1252.989, "end": 1259.94, "text": "워커 C는 자율 주행을 위해 U-SLAM을 사용하며, RGB-D 카메라와 3D 구조광 카메라가..."}, {"start": 1259.99, "end": 1263.539, "text": "센싱을 담당합니다. 고정밀 IMU는 신체의 안정을 유지해주죠."}, {"start": 1263.589, "end": 1268.139, "text": "다국어 대화 기능도 내장되어 있습니다. 유비텍은 생산에도 박차를 가하고 있습니다."}, {"start": 1268.189, "end": 1272.74, "text": "이 회사는 2026년까지 연간 1만 대의 생산 능력을 목표로 하고 있습니다."}, {"start": 1272.789, "end": 1277.239, "text": "유비텍은 2025년 한 해 동안 8억 위안 규모의 주문을 확보했습니다."}, {"start": 1277.288, "end": 1282.84, "text": "중국-베트남 국경 검문소에 휴머노이드를 배치하기 위한 3,700만 달러 규모의 계약도 체결된 상태입니다."}, {"start": 1282.89, "end": 1288.74, "text": "산업용 로봇 S2의 1,000호기가 막 생산 라인을 통과했습니다. 무대 위에서 춤을 추는 것도 좋지만,"}, {"start": 1288.789, "end": 1292.84, "text": "진짜 시험대는 이 로봇들이 실제로 일자리를 감당해낼 수 있느냐는 거죠."}, {"start": 1292.89, "end": 1297.44, "text": "피규어 AI가 미국 소매업의 미래를 재편할 수도 있는 엄청난 행보를 보였습니다."}, {"start": 1297.49, "end": 1302.739, "text": "2026년 5월 26일, 이 회사는 휴머노이드 로봇 배치를 위해"}, {"start": 1302.788, "end": 1307.44, "text": "카탈리스트 브랜드와 상업적 계약을 체결했습니다. 첫 도입은 카탈리스트의"}, {"start": 1307.49, "end": 1312.24, "text": "네바다주 리노 물류 센터에서 시작되는데, 이는 매우 큰 진전입니다."}, {"start": 1312.289, "end": 1318.24, "text": "카탈리스트가 BMW에 이은 피규어의 두 번째 주요 상업 고객이기 때문이죠. 왜 이 거래가 그토록 중요할까요?"}, {"start": 1318.289, "end": 1323.239, "text": "카탈리스트 브랜드는 단순히 재미로 로봇을 테스트하는 작은 소매 기업이 아닙니다."}, {"start": 1323.288, "end": 1327.34, "text": "2025년 초, 스파크 그룹과 JC 페니가 합병하면서 설립된 거대 기업이죠."}, {"start": 1327.39, "end": 1332.44, "text": "현재 카탈리스트는 JC 페니를 포함해 미국에서 가장 인지도 높은 브랜드들을 관리하고 있습니다."}, {"start": 1332.49, "end": 1336.34, "text": "에어로포스탈, 브룩스 브라더스, 에디 바우어, 럭키 브랜드, 그리고 노티카까지요."}, {"start": 1336.39, "end": 1341.94, "text": "이 회사는 전체적으로 약 1,800개의 매장을 운영하며 6만 명에 가까운 직원을 고용하고 있습니다."}, {"start": 1341.99, "end": 1346.788, "text": "또한 브룩필드 코퍼레이션과 사이먼 프로퍼티"}, {"start": 1346.789, "end": 1347.74, "text": "그룹으로부터 막대한 지원을 받고 있죠."}, {"start": 1347.789, "end": 1351.239, "text": "하지만 가장 핵심적인 부분은 피규어의 로봇이 실제로 어떤 일을 수행하느냐는 것입니다."}, {"start": 1351.288, "end": 1356.038, "text": "피규어 03 모델로 추정되는 이 차세대 휴머노이드는 '조이 파우치' 분류 시스템 내에서"}, {"start": 1356.088, "end": 1360.038, "text": "까다로운 분류 및 포장 작업을 도울 예정입니다."}, {"start": 1360.088, "end": 1363.84, "text": "보통 창고 노동자들에게 육체적으로 큰 부담을 주는 아주 힘든 업무들이죠."}, {"start": 1363.89, "end": 1368.24, "text": "카탈리스트는 이를 통해 직원들이 소모적인 창고 업무에서 벗어나"}, {"start": 1368.289, "end": 1371.798, "text": "더 가치 있는 업무에 집중할 수 있게 될 것이라고 설명합니다."}, {"start": 1371.848, "end": 1373.798, "text": "시점 또한 아주 절묘합니다."}, {"start": 1373.848, "end": 1378.301, "text": "이커머스의 성장은 소매 물류 창고에 엄청난 압박을 가했고, 전국 각지의 기업들은"}, {"start": 1378.351, "end": 1380.498, "text": "인력 부족 문제로 고전하고 있죠."}, {"start": 1380.548, "end": 1384.998, "text": "피규어사는 자사 로봇이 이미 인간에 육박하는 속도로 물품 분류가 가능하며,"}, {"start": 1385.048, "end": 1388.2, "text": "데모를 통해 200시간 이상의 자율 작동을 입증했다고 밝혔습니다."}, {"start": 1388.25, "end": 1390.101, "text": "이제 피규어사의 배후에 투입된 자본을 살펴보시죠."}, {"start": 1390.151, "end": 1397.901, "text": "이 회사는 2024년 시리즈 B 펀딩에서 26억 달러 가치를 인정받으며 6억 7,500만 달러를 유치했습니다."}, {"start": 1397.951, "end": 1404.298, "text": "이어 2025년에는 10억 달러 규모의 시리즈 C를 통해 기업 가치가 390억 달러에 육박하게 됐죠."}, {"start": 1404.348, "end": 1408.999, "text": "투자자 명단에는 엔비디아, 마이크로소프트, 인텔 캐피털, 제프 베이조스 등이 포진해 있습니다."}, {"start": 1409.048, "end": 1413.9, "text": "피규어는 심지어 오픈AI를 떠나 독자적인 '헬릭스 시각 언어 행동 모델'까지 구축했습니다."}, {"start": 1413.95, "end": 1418.6, "text": "그리고 이 모든 과정에서 피규어와 카탈리스트를 잇는 브룩필드와의 관계가 핵심일 수 있습니다."}, {"start": 1418.65, "end": 1423.1, "text": "리노 배치가 성공하면, 카탈리스트는 결국 피규어의 휴머노이드 로봇을"}, {"start": 1423.15, "end": 1427.798, "text": "광범위한 유통망 전체로 확대하여 대형 소매 기업들의 로봇 활용 방식에 대한"}, {"start": 1427.848, "end": 1429.2, "text": "새로운 청사진을 제시할 것입니다."}, {"start": 1429.25, "end": 1435.2, "text": "'피규어 03'이 매장에 도입되는 동안, 차세대 로봇은 이미 완성되었습니다."}, {"start": 1435.25, "end": 1440.097, "text": "다들 '피규어 03'의 능력을 파악하느라 여념이 없는 와중에,"}, {"start": 1440.147, "end": 1443.298, "text": "피규어는 조용히 더 엄청난 소식을 공개했죠."}, {"start": 1443.347, "end": 1449.999, "text": "차세대 휴머노이드 로봇 'F.04'가 이제 '디자인 확정' 단계에 들어섰습니다. 즉,"}, {"start": 1450.048, "end": 1453.2, "text": "기획 단계를 넘어 실제 하드웨어 제작 단계로 넘어간 것입니다."}, {"start": 1453.25, "end": 1458.558, "text": "브렛 애드콕은 이것이 단순한 업그레이드가 아니라 피규어 사상 최대의 도약이라고 말합니다."}, {"start": 1458.608, "end": 1460.759, "text": "...로봇 세대 간의 큰 격차를 보여줍니다."}, {"start": 1460.808, "end": 1466.759, "text": "Figure 04의 설계가 공식적으로 확정되었습니다. 즉, 주요 설계 결정이"}, {"start": 1466.808, "end": 1469.557, "text": "마무리되고 검토와 승인까지 모두 끝났다는 뜻이죠."}, {"start": 1469.607, "end": 1474.758, "text": "Figure의 창업자 브렛 애드콕은 방금 '상세 설계 검토(CDR)'를 마쳤으며"}, {"start": 1474.807, "end": 1476.557, "text": "일부 부품은 이미 출고가 시작됐다고 밝혔습니다."}, {"start": 1476.607, "end": 1481.161, "text": "쉽게 말해, 이 로봇은 더 이상 화면 속의 아이디어가 아닙니다."}, {"start": 1481.211, "end": 1484.058, "text": "실제 하드웨어로 구현되는 단계에 접어들었죠."}, {"start": 1484.108, "end": 1490.259, "text": "애드콕은 Figure 04를 두고 역대 로봇 세대 간의 변화 중"}, {"start": 1490.308, "end": 1491.557, "text": "가장 큰 도약이라고 설명했습니다."}, {"start": 1491.607, "end": 1495.36, "text": "이건 단순한 성능 개선이나 기본 리프레시 수준이 아닙니다."}, {"start": 1495.41, "end": 1500.661, "text": "기능과 엔지니어링, 디자인 전반에 걸친 거대한 진보를 의미하죠."}, {"start": 1500.711, "end": 1505.859, "text": "상당히 대담한 주장입니다. Figure 03만 해도 이미 업계에서"}, {"start": 1505.909, "end": 1507.959, "text": "가장 화제인 휴머노이드 로봇 중 하나니까요."}, {"start": 1508.009, "end": 1513.558, "text": "하지만 모든 기업이 창고 업무에만 매달리는 건 아닙니다. 훨씬 더 화려한 목표를 가진 곳들도 있죠."}, {"start": 1513.608, "end": 1518.058, "text": "최근 중국에선 런웨이를 걷는 슈퍼모델 같은 휴머노이드 로봇이 공개됐습니다."}, {"start": 1518.108, "end": 1522.86, "text": "이름은 '리믹스 다이내믹스 루나(Limix Dynamics Luna)'. 흔한 창고 로봇이나"}, {"start": 1522.91, "end": 1524.259, "text": "공장 노동자로 설계된 게 아닙니다."}, {"start": 1524.308, "end": 1529.959, "text": "리믹스는 2026년 3월 '타오바오 인플루언서 페스티벌'에서 루나를 선보였는데요."}, {"start": 1530.009, "end": 1535.359, "text": "배우 진연희 곁을 나란히 걸으며, 단숨에 중국에서 가장 주목받는 시연 사례가 되었습니다."}, {"start": 1535.409, "end": 1539.34, "text": "루나가 돋보인 건 단순히 걸을 수 있어서가 아니라, 그 걸음이 얼마나 부드럽고 당당한지..."}, {"start": 1539.39, "end": 1540.34, "text": "움직임이 아주..."}, {"start": 1540.39, "end": 1545.14, "text": "발뒤꿈치부터 발가락까지 닿는 깔끔한 걸음걸이와 자연스러운 골반의 움직임, 교차하는 팔 휘두름,"}, {"start": 1545.19, "end": 1549.64, "text": "그리고 안정적인 런웨이 포즈까지, 뻣뻣한 기계보다는 실제 패션 모델에 더 가까워 보였습니다."}, {"start": 1549.69, "end": 1554.539, "text": "이어서 루나는 체조에서 영감을 얻은 회전 기술인 '일루전 턴'을 선보였는데요, 뛰어난 균형 감각과"}, {"start": 1554.589, "end": 1558.34, "text": "빠른 피드백, 그리고 흔들림 없는 정교한 신체 제어 능력을 보여주었습니다."}, {"start": 1558.39, "end": 1562.039, "text": "루나가 이렇게 움직일 수 있는 건 강력한 모션 시스템 덕분입니다."}, {"start": 1562.089, "end": 1568.44, "text": "이 로봇은 키가 약 5피트 3인치(160cm)이고, 배터리를 장착했을 때"}, {"start": 1568.49, "end": 1570.939, "text": "무게는 약 121파운드(55kg) 정도 나갑니다."}, {"start": 1570.989, "end": 1576.341, "text": "27개의 자유도를 가졌으며, 림엑스(LimX)의 2세대 'SIS-0' 모션 엔진과"}, {"start": 1576.391, "end": 1579.84, "text": "'COSA' 인지 운영 체제를 기반으로 작동합니다."}, {"start": 1579.89, "end": 1583.939, "text": "이 시스템들이 결합하여 루나가 더 매끄러운 타이밍과 나은 균형 감각,"}, {"start": 1583.989, "end": 1585.14, "text": "그리고 인간다운 제어력을 갖도록 돕습니다."}, {"start": 1585.19, "end": 1590.239, "text": "가격은 약 41,000달러로, 대형 인터랙티브 휴머노이드치고는 공격적인 가격이지만,"}, {"start": 1590.288, "end": 1593.439, "text": "림엑스가 루나로 공장의 고된 노동을 대체하려는 건 아닙니다."}, {"start": 1593.489, "end": 1598.639, "text": "이 로봇은 쇼핑몰, 테마파크, 모터쇼, 박물관, 브랜드 행사나 라이브"}, {"start": 1598.689, "end": 1599.639, "text": "무대 등을 위해 설계되었습니다."}, {"start": 1599.689, "end": 1604.239, "text": "그래서 고급스러운 텍스타일 외장과 부드러운 곡선미, 그리고 사람들 사이에서도"}, {"start": 1604.288, "end": 1607.038, "text": "더 안전하고 친근하게 느껴지는 우아한 디자인을 갖추고 있죠."}, {"start": 1607.087, "end": 1610.14, "text": "하드웨어 또한 장시간의 공개 퍼포먼스를 지원합니다."}, {"start": 1610.19, "end": 1615.739, "text": "루나는 10,000mAh 용량의 핫스왑 배터리를 탑재해 약 4시간 동안 작동할 수 있습니다."}, {"start": 1615.788, "end": 1618.94, "text": "리맥스는 배터리 지속 시간이 150% 향상되었으며"}, {"start": 1618.99, "end": 1621.641, "text": "관절 표면 온도는 30% 낮아졌다고 밝혔습니다."}, {"start": 1621.691, "end": 1628.038, "text": "이 로봇은 시속 5km(3.1마일)로 보행하며 빠르게 균형을 잡고"}, {"start": 1628.088, "end": 1630.439, "text": "약 3kg(6.6파운드)의 물건을 양팔로 운반할 수 있습니다."}, {"start": 1630.489, "end": 1633.44, "text": "소프트웨어 기술은 루나를 엔터테인먼트 분야에서 더욱 강력하게 만듭니다."}, {"start": 1633.49, "end": 1638.139, "text": "'비디오 투 모션' 툴은 댄스 영상을 로봇의 움직임으로 변환하며"}, {"start": 1638.189, "end": 1642.141, "text": "AI 태스크 에디터는 텍스트 입력만으로 동작 생성을 가능하게 하죠."}, {"start": 1642.191, "end": 1647.239, "text": "리맥스는 군집 제어를 통해 200대 이상의 루나 로봇이"}, {"start": 1647.288, "end": 1648.239, "text": "밀리초 단위로 동시에 움직일 수 있다고 설명합니다."}, {"start": 1648.288, "end": 1652.538, "text": "테슬라와 피규어가 노동력에 집중할 때 리맥스는 관심 경제를 공략 중이며"}, {"start": 1652.588, "end": 1655.74, "text": "이는 휴머노이드가 무대에서 먼저 신뢰를 얻을 수 있음을 시사합니다."}, {"start": 1655.789, "end": 1658.239, "text": "런웨이 위의 로봇은 보는 것만으로도 즐겁지만"}, {"start": 1658.288, "end": 1662.64, "text": "어질러진 방을 스스로 청소하는 로봇은 완전히 다른 차원의 이야기입니다."}, {"start": 1662.69, "end": 1666.038, "text": "유니트리가 최근 화제가 되고 있는 놀라운 시연 영상을 공개했습니다."}, {"start": 1666.087, "end": 1671.94, "text": "5월 25일 공개된 영상에는 신형 WVLA 2.0 모델이"}, {"start": 1671.99, "end": 1673.34, "text": "지저분한 회의실에서 작동하는 모습이 담겨 있습니다."}, {"start": 1673.39, "end": 1677.739, "text": "종이가 널브러져 있고 컵은 쓰러졌으며 의자도 제각각인 상황이죠."}, {"start": 1677.788, "end": 1681.837, "text": "그때 로봇이 들어와 원격 제어 없이 스스로 방을 청소하기 시작하는데"}, {"start": 1681.887, "end": 1686.337, "text": "사람의 도움이나 영상 편집 없이 모든 과정이 매끄럽게 진행됩니다."}, {"start": 1686.387, "end": 1689.459, "text": "하지만 가장 인상적인 부분은 작업 도중에 일어나는 일입니다."}, {"start": 1689.509, "end": 1692.259, "text": "로봇이 작업하는 동안에도 사람들은 끊임없이 환경을 바꿉니다."}, {"start": 1692.308, "end": 1696.359, "text": "물건을 이리저리 옮기고 경로를 막아 청소를 더 어렵게 만들죠."}, {"start": 1696.409, "end": 1700.46, "text": "하지만 유니트리 로봇은 멈추거나 지시를 기다리는 대신,"}, {"start": 1700.509, "end": 1702.66, "text": "새로운 상황에 빠르게 적응하며 계속 움직입니다."}, {"start": 1702.71, "end": 1706.759, "text": "이런 실시간 복구 능력은 로봇 공학에서 먼 이야기 같았지만,"}, {"start": 1706.809, "end": 1711.759, "text": "이제는 평범한 방에서도 자연스럽게 일어나고 있죠. WVLA 2.0이 왜 중요한 걸까요?"}, {"start": 1711.809, "end": 1716.759, "text": "VLA는 '시각 언어 행동'의 약자로, 로봇이 환경을 보고"}, {"start": 1716.808, "end": 1720.959, "text": "작업을 이해한 뒤 이를 물리적 움직임으로 전환할 수 있음을 의미합니다."}, {"start": 1721.009, "end": 1725.258, "text": "카메라로 방을 스캔해 잡동사니를 식별하고, 무엇을 먼저 처리할지 결정하며"}, {"start": 1725.307, "end": 1729.561, "text": "작업을 완수하는 데 필요한 동작을 계획하죠. 이 모든 과정이"}, {"start": 1729.611, "end": 1731.86, "text": "로봇이 움직이는 동안 실시간으로 이루어집니다."}, {"start": 1731.91, "end": 1735.661, "text": "유니트리는 이를 '월드 모델이 내장된 체화된 AI'라고 설명합니다."}, {"start": 1735.711, "end": 1740.258, "text": "간단히 말해, 로봇은 그저 정해진 지시 목록만 따르는 게 아니라는 거죠."}, {"start": 1740.307, "end": 1744.759, "text": "실제 세상의 공간과 물체 위치, 움직임, 그리고 인과관계를"}, {"start": 1744.809, "end": 1745.759, "text": "이해하려고 노력하는 겁니다."}, {"start": 1745.809, "end": 1749.459, "text": "그래서 사람들이 방해하거나 주변 환경을 바꿔놓아도"}, {"start": 1749.509, "end": 1750.661, "text": "멈추지 않고 청소를 계속할 수 있습니다."}, {"start": 1750.711, "end": 1755.058, "text": "가끔은 취한 삼촌이 귀가하는 것처럼 걸음걸이가 뻣뻣해 보이기도 하지만요."}, {"start": 1755.108, "end": 1757.258, "text": "하지만 여기서 핵심은 바로 자율성입니다."}, {"start": 1757.307, "end": 1760.38, "text": "이 청소 시연은 작아 보일지 몰라도, 그 신호는 매우 강력합니다."}, {"start": 1760.43, "end": 1765.58, "text": "휴머노이드 로봇들이 통제된 실험실을 벗어나 복잡한 인간의 공간으로 서서히 발을 들이고 있습니다."}, {"start": 1765.63, "end": 1768.381, "text": "로봇 한 대가 어질러진 방을 정리하는 것만으로도 놀랍지만,"}, {"start": 1768.431, "end": 1773.679, "text": "이제 네 대의 로봇이 팀을 이뤄 협업하는 모습을 확인해 보세요. LG는..."}, {"start": 1773.729, "end": 1778.679, "text": "...각기 다른 로봇들이 개별 기계가 아닌 하나의 팀으로 움직일 때..."}, {"start": 1778.729, "end": 1779.679, "text": "...어떤 결과가 나오는지 보여주었습니다."}, {"start": 1779.729, "end": 1784.778, "text": "서울의 물류 창고 시연 현장에서, 네 개 제조사의 로봇 네 대가..."}, {"start": 1784.828, "end": 1787.479, "text": "...인간의 개입 없이 물류 작업을 함께 수행했습니다."}, {"start": 1787.528, "end": 1789.278, "text": "이건 단순한 전시가 아니었습니다."}, {"start": 1789.328, "end": 1795.18, "text": "휴머노이드, 로봇 개, 배송 로봇이 하나의 통합 플랫폼으로 협업하는..."}, {"start": 1795.23, "end": 1797.38, "text": "미래형 물류 창고의 예고편이었죠."}, {"start": 1797.43, "end": 1800.58, "text": "가장 흥미로운 점은 로봇 그 자체만이 아니었습니다."}, {"start": 1800.63, "end": 1805.88, "text": "네 제조사의 서로 다른 로봇들이 사람이 일일이 명령을 내리지 않아도..."}, {"start": 1805.93, "end": 1808.081, "text": "어떻게 유기적으로 협력하는지 보여주었거든요."}, {"start": 1808.131, "end": 1814.38, "text": "LG CNS는 마곡 캠퍼스에서 라이브 시연을 진행했는데, 그 모습은 마치 미래 물류의..."}, {"start": 1814.43, "end": 1815.979, "text": "실제 현장을 미리 보는 듯했습니다."}, {"start": 1816.028, "end": 1821.18, "text": "작업은 이족 보행 휴머노이드가 컨베이어 벨트에서 상품을 집어 드는 것으로 시작됐습니다."}, {"start": 1821.23, "end": 1826.279, "text": "휴머노이드는 부드럽고 정교한 동작으로 물건을 상자에 담았고, 곧이어 바퀴가 달린..."}, {"start": 1826.329, "end": 1828.479, "text": "...4족 보행 로봇이 도착했습니다."}, {"start": 1828.528, "end": 1833.179, "text": "쉽게 말해 바퀴 달린 로봇 개가 상자를 받으러 온 것이죠."}, {"start": 1833.229, "end": 1837.94, "text": "이 로봇은 창고 바닥을 가로질러 상자를 옮긴 뒤 또 다른 휴머노이드에게 전달했습니다."}, {"start": 1837.99, "end": 1839.739, "text": "...선반 근처에서 대기 중이었죠."}, {"start": 1839.788, "end": 1846.739, "text": "저 두 번째 휴머노이드는 긴 팔을 이용해 2미터가 넘는 높이까지 팔을 뻗어"}, {"start": 1846.788, "end": 1849.14, "text": "높은 선반에 박스를 쌓았습니다."}, {"start": 1849.19, "end": 1854.837, "text": "모든 인계 과정은 약 90초가 소요되었지만, 더 중요한 점은 로봇들이 얼마나 매끄럽게"}, {"start": 1854.887, "end": 1857.94, "text": "서로 다른 기종 간에 작업을 전달했느냐 하는 것입니다."}, {"start": 1857.99, "end": 1862.738, "text": "가장 놀라운 점은 이 로봇들 중 어느 것도 원격 제어되지 않았다는 사실입니다."}, {"start": 1862.788, "end": 1869.337, "text": "모든 움직임은 '로봇 파운데이션 모델' 기술을 활용하는 LG CNS의 '피지컬 워크 플랫폼'을 통해 관리되었습니다."}, {"start": 1869.387, "end": 1875.44, "text": "쉽게 말해, 로봇이 스스로 물체를 인식하고 업무를 이해하며"}, {"start": 1875.49, "end": 1880.34, "text": "사람이 일일이 제어하지 않아도 스스로 결정을 내리고 업무를 분담할 수 있는 것이죠."}, {"start": 1880.39, "end": 1886.44, "text": "LG CNS는 로봇 한 대의 임무를 갑자기 변경하여 플랫폼을 테스트하기도 했습니다."}, {"start": 1886.49, "end": 1891.94, "text": "바퀴 달린 4족 보행 로봇은 순찰 업무로 재배치되었고, 다른 물류 로봇이"}, {"start": 1891.99, "end": 1896.238, "text": "배송 업무를 이어받았습니다. 작업은 중단이나 혼선 없이 계속되었습니다."}, {"start": 1896.288, "end": 1904.14, "text": "LG CNS는 이 플랫폼을 통해 로봇 도입 기간을 수개월에서 단 1~2개월로 단축할 수 있다고 말합니다."}, {"start": 1904.19, "end": 1911.841, "text": "100대의 다양한 로봇을 사용하는 창고의 경우, 생산성은 15% 이상 향상되고"}, {"start": 1911.891, "end": 1918.341, "text": "운영 비용은 18% 가까이 절감될 것으로 전망됩니다. 피지컬 워크 플랫폼은 이미"}, {"start": 1918.391, "end": 1924.44, "text": "휴머노이드, 4족 보행, 바퀴형 로봇, AMR 및 AGV를 지원합니다."}, {"start": 1924.49, "end": 1929.341, "text": "다양한 로봇들의 팀워크 시대가 이미 물류 창고 현장에서 시작되고 있습니다."}, {"start": 1929.391, "end": 1934.14, "text": "로봇들이 서로 협력하는 모습도 인상적이지만, 단 한 대의 로봇이"}, {"start": 1934.19, "end": 1937.94, "text": "빠른 속도의 스포츠 경기에서 실제 인간과 정면 대결을 펼친다면 어떨까요?"}, {"start": 1937.99, "end": 1942.94, "text": "소니는 단순히 탁구만 치는 게 아니라 숙련된 선수와도 경쟁할 수 있는 로봇을 개발했습니다."}, {"start": 1942.99, "end": 1945.34, "text": "인간 선수들을 상대로 승리하기 위해서죠."}, {"start": 1945.39, "end": 1952.99, "text": "TTAS로도 알려진 '프로젝트 에이스'는 실제 선수 및 심판과 함께"}, {"start": 1952.99, "end": 1955.239, "text": "정식 경기 규칙에 따라 진행됩니다."}, {"start": 1955.288, "end": 1960.837, "text": "대부분의 로봇이 감당할 수 없는 속도로 보고, 예측하고,"}, {"start": 1960.887, "end": 1962.74, "text": "반응하며 움직여야 하기에 이 프로젝트는 중요합니다."}, {"start": 1962.789, "end": 1967.039, "text": "소니가 로봇 공학계의 이목을 집중시킨 기술을 방금 공개했습니다."}, {"start": 1967.089, "end": 1973.64, "text": "TTAS라고도 불리는 '프로젝트 에이스'는 인간 고수들을 상대로"}, {"start": 1973.69, "end": 1979.64, "text": "탁구 경기를 펼치는 자율 로봇입니다. 단순한 연습이나 기술 시연이 아니죠."}, {"start": 1979.69, "end": 1986.14, "text": "정식 경기장에서 국제탁구연맹의 공식 규정을 준수하며 경기를 치르고,"}, {"start": 1986.19, "end": 1991.238, "text": "공인 심판이 경기를 지켜봅니다. 이것이 왜 놀라운지 이해하려면,"}, {"start": 1991.288, "end": 1997.44, "text": "탁구가 얼마나 빠른 운동인지 알아야 합니다. 탁구공은 시속 30마일,"}, {"start": 1997.49, "end": 2003.94, "text": "즉 시속 48.3km로 날아가며 회전수는 분당 9,000회에 달합니다."}, {"start": 2003.99, "end": 2007.739, "text": "숙련된 인간 선수조차 공의 궤적을 읽고"}, {"start": 2007.788, "end": 2013.639, "text": "회전을 파악해 대응하는 데는 찰나의 순간뿐이죠. 소니는 조종자 없이도"}, {"start": 2013.689, "end": 2019.538, "text": "이 모든 걸 스스로 해내는 로봇을 개발했습니다. 비전 시스템이 핵심적인 돌파구였죠."}, {"start": 2019.588, "end": 2025.788, "text": "프로젝트 에이스는 일반 탁구공이 전속력으로 움직일 때도"}, {"start": 2025.788, "end": 2027.738, "text": "그 회전을 측정할 수 있는 인지 플랫폼을 사용합니다."}, {"start": 2027.788, "end": 2031.238, "text": "탁구대 주변의 카메라 9대가 공을 3D로 추적하는 동안,"}, {"start": 2031.288, "end": 2036.94, "text": "특수 시선 제어 카메라 3대가 회전을 실시간으로 정밀 추적합니다."}, {"start": 2036.99, "end": 2040.66, "text": "나머지 카메라들은 상대 선수와 라켓의 움직임도 함께 관찰하죠."}, {"start": 2040.71, "end": 2043.759, "text": "로봇에게 끊임없이 정보를 제공하고 있습니다."}, {"start": 2043.808, "end": 2047.058, "text": "소니는 한층 영리한 방식으로 로봇을 훈련시켰죠."}, {"start": 2047.108, "end": 2050.059, "text": "정해진 규칙에만 의존하는 대신,"}, {"start": 2050.11, "end": 2053.26, "text": "'프로젝트 에이스'는 심층 강화 학습을 통해 스스로 배웠습니다."}, {"start": 2053.311, "end": 2058.858, "text": "가상 시뮬레이션에서 연습하며 보상을 통해 실력을 키웠고, 정확한 타격과"}, {"start": 2058.909, "end": 2064.46, "text": "지능적인 샷을 구사하는 법을 익혔습니다. 소니는 이 기술을 현실 세계에 적용했죠."}, {"start": 2064.51, "end": 2070.759, "text": "하드웨어는 속도를 위해 맞춤 제작되었습니다. 스카라(SCARA)와 6축 디자인을 결합한 팔은"}, {"start": 2070.809, "end": 2076.46, "text": "강력한 회전을 위해 튜닝된 손목 관절을 갖추고 있습니다. 소니에 따르면 '프로젝트 에이스'는"}, {"start": 2076.51, "end": 2082.46, "text": "아마추어는 물론 프로 선수까지 꺾었으며, 공이 네트에 맞고"}, {"start": 2082.51, "end": 2089.659, "text": "방향이 바뀌는 상황에도 적응합니다. 소니는 2026년 이 연구를 '네이처'지에 발표하며"}, {"start": 2089.71, "end": 2096.458, "text": "고속 물리 AI의 새로운 지표를 세웠습니다. 실시간으로 인간을 능가하는 기계를 만든 겁니다."}, {"start": 2096.509, "end": 2101.259, "text": "그런데 이와 같은 고속 뇌파 해독 기술이 이제는 움직임을"}, {"start": 2101.309, "end": 2107.659, "text": "잃어버린 사람들을 돕는 데 사용되고 있습니다. 한 전신마비 환자가 9년 만에 처음으로"}, {"start": 2107.71, "end": 2111.659, "text": "손가락의 감각을 느꼈습니다. 비록 실제 손이 움직인 것은 아니었지만요."}, {"start": 2111.71, "end": 2117.659, "text": "의료진은 근육 신호가 아닌 '의도'를 읽는 새로운 뇌-컴퓨터 인터페이스를 이식했습니다."}, {"start": 2117.71, "end": 2122.759, "text": "이는 향후 운동 능력과 촉각 복원, 나아가 심층 뇌 치료를 위한"}, {"start": 2122.809, "end": 2124.059, "text": "중대한 발판이 될 것입니다."}, {"start": 2124.11, "end": 2127.358, "text": "브랜든 패터슨은 지난 9년 동안 손가락을 움직이지 못했습니다."}, {"start": 2127.409, "end": 2133.059, "text": "하지만 뇌 이식 수술을 받은 후, 그는 갑자기 손가락이 다시"}, {"start": 2133.11, "end": 2134.5, "text": "꿈틀거리는 것 같은 묘한 기분을 느꼈습니다."}, {"start": 2134.55, "end": 2140.898, "text": "그의 손은 실제로 움직이지 않았지만, 뇌 속에서는 중요한 무언가가 반응하기 시작했습니다."}, {"start": 2140.949, "end": 2147.5, "text": "패터슨 씨는 41세로, 2017년 지프 전복 사고를 당해 가슴 아래가 마비되었습니다."}, {"start": 2147.55, "end": 2152.699, "text": "UC 헬스와 콜로라도 대학교 안슈츠 캠퍼스 의료진은 패터슨의 뇌에..."}, {"start": 2152.75, "end": 2157.099, "text": "기존의 이식 장치들과는 차원이 다른 뇌-컴퓨터 인터페이스를 이식했습니다."}, {"start": 2157.15, "end": 2161.398, "text": "보통 BCI 수술은 운동 피질을 대상으로 합니다."}, {"start": 2161.449, "end": 2164.099, "text": "근육의 움직임을 관장하는 뇌 부위죠."}, {"start": 2164.15, "end": 2170.25, "text": "하지만 이번에 의료진은 의도, 계획, 그리고..."}, {"start": 2170.251, "end": 2171.699, "text": "의사 결정과 관련된 더 높은 피질 부위에 장치를 심었습니다."}, {"start": 2171.75, "end": 2177.398, "text": "마비 환자를 대상으로 한 세계 최초의 고위 피질 뇌 이식 실험이 성사된 것입니다."}, {"start": 2177.449, "end": 2182.099, "text": "이번 실험이 중요한 이유는 장치가 단순히 패터슨이 어떤 근육을..."}, {"start": 2182.15, "end": 2183.798, "text": "움직이고 싶어 하는지만 파악하는 게 아니라,"}, {"start": 2183.849, "end": 2186.599, "text": "그가 무엇을 하고 싶어 하는지까지 이해하려 하기 때문입니다."}, {"start": 2186.65, "end": 2192.298, "text": "이 장치는 목표와 행동에 직결된 더 깊은 곳의 뇌 신호를 읽어내는데,"}, {"start": 2192.349, "end": 2193.5, "text": "이는 훨씬 더 큰 가능성을 열어주는 개념입니다."}, {"start": 2193.55, "end": 2197.597, "text": "가장 혁신적인 부분은 이 장치가 양방향으로 작동한다는 점입니다."}, {"start": 2197.648, "end": 2203.201, "text": "패터슨의 뇌 신호를 기록해 컴퓨터와 로봇 팔을 제어할 수 있게 할 뿐만 아니라,"}, {"start": 2203.251, "end": 2207.898, "text": "동시에 뇌로 감각 신호를 역으로 보내서..."}, {"start": 2207.949, "end": 2210.4, "text": "손의 촉감을 다시 느끼게 하는 것이 최종 목표입니다."}, {"start": 2210.451, "end": 2215.298, "text": "수술 직후 패터슨은 손가락이 가만히 있는데도..."}, {"start": 2215.349, "end": 2217.579, "text": "마치 움직이는 것처럼 느껴지는 '환각 감각'을 보고했습니다."}, {"start": 2217.63, "end": 2220.378, "text": "현재 패터슨 씨는 임플란트 훈련을 받고 있습니다."}, {"start": 2220.429, "end": 2225.577, "text": "그는 머릿속으로 과제를 연습하며 생각만으로 커서를 움직이는 법을 배우죠."}, {"start": 2225.628, "end": 2230.878, "text": "컴퓨터가 그의 뇌 패턴을 읽는 동안, 그의 뇌는 더 명확한 신호를 보내는 법을 익힙니다."}, {"start": 2230.929, "end": 2236.579, "text": "임플란트는 그의 몸속에 수년간 머물며, 연구진에게 뇌가 어떻게"}, {"start": 2236.63, "end": 2238.181, "text": "계획하고 학습하는지 관찰할 드문 기회를 줄 것입니다."}, {"start": 2238.231, "end": 2240.378, "text": "이 임무는 단순한 움직임 그 이상의 의미가 있습니다."}, {"start": 2240.429, "end": 2244.079, "text": "이러한 방식은 언젠가 루게릭병 환자나"}, {"start": 2244.13, "end": 2247.878, "text": "치매, 기분 장애 등 여러 뇌 질환을 앓는 이들에게 도움을 줄 수 있습니다."}, {"start": 2247.929, "end": 2251.98, "text": "뇌 임플란트는 로봇 공학이 인간을 위해 할 수 있는 영역의 한계를 넓히고 있죠."}, {"start": 2252.03, "end": 2257.378, "text": "한편, 다른 팀에서는 휴머노이드 로봇을 완전히 다른 방향으로 발전시키고 있는데요."}, {"start": 2257.429, "end": 2259.579, "text": "바로 '가격'에 초점을 맞춘 시도입니다."}, {"start": 2259.63, "end": 2267.378, "text": "실리콘밸리의 한 스타트업이 단돈 2,999달러의 휴머노이드 로봇을 공개했습니다."}, {"start": 2267.429, "end": 2272.78, "text": "'도모'라고 불리는 이 로봇의 가격은 현재 시장에 출시된"}, {"start": 2272.831, "end": 2273.78, "text": "대부분의 휴머노이드 로봇보다 훨씬 저렴합니다."}, {"start": 2273.831, "end": 2276.38, "text": "만약 로타쿠가 그들이 약속한 성능을 실제로 보여준다면,"}, {"start": 2276.431, "end": 2282.48, "text": "개발자나 연구원은 물론이고 개인 제작자들까지도 진짜 이족 보행 로봇을"}, {"start": 2282.53, "end": 2283.48, "text": "쉽게 접할 수 있게 될 것입니다."}, {"start": 2283.53, "end": 2289.677, "text": "단돈 2,999달러짜리 휴머노이드 로봇이라니, 거의 불가능해 보이지만요."}, {"start": 2289.728, "end": 2295.077, "text": "하지만 실리콘밸리 스타트업 '로타쿠'는 이번에 선보인"}, {"start": 2295.128, "end": 2296.059, "text": "새로운 로봇을 통해 그렇게 주장하고 있습니다."}, {"start": 2296.11, "end": 2301.557, "text": "도모의 이 가격은 제품의 가장 핵심적인 특징입니다. 대부분의 휴머노이드 로봇은 여전히"}, {"start": 2301.608, "end": 2303.358, "text": "엄청나게 비싸기 때문이죠."}, {"start": 2303.409, "end": 2311.259, "text": "비교하자면 유니트리의 G1 가격이 약 13,500달러인 데 비해, 도모는 진입 가격을"}, {"start": 2311.309, "end": 2317.858, "text": "거의 80%나 낮추려 하고 있습니다. 이는 개발자, 연구원, 학생들뿐만 아니라"}, {"start": 2317.909, "end": 2323.659, "text": "큰 비용을 들이지 않고 실제 보행 로봇을 실험해보고 싶은 로봇 공학 팬들에게도 큰 변화를 줄 것입니다."}, {"start": 2323.71, "end": 2331.809, "text": "도모의 기본 버전은 키 약 90cm에 무게는 약 20kg 정도입니다."}, {"start": 2331.809, "end": 2338.059, "text": "23도의 자유도를 갖추고 있는데, 이는 로봇이 많은 가동 관절을 가지고 있어"}, {"start": 2338.11, "end": 2344.559, "text": "걷고, 균형을 잡고, 팔을 움직일 수 있다는 뜻입니다. 또한 최대 토크가 약 120Nm에 달해"}, {"start": 2344.61, "end": 2351.21, "text": "그 크기에 걸맞은 강력하고 본격적인 움직임이 가능합니다."}, {"start": 2351.11, "end": 2357.659, "text": "본체는 전체가 밀폐된 알루미늄 설계로 가벼우면서도 견고한 느낌을 줍니다."}, {"start": 2357.71, "end": 2364.26, "text": "또한 도모는 무선 방식이라 작동 중에 전원 케이블이나 지지용 와이어가 필요 없습니다."}, {"start": 2364.311, "end": 2370.657, "text": "교체 가능한 배터리로 최대 2시간 동안 작동하며, 급속 충전에는 약 30분이 소요됩니다."}, {"start": 2370.708, "end": 2378.259, "text": "하지만 로타쿠는 단순히 저렴한 하드웨어만을 만들려는 것이 아닙니다. 개발자들을 직접 겨냥해 도모를 제작했죠."}, {"start": 2378.309, "end": 2383.159, "text": "이 로봇은 시뮬레이션, 모방 학습, 그리고 강화 학습을 지원합니다."}, {"start": 2383.21, "end": 2389.858, "text": "즉, 사용자가 실제 로봇에 테스트하기 전에 소프트웨어에서 로봇의 행동을 미리 훈련시킬 수 있다는 뜻입니다."}, {"start": 2389.909, "end": 2395.559, "text": "또한 VR 헤드셋을 통해 제어할 수 있으며, 도모가 사용자의 움직임을 그대로 따라갑니다."}, {"start": 2395.61, "end": 2400.46, "text": "출시 영상에서는 도모가 밀리거나 찔려도 균형을 잃지 않고 다시 잡는 모습을 보여줍니다."}, {"start": 2400.51, "end": 2404.657, "text": "대규모 언어 모델(LLM) 기반의 음성 비서 기능도 포함되어 있으며,"}, {"start": 2404.708, "end": 2409.059, "text": "교체 가능한 손, 뎁스 카메라, 그리고 라이다(LiDAR)까지 지원합니다."}, {"start": 2409.11, "end": 2411.099, "text": "로타쿠의 전략은 단순합니다."}, {"start": 2411.15, "end": 2418.5, "text": "사람들이 직접 실험하고 실패하며, 수리하고 계속 개발할 수 있도록 휴머노이드 로봇을 충분히 저렴하게 만드는 거죠."}, {"start": 2418.55, "end": 2425.4, "text": "도모(Domo)가 약속한 대로만 작동한다면 가정용 로봇 공학은 훨씬 더 현실로 다가오겠지만, 가격 장벽을 깨려는 휴머노이드가 도모뿐인 건 아닙니다."}, {"start": 2425.451, "end": 2427.699, "text": "가격의 벽을 무너뜨리려는 시도는 곳곳에서 계속되고 있죠."}, {"start": 2427.75, "end": 2433.099, "text": "또 다른 주요 업체가 훨씬 더 놀라운 일을 해냈는데요. 이 로봇이 판매되는 장소만 봐도"}, {"start": 2433.15, "end": 2434.9, "text": "시사하는 바가 아주 큽니다."}, {"start": 2434.951, "end": 2440.898, "text": "휴머노이드 로봇은 이제 값비싼 연구실이나 기업의 시연장에만 갇혀 있지 않습니다."}, {"start": 2440.949, "end": 2447.099, "text": "유니트리(Unitree)의 R1은 이제 일반 개발자와 학교,"}, {"start": 2447.15, "end": 2450.398, "text": "그리고 로봇 팬들이 실제로 구매를 고려할 수 있는 저가형 로봇으로 자리매김하고 있습니다."}, {"start": 2450.449, "end": 2456.497, "text": "5,000달러 미만에서 시작하는 가격 덕분에, 진짜로 걸어 다니는 로봇을 소유한다는 아이디어가 갑자기"}, {"start": 2456.547, "end": 2459.0, "text": "훨씬 현실적인 이야기처럼 느껴집니다."}, {"start": 2459.05, "end": 2462.497, "text": "유니트리는 방금 아무도 예상치 못한 일을 해냈습니다."}, {"start": 2462.547, "end": 2466.699, "text": "R1 휴머노이드 로봇이 이제 알리익스프레스에 등록된 거죠."}, {"start": 2466.75, "end": 2472.8, "text": "네, 휴대폰 케이스나 가전제품, 온갖 생활용품을 사는 바로 그 사이트 맞습니다."}, {"start": 2472.851, "end": 2478.697, "text": "이제 그 플랫폼에서 해외 구매자들을 대상으로 판매 중인"}, {"start": 2478.748, "end": 2479.697, "text": "이족 보행 로봇을 찾아볼 수 있습니다."}, {"start": 2479.748, "end": 2487.099, "text": "해외 판매가는 약 6,800달러 선이지만, 유니트리의 공식 기본 가격은 이보다 훨씬 더"}, {"start": 2487.15, "end": 2488.099, "text": "낮습니다."}, {"start": 2488.15, "end": 2495.8, "text": "R1 에어는 4,900달러부터 시작하고, 표준형 R1은 5,900달러부터 시작합니다."}, {"start": 2495.851, "end": 2499.5, "text": "물론 여기에는 배송비나 관세, 세금은 포함되지 않은 가격입니다."}, {"start": 2499.55, "end": 2502.539, "text": "하지만 더 중요한 건 가격 그 자체가 주는 메시지입니다."}, {"start": 2502.59, "end": 2507.539, "text": "이것은 지금까지 일반 대중에게 공개된 휴머노이드 로봇 중 가장 저렴한 모델 중 하나입니다."}, {"start": 2507.59, "end": 2515.538, "text": "비교를 위해 말씀드리면, 유니트리(Unitree) 자체 모델인 G1이 13,000달러가 넘는데, R1은 그 가격을 거의..."}, {"start": 2515.588, "end": 2516.538, "text": "절반으로 줄였습니다."}, {"start": 2516.588, "end": 2521.74, "text": "덕분에 학교, 개발자, 연구원 그리고 초기 로봇 제작자들에게"}, {"start": 2521.791, "end": 2527.639, "text": "고급 차 한 대 값을 지불하지 않고도 실제 휴머노이드 플랫폼을 소유할 수 있는 기회를 제공하죠."}, {"start": 2527.69, "end": 2529.24, "text": "그럼 실제로 어떤 성능을 보여줄까요?"}, {"start": 2529.291, "end": 2539.938, "text": "R1의 키는 약 1.23미터(4.04피트)이며, 무게는 약 59.5에서 63.9파운드 정도입니다."}, {"start": 2539.989, "end": 2542.539, "text": "이를 킬로그램으로 환산하면 약 27에서 29kg 사이죠."}, {"start": 2542.59, "end": 2546.538, "text": "즉, 별다른 도움 없이도 한 사람이 충분히 들어 올릴 수 있다는 뜻입니다."}, {"start": 2546.588, "end": 2552.438, "text": "디자인 또한 일반적인 실험실 로봇보다 훨씬 세련되었는데요. 바이저 스타일의 헤드와..."}, {"start": 2552.489, "end": 2554.639, "text": "깔끔한 화이트 및 블루 마감 처리가 돋보입니다."}, {"start": 2554.69, "end": 2558.938, "text": "육중한 연구용 기계라기보다는 소비자용 가전 제품에 더 가까운 모습이죠."}, {"start": 2558.989, "end": 2561.539, "text": "버전별 차이점도 중요합니다."}, {"start": 2561.59, "end": 2564.539, "text": "R1 에어(Air) 모델은 20도의 자유도를 제공하며,"}, {"start": 2564.59, "end": 2571.137, "text": "표준 R1은 26도, R1 EDU는 하드웨어 옵션에 따라 최대 40도까지 가능합니다."}, {"start": 2571.188, "end": 2577.338, "text": "개발자들이 가장 관심을 가질 모델은 EDU 버전인데요. SDK 접근 권한과..."}, {"start": 2577.389, "end": 2579.24, "text": "더 깊이 있는 커스터마이징을 지원하기 때문입니다."}, {"start": 2579.291, "end": 2584.938, "text": "또한 정교한 손(Dexterous Hands)과 엔비디아 젯슨 오린(Nvidia Jetson Orin) 연산 모듈도 탑재할 수 있습니다."}, {"start": 2584.989, "end": 2591.539, "text": "R1은 걷기, 달리기, 균형 잡기는 물론 옆돌기, 물구나무서기, 넘어졌을 때 일어서기까지 가능하며,"}, {"start": 2591.59, "end": 2594.778, "text": "심지어 복싱 스타일의 시연 영상에도 등장할 만큼 뛰어난 성능을 자랑합니다."}, {"start": 2594.829, "end": 2597.778, "text": "하지만 기대치는 여전히 현실적이어야 합니다."}, {"start": 2597.829, "end": 2600.778, "text": "R1이 당장 내일부터 부엌을 청소해 주지는 않을 테니까요."}, {"start": 2600.829, "end": 2606.278, "text": "교육과 연구, 개발자들의 초기 실험을 위한 저비용 플랫폼이죠."}, {"start": 2606.329, "end": 2611.077, "text": "그래도 온라인으로 휴머노이드 로봇을 살 수 있는 시대가 왔다는 건"}, {"start": 2611.128, "end": 2612.878, "text": "거대한 변화의 시작처럼 느껴집니다."}, {"start": 2612.929, "end": 2618.78, "text": "휴머노이드 로봇이 지구에서의 일상이 되어가고 있다면, 이번 로봇은"}, {"start": 2618.831, "end": 2620.78, "text": "지구를 위해 만들어진 게 아닙니다."}, {"start": 2620.831, "end": 2623.48, "text": "화성 표면을 누비기 위해 설계되었죠."}, {"start": 2623.53, "end": 2628.778, "text": "이 새로운 화성 로봇은 우주 탐사의 미래를 바꿀 수도 있습니다."}, {"start": 2628.829, "end": 2631.378, "text": "바퀴나 모터, 무거운 관절 대신 말이죠."}, {"start": 2631.429, "end": 2635.679, "text": "이 소프트 로봇은 인공 근육을 이용해 자벌레처럼 기어 다닙니다."}, {"start": 2635.73, "end": 2640.429, "text": "가장 놀라운 사실은 기존 로버보다"}, {"start": 2640.429, "end": 2641.88, "text": "손상이나 방사선에 더 강할 수 있다는 점입니다."}, {"start": 2641.931, "end": 2646.98, "text": "바퀴로 화성 표면을 굴러다니는 로버의 고정관념은 잊으세요."}, {"start": 2647.03, "end": 2651.878, "text": "예테보리 대학교 연구팀이 완전히 새로운 로봇을 개발했습니다."}, {"start": 2651.929, "end": 2657.378, "text": "부드럽고 유연하며, 자벌레처럼 앞으로 기어가도록 설계되었죠."}, {"start": 2657.429, "end": 2660.778, "text": "이 프로젝트는 유럽우주국(ESA)의 지원을 받으며,"}, {"start": 2660.829, "end": 2665.73, "text": "무거운 모터나 딱딱한 기계적 관절 없이"}, {"start": 2665.73, "end": 2668.98, "text": "가혹한 화성 환경을 견디는 것이 목표입니다."}, {"start": 2669.03, "end": 2673.659, "text": "일반적인 모터 대신, 이 로봇은 인공 근육으로 움직입니다."}, {"start": 2673.71, "end": 2678.858, "text": "이 근육은 전압이 가해지면 수축하고 팽창하며 로봇이"}, {"start": 2678.909, "end": 2681.858, "text": "한 걸음씩 앞으로 나아갈 수 있게 해줍니다."}, {"start": 2681.909, "end": 2687.659, "text": "덕분에 로봇은 험난한 지형에서도 더 단순하고 유연하게 움직일 수 있는데, 특히"}, {"start": 2687.71, "end": 2690.759, "text": "바퀴가 빠지거나 망가지기 쉬운 곳에서 유용합니다."}, {"start": 2690.809, "end": 2694.46, "text": "가장 인상적인 부분은 내부에 적용된 근육 기술입니다."}, {"start": 2694.51, "end": 2700.458, "text": "이 로봇에는 롤 형태의 유전체 엘라스토머 액추에이터가 쓰였는데,"}, {"start": 2700.509, "end": 2702.46, "text": "일부가 잘리거나 구멍이 나도 계속 작동할 수 있습니다."}, {"start": 2702.51, "end": 2707.86, "text": "이는 기존의 모터나 바퀴, 관절 등이 손상되면 금방 고장 나는 것과 비교하면"}, {"start": 2707.911, "end": 2709.057, "text": "엄청난 강점이죠."}, {"start": 2709.108, "end": 2714.557, "text": "전극은 단일벽 탄소나노튜브로 만들어졌습니다. 이 미세한 튜브들은 전기 신호를 전달할 뿐 아니라"}, {"start": 2714.608, "end": 2718.557, "text": "우주 방사선으로부터 로봇을 보호하는 역할도 합니다."}, {"start": 2718.608, "end": 2725.759, "text": "테스트 결과, 이 소재는 10메가전자볼트 에너지 수준의 알파 및 양성자 방사선에서도 살아남았습니다."}, {"start": 2725.809, "end": 2731.159, "text": "이런 부드러운 로봇에게는 매우 가혹한 조건이죠. 또한 이 로봇은 저전압으로 작동하므로"}, {"start": 2731.21, "end": 2737.858, "text": "전력 소모와 하드웨어 부담을 줄이고 장기 임무의 성공 가능성을 높여줍니다."}, {"start": 2737.909, "end": 2741.559, "text": "테스트 도중 연구진은 예상치 못한 현상을 발견했습니다."}, {"start": 2741.61, "end": 2747.46, "text": "로봇의 앞다리가 지표면의 미세한 홈에 걸리면서 스스로 방향을 바꾸기 시작한 겁니다."}, {"start": 2747.51, "end": 2754.36, "text": "홈의 각도를 0도에서 30도까지 테스트한 결과, 각도가 커질수록 로봇은 더 급격히 회전했습니다."}, {"start": 2754.411, "end": 2760.46, "text": "추가적인 모터나 전자 장치 없이도 말이죠. 다음으로 연구진은 온도 변화와"}, {"start": 2760.51, "end": 2765.759, "text": "추가 방사선 실험을 거쳐 네덜란드 ESA의 화성 야드(Mars Yard) 시설에서 테스트를 진행할 계획입니다."}, {"start": 2765.809, "end": 2772.059, "text": "화성 탐사의 미래는 이제 바퀴 위를 구르는 것뿐만 아니라, 인공 근육으로 기어가는 모습이 될지도 모릅니다."}, {"start": 2772.11, "end": 2778.059, "text": "화성 탐사부터 업계 최고의 이름까지, 로봇을 논할 때 테슬라를 빼놓을 수 없습니다."}, {"start": 2778.11, "end": 2783.96, "text": "옵티머스는 이제 로봇 자체만큼이나 공장이 중요한 여정의 단계에 진입하고 있습니다."}, {"start": 2784.01, "end": 2789.659, "text": "테슬라는 프리몬트에서 파일럿 생산을 준비 중입니다. 단순히 기기 몇 대를 만드는 게 아니라,"}, {"start": 2789.71, "end": 2794.557, "text": "대규모 증산을 뒷받침할 공정을 테스트하려는 거죠. 이 변화와 함께 중대한 작별도 찾아왔습니다."}, {"start": 2794.608, "end": 2800.358, "text": "한때 스타트업에서 주류 자동차 제조사로 테슬라를 성장시킨 모델 S와 모델 X 라인이"}, {"start": 2800.409, "end": 2803.358, "text": "이제 옵티머스 생산을 위해 자리를 내주고 있습니다."}, {"start": 2803.409, "end": 2805.858, "text": "이러한 확장은 캘리포니아에서만 멈추지 않습니다."}, {"start": 2805.909, "end": 2811.358, "text": "독일, 토론토, 그리고 미국 중서부의 테슬라 자동화 팀은"}, {"start": 2811.409, "end": 2814.76, "text": "휴머노이드 로봇의 대량 생산을 가능케 할 전용 설비들을 개발하고 있습니다."}, {"start": 2814.811, "end": 2818.958, "text": "첫 번째 실질적인 신호는 프리몬트에서 포착되었습니다. 새로운 영상에서 테슬라가"}, {"start": 2819.009, "end": 2821.559, "text": "옵티머스의 초기 생산 라인을 구축하는 모습이 보입니다."}, {"start": 2821.61, "end": 2826.157, "text": "한 보도에 따르면 해당 현장은 테슬라 휴머노이드 로봇의 파일럿 라인으로 보이며,"}, {"start": 2826.208, "end": 2830.26, "text": "이는 아직 전속력으로 가동되는 최종 대량 생산 공장은 아니라는 뜻입니다."}, {"start": 2830.311, "end": 2834.26, "text": "파일럿 라인은 테슬라가 공정을 검증하는 곳입니다. 조립 문제를 해결하고"}, {"start": 2834.311, "end": 2838.557, "text": "설비를 테스트하며 본격적인 대량 생산에 들어가기 전,"}, {"start": 2838.608, "end": 2845.059, "text": "옵티머스를 효율적으로 제작하는 법을 익히는 단계죠. 테슬라의 2026년 1분기 주주 보고서도 이를 뒷받침합니다."}, {"start": 2845.11, "end": 2849.059, "text": "캘리포니아와 텍사스의 옵티머스 라인을 '건설 중'으로 분류하면서도,"}, {"start": 2849.11, "end": 2853.259, "text": "설치된 용량과 실제 생산량은 다르다는 점을 경고하고 있기 때문입니다."}, {"start": 2853.309, "end": 2858.157, "text": "따라서 이것이 테슬라가 이미 연간 100만 대의 옵티머스를 생산한다는 증거는 아니지만,"}, {"start": 2858.208, "end": 2863.418, "text": "미래 목표에 맞춰 설계된 프리몬트 라인과 함께 생산 확대가 구체화되고 있음을 보여줍니다."}, {"start": 2863.469, "end": 2866.818, "text": "하지만 프리몬트는 테슬라가 찾아낸 단순한 공장 부지 그 이상입니다."}, {"start": 2866.869, "end": 2870.318, "text": "이곳은 모델 S와 모델 X를 탄생시킨 바로 그 생산 라인이죠."}, {"start": 2870.369, "end": 2875.019, "text": "전기차에 대한 사람들의 인식을 바꾼 두 모델입니다. 모델 S는 전기차도 충분히"}, {"start": 2875.07, "end": 2881.418, "text": "빠르고 고급스러우며, 진심으로 갖고 싶은 차가 될 수 있음을 증명했습니다. 반면 모델 X는"}, {"start": 2881.469, "end": 2885.619, "text": "팔콘 윙 도어와 거대한 통유리창, 가족을 위한 실용성을 갖추고 테슬라를 럭셔리 SUV의 영역으로 이끌었죠."}, {"start": 2885.67, "end": 2890.318, "text": "이제 테슬라는 두 프로그램과 작별을 고하려 합니다. 실패해서가 아닙니다. 회사의"}, {"start": 2890.369, "end": 2894.818, "text": "무게 중심이 자율 주행과 로보택시, 그리고 옵티머스로 옮겨갔기 때문입니다."}, {"start": 2894.869, "end": 2896.818, "text": "이 순간은 일종의 세대교체와도 같습니다."}, {"start": 2896.869, "end": 2901.218, "text": "테슬라는 가장 역사적인 전기차 생산 기지 중 하나를"}, {"start": 2901.268, "end": 2903.019, "text": "휴머노이드 로봇의 미래를 위한 발판으로 바꾸고 있습니다."}, {"start": 2903.07, "end": 2907.619, "text": "만약 테슬라가 연간 100만 대의 옵티머스 로봇을 생산한다는 목표를 달성한다면,"}, {"start": 2907.67, "end": 2909.218, "text": "세상이 얼마나 바뀔 것 같나요?"}, {"start": 2909.268, "end": 2910.218, "text": "아래에 댓글로 남겨주세요."}, {"start": 2910.268, "end": 2914.619, "text": "프리몬트가 옵티머스의 조립처일지는 몰라도, 생산의 중추는 캘리포니아를 훨씬 넘어"}, {"start": 2914.67, "end": 2915.92, "text": "전 세계로 뻗어 있습니다."}, {"start": 2915.971, "end": 2920.92, "text": "테슬라 부사장 라스 모라비는 독일, 토론토, 그리고 미국 중서부에서 활동하는"}, {"start": 2920.971, "end": 2924.818, "text": "자동화 팀들의 실제 작업 영상을 공개했습니다. 이 팀들은 로봇 제조를 가능하게 하는"}, {"start": 2924.869, "end": 2927.019, "text": "첨단 생산 시스템을 구축하고 있죠."}, {"start": 2927.07, "end": 2932.019, "text": "구 '그로만'이었던 독일의 테슬라 오토메이션은 배터리, 전자 장치 및"}, {"start": 2932.07, "end": 2934.98, "text": "복잡한 조립을 위한 고도 자동화 라인 분야에서 깊은 경험을 보유하고 있습니다."}, {"start": 2935.03, "end": 2939.778, "text": "토론토에서는 기존 하이바(Hibar) 팀이 액추에이터와"}, {"start": 2939.829, "end": 2941.778, "text": "관절 및 전자 장치 조립을 위한 고속 정밀 공정을 추가하고 있습니다."}, {"start": 2941.829, "end": 2946.977, "text": "미 중서부 팀은 특수 생산 장비에 필요한 또 다른 차원의 제조 노하우를 더해주죠."}, {"start": 2947.027, "end": 2948.98, "text": "옵티머스는 단순한 제품이 아닙니다."}, {"start": 2949.03, "end": 2954.378, "text": "테슬라가 휴머노이드 로봇을 본격적으로 양산하려면 모든 관절과 센서,"}, {"start": 2954.429, "end": 2956.778, "text": "케이블 경로 및 손 부품에 극도의 정밀함이 필요합니다."}, {"start": 2956.829, "end": 2961.679, "text": "다음 단계는 옵티머스 내부의 연산 능력이며, 여기서 테슬라의 AI-5 칩이"}, {"start": 2961.73, "end": 2966.577, "text": "계획의 핵심적인 부분이 됩니다. 테슬라는 AI-5의 테이프 아웃을 완료했는데, 이는"}, {"start": 2966.628, "end": 2970.778, "text": "샘플 제작 전 칩 디자인이 최종 단계에 도달했음을 의미합니다."}, {"start": 2970.829, "end": 2976.577, "text": "성능 향상 폭은 엄청납니다. AI-4보다 연산 능력은 약 8배, 메모리는 약 9배나 높죠."}, {"start": 2976.628, "end": 2982.577, "text": "머스크는 AI-5 한 개가 엔비디아 H100급 성능을 내며, 듀얼 구성 시"}, {"start": 2982.628, "end": 2988.378, "text": "저비용 저전력으로 엔비디아 블랙웰급 성능에 도달할 수 있다고 말합니다."}, {"start": 2988.429, "end": 2994.878, "text": "샘플은 2026년 말, 양산은 2027년 중반쯤 예상됩니다. AI-4는 자동차용으로 충분할지 모르지만,"}, {"start": 2994.929, "end": 2999.88, "text": "옵티머스는 와이파이 없이 스스로 보고, 균형 잡고, 움직이며 반응하기 위해 더 많은 로컬 지능이 필요합니다."}, {"start": 2999.931, "end": 3004.681, "text": "외형 디자인 역시 양산형 로봇에 더 가까워지고 있습니다. 취리히 키노트에서"}, {"start": 3004.731, "end": 3009.88, "text": "테슬라의 옵티머스 프로그램 리드인 콘스탄티노스 라스카리스는 3세대 실루엣을 공개하며"}, {"start": 3009.931, "end": 3014.878, "text": "이를 최초의 대량 생산 가능한 옵티머스라고 설명했습니다."}, {"start": 3014.929, "end": 3019.38, "text": "이 표현은 테슬라가 범블비나 2세대 같은 연구용 버전에서 벗어나"}, {"start": 3019.431, "end": 3021.28, "text": "실제로 양산할 수 있는 로봇으로 전환하고 있음을 시사합니다."}, {"start": 3021.331, "end": 3025.418, "text": "실루엣은 더 두꺼운 팔뚝과 매끄러운 라인 등 더욱 인간에 가까워진 모습입니다."}, {"start": 3025.469, "end": 3028.418, "text": "실제 작동하는 인간형 로봇에 더 가까운 손이죠."}, {"start": 3028.469, "end": 3032.619, "text": "엔지니어들은 이 디자인을 '슈퍼히어로 수트를 입은 인간'이라고 설명해 왔습니다."}, {"start": 3032.67, "end": 3036.42, "text": "테슬라는 아직 전체 모습을 공개하지 않았는데, 머스크는 경쟁사들이 모든 프레임을 낱낱이 분석하기 때문이라고 말합니다."}, {"start": 3036.471, "end": 3039.019, "text": "하지만 방향성은 명확하죠."}, {"start": 3039.07, "end": 3043.918, "text": "3세대는 유용성, 안전성, 신뢰성, 그리고 대량 생산에 초점을 맞춰 제작되고 있습니다."}, {"start": 3043.969, "end": 3047.418, "text": "3세대의 진정한 혁신은 손에서 나올 것으로 보이는데,"}, {"start": 3047.469, "end": 3051.018, "text": "옵티머스가 물리적 세계에서 얼마나 유용할지를 결정하는 핵심 부위이기 때문입니다."}, {"start": 3051.068, "end": 3056.019, "text": "테슬라의 새로운 손은 22도의 자유도를 갖췄으며, 양팔과 손에 걸쳐 50개의 액추에이터가 배치되어 있습니다."}, {"start": 3056.07, "end": 3060.318, "text": "이를 통해 인간 수준의 움직임과 제어에 한층 더 가까워졌죠."}, {"start": 3060.369, "end": 3063.119, "text": "걷는 것은 인간형 로봇이 해야 할 일 중 극히 일부일 뿐입니다."}, {"start": 3063.17, "end": 3067.519, "text": "공장에서 일하려면 옵티머스는 깨지기 쉬운 물건을 집어 들고, 작은 부품들을 다뤄야 합니다."}, {"start": 3067.57, "end": 3071.019, "text": "물건을 뭉개거나 떨어뜨리지 않고 볼트를 조이고 위치를 조정해야 하죠."}, {"start": 3071.07, "end": 3074.217, "text": "테슬라가 정교함에 그토록 공을 들이는 이유가 바로 이것입니다."}, {"start": 3074.268, "end": 3078.418, "text": "더 똑똑한 두뇌는 로봇이 작업을 이해하도록 돕지만, 옵티머스가 실제로 일을 하게 만드는 건 바로 손입니다."}, {"start": 3078.469, "end": 3080.019, "text": "실질적인 작업을 수행하는 주체인 셈이죠."}, {"start": 3080.07, "end": 3084.218, "text": "로봇이 섬세한 물건을 다루고 볼트를 조이며 인간 곁에서 함께 일할 수 있다면,"}, {"start": 3084.268, "end": 3086.218, "text": "실제 공장 현장에서 그 로봇을 신뢰하시겠습니까?"}, {"start": 3086.268, "end": 3087.218, "text": "아래에 댓글을 남겨주세요."}, {"start": 3087.268, "end": 3092.218, "text": "옵티머스에 대한 머스크의 더 큰 비전은 단일 생산 라인이나 공장 업무 그 너머를 향하고 있습니다."}, {"start": 3092.268, "end": 3096.5, "text": "그는 옵티머스를 일종의 '폰 노이만 머신'으로 묘사했는데, 이는 스스로를 복제하거나..."}, {"start": 3096.55, "end": 3100.4, "text": "결국 로봇 생산량을 늘리고 점차 생산 규모를 확장하는 데 도움이 될 것입니다."}, {"start": 3100.451, "end": 3105.197, "text": "한 가지 아이디어는 매우 야심 차지만, 테슬라는 보다 현실적인 경로를 택했습니다."}, {"start": 3105.248, "end": 3109.997, "text": "옵티머스는 우선 테슬라 자체 공장에 도입되어 반복적이거나 위험한 업무를"}, {"start": 3110.047, "end": 3116.5, "text": "수행할 예정이며, 이후 대당 약 2만~3만 달러의 예상 가격으로 외부 판매를 시작할 계획입니다."}, {"start": 3116.55, "end": 3121.0, "text": "머스크는 또한 옵티머스가 언젠가 10조 달러 이상의 가치를 창출하며"}, {"start": 3121.05, "end": 3123.097, "text": "테슬라의 자동차 사업보다 더 거대해질 것이라고 주장했습니다."}, {"start": 3123.148, "end": 3127.398, "text": "그런 미래는 아직 먼 이야기지만, 3세대 모델은 그 비전이"}, {"start": 3127.449, "end": 3129.099, "text": "실현 가능한지를 테스트하는 첫걸음입니다."}, {"start": 3129.15, "end": 3132.5, "text": "그러한 규모를 실현하려면 테슬라에겐 단순한 로봇 공장 이상의 것이 필요합니다."}, {"start": 3132.55, "end": 3135.898, "text": "바로 거대하고 안정적인 AI 칩 공급망이죠."}, {"start": 3135.949, "end": 3139.699, "text": "여기서 텍사스에 건설될 것으로 알려진 '테라팹' 계획이 중요해집니다."}, {"start": 3139.75, "end": 3144.099, "text": "테슬라는 스페이스X와 협력하여 자체 칩 파운드리를 구축 중인 것으로 알려졌으며, 초기 투자액은"}, {"start": 3144.15, "end": 3148.699, "text": "약 550억 달러로 시작해 시간이 흐르며 훨씬 더 늘어날 가능성이 있습니다."}, {"start": 3148.75, "end": 3153.099, "text": "목표는 외부 공급업체에 대한 의존도를 낮추고, FSD, 도조, 옵티머스,"}, {"start": 3153.15, "end": 3157.5, "text": "로보택시 및 스타링크를 뒷받침하는 실리콘 스택에 대한 통제력을 강화하는 것입니다."}, {"start": 3157.55, "end": 3162.798, "text": "테슬라는 수백만 대의 로봇과 자율주행 차량이 거대한 AI 시스템과 함께 구동되기를 원합니다."}, {"start": 3162.849, "end": 3165.298, "text": "이 과정에서 칩 공급은 가장 큰 제약 중 하나가 됩니다."}, {"start": 3165.349, "end": 3169.099, "text": "테라팹은 그러한 토대를 밑바닥부터 구축하려는 테슬라의 시도입니다."}, {"start": 3169.15, "end": 3173.798, "text": "칩 공급 계층 위에서 테슬라는 옵티머스가 명령을 받고 이해하는 방식을"}, {"start": 3173.849, "end": 3176.659, "text": "결정하는 지능 계층 또한 구축하고 있습니다."}, {"start": 3176.71, "end": 3182.358, "text": "그록-5는 현재 6조 개, 심지어는 10조 개의 매개변수를 목표로 하는 버전들로 훈련되고 있습니다."}, {"start": 3182.409, "end": 3190.358, "text": "멤피스에 위치한 xAI의 콜로서스 시스템이 20만 개 이상의 GPU를 기반으로 구축되고 엔비디아 블랙웰 하드웨어로 전환 중인 가운데,"}, {"start": 3190.409, "end": 3200.358, "text": "머스크는 그록을 '오케스트레이션 AI'라고 정의했습니다. 이는 옵티머스가 기동, 균형, 시각 및 실시간 판단을 위해 온보드 컴퓨팅을 사용하는 동안 그록이 광범위한 명령을 처리할 수 있음을 의미하죠."}, {"start": 3200.409, "end": 3202.358, "text": "이제 모든 구성 요소가 명확하게 맞물리기 시작합니다."}, {"start": 3202.409, "end": 3204.358, "text": "FSD는 옵티머스에게 시각을 부여하고,"}, {"start": 3204.409, "end": 3206.358, "text": "그록은 고차원적인 이해력을 제공합니다."}, {"start": 3206.409, "end": 3211.858, "text": "AI-5가 로컬 연산 능력을 담당한다면, 3세대 하드웨어는 현실에서 움직일 수 있는 몸과 손을 제공하는 셈이죠."}, {"start": 3211.909, "end": 3216.46, "text": "이것이 생산 라인, 칩 설계, 그리고 손 업그레이드가 모두 동일한"}, {"start": 3216.51, "end": 3220.659, "text": "옵티머스 프로젝트의 일환인 이유입니다. 여러분에겐 무엇이 더 강력하게 느껴지나요? 로봇 내부의 AI-5인가요,"}, {"start": 3220.71, "end": 3225.659, "text": "로봇을 이끄는 그록인가요, 아니면 실제로 작업을 수행하는 새로운 3세대 손인가요? 아래에 의견을 남겨주세요."}, {"start": 3225.71, "end": 3231.159, "text": "결국 진정한 옵티머스 업데이트는 단순히 로봇 한 대가 공장에 들어가는 것이 아닙니다. 테슬라가"}, {"start": 3231.21, "end": 3236.657, "text": "생산 라인, 전용 칩, AI 모델, 로봇 손, 그리고 글로벌 자동화 팀을 하나의"}, {"start": 3236.708, "end": 3241.958, "text": "더 거대한 시스템으로 통합하는 과정이죠. 대담한 주장들이 실현되려면 시간이 필요합니다. 파일럿 라인과 대규모 생산은 엄연히"}, {"start": 3242.009, "end": 3247.659, "text": "다르니까요. 하지만 방향은 확실합니다. 테슬라는 옵티머스가 실험실 프로젝트를 벗어나 실제 공장"}, {"start": 3247.71, "end": 3253.159, "text": "노동자가 되길 원합니다. 그리고 한 기업이 이런 방식으로 휴머노이드 로봇을 만들기 시작하면, 더 큰 경쟁은 더 이상"}, {"start": 3253.21, "end": 3259.059, "text": "시연 수준에 머물지 않습니다. 누가 먼저 유용한 로봇을 양산하느냐의 싸움이 되죠. 아무리 강력한 두뇌라도"}, {"start": 3259.11, "end": 3265.159, "text": "로봇이 주변 세상을 감지할 수 없다면 무용지물입니다. 상하이의 한 기업이 바로 이 점에"}, {"start": 3265.21, "end": 3270.657, "text": "집착하고 있습니다. 상하이 메트릭스의 '메트릭스 3' 휴머노이드 로봇은 사람 사이에서 느끼고, 생각하며, 함께 일하도록 설계되었습니다."}, {"start": 3270.708, "end": 3275.659, "text": "메트릭스 로보틱스는 상하이 AI 데이 행사에서 메트릭스 3를 공개했는데요, 이는"}, {"start": 3275.71, "end": 3281.278, "text": "2026년 중국에서 가장 대담한 휴머노이드 출시작 중 하나가 될 것으로 보입니다. 진짜 핵심은 단순히 디자인이나..."}, {"start": 3281.329, "end": 3286.679, "text": "보행 능력도 뛰어나지만, 핵심은 매트릭스 3가 촉각을 느끼는 로봇으로 설계되었다는 점입니다."}, {"start": 3286.73, "end": 3291.878, "text": "음성 명령을 이해하고 인간의 일상 공간에서 협업이 가능하죠. 가장 흥미로운 건 바로"}, {"start": 3291.929, "end": 3297.679, "text": "인공 피부입니다. 매트릭스 로보틱스는 로봇을 3D 직물로 감싸고 그 안에 미세 센서를"}, {"start": 3297.73, "end": 3302.079, "text": "직접 내장했습니다. 덕분에 로봇은 카메라에만 의존하지 않고"}, {"start": 3302.13, "end": 3306.977, "text": "몸 전체로 촉각을 감지할 수 있죠. 사람 곁에서 일하는 휴머노이드에게 이건 매우 중요한데,"}, {"start": 3307.027, "end": 3311.88, "text": "압력과 접촉, 움직임을 훨씬 자연스럽게 파악해야 하기 때문입니다. 손가락 끝은"}, {"start": 3311.931, "end": 3318.177, "text": "0.1뉴턴, 즉 0.02파운드 정도의 미세한 압력까지 감지할 수 있습니다."}, {"start": 3318.228, "end": 3320.681, "text": "과일처럼 부드러운 물체도 손상 없이 잡을 수 있을 만큼 섬세하죠."}, {"start": 3320.731, "end": 3325.38, "text": "또한 각 손은 27도의 자유도를 갖춰 손가락의 움직임이 매우 자유롭습니다."}, {"start": 3325.431, "end": 3330.278, "text": "딱딱한 기계식 손가락 대신 케이블 구동식 힘줄을 사용해, 마치"}, {"start": 3330.329, "end": 3331.681, "text": "사람의 손가락처럼 움직이죠."}, {"start": 3331.731, "end": 3335.878, "text": "덕분에 도구를 잡거나 옷을 개고, 물건을 건네는 동작이 훨씬 매끄럽습니다."}, {"start": 3335.929, "end": 3339.179, "text": "로봇의 두뇌에는 매트릭스 로보틱스의 '웨이브(Wave)' 모델이 탑재되었습니다."}, {"start": 3339.23, "end": 3343.181, "text": "이 시스템은 제로샷 학습을 지원하므로, 로봇은 새로운 음성 명령을 듣고"}, {"start": 3343.231, "end": 3346.878, "text": "별도의 재학습 없이도 주어진 과업을 이해하려고 시도합니다."}, {"start": 3346.929, "end": 3351.48, "text": "서비스 로봇은 프로그래밍된 데모만으로는 한계가 있기에 이 기능이 매우 중요하죠."}, {"start": 3351.53, "end": 3354.181, "text": "실제 환경의 새로운 업무들에 유연하게 대처해야 하니까요."}, {"start": 3354.231, "end": 3361.829, "text": "매트릭스 3의 보행 속도는 시속 약 2.5~3.9km 정도이며,"}, {"start": 3361.831, "end": 3365.679, "text": "보행 스타일은 실제 인간의 모션 캡처 데이터를 토대로 학습되었습니다."}, {"start": 3365.73, "end": 3372.119, "text": "로봇의 키는 약 1.7미터이며, 무게는 65kg 정도입니다."}, {"start": 3372.17, "end": 3377.718, "text": "무게는 65kg으로 성인과 비슷한 크기지만 가정이나 호텔,"}, {"start": 3377.768, "end": 3379.221, "text": "상점, 사무 공간에서 쓰기에 부담스럽지 않습니다."}, {"start": 3379.271, "end": 3382.318, "text": "배터리는 한 번 충전으로 약 4시간 동안 지속됩니다."}, {"start": 3382.369, "end": 3387.221, "text": "매트릭스 로보틱스는 테슬라 차이나에서 디자인과 연구를 담당했던"}, {"start": 3387.271, "end": 3389.918, "text": "장하이싱(앨런 장)이 이끌고 있습니다."}, {"start": 3389.969, "end": 3394.918, "text": "상하이 공장에서 연간 1만 대의 로봇 생산을 준비 중이며"}, {"start": 3394.969, "end": 3397.918, "text": "2026년 6월 말까지 초도 물량 1,000대를 생산할 계획입니다."}, {"start": 3397.969, "end": 3404.019, "text": "가격은 약 8만 5천 달러부터이며, 매트릭스 3 프로는 약 9만 9천 달러입니다."}, {"start": 3404.07, "end": 3406.918, "text": "말랑한 과일을 만지는 것도 대단하지만,"}, {"start": 3406.969, "end": 3410.82, "text": "움직이는 벨트에서 상자를 집는 건 차원이 다른 난이도죠."}, {"start": 3410.871, "end": 3417.418, "text": "RLWRLD의 박스 포장 시연을 보면 왜 휴머노이드 로봇의 손이 창고의 중요한"}, {"start": 3417.469, "end": 3418.418, "text": "도구가 되고 있는지를 보여줍니다."}, {"start": 3418.469, "end": 3423.519, "text": "이번 시연은 겉보기엔 단순한 박스 포장 작업 같지만,"}, {"start": 3423.57, "end": 3425.918, "text": "작은 상자 하나를 집는 것 이상의 큰 의미가 있습니다."}, {"start": 3425.969, "end": 3430.82, "text": "휴머노이드 로봇이 움직이는 물체와 타이밍, 촉각, 팀워크를 어떻게 다루기 시작했는지,"}, {"start": 3430.871, "end": 3434.617, "text": "그리고 기존 창고 로봇들이 어려워하던 복잡한 환경을 어떻게 극복하는지 보여줍니다."}, {"start": 3434.668, "end": 3438.519, "text": "시연 영상에서 첫 번째 로봇은 움직이는 컨베이어 벨트를 향해 손을 뻗어"}, {"start": 3438.57, "end": 3441.119, "text": "다섯 손가락으로 된 손으로 작은 청록색 상자를 집어 듭니다."}, {"start": 3441.17, "end": 3443.318, "text": "단순히 무작위로 상자를 낚아채는 게 아닙니다."}, {"start": 3443.369, "end": 3447.398, "text": "상자를 들어 올린 뒤 적절한 방향으로 돌려 안정적으로 유지하며 내려놓습니다."}, {"start": 3447.449, "end": 3449.599, "text": "다음 단계를 위해 상자를 준비하고 나면"}, {"start": 3449.65, "end": 3453.599, "text": "두 번째 로봇이 나타나 같은 상자를 집어 들고는"}, {"start": 3453.65, "end": 3454.997, "text": "흰색 배송용 상자 안에 깔끔하게 담습니다."}, {"start": 3455.047, "end": 3459.798, "text": "여기서 중요한 점은 로봇이 단순히 입력된 동작을 반복하는 게 아니라는 겁니다."}, {"start": 3459.849, "end": 3465.298, "text": "화면 속 'RLD-X-1 완전 자율, 1배속'이라는 문구는"}, {"start": 3465.349, "end": 3470.197, "text": "배후에서 사람이 조종하지 않아도 로봇이 실시간 작업을 수행 중임을 뜻하죠."}, {"start": 3470.248, "end": 3474.798, "text": "즉, 로봇이 벨트를 살피며 상자 위치를 파악하고 손의 각도를 조절해"}, {"start": 3474.849, "end": 3477.298, "text": "스스로 포장 작업을 완수하는 것입니다."}, {"start": 3477.349, "end": 3484.599, "text": "이 모든 것의 핵심은 RLD가 산업 현장을 위해 개발한 숙련도 중심 파운데이션 모델, RLD-X1입니다."}, {"start": 3484.65, "end": 3491.298, "text": "대다수 로봇 시스템이 주로 카메라에 의존하는 반면, RLD-X1은 영상, 언어, 신체 위치뿐만 아니라"}, {"start": 3491.349, "end": 3496.398, "text": "촉각, 회전력, 그리고 기억력까지 결합했습니다. 로봇이 상자를 눈으로만 보는 게 아니라"}, {"start": 3496.449, "end": 3501.0, "text": "손에 닿는 질감을 느끼고 움직임을 추적하며, 최근의 기억을 활용해"}, {"start": 3501.05, "end": 3505.8, "text": "실수를 방지한다는 뜻이죠. 실제 창고는 완벽한 시연실이 아니기 때문에 이는 매우 중요합니다."}, {"start": 3505.851, "end": 3511.398, "text": "상자가 미끄러지고 벨트가 계속 움직이며 물체 위치가 바뀌는 상황에서, 로봇이 정확히 물건을 잡을 기회는 찰나뿐입니다."}, {"start": 3511.449, "end": 3514.798, "text": "손의 반응이 조금이라도 늦으면 작업 전체가 실패로 돌아가죠."}, {"start": 3514.849, "end": 3522.599, "text": "RLWRLD는 바로 이 문제를 해결하고자 합니다. 사측에 따르면 RLD-X1은 ALLEX 휴머노이드 테스트에서 86.8%의 성공률을 기록했습니다."}, {"start": 3522.65, "end": 3528.197, "text": "경쟁 모델이 약 40% 정도에 그친 것과 비교하면 압도적인 성과죠."}, {"start": 3528.248, "end": 3535.398, "text": "또한 이 시스템은 RTX 5090 기반에서 스텝당 약 43.7밀리초의 속도로 작동하는데, 이는"}, {"start": 3535.449, "end": 3536.798, "text": "실제 창고 작업에 투입되기에 충분한 속도입니다."}, {"start": 3536.849, "end": 3543.338, "text": "RLWRLD는 최근 시드 2 펀딩에서 약 2,600만 달러를 추가 유치하며 총 시드 투자액을..."}, {"start": 3543.389, "end": 3545.539, "text": "약 4,100만 달러에 이릅니다."}, {"start": 3545.59, "end": 3550.538, "text": "CJ대한통운, 라타와 같은 파트너사들과 함께 이 회사는 단순한 시연을 넘어"}, {"start": 3550.588, "end": 3557.588, "text": "실제 포장 라인과 공장, 그리고 물류 센터를 겨냥하고 있습니다."}];
let player;
function onYouTubeIframeAPIReady(){
    player=new YT.Player('player',{
        videoId:videoId,
        playerVars:{autoplay:1,controls:1,rel:0,modestbranding:1,fs:0,disablekb:1,cc_load_policy:3},
        events:{
            'onReady': function(e){ 
                // [V160.4] 유튜브 기본 자막이 같이 켜져서 두 개로 겹쳐 보이는 현상 방지 🐾
                try { e.target.unloadModule("captions"); } catch(err) {} 
            },
            'onStateChange':onPlayerStateChange
        }
    });
}

// [V160.1] AI냥: 유튜브 고유 단축키 무력화 후, 'f' 키 등 사용자 편의 조작을 가로채서 자체 전체화면 실행! 🐱✨
window.addEventListener('keydown', function(e) {
    if (!player || !player.getPlayerState || typeof player.getDuration !== 'function') return;

    // Ctrl + ArrowLeft: Previous Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowLeft') {
        const t = player.getCurrentTime();
        let target = Math.max(0, t - 5);
        for(let i = subs.length - 1; i >= 0; i--) {
            if(subs[i].start < t - 1.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    // Ctrl + ArrowRight: Next Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowRight') {
        const t = player.getCurrentTime();
        let target = t + 5;
        for(let i = 0; i < subs.length; i++) {
            if(subs[i].start > t + 0.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    if (e.key.toLowerCase() === 'f') {
        toggleFullScreen();
        e.preventDefault();
    } else if (e.key === ' ' || e.key.toLowerCase() === 'k') {
        if (player.getPlayerState() === 1) player.pauseVideo();
        else player.playVideo();
        e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
        player.seekTo(player.getCurrentTime() - 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowRight') {
        player.seekTo(player.getCurrentTime() + 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowUp') {
        player.setVolume(player.getVolume() + 5);
        e.preventDefault();
    } else if (e.key === 'ArrowDown') {
        player.setVolume(player.getVolume() - 5);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'm') {
        player.isMuted() ? player.unMute() : player.mute();
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'j') {
        player.seekTo(player.getCurrentTime() - 10, true);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'l') {
        player.seekTo(player.getCurrentTime() + 10, true);
        e.preventDefault();
    } else if (e.key >= '0' && e.key <= '9') {
        const fraction = parseInt(e.key) / 10;
        player.seekTo(player.getDuration() * fraction, true);
        e.preventDefault();
    }
});

// iframe 클릭 시 빼앗긴 포커스를 0.1초 뒤에 훔쳐와서 'f' 등 단축키가 계속 먹히도록 유지! 🕵️‍♂️✨
window.addEventListener('blur', function() {
    setTimeout(() => {
        if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
            window.focus();
        }
    }, 100);
});
let syncInterval;
let activityTimeout;
function resetActivity() {
    const fsBtn = document.getElementById('fs-btn');
    const subsEl = document.getElementById('subtitles');
    if(fsBtn) fsBtn.classList.remove('fade-out');
    if(subsEl) subsEl.classList.remove('ui-hidden');
    clearTimeout(activityTimeout);
    if (player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING) {
        activityTimeout = setTimeout(() => {
            if(fsBtn) fsBtn.classList.add('fade-out');
            if(subsEl) subsEl.classList.add('ui-hidden');
        }, 3000);
    }
}
document.addEventListener('mousemove', resetActivity);
document.addEventListener('touchstart', resetActivity, {passive: true});
document.addEventListener('keydown', resetActivity);
window.addEventListener('blur', resetActivity);
window.addEventListener('focus', resetActivity);

function onPlayerStateChange(event){
    resetActivity();
    if(event.data==YT.PlayerState.PLAYING){
        if(!syncInterval) syncInterval=setInterval(updateSubs,100);
    }else{
        clearInterval(syncInterval); syncInterval=null;
    }
}
function updateSubs(){
    const t=player.getCurrentTime();
    let currentHtml="";
    let activeSubs = [];
    for(let i=0;i<subs.length;i++){
        if(t>=subs[i].start && t<=subs[i].end){
            activeSubs.push(subs[i]);
        }
    }
    if(activeSubs.length > 0){
        // [V160.5] AI 번역 생성 시 자막 시간이 미세하게 겹쳐(Overlap) 동일한 내용이 두 줄로 출력되는 현상 방지! 
        // 겹치는 자막 중 가장 마지막 매칭 항목 하나만 렌더링 🐾
        let bestSub = activeSubs[activeSubs.length - 1];
        currentHtml = `<div class="sub-line">${bestSub.text}</div><br>`;
    }
    if(document.getElementById('subtitles').innerHTML !== currentHtml){
        document.getElementById('subtitles').innerHTML=currentHtml;
    }
}

let isDragging=false, startY, currentBottom, subEl=document.getElementById('subtitles');
document.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchstart', dragStart, {passive:false});
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('touchend', dragEnd);

function dragStart(e) {
    if(!e.target.classList.contains('sub-line')) return;
    isDragging = true;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    startY = clientY;
    let style = window.getComputedStyle(subEl);
    currentBottom = parseFloat(style.bottom) || 0;
    subEl.classList.add('dragging');
    e.preventDefault();
}
function dragMove(e) {
    if(!isDragging) return;
    // [FIX] iframe 등에 의해 mouseup 이벤트를 놓쳤지만 마우스 버튼은 떼어진 경우 강제 드래그 종료! 🛡️✨
    if(e.type.includes('mouse') && e.buttons === 0) {
        dragEnd(e);
        return;
    }
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    let dy = clientY - startY;
    subEl.style.bottom = (currentBottom - dy) + 'px';
    if(e.cancelable) e.preventDefault();
}
function dragEnd(e) {
    isDragging = false;
    subEl.classList.remove('dragging');
}

// [Wheel / Pinch to Zoom for Font Size]
let currentFontSize = 4.5;
let initialDist = 0;
let initialFontSize = 4.5;

document.addEventListener('wheel', (e) => {
    if(e.target.closest('#subtitles') || e.target.classList.contains('sub-line')) {
        e.preventDefault();
        currentFontSize += e.deltaY < 0 ? 0.2 : -0.2;
        currentFontSize = Math.max(1, Math.min(20, currentFontSize));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
    }
}, {passive: false});

document.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialFontSize = currentFontSize;
        e.preventDefault();
    }
}, {passive: false});

document.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        let scale = currentDist / initialDist;
        currentFontSize = Math.max(1, Math.min(20, initialFontSize * scale));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
        e.preventDefault();
    }
}, {passive: false});
