8, "text": "어떻게 하면 좋은 제품에 녹여낼지?"}, {"start": 182.419, "end": 184.289, "text": "그리고 어떻게 안전을 확보할지 같은 것들이요."}, {"start": 184.34, "end": 186.888, "text": "샌프란시스코에서 자란 어린 시절은 어땠나요?"}, {"start": 186.938, "end": 192.088, "text": "아버지는 가죽 공예가였고 어머니는 도서관에서 일하셨다고 들었는데, 그런 환경이 어떤 영향을 주었나요?"}, {"start": 192.139, "end": 197.088, "text": "제 주변에선 1차 인터넷 혁명이 한창 일어나고 있었는데요."}, {"start": 197.139, "end": 199.289, "text": "전 전혀 관심이 없었어요."}, {"start": 199.34, "end": 204.328, "text": "그저 수학 문제를 풀거나 뭔가를 끄적이는 데만 관심이 있었죠."}, {"start": 204.378, "end": 209.928, "text": "우주의 원리를 이해하고 싶어 했고, 공상 과학 소설을 좋아했어요."}, {"start": 209.978, "end": 213.388, "text": "세상에 대해 호기심이 아주 많았던 것 같아요."}, {"start": 213.438, "end": 217.378, "text": "다리오와 함께 자란 건 어땠나요?"}, {"start": 217.378, "end": 225.21800000000002, "text": "그는 정말 똑똑했어요. 중학생 때 벌써 미적분을 공부할 정도였죠."}, {"start": 225.21800000000002, "end": 228.209, "text": "고등학생 때는 UC 버클리에서 수학 수업을 들었고요."}, {"start": 228.25900000000001, "end": 235.72899999999998, "text": "전 독서나 예술 분야를 좋아해서, 저희는 서로를 완벽하게 보완해 주는 사이였어요."}, {"start": 235.78, "end": 240.849, "text": "다리오는 바이두와 구글에서 AI에 입문하기 전, 신경과학을 공부했습니다."}, {"start": 240.9, "end": 246.048, "text": "다니엘라는 스트라이프의 초기 멤버로 시작했습니다. 두 사람은 샌프란시스코에서 함께 살았죠."}, {"start": 246.098, "end": 249.168, "text": "다니엘라의 남편인 홀든 카노프스키도 함께였습니다."}, {"start": 249.218, "end": 253.409, "text": "그러다 2016년, 다리오는 신생 기업이었던 OpenAI에 합류했습니다."}, {"start": 253.46, "end": 255.81, "text": "2018년에는 다니엘라도 그 뒤를 따랐죠."}, {"start": 255.86, "end": 258.848, "text": "OpenAI는 안전하고 더 개방적인 방식으로"}, {"start": 258.899, "end": 261.569, "text": "초지능으로 향하는 길을 약속하는 비영리 단체로 출발했습니다."}, {"start": 261.62, "end": 264.528, "text": "남: 지금 우리가 당장 고민해야 할 문제는 이것을 어떻게"}, {"start": 264.579, "end": 266.93, "text": "남: 배포하고, 어떻게 모두가 혜택을 누리게 할지,"}, {"start": 266.98, "end": 269.728, "text": "남: 어떻게 통제하며 인류에게 안전하고 유익한 방향으로"}, {"start": 269.778, "end": 271.819, "text": "남: 만들 수 있을지라고 생각합니다."}, {"start": 271.87, "end": 275.579, "text": "OpenAI에서 다리오는 '확장 법칙'이라는 개념을 창안했습니다."}, {"start": 275.629, "end": 280.939, "text": "데이터와 컴퓨팅 자원을 늘리는 것만으로도 대규모 언어 모델이 향상된다고 예측했죠."}, {"start": 280.99, "end": 283.819, "text": "비록 기반 알고리즘은 그대로일지라도 말입니다."}, {"start": 283.87, "end": 288.699, "text": "지금 되돌아보면 말도 안 되는 소리 같겠지만, 당시에는 믿는 사람이 거의 없었어요."}, {"start": 288.75, "end": 293.18, "text": "규모 확장만이 모델을 더 똑똑하게 만드는 길이라는 걸요. 그건 상당히 이례적이고"}, {"start": 293.23, "end": 299.819, "text": "비주류적인 과학적 관점이었지만, 저희 초기 연구팀은 확신을 가지고 있었습니다."}, {"start": 299.87, "end": 305.579, "text": "그런 접근 방식은 OpenAI의 모델을 비약적으로 발전시켰고, ChatGPT가 탄생하는 길을 열어주었습니다."}, {"start": 305.629, "end": 307.778, "text": "하지만 아모데이 남매는 알트만과 충돌한 것으로 알려졌습니다."}, {"start": 307.829, "end": 310.459, "text": "회사의 방향성과 가치관을 두고 말이죠."}, {"start": 310.509, "end": 312.42, "text": "알트만은 \"앤스로픽과는 여러 차이점이 있지만...\""}, {"start": 312.47, "end": 316.769, "text": "\"기업으로서는 대체로 그들을 신뢰한다\"라고 밝힌 바 있습니다."}, {"start": 316.819, "end": 320.848, "text": "여: OpenAI를 떠나기로 한 결정은 실리콘밸리의 전설이 되었는데요."}, {"start": 320.899, "end": 322.899, "text": "여: 어떤 부분에서 의견이 엇갈렸나요?"}, {"start": 322.949, "end": 326.42, "text": "남: 음, 아주 간단하게 말씀드릴게요."}, {"start": 326.47, "end": 329.579, "text": "남: 안전 문제에 대해서는 정당한 의견 차이가 얼마든지 있을 수 있습니다."}, {"start": 329.629, "end": 332.06, "text": "남: 저희도 확실히 그들과 그런 이견이 있었고요."}, {"start": 332.11, "end": 336.579, "text": "남: 하지만 말이죠, 그것만으로는 회사를 떠나기에 충분치 않습니다."}, {"start": 336.629, "end": 338.819, "text": "남: 누군가를 신뢰할 수 없다고 느껴질 때,"}, {"start": 338.87, "end": 343.019, "text": "남: 그들의 가치관이 겉으로 내세우는 것과 다르다고 느껴질 때,"}, {"start": 343.069, "end": 345.538, "text": "남: 그리고 그들이 정직하지 않다고 느껴질 때,"}, {"start": 345.588, "end": 350.139, "text": "남: 그럴 때는 회사와 계속 함께 일하기가 매우 어려워집니다."}, {"start": 350.189, "end": 351.859, "text": "남: 그 회사를 계속 신뢰하기도 힘들어지고요."}, {"start": 351.909, "end": 354.569, "text": "남: 결국 중요한 건 이겁니다."}, {"start": 354.62, "end": 357.609, "text": "남: 비전도 다르고 신뢰도 없는 사람들과"}, {"start": 357.659, "end": 359.649, "text": "남: 왜 굳이 함께하겠습니까?"}, {"start": 359.699, "end": 362.649, "text": "남: 그 문제를 해결하는 방법은 각자 갈 길을 가는 거죠."}, {"start": 362.699, "end": 368.588, "text": "[음악] 그들은 이제 자신들만의 길을 찾아 떠납니다."}, {"start": 368.588, "end": 371.978, "text": "이곳은 프레시디오 공원입니다. 다리오와 다니엘라가..."}, {"start": 372.028, "end": 375.18, "text": "오픈AI를 떠나 앤스로픽을 창업하기로 결심했을 때,"}, {"start": 375.23, "end": 378.538, "text": "초기 팀원들이 함께 모였던 곳이죠."}, {"start": 378.588, "end": 381.42, "text": "때는 팬데믹 시기였고, 전해지는 이야기에 따르면"}, {"start": 381.47, "end": 384.139, "text": "수많은 초기 직원들이 이곳으로 찾아와"}, {"start": 384.189, "end": 385.778, "text": "잔디밭에 의자를 끌어다 놓고 앉아"}, {"start": 385.829, "end": 387.06, "text": "점심을 먹으며"}, {"start": 387.11, "end": 390.519, "text": "자신들이 무엇을 만들고 있는지 이야기를 나누곤 했습니다."}, {"start": 390.569, "end": 393.038, "text": "저희가 이 회사를 시작했을 때 공동 창업자는 7명이었고"}, {"start": 393.088, "end": 394.759, "text": "저와 다니엘라도 그중 두 명입니다."}, {"start": 394.81, "end": 398.718, "text": "그리고 현재 저희는 기본적으로 이 분야에서..."}, {"start": 398.769, "end": 401.399, "text": "모든 공동 창업자가 여전히 남아 있는 유일한 회사입니다."}, {"start": 401.449, "end": 405.0, "text": "저희 정도의 크기와 규모를 가진 회사가 되면서"}, {"start": 405.05, "end": 406.158, "text": "그러기는 쉽지 않죠."}, {"start": 406.209, "end": 409.18, "text": "거의 일어나지 않는 일이니까요."}, {"start": 409.23, "end": 411.098, "text": "시작부터 앤스로픽은 스스로를"}, {"start": 411.149, "end": 414.528, "text": "궁극의 안전 지향형 AI 기업으로 표방했습니다."}, {"start": 414.579, "end": 417.129, "text": "다리오는 다음과 같은 제목의 긴 에세이들을 발표해 왔죠."}, {"start": 417.18, "end": 420.81, "text": "'자애로운 기계들'이나 '기술의 사춘기' 같은 것들 말입니다."}, {"start": 420.86, "end": 423.74, "text": "AI의 경이로운 잠재력과"}, {"start": 423.74, "end": 426.348, "text": "최악의 시나리오까지 숙고하며"}, {"start": 426.399, "end": 428.069, "text": "앤스로픽의 챗봇 '클로드'는"}, {"start": 428.12, "end": 430.189, "text": "일련의 원칙을 따르도록 훈련되었습니다"}, {"start": 430.24, "end": 434.189, "text": "클로드를 올바른 길로 인도하기 위한 이른바 '헌법'이죠"}, {"start": 434.24, "end": 439.189, "text": "클로드는 인간의 이름을 썼고 스타일과 느낌도 독특한데"}, {"start": 439.24, "end": 440.189, "text": "무엇을 전달하려는 건가요?"}, {"start": 440.24, "end": 445.189, "text": "다른 시스템보다 클로드와 대화할 때 사람들이 느끼는 건"}, {"start": 445.24, "end": 448.189, "text": "제가 '전문적인 따뜻함'이라 부르는 감정이에요"}, {"start": 448.24, "end": 451.189, "text": "클로드가 여러분의 절친이 되는 게 목표는 아닙니다"}, {"start": 451.24, "end": 453.189, "text": "그렇다고 너무 차갑거나"}, {"start": 453.24, "end": 457.189, "text": "기계적인 계산이 아니라 친근하면서도 적당한 거리감이 있어야 하죠. 전문적이고요"}, {"start": 457.24, "end": 459.348, "text": "앤스로픽은 클로드에게"}, {"start": 459.399, "end": 461.189, "text": "착해지는 법을 가르치는 것에 대해 이야기해 왔는데요"}, {"start": 461.24, "end": 462.99, "text": "좋은 모델이란 무엇일까요?"}, {"start": 463.04, "end": 464.389, "text": "나쁜 모델은 또 무엇이고요?"}, {"start": 464.439, "end": 466.389, "text": "실수로든 의도적으로든"}, {"start": 466.439, "end": 467.99, "text": "거짓말하는 모델은 원치 않으실 거예요"}, {"start": 468.04, "end": 469.389, "text": "저희는 그런 거짓말을 '환각'이라고 부릅니다"}, {"start": 469.439, "end": 470.389, "text": "없는 말을 지어내는 것이죠"}, {"start": 470.439, "end": 472.389, "text": "모델은 그저 다음 단어를 예측하도록 학습될 뿐이라"}, {"start": 472.439, "end": 473.788, "text": "때로는 답을 모를 때가 있습니다"}, {"start": 473.838, "end": 475.588, "text": "그럴 땐 그냥 말을 지어내기도 하죠"}, {"start": 475.639, "end": 477.99, "text": "저희 연구 결과에서도 나타나듯이, 모델은 때때로"}, {"start": 478.04, "end": 479.99, "text": "의도적으로 사용자를 속이려고 들기도 합니다"}, {"start": 480.04, "end": 481.99, "text": "실제 서비스되는 모델에서는 그런 일이 일어나지 않도록"}, {"start": 482.04, "end": 483.588, "text": "확실하게 조치를 취해야 하죠"}, {"start": 483.639, "end": 485.389, "text": "무해성에 관한 작업도 많이 진행하고 있습니다"}, {"start": 485.439, "end": 491.439, "text": "모델이 실수로 잘못된 정보나 해로운 내용을 생성하거나"}, {"start": 491.439, "end": 493.389, "text": "누군가에게 나쁜 영향을 끼치지 않도록 말이죠"}, {"start": 493.439, "end": 495.389, "text": "여: 클로드에게 주입되는 가치는 누구의 것인가요?"}, {"start": 495.439, "end": 499.389, "text": "여: 보편적인 선이란 게 존재할까요? 종교와 신념이 워낙 다양하잖아요"}, {"start": 499.439, "end": 501.389, "text": "여: 그걸 어떻게 결정하시나요?"}, {"start": 501.439, "end": 505.389, "text": "남: 물론 무엇이 유익하고 무해한지에 대한 보편적인 기준은 없습니다"}, {"start": 505.439, "end": 509.389, "text": "남: 하지만 세계 인권 선언처럼 인류 역사 속의 토대 문서들을 통해"}, {"start": 509.439, "end": 513.39, "text": "남: 클로드의 성격을 형성할 수 있습니다"}, {"start": 513.44, "end": 521.44, "text": "남: 흥미롭게도 종교계 지도자들과 많은 대화를 나누기 시작했는데요"}, {"start": 521.44, "end": 533.44, "text": "남: 클로드라는 존재에 대해, 그리고 여러 종교와 신념을 관통하는 핵심 가치를 어떻게 녹여낼지 고민하고 있죠"}, {"start": 533.44, "end": 537.39, "text": "남: 사실 이는 인류가 수천 년 동안 씨름해 온 문제이기도 하니까요"}, {"start": 537.44, "end": 540.229, "text": "여: 클로드에게 잘 맞지 않는 특성을 부여하려 한 적도 있나요?"}, {"start": 540.278, "end": 543.729, "text": "[배경음악] 아니면 혹시 예상치 못하게 나타나서 놀라게 했던 특징이 있었나요?"}, {"start": 543.778, "end": 545.89, "text": "초기 시절을 생각해보면,"}, {"start": 545.94, "end": 547.27, "text": "지금 와서 돌이켜보면 참 재미있는데요."}, {"start": 547.32, "end": 549.79, "text": "클로드 초기 버전인 클로드 2 시절이었죠."}, {"start": 549.84, "end": 552.07, "text": "가끔 클로드가 거의 보모처럼 굴 때가 있었어요."}, {"start": 552.12, "end": 553.709, "text": "\"당신이 정말 걱정되네요\"라고 말하곤 했죠."}, {"start": 553.759, "end": 555.79, "text": "그럼 사용자는 \"클로드, 난 그냥 날씨 물어본 거야\"라고 답하고요."}, {"start": 555.84, "end": 557.79, "text": "정말 사소한 질문이었는데도 말이죠."}, {"start": 557.84, "end": 559.95, "text": "다행히 그런 버전들은 대부분..."}, {"start": 560.0, "end": 561.629, "text": "가장 어처구니없었던 버전들은 출시하지 않았습니다."}, {"start": 561.678, "end": 563.79, "text": "하지만 생각해보면 그건,"}, {"start": 563.84, "end": 565.07, "text": "다이얼을 맞추는 것과 비슷해요."}, {"start": 565.12, "end": 568.19, "text": "그래서 저희 연구원들은 그 정중앙에 안착하기 위해"}, {"start": 568.24, "end": 571.65, "text": "아주 정교하고 세심하게 균형을 맞춰야 합니다."}, {"start": 571.7, "end": 573.93, "text": "앤스로픽이 클로드로 무엇을 하든,"}, {"start": 573.98, "end": 575.77, "text": "그 방식은 효과를 보고 있는 것 같습니다."}, {"start": 575.82, "end": 578.77, "text": "지난 1년간 앤스로픽의 매출은 급증했고,"}, {"start": 578.82, "end": 581.9, "text": "창사 이래 처음으로 흑자 전환에 성공했습니다."}, {"start": 581.95, "end": 583.979, "text": "이는 회사가 더 큰 수익을 내는"}, {"start": 584.028, "end": 586.3, "text": "비즈니스 도구에 집중한 덕분입니다."}, {"start": 586.35, "end": 588.18, "text": "클로드 코드는 소프트웨어 엔지니어링의"}, {"start": 588.23, "end": 590.9, "text": "상당 부분을 자동화한 거대한 도약입니다."}, {"start": 590.95, "end": 595.14, "text": "그리고 그 힘을 모든 이에게 나누어 준 클로드 코워크도 있죠."}, {"start": 595.19, "end": 597.3389999999999, "text": "여: 초기엔 다른 기업들이 재미있고"}, {"start": 597.389, "end": 602.099, "text": "화려한 소비자용 앱에 집중할 때, 코딩과 기업용 서비스에 베팅하셨는데요."}, {"start": 602.149, "end": 603.66, "text": "왜 그런 선택을 하셨나요?"}, {"start": 603.71, "end": 607.739, "text": "가치관에 따른 결정이었나요, 아니면 비즈니스적 판단이었나요?"}, {"start": 607.788, "end": 609.3, "text": "남: 가치관과 근본적으로 충돌하는"}, {"start": 609.35, "end": 611.94, "text": "비즈니스 모델을 선택하면 어려움을 겪게 마련입니다."}, {"start": 611.99, "end": 613.908, "text": "안 그래요?"}, {"start": 613.908, "end": 616.3389999999999, "text": "자신의 가치관을 저버리거나"}, {"start": 616.389, "end": 618.02, "text": "아니면 무의미한 존재가 되어버리죠."}, {"start": 618.07, "end": 619.54, "text": "그래서 저희는 고민 끝에 이렇게 결론지었습니다."}, {"start": 619.59, "end": 622.54, "text": "소셜 미디어의 세상을 보면 알 수 있듯이,"}, {"start": 622.59, "end": 625.02, "text": "소비자용 서비스는 사람들의 참여나"}, {"start": 625.07, "end": 629.3389999999999, "text": "심지어 중독까지 부추기는 경향이 있는 것 같아요."}, {"start": 629.389, "end": 631.979, "text": "AI 비디오 모델에서 나타나는 조잡한 현상들처럼요."}, {"start": 632.028, "end": 632.979, "text": "대체 무슨 일이 일어나고 있는 걸까요?"}, {"start": 633.028, "end": 634.979, "text": "사용자가 서비스를 이용하는 시간을"}, {"start": 635.028, "end": 636.739, "text": "최대한 늘리려는 게 목적일까요?"}, {"start": 636.788, "end": 639.78, "text": "광고 수익에 기반한 보상 체계 때문일까요?"}, {"start": 639.83, "end": 642.14, "text": "하지만 기업용 시장을 들여다보면 상황이 다릅니다."}, {"start": 642.19, "end": 646.06, "text": "제 말은, 저희는 이 모델들이 사람들에게 실질적인 도움이 되길 원한다는 겁니다."}, {"start": 646.11, "end": 650.35, "text": "인공지능으로 지금까지 고치지 못했던"}, {"start": 650.35, "end": 651.54, "text": "질병들을 치료하고 싶어 하죠."}, {"start": 651.59, "end": 653.02, "text": "실제로 바이오테크 분야와 협업 중이고요."}, {"start": 653.07, "end": 654.18, "text": "제약 회사와도 손을 잡았습니다."}, {"start": 654.23, "end": 656.54, "text": "학술 연구 단체들과도 함께하고 있는데,"}, {"start": 656.59, "end": 658.579, "text": "이들 모두가 결국 기업인 셈이죠."}, {"start": 658.629, "end": 663.259, "text": "또한 인공지능을 활용해 에너지 비용을 낮추고 효율성을 높이려 합니다."}, {"start": 663.308, "end": 664.979, "text": "이 역시 기업의 영역이고요."}, {"start": 665.028, "end": 666.54, "text": "저희의 가치관과 대체로 일치하는"}, {"start": 666.59, "end": 669.379, "text": "이런 비즈니스 모델을 구축한 것이"}, {"start": 669.428, "end": 670.54, "text": "큰 도움이 되었다고 봅니다."}, {"start": 670.59, "end": 674.78, "text": "여: '클로드 2'가 출시되고 얼마 지나지 않아 시가 총액 2,850억 달러가"}, {"start": 674.83, "end": 676.9, "text": "여: 하룻밤 사이에 증발해 버렸습니다."}, {"start": 676.95, "end": 678.9, "text": "여: 트레이더들은 이를 '사스포칼립스(SaaS-pocalypse)'라 불렀죠."}, {"start": 678.95, "end": 681.02, "text": "여: 소프트웨어 업계를 강타한 이 화이트칼라의 몰락은"}, {"start": 681.07, "end": 683.42, "text": "여: 그야말로 공포 그 자체였습니다."}, {"start": 683.47, "end": 685.3389999999999, "text": "여: 어떤 종목들은 9일 연속 하락세를 보이기도 했으니까요."}, {"start": 685.389, "end": 687.14, "text": "여: 분명 긴장감이 고조되고 있네요."}, {"start": 687.19, "end": 689.9, "text": "여: AI가 지금 같은 속도로 계속 발전한다면,"}, {"start": 689.95, "end": 693.219, "text": "여: 기존 소프트웨어는 얼마나 대체될까요?"}, {"start": 693.269, "end": 694.42, "text": "여: 그리고 그 속도는 얼마나 빠를까요?"}, {"start": 694.47, "end": 698.14, "text": "남: 제 생각에 AI로 인해 시장이라는 파이는 더 커질 것 같아요."}, {"start": 698.19, "end": 702.379, "text": "남: 그래서 기존 기업들의 상대적인 비중은 작아질 수 있죠."}, {"start": 702.428, "end": 704.579, "text": "남: 일부 기업은 가치가 하락할 수도 있고요."}, {"start": 704.629, "end": 706.82, "text": "남: 아예 사업을 접어야 하는 곳도 생기겠죠,"}, {"start": 706.87, "end": 709.259, "text": "남: 제때 제대로 적응하지 못한다면요."}, {"start": 709.308, "end": 711.78, "text": "남: 하지만 제 추측으로는 소프트웨어 산업 전체는"}, {"start": 711.83, "end": 715.18, "text": "남: 더 작아지는 게 아니라 커질 겁니다. 물론 큰 패배자들도 나오겠지만요."}, {"start": 715.23, "end": 718.94, "text": "남: 다가올 미래를 보지 못하고 자신만의 해자를 찾지 못하는 이들은"}, {"start": 718.99, "end": 722.81, "text": "남: 정말 힘든 시간을 보내게 될 겁니다."}, {"start": 722.86, "end": 726.609, "text": "해설: 앤스로픽의 최근 급성장은 이 남자가 없었다면 불가능했을지도 모릅니다."}, {"start": 726.658, "end": 731.41, "text": "해설: '클로드 코드'와 '클로드 아티팩트'를 만든 엔지니어, 보리스 처니입니다."}, {"start": 731.46, "end": 733.65, "text": "해설: 2024년 앤스로픽이 그를 영입했을 당시,"}, {"start": 733.7, "end": 737.209, "text": "해설: 처니는 일본의 시골 마을에서 전혀 다른 삶을 살고 있었습니다."}, {"start": 737.259, "end": 740.81, "text": "처니: 파머스 마켓도 많고 아주 여유로웠죠. 미소를 직접 담그기도 했는데, 그게 일종의..."}, {"start": 740.86, "end": 747.53, "text": "처니: 큰 취미였어요. 그러다 처음으로 AI 챗봇을 써봤던 기억이 나는데, 정말 숨이 멎는 줄 알았습니다."}, {"start": 747.58, "end": 752.329, "text": "처니: '세상에, 이건 무조건... 무조건 여기에 동참해야겠다'는 생각이 들었죠. 저 또한 워낙..."}, {"start": 752.379, "end": 756.65, "text": "남: ...사파이어 리더였죠. 그래서 이게 얼마나 최악으로 치달을 수 있는지 잘 압니다. 이 기술은 정말 엄청나게..."}, {"start": 756.7, "end": 759.181, "text": "남: 강력하거든요. 그래서 다시 돌아왔습니다."}, {"start": 759.23, "end": 764.28, "text": "여: 당신은 '클로드 코드'를 만드셨고, '클로드 코워크'의 개발을 주도하셨죠."}, {"start": 764.33, "end": 766.686, "text": "여: 구체적으로 어떤 문제를 해결하려고 하셨나요?"}, {"start": 766.735, "end": 769.719, "text": "남: 기존의 코딩 제품들을 보면 다 꽤 단순한 수준이었습니다."}, {"start": 769.769, "end": 771.52, "text": "남: 그냥 뭐랄까, 아시잖아요."}, {"start": 771.57, "end": 773.879, "text": "남: 단어를 완성하거나 문장을 완성하는 정도였죠."}, {"start": 773.928, "end": 776.359, "text": "남: 그게 AI 코딩의 전부였습니다."}, {"start": 776.408, "end": 779.359, "text": "남: 저희는 훨씬 더 큰 승부수를 던지고 싶었습니다."}, {"start": 779.408, "end": 781.839, "text": "남: 저희의 생각은 코딩 에이전트라면 실제로"}, {"start": 781.889, "end": 783.079, "text": "남: 모든 걸 해낼 수 있다는 거였죠."}, {"start": 783.129, "end": 786.119, "text": "남: 1년 반 전만 해도 코드를 일일이 손으로 썼습니다."}, {"start": 786.168, "end": 788.879, "text": "남: 가끔 탭 키를 누르면 한 줄이 자동 완성되는 정도였죠."}, {"start": 788.928, "end": 792.32, "text": "남: 이제는 클로드에게 말만 하면 코드를 다 짜줍니다."}, {"start": 792.37, "end": 793.16, "text": "남: 그렇게 클로드가 코드를 짜는 동안,"}, {"start": 793.21, "end": 795.2, "text": "남: 저는 다음 클로드에게 말을 걸어 또 코드를 짜게 하죠."}, {"start": 795.25, "end": 797.32, "text": "남: 어느 시점이든 저는 뭐랄까,"}, {"start": 797.37, "end": 800.32, "text": "남: 몇 개의 클로드를 돌리기도 하고 많게는 수천 개를 동시에 돌리면서"}, {"start": 800.37, "end": 801.479, "text": "남: 업무를 처리합니다."}, {"start": 801.528, "end": 806.32, "text": "여: 이곳 엔지니어들을 위해 클로드가 내부적으로 코드를 얼마나 작성하고 있나요?"}, {"start": 806.37, "end": 807.92, "text": "남: 거의 전부를 다 쓴다고 보시면 됩니다."}, {"start": 807.97, "end": 810.44, "text": "남: 저희 팀의 경우, 특히 저 개인적으로는..."}, {"start": 810.49, "end": 812.079, "text": "지난 6개월 동안 제 코드의 100%를"}, {"start": 812.129, "end": 813.28, "text": "AI가 직접 작성해 왔어요."}, {"start": 813.33, "end": 816.2, "text": "엔지니어링의 패러다임이 완전히 바뀌어 버린 거죠."}, {"start": 816.25, "end": 818.2, "text": "갑자기 초능력이 생긴 기분이에요."}, {"start": 818.25, "end": 821.56, "text": "마치 제트팩을 단 것 같달까요. 엔지니어링이 이렇게 즐거웠던 적이 없어요."}, {"start": 821.61, "end": 823.119, "text": "여: '클로드'를 한번 써볼까요?"}, {"start": 823.168, "end": 824.119, "text": "남: 네, 그러죠."}, {"start": 824.168, "end": 824.9590000000001, "text": "여: 좋아요."}, {"start": 825.009, "end": 826.92, "text": "여: 음, 간단한 레시피 앱을 만들어 보죠."}, {"start": 826.97, "end": 828.999, "text": "여: 레시피 앱 만들기요."}, {"start": 829.048, "end": 831.109, "text": "남: 어떤 기능이 있으면 좋겠어요?"}, {"start": 831.158, "end": 836.15, "text": "여: 한 주 동안 먹을 식단을 추천해 주면 좋겠네요."}, {"start": 836.2, "end": 837.39, "text": "남: 음, 그러면 이건 제가..."}, {"start": 837.44, "end": 841.43, "text": "남: 몇 분 정도 걸릴 텐데, 클로드가 어떻게 만들었는지 한번 보죠."}, {"start": 841.48, "end": 844.469, "text": "여: 오, 몇 가지 옵션이 나왔네요. 흠..."}, {"start": 844.519, "end": 845.829, "text": "여: 이걸로 할게요."}, {"start": 845.879, "end": 847.95, "text": "남: 이거 정말 맛있어 보이는데요."}, {"start": 848.0, "end": 849.869, "text": "여: 그리스식 치킨 파워볼로 해보죠."}, {"start": 849.918, "end": 852.639, "text": "여: 레시피를 클릭하면,"}, {"start": 852.639, "end": 857.749, "text": "여: 어떻게 만드는지 조리법을 보여줬으면 해요."}, {"start": 857.798, "end": 859.32, "text": "고마워요."}, {"start": 859.32, "end": 862.27, "text": "여: 분명히 쿼드도 고마워할 거예요."}, {"start": 862.32, "end": 865.27, "text": "전 항상 고맙다고 말하려고 노력해요."}, {"start": 865.32, "end": 867.27, "text": "남: 맞아요, 저도 항상 친절하려고 하죠."}, {"start": 867.32, "end": 868.27, "text": "잘 모르겠네요."}, {"start": 868.32, "end": 873.27, "text": "레시피 앱이 앤스로픽 기술의 가장 놀라운 시연은 아닐 수도 있지만, 클로드"}, {"start": 873.32, "end": 877.27, "text": "코드가 불과 몇 분 만에 해낸 일은 예전에는 몇 시간 또는 며칠이 걸리던 일이었습니다."}, {"start": 877.32, "end": 879.27, "text": "누군가에게는 그것이 큰 기회로 보이죠."}, {"start": 879.32, "end": 882.27, "text": "다음 주 일 때문에 긴장되나요, 아니면 그냥..."}, {"start": 882.32, "end": 883.27, "text": "남: 다음 주에 뭐가 있죠?"}, {"start": 883.32, "end": 884.27, "text": "여: 개발자 컨퍼런스요."}, {"start": 884.32, "end": 885.27, "text": "남: 아, 맞다."}, {"start": 885.32, "end": 886.27, "text": "그렇죠."}, {"start": 886.32, "end": 888.509, "text": "매주 너무 많은 일이 일어나서요."}, {"start": 888.558, "end": 897.759, "text": "전년 대비 API 사용량은 지난 12개월 동안 거의 17배나 증가했습니다."}, {"start": 897.759, "end": 901.91, "text": "저희는 개발자와 사용자들에게 8개의 프런티어 모델을 출시했습니다."}, {"start": 901.96, "end": 906.829, "text": "제2회 연례 'Code with Claude' 컨퍼런스에 오신 것을 환영합니다. 클로드의 슈퍼 팬들이"}, {"start": 906.879, "end": 908.43, "text": "미래를 엿보기 위해 모인 자리죠."}, {"start": 908.48, "end": 909.91, "text": "정말 즐거운 시간입니다."}, {"start": 909.96, "end": 911.229, "text": "아드레날린이 솟구치네요."}, {"start": 911.278, "end": 914.95, "text": "올해는 처음으로 성장 속도가 지수 함수 곡선을 앞질렀습니다."}, {"start": 915.0, "end": 921.95, "text": "올해 1분기 성장세를 연간으로 환산하면 무려 80배에 달하는 수준이죠."}, {"start": 922.0, "end": 930.85, "text": "남: 전 매일 '클로드 코드'를 활용해 온갖 작업을 합니다."}, {"start": 930.85, "end": 931.8, "text": "남: 단순히 코드만 짜는 게 아니에요."}, {"start": 931.85, "end": 933.8, "text": "남: 5년 전보다 훨씬 더 많은 코드를 쓰고 있죠."}, {"start": 933.85, "end": 938.8, "text": "남: 벤처 자금을 수혈받은 22살 청년 같은 자신감이 생겼어요."}, {"start": 938.85, "end": 939.8, "text": "남: 제가 진짜 22살은 아니지만요."}, {"start": 939.85, "end": 945.04, "text": "여: 친구 초대로 왔는데, 기술을 잘 모르는 제 눈에도 정말 놀라워요."}, {"start": 945.09, "end": 949.119, "text": "여: 다들 뭘 만들고 있는지, 세상에 어떤 게 나왔는지 보니 참 흥미롭네요."}, {"start": 949.168, "end": 954.8, "text": "남: 우려되면서도 설레는 부분은 AI가 인간의 상상을 초월하는..."}, {"start": 954.85, "end": 960.16, "text": "남: 우리가 꿈꾸지도 못한 일과 속도를 현실로 보여준다는 겁니다."}, {"start": 960.21, "end": 965.52, "text": "남: 하지만 그 이면에는 냉혹한 현실이 있죠. 생산성이 천 배는 뛸 테니 철저히 대비해야 합니다."}, {"start": 965.57, "end": 972.74, "text": "이 모든 현상은 당연한 의문을 던집니다. 과연 엔지니어들이"}, {"start": 972.74, "end": 974.43, "text": "자신들이 만든 AI의 첫 번째 희생양이 될까요?"}, {"start": 974.48, "end": 977.07, "text": "남: 한동안 '범생이들의 역습' 시대였는데..."}, {"start": 977.12, "end": 978.27, "text": "여: [웃음] 그 시대는 이제 끝난 걸까요?"}, {"start": 978.32, "end": 981.07, "text": "남: [웃음] 우리 모두가 범생이가 되어가는 것 같아요."}, {"start": 981.12, "end": 983.93, "text": "여: 그럼 진짜 범생이들에겐 어떤 일이 벌어질까요?"}, {"start": 983.98, "end": 989.03, "text": "남: 진짜 범생이들은... 글쎄요, 스스로 길을 개척해 나가야겠죠."}, {"start": 989.08, "end": 994.81, "text": "남: 대다수의 엔지니어에게는 기존에 가졌던 기술이 미래에도 분명 큰 힘이 될 겁니다."}, {"start": 994.86, "end": 997.369, "text": "남: 엔지니어들이 꽤 유리한 고지를 선점하고 있으니까요."}, {"start": 997.418, "end": 999.2090000000001, "text": "남: 코딩 말고도 하는 일이 아주 많거든요."}, {"start": 999.259, "end": 1000.969, "text": "남: 엔지니어들은 사용자들과 소통도 해야 하고,"}, {"start": 1001.019, "end": 1002.329, "text": "남: 계획도 세워야 하죠."}, {"start": 1002.379, "end": 1004.129, "text": "남: 다음 단계가 무엇인지도 고민해야 하고요."}, {"start": 1004.178, "end": 1006.17, "text": "남: 그래서 이런 부분들은 엔지니어링의 영역으로"}, {"start": 1006.22, "end": 1008.229, "text": "남: 여전히 남아있을 거라고 봅니다."}, {"start": 1008.278, "end": 1011.79, "text": "여: 실리콘밸리는 AI 열풍에 휩싸여 있을지 몰라도, 다른 곳은"}, {"start": 1011.84, "end": 1013.5889999999999, "text": "여: 분위기가 그리 밝지만은 않습니다."}, {"start": 1013.639, "end": 1016.91, "text": "여: 미국인의 70%는 AI가 일자리를 없앨 거라 생각하고,"}, {"start": 1016.96, "end": 1020.7, "text": "여: 거의 3분의 1은 자신의 일자리도 그중 하나가 될까 봐 걱정하죠."}, {"start": 1020.75, "end": 1023.619, "text": "여: 다리오 아모데이는 이 문제에 대해 거침없이 발언해 왔는데요,"}, {"start": 1023.668, "end": 1026.94, "text": "여: 그의 예측 중 일부는 딱히 안심이 되진 않습니다."}, {"start": 1026.99, "end": 1030.1, "text": "남: 저는 아주 이례적인 조합이 나타날 수 있다고 봅니다."}, {"start": 1030.15, "end": 1034.459, "text": "남: GDP는 급격히 성장하는데 실업률은 높거나,"}, {"start": 1034.509, "end": 1039.259, "text": "남: 최소한 불완전 고용이나 저임금 일자리가 늘어나는 상황 말이죠."}, {"start": 1039.308, "end": 1041.66, "text": "남: 수많은 저임금 일자리와 극심한 불평등이 공존하는 거죠."}, {"start": 1041.71, "end": 1044.42, "text": "여: 일자리 감소 문제에 대해 정말 직설적으로 말씀해 오셨는데요."}, {"start": 1044.47, "end": 1047.38, "text": "여: AI가 화이트칼라 초급 일자리의 절반을"}, {"start": 1047.43, "end": 1048.739, "text": "여: 향후 1~5년 안에 없앨 수도 있다는 거죠."}, {"start": 1048.788, "end": 1050.298, "text": "여: 1년 전 일이었죠."}, {"start": 1050.348, "end": 1052.538, "text": "여: AI는 믿기 힘들 정도로 빠르게 발전했어요."}, {"start": 1052.588, "end": 1055.18, "text": "여: 그 확률이 여전히 50%인가요, 아니면 더 높아졌나요?"}, {"start": 1055.23, "end": 1058.66, "text": "남: 정확히는 모르겠지만 여전히 꽤 걱정스럽습니다."}, {"start": 1058.71, "end": 1061.259, "text": "남: 걱정하는 수준은 예전과 비슷해요."}, {"start": 1061.308, "end": 1065.259, "text": "남: 현재 AI가 사람들의 생산성을 높여주는 걸 목격하고 있지만"}, {"start": 1065.308, "end": 1066.739, "text": "남: 그건 일시적인 과도기일 뿐입니다."}, {"start": 1066.788, "end": 1068.58, "text": "남: 업무의 90%를 자동화하면"}, {"start": 1068.63, "end": 1070.38, "text": "남: 나머지 10%의 업무에서 사람들이"}, {"start": 1070.43, "end": 1073.019, "text": "남: 10배의 레버리지를 얻어 생산성이 극대화되죠."}, {"start": 1073.068, "end": 1076.14, "text": "남: 하지만 결국 자동화율은 100%에 가까워질 겁니다."}, {"start": 1076.19, "end": 1077.9, "text": "남: 그렇게 되면 그다음은..."}, {"start": 1077.95, "end": 1079.86, "text": "남: 인간이 할 수 있는 다른 일을 찾아야겠죠."}, {"start": 1079.91, "end": 1081.298, "text": "남: 지금은 AI가 소프트웨어 엔지니어의"}, {"start": 1081.348, "end": 1082.259, "text": "남: 생산성을 더 높여주고 있습니다."}, {"start": 1082.308, "end": 1084.34, "text": "남: 비록 AI가 모든 코드를 작성하거나"}, {"start": 1084.39, "end": 1085.538, "text": "남: 거의 모든 코드를 직접 짜고 있지만요."}, {"start": 1085.588, "end": 1088.62, "text": "남: 하지만 벌써 이런 조짐이 보이기 시작했습니다."}, {"start": 1088.67, "end": 1094.62, "text": "남: 어떤 이들에겐 생산성 향상보다 AI가 그냥 직접 처리하는 게 더 나은 단계에 접어들고 있다는 거죠."}, {"start": 1094.67, "end": 1097.37, "text": "여: 그 부분에 대해선 어떻게 생각하시나요?"}, {"start": 1097.42, "end": 1100.19, "text": "그건... 정말 불편한 일이에요."}, {"start": 1100.24, "end": 1104.19, "text": "그래서 제가 앤스로픽(Anthropic)에 합류하기로 결심한 거죠."}, {"start": 1104.24, "end": 1108.19, "text": "이곳의 많은 동료가 합류를 결심한 이유도 마찬가지일 겁니다."}, {"start": 1108.24, "end": 1112.19, "text": "인공지능은 우리보다 훨씬 거대한 힘을 가지고 있지만,"}, {"start": 1112.24, "end": 1116.749, "text": "여기에서라면 상황을 조금이라도 더 개선할 수 있을 거라 믿거든요."}, {"start": 1116.798, "end": 1122.19, "text": "여: 그 문제를 해결하는 게 본인의 몫이라고 생각하시나요? 아니면 다른 누군가의 문제인가요?"}, {"start": 1122.24, "end": 1123.749, "text": "남: 우리가 계속해서 논의해야 할 주제라고 생각해요."}, {"start": 1123.798, "end": 1125.19, "text": "이를 위해 목소리를 높여야 하죠."}, {"start": 1125.24, "end": 1127.39, "text": "궁극적으로는 사회가 해결해야 할 문제입니다."}, {"start": 1127.44, "end": 1129.11, "text": "한 기업이 감당하기엔 너무 큰 사안이니까요."}, {"start": 1129.16, "end": 1134.749, "text": "여: 그동안 많은 반발이 있었잖아요. 사람들에게 경고하려고 노력 중이라고 말씀하셨지만,"}, {"start": 1134.798, "end": 1138.749, "text": "젠슨 황은 당신이 '과업'과 '일자리'를 혼동하고 있다고 비판했죠."}, {"start": 1138.798, "end": 1140.749, "text": "남(젠슨 황): AI는 일자리를 창출하고 있습니다."}, {"start": 1140.798, "end": 1144.39, "text": "AI가 일자리를 없앤다고 말하는 사람들은 공포를 조장하는 겁니다."}, {"start": 1144.44, "end": 1148.39, "text": "여: 다른 이들은 이걸 앤스로픽에 유리한 '파멸론 마케팅'이라고 비판하기도 하는데요."}, {"start": 1148.44, "end": 1153.67, "text": "남: 그 점에 대해서는 확실히 짚고 넘어가고 싶네요. 강하게 반박하고 싶거든요."}, {"start": 1153.72, "end": 1160.118, "text": "저는 모든 인터뷰에서 세금이나 거시 경제 정책 등을 통해"}, {"start": 1160.118, "end": 1165.11, "text": "이러한 위험에 대처할 수 있는 실질적인 방안과 기술의 과도기에 생겨날 새로운 일자리에 대해 이야기합니다."}, {"start": 1165.16, "end": 1169.989, "text": "'과업'과 '일자리'의 차이점, 그리고 왜 이번에는 과거와 다른지에 대해 무려 5페이지에 걸쳐 설명해 두었죠."}, {"start": 1170.038, "end": 1175.19, "text": "하지만 제가 정말 혐오하는 소셜 미디어에서는..."}, {"start": 1175.24, "end": 1183.269, "text": "그런 걸 하나의 범주로 보자면, 사람들은 1년 전의 3초짜리 클립들을 가져와서 비판하곤 하죠. 하지만 전..."}, {"start": 1183.318, "end": 1189.35, "text": "위험성에 대해 이야기할 때 훨씬 더 신중하게 글을 써왔습니다. 그러니까 이건..."}, {"start": 1189.4, "end": 1194.95, "text": "\"이건 값싼 마케팅이다\"라는 생각 자체가 값싼 마케팅입니다. 실리콘 밸리의 고질병 같은 거죠."}, {"start": 1195.0, "end": 1200.788, "text": "3초 분량의 소셜 미디어 세상에 매몰된 거예요. 그래서 제..."}, {"start": 1200.838, "end": 1205.749, "text": "메시지는 결코 종말이 다가온다는 게 아닙니다. 제 말은..."}, {"start": 1205.798, "end": 1213.65, "text": "우리가 예견하고 우려해야 할 일이며, 실제로는 긍정적으로 대응해야 한다는 겁니다."}, {"start": 1213.7, "end": 1219.808, "text": "[음악 시작] 소프트웨어 산업을 넘어, AI가 일자리에 미칠 잠재적 영향은 예측하기 더 어려워 보입니다."}, {"start": 1219.858, "end": 1224.209, "text": "앤스로픽은 가까운 미래에 어떤 분야가 AI를 가장 많이 활용할지 예측하는 보고서를 발표했습니다."}, {"start": 1224.259, "end": 1232.39, "text": "그 예측이 맞다면 관리, 금융, 법률직은 조만간 매우 다른 모습이 될 것입니다."}, {"start": 1232.44, "end": 1236.87, "text": "어떤 직업이 사라지고, 누가 대체되며, 어떤 새로운 직업이 생겨날까요?"}, {"start": 1236.92, "end": 1243.67, "text": "남: 경제는 예측할 수 없기에 아무도 확실히는 모릅니다. 하지만 우리에게 유리한 점은..."}, {"start": 1243.72, "end": 1249.269, "text": "전체적인 파이가 크게 확장될 것이라는 점입니다. 파이가 커지기 때문에..."}, {"start": 1249.318, "end": 1253.269, "text": "사람들이 이동할 수 있는 자리가 분명 생길 겁니다. 얼마나 빨리 찾아내느냐가 관건이죠."}, {"start": 1253.318, "end": 1258.87, "text": "여: 조금 더 구체적으로 설명해 주시겠어요? 5년 뒤에 눈을 떴을 때..."}, {"start": 1258.92, "end": 1264.788, "text": "이 나라는 어떤 모습일까요? 사람들은 무엇을 하고 있을까요? 실업률이 그토록 높다면..."}, {"start": 1264.838, "end": 1267.417, "text": "여: 그게 바로 혁명이 시작되는 전조 아닐까요?"}, {"start": 1267.467, "end": 1270.548, "text": "남: 네, 맞습니다. 바로 그런 결과를 막으려는 거예요."}, {"start": 1270.598, "end": 1275.43, "text": "남: 그런 상황은 반드시 막아야 하죠. 몇 가지 분야가 있다고 봅니다. 보장된 건 없지만요."}, {"start": 1275.48, "end": 1281.509, "text": "확실하진 않지만, 물리적인 세계가 있습니다. 무언가를 만들고 건설하기 위해 더 많은 사람이 필요할 거예요."}, {"start": 1281.558, "end": 1287.59, "text": "물리적 세계에서의 제조나 인간 중심의 모든 것들 말이죠. 그게 아주 중요해질 겁니다."}, {"start": 1287.64, "end": 1293.269, "text": "그렇죠? 적어도 어떤 사람들은 인간과 대화하고 싶어 하니까요. 이런 인간 관계 중심의 직업들..."}, {"start": 1293.318, "end": 1297.35, "text": "남: 그런 부분들이 중요해질 거라고 생각해요. 그리고 제 생각엔..."}, {"start": 1297.4, "end": 1303.509, "text": "남: 인간이 AI를 어느 정도 제어하려는 노력도 있겠죠? 결국 누군가의 가치관이나 의도에 부합해야 하니까요."}, {"start": 1303.558, "end": 1309.83, "text": "남: 그래서 모종의 역할이 있을 거라고 봅니다. 그 비중이 얼마나 될지는 모르겠지만요."}, {"start": 1309.88, "end": 1311.43, "text": "남: 그 비중이 얼마나 클지, 혹은 작을지 말이죠."}, {"start": 1311.48, "end": 1313.229, "text": "여: 저는 좀 더 희망적으로 보고 있어요."}, {"start": 1313.278, "end": 1316.548, "text": "여: 인간이 생산성을 높이기 위해 AI를 활용할 방법을 계속 찾아낼 거라는 점에서요."}, {"start": 1316.598, "end": 1319.67, "text": "여: 오직 인간만이 할 수 있는, 우리에게 의미 있는 일들을 하기 위해서죠."}, {"start": 1319.72, "end": 1322.028, "text": "여: 오직 인간만이 할 수 있는 그런 가치 있는 일들 말이에요."}, {"start": 1322.078, "end": 1324.269, "text": "여: 인간 대 인간의 상호작용은"}, {"start": 1324.318, "end": 1325.749, "text": "여: 결코 완전히 사라지지 않을 거예요."}, {"start": 1325.798, "end": 1329.83, "text": "여: 제가 자주 예로 드는 것이 바로 의료 분야인데요."}, {"start": 1329.88, "end": 1334.63, "text": "여: 현재 우리는 진단 전문가인 의사를 고용하죠."}, {"start": 1334.68, "end": 1336.87, "text": "여: 머지않아 AI가 아주 능숙해질 거예요."}, {"start": 1336.92, "end": 1338.229, "text": "여: 증상이 무엇인지 진단하고..."}, {"start": 1338.278, "end": 1342.229, "text": "여: 어디가 문제인지, 어떤 검사를 받아야 할지 알려주겠죠. 의사의 도움 없이도 말이에요."}, {"start": 1342.278, "end": 1346.229, "text": "여: 하지만 AI가 환자를 직접 진찰하며 \"여기를 누르면 아픈가요?\"라고 물을 수는 없죠."}, {"start": 1346.278, "end": 1350.95, "text": "여: 환자의 곁을 지키며 공감해줄 수도 없고요. \"지금 기분이 어떠세요?\"라든지..."}, {"start": 1351.0, "end": 1355.19, "text": "여: \"이 과정을 어떻게 견디고 계시나요?\" 같은 질문 말이에요."}, {"start": 1355.24, "end": 1359.43, "text": "여: 그래서 의료 같은 분야는 대인 관계에 훨씬 더 집중하는 방향으로 전환될 거예요."}, {"start": 1359.48, "end": 1365.43, "text": "여: 진단 도구는 비약적으로 발전하겠지만, 인간 사이의 교감이라는 영역은 변하지 않을 테니까요."}, {"start": 1365.48, "end": 1370.828, "text": "여: 내게 설명 좀 해줘요. 다니엘라가"}, {"start": 1370.828, "end": 1372.1, "text": "여: 실무 운영을 총괄하고"}, {"start": 1372.15, "end": 1374.1, "text": "여: 리더십 팀 전원이 그녀에게 보고한다면서요?"}, {"start": 1374.15, "end": 1374.407, "text": "남: 네."}, {"start": 1374.457, "end": 1375.7, "text": "여: 당신에겐 아무도 보고하지 않고요."}, {"start": 1375.75, "end": 1377.298, "text": "여: 정말 꿀보직인 것 같은데요."}, {"start": 1377.348, "end": 1378.9, "text": "남: 말할 수 없이 자유롭죠."}, {"start": 1378.95, "end": 1380.985, "text": "남: 덕분에 제가 하는 모든 일들을"}, {"start": 1381.035, "end": 1384.058, "text": "남: 평소보다 훨씬 더 수월하게 처리할 수 있어요."}, {"start": 1384.108, "end": 1385.219, "text": "남: 안 그랬으면 훨씬 힘들었을 텐데 말이죠."}, {"start": 1385.269, "end": 1387.219, "text": "여: 그녀가 일을 다 하니까 그런 거 아니에요? [웃음]"}, {"start": 1387.269, "end": 1388.219, "text": "남: [웃음] 그게..."}, {"start": 1388.269, "end": 1388.62, "text": "남: 그냥..."}, {"start": 1388.67, "end": 1390.62, "text": "남: 만약 당신이..."}, {"start": 1390.67, "end": 1393.259, "text": "남: 제가 겪어야 했던 일들을 당신도 겪었다면요."}, {"start": 1393.308, "end": 1396.62, "text": "남: DOJ(법무부) 조사나 OpenAI 시절... 아니, 아니에요."}, {"start": 1396.67, "end": 1397.62, "text": "남: [웃음]"}, {"start": 1397.67, "end": 1399.288, "text": "남: 아니요."}, {"start": 1399.288, "end": 1401.976, "text": "나레이션: 아모데이 남매는 AI가 사회에 유토피아적 영향을 미치길 희망하지만,"}, {"start": 1402.026, "end": 1404.65, "text": "나레이션: 기술의 파괴적이고 디스토피아적인 잠재력 또한 부정할 수 없습니다."}, {"start": 1404.7, "end": 1408.17, "text": "나레이션: 앤스로픽은 기술 군비 경쟁의 한복판에 서 있으며,"}, {"start": 1408.22, "end": 1414.778, "text": "나레이션: 강력한 정부들이 통제권을 쥐기 위해 다투고 있습니다."}, {"start": 1414.828, "end": 1417.48, "text": "나레이션: 다리오는 이 전쟁터에 정면으로 뛰어들었습니다."}, {"start": 1417.529, "end": 1419.66, "text": "나레이션: 그는 경쟁자들을 거침없이 비판하죠."}, {"start": 1419.71, "end": 1422.979, "text": "어떤 기업들은 소위 '욜로'식으로 행동하며"}, {"start": 1423.028, "end": 1426.298, "text": "위험 수위를 너무 높이고 있다고 생각합니다"}, {"start": 1426.348, "end": 1427.298, "text": "저는 그게 매우 우려스럽고요"}, {"start": 1427.348, "end": 1428.298, "text": "여: 누가 그렇게 무모하게 베팅하나요?"}, {"start": 1428.348, "end": 1431.298, "text": "그 질문엔 답변하지 않겠습니다"}, {"start": 1431.348, "end": 1434.225, "text": "여: 아니면 중국에 AI 칩을 파는 미국 정부나"}, {"start": 1434.275, "end": 1436.7, "text": "앤스로픽의 파트너들을 비판하시는 건가요?"}, {"start": 1436.75, "end": 1442.588, "text": "그건 마치... 글쎄요, 북한에 핵무기를 파는 것과"}, {"start": 1442.588, "end": 1443.538, "text": "비슷하다고 봅니다"}, {"start": 1443.588, "end": 1448.86, "text": "저는 대중국 칩 수출 규제의 필요성에 대해 아주 단호하게 말해왔습니다"}, {"start": 1448.91, "end": 1454.43, "text": "미국과 전 세계 민주주의의 명운을 생각할 때"}, {"start": 1454.43, "end": 1458.298, "text": "중국이 AI 역량에서 앞서 나가는 건 매우 위험하기 때문입니다"}, {"start": 1458.348, "end": 1463.459, "text": "일부 칩 제조사들이 제 의견에 동의하지 않는 건 당연하겠죠"}, {"start": 1463.509, "end": 1465.298, "text": "하지만 그렇다고 제 소신을 굽히지는 않았습니다"}, {"start": 1465.348, "end": 1470.298, "text": "파트너십을 더 맺은 후에도요. 그들은 제가 입을 다물길 바랐겠지만"}, {"start": 1470.348, "end": 1472.548, "text": "이것이 제 신념입니다"}, {"start": 1472.548, "end": 1474.34, "text": "우린 모두 성인이잖아요"}, {"start": 1474.39, "end": 1478.68, "text": "어떤 사안에는 협력하면서도 다른 사안에는 이견을 가질 수 있는 법이죠"}, {"start": 1478.73, "end": 1482.84, "text": "내레이터: 지정학에 관한 아모데이의 발언은 칼텍 시절로 거슬러 올라갑니다"}, {"start": 1482.89, "end": 1487.558, "text": "물리학과 2학년이던 그는 과학자가 상아탑에만 갇혀 있어선 안 된다고 믿으며"}, {"start": 1487.608, "end": 1490.4, "text": "반전 운동가로서의 명성을 쌓았습니다"}, {"start": 1490.45, "end": 1495.239, "text": "이러한 세계관은 훗날 전쟁의 미래에 대한 앤스로픽의 입장을 확립하게 됩니다"}, {"start": 1495.288, "end": 1498.548, "text": "여: 오랫동안 반전 입장을 유지해 오셨는데도"}, {"start": 1498.597, "end": 1500.479, "text": "AI 기업 중 거의 최초로"}, {"start": 1500.528, "end": 1504.92, "text": "여: 국방부와 기밀 네트워크 운영 계약을 체결하셨죠."}, {"start": 1504.97, "end": 1508.36, "text": "여: 미국이 전쟁에 실제로 사용하는 바로 그 네트워크 말입니다."}, {"start": 1508.41, "end": 1509.36, "text": "여: 어떻게 된 건지 설명해 주시죠."}, {"start": 1509.41, "end": 1510.84, "text": "남: 그게, 세상이 변하고 있잖아요."}, {"start": 1510.89, "end": 1513.798, "text": "남: 이 기술에 대한 제 관점도 그런데..."}, {"start": 1513.848, "end": 1516.318, "text": "남: 러시아의 우크라이나 침공이나"}, {"start": 1516.368, "end": 1520.479, "text": "남: 중국의 타이완 침공 위협을 목격하면서"}, {"start": 1520.528, "end": 1523.519, "text": "남: 일종의 권위주의 블록이 다시 부상하는 게 우려됐습니다."}, {"start": 1523.568, "end": 1527.73, "text": "남: 그들은 매우 공격적이고"}, {"start": 1527.73, "end": 1529.88, "text": "남: 우리는 스스로를 방어할 필요가 있으니까요."}, {"start": 1529.93, "end": 1534.08, "text": "남: 정부의 모든 정책에 동의하는 건 아닐지라도"}, {"start": 1534.13, "end": 1536.999, "text": "남: 큰 틀에서 지지하는 쪽으로 입장을 정한 거죠."}, {"start": 1537.048, "end": 1539.278, "text": "여: 2024년부터 팔란티어와도 협력 중이신데,"}, {"start": 1539.328, "end": 1539.759, "text": "남: 맞습니다."}, {"start": 1539.808, "end": 1543.479, "text": "여: 팔란티어 기술은 이민세관집행국(ICE)이나 경찰, 가자 지구에서도 쓰이죠."}, {"start": 1543.528, "end": 1545.759, "text": "여: 혹시 감시용으로도 활용되고 있나요?"}, {"start": 1545.808, "end": 1550.68, "text": "남: 저희는 팔란티어를 통하든 아니든 ICE와는 일하지 않습니다."}, {"start": 1550.73, "end": 1552.479, "text": "남: 관세국경보호청(CBP)과도 관계없고요."}, {"start": 1552.528, "end": 1554.318, "text": "남: 가자 지구에서도 저희 기술은 쓰이지 않는 걸로 압니다."}, {"start": 1554.368, "end": 1558.999, "text": "남: 저희는 저희가 믿는 가치에 부합하는 일에만 참여하도록 사업 범위를 정하는 데 매우 신중을 기하고 있습니다."}, {"start": 1559.048, "end": 1564.548, "text": "여: 2025년, 앤스로픽은 오픈AI, xAI, 구글과 함께"}, {"start": 1564.598, "end": 1569.91, "text": "여: 펜타곤과 2억 달러 규모의 계약을 체결했습니다. 앤스로픽은 이를"}, {"start": 1569.96, "end": 1572.308, "text": "여: 정부의 핵심 AI 공급업체가 될 기회로 여겼죠."}, {"start": 1572.358, "end": 1579.13, "text": "여: 보도에 따르면 클로드는 베네수엘라 대통령 니콜라스 마두로를"}, {"start": 1579.18, "end": 1580.41, "text": "여: 체포하기 위한 미군의 작전에 투입되었습니다."}, {"start": 1580.46, "end": 1583.13, "text": "여: 하지만 몇 주 후, 모든 것이 어긋나기 시작했습니다."}, {"start": 1583.18, "end": 1587.528, "text": "여: 앤스로픽의 긴급 뉴스입니다. 미 국방부는 앤스로픽 측에"}, {"start": 1587.578, "end": 1590.808, "text": "여: 안전장치 없는 AI 기술의 전면적인 사용을 요구했습니다."}, {"start": 1590.858, "end": 1599.808, "text": "여: 앤스로픽은 대량 감시나 자율 무기에 클로드를 사용하는 것을 거부하며 선을 그었고, 이는 펜타곤과의 정면충돌로 이어졌습니다."}, {"start": 1599.858, "end": 1603.808, "text": "여: 오늘까지 조건을 수락하지 않으면 블랙리스트에 오를 위기에 처한 이 거대 IT 기업."}, {"start": 1603.858, "end": 1610.808, "text": "여: 민간 기업이 자사 제품의 군사적 사용 방식을 결정할 권리가 있을까요?"}, {"start": 1610.858, "end": 1614.808, "text": "여: 결국 소송이 제기되었고, 앤스로픽은 펜타곤과의 거래가 금지되었습니다."}, {"start": 1614.858, "end": 1619.808, "text": "여: 트럼프 대통령과 피트 헤그세스 국방장관도 강력한 비난을 쏟아냈습니다."}, {"start": 1619.858, "end": 1623.009, "text": "남: 앤스로픽은 이념적인 미치광이가 운영하고 있습니다. 그런 자가..."}, {"start": 1623.058, "end": 1625.709, "text": "여: 하지만 그건 제 질문이 아니에요. 제 질문은 AI가..."}, {"start": 1625.759, "end": 1627.41, "text": "남: 우리가 하는 일에 독점적인 결정권을 가져서는 안 된다는 겁니다."}, {"start": 1627.46, "end": 1631.009, "text": "여: '이념적 미치광이'나 '좌익 꼴통들'이라 불리는 것에 대해"}, {"start": 1631.058, "end": 1631.808, "text": "여: 어떻게 생각하시나요?"}, {"start": 1631.858, "end": 1634.61, "text": "남: 뭐, 전 항상 그보다 더 심한 말도 듣고 사는걸요."}, {"start": 1634.66, "end": 1637.209, "text": "여: 이 싸움에서 승리한다는 건 구체적으로 어떤 모습일까요?"}, {"start": 1637.259, "end": 1638.61, "text": "남: 전 이걸 싸움이라고 부르지도 않겠습니다."}, {"start": 1638.66, "end": 1644.61, "text": "이건 정부가 AI를 어떻게 적절하게 활용할 것인가에 대한 논쟁에 가깝죠."}, {"start": 1644.66, "end": 1647.209, "text": "AI는 새롭게 부상하는 신기술입니다."}, {"start": 1647.259, "end": 1652.009, "text": "우리는 AI의 신뢰성이나 비신뢰성에 대해 제대로 이해하지 못하고 있습니다."}, {"start": 1652.058, "end": 1656.808, "text": "AI가 우리의 가치를 증진하는지, 아니면 훼손하는지에 대해서도 이해가 부족하죠."}, {"start": 1656.858, "end": 1661.769, "text": "그래서 제가 중요하다고 생각한 것 중 하나는 선례를 남기는 것이었습니다."}, {"start": 1661.818, "end": 1666.41, "text": "우리가 긍정적이라고 생각하는 활용 사례들에 대해서 말이죠. 사실 대부분이 그렇긴 합니다만."}, {"start": 1666.46, "end": 1670.17, "text": "그리고 우리가 우려하는 일부 활용 사례들에 대해서도요."}, {"start": 1670.22, "end": 1675.528, "text": "여: 한 미국 당국자는 LLM의 도움으로 미군이 하루에 타격할 수 있는 목표가 천 개에서"}, {"start": 1675.578, "end": 1677.85, "text": "5,000개로 늘어났다고 밝혔습니다."}, {"start": 1677.9, "end": 1678.969, "text": "오늘날의 목표치죠."}, {"start": 1679.019, "end": 1683.13, "text": "그 말은 클로드가 더 많은 사람을 더 빨리 죽이는 데 도움을 줄 수 있다는 뜻입니다."}, {"start": 1683.18, "end": 1684.61, "text": "그런 사실이 마음 편하신가요?"}, {"start": 1684.66, "end": 1688.048, "text": "남: 기본적으로 당신은 제가 이 나라를 믿느냐고 묻는 것 같군요."}, {"start": 1688.098, "end": 1690.969, "text": "이 나라가 세계 무대에서 더 강력한 행위자가 되기를 원하느냐,"}, {"start": 1691.019, "end": 1693.568, "text": "아니면 덜 강력한 행위자가 되기를 원하느냐는 질문이죠."}, {"start": 1693.618, "end": 1693.93, "text": "전 원합니다."}, {"start": 1693.98, "end": 1694.93, "text": "전 애국자니까요."}, {"start": 1694.98, "end": 1695.729, "text": "그건 제가 결정할 문제가 아닙니다."}, {"start": 1695.778, "end": 1698.65, "text": "남: 저희가 기술을 제공할 때 저희가 이래라저래라"}, {"start": 1698.7, "end": 1700.33, "text": "남: 특정 군사 작전은 되고 다른 건 안 된다고"}, {"start": 1700.38, "end": 1702.45, "text": "남: 결정할 수 있는 입장은 아닙니다"}, {"start": 1702.5, "end": 1705.228, "text": "남: 사적으로는 특정 군사 작전이 타당하고"}, {"start": 1705.278, "end": 1708.61, "text": "남: 다른 작전은 나쁜 생각이라고 믿을 순 있겠지만"}, {"start": 1708.66, "end": 1712.09, "text": "남: 그렇다고 저희가 기술 제공을 거부하지는 않을 겁니다"}, {"start": 1712.14, "end": 1717.98, "text": "남: 기본적으로 정책 수립은 군의 의사결정권자들에게"}, {"start": 1717.98, "end": 1718.93, "text": "남: 맡겨야 하는 법이니까요"}, {"start": 1718.98, "end": 1723.808, "text": "여: 블룸버그는 미군이 이란 전쟁에서 클로드를 사용 중이라고 보도했습니다"}, {"start": 1723.858, "end": 1729.528, "text": "여: 팔란티어의 '메이븐 스마트 시스템'을 통해 AI 지원 타격에 활용하고 있다고요"}, {"start": 1729.578, "end": 1735.65, "text": "여: 지난 2월, 미군 미사일이 이란의 여학교를 타격해 150명 넘게 사망했는데"}, {"start": 1735.7, "end": 1737.88, "text": "여: 그들 대부분은 아이들이었습니다"}, {"start": 1737.93, "end": 1740.12, "text": "여: 그 공습에서 클로드가 역할을 했나요?"}, {"start": 1740.17, "end": 1744.68, "text": "남: 모델들이 정확히 어떻게 쓰였는지는... 저희도 알 수 없습니다"}, {"start": 1744.73, "end": 1750.217, "text": "남: 분명... [한숨] 전쟁터에서 발생하는 이런 실수들은"}, {"start": 1750.267, "end": 1752.64, "text": "남: 정말 끔찍한 일입니다"}, {"start": 1752.69, "end": 1755.44, "text": "남: 일어나서는 안 될 정말 비극적인 일이죠"}, {"start": 1755.49, "end": 1760.798, "text": "남: 저희는 이런 모델의 사용을 제한하기 위해 회사의 미래까지 걸 준비가 돼 있습니다"}, {"start": 1760.848, "end": 1766.4, "text": "남: 하지만 지금 말씀하신 건 저희의 '레드라인'을 위반하는 사례조차 아니에요"}, {"start": 1766.45, "end": 1772.6, "text": "남: 저희는 레드라인을 명백히 위반하는 사례가 100배는 더 많아질까 봐"}, {"start": 1772.65, "end": 1776.749, "text": "남: 그게 걱정인 겁니다. 다시 말하지만 전반적으로"}, {"start": 1776.798, "end": 1780.16, "text": "남: 이런 모델의 사용은 적절하다고 봅니다"}, {"start": 1780.21, "end": 1783.216, "text": "남: 궁극적으로는 이롭다고 생각하지만"}, {"start": 1783.266, "end": 1787.798, "text": "남: 군 의사결정권자들은 끔찍한 실수를 저지르기도 하죠"}, {"start": 1787.848, "end": 1791.88, "text": "가장 좋은 시절이라 해도 그런데, 지금이 과연 그런 시절인지는 모르겠네요."}, {"start": 1791.93, "end": 1796.318, "text": "여기서 알 수 있는 사실은 클로드가 보조는 하되 최종 결정은 인간이 내린다는 겁니다."}, {"start": 1796.368, "end": 1798.999, "text": "클로드가 아니라 인간이 그 최종 결정을 내린 거죠."}, {"start": 1799.048, "end": 1803.4, "text": "만약 클로드가 아니라—우리가 허용하지 않았으니까요—"}, {"start": 1803.45, "end": 1807.88, "text": "다른 AI 모델이 스스로 결정을 내리고 인간은 아예 관여하지 않는 세상을 상상해 보세요."}, {"start": 1807.93, "end": 1810.999, "text": "그게 우리가 지키려 했던 가치이자 대항해 싸웠던 부분입니다."}, {"start": 1811.048, "end": 1814.44, "text": "여: 구글 검색만 해도 나오는 이 학교 웹사이트를"}, {"start": 1814.49, "end": 1816.519, "text": "여: 클로드가 찾아냈어야 하는 것 아닌가요?"}, {"start": 1816.568, "end": 1822.278, "text": "여: 이건 전쟁에서 기술을 지름길로 삼는 것에 관한 더 무서운 문제를 시사하지 않나요?"}, {"start": 1822.328, "end": 1828.2, "text": "여기서 지켜진 원칙은 인간이, 인간이 최종 결정을 내린다는 것입니다."}, {"start": 1828.25, "end": 1834.278, "text": "클로드나 다른 AI가 어떤 역할을 했는지는 모르겠지만, 만약 이것이"}, {"start": 1834.328, "end": 1836.92, "text": "그 원칙이 왜 중요한지 보여주는 사례가 아니라면 대체 무엇이겠습니까?"}, {"start": 1836.97, "end": 1843.21, "text": "여: AI 전쟁이 제3차 세계 대전을,"}, {"start": 1843.21, "end": 1845.6, "text": "여: 즉 미국과 중국 간의 전쟁을 막아줄 가능성이 높을까요,"}, {"start": 1845.65, "end": 1848.12, "text": "여: 아니면 오히려 전쟁을 일으킬 가능성이 높을까요?"}, {"start": 1848.17, "end": 1850.6, "text": "종합적으로 따져보면 막아줄 가능성이 더 높다고 봅니다."}, {"start": 1850.65, "end": 1854.36, "text": "하지만 사용 방식에 아무런 제한을 두지 않는다면,"}, {"start": 1854.41, "end": 1856.959, "text": "오히려 전쟁의 원인이 될 가능성이 더 크다고 생각합니다."}, {"start": 1857.009, "end": 1858.558, "text": "'닥터 스트레인지러브'라는 영화 보셨죠?"}, {"start": 1858.608, "end": 1860.4, "text": "그 영화의 전제가 바로... 아시다시피..."}, {"start": 1860.45, "end": 1862.558, "text": "남: 핵무기 공격을 감지하면 자동으로 대응하는"}, {"start": 1862.608, "end": 1864.64, "text": "남: '최후의 날 장치'가 있다고 가정해 보죠"}, {"start": 1864.69, "end": 1865.558, "text": "남: 핵무기를 즉각 발사하는 장치입니다"}, {"start": 1865.608, "end": 1867.08, "text": "남: 뻔한 결과 아니겠어요?"}, {"start": 1867.13, "end": 1870.08, "text": "남: 보통 분쟁은 양측이 서로를 오해하고"}, {"start": 1870.13, "end": 1871.759, "text": "남: 돌발적으로 충돌할 때 발생합니다"}, {"start": 1871.808, "end": 1873.36, "text": "남: 서로를 불신하기 때문이죠"}, {"start": 1873.41, "end": 1876.08, "text": "남: 기술에 대한 적절한 감시가 없다면"}, {"start": 1876.13, "end": 1879.36, "text": "남: 그런 비극적인 사고가 일어날 확률은 더 커집니다"}, {"start": 1879.41, "end": 1882.12, "text": "남: 하지만 AI가 올바른 방식으로 활용된다면..."}, {"start": 1882.17, "end": 1887.719, "text": "남: 전쟁이 아니라 정보 수집 측면에서 생각해 보세요"}, {"start": 1887.769, "end": 1892.41, "text": "남: 만약 대만 침공이나 우크라이나의"}, {"start": 1892.41, "end": 1894.36, "text": "남: 새로운 군사적 움직임을 예측할 수 있다면요?"}, {"start": 1894.41, "end": 1900.528, "text": "남: 적의 행동을 우리가 속속들이 파악하고 있다면"}, {"start": 1900.528, "end": 1903.999, "text": "남: 침공이나 군사 작전을 감행하기 전에 재고하게 될 겁니다"}, {"start": 1904.048, "end": 1910.91, "text": "[음악] 여: 전장에서의 AI 역할은 자사 기술의 윤리적 딜레마를 논하는 기업에게도"}, {"start": 1910.96, "end": 1914.83, "text": "여: 매우 까다로운 과제입니다. 하지만 아마데이는 이 대화를"}, {"start": 1914.88, "end": 1917.4, "text": "여: 기꺼이 공개적으로 나누고 싶어 하는 듯 보입니다"}, {"start": 1917.45, "end": 1919.989, "text": "여: 그런 압박감을 어떻게 감당하시나요?"}, {"start": 1920.038, "end": 1925.59, "text": "남: 항상 솔직하고 명확하게 소통하려고 부단히 노력합니다. 격주로 전 직원 앞에 서서"}, {"start": 1925.64, "end": 1931.59, "text": "남: 한 시간 동안 제 생각과 현 상황을 가감 없이 공유하죠"}, {"start": 1931.64, "end": 1936.95, "text": "업계 소식이나 외부 세상의 일들이 전혀 검열 없이 공유되죠. 이는 신뢰를 쌓을 뿐만 아니라..."}, {"start": 1937.0, "end": 1943.028, "text": "믿음을 줍니다. 제게는 아주 큰 해방감을 주죠. 저와 같은 생각을 가진 3,000명의 동료가 있다는 게 느껴지거든요."}, {"start": 1943.078, "end": 1949.19, "text": "그건 엄청난 증폭제가 되어주며, 압박감을 감당하는 데 있어"}, {"start": 1949.24, "end": 1957.028, "text": "가장 유용한 수단 중 하나입니다. 외부의 도전에 직면하거나 아주 힘든 상황들에 맞서야 할 때,"}, {"start": 1957.078, "end": 1963.028, "text": "지난 몇 달간 우리가 보았던 것처럼 말이죠. 그 덕분에 우리는 일관되고 정연한 입장을 유지할 수 있습니다."}, {"start": 1963.078, "end": 1968.69, "text": "이건 정말 엄청난 강점이라고 생각합니다. 결코 혼자가 아니라는 기분이 들거든요."}, {"start": 1968.74, "end": 1979.68, "text": "앤스로픽 본사 이면에서는 '미토스'라 불리는 새로운 AI 모델의 깜짝 개발이 진행되고 있었습니다."}, {"start": 1979.68, "end": 1983.62, "text": "모두를 겁에 질리게 할 만큼 강력한 모델이었죠."}, {"start": 1983.67, "end": 1986.749, "text": "앤스로픽은 거의 매주 헤드라인을 장식하고 있습니다."}, {"start": 1986.798, "end": 1991.548, "text": "특히 지금은 미토스가 화제입니다. 사측은 이를 엄청난 위협으로 간주하고 있죠."}, {"start": 1991.598, "end": 1995.35, "text": "기본적으로 모든 사람이 핵 바주카포를 가진 세상을 상상해 보세요."}, {"start": 1995.4, "end": 2002.85, "text": "미토스는 수천 개의 사이버 보안 취약점을 발견했고, 모든 주요 운영 체제의 잠재적 결함을 드러냈습니다."}, {"start": 2002.9, "end": 2011.14, "text": "앤스로픽은 미토스가 전면 공개될 경우, 은행 해킹, 국가 기밀 탈취, 국가 기간 시설 마비가 가능하다고 경고했습니다."}, {"start": 2011.19, "end": 2019.44, "text": "가장 놀라웠던 점은 취약점을 찾아내는 모델의 능력이 계속해서 향상되어 왔다는 것입니다."}, {"start": 2019.49, "end": 2021.239, "text": "특히 이번에는 비약적인 발전이 있었죠."}, {"start": 2021.288, "end": 2024.84, "text": "이 모델을 미리 접해본 초기 기업 중 일부는 이렇게 말했습니다."}, {"start": 2024.89, "end": 2026.278, "text": "\"이건 초강력 병기입니다.\""}, {"start": 2026.328, "end": 2029.038, "text": "\"사용하려면 총기 소지 면허가 있어야 할 정도예요.\""}, {"start": 2029.088, "end": 2032.048, "text": "\"제발 이걸 출시하지 마세요.\""}, {"start": 2032.098, "end": 2034.048, "text": "'프로젝트 글래스윙'이라 불리는 계획하에..."}, {"start": 2034.098, "end": 2038.35, "text": "앤스로픽은 선정된 일부 기관에 '미토스' 접근 권한을 부여했습니다."}, {"start": 2038.4, "end": 2041.548, "text": "국가안보국(NSA)과 같은 연방 기관들조차"}, {"start": 2041.598, "end": 2042.749, "text": "이를 사용하기 위해 아우성쳤죠."}, {"start": 2042.798, "end": 2045.35, "text": "펜타곤이 앤스로픽을 블랙리스트에 올렸음에도 말입니다."}, {"start": 2045.4, "end": 2049.119, "text": "남: 미래는 일종의 '쫓고 쫓기는 게임'이 될 거라 봅니다."}, {"start": 2049.17, "end": 2054.96, "text": "남: 선한 쪽이 방어에 필요한 도구를 확실히 갖추게 해야 하는 게임이죠."}, {"start": 2055.01, "end": 2060.159, "text": "남: 그러다 어느 순간 악당들도 도구를 갖게 될 텐데, 그때를 대비해서"}, {"start": 2060.21, "end": 2062.96, "text": "남: 선한 쪽이 더 나은 모델을 갖추고 있어야 합니다."}, {"start": 2063.01, "end": 2065.793, "text": "여: 악당들을 앞서는 게 정말 가능할까요?"}, {"start": 2065.844, "end": 2067.519, "text": "남: 그러길 바랄 뿐이죠."}, {"start": 2067.57, "end": 2072.309, "text": "여: 비판하는 쪽은 당신들이 누구에게 접근 권한을 줄지 사실상 결정하고 있다고 합니다."}, {"start": 2072.36, "end": 2076.628, "text": "여: 그런 식의 권력 집중을 왜 우리가 편하게 받아들여야 할까요?"}, {"start": 2076.679, "end": 2080.468, "text": "남: \"와, 정말 강력하네. 누구한테 이 힘을 줄지 우리가 정하자\" 이런 식은 아니었습니다."}, {"start": 2080.518, "end": 2084.468, "text": "남: 사이버 보안에 대한 아주 구체적인 우려가 있었죠."}, {"start": 2084.518, "end": 2089.668, "text": "남: 그래서 모델을 누구에게 줄지 결정하는 방식도 그 구체적인 공포에 근거했습니다."}, {"start": 2089.719, "end": 2092.949, "text": "남: 물론 그 선을 어디에 그을지 결정하는 일엔 미묘한 차이가 따르죠."}, {"start": 2093.0, "end": 2094.389, "text": "남: 정말 복잡한 일이라고 생각합니다."}, {"start": 2094.44, "end": 2098.71, "text": "남: 저희는 최대한 공개적으로 소통하려고 노력해 왔습니다."}, {"start": 2098.76, "end": 2103.278, "text": "남: 최선을 다해 결정하고 있지만 완벽하지 않을 수도 있다고 말이죠."}, {"start": 2103.329, "end": 2106.48, "text": "여: 그저 마케팅 수단일 뿐이라는 사람들의 말엔 어떻게 답하시겠어요?"}, {"start": 2106.53, "end": 2111.679, "text": "남: 아시다시피, 저희는 이 모델을 출시하지 않으면서 상업적으로 큰 손실을 봤습니다."}, {"start": 2111.73, "end": 2114.246, "text": "이 모델은 앤스로픽 내부의 연구와"}, {"start": 2114.297, "end": 2116.96, "text": "제작 속도를 엄청나게 가속화했습니다"}, {"start": 2117.01, "end": 2117.96, "text": "다음 모델들도 마찬가지고요"}, {"start": 2118.01, "end": 2121.639, "text": "이걸 공개한다면 외부 세계에서도 똑같은 일이 벌어질 겁니다"}, {"start": 2121.69, "end": 2124.239, "text": "상업적으로는 우리에게 엄청난 손해였죠"}, {"start": 2124.289, "end": 2128.079, "text": "여: 본인조차 완전히 납득하기 어려운 타협을 이미 해야만 했나요?"}, {"start": 2128.13, "end": 2131.96, "text": "남: 앤스로픽의 역사 자체가 타협의 연속이었습니다"}, {"start": 2132.01, "end": 2136.358, "text": "이상적인 세상이라면 첫 챗봇을 출시하기 전에"}, {"start": 2136.409, "end": 2141.159, "text": "발생할 수 있는 모든 문제점을 연구하며 몇 년을 보냈겠죠"}, {"start": 2141.21, "end": 2142.119, "text": "물론 저희도 출시를 늦추긴 했습니다"}, {"start": 2142.17, "end": 2146.519, "text": "클로드의 초기 출시를 몇 달 정도 늦췄었죠"}, {"start": 2146.57, "end": 2149.079, "text": "결국 모든 것이 타협인 셈입니다"}, {"start": 2149.13, "end": 2154.039, "text": "이제 저희가 상업적으로 선두 자리에 있다고 자부하기 때문에"}, {"start": 2154.09, "end": 2157.639, "text": "주의를 기울이는 쪽으로 방향을 더 틀 여유가 생겼습니다"}, {"start": 2157.69, "end": 2159.798, "text": "클로드 3 출시가 바로 그런 의미였죠"}, {"start": 2159.849, "end": 2164.0, "text": "선두 주자가 아니라면 그런 결정을 내리기가 매우 어렵거든요"}, {"start": 2164.05, "end": 2167.798, "text": "여: 정부가 회사를 인수해야 한다는 주장도 있는데요"}, {"start": 2167.849, "end": 2172.398, "text": "왜 이토록 강력한 기술을 민간 기업이 통제하게 두느냐는 거죠"}, {"start": 2172.449, "end": 2178.199, "text": "남: 정말 진지하게 고민해 볼 문제라고 생각하며 저도 그 우려에 공감합니다"}, {"start": 2178.25, "end": 2182.048, "text": "하지만 정부가 저희를 완전히 인수해야 한다고 보지는 않아요"}, {"start": 2182.099, "end": 2188.048, "text": "역사 속의 강력한 기술들은 모두 정부가 직접 만들었거나..."}, {"start": 2188.099, "end": 2189.648, "text": "남: ...아니면 정부에서 시작되었거나요."}, {"start": 2189.699, "end": 2193.889, "text": "남: 핵무기만 봐도 그렇죠. 당연히 처음엔 정부가 만들었습니다."}, {"start": 2193.94, "end": 2201.25, "text": "남: 인터넷, GPS, 휴대전화까지... 하지만 AI는 민간 부문에서 탄생한 최초의 기술입니다."}, {"start": 2201.3, "end": 2206.489, "text": "남: 정부가 실질적인 역할을 하지 못했고, 뒤늦게 개입하고 있는 상황이죠."}, {"start": 2206.539, "end": 2209.73, "text": "남: 저는 이게 사실 위험하고 불안정한 상황이라고 생각합니다."}, {"start": 2209.78, "end": 2211.968, "text": "남: 제가 원했던 상황은 아니에요."}, {"start": 2212.018, "end": 2216.769, "text": "남: 이 기술을 기업이 갖는 것도 두렵지만, 정부가 갖는 것도 두렵거든요."}, {"start": 2216.82, "end": 2220.608, "text": "남: 그래서 이 기술에 대한 기본적인 규제가 필요합니다."}, {"start": 2220.659, "end": 2224.369, "text": "남: '미토스'의 사례를 지켜보면서 더욱 그런 생각이 들었습니다."}, {"start": 2224.42, "end": 2227.489, "text": "남: 출시 전 테스트를 시작해야 한다고 봐요."}, {"start": 2227.539, "end": 2229.369, "text": "남: 의무적인 출시 전 테스트와"}, {"start": 2229.42, "end": 2231.688, "text": "남: 모델에 대한 테스트 및 감사가 필요합니다."}, {"start": 2231.739, "end": 2234.949, "text": "여: 하지만 백악관은 처음에 이 방식을 거부했습니다."}, {"start": 2235.0, "end": 2237.389, "text": "여: 집무실 복귀 첫날, 트럼프 대통령은"}, {"start": 2237.44, "end": 2240.429, "text": "여: 전 AI 및 암호화폐 담당관 데이비드 색스의 도움을 받아"}, {"start": 2240.48, "end": 2244.71, "text": "여: 안전장치를 마련하려던 바이든 대통령의 AI 행정명령을 폐기했습니다."}, {"start": 2244.76, "end": 2248.789, "text": "여: 대신 실리콘밸리가 알아서 하게 두는 방임형 접근법을 택했죠."}, {"start": 2248.84, "end": 2255.889, "text": "남: 저희는 AI 분야에 대한 과도한 규제가 혁신적인 산업을"}, {"start": 2255.889, "end": 2257.918, "text": "남: 이제 막 도약하려는 시점에 고사시킬 수 있다고 믿습니다."}, {"start": 2257.969, "end": 2262.079, "text": "여: 하지만 미토스와 그 국가 안보적 파장이 무시하기 힘든 수준임이 드러나면서..."}, {"start": 2262.13, "end": 2267.759, "text": "[음악] 백악관이 이제 세계 최강의 AI를 독점하려는 모양새입니다."}, {"start": 2267.809, "end": 2273.358, "text": "실리콘밸리 기술 업계의 어떤 사람들을 보면 참 웃음이 나와요."}, {"start": 2273.409, "end": 2278.96, "text": "처음에는 이 기술의 투명성을 확보해야 한다느니 하더니,"}, {"start": 2279.01, "end": 2283.119, "text": "수출 통제까지 언급하면서 \"이건 정말이지...\""}, {"start": 2283.17, "end": 2288.159, "text": "\"우리의 기술 개발 잠재력을 완전히 파괴하고 혁신을 죽일 것\"이라고 주장했죠."}, {"start": 2288.21, "end": 2292.079, "text": "그러다 제가 계속 예상해 왔던 첫 번째 실질적 위험이 감지되자마자,"}, {"start": 2292.13, "end": 2295.838, "text": "갑자기 국유화 얘기를 꺼내며 정부가 몰수해야 한다고 난리입니다."}, {"start": 2295.889, "end": 2301.01, "text": "이봐요, 당신들은 규제라면 아주 질색하던"}, {"start": 2301.01, "end": 2306.159, "text": "극단적인 사람들이었잖아요. \"눈길만 잘못 줘도 업계를 망친다\"던 사람들이..."}, {"start": 2306.21, "end": 2311.759, "text": "이제는 공산주의자처럼 \"정부가 싹 가져가야 한다\"고 하네요. 우린 좀 더 분별 있고..."}, {"start": 2311.809, "end": 2317.119, "text": "온건한 접근법이 필요합니다. 저희가 줄곧 지지해 온 방식이죠. 저희는 이 기술의 위력을..."}, {"start": 2317.17, "end": 2323.358, "text": "충분히 이해하고 있거든요. 공포에 질리지도, 현실을 부정하지도 않습니다. 기하급수적인 변화를 지켜보며..."}, {"start": 2323.409, "end": 2330.61, "text": "그에 맞춰 적절히 대응하고 있습니다."}, {"start": 2330.61, "end": 2332.05, "text": "[음악]"}, {"start": 2332.05, "end": 2336.108, "text": "[군중 소리] 현재 AI를 향한 반응은 그 어느 때보다 뜨겁습니다."}, {"start": 2336.159, "end": 2338.949, "text": "앤스로픽은 아주 충성도 높은 팔로워들을 모았죠."}, {"start": 2339.0, "end": 2341.75, "text": "그들의 철학에 열광하는 사람들도 있지만,"}, {"start": 2341.8, "end": 2345.028, "text": "사무실 바로 앞에서 시위가 벌어지기도 했습니다."}, {"start": 2345.079, "end": 2347.829, "text": "불안과 혼란이 교차하는 가운데,"}, {"start": 2347.88, "end": 2352.668, "text": "지금 일어나는 일들에 대해 실질적인 분노를 느끼는 이들도 많습니다."}, {"start": 2352.719, "end": 2355.068, "text": "상황은 점점 더 격화되는 양상입니다."}, {"start": 2355.119, "end": 2360.119, "text": "인공지능은 차세대 산업 혁명입니다."}, {"start": 2360.119, "end": 2370.239, "text": "여1: 아, 데이터를 보면 사람들은 작금의 상황에 대해 기대보다 우려를 더 많이 하고 있어요."}, {"start": 2370.289, "end": 2376.239, "text": "여1: 이득보다는 위험이 더 크다고 생각하죠. 사실 이걸 만드는 사람들과 이야기를 해보면..."}, {"start": 2376.289, "end": 2381.239, "text": "여1: 그들조차 이게 결국 어떤 식으로 전개될지 완전히 알지 못한다고 말할 겁니다."}, {"start": 2381.289, "end": 2387.86, "text": "여2: 이 순간의 무게감을 어떻게 느끼시나요?"}, {"start": 2387.86, "end": 2389.809, "text": "남: 무언가 잘못될까 봐 걱정되기도 합니다."}, {"start": 2389.86, "end": 2391.809, "text": "남: 우리가 정말 할 수 있는 모든 노력을 다하고 있는 걸까요?"}, {"start": 2391.86, "end": 2393.809, "text": "남: 확실히 최선을 다하고는 있습니다."}, {"start": 2393.86, "end": 2395.968, "text": "남: 정말 열심히 노력하고 있죠."}, {"start": 2396.018, "end": 2397.648, "text": "남: 제가 원하는 건 이런 상황을 만드는 겁니다."}, {"start": 2397.699, "end": 2399.21, "text": "남: 만약 이 팀원들이 해내지 못한다면..."}, {"start": 2399.26, "end": 2400.25, "text": "남: 그 누구도 해낼 수 없는 그런 상황 말이죠."}, {"start": 2400.3, "end": 2403.96, "text": "남: 성공을 보장할 수는 없지만, 그것만큼은 약속할 수 있을지도 모릅니다."}, {"start": 2404.01, "end": 2405.48, "text": "여2: 이제는 개인적인 위협으로까지 번지고 있습니다."}, {"start": 2405.53, "end": 2408.438, "text": "여2: 길 건너편에 있는 샘 올트먼의 자택이 공격을 받았는데요."}, {"start": 2408.489, "end": 2410.199, "text": "여2: 그 사건이 당신에게 어떤 영향을 주었나요?"}, {"start": 2410.25, "end": 2411.759, "text": "여3: 그 소식을 접하고 정말 무서웠어요."}, {"start": 2411.809, "end": 2414.759, "text": "여3: 그러니까 제 말은... 우린 분명 굉장히... 정말이지..."}, {"start": 2414.809, "end": 2416.878, "text": "여3: 그와 가족들이 무사하다는 사실에 가슴을 쓸어내렸죠."}, {"start": 2416.929, "end": 2419.159, "text": "여3: 전반적으로, 지금은..."}, {"start": 2419.21, "end": 2420.438, "text": "기술적으로나 정치적으로나..."}, {"start": 2420.489, "end": 2424.318, "text": "안타깝게도 지금은 자극적인 수사가 난무하고 있어요."}, {"start": 2424.369, "end": 2428.119, "text": "그런 말들이 결국 부정적인 결과를 초래하고,"}, {"start": 2428.17, "end": 2429.559, "text": "불행한 일들을 만든다고 생각해요."}, {"start": 2429.61, "end": 2431.798, "text": "이 주제에 대해서 우리 모두가"}, {"start": 2431.849, "end": 2434.039, "text": "최대한 평화롭게 토론할 수 있기를 바랍니다."}, {"start": 2434.09, "end": 2435.159, "text": "저도 정말 무서웠어요."}, {"start": 2435.21, "end": 2438.239, "text": "제 말은, 이건 지수적 성장의 이면에 있는"}, {"start": 2438.289, "end": 2439.278, "text": "그리 달갑지 않은 모습 같거든요. 그쵸?"}, {"start": 2439.329, "end": 2443.0, "text": "AI가 점점 더 거대한 존재가 되면서,"}, {"start": 2443.05, "end": 2446.199, "text": "그러니까 사회적으로 정말..."}, {"start": 2446.25, "end": 2447.039, "text": "중대한 사안이 되고 있잖아요."}, {"start": 2447.09, "end": 2448.318, "text": "사람들의 관심도 쏠리고 있고요."}, {"start": 2448.369, "end": 2449.202, "text": "소셜 미디어에 대해서는"}, {"start": 2449.253, "end": 2450.159, "text": "거센 반발이 일어났었죠."}, {"start": 2450.21, "end": 2451.358, "text": "여: 맞아요."}, {"start": 2451.409, "end": 2453.318, "text": "여러 국가에서 금지하기 시작했고요."}, {"start": 2453.369, "end": 2455.909, "text": "AI도 그렇게 될 수 있을까요?"}, {"start": 2455.96, "end": 2458.108, "text": "충분히 가능한 일이라고 봐요."}, {"start": 2458.159, "end": 2460.628, "text": "만약 소셜 미디어 기업들이 과거로 돌아가서"}, {"start": 2460.679, "end": 2462.548, "text": "지금과 같은 세상을 미리 볼 수 있었다면 어땠을까요."}, {"start": 2462.599, "end": 2464.588, "text": "여: 그들이 과연 다르게 행동했을까요?"}, {"start": 2464.639, "end": 2466.75, "text": "여: 답변이 '네'였으면 좋겠지만, 잘 모르겠네요."}, {"start": 2466.8, "end": 2469.71, "text": "여: 소셜 미디어 기업들이 직면했던"}, {"start": 2469.76, "end": 2471.628, "text": "여: 여러 가지 난제들을 돌이켜 보면요."}, {"start": 2471.679, "end": 2474.309, "text": "여: 아동 복지나 정신 건강,"}, {"start": 2474.36, "end": 2476.429, "text": "여: 선거 무결성 같은 주제들 말이죠."}, {"start": 2476.48, "end": 2479.108, "text": "여: 우리가 후발 주자라는 건 정말 행운이에요."}, {"start": 2479.159, "end": 2482.068, "text": "여: 잘못될 수 있는 모든 상황을 미리"}, {"start": 2482.119, "end": 2484.148, "text": "여: 예견하고 고민하는 게 우리의 임무니까요."}, {"start": 2484.199, "end": 2485.829, "text": "여: 우리가 안 하면 누가 하겠어요?"}, {"start": 2485.88, "end": 2490.71, "text": "남: 있잖아요, 그들이 정말 옳은 일을 하거나 세상을 더 낫게 만들려고 시작했는지는 모르겠습니다."}, {"start": 2490.76, "end": 2494.509, "text": "남: 그래서 과거로 돌아간다고 해도, 본인들이 뭘 할지조차 모를 것 같아요."}, {"start": 2494.559, "end": 2496.71, "text": "남: 물론 당연히 다르게 행동해야겠지만요."}, {"start": 2496.76, "end": 2498.309, "text": "남: 실제로 그럴지는 의문이네요."}, {"start": 2498.36, "end": 2499.188, "text": "남: 하지만 우린 그럴 수 없습니다."}, {"start": 2499.239, "end": 2502.148, "text": "남: 그래서 처음부터 제대로 하려는 겁니다."}, {"start": 2502.199, "end": 2504.468, "text": "남: 문제가 터질 때까지 기다렸다가"}, {"start": 2504.518, "end": 2508.23, "text": "남: 왜 다 괜찮은지 변명하며 허둥대는 대신에요."}, {"start": 2508.28, "end": 2511.71, "text": "남: 제가 보기에 AI가 금지되거나 차단되는 상황은"}, {"start": 2511.76, "end": 2514.349, "text": "남: 정말로 뭔가가 잘못됐을 때뿐일 겁니다."}, {"start": 2514.4, "end": 2516.75, "text": "무언가 정말 잘못된다면, 그렇게 되어 마땅할지도 모르죠."}, {"start": 2516.8, "end": 2520.108, "text": "여: 한쪽에선 기술자들이 놀라울 거라고 하고"}, {"start": 2520.159, "end": 2521.909, "text": "여: 다른 쪽에서는 끔찍할 수도 있다고 해요."}, {"start": 2521.96, "end": 2524.509, "text": "여: 당신은 그 스펙트럼 중 어디에 있나요?"}, {"start": 2524.559, "end": 2527.23, "text": "남: 최선을 바라되 최악에 대비해야죠."}, {"start": 2527.28, "end": 2530.148, "text": "남: 제게는 이것이 생애 가장 중요한 일입니다."}, {"start": 2530.199, "end": 2532.909, "text": "남: 누군가에게는 이것이 마지막 직업처럼 느껴질 거예요."}, {"start": 2532.96, "end": 2536.309, "text": "남: 일의 종말을 의미할 수도 있으니까요."}, {"start": 2536.36, "end": 2543.269, "text": "남: 또 다른 사람들에게는 마지막 직업은 아닐지 몰라도, 이걸 제대로 해내는 게 사활이 걸린 문제죠."}, {"start": 2543.32, "end": 2545.588, "text": "남: 그래서 일종의 책임감 같은 게 느껴집니다."}, {"start": 2545.639, "end": 2549.769, "text": "여: 그 영향력이 우리가 말하는 것만큼 크다면,"}, {"start": 2549.82, "end": 2552.648, "text": "여: 앤스로픽이 경고한 만큼이나 중대하다면,"}, {"start": 2552.699, "end": 2557.21, "text": "여: 충격을 완화하기 위해 앤스로픽은 어떤 책임이 있다고 보나요?"}, {"start": 2557.26, "end": 2561.688, "text": "여: 삶이 송두리째 뒤바뀐 사람들에게 무엇을 빚지고 있다고 생각하죠?"}, {"start": 2561.739, "end": 2579.688, "text": "남: 저희 관점은 늘 이랬습니다. 이 기술을 개발하는 업계로서 위험 요소와 발생할 수 있는 나쁜 일들을 고민할 궁극적인 책임이 있다는 거죠. 그리고 그런 일들이 실제로 벌어졌을 때 이를 해결하는 데 어떤 역할을 할지도요."}, {"start": 2579.739, "end": 2590.688, "text": "남: 그것이 저희의 임무입니다. 단순히 제품을 키우려던 것뿐인데 갑자기 젊은 여성 세대 전체가 섭식 장애나 정신 건강 문제를 겪게 됐다고 \"이런, 실수했네요\"라고 할 순 없죠."}, {"start": 2590.739, "end": 2592.688, "text": "남: 그저 제품을 성장시키려던 것뿐이었다고 말이죠."}, {"start": 2592.739, "end": 2595.688, "text": "남: 어떤 기술 기업도 그런 태도를 취해선 안 된다고 생각합니다."}, {"start": 2595.739, "end": 2597.688, "text": "남: 저희가 지향하는 태도도 아니고요."}, {"start": 2597.739, "end": 2601.869, "text": "정체성이 깊게 얽혀 있는 기업에게..."}, {"start": 2601.92, "end": 2604.869, "text": "다리오: 제대로 하고 싶습니다. 저희는 AI 안전 기업으로서 존재하니까요."}, {"start": 2604.92, "end": 2606.869, "text": "다리오: 어떻게 하면 이 모든 일이 잘 풀리도록 도울 수 있을까요?"}, {"start": 2606.92, "end": 2611.869, "text": "해설: 앤스로픽이 위험성에 대해 그토록 솔직하게 말하면서도,"}, {"start": 2611.92, "end": 2613.869, "text": "해설: 왜 이토록 AI 발전에 박차를 가하는지 이해하기 어려울 수 있습니다."}, {"start": 2613.92, "end": 2619.468, "text": "해설: 다리오 아모데이는 에세이를 통해 AI가 올바른 방향으로 나아갔을 때의 최종 단계를 제시합니다."}, {"start": 2619.518, "end": 2626.568, "text": "해설: 기계와 인간이 공존하는 유토피아적인 미래죠. 거스를 수 없는 힘인 AI가..."}, {"start": 2626.619, "end": 2632.309, "text": "해설: 파국이 아닌 번영을 향해 나아가도록 하는 것입니다. 일자리 상실로 인한..."}, {"start": 2632.36, "end": 2638.789, "text": "해설: 피해를 막기 위해 그는 보편적 기본 소득과 AI 기업에 대한 누진세 같은 해결책을 제안합니다."}, {"start": 2638.84, "end": 2645.309, "text": "해설: 하지만 아모데이 남매가 권력, 정치, 이익이라는 복잡한 현실에 직면하게 되면서,"}, {"start": 2645.36, "end": 2649.869, "text": "해설: 진정한 시험대는 그들의 설립 이념이 사업 규모 확장 속에서도 살아남을 수 있느냐는 것입니다."}, {"start": 2649.92, "end": 2653.949, "text": "해설: 구글은 '사악해지지 말자'라는 모토로 시작했습니다."}, {"start": 2654.0, "end": 2659.418, "text": "해설: 하지만 회사가 성장하면서 그 약속은 조용히 사라지고 말았죠."}, {"start": 2659.469, "end": 2665.099, "text": "인터뷰어: 당신들은 엄청나게 강력한 것을 만들고 있고, 그로부터 막대한 이익을 얻을 수 있는 위치에 있습니다."}, {"start": 2665.15, "end": 2666.858, "text": "인터뷰어: 우리가 왜 당신들을 믿어야 하죠?"}, {"start": 2666.909, "end": 2669.579, "text": "다리오: 불신에서 시작하는 것은..."}, {"start": 2669.63, "end": 2670.938, "text": "다리오: 그러니까, 저에 대해 아무것도 모르시고,"}, {"start": 2670.989, "end": 2671.818, "text": "다리오: 앤스로픽에 대해서도 아무것도 모르신다면,"}, {"start": 2671.869, "end": 2673.338, "text": "다리오: 지극히 합리적인 반응이라고 생각합니다."}, {"start": 2673.389, "end": 2676.378, "text": "다리오: 실리콘밸리는 세상의 신뢰를 많이 잃었다고 생각해요."}, {"start": 2676.429, "end": 2678.298, "text": "다리오: 그래서 그 신뢰를 다시 얻어야만 하죠."}, {"start": 2678.349, "end": 2681.179, "text": "남: 저희가 전달하려는 메시지는"}, {"start": 2681.23, "end": 2685.579, "text": "사실 이와 다르며, 이는 우리가 실제로 하는 행동을 통해 증명되어야 합니다."}, {"start": 2685.63, "end": 2689.338, "text": "여: 당신이 가장 좋아하는 책 중 하나가 '원자폭탄 만들기'라고 알고 있어요."}, {"start": 2689.389, "end": 2690.139, "text": "남: 맞습니다."}, {"start": 2690.19, "end": 2692.858, "text": "여: 본인과 오펜하이머 사이에 유사점이 있다고 보시나요?"}, {"start": 2692.909, "end": 2701.188, "text": "남: 제가 가장 동질감을 느꼈던 인물은 레오 실라르드였어요. 연쇄 반응의 개념을 처음으로 고안해낸 사람이죠."}, {"start": 2701.239, "end": 2707.48, "text": "제 견해로는, 영웅적인 인물이나 모든 것의 중심이 되려는"}, {"start": 2707.48, "end": 2709.829, "text": "그런 인물들을 통해서는 이 문제를 해결할 수 없습니다."}, {"start": 2709.88, "end": 2712.628, "text": "어떤 면에서 저는 오펜하이머를 실패 사례로 봅니다."}, {"start": 2712.679, "end": 2714.389, "text": "일어나서는 안 될 일의 본보기로서 말이죠."}, {"start": 2714.44, "end": 2717.668, "text": "여기에는 이해관계가 얽힌 강력한 주체들이 아주 많습니다."}, {"start": 2717.719, "end": 2720.548, "text": "그리고 모두에게 좋은 결과로 끝날 수 있는 유일한 방법은"}, {"start": 2720.599, "end": 2724.628, "text": "기본적으로 모든 곳에 견제와 균형이 존재하는 것입니다."}, {"start": 2724.679, "end": 2730.309, "text": "여: 문명이 붕괴할 확률이 대략 10%에서 25%라고 말씀하셨죠."}, {"start": 2730.36, "end": 2732.789, "text": "결코 적지 않은 수치인데요."}, {"start": 2732.84, "end": 2735.829, "text": "혹시 앤스로픽이 만든 무언가가"}, {"start": 2735.88, "end": 2738.468, "text": "그런 원인이 될 수도 있는 시나리오가 있나요?"}, {"start": 2738.518, "end": 2740.269, "text": "남: 물론 그렇지 않기를 바랍니다."}, {"start": 2740.32, "end": 2746.0, "text": "제 생각에 그 확률은 기술의 매우 단순한 속성과"}, {"start": 2746.0, "end": 2750.949, "text": "전 세계 수많은 국가와 기업이 존재한다는 사실에서 기인합니다."}, {"start": 2751.0, "end": 2755.269, "text": "경제 체제 내에서 기존 기업이 사라지고 공백이 생기면 새로운 기업이 생겨나죠."}, {"start": 2755.32, "end": 2756.829, "text": "그게 우리가 처한 딜레마입니다."}, {"start": 2756.88, "end": 2762.148, "text": "회사에서 하는 일의 절반은 리스크를 최대한 줄이려고 노력하는 것이지만,"}, {"start": 2762.199, "end": 2763.588, "text": "그게 결코 0이 될 수는 없어요."}, {"start": 2763.639, "end": 2766.269, "text": "수많은 항공사가 있다고 가정해 봅시다."}, {"start": 2766.32, "end": 2768.068, "text": "'자, 난 훨씬 더 안전한 항공사를"}, {"start": 2768.119, "end": 2768.789, "text": "만들겠어'라고 한다면요."}, {"start": 2768.84, "end": 2772.148, "text": "여러분의 항공사가 다른 모든 항공사보다"}, {"start": 2772.199, "end": 2774.989, "text": "10배 더 안전한 것도 충분히 가능하겠지만,"}, {"start": 2775.039, "end": 2777.068, "text": "누군가 와서 이렇게 묻는다면요."}, {"start": 2777.119, "end": 2780.389, "text": "\"비행기가 절대 추락하지 않는다고 보장할 수 있나요?\""}, {"start": 2780.44, "end": 2782.71, "text": "제 말은, 그걸 어떻게 장담할 수 있겠어요?"}, {"start": 2782.76, "end": 2785.349, "text": "여: 하지만 비행기 추락 확률이 25%라면"}, {"start": 2785.4, "end": 2786.789, "text": "여: 아무도 그 비행기를 타지 않을 거예요."}, {"start": 2786.84, "end": 2788.468, "text": "남: 맞습니다, 25%는 너무 높죠."}, {"start": 2788.518, "end": 2790.989, "text": "남: 우린 그 확률을 훨씬 더 낮추려고 노력하는 겁니다."}, {"start": 2791.039, "end": 2821.8, "text": "남: 그게, 그게 바로 목표예요. [음악]"}, {"start": 2821.8, "end": 2824.349, "text": "여: 마음의 평온은 어떻게 찾으세요? 휴식은 어떻게 취하시고요?"}, {"start": 2824.4, "end": 2827.949, "text": "남: 사실 많은 부분은 그냥 그 상황에 노출되는 거예요."}, {"start": 2828.0, "end": 2830.389, "text": "남: 가끔은 그냥... 뭐랄까..."}, {"start": 2830.44, "end": 2833.548, "text": "주말에는 그냥 좀 쉬면서 비디오 게임도 하고 그래요"}, {"start": 2833.599, "end": 2836.75, "text": "아내 다니엘라랑 같이 이탈리아에 가기도 하죠"}, {"start": 2836.8, "end": 2840.148, "text": "[음] 거기 말이 한 마리 있는데 그냥 그 옆에 앉아서..."}, {"start": 2840.199, "end": 2843.389, "text": "우리 말을 가만히 보고 있으면 이런 생각이 들어요"}, {"start": 2843.44, "end": 2845.668, "text": "우리 말인 칼립소는 말이죠, 아시다시피..."}, {"start": 2845.719, "end": 2847.23, "text": "얘는 이런 건 전혀 모르거든요"}, {"start": 2847.28, "end": 2849.88, "text": "그저 행복한 말일 뿐이죠"}];
let player;
function onYouTubeIframeAPIReady(){
    player=new YT.Player('player',{
        videoId:videoId,
        playerVars:{autoplay:1,controls:1,rel:0,modestbranding:1,fs:0,disablekb:1,cc_load_policy:3},
        events:{
            'onReady': function(e){ 
                // [V160.4] 유튜브 기본 자막이 같이 켜져서 두 개로 겹쳐 보이는 현상 방지 🐾
                try { e.target.unloadModule("captions"); } catch(err) {} 
            },
            'onStateChange':onPlayerStateChange
        }
    });
}

// [V160.1] AI냥: 유튜브 고유 단축키 무력화 후, 'f' 키 등 사용자 편의 조작을 가로채서 자체 전체화면 실행! 🐱✨
window.addEventListener('keydown', function(e) {
    if (!player || !player.getPlayerState || typeof player.getDuration !== 'function') return;

    // Ctrl + ArrowLeft: Previous Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowLeft') {
        const t = player.getCurrentTime();
        let target = Math.max(0, t - 5);
        for(let i = subs.length - 1; i >= 0; i--) {
            if(subs[i].start < t - 1.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    // Ctrl + ArrowRight: Next Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowRight') {
        const t = player.getCurrentTime();
        let target = t + 5;
        for(let i = 0; i < subs.length; i++) {
            if(subs[i].start > t + 0.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    if (e.key.toLowerCase() === 'f') {
        toggleFullScreen();
        e.preventDefault();
    } else if (e.key === ' ' || e.key.toLowerCase() === 'k') {
        if (player.getPlayerState() === 1) player.pauseVideo();
        else player.playVideo();
        e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
        player.seekTo(player.getCurrentTime() - 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowRight') {
        player.seekTo(player.getCurrentTime() + 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowUp') {
        player.setVolume(player.getVolume() + 5);
        e.preventDefault();
    } else if (e.key === 'ArrowDown') {
        player.setVolume(player.getVolume() - 5);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'm') {
        player.isMuted() ? player.unMute() : player.mute();
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'j') {
        player.seekTo(player.getCurrentTime() - 10, true);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'l') {
        player.seekTo(player.getCurrentTime() + 10, true);
        e.preventDefault();
    } else if (e.key >= '0' && e.key <= '9') {
        const fraction = parseInt(e.key) / 10;
        player.seekTo(player.getDuration() * fraction, true);
        e.preventDefault();
    }
});

// iframe 클릭 시 빼앗긴 포커스를 0.1초 뒤에 훔쳐와서 'f' 등 단축키가 계속 먹히도록 유지! 🕵️‍♂️✨
window.addEventListener('blur', function() {
    setTimeout(() => {
        if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
            window.focus();
        }
    }, 100);
});
let syncInterval;
let activityTimeout;
function resetActivity() {
    const fsBtn = document.getElementById('fs-btn');
    const subsEl = document.getElementById('subtitles');
    if(fsBtn) fsBtn.classList.remove('fade-out');
    if(subsEl) subsEl.classList.remove('ui-hidden');
    clearTimeout(activityTimeout);
    if (player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING) {
        activityTimeout = setTimeout(() => {
            if(fsBtn) fsBtn.classList.add('fade-out');
            if(subsEl) subsEl.classList.add('ui-hidden');
        }, 3000);
    }
}
document.addEventListener('mousemove', resetActivity);
document.addEventListener('touchstart', resetActivity, {passive: true});
document.addEventListener('keydown', resetActivity);
window.addEventListener('blur', resetActivity);
window.addEventListener('focus', resetActivity);

function onPlayerStateChange(event){
    resetActivity();
    if(event.data==YT.PlayerState.PLAYING){
        if(!syncInterval) syncInterval=setInterval(updateSubs,100);
    }else{
        clearInterval(syncInterval); syncInterval=null;
    }
}
function updateSubs(){
    const t=player.getCurrentTime();
    let currentHtml="";
    let activeSubs = [];
    for(let i=0;i<subs.length;i++){
        if(t>=subs[i].start && t<=subs[i].end){
            activeSubs.push(subs[i]);
        }
    }
    if(activeSubs.length > 0){
        // [V160.5] AI 번역 생성 시 자막 시간이 미세하게 겹쳐(Overlap) 동일한 내용이 두 줄로 출력되는 현상 방지! 
        // 겹치는 자막 중 가장 마지막 매칭 항목 하나만 렌더링 🐾
        let bestSub = activeSubs[activeSubs.length - 1];
        currentHtml = `<div class="sub-line">${bestSub.text}</div><br>`;
    }
    if(document.getElementById('subtitles').innerHTML !== currentHtml){
        document.getElementById('subtitles').innerHTML=currentHtml;
    }
}

let isDragging=false, startY, currentBottom, subEl=document.getElementById('subtitles');
document.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchstart', dragStart, {passive:false});
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('touchend', dragEnd);

function dragStart(e) {
    if(!e.target.classList.contains('sub-line')) return;
    isDragging = true;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    startY = clientY;
    let style = window.getComputedStyle(subEl);
    currentBottom = parseFloat(style.bottom) || 0;
    subEl.classList.add('dragging');
    e.preventDefault();
}
function dragMove(e) {
    if(!isDragging) return;
    // [FIX] iframe 등에 의해 mouseup 이벤트를 놓쳤지만 마우스 버튼은 떼어진 경우 강제 드래그 종료! 🛡️✨
    if(e.type.includes('mouse') && e.buttons === 0) {
        dragEnd(e);
        return;
    }
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    let dy = clientY - startY;
    subEl.style.bottom = (currentBottom - dy) + 'px';
    if(e.cancelable) e.preventDefault();
}
function dragEnd(e) {
    isDragging = false;
    subEl.classList.remove('dragging');
}

// [Wheel / Pinch to Zoom for Font Size]
let currentFontSize = 4.5;
let initialDist = 0;
let initialFontSize = 4.5;

document.addEventListener('wheel', (e) => {
    if(e.target.closest('#subtitles') || e.target.classList.contains('sub-line')) {
        e.preventDefault();
        currentFontSize += e.deltaY < 0 ? 0.2 : -0.2;
        currentFontSize = Math.max(1, Math.min(20, currentFontSize));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
    }
}, {passive: false});

document.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialFontSize = currentFontSize;
        e.preventDefault();
    }
}, {passive: false});

document.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        let scale = currentDist / initialDist;
        currentFontSize = Math.max(1, Math.min(20, initialFontSize * scale));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
        e.preventDefault();
    }
}, {passive: false});
