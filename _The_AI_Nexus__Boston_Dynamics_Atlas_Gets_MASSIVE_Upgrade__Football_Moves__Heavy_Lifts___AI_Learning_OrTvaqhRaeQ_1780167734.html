<script>
const videoId="OrTvaqhRaeQ";
const subs=[{"start": 4.12, "end": 6.57, "text": "아틀라스 로봇이 대대적인 업그레이드를 마쳤습니다."}, {"start": 6.62, "end": 9.971, "text": "이제 단순히 로봇처럼 움직이는 게 아니라 운동선수처럼 움직이죠."}, {"start": 10.021, "end": 13.269, "text": "보스턴 다이내믹스는 아틀라스가 축구 풋워크를 배우는 모습을 공개했습니다."}, {"start": 13.32, "end": 17.87, "text": "고난도 킥을 선보이고, 비현실적으로 느껴질 만큼 완벽한 균형 감각을 보여줍니다."}, {"start": 17.92, "end": 21.368, "text": "아틀라스는 100파운드가 넘는 미니 냉장고를 번쩍 들어 올리기도 했습니다."}, {"start": 21.419, "end": 24.268, "text": "냉장고를 든 채 몸을 돌려 흐트러짐 없이 바닥에 내려놓았죠."}, {"start": 24.318, "end": 29.067, "text": "보스턴 다이내믹스는 아틀라스의 양산 계획도 함께 발표했습니다."}, {"start": 29.117, "end": 32.068, "text": "안녕하세요, 여러분. 알피입니다. \\'AI 넥서스\\'에 오신 걸 환영합니다."}, {"start": 32.118, "end": 35.669, "text": "오늘은 아틀라스가 어떻게 더 빠르고 강력해졌는지 분석해 보겠습니다."}, {"start": 35.719, "end": 38.569, "text": "이번 주 인터넷을 뜨겁게 달군 소식부터 시작하죠."}, {"start": 38.618, "end": 42.77, "text": "현대자동차와 보스턴 다이내믹스가 \\'스쿨 오브 풋볼\\'이라는 새 시리즈를 론칭했습니다."}, {"start": 42.82, "end": 45.17, "text": "전체 제목은 한 가지 간단한 질문을 던집니다."}, {"start": 45.219, "end": 47.87, "text": "\\\"축구가 로봇에게 움직이는 법을 실제로 가르쳐 줄 수 있을까?\\\""}, {"start": 47.92, "end": 52.169, "text": "현대자동차의 2026 FIFA 월드컵 공식 캠페인의 일환인데요."}, {"start": 52.219, "end": 54.169, "text": "이미 네 개의 에피소드가 공개되었습니다."}, {"start": 54.219, "end": 56.669, "text": "에피소드 1에서 아틀라스는 기본기를 배웁니다."}, {"start": 56.719, "end": 60.37, "text": "과거 월드컵 영상을 분석하며 경기장에서 풋워크를 그대로 따라 하죠."}, {"start": 60.42, "end": 64.07, "text": "드리블, 페인트 동작, 훈련은 물론 깨알 같은 세리머니까지 보여줍니다."}, {"start": 64.12, "end": 67.07, "text": "실제 선수처럼 양팔을 들고 한쪽 무릎을 꿇기도 합니다."}, {"start": 67.12, "end": 69.269, "text": "에피소드 2는 킥에 대한 모든 것을 다룹니다."}, {"start": 69.319, "end": 73.269, "text": "여기서 아틀라스는 협응력, 균형, 정밀도, 그리고 강력한 힘을 보여줍니다."}, {"start": 73.319, "end": 77.368, "text": "그리고 에피소드 3에서는 \\'라보나\\'를 선보이는데, 축구를 잘 모르시는 분들을 위해 설명하자면,"}, {"start": 77.418, "end": 81.469, "text": "축구 경기에서 기술적으로 가장 화려하면서도 신체 능력을 많이 요구하는 동작 중 하나입니다."}, {"start": 81.519, "end": 84.769, "text": "공을 차기 위해 한쪽 다리를 다른 쪽 다리 뒤로 감아 돌리는 동작이죠."}, {"start": 84.819, "end": 88.668, "text": "이걸 깔끔하게 해내는 데 필요한 제어력은 정말이지 독보적인 수준입니다."}, {"start": 88.718, "end": 93.971, "text": "아틀라스가 그걸 해내고 있네요. 방금 보신 모든 동작은 기업용 버전인 \\'엔터프라이즈 아틀라스\\'가 구현한 겁니다."}, {"start": 94.021, "end": 98.67099999999999, "text": "이미 유압식 아틀라스를 봤고, 최초의 전기식 모델도 살펴봤었죠. 둘 다..."}, {"start": 98.721, "end": 103.668, "text": "강력한 성능으로 고난도 묘기를 보여줬지만, 이 엔터프라이즈 버전은 차원이 완전히 다릅니다."}, {"start": 103.718, "end": 109.37, "text": "처음 출시됐을 때만 해도 정말 이 정도일 줄은 몰랐어요. 아틀라스가 빠르다는 건 알고 있었지만요."}, {"start": 109.42, "end": 114.87, "text": "훌륭한 플랫폼이라는 건 알았지만, 이 정도의 민첩성과 제어력은 우리 모두의 예상을..."}, {"start": 114.92, "end": 116.56700000000001, "text": "훨씬 뛰어넘는 수준입니다."}, {"start": 116.61699999999999, "end": 119.67099999999999, "text": "기억하세요, 엔터프라이즈 아틀라스가 꼭 축구를 할 필요는 없습니다."}, {"start": 119.721, "end": 121.868, "text": "원래 중공업 작업을 위해 제작된 로봇이니까요."}, {"start": 121.918, "end": 124.868, "text": "그래서 이렇게 우아하게 움직이는 모습을 보는 것 자체가 경이롭습니다."}, {"start": 124.918, "end": 128.069, "text": "정말 인상적이고, 보고 있어도 믿기지 않을 정도네요."}, {"start": 128.12, "end": 130.668, "text": "하지만 이번 주 소식에서 축구는 시작에 불과합니다."}, {"start": 130.718, "end": 134.67, "text": "보스턴 다이내믹스는 훨씬 더 무거운 물체를 다루는 비하인드 영상도 공개했거든요."}, {"start": 134.721, "end": 138.668, "text": "영상 속 아틀라스는 100파운드가 넘는 미니 냉장고를 가볍게 들어 올립니다."}, {"start": 138.718, "end": 143.368, "text": "몸을 굽혀 냉장고를 잡고, 그대로 180도 회전까지 하죠."}, {"start": 143.419, "end": 146.709, "text": "그러고는 단 한 번의 흔들림도 없이 안정적으로 물건을 내려놓습니다."}, {"start": 146.75900000000001, "end": 150.108, "text": "[음악] 보통은 두 명이서 해야 하는 일이지만, 아틀라스는 혼자서 해냅니다."}, {"start": 150.15800000000002, "end": 151.808, "text": "그리고 여기 정말 놀라운 사실이 있습니다."}, {"start": 151.859, "end": 157.31, "text": "아틀라스는 주로 50~70파운드 하중을 다루도록 훈련받았지만, 테스트 중에는 그보다 훨씬 무거운"}, {"start": 157.36, "end": 158.909, "text": "냉장고를 거뜬히 다뤘습니다."}, {"start": 158.96, "end": 161.709, "text": "이는 단순히 외운 동작을 반복하는 게 아니라는 증거죠."}, {"start": 161.75900000000001, "end": 164.81, "text": "새로운 난관에 실시간으로 적응하고 있었던 겁니다."}, {"start": 164.86, "end": 168.209, "text": "가장 놀라운 건 아틀라스가 여기서 카메라를 거의 쓰지 않는다는 점이에요."}, {"start": 168.25900000000001, "end": 172.11, "text": "대신 자신의 몸을 통해 무게와 압력, 그리고 균형을 직접 느낍니다."}, {"start": 172.161, "end": 175.608, "text": "이 감각은 이름도 따로 있는데, 엔지니어들은 이를 \\'고유 수용 감각\\'이라 부릅니다."}, {"start": 175.65800000000002, "end": 178.007, "text": "쉽게 말해 아틀라스가 자신의 관절 상태를 읽고"}, {"start": 178.05700000000002, "end": 180.509, "text": "내부에서 전해지는 힘을 파악한다는 뜻이죠. 그리고 이것 좀 보세요."}, {"start": 180.56, "end": 182.509, "text": "제작팀은 이 모든 목표를 달성하는 데"}, {"start": 182.56, "end": 183.81, "text": "올해 말까지 걸릴 것으로 예상했습니다."}, {"start": 183.86, "end": 186.31, "text": "하지만 아틀라스는 단 2주 만에 과제를 끝내버렸죠."}, {"start": 186.36, "end": 188.607, "text": "그런데 장기적인 관점에서 보면"}, {"start": 188.657, "end": 190.00900000000001, "text": "이제부터가 진짜 흥미로운 부분입니다."}, {"start": 190.06, "end": 192.157, "text": "솔직히 이 이야기는"}, {"start": 192.161, "end": 193.909, "text": "아직 충분히 주목받지 못하고 있는 것 같아요."}, {"start": 193.96, "end": 197.007, "text": "보스턴 다이내믹스는 단순히 인상적인 로봇을 만드는 데 그치지 않습니다."}, {"start": 197.057, "end": 200.469, "text": "실제로 대량 생산이 가능한 로봇을 만들고 있는 거죠."}, {"start": 200.52, "end": 204.668, "text": "그리고 이를 실현하기 위해 매우 의도적인 공학적 선택들을 내렸습니다."}, {"start": 204.718, "end": 205.868, "text": "우선 액추에이터부터 보시죠."}, {"start": 205.919, "end": 208.87, "text": "아틀라스의 몸 전체는 단 두 종류의 액추에이터로 구동됩니다."}, {"start": 208.92000000000002, "end": 212.57, "text": "사소한 부분 같지만, 제조 공정에선 판도를 바꾸는 일이죠."}, {"start": 212.621, "end": 216.469, "text": "플랫폼 전체의 액추에이터를 두 종류로 표준화하면"}, {"start": 216.52, "end": 221.267, "text": "제작 효율과 개선 속도가 올라가고, 대량 생산 시 비용도 크게 절감할 수 있습니다."}, {"start": 221.317, "end": 225.769, "text": "모두 회전형 액추에이터라 시뮬레이션에서 더욱 정확하게"}, {"start": 225.81900000000002, "end": 226.769, "text": "모델링하기도 훨씬 쉽죠."}, {"start": 226.81900000000002, "end": 229.767, "text": "이는 보스턴 다이내믹스가 새로운 로봇 동작을"}, {"start": 229.817, "end": 232.46800000000002, "text": "얼마나 빨리 훈련하고 실전에 배치하느냐로 직결됩니다."}, {"start": 232.519, "end": 235.46800000000002, "text": "다음은 전신에 적용된 디자인의 대칭성입니다."}, {"start": 235.519, "end": 237.368, "text": "양쪽 다리는 서로 완전히 동일하며,"}, {"start": 237.418, "end": 238.769, "text": "양쪽 팔 또한 마찬가지입니다."}, {"start": 238.81900000000002, "end": 240.268, "text": "어깨와 어깨 사이의 구조나"}, {"start": 240.318, "end": 243.07, "text": "골반과 골반의 구조 역시 동일하죠."}, {"start": 243.121, "end": 246.067, "text": "부품 종류가 적다는 건 공급망이 단순해진다는 뜻입니다."}, {"start": 246.117, "end": 247.567, "text": "유지 보수도 훨씬 수월해지고요."}, {"start": 247.617, "end": 249.67, "text": "결과적으로 제조부터 현장 수리에 이르기까지"}, {"start": 249.721, "end": 251.768, "text": "모든 단계에서 비용을 낮출 수 있습니다."}, {"start": 251.818, "end": 254.069, "text": "가장 앞서나가는 설계 결정 중 하나는..."}, {"start": 254.12, "end": 257.069, "text": "아틀라스의 액추에이터는 무한 회전이 가능합니다."}, {"start": 257.12, "end": 260.468, "text": "관절 사이의 케이블을 전부 없애서 구현했죠."}, {"start": 260.519, "end": 262.87, "text": "케이블은 역사적으로 로봇 하드웨어 고장의"}, {"start": 262.92, "end": 265.12, "text": "주요 원인이었습니다."}, {"start": 265.218, "end": 267.968, "text": "닳고, 끼이고, 끊어지기 마련이죠. 케이블을 없애면"}, {"start": 268.019, "end": 269.269, "text": "고장 원인 자체가 사라집니다."}, {"start": 269.319, "end": 271.367, "text": "그 결과, 대부분의 휴머노이드가 할 수 없는"}, {"start": 271.418, "end": 274.069, "text": "방식으로 움직이고, 고객의 유지 관리 비용도"}, {"start": 274.119, "end": 276.367, "text": "제품 수명 내내 훨씬 적게 듭니다."}, {"start": 276.418, "end": 278.968, "text": "발 모양에도 작지만 의미심장한 디테일이 있죠."}, {"start": 279.019, "end": 281.471, "text": "앞뒤가 대칭이라 아틀라스는"}, {"start": 281.521, "end": 284.271, "text": "전진과 후진을 똑같이 자유자재로 할 수 있습니다."}, {"start": 284.321, "end": 285.87, "text": "이런 디자인 철학은"}, {"start": 285.92, "end": 287.468, "text": "단순히 시연용이 아니라"}, {"start": 287.519, "end": 290.468, "text": "실제 산업 현장을 목표로 할 때나 중요한 법입니다."}, {"start": 290.519, "end": 293.367, "text": "마지막으로 팔, 다리, 손, 그리고 머리까지"}, {"start": 293.418, "end": 296.769, "text": "전부 현장에서 단 몇 분 만에 교체할 수 있는 구조입니다."}, {"start": 296.819, "end": 298.471, "text": "가동 중단이 곧 비용인 대규모 환경에서"}, {"start": 298.521, "end": 301.12, "text": "로봇을 운용할 때"}, {"start": 301.12, "end": 302.788, "text": "이건 선택이 아니라 필수입니다."}, {"start": 302.838, "end": 303.889, "text": "그 점이 아주 중요합니다."}, {"start": 303.939, "end": 306.389, "text": "이 모든 것의 마지막 퍼즐이자, 기술적으로 아마 가장"}, {"start": 306.439, "end": 308.79, "text": "중요한 부분은 보스턴 다이내믹스가 해낸 일입니다."}, {"start": 308.841, "end": 310.79, "text": "가상과 현실의 간극을 좁히기 위해서 말이죠."}, {"start": 310.841, "end": 313.088, "text": "이건 로봇 공학계의 아주 오래된 난제였습니다."}, {"start": 313.139, "end": 314.987, "text": "시뮬레이션에서 동작을 훈련시키더라도"}, {"start": 315.038, "end": 316.99, "text": "막상 실제 하드웨어에 적용하면 실패하곤 하죠."}, {"start": 317.04, "end": 320.091, "text": "현실 세계에는 마찰, 지연 시간, 센서 노이즈 등"}, {"start": 320.141, "end": 322.189, "text": "시뮬레이션이 완벽하게 담아내지 못하는"}, {"start": 322.24, "end": 324.487, "text": "수백 가지의 변수가 존재하기 때문입니다."}, {"start": 324.538, "end": 327.187, "text": "작은 차이들이 쌓여 결국 커다란 실패로 이어지는 법이죠."}, {"start": 327.237, "end": 328.788, "text": "하지만 이번 세대 아틀라스를 통해"}, {"start": 328.838, "end": 331.687, "text": "보스턴 다이내믹스는 그 간극을 좁히는 데 성공했습니다."}, {"start": 331.737, "end": 333.889, "text": "업계의 그 누구보다도 독보적인 수준으로 말이죠."}, {"start": 333.939, "end": 336.79, "text": "그 비결은 하드웨어 설계와 직결되어 있습니다."}, {"start": 336.841, "end": 339.187, "text": "아틀라스는 대칭 구조의 예측 가능한"}, {"start": 339.237, "end": 343.99, "text": "두 가지 액추에이터만 사용하기에, 엔지니어들이 매우 정밀하게 모델링할 수 있습니다."}, {"start": 344.04, "end": 345.088, "text": "시뮬레이션 상에서도요."}, {"start": 345.139, "end": 347.288, "text": "가상에서 통하면 실제 로봇에서도 통하는 겁니다."}, {"start": 347.338, "end": 351.829, "text": "오늘 훈련해 내일 배포하고, 데이터를 수집해 개선을 반복하는 시스템이죠."}, {"start": 351.879, "end": 352.829, "text": "단 몇 시간 만에 말이죠."}, {"start": 352.879, "end": 357.329, "text": "또한 훈련 중에 \\'도메인 랜덤화\\' 기술을 사용하는데, 덕분에 아틀라스는 결코"}, {"start": 357.379, "end": 358.629, "text": "완벽한 환경에서만 연습하지 않습니다."}, {"start": 358.68, "end": 363.228, "text": "실행할 때마다 냉장고 무게가 달라지고 바닥 마찰력이 변하며, 내부의 짐이 쏠리기도 하죠."}, {"start": 363.278, "end": 366.829, "text": "로봇은 매 순간 적응해야 하고, 이런 과정이 강인함을 키워줍니다."}, {"start": 366.879, "end": 370.43, "text": "현실 세계에서 무언가 어긋나더라도, 이미 시뮬레이션 속에서"}, {"start": 370.48, "end": 373.129, "text": "수천 가지의 변수를 경험해 본 상태니까요."}, {"start": 373.18, "end": 377.031, "text": "덕분에 아틀라스는 주로 훈련했던 것보다 30~50파운드나 더 무거운"}, {"start": 377.081, "end": 379.129, "text": "냉장고를 들고도 완벽하게 성공해 냈습니다."}, {"start": 379.18, "end": 381.228, "text": "그 결과, 정말 놀라운 시스템이 구축되었습니다."}, {"start": 381.278, "end": 385.031, "text": "제작진은 오늘 새로운 기술을 훈련시키고 내일 바로 로봇에 테스트할 수 있죠."}, {"start": 385.081, "end": 389.028, "text": "그러고 나서 신선한 데이터를 수집해 바로 다음 단계에서 기술을 더 정교하게 다듬습니다."}, {"start": 389.079, "end": 391.031, "text": "이 속도가 바로 이곳의 진짜 비밀 병기입니다."}, {"start": 391.081, "end": 395.329, "text": "시장의 어떤 경쟁자보다 아틀라스가 새로운 작업을 더 빠르게 배울 수 있다는 뜻이니까요."}, {"start": 395.379, "end": 398.329, "text": "자, 이제 잠시 거리를 두고 전체적인 그림을 한번 볼까요?"}, {"start": 398.379, "end": 402.73, "text": "아틀라스는 단 하루 만에 축구를 하고, 엄청난 하중을 견디며 새로운 기술을 배울 수 있습니다."}, {"start": 402.781, "end": 406.028, "text": "그리고 이제는 양산과 판매가 가능하도록 설계되고 있죠."}, {"start": 406.079, "end": 409.329, "text": "연구용 장난감이 진짜 일꾼으로 거듭나는 과정입니다."}, {"start": 409.379, "end": 413.927, "text": "댓글로 여러분의 의견을 남겨주세요. 아틀라스가 드디어 구직 시장에 나올 준비가 됐다고 보시나요?"}, {"start": 413.978, "end": 416.769, "text": "이게 말도 안 된다고 생각하신다면, 다음 소식에 주목해 보세요."}, {"start": 416.819, "end": 421.069, "text": "테슬라와 옵티머스는 이제 로봇 자체만이 주인공인 단계를"}, {"start": 421.12, "end": 422.069, "text": "넘어섰습니다."}, {"start": 422.12, "end": 426.069, "text": "3세대 모델도 중요하지만, 진짜 핵심은 테슬라가 그 주변에 무엇을 구축하고 있느냐입니다."}, {"start": 426.12, "end": 430.668, "text": "새로운 AI 5 칩을 준비하고 훈련 인프라를 확장하는 한편,"}, {"start": 430.718, "end": 435.471, "text": "로봇 지능층에 \\'그록\\'을 도입하고 기존 차량에 적용된"}, {"start": 435.521, "end": 437.269, "text": "완전자율주행 철학을 그대로 녹여내고 있죠."}, {"start": 437.319, "end": 441.67, "text": "또한 프리몬트 공장 일부를 생산 라인으로 전환하고,"}, {"start": 441.72, "end": 446.668, "text": "기가 텍사스에 대규모 로봇 공장을 계획하며 실생활 업무 수행을 위해"}, {"start": 446.718, "end": 447.668, "text": "로봇의 손을 재설계하고 있습니다."}, {"start": 447.718, "end": 451.569, "text": "3세대 공개가 지연됐을 순 있어도, 그 지연이 주는 메시지는 강렬합니다."}, {"start": 451.62, "end": 454.668, "text": "테슬라는 이제 옵티머스를 단순한 시제품으로 보지 않습니다."}, {"start": 454.718, "end": 458.471, "text": "회사의 미래를 바꿀 수 있는 하나의 \\'제품\\'으로 대하고 있죠."}, {"start": 458.521, "end": 462.87, "text": "그런데 이 거대한 도박의 첫 번째 단서는 무대 위를 걷는 옵티머스가 아니라,"}, {"start": 462.92, "end": 464.069, "text": "바로 칩이었습니다."}, {"start": 464.12, "end": 470.569, "text": "2026년 4월 말, 일론 머스크는 X에 새로운 AI 5 칩 사진을 올리며"}, {"start": 470.619, "end": 471.569, "text": "설계 완료를 알렸습니다."}, {"start": 471.619, "end": 475.968, "text": "설계가 최종 확정되어 제조 단계로 넘어갈 준비가 끝났다는 뜻이죠."}, {"start": 476.019, "end": 480.569, "text": "이건 AI 5가 단순한 차량용 칩 그 이상임을 시사합니다."}, {"start": 480.62, "end": 484.769, "text": "테슬라의 자율주행과 로보틱스 계획, 그 다음 단계를 위해 탄생했으니까요."}, {"start": 484.819, "end": 490.449, "text": "머스크는 AI 5 칩 하나가 기존 AI 4 칩 두 개보다 약 5배 높은 성능을 낸다고 말합니다."}, {"start": 490.5, "end": 494.949, "text": "칩 하나로 호퍼급 성능을 구현하고 듀얼 칩 구성으로는 블랙웰급"}, {"start": 495.0, "end": 495.949, "text": "영역에 도달하죠."}, {"start": 496.0, "end": 501.05, "text": "간단히 말해 테슬라는 옵티머스가 스스로 보고, 반응하고, 말하고, 균형을 잡으며"}, {"start": 501.1, "end": 504.247, "text": "클라우드 서버 없이 즉각 의사 결정을 내리길 원합니다."}, {"start": 504.298, "end": 509.449, "text": "이 칩은 TSMC 애리조나와 삼성 텍사스에서 공급받을 예정이며,"}, {"start": 509.499, "end": 515.249, "text": "2027년 중반 대량 생산을 계획 중이죠. 그럼 질문은 간단합니다. 왜 옵티머스에게 이런 강력한 성능이 필요할까요?"}, {"start": 515.298, "end": 519.849, "text": "휴머노이드 로봇의 세계는 자동차의 세계보다 훨씬 더 예측 불가능하기 때문입니다."}, {"start": 519.899, "end": 524.849, "text": "자동차의 임무도 어렵지만 주로 도로, 차선, 신호등, 차량,"}, {"start": 524.899, "end": 530.15, "text": "보행자 같은 명확한 이동 패턴을 다룹니다. 하지만 옵티머스는 우리가 매일 마주하는"}, {"start": 530.2, "end": 535.55, "text": "복잡한 물리적 세상을 상대해야 하죠. 주방 조리대에서 유리잔을 집는 상황을 상상해 보세요. 잔의 형태를 파악하고,"}, {"start": 535.6, "end": 539.65, "text": "얼마나 깨지기 쉬운지, 손가락으로 어느 정도 힘을 줘야 하는지, 그리고 누군가"}, {"start": 539.7, "end": 544.549, "text": "갑자기 근처에서 움직이면 어떻게 할지 이해해야 합니다. 공장에서 상자를 운반할 때는 무게 중심을 잡고,"}, {"start": 544.599, "end": 549.05, "text": "쥐는 힘을 조절하며 사람을 피하고, 모퉁이를 돌며 물건을 떨어뜨리지 않고 계속 걸어야 하죠."}, {"start": 549.1, "end": 553.748, "text": "차 창문으로 음식을 건네는 간단한 일조차 사람이 움직이거나"}, {"start": 553.798, "end": 559.55, "text": "물체가 이동하면 복잡해지는데, 로봇은 이에 즉각 반응해야 합니다. 그래서 AI5가 중요한 거죠. 옵티머스는"}, {"start": 559.6, "end": 564.45, "text": "무언가 생각할 때마다 클라우드 서버를 기다릴 수 없습니다. 지능이 로봇"}, {"start": 564.5, "end": 568.45, "text": "본체에 내장되어 실시간으로 물리적 결정을 내릴 만큼 빨라야 하죠."}, {"start": 568.5, "end": 571.55, "text": "테슬라가 이를 깨달은 순간, 다음 단계는 명확해졌습니다."}, {"start": 571.6, "end": 573.65, "text": "단순히 칩을 설계하는 데 그치지 않고,"}, {"start": 573.7, "end": 576.29, "text": "그 칩이 어떻게 제조되는지까지 직접 통제하고 싶어 한 겁니다."}, {"start": 576.34, "end": 580.0889999999999, "text": "휴머노이드 로봇에게 음성 명령을 내리고 로봇이 즉각 행동하게 하는 것에"}, {"start": 580.139, "end": 582.2909999999999, "text": "클라우드 응답을 기다릴 필요 없이 거부감이 없으신가요?"}, {"start": 582.341, "end": 583.2909999999999, "text": "아래 댓글로 알려주세요."}, {"start": 583.341, "end": 587.89, "text": "바로 그 지점에서 \\'테라팹\\'이 등장합니다. 이 계획의 규모는 믿기 힘들 정도죠."}, {"start": 587.94, "end": 593.99, "text": "스페이스X는 \\'테라팹\\'이라 불리는 텍사스 칩 단지에 초기 550억 달러 규모의 투자를 신청했습니다."}, {"start": 594.04, "end": 600.291, "text": "총 투자액은 1,190억 달러까지 늘어날 수 있습니다. 이건 단순한 스페이스X만의 프로젝트가 아닙니다."}, {"start": 600.341, "end": 606.089, "text": "테슬라, 스페이스X, xAI와도 직접 연결되는데, 이 세 회사 모두 방대한 양의..."}, {"start": 606.139, "end": 611.089, "text": "연산 능력이 필요하기 때문입니다. 이 계획에는 두 개의 주요 시설이 포함되며, 하나는 테슬라 자동차와..."}, {"start": 611.139, "end": 616.489, "text": "옵티머스용 칩에, 다른 하나는 AI 데이터 센터용 실리콘에 집중합니다. 장기 목표는 연간 약..."}, {"start": 616.538, "end": 621.79, "text": "1테라와트의 연산 능력을 확보하는 것인데, 이는 칩 생산 능력의 엄청난 도약이 될 것입니다. 머스크는..."}, {"start": 621.84, "end": 626.0889999999999, "text": "기존 공급업체들이 자기 회사들의 미래 수요를 대규모로 감당할 수 없다고 주장해 왔습니다."}, {"start": 626.139, "end": 628.189, "text": "인텔과의 거래가 중요한 이유가 바로 이것입니다."}, {"start": 628.239, "end": 633.788, "text": "2026년 4월, 인텔은 차세대 14A 공정을 사용하는..."}, {"start": 633.838, "end": 639.388, "text": "파운드리 파트너로 테라팹에 합류하며 테슬라를 인텔의 첫 주요 외부 14A 고객사 중 하나로 만들었습니다."}, {"start": 639.437, "end": 642.489, "text": "테슬라에게 이번 협력은 로봇의 미래를 확보하는 일입니다."}, {"start": 642.538, "end": 646.69, "text": "인텔에게는 파운드리 사업의 경쟁력을 다시 한번 입증할 중대한 기회죠."}, {"start": 646.74, "end": 652.29, "text": "테슬라의 2026년 자본 지출은 이미 200억 달러를 넘어섰는데, 그 주된 이유는..."}, {"start": 652.34, "end": 656.69, "text": "옵티머스와 칩 인프라가 하나의 거대한 투자가 되었기 때문입니다. 하지만 칩을 소유하는 것만으로는..."}, {"start": 656.74, "end": 661.69, "text": "문제의 일부만 해결될 뿐입니다. 테슬라는 그 위에서 실제로 구동될 지능도 필요하죠."}, {"start": 661.74, "end": 666.489, "text": "바로 여기서 옵티머스의 뇌가 흥미로워지기 시작합니다. 그 첫 번째 단계는 완전 자율 주행입니다."}, {"start": 666.538, "end": 671.489, "text": "이는 로봇에게 시각적 토대와 이동 본능을 부여하죠. 테슬라는 동일한 카메라"}, {"start": 671.538, "end": 675.19, "text": "우선 원칙을 자동차에 이어 로봇에도 적용하며 라이다에 의존하지 않습니다."}, {"start": 675.24, "end": 679.89, "text": "두 번째 계층은 XAI의 그록(Grok)으로, 언어와 추론, 음성"}, {"start": 679.94, "end": 681.988, "text": "명령 및 실제 대화를 처리하는 역할을 합니다."}, {"start": 682.038, "end": 685.89, "text": "그다음은 더 큰 로봇 공학 계층인 시각-언어-행동 모델인데, 이는 로봇이"}, {"start": 685.94, "end": 690.288, "text": "보는 것과 사람의 요청, 그리고 로봇의 물리적 행동을 하나로 연결합니다."}, {"start": 690.338, "end": 692.888, "text": "이것이 리더십의 변화가 중요한 이유입니다."}, {"start": 692.937, "end": 698.788, "text": "2025년 6월, 테슬라 FSD 시스템의 핵심 설계자인 아쇼크 엘루스와미가"}, {"start": 698.838, "end": 699.788, "text": "옵티머스 팀을 맡게 되었습니다."}, {"start": 699.838, "end": 704.69, "text": "이는 테슬라가 자동차와 로봇을 더 이상 별개의 AI 프로젝트로 보지 않는다는 뜻입니다."}, {"start": 704.74, "end": 708.49, "text": "도로에서 시작된 지능을 물리적인 현실 세계로 옮겨와"}, {"start": 708.54, "end": 709.69, "text": "하나의 통합 지능 시스템을 구축하려는 것이죠."}, {"start": 709.74, "end": 713.39, "text": "목표는 옵티머스에게 모든 동작을 일일이 프로그래밍하는 게 아닙니다."}, {"start": 713.44, "end": 717.788, "text": "\\\"셔츠를 접어줘\\\"나 \\\"부품을 크기별로 분류해\\\"라고 말만 하면"}, {"start": 717.838, "end": 721.789, "text": "로봇이 명령을 이해하고 환경을 읽어 스스로 행동하도록 만드는 것입니다."}, {"start": 721.839, "end": 723.489, "text": "매번 별도의 스크립트를 짤 필요 없이 말이죠."}, {"start": 723.538, "end": 727.69, "text": "하지만 그런 두뇌는 소프트웨어가 있다고 해서 바로 유용해지는 게 아닙니다."}, {"start": 727.74, "end": 731.289, "text": "수많은 훈련과 데이터, 그리고 막대한 컴퓨팅 자원이 뒷받침되어야 하죠."}, {"start": 731.339, "end": 735.29, "text": "옵티머스 내부에서 모델을 구동하는 것도 과제지만, 그 모델이 현실 세계에서"}, {"start": 735.34, "end": 737.969, "text": "어떻게 행동해야 할지 가르치는 것은 차원이 다른 문제입니다."}, {"start": 738.019, "end": 744.17, "text": "테슬라의 해답은 코텍스 2.0이며, 보고에 따르면 1단계는 2026년 4월에 약"}, {"start": 744.22, "end": 745.97, "text": "250메가와트 규모로 가동을 시작했습니다."}, {"start": 746.019, "end": 750.169, "text": "이로써 구글, 마이크로소프트, 메타 같은 기업들이 구축 중인"}, {"start": 750.219, "end": 753.07, "text": "세계 최대 규모의 AI 훈련 시스템들과 어깨를 나란히 하게 되었죠."}, {"start": 753.12, "end": 758.969, "text": "테슬라는 AI5와 함께 도조 3도 개발 중인데, 이는 칩 로드맵과"}, {"start": 759.019, "end": 761.368, "text": "로봇 공학 로드맵이 현재 얼마나 밀접하게 연결되어 있는지 보여줍니다."}, {"start": 761.418, "end": 763.371, "text": "중요한 핵심은 바로 피드백 루프입니다."}, {"start": 763.421, "end": 768.371, "text": "약 300대의 옵티머스 유닛이 이미 프리몬트나 기가 텍사스 같은 곳에서"}, {"start": 768.421, "end": 769.371, "text": "데이터를 수집하고 있습니다."}, {"start": 769.421, "end": 774.57, "text": "실패한 모든 잡기, 어색한 발걸음, 잘못된 움직임, 그리고 모든 성공적인 작업 하나하나가"}, {"start": 774.62, "end": 775.77, "text": "훈련 자료가 됩니다."}, {"start": 775.82, "end": 779.768, "text": "로봇 한 대가 자신의 실수로부터 배우면, 시간이 흐르면서 군단 전체가"}, {"start": 779.817, "end": 780.869, "text": "그 교훈을 통해 발전할 수 있습니다."}, {"start": 780.918, "end": 785.469, "text": "이는 실제 주행 데이터를 통해 테슬라의 자율 주행 시스템을 개선했던 것과"}, {"start": 785.519, "end": 786.469, "text": "같은 기본 원리입니다."}, {"start": 786.519, "end": 789.669, "text": "이제 테슬라는 그 아이디어를 로봇에도 적용하려 합니다."}, {"start": 789.719, "end": 793.869, "text": "이 모든 훈련과 연산, 그리고 칩 개발 과정은 결국 하나의 제품인"}, {"start": 793.918, "end": 795.768, "text": "옵티머스 3세대로 이어지고 있습니다."}, {"start": 795.817, "end": 799.369, "text": "지난 3월, 테슬라는 이를 세상에 공개하려 했으나 막판에 철회했습니다."}, {"start": 799.418, "end": 804.95, "text": "1분기 마지막 날인 3월 31일, 일론 머스크는 X를 통해 옵티머스 3가 이미..."}, {"start": 805.0, "end": 808.45, "text": "이동하며 걷는 수준에 도달했지만, 아직 마무리 작업이 더 필요했습니다."}, {"start": 808.5, "end": 813.549, "text": "그 시점이 중요했던 건 테슬라가 이번 분기에 3세대 공개를 예고했기 때문이죠."}, {"start": 813.599, "end": 817.849, "text": "하지만 3세대 본체는 아직 대중에게 공개되지 않았고, 그 점이 바로"}, {"start": 817.899, "end": 818.849, "text": "핵심 디테일입니다."}, {"start": 818.899, "end": 823.251, "text": "테슬라가 로봇을 숨기는 이유는 이번 버전이 단순 시연용 모델이 아니기 때문입니다."}, {"start": 823.301, "end": 827.05, "text": "1분기 실적 발표에서 머스크는 신중할 수밖에 없는 명확한 이유를 밝혔죠."}, {"start": 827.1, "end": 831.651, "text": "중국 같은 나라에서 테슬라의 영상을 프레임 단위로 분석하며 무엇이든"}, {"start": 831.701, "end": 836.45, "text": "그대로 베끼기 때문입니다. 그래서 이번엔 3세대를 일반적인 무대 공개로 다루지 않죠."}, {"start": 836.5, "end": 840.55, "text": "모든 디테일이 중요한 본격적인 제품 출시 과정처럼"}, {"start": 840.6, "end": 842.95, "text": "로봇의 공식 공개 전까지 신중하게 다뤄지고 있습니다."}, {"start": 843.0, "end": 847.65, "text": "그래서 3세대는 시연용 로봇이라기보다 양산형"}, {"start": 847.7, "end": 848.65, "text": "기계로 평가받아야 합니다."}, {"start": 848.7, "end": 852.449, "text": "핵심은 무대에서 걷는 게 아니라, 장시간 실무를 수행하는 동안"}, {"start": 852.499, "end": 855.751, "text": "전신이 완벽하게 제어되느냐 하는 점입니다."}, {"start": 855.801, "end": 858.849, "text": "약 50개의 액추에이터 역시 그 정밀한 제어를 위한 것입니다."}, {"start": 858.899, "end": 863.651, "text": "어깨, 팔꿈치, 손목, 골반, 무릎, 손까지 모든 부위가 매끄럽게 움직여야 하고"}, {"start": 863.701, "end": 866.65, "text": "로봇이 뻣뻣하거나 약해 보여서도, 혹은 위험해 보여서도 안 되죠."}, {"start": 866.7, "end": 868.549, "text": "8개의 오토파일럿 스타일 카메라는"}, {"start": 868.599, "end": 871.35, "text": "옵티머스가 주변의 사람과 장비,"}, {"start": 871.399, "end": 873.69, "text": "움직이는 카트와 좁은 공간을 인식하게 해줍니다."}, {"start": 873.74, "end": 877.19, "text": "2.3kWh 용량의 배터리와 6~8시간의 작동 시간은"}, {"start": 877.24, "end": 880.0889999999999, "text": "짧은 시연을 넘어 실질적인 작업 현장에서"}, {"start": 880.139, "end": 882.0889999999999, "text": "로봇이 버틸 수 있는지를 결정하는 핵심 요소입니다."}, {"start": 882.139, "end": 886.2909999999999, "text": "20kg(44파운드)의 가용 하중과 시속 6~7마일,"}, {"start": 886.341, "end": 889.388, "text": "즉 시속 9.7~11.3km에 달하는 속도는"}, {"start": 889.437, "end": 891.79, "text": "테슬라가 이 로봇을 실무 환경에서"}, {"start": 891.84, "end": 893.5889999999999, "text": "인간의 작업 속도에 맞춰 움직이게 하려 함을 시사하죠."}, {"start": 893.639, "end": 896.189, "text": "여기에 \\'그록(Grok)\\' 음성 지원이 명령 체계로 도입되어"}, {"start": 896.239, "end": 898.89, "text": "작업자가 일일이 수동으로 프로그래밍하는 대신"}, {"start": 898.94, "end": 901.488, "text": "로봇에게 필요한 작업을 말로 지시할 수 있게 됐습니다."}, {"start": 901.538, "end": 903.589, "text": "종합하자면, 테슬라는 현재 옵티머스 3세대를"}, {"start": 903.639, "end": 906.391, "text": "양산 가능한 완성형 제품으로 변모시키려 하고 있습니다."}, {"start": 906.441, "end": 910.589, "text": "특히 대당 가격이 2만~3만 달러 선에서 확정된다면 그 파급력은 엄청나겠죠."}, {"start": 910.639, "end": 913.689, "text": "중국 같은 국가에 기술 노출을 꺼리는 테슬라의 전략이 현명한 걸까요?"}, {"start": 913.739, "end": 916.891, "text": "아니면 일론 머스크가 지금이라도 전부 공개해야 할까요?"}, {"start": 916.941, "end": 918.0889999999999, "text": "여러분의 생각을 댓글로 남겨주세요."}, {"start": 918.139, "end": 920.89, "text": "하지만 옵티머스가 무대를 벗어나 실생활에 쓰이려면"}, {"start": 920.94, "end": 923.09, "text": "다리나 보행 속도보다 훨씬 중요한 요소가 있습니다."}, {"start": 923.139, "end": 924.59, "text": "어쩌면 속도조차 핵심이 아닐지 모릅니다."}, {"start": 924.639, "end": 925.81, "text": "바로 \\'손\\'이죠."}, {"start": 925.86, "end": 929.81, "text": "머스크는 손을 만드는 게 전체 공학적 과제의 60%를 차지한다고 말했습니다."}, {"start": 929.86, "end": 932.309, "text": "휴머노이드 로봇이 진정한 가치를 지니려면"}, {"start": 932.359, "end": 934.508, "text": "주변 세상을 실제로 다룰 수 있어야 하기 때문이죠."}, {"start": 934.557, "end": 936.2090000000001, "text": "방 안을 가로질러 걷는 것도 대단하지만,"}, {"start": 936.259, "end": 938.011, "text": "진짜 작업이란 도구를 집어 들고"}, {"start": 938.061, "end": 940.2090000000001, "text": "작은 물체를 잡거나 문을 열고"}, {"start": 940.259, "end": 941.81, "text": "부품 분류나 음식 배달,"}, {"start": 941.86, "end": 944.2090000000001, "text": "그리고 깨지기 쉬운 물건을 부수지 않고 만지는 것입니다."}, {"start": 944.259, "end": 947.008, "text": "테슬라의 손 관련 특허가 그토록 중요한 이유가 바로 이것이죠."}, {"start": 947.057, "end": 949.81, "text": "2024년 10월 \\'위, 로봇(We, Robot)\\' 행사와 비슷한 시기에"}, {"start": 949.86, "end": 951.511, "text": "출원된 이 특허들은"}, {"start": 951.561, "end": 956.108, "text": "무거운 액추에이터를 팔뚝으로 옮긴 힘줄 구동 방식을 설명합니다."}, {"start": 956.158, "end": 958.509, "text": "덕분에 손은 더 가벼워졌고 인간의 손과 더 흡사해졌죠."}, {"start": 958.558, "end": 962.31, "text": "얇은 제어 케이블이 손목을 지나 손가락까지 이어지며, 특수 배선"}, {"start": 962.36, "end": 966.91, "text": "시스템은 마찰을 줄이고 케이블끼리 서로 방해하지 않도록 설계되었습니다."}, {"start": 966.96, "end": 971.709, "text": "각 손의 자유도는 22도로 예상되는데, 이는 약 27도인 인간의"}, {"start": 971.759, "end": 972.709, "text": "손과 비교됩니다."}, {"start": 972.759, "end": 976.609, "text": "테슬라 엔지니어들은 목표치를 인간의 형태에 가깝게 잡았는데,"}, {"start": 976.658, "end": 979.309, "text": "마치 슈퍼히어로 수트를 입은 인간과 흡사합니다."}, {"start": 979.359, "end": 983.69, "text": "골드만삭스 애널리스트 마크 델레이니 역시 3월 비공개 회의 이후..."}, {"start": 983.74, "end": 989.34, "text": "2026년, 테슬라는 지적 재산 보호를 위해"}, {"start": 983.74, "end": 989.34, "text": "자체 제작한 회전 및 선형 액추에이터를 도입합니다."}, {"start": 989.34, "end": 990.89, "text": "자사만의 기술력을 지키기 위한 조치죠."}, {"start": 990.94, "end": 992.99, "text": "훈련 방식 또한 매우 중요합니다."}, {"start": 993.04, "end": 996.89, "text": "사람이 모션 캡처로 시연하면 \\'옵티머스\\'가 동작을 학습하고,"}, {"start": 996.94, "end": 1001.0889999999999, "text": "강화 학습을 거쳐 기술이 안정될 때까지 정교하게 다듬어집니다."}, {"start": 1001.139, "end": 1005.2909999999999, "text": "특허와 시제품도 놀랍지만, 진짜 관건은 테슬라가 옵티머스를"}, {"start": 1005.341, "end": 1007.689, "text": "공장 규모로 대량 생산할 수 있느냐입니다."}, {"start": 1007.739, "end": 1010.489, "text": "프리몬트 공장 이전이 이토록 화제인 이유죠."}, {"start": 1010.538, "end": 1015.19, "text": "테슬라는 5월 초 모델 S와 X의 생산을 중단하며 공간을 확보하고 있습니다."}, {"start": 1015.24, "end": 1019.69, "text": "10년 넘게 61만 대 이상의 차량을 생산해 온 끝에 내린 결정입니다."}, {"start": 1019.74, "end": 1021.79, "text": "모델 S는 14년 동안 생산되었고,"}, {"start": 1021.84, "end": 1026.39, "text": "11년간 생산된 모델 X와 함께 테슬라 역사의 중요한 축이 되었습니다."}, {"start": 1026.44, "end": 1031.489, "text": "하지만 판매량이 연간 3만 대 수준으로 떨어지며, 10만 대 규모인"}, {"start": 1031.538, "end": 1032.489, "text": "생산 라인 가동률에 크게 못 미치게 되었습니다."}, {"start": 1032.538, "end": 1036.591, "text": "결국 기존 라인을 철거하고 그 자리에 옵티머스 생산 시설을 구축 중입니다."}, {"start": 1036.641, "end": 1041.189, "text": "기존 설비를 반출하고 최종 조립 라인을 구성한 뒤 로봇 툴링, 배선,"}, {"start": 1041.239, "end": 1042.788, "text": "그리고 테스트 시스템을 차례로 도입할 예정입니다."}, {"start": 1042.838, "end": 1043.239, "text": "옵티머스 1호기는 2026년 7월 말이나 8월쯤"}, {"start": 1042.838, "end": 1047.44, "text": "프리몬트 라인에서 출고될 전망이며,"}, {"start": 1047.441, "end": 1052.189, "text": "2026년 가동될 파일럿 라인은 연간 최대 100만 대 생산이 가능하도록 설계되었습니다."}, {"start": 1052.239, "end": 1056.729, "text": "하지만 머스크는 부품이 만 개가 넘는 만큼 생산량 확대 시점은 예측하기 어렵다고 인정했습니다."}, {"start": 1056.778, "end": 1059.93, "text": "부품들 중 가장 느린 부분이 전체 공정의 발목을 잡을 수 있습니다."}, {"start": 1059.98, "end": 1062.631, "text": "그래서 테슬라는 단순히 로봇을 위한 공간만 만드는 게 아닙니다."}, {"start": 1062.681, "end": 1067.629, "text": "테슬라의 한 시대를 다음 시대로 교체하고 있으며, 프리몬트는 시작일 뿐이죠."}, {"start": 1067.679, "end": 1071.63, "text": "더 큰 계획은 이미 기가 텍사스를 향하고 있으며, 그곳에선 부지 조성 작업이 진행 중입니다."}, {"start": 1071.68, "end": 1074.43, "text": "2세대 옵티머스 생산 라인을 위해서 말이죠."}, {"start": 1074.48, "end": 1078.629, "text": "해당 시설은 4세대 하드웨어를 지원할 것으로 예상되며, 생산은"}, {"start": 1078.679, "end": 1080.33, "text": "2027년 여름쯤 시작될 수 있습니다."}, {"start": 1080.38, "end": 1084.13, "text": "테슬라가 목표로 하는 장기적인 수치는 믿기 힘들 정도입니다."}, {"start": 1084.18, "end": 1085.728, "text": "연간 1,000만 대의 로봇이죠."}, {"start": 1085.778, "end": 1090.33, "text": "테슬라가 그 수준에 도달한다면, 옵티머스는 일반적인 제품 라인 그 이상이 될 것입니다."}, {"start": 1090.38, "end": 1093.83, "text": "완전히 새로운 산업 플랫폼에 더 가까워지겠죠."}, {"start": 1093.88, "end": 1098.327, "text": "그래서 머스크는 옵티머스를 테슬라 역사상 가장 큰 제품이 될 것이라고 계속해서 강조하는 겁니다."}, {"start": 1098.377, "end": 1099.629, "text": "프리몬트는 첫 번째 단계입니다."}, {"start": 1099.679, "end": 1102.728, "text": "기가 텍사스는 규모의 이야기가 본격적으로 시작되는 곳이죠."}, {"start": 1102.778, "end": 1106.631, "text": "하지만 테슬라의 옵티머스 이야기는 미국에서만 만들어지는 것이 아닙니다."}, {"start": 1106.681, "end": 1111.228, "text": "가장 흥미로운 신호 중 하나는 테슬라 AI의 공식 중국 웨이보 계정에서 나왔습니다."}, {"start": 1111.278, "end": 1116.93, "text": "2026년 3월, 옵티머스의 공개가 임박했음을 예고하며 로봇의 새로운 정교한 손에 집중한"}, {"start": 1116.98, "end": 1119.13, "text": "이미지들을 선보였을 때였죠."}, {"start": 1119.18, "end": 1123.528, "text": "이 예고는 중요합니다. 3세대가 완전히 공개되었다는 뜻은 아니지만,"}, {"start": 1123.578, "end": 1126.09, "text": "테슬라가 어디에 집중하고 있는지를 보여주기 때문입니다."}, {"start": 1126.14, "end": 1130.189, "text": "손은 이전 버전보다 훨씬 사람 같아 보입니다. 손가락 길이도 더 자연스럽고"}, {"start": 1130.239, "end": 1132.39, "text": "관절 위치와 전체적인 비율도 좋아졌죠."}, {"start": 1132.44, "end": 1136.99, "text": "휴머노이드 로봇에겐 이런 디테일이 중요합니다. 손이야말로 걷는 하드웨어를"}, {"start": 1137.039, "end": 1138.488, "text": "유용한 노동력으로 바꿔주는 핵심이니까요."}, {"start": 1138.538, "end": 1140.389, "text": "그리고 더 큰 중국 관련 관점도 있습니다."}, {"start": 1140.439, "end": 1144.891, "text": "기가 상하이는 이미 세 번째 옵티머스 생산 기지로 거론되고 있으며"}, {"start": 1144.941, "end": 1149.891, "text": "중국은 테슬라에게 무시하기 힘든 공급망과 제조 속도,"}, {"start": 1149.941, "end": 1151.288, "text": "로봇 공학 인재를 제공할 수 있습니다."}, {"start": 1151.338, "end": 1156.19, "text": "테슬라가 진정 옵티머스를 전 세계로 확장하려 한다면, 중국은 단순한 시장 그 이상이 될 것입니다."}, {"start": 1156.24, "end": 1160.19, "text": "로봇 제작의 핵심적인 생산 및 개발 축 중 하나가 될 수 있죠."}, {"start": 1160.24, "end": 1161.389, "text": "무엇이 더 놀라웠나요?"}, {"start": 1161.439, "end": 1165.789, "text": "프리몬트에서 연간 100만 대의 로봇을 목표로 하는 테슬라일까요, 아니면"}, {"start": 1165.839, "end": 1166.789, "text": "기가 텍사스의 연간 1,000만 대일까요?"}, {"start": 1166.839, "end": 1167.789, "text": "댓글로 남겨주세요."}, {"start": 1167.839, "end": 1170.489, "text": "하지만 공장은 이야기의 한 단면일 뿐입니다."}, {"start": 1170.538, "end": 1174.189, "text": "테슬라는 일반 대중이 옵티머스에 어떻게 반응하는지 테스트했습니다."}, {"start": 1174.239, "end": 1179.788, "text": "2025년 7월 할리우드에 문을 연 테슬라 다이너에서 2세대 옵티머스가 팝콘을 담아"}, {"start": 1179.837, "end": 1183.19, "text": "손님들에게 나눠주었고, 금세 \\'팝티머스\\'라는 별명을 얻었습니다."}, {"start": 1183.24, "end": 1188.391, "text": "2025년 12월쯤 그 로봇은 조용히 사라졌지만, 이 테스트는 사람들이"}, {"start": 1188.441, "end": 1191.41, "text": "실험실 밖에서도 옵티머스와 기꺼이 소통한다는 것을 증명했습니다."}, {"start": 1191.46, "end": 1196.61, "text": "머스크는 이제 2026년에 로봇을 슈퍼차저 충전소의 서빙 로봇으로 투입하려 합니다."}, {"start": 1196.66, "end": 1201.109, "text": "이는 자동차, 사람, 쟁반, 좁은 통로 그리고 실시간"}, {"start": 1201.159, "end": 1202.109, "text": "움직임이 수반되는 더 고난도의 시험이 될 것입니다."}, {"start": 1202.159, "end": 1204.409, "text": "테슬라가 옵티머스를 외부에 판매하기 전에는"}, {"start": 1204.459, "end": 1208.009, "text": "우선 자사 공장 내부에서 작동할 수 있음을 증명해야 합니다."}, {"start": 1208.058, "end": 1209.61, "text": "그곳이 가장 확실한 테스트베드이기 때문이죠."}, {"start": 1209.66, "end": 1211.909, "text": "반복적인 작업, 통제된 안전 수칙"}, {"start": 1211.959, "end": 1214.609, "text": "그리고 로봇이 실패할 때마다 즉각적인 피드백이 가능합니다."}, {"start": 1214.659, "end": 1217.11, "text": "초기 작업은 부품 이동이나"}, {"start": 1217.16, "end": 1219.209, "text": "부품 분류, 조립 지원처럼 간단할 수 있지만"}, {"start": 1219.259, "end": 1221.307, "text": "수 시간 동안 신뢰성을 유지해야 합니다."}, {"start": 1221.357, "end": 1223.807, "text": "머스크는 이미 옵티머스 중 유의미한 작업을 수행 중인 개체는"}, {"start": 1223.857, "end": 1226.807, "text": "단 한 대도 없다고 2025년 4분기 실적 발표에서 인정했습니다."}, {"start": 1226.857, "end": 1229.41, "text": "따라서 2026년이 진정한 시험대가 될 것입니다."}, {"start": 1229.46, "end": 1235.311, "text": "테슬라가 이 문턱을 넘는다면 2027년 말 외부 판매와 2만~3만 달러라는 가격 목표는"}, {"start": 1235.361, "end": 1237.709, "text": "훨씬 더 진지한 비즈니스 스토리가 될 것입니다."}, {"start": 1237.759, "end": 1241.91, "text": "하지만 테슬라만 달리고 있는 것은 아니며, 여기서부터 이야기는 불편해집니다."}, {"start": 1241.96, "end": 1246.21, "text": "일론 머스크가 여전히 옵티머스 3세대를 아껴두며 중국 같은 국가들이"}, {"start": 1246.259, "end": 1251.11, "text": "테슬라의 설계를 프레임 단위로 베낄 수 있다고 주장하는 동안, 피규어 AI는 정반대의 행보를 보이고 있습니다."}, {"start": 1251.16, "end": 1255.269, "text": "더 많이 보여주고, 더 많이 출고하며, 대중에게 그 추진력을 증명하려 애쓰고 있죠."}, {"start": 1255.318, "end": 1260.768, "text": "피규어의 \\'큐 팩토리(Q Factory)\\'는 이미 350대 이상의 \\'피규어 03\\' 로봇을 출고했으며,"}, {"start": 1260.817, "end": 1266.969, "text": "120일이 채 되지 않아 생산량을 하루 1대에서 시간당 1대로 늘렸다고 밝혔습니다."}, {"start": 1267.019, "end": 1271.071, "text": "이는 테슬라가 꿈꾸는 백만 대 생산이라는 목표에는 턱없이 부족하지만,"}, {"start": 1271.121, "end": 1275.268, "text": "피규어가 프로토타입을 넘어 양산 단계로 가는 중요한 문턱을 넘었음을 보여줍니다."}, {"start": 1275.317, "end": 1281.469, "text": "이어 \\'헬릭스 02\\' 침실 시연에서는 두 대의 \\'피규어 03\\' 로봇이 2분 만에 방을 정리하며,"}, {"start": 1281.519, "end": 1286.371, "text": "문을 열고, 물건을 치우고, 함께 침대를 정리하는 등의 작업을 수행했습니다."}, {"start": 1286.421, "end": 1288.169, "text": "이것이 바로 현재의 극명한 대조입니다."}, {"start": 1288.219, "end": 1292.869, "text": "피규어는 \\'헬릭스 02\\'를 통해 가사 노동을 돕는 로봇을 보여주고 있는 반면, 테슬라는 여전히"}, {"start": 1292.919, "end": 1295.17, "text": "전 세계에 3세대 모델을 기다려 달라고 말하고 있죠."}, {"start": 1295.22, "end": 1300.37, "text": "테슬라의 강점은 여전히 수직 계열화, FSD 데이터, 자체 칩, 그리고"}, {"start": 1300.42, "end": 1301.671, "text": "경쟁사가 따라올 수 없는 가격 목표에 있습니다."}, {"start": 1301.721, "end": 1303.669, "text": "하지만 테슬라의 리스크 또한 분명합니다."}, {"start": 1303.719, "end": 1307.97, "text": "타 기업들이 유능한 로봇을 계속 선보이는 동안 테슬라가 최선의 버전을 숨기기만 한다면,"}, {"start": 1308.019, "end": 1310.469, "text": "옵티머스가 받는 압박은 커질 수밖에 없습니다."}, {"start": 1310.519, "end": 1314.369, "text": "이것이 머스크가 일반적인 로봇 공학 이상의 이야기를 계속 내놓는 이유입니다."}, {"start": 1314.419, "end": 1319.068, "text": "테슬라에게 옵티머스는 단순한 공장 도우미나 가정용 로봇이 아닙니다."}, {"start": 1319.118, "end": 1322.171, "text": "머스크는 이를 물리적 형태의 범용 인공지능(AGI)으로 향하는 단계로 정의했습니다."}, {"start": 1322.221, "end": 1327.87, "text": "2026년 3월 4일, 그는 테슬라가 물리적 형태의 AGI를 최초로 구현할 수 있다고 게시했습니다."}, {"start": 1327.92, "end": 1332.067, "text": "이는 화면 속 질문에 답하는 수준을 넘어, 실제로 세상을 움직이고"}, {"start": 1332.117, "end": 1334.59, "text": "물리적인 변화를 이끌어내는 지능을 의미합니다."}, {"start": 1334.64, "end": 1337.288, "text": "이 구상은 옵티머스의 전체 스택으로 연결됩니다."}, {"start": 1337.338, "end": 1340.988, "text": "온디바이스 컴퓨팅을 위한 AI5, 시각과 기동을 위한 FSD,"}, {"start": 1341.038, "end": 1342.587, "text": "추론과 언어를 담당하는 그록(Grok),"}, {"start": 1342.637, "end": 1345.19, "text": "물리적 과업을 위한 시각-언어 행동 모델,"}, {"start": 1345.24, "end": 1347.591, "text": "그리고 현장의 모든 로봇으로부터 배우는 플릿 러닝까지요."}, {"start": 1347.641, "end": 1350.091, "text": "테슬라가 현재 3세대를 범용 인공지능(AGI)이라 부르는 건 아닙니다."}, {"start": 1350.141, "end": 1351.989, "text": "다만 이런 아키텍처가"}, {"start": 1352.038, "end": 1353.587, "text": "AGI로 가는 길이 될 수 있다는 주장이죠."}, {"start": 1353.637, "end": 1355.389, "text": "하지만 그만큼 기대치도 높아졌습니다."}, {"start": 1355.439, "end": 1357.49, "text": "테슬라가 옵티머스를 \\'구현된 지능\\'의"}, {"start": 1357.539, "end": 1358.789, "text": "미래로 만들고자 한다면,"}, {"start": 1358.839, "end": 1361.59, "text": "3세대는 단순히 공개가 늦어진 모델에 그쳐선 안 됩니다."}, {"start": 1361.64, "end": 1364.289, "text": "전체 시스템이 현실 세계에서 작동함을 입증해야 하죠."}, {"start": 1364.339, "end": 1366.489, "text": "피규어(Figure)사의 로봇 생산 업데이트는"}, {"start": 1366.538, "end": 1371.488, "text": "테슬라의 \\'로봇 100만 대\\'라는 꿈을 실감 나게 할까요, 아니면 압박이 될까요? 의견을 남겨주세요."}, {"start": 1371.538, "end": 1374.788, "text": "이것이 현재 옵티머스 3세대가 처한 진짜 상황입니다."}, {"start": 1374.838, "end": 1377.19, "text": "테슬라는 단순히 로봇 공개를 미루는 게 아닙니다."}, {"start": 1377.24, "end": 1381.99, "text": "칩과 AI 두뇌, 공장, 공급망, 그리고 물리적 지능에 대한 장기적 비전을"}, {"start": 1382.039, "end": 1384.789, "text": "하나의 제품으로 엮어내려는 시도죠."}, {"start": 1384.839, "end": 1389.048, "text": "3세대가 그토록 중요한 이유입니다. 하지만 진짜 시험대는 이제부터입니다."}, {"start": 1389.098, "end": 1393.85, "text": "테슬라는 옵티머스가 단순한 약속이나 통제된 시연을 넘어"}, {"start": 1393.9, "end": 1399.051, "text": "미래의 계획을 실제 유용한 작업으로 구현할 수 있음을 증명해야 합니다. 이 영상이 여기서 끝날지 다음 이야기로 이어질지는 몰라도"}, {"start": 1399.101, "end": 1404.65, "text": "분명한 사실이 하나 있습니다. 휴머노이드 로봇 경쟁은 이제 누가 시연을 더 잘하느냐의 싸움이 아닙니다."}, {"start": 1404.7, "end": 1410.548, "text": "이제는 누가 실제로 제작하고, 현장에 배치하며, 대규모로 확장할 수 있느냐가 관건입니다."}, {"start": 1410.598, "end": 1416.0, "text": "[웅장한 음악이 흐르며 마무리된다]"}];
let player;
function onYouTubeIframeAPIReady(){
    player=new YT.Player('player',{videoId:videoId,playerVars:{autoplay:1,controls:1,rel:0,modestbranding:1},events:{'onStateChange':onPlayerStateChange}});
}
let syncInterval;
function onPlayerStateChange(event){
    if(event.data==YT.PlayerState.PLAYING){
        if(!syncInterval) syncInterval=setInterval(updateSubs,100);
    }else{
        clearInterval(syncInterval); syncInterval=null;
    }
}
function updateSubs(){
    const t=player.getCurrentTime();
    let currentHtml="";
    for(let i=0;i<subs.length;i++){
        if(t>=subs[i].start && t<=subs[i].end){
            currentHtml += `<div class="sub-line">${subs[i].text}</div><br>`;
        }
    }
    document.getElementById('subtitles').innerHTML=currentHtml;
}
</script>
