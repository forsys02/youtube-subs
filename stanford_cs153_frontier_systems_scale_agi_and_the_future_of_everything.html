const subs=[{"start": 9.618, "end": 14.984, "text": "샘 올트먼 씨를 큰 박수로 맞아 주시기 바랍니다. [박수]"}, {"start": 15.034, "end": 22.428, "text": "이 수업은 제가 학생이었을 때 겪었던 여러 경험에서 영감을 얻어 기획되었습니다."}, {"start": 22.478, "end": 31.059, "text": "그중 하나는 테리 위노그라드 교수님의 입문 세미나인 'CS47N: 컴퓨터와 개방 사회'였죠."}, {"start": 31.109, "end": 38.093, "text": "그리고 2014년 당시 캠퍼스의 제 친구들과 동료들에게 아주 유익한 경험이 되었던 두 번째 수업은,"}, {"start": 38.143, "end": 42.059, "text": "샘이 진행했던 'CS183: 스타트업 창업법'이었습니다."}, {"start": 42.109, "end": 44.438, "text": "이렇게 다시 모시게 되어 정말 반갑습니다."}, {"start": 44.487, "end": 47.749, "text": "소감이 어떠신가요? 이곳에 다시 돌아온 기분이 궁금합니다."}, {"start": 47.798, "end": 53.325, "text": "샘: 아까 걸어 들어오면서 생각했는데, 시간이 조금만 더 있었다면 그 수업 내용을 업데이트했을 거예요."}, {"start": 53.375, "end": 56.749, "text": "샘: 스타트업을 시작하는 방식이 그사이에 너무 많이 변했거든요."}, {"start": 56.798, "end": 60.349, "text": "샘: 그런데 요즘 시대에 맞춰서 스타트업을 어떻게 만들어야 하는지"}, {"start": 60.399, "end": 62.349000000000004, "text": "샘: 제대로 설명해 주는 걸 본 적이 없거든요."}, {"start": 62.399, "end": 64.51, "text": "샘: 아까 여기 들어오면서 문득 그런 생각이 들더라고요."}, {"start": 64.56, "end": 66.35, "text": "샘: '아, 다시 해보면 재밌겠다'는 생각 말이죠. [웃음]"}, {"start": 66.4, "end": 69.95, "text": "시기적으로 보면, 2014년에 그 수업을 하셨잖아요."}, {"start": 70.0, "end": 72.7, "text": "OpenAI가 2015년에 설립됐죠, 맞나요?"}, {"start": 72.75, "end": 74.35, "text": "샘: 사실상 2016년이죠."}, {"start": 74.4, "end": 75.35, "text": "2016년요, 알겠습니다."}, {"start": 75.4, "end": 79.388, "text": "그러니까... 제3자의 입장에서 보기에는"}, {"start": 79.438, "end": 82.189, "text": "샘이 생각하는 '성공적인 창업'에 대한"}, {"start": 82.239, "end": 84.95, "text": "실전 이론을 정립하신 것 같았거든요."}, {"start": 85.0, "end": 86.51, "text": "그리고 그걸 실제로 실행에 옮기려고 하신 거고요."}, {"start": 86.56, "end": 87.95, "text": "제가 제대로 짚은 건가요?"}, {"start": 88.0, "end": 89.15, "text": "아니면 제가 잘못 알고 있는 건가요?"}, {"start": 89.2, "end": 94.4, "text": "샘: 음, OpenAI는 지난 수십 년간 나타난 스타트업 중"}, {"start": 94.45, "end": 95.358, "text": "샘: 가장 특이한 사례였어요."}, {"start": 95.408, "end": 96.32, "text": "샘: 실리콘밸리 전체를 통틀어서요."}, {"start": 96.37, "end": 97.918, "text": "연구소로 시작했기 때문입니다."}, {"start": 97.968, "end": 99.559, "text": "사실 당시에는 회사가 전혀 아니었어요."}, {"start": 99.60900000000001, "end": 100.559, "text": "여: 그렇죠."}, {"start": 100.60900000000001, "end": 106.729, "text": "남: 보통 스타트업의 일반적인 행보는 이렇습니다."}, {"start": 106.729, "end": 108.239, "text": "먼저 제품 중심의 회사를 세우고"}, {"start": 108.289, "end": 109.439, "text": "한동안 성장을 이어가다가"}, {"start": 109.489, "end": 110.279, "text": "성장이 둔화되는 시점에 이르면"}, {"start": 110.32900000000001, "end": 111.439, "text": "그때 연구소를 설립하는 식이죠."}, {"start": 111.489, "end": 114.279, "text": "연구소를 덧붙여서 다음 먹거리를 구상하는 겁니다."}, {"start": 114.32900000000001, "end": 116.03999999999999, "text": "하지만 저희는 그 정반대였어요."}, {"start": 116.09, "end": 119.239, "text": "연구소로 시작해서 나중에 스타트업을 덧붙인 격이었죠."}, {"start": 119.289, "end": 124.37, "text": "맞아요. 사실 권장할 만한 방식은 아닙니다. 꽤나 이례적이니까요."}, {"start": 124.42, "end": 129.328, "text": "하지만 제가 말하려던 요점은 그게 아닙니다. 제 말은,"}, {"start": 129.378, "end": 132.928, "text": "저희도 AI를 만드는 중이라 기술이 아직 없었기에 인공지능 이전의 스타트업 규칙을 따랐다는 겁니다."}, {"start": 132.978, "end": 138.529, "text": "그런데 요즘 최고의 스타트업들이 하는 방식은 불과 몇 년 전과는 너무나 다릅니다."}, {"start": 138.579, "end": 143.488, "text": "그래서 누군가... 제가 직접 하지는 않겠지만요,"}, {"start": 143.538, "end": 144.969, "text": "누군가 그 강의를 다시 열어야 한다고 생각해요."}, {"start": 145.02, "end": 146.449, "text": "여: 그럼 새로운 데이터를 바탕으로 업데이트한다면"}, {"start": 146.5, "end": 150.699, "text": "여: 어떤 부분이 가장 크게 바뀔까요?"}, {"start": 154.079, "end": 159.079, "text": "남: 이제는 토큰에 적당한 비용만 들여도..."}, {"start": 159.15800000000002, "end": 163.949, "text": "이제는 100명 규모의 아주 뛰어난 엔지니어링 팀이"}, {"start": 164.0, "end": 165.709, "text": "스타트업으로서 할 수 있는 일들을 해낼 수 있습니다."}, {"start": 165.75900000000001, "end": 166.789, "text": "예전에는 정말 불가능했던 일이죠."}, {"start": 166.84, "end": 171.22899999999998, "text": "스타트업으로서는 상상조차 할 수 없던 옵션이었는데,"}, {"start": 171.28, "end": 172.06900000000002, "text": "이제는 현실이 됐습니다."}, {"start": 172.12, "end": 174.949, "text": "그래서 가질 수 있는 야망의 크기나,"}, {"start": 175.0, "end": 175.988, "text": "실행에 옮기는 속도,"}, {"start": 176.038, "end": 178.469, "text": "한꺼번에 처리할 수 있는 업무의 양까지,"}, {"start": 178.52, "end": 180.789, "text": "차원이 완전히 달라졌다고 생각해요."}, {"start": 180.84, "end": 183.789, "text": "남: 그럼 해결해야 할 문제들의 양상도 달라지나요?"}, {"start": 183.84, "end": 186.668, "text": "만약 수업을 다시 하신다면, 학기 말에"}, {"start": 186.718, "end": 189.828, "text": "학생들이 해결해야 할 문제들로"}, {"start": 189.878, "end": 191.668, "text": "그런 과제들을 내주실 건가요?"}, {"start": 191.718, "end": 194.629, "text": "남: 해결할 문제를 정해주는 방식은 효과가 없다고 봐요."}, {"start": 194.68, "end": 197.689, "text": "제가 어떤 문제를 생각해낼 수 있다면,"}, {"start": 197.74, "end": 200.00900000000001, "text": "그러니까 정말 훌륭한 스타트업 아이디어가 떠올랐을 때"}, {"start": 200.06, "end": 202.048, "text": "그게 제 눈에 보일 정도라면,"}, {"start": 202.098, "end": 205.25, "text": "다른 많은 사람에게도 이미 뻔한 이야기일 테니까요."}, {"start": 205.3, "end": 208.25, "text": "오픈AI를 처음 시작했을 때만 해도, 저희는..."}, {"start": 208.3, "end": 212.00900000000001, "text": "뭐랄까, 전 세계에서 AGI를 연구하는 네 곳 중 하나였죠."}, {"start": 212.06, "end": 212.849, "text": "세상에는요."}, {"start": 212.9, "end": 214.209, "text": "그런 분야를 찾아야 합니다."}, {"start": 214.25900000000001, "end": 216.969, "text": "오늘날에도 분명 그런 게 존재할 겁니다."}, {"start": 217.02, "end": 218.608, "text": "이전에는 전혀 불가능했던 일이 말이죠."}, {"start": 218.65800000000002, "end": 221.858, "text": "자동화 코딩 시대 이전에는요."}, {"start": 222.378, "end": 224.168, "text": "지금은 전혀 뻔해 보이지 않지만,"}, {"start": 224.21800000000002, "end": 227.649, "text": "곧 수조 달러 규모의 시장이 될 것이며"}, {"start": 227.699, "end": 229.888, "text": "현재 단 네 곳의 기업만 매달리고 있는 분야 말입니다."}, {"start": 229.938, "end": 230.72899999999998, "text": "하지만 그게 뭔지는 저도 모릅니다."}, {"start": 230.78, "end": 232.56900000000002, "text": "제가 아는 것보다 여러분이 훨씬 더"}, {"start": 232.62, "end": 233.56900000000002, "text": "잘 알고 계실 거예요."}, {"start": 233.62, "end": 237.168, "text": "제 머릿속은 이미 OpenAI가 점령해 버렸거든요."}, {"start": 237.21800000000002, "end": 239.888, "text": "하지만 누군가 여러분에게 준 과제 같은 건"}, {"start": 239.938, "end": 242.289, "text": "여러분이 진정 원하는 게 아닐 겁니다."}, {"start": 242.34, "end": 243.129, "text": "남2: 네."}, {"start": 243.18, "end": 246.00900000000001, "text": "남2: 좋습니다, 일리가 있는 말씀이네요."}, {"start": 246.06, "end": 247.289, "text": "남2: 하지만 제 생각엔 이게 도움이 될 듯합니다."}, {"start": 247.34, "end": 248.928, "text": "남2: 이게 시스템 수업인 만큼,"}, {"start": 248.978, "end": 252.00900000000001, "text": "남2: 특정 문제에 대해 논리적으로 생각해 보는 거죠."}, {"start": 252.06, "end": 253.649, "text": "남2: 직접 머리를 써서 해결해야 하는 그런 문제들 말입니다."}, {"start": 253.699, "end": 256.81, "text": "시스템적 관점에서 문제를 분해하는 방식의 틀을"}, {"start": 256.86, "end": 258.769, "text": "직접 적용해 볼 수 있도록 말이죠."}, {"start": 258.819, "end": 260.889, "text": "그래야 당면한 문제에 대한 해결책을 스스로 찾을 수 있을 테니까요."}, {"start": 260.939, "end": 261.889, "text": "네, 맞습니다."}, {"start": 261.939, "end": 268.269, "text": "그리고 지난 2014년 수업에서 처음 화두를 던지셨고, 그 이후로도"}, {"start": 268.319, "end": 272.49, "text": "수년간 공개적으로 언급해 오신 개념이 바로 '스케일(Scale)'인데요."}, {"start": 272.54, "end": 274.49, "text": "스케일은 그 자체로 아주 다루기 힘든 난제죠."}, {"start": 274.54, "end": 277.49, "text": "양적인 팽창이 곧 질적인 변화를 가져오기도 하고요."}, {"start": 277.54, "end": 283.49, "text": "교수님께서는 지난 10여 년간 이 '스케일'이라는 개념을"}, {"start": 283.54, "end": 285.49, "text": "온갖 방식으로 실증적으로 연구해 오신 것 같습니다."}, {"start": 285.54, "end": 290.889, "text": "10년이 지난 지금, 교수님이 생각하시는 스케일의 의미가 무엇인지 먼저 풀어주실 수 있을까요?"}, {"start": 290.939, "end": 293.968, "text": "시스템 설계 측면에서 스케일을 어떻게 분석하시나요?"}, {"start": 294.019, "end": 297.848, "text": "무언가를 구축한 후에 도구로서 어떻게 적용해야 할까요?"}, {"start": 297.899, "end": 299.689, "text": "이 질문부터 시작해 볼까요?"}, {"start": 299.74, "end": 301.56, "text": "좋습니다."}, {"start": 301.56, "end": 305.788, "text": "사실 제가 지금부터 드릴 말씀이 왜 사실인지 저도 그 이유는 모릅니다."}, {"start": 305.838, "end": 311.43, "text": "이를 설명할 만한 만족스러운 이론을 제시할 수도 없고요."}, {"start": 311.48, "end": 315.459, "text": "그래서 이 방식을 따르라고 말씀드리는 게 조금 조심스럽기도 합니다만,"}, {"start": 315.509, "end": 317.06, "text": "그래도 일단 말씀드려 보겠습니다."}, {"start": 317.11, "end": 319.42, "text": "경험적으로 봤을 때, 이건 분명한 사실이거든요."}, {"start": 319.47, "end": 323.459, "text": "제 커리어에서 목격한 가장 흥미로운 현상들은"}, {"start": 323.509, "end": 326.699, "text": "그리고 다른 일들이 일어나는 것을 지켜보며 느낀 점은"}, {"start": 326.75, "end": 329.819, "text": "그중에서도 가장 흥미로웠던 것들은 전부"}, {"start": 329.87, "end": 333.819, "text": "규모에 따른 '창발적 속성(emergent properties)'과"}, {"start": 333.87, "end": 337.218, "text": "혹은 규모가 커짐에 따라 계속해서 수익이 발생하는 현상과"}, {"start": 337.269, "end": 340.379, "text": "일반적인 통념을 훨씬 뛰어넘는 수준의 관련이 있었습니다."}, {"start": 340.43, "end": 345.06, "text": "물론 이런 현상은 AI 모델의 '스케일링 법칙'에서도 나타납니다."}, {"start": 345.11, "end": 350.06, "text": "하지만 연구 환경에서 하나의 문제를 해결하기 위해"}, {"start": 350.11, "end": 353.459, "text": "더 많은 인재들이 모일 때도 이런 일이 일어납니다."}, {"start": 353.509, "end": 359.459, "text": "기업에서도 마찬가지죠. 다양한 방식으로 규모의 경제를 실현할 때 이런 현상이 발생합니다."}, {"start": 359.509, "end": 366.459, "text": "제가 이걸 정말 깨달은 건 Y 콤비네이터(YC)에 있을 때였는데, 당시 모두가 이렇게 말했죠."}, {"start": 366.509, "end": 369.459, "text": "\"YC가 너무 커졌어. 규모를 줄여야 해. 기수당 선발 기업 수를 줄여야지.\""}, {"start": 369.509, "end": 376.459, "text": "\"기수당 10개 기업만 뽑던 시절이 YC의 황금기였어.\" 아주 똑똑한 분들도 다들 그렇게 말하더군요."}, {"start": 376.509, "end": 384.889, "text": "사실 유혹적이긴 했습니다. 일도 훨씬 줄어들 테니까요. 게다가 \"최고의 기업은 항상 눈에 띄기 마련이고...\""}, {"start": 384.939, "end": 387.649, "text": "\"...나머지는 그냥 들러리일 뿐이라 별 도움이 안 된다\"는 이론도 있었죠."}, {"start": 387.699, "end": 390.81, "text": "하지만 YC를 성공으로 이끈 마법의 핵심은"}, {"start": 390.86, "end": 395.209, "text": "바로 기수 내에서 발생하는 '네트워크 효과'였습니다."}, {"start": 395.259, "end": 397.17, "text": "그리고 그것은 규모가 커짐에 따라 나타난 창발적 속성이었죠."}, {"start": 397.22, "end": 398.569, "text": "이전에는 그 누구도 발견하지 못했던 성질이었습니다."}, {"start": 398.62, "end": 403.028, "text": "아무도 그런 방식으로 스타트업을 대규모로 지원해 본 적이 없었으니까요."}, {"start": 403.079, "end": 406.509, "text": "그래서 그전까지는 아무도 이런 사실을 발견하지 못했습니다."}, {"start": 406.56, "end": 408.778, "text": "그렇게 실행했을 때 일어나는 현상을요."}, {"start": 408.829, "end": 412.399, "text": "무언가 중요한 일이 벌어지는데,"}, {"start": 412.399, "end": 414.55, "text": "10분의 1 규모에서는 아예 존재하지 않았던"}, {"start": 414.6, "end": 417.079, "text": "100분의 1 규모에서도 없었던 일입니다."}, {"start": 417.129, "end": 420.209, "text": "이런 사례는 아주 많습니다."}, {"start": 420.209, "end": 425.6, "text": "시간 관계상 다 말씀드리지 못하고 넘어가겠지만,"}, {"start": 425.6, "end": 429.75, "text": "다시 말씀드리건대 왜 그런지 이유는 설명할 수 없어도"}, {"start": 429.8, "end": 432.55, "text": "경험적으로 볼 때 어떤 시점에"}, {"start": 432.6, "end": 435.61, "text": "밀어붙일 기회가 생겨서, 전에는 시도하지 않았던"}, {"start": 435.66, "end": 437.649, "text": "규모로 밀어붙였을 때 말입니다."}, {"start": 437.699, "end": 440.088, "text": "이미 작은 규모에서 나름의 흥미로운 방식으로"}, {"start": 440.139, "end": 442.449, "text": "작동하고 있다면, 십중팔구"}, {"start": 442.5, "end": 443.889, "text": "그것은 좋은 아이디어일 겁니다."}, {"start": 443.939, "end": 445.81, "text": "그리고 이건 다들 생각보다"}, {"start": 445.86, "end": 449.298, "text": "충분히 시도하지 않는 일이기도 하죠."}, {"start": 449.348, "end": 450.17, "text": "남: 음."}, {"start": 450.22, "end": 452.769, "text": "저 역시 왜 그런지는 설명할 수 없지만,"}, {"start": 452.819, "end": 457.848, "text": "우리가 \"AI 모델의 규모를 대폭 키워보자\"고 했을 때도 그랬죠."}, {"start": 457.899, "end": 460.05, "text": "이 분야의 수많은 천재들조차 대부분은"}, {"start": 460.1, "end": 461.728, "text": "\"이건 잘 안될 거야\"라며 회의적이었습니다."}, {"start": 461.778, "end": 463.449, "text": "그건 과학적인 결과라고 보기 어렵습니다."}, {"start": 463.5, "end": 465.05, "text": "규모가 커진다고 해서 나아지는 건 딱히 흥미로운 게 아니거든요."}, {"start": 465.1, "end": 467.329, "text": "그건 이미 보여주셨잖아요, 왜 계속 확장하는 거죠?"}, {"start": 467.379, "end": 469.49, "text": "제가 YC 사례를 언급했었는데요."}, {"start": 469.54, "end": 473.269, "text": "제가 봐온 수많은 스타트업 창업자들은"}, {"start": 473.319, "end": 476.149, "text": "\"규모를 키우면 뭔가 흥미로운 일이 벌어질 것 같은데\""}, {"start": 476.199, "end": 477.509, "text": "라고 생각하면서도,"}, {"start": 477.56, "end": 479.468, "text": "막상 그러려니 좀 걱정을 하더군요."}, {"start": 479.519, "end": 481.43, "text": "딱히 구체적인 이유도 없이 말이죠."}, {"start": 481.48, "end": 485.069, "text": "그런데 수많은 사람들의 방대한 데이터를 다시 돌아보면,"}, {"start": 485.12, "end": 488.569, "text": "다양한 방식으로 회사를 키워온 분들이죠."}, {"start": 488.62, "end": 490.009, "text": "거기엔 거의 항상 흥미로운 지점이 있습니다."}, {"start": 490.06, "end": 494.769, "text": "그래서 저는 그 부분을 파고드는 게 꽤 흥미로운 시도라고 보고,"}, {"start": 494.819, "end": 499.55, "text": "아직 제대로 규명되지 않은 분야이기도 합니다."}, {"start": 499.6, "end": 506.49, "text": "시스템 설계 측면에서 보자면, 사람들이 주저하는 이유 중 하나가"}, {"start": 506.54, "end": 513.29, "text": "규모가 커질수록 문제가 가속화되고 예상치 못한 방식으로 터지기 때문입니다."}, {"start": 513.34, "end": 514.77, "text": "확장하는 과정에서 말이죠."}, {"start": 514.82, "end": 519.759, "text": "그리고 무언가를 정말로 확장하려고 한다면,"}, {"start": 519.759, "end": 521.7090000000001, "text": "항상 어딘가 조금씩은 고장이 나 있기 마련이죠."}, {"start": 521.759, "end": 523.91, "text": "항상 아주 똑똑한 사람들이 나타나 이렇게 말하곤 합니다."}, {"start": 523.96, "end": 525.109, "text": "왜 이걸 하면 안 되는지,"}, {"start": 525.158, "end": 526.869, "text": "너무 욕심내지 마라, 너무 크게 벌리지 마라,"}, {"start": 526.918, "end": 528.469, "text": "좀 더 작게 시작해 보자 같은 것들이죠."}, {"start": 528.519, "end": 531.39, "text": "그래서 그걸 세분화하는 건 시스템적인 문제입니다."}, {"start": 531.44, "end": 534.19, "text": "우리가 AI 모델의 규모를 키우던 때를 예로 들어볼게요."}, {"start": 534.24, "end": 536.5889999999999, "text": "기술적으로 '이게 과연 가능한가?'라는 의문이 있었죠."}, {"start": 536.639, "end": 537.5889999999999, "text": "정말 미친 짓 같았거든요."}, {"start": 537.639, "end": 541.109, "text": "만 대, 아니 십만 대의 GPU를 동시에 돌린다는 건 아무도 생각지 못한 일이었고,"}, {"start": 541.158, "end": 544.19, "text": "어마어마한 엔지니어링 인력이 투입되어야 하는 일이었습니다."}, {"start": 544.24, "end": 549.03, "text": "막대한 자본도 필요했고, 이걸 해내는 데 무엇이 필요한지, 그리고 대체 어떻게"}, {"start": 549.08, "end": 552.17, "text": "사업이 될 수 있을지, 어떻게 이런 리스크를 감수할 수 있을지 고민해야 했죠."}, {"start": 552.22, "end": 555.129, "text": "연구원들 사이에서는 이런 문화적인 갈등도 있었어요. \"자, 우리가 이 모든"}, {"start": 555.178, "end": 557.369, "text": "컴퓨팅 자원을 얻는다면, 왜 이걸 단 하나의 프로젝트에만 쏟아부어야 하지?\""}, {"start": 557.418, "end": 561.369, "text": "\"우리가 뭔가를 배울 텐데, 왜 이 모든 프로젝트에 나눠서 쓰지 않는 거야?\"라는 식이었죠."}, {"start": 561.418, "end": 566.609, "text": "이런 일은 제가 지켜본 거의 모든 분야의 스케일 업 과정에서 일어납니다."}, {"start": 566.658, "end": 573.329, "text": "그래서 문제를 각각의 어려운 영역이나 하지 말아야 할 이유들로 세분화하고,"}, {"start": 573.379, "end": 574.969, "text": "그것들을 하나씩 해결해 나가는 것이"}, {"start": 575.019, "end": 577.619, "text": "정말, 정말 중요합니다."}, {"start": 578.678, "end": 579.79, "text": "그 부분을 조금 더 깊이 파고들어 보죠."}, {"start": 579.84, "end": 583.03, "text": "왜냐하면 그걸 가능하게 한 사람들은 아주 극소수니까요."}, {"start": 583.08, "end": 586.5889999999999, "text": "남: 새로운 제품과 시스템을 끊임없이 확장하는 방식 말이죠,"}, {"start": 586.639, "end": 589.749, "text": "지난 수년간 OpenAI 팀이 해온 것처럼요."}, {"start": 589.798, "end": 592.509, "text": "하지만 거기서 발생하는 문제 중 하나는"}, {"start": 592.558, "end": 595.469, "text": "인간이 가진 기존의 선입견이나"}, {"start": 595.519, "end": 598.19, "text": "일종의 사고 모델, 그리고 기대치인 것 같습니다."}, {"start": 598.24, "end": 599.7090000000001, "text": "그리고 아까 시스템이 고장 난다고 하셨는데,"}, {"start": 599.759, "end": 603.278, "text": "제 생각에 가장 자주 고장 나고"}, {"start": 603.278, "end": 606.19, "text": "가장 재구조화하기 힘든 부분은 바로 인간,"}, {"start": 606.24, "end": 609.39, "text": "즉 시스템 설계의 인적 요소인 것 같아요."}, {"start": 609.44, "end": 610.869, "text": "직접 시스템을 구현하는 사람이든"}, {"start": 610.918, "end": 613.31, "text": "아니면 참여하는 사람이든 말이죠."}, {"start": 613.36, "end": 615.43, "text": "그렇다면 대규모 인력을 조직하는 것에 대해 무엇을 배우셨나요?"}, {"start": 615.48, "end": 618.109, "text": "단순히 과거의 시스템을 재탕하는 게 아니라,"}, {"start": 618.158, "end": 622.349, "text": "새로운 시스템에 대규모 인원을 참여시키기 위해 조직할 때 말입니다."}, {"start": 622.399, "end": 629.198, "text": "처음 봤을 때 막연하게 가질 수 있는 선험적인 생각들 말이죠."}, {"start": 629.519, "end": 635.32, "text": "남2: 제 생각엔 명확한 목표와 그곳에 도달하기 위한 계획,"}, {"start": 635.37, "end": 644.109, "text": "그리고 어떻게 목표에 도달할지, 그 과정에서 어떻게 의사결정을 내릴지에 대한 명확한 답변이 중요합니다."}, {"start": 644.158, "end": 650.68, "text": "그게 정말 중요하죠. 음, 저희가 모델을 확장하기로 했을 때를 예로 들면,"}, {"start": 650.73, "end": 653.64, "text": "\"이건 제대로 안 될 거야\"라고 말하는 사람들이 정말 많았거든요."}, {"start": 653.69, "end": 657.32, "text": "\"이런 문제가 생길 거다\", \"더 다각화된 포트폴리오가 필요하다\"면서 말이죠."}, {"start": 657.37, "end": 660.28, "text": "하지만 일단 우리가 딥러닝 스케일링에 승부를 걸겠다고 결정하면"}, {"start": 660.33, "end": 663.64, "text": "그게 우리의 핵심이 되는 거죠. 우리가 틀렸다면 실패하겠지만, 어쨌든 우린 그렇게 할 겁니다."}, {"start": 663.69, "end": 667.8, "text": "왜 그렇게 하려는지, 그리고 그 목표에 도달했을 때 세상이 어떻게 변할지에 대한 우리의 믿음을 말씀드릴게요."}, {"start": 667.85, "end": 671.528, "text": "그건 매우 강력한 힘을 가집니다."}, {"start": 671.528, "end": 681.428, "text": "그리고 왠지 모르겠지만, 인류는 기하급수적인 성장을 이해하는 데 서툴게 진화해 왔어요."}, {"start": 681.428, "end": 686.27, "text": "사람들은 스케일링 법칙이 계속해서 기하급수적으로 적용될 거라거나,"}, {"start": 686.32, "end": 691.829, "text": "매출이 폭발적으로 늘고 조직의 복잡성이 기하급수적으로 증가하는 상황을 상상하기 힘들어하죠."}, {"start": 691.879, "end": 697.27, "text": "제 경험상, 사람들과 함께 제일 원칙(first principles)에 근거해서"}, {"start": 697.32, "end": 699.31, "text": "왜 그런 일이 가능한지 논리적으로 따져보는 데는 꽤 많은 시간이 걸립니다."}, {"start": 699.36, "end": 702.67, "text": "그 과정을 살펴보기 위해 두 가지 예를 들어볼까요?"}, {"start": 702.72, "end": 705.39, "text": "첫 번째는 ChatGPT이고, 두 번째는 Codex입니다."}, {"start": 705.44, "end": 708.109, "text": "이 두 가지 모두를 완전히 바꿔놓았죠."}, {"start": 708.158, "end": 710.109, "text": "다들 잘 들리시나요? 목소리를 좀 더 키워볼게요."}, {"start": 710.158, "end": 712.028, "text": "네, 좋습니다."}, {"start": 712.028, "end": 716.54, "text": "그럼 제가 틀을 잡아볼 테니, 여러분은 그 가설에 이의를 제기해 보세요. 그러고 나서"}, {"start": 716.59, "end": 718.7, "text": "실제로 어떤 일이 일어났는지 사례를 통해 분석해 보죠."}, {"start": 718.75, "end": 723.9, "text": "ChatGPT의 경우, 오랫동안 모델 스케일링에 있어 큰 심리적 장벽이 있었는데"}, {"start": 723.95, "end": 728.619, "text": "업계 전반에 퍼져 있던 생각은 '이걸 대체 어디에 써먹겠어?'라는 의구심이었죠."}, {"start": 728.668, "end": 731.739, "text": "이건 일종의 연구 목적의 솔루션이었으니까요."}, {"start": 731.788, "end": 734.739, "text": "문제를 찾아다니는 솔루션이자, 연구 우선주의적인 접근 방식이었죠."}, {"start": 734.788, "end": 736.739, "text": "이건 제품이 아니에요."}, {"start": 736.788, "end": 738.579, "text": "그러다 아시다시피 ChatGPT가 등장했고"}, {"start": 738.629, "end": 741.82, "text": "채팅이라는 경험이 대규모 범용 모델에 있어"}, {"start": 741.87, "end": 746.02, "text": "소비자들을 위한 최고의 킬러 앱이라는 사실을"}, {"start": 746.07, "end": 747.379, "text": "전 세계에 증명해 보였죠."}, {"start": 747.428, "end": 749.42, "text": "그리고 몇 년이 지난 지금은"}, {"start": 749.47, "end": 752.859, "text": "코딩이 기업용 시장의 킬러 앱이라는 점이 명확해졌습니다."}, {"start": 752.908, "end": 755.54, "text": "남: 그런 활용 사례들을 발굴하고 출시해서"}, {"start": 755.59, "end": 758.579, "text": "확장하고 수익화하기까지 사용했던 시스템들을 비교해 본다면요?"}, {"start": 758.629, "end": 761.728, "text": "그 과정에서 얻은 핵심적인 교훈이 있을까요?"}, {"start": 761.778, "end": 763.778, "text": "샘: 네, 그럼요."}, {"start": 764.09, "end": 768.469, "text": "저희가 GPT-3를 개발했을 때의 이야기인데요."}, {"start": 768.519, "end": 774.489, "text": "수익 창출이 꼭 필요했습니다. 수십억 달러 규모의 컴퓨팅 자원을 확보해 확장하고 싶었으니까요."}, {"start": 774.538, "end": 776.45, "text": "당시 GPT-3는 꽤 흥미로운 모델이긴 했지만"}, {"start": 776.5, "end": 781.69, "text": "그저 멋진 데모일 뿐이었죠. 어떤 제품을 만들어야 할지 갈피를 못 잡고 고민만 거듭했습니다."}, {"start": 781.74, "end": 786.989, "text": "마음처럼 되지 않더라고요. 여러 시도를 했지만 실패했고, 모델이 더 나아져야 한다는 건 알았지만"}, {"start": 787.038, "end": 790.39, "text": "한편으론 수익 엔진을 좀 더 빨리 가동하고 싶었습니다."}, {"start": 790.44, "end": 796.39, "text": "그래서 결국 '어떤 제품을 만들지 모르겠으니 그냥 API로 내놓자'고 결론 내렸죠."}, {"start": 796.44, "end": 799.39, "text": "다른 누군가가 이걸로 뭘 만들지 알아내 주길 바라면서요."}, {"start": 799.44, "end": 805.39, "text": "그렇게 2020년 여름쯤 GPT-3 API를 출시하게 됐습니다."}, {"start": 805.44, "end": 811.0, "text": "그런데 초기에는 정말 아무런 반응이 없더라고요."}, {"start": 811.0, "end": 816.509, "text": "그러다 한 달쯤 뒤에, 저희가 알기로는 무작위로 트위터에서 입소문이 났어요."}, {"start": 816.558, "end": 820.07, "text": "같은 날 몇몇 개발자가 우연히 발견해서는"}, {"start": 820.12, "end": 823.109, "text": "멋진 결과물을 만들어 올렸고, 다른 이들도 따라 하기 시작했죠."}, {"start": 823.158, "end": 827.7090000000001, "text": "그러더니 수많은 사람이 API를 써보기 시작했습니다."}, {"start": 827.759, "end": 829.7090000000001, "text": "하지만 성능은 충격적일 만큼 형형없었죠."}, {"start": 829.759, "end": 833.749, "text": "그때로 돌아가서 GPT-3나 3.5를 다시 써보신다면"}, {"start": 833.798, "end": 837.67, "text": "모델 수준이 얼마나 낮았는지 보고 깜짝 놀라실 거예요."}, {"start": 837.72, "end": 839.79, "text": "당시에 쏟아졌던 엄청난 관심에 비하면 말이죠."}, {"start": 839.84, "end": 841.989, "text": "당시에 일으켰던 화제성에 비해서는 정말 별로였죠."}, {"start": 842.038, "end": 843.869, "text": "사람들은 온갖 시도를 했지만 정말이지..."}, {"start": 843.918, "end": 847.67, "text": "유의미한 성과를 낸 비즈니스 분야는 딱 하나뿐이었어요."}, {"start": 847.72, "end": 854.39, "text": "바로 GPT-3를 활용한 카피라이팅이었죠. 별로 대단하지도, 흥미롭지도 않아서 저희는 그냥"}, {"start": 854.44, "end": 860.19, "text": "\"더 나은 모델이 나오기 전의 단계일 뿐이야\"라고 생각했어요. 유일하게 돌아가는 사업이긴 했지만요."}, {"start": 860.24, "end": 866.27, "text": "하지만 개발자들은 프롬프트를 넣어 모델과 대화하는 법을 이미 알아낸 상태였죠."}, {"start": 866.32, "end": 873.469, "text": "그런 광경이 자주 보였어요. 비즈니스에 API를 제대로 활용하지는 못해도"}, {"start": 873.519, "end": 877.31, "text": "API 키를 써서 그냥 대화는 즐기더라고요. 그래서 저희는 괜찮은 챗봇을 만들 수 있겠다고 생각했죠."}, {"start": 877.36, "end": 882.56, "text": "사람들이 분명 그걸 원했으니까요. 마침 새 모델도 있었고요. 사실 GPT-4는 이미 완성됐었지만"}, {"start": 882.61, "end": 888.239, "text": "그사이에 출시할 3.5라는 새 모델이 준비된 상태였죠. 새로운 방식의 사후 학습법도 찾아냈고요."}, {"start": 888.288, "end": 892.079, "text": "모델이 지시를 아주 잘 따르도록 훈련시켜서 훨씬 쉽게"}, {"start": 892.129, "end": 899.969, "text": "대화할 수 있게 만들었습니다. 당시 API 수익은 1,000만 달러나 2,000만 달러 정도로 시원치 않았거든요."}, {"start": 900.019, "end": 906.369, "text": "...달러 규모의 매출을 올리는 사업이었죠. 하지만 사람들이 열광하는 무언가가 있었고, YC의 원칙에 따라"}, {"start": 906.418, "end": 908.249, "text": "사용자가 무엇을 좋아하는지 파악해서 실행에 옮기기로 했습니다."}, {"start": 908.298, "end": 910.53, "text": "그래서 \"좋아, 여기에 챗봇을 한 번 입혀보자\"라고 했죠."}, {"start": 910.58, "end": 911.69, "text": "그렇게 서비스를 출시했는데,"}, {"start": 911.74, "end": 912.89, "text": "사실 이렇게까지 잘될 줄은 꿈에도 몰랐습니다."}, {"start": 912.94, "end": 917.0889999999999, "text": "처음에는 그저 연구용 데모 같은 성격이었거든요."}, {"start": 917.139, "end": 919.369, "text": "다른 사람들이 우리처럼 챗봇 기반 제품을 만들도록 설득하고"}, {"start": 919.418, "end": 922.379, "text": "우리 API를 유료로 쓰게 하려는 의도였죠."}, {"start": 922.428, "end": 924.3, "text": "그런데 그게 엄청난 기세로 퍼져나가더니 대박이 난 거예요."}, {"start": 924.35, "end": 926.499, "text": "제가 YC에서 배운 것 중 또 하나는,"}, {"start": 926.548, "end": 928.499, "text": "어떤 것이 폭발적으로 성장하기 시작했는데"}, {"start": 928.548, "end": 932.3389999999999, "text": "정작 완성도는 높지 않다면, 그건 확실한 성공이 보장된 거나 다름없다는 겁니다."}, {"start": 932.389, "end": 936.369, "text": "한 5일 동안은 트래픽이 치솟다가도 다시 푹 꺾이곤 했는데,"}, {"start": 936.418, "end": 937.609, "text": "그럴 때면 다들 이렇게 말했죠."}, {"start": 937.658, "end": 939.249, "text": "\"거봐, 그냥 반짝 유행(hype cycle)이었네.\" 하지만 다음 날이면"}, {"start": 939.298, "end": 940.65, "text": "이전보다 더 높은 정점을 찍으며 올라갔습니다."}, {"start": 940.7, "end": 942.05, "text": "오후에 다시 트래픽이 빠지면 사람들은 또 말했죠."}, {"start": 942.1, "end": 943.879, "text": "\"그거 봐요, 일시적인 거라니까요.\""}, {"start": 943.928, "end": 945.599, "text": "하지만 4~5일째가 되자 저는 확신했습니다."}, {"start": 945.649, "end": 946.719, "text": "\"아, 이게 어떻게 돌아가는 상황인지 알겠다\"라고요."}, {"start": 946.769, "end": 947.68, "text": "앞으로 무슨 일이 벌어질지 알았죠."}, {"start": 947.73, "end": 952.123, "text": "우리에겐 대박을 터뜨릴 제품을 만들 잠재력이 있었거든요."}, {"start": 952.173, "end": 952.8389999999999, "text": "남: 음."}, {"start": 952.889, "end": 955.28, "text": "훨씬 더 잘 만들 수 있다는 것도 알았고요."}, {"start": 955.33, "end": 956.8389999999999, "text": "우리에겐 GPT-4가 있다는 걸 알았고"}, {"start": 956.889, "end": 959.879, "text": "계속해서 확장할 수 있다는 것도 알았습니다."}, {"start": 959.928, "end": 964.14, "text": "하지만 5일째 되던 날, 모두를 불러 모았어요."}, {"start": 964.19, "end": 965.579, "text": "\"지금은 비상사태입니다\"라고 말했죠."}, {"start": 965.629, "end": 965.94, "text": "남: 음."}, {"start": 965.99, "end": 967.499, "text": "좋은 의미의 비상사태였지만요."}, {"start": 967.548, "end": 971.277, "text": "회사와 제품을 동시에 구축해야만 했거든요."}, {"start": 971.326, "end": 972.099, "text": "남: 음."}, {"start": 972.149, "end": 975.7, "text": "그 후 두 달 동안 미친 듯이 규모를 키웠습니다."}, {"start": 975.75, "end": 978.9, "text": "수익 모델은 나중에 생각하자고 했죠."}, {"start": 978.95, "end": 983.099, "text": "당장은 비용 문제 때문에 유료화하기로 했고요."}, {"start": 983.149, "end": 984.565, "text": "물론 그게 장기적인 해답은 아니었지만요."}, {"start": 984.615, "end": 984.9, "text": "남: 음."}, {"start": 984.95, "end": 987.7, "text": "그런데 그게 제대로 통했습니다."}, {"start": 987.75, "end": 989.3, "text": "그것이 바로 ChatGPT의 시작이었죠."}, {"start": 989.35, "end": 993.42, "text": "활용도가 너무 높아서 사람들이 그동안 넘지 못했던"}, {"start": 993.47, "end": 998.02, "text": "활성화 에너지를 넘어서게 됐고, 정말 잘 작동했어요."}, {"start": 998.07, "end": 1001.15, "text": "그리고 코덱스 얘기인데, 사실 ChatGPT 이전의 계획은"}, {"start": 1001.2, "end": 1001.64, "text": "남: 음."}, {"start": 1001.69, "end": 1004.479, "text": "코딩 분야에 모든 사활을 걸 계획이었습니다."}, {"start": 1004.528, "end": 1006.64, "text": "이 모델들이 코드를 짤 수 있다는 걸 알고 있었으니까요."}, {"start": 1006.69, "end": 1009.2, "text": "저희는 그 가능성이 정말 무궁무진하다는 걸 알고 있었고"}, {"start": 1009.25, "end": 1010.92, "text": "그 분야가 아주 가치 있는 영역이 될 거라 확신했죠."}, {"start": 1010.97, "end": 1014.04, "text": "그런데 그때 정말 놀랍고 흥미진진한 일이 벌어졌습니다."}, {"start": 1014.09, "end": 1016.04, "text": "당시 저희 내부적인 믿음은 이랬어요."}, {"start": 1016.09, "end": 1020.599, "text": "코딩은 이런 모델들이 컴퓨터상의 요소들을 제어하는 방식이 될 것이고,"}, {"start": 1020.649, "end": 1022.33, "text": "로봇 공학은"}, {"start": 1022.33, "end": 1024.548, "text": "이런 모델들이 물리적 세계의 요소들을"}, {"start": 1024.597, "end": 1025.709, "text": "제어하는 방식이 될 거라는 거였죠."}, {"start": 1025.759, "end": 1027.11, "text": "만약 충분히 똑똑한 모델을 만들어서"}, {"start": 1027.16, "end": 1029.35, "text": "코드 작성과 같은 실행 장치와"}, {"start": 1029.4, "end": 1032.11, "text": "로봇 구동 능력을 갖추게 한다면,"}, {"start": 1032.16, "end": 1034.83, "text": "그런 지능을 활용해 현실 세계에서"}, {"start": 1034.88, "end": 1036.509, "text": "실제로 무언가를 수행하게 할 수 있을 테니까요."}, {"start": 1036.558, "end": 1038.989, "text": "그래서 그 단계에 도달하기까지 시간이 좀 걸렸습니다."}, {"start": 1039.038, "end": 1043.62, "text": "그러다 올해 초쯤 Codex의 성능이 정말 좋아졌다고 생각했는데,"}, {"start": 1043.67, "end": 1046.739, "text": "버전 5.5에 이르러서야 진정한 변곡점을 맞이하게 됐죠."}, {"start": 1046.788, "end": 1050.94, "text": "이제 사람들이 그걸로 정말 믿기 힘든 일들을 해내고 있거든요."}, {"start": 1050.99, "end": 1058.959, "text": "수업 초반에 저희는 역량 파이프라인이 어떤 모습으로 보이기 시작했는지에 대해 이야기 나눴습니다."}, {"start": 1059.009, "end": 1063.4, "text": "이제 여러 연구 그룹 사이에서 어느 정도 명확한 표준이 잡혀가고 있는 것 같아요."}, {"start": 1063.45, "end": 1068.36, "text": "사전 학습, 중간 학습, 사후 학습이 있고, 그다음에 RL(강화 학습)과 지도 피드백 루프가 있죠."}, {"start": 1068.41, "end": 1074.558, "text": "남1: 코덱스가 비약적인 성능 향상을 이룰 수 있게 해준 파이프라인의 형태가 대략 이렇다고 보시나요?"}, {"start": 1074.608, "end": 1079.64, "text": "남1: 그리고 이 방식이 앞으로도 안정적으로 유지될까요, 아니면 파이프라인을 대대적으로 개편하게 될까요?"}, {"start": 1079.69, "end": 1081.798, "text": "남2: 확실히 지금은 그런 파이프라인을 사용하고 있죠."}, {"start": 1081.848, "end": 1083.88, "text": "남2: 하지만 저는 대대적인 개편을 거치게 될 거라 예상합니다."}, {"start": 1083.93, "end": 1086.44, "text": "남2: 정확히 언제, 어떤 방식이 될지는 모르겠지만요."}, {"start": 1086.49, "end": 1093.15, "text": "남2: 사실 파이프라인 형태로 진행된다는 것 자체가 제게는 조금 의아하긴 해요."}, {"start": 1093.2, "end": 1098.028, "text": "남2: 완벽하게 최적의 해결책이라는 느낌이 들지는 않거든요."}, {"start": 1098.078, "end": 1100.35, "text": "남1: 그렇다면 본인이 생각하는 최적의 해결책은 무엇인가요?"}, {"start": 1100.4, "end": 1103.43, "text": "남2: 그건 AI들이 스스로 해결해야 할 연구 과제라고 봅니다."}, {"start": 1103.48, "end": 1106.229, "text": "남2: 현재 저희는 이런 목표를 설정한 시점에 와 있어요."}, {"start": 1106.278, "end": 1107.989, "text": "남2: 올해 9월까지 말이죠."}, {"start": 1108.038, "end": 1111.19, "text": "남2: A100급 GPU 50만 개에 달하는 연산 능력을 투입할 겁니다."}, {"start": 1111.24, "end": 1114.19, "text": "남2: AI 연구 인턴에게 엄청난 컴퓨팅 파워를 제공하는 셈이죠."}, {"start": 1114.24, "end": 1117.39, "text": "남2: 그리고 2028년 3월까지는 완전한 엔드 투 엔드 시스템과..."}, {"start": 1117.44, "end": 1119.59, "text": "남2: 아주 유능한 연구자 역량을 확보하게 될 겁니다."}, {"start": 1119.64, "end": 1123.35, "text": "남2: 완전히 새로운 아키텍처를 설계하는 수준으로 말이죠."}, {"start": 1123.4, "end": 1125.19, "text": "남2: 그래서 제 생각에는,"}, {"start": 1125.24, "end": 1127.63, "text": "남2: 현재의 파이프라인과 아키텍처만으로도..."}, {"start": 1127.68, "end": 1128.989, "text": "남2: 결국 임계점을 넘어서게 될 것 같아요."}, {"start": 1129.038, "end": 1133.509, "text": "남2: AI가 정말로 놀라운 성과를 내기 시작하는 그 시점 말이죠."}, {"start": 1133.558, "end": 1139.038, "text": "방금 말씀하신 내용 중에서 한 가지 짚어보자면"}, {"start": 1139.038, "end": 1142.068, "text": "저희 수업에서도 많이 다뤘던 주제인데요"}, {"start": 1142.118, "end": 1144.989, "text": "특정 개념을 설명하기 위해 시스템 프레임워크나 비유를 활용해"}, {"start": 1145.038, "end": 1146.83, "text": "배경지식이 없는 다른 분야의 사람들도"}, {"start": 1146.88, "end": 1149.269, "text": "쉽게 이해할 수 있게 만드는 방식이죠"}, {"start": 1149.318, "end": 1153.509, "text": "그런데 때로는 이런 '번역'의 과정 때문에"}, {"start": 1153.558, "end": 1155.509, "text": "비유를 통한 추론이 오히려 독이 될 때가 있습니다"}, {"start": 1155.558, "end": 1157.469, "text": "오류가 복합적으로 쌓이기 때문이죠"}, {"start": 1157.519, "end": 1160.269, "text": "남: 방금 AI를 '인턴'처럼 활용하는 것이"}, {"start": 1160.318, "end": 1162.709, "text": "남: 목표라고 하셨는데, 이는 분명 유용한 비유입니다"}, {"start": 1162.759, "end": 1166.15, "text": "실리콘 밸리처럼 이런 파이프라인의 작동 원리를"}, {"start": 1166.2, "end": 1167.749, "text": "잘 이해하고 있는 집단에게는 말이죠"}, {"start": 1167.798, "end": 1170.87, "text": "하지만 이 비유를 전 세계로 확장하다 보면"}, {"start": 1170.92, "end": 1172.91, "text": "맥락을 모르는 사람들은"}, {"start": 1172.96, "end": 1175.59, "text": "이 모델들을 부적절한 방식으로 비유하기 시작합니다"}, {"start": 1175.64, "end": 1179.308, "text": "이런 비유의 한계에 대해 어떻게 생각해야 할까요?"}, {"start": 1179.358, "end": 1182.558, "text": "규모 확장의 한계는 무엇이며"}, {"start": 1182.558, "end": 1185.308, "text": "밸리 내에서 가장 유용하다고 느끼는"}, {"start": 1185.358, "end": 1187.63, "text": "제품이나 연구 관련 비유는 무엇인가요?"}, {"start": 1187.68, "end": 1189.469, "text": "그리고 그 과정에서 무엇을 느끼셨나요?"}, {"start": 1189.519, "end": 1192.91, "text": "남1: ...그런 비유를 확장하는 데 한계가 있다는 말씀인가요?"}, {"start": 1192.96, "end": 1196.989, "text": "남1: 그럼 그 두 문제 사이를 어떻게 조율하고 계시나요?"}, {"start": 1197.038, "end": 1200.43, "text": "남2: 저는 그 과정을 연구하는 데 아주 관심이 많았습니다."}, {"start": 1200.48, "end": 1205.788, "text": "남2: 제 생각엔 우리가 새로운 공공 서비스, 즉 '유틸리티'를 만드는 과정에 있는 것 같아요."}, {"start": 1205.838, "end": 1207.548, "text": "남2: 이런 일은 자주 있는 게 아니죠."}, {"start": 1207.598, "end": 1209.788, "text": "남2: 전기도 유틸리티고, 인터넷도 유틸리티입니다."}, {"start": 1209.838, "end": 1211.788, "text": "남2: 물도 그렇고요. 이런 사례가 그리 많지 않아요."}, {"start": 1211.838, "end": 1219.788, "text": "남2: 그래서 이것을 세상에 어떻게 설명해야 할지, 좋은 비유나 교훈을 얻을 만한 사례가 부족합니다."}, {"start": 1219.838, "end": 1225.788, "text": "남2: 하지만 최근에 전기가 처음 유틸리티가 되었을 때 어떤 일이 있었는지 살펴봤어요."}, {"start": 1225.838, "end": 1229.308, "text": "남2: 여러 가지 이유로 아주 좋은 비유가 되더군요."}, {"start": 1229.358, "end": 1234.67, "text": "남2: 물론 완벽하진 않지만요. 당시 전기 회사들은, 적어도 제가 정보를 찾을 수 있었던 곳들은..."}, {"start": 1234.72, "end": 1237.87, "text": "남2: ...전기를 판다는 말은 하지 않았어요. 전기가 뭔지, 왜 필요한지 아무도 몰랐으니까요."}, {"start": 1237.92, "end": 1241.308, "text": "남2: 전기는 아주 무서운 것처럼 들리거든요. 집에 들어와서 사람을..."}, {"start": 1241.358, "end": 1246.35, "text": "남2: 아주 끔찍하게 죽일 수도 있는 거니까요. 이전 세상과는 아주 다르게 느껴졌을 겁니다."}, {"start": 1246.4, "end": 1253.068, "text": "남2: 처음엔 전기를 팔거나 마케팅하려고 시도했을지도 모르죠. 저도 잘 모르겠지만요."}, {"start": 1253.118, "end": 1258.64, "text": "남2: 어쨌든 그건 효과가 없었고, 대신 사람들에게 팔기 시작한 건 '밤을 밝히는 빛'이었습니다."}, {"start": 1258.69, "end": 1263.278, "text": "남2: \"우리가 드리는 건 전기가 아닙니다. 밤을 밝히는 빛이죠.\""}, {"start": 1263.328, "end": 1267.08, "text": "남2: \"참고로 빛을 내는 것과 같은 원리로 다른 것들도 할 수 있습니다\"라고 했죠."}, {"start": 1267.13, "end": 1269.6, "text": "남2: 하지만 사람들은 \"그런 게 왜 필요하죠?\"라고 물었고..."}, {"start": 1269.65, "end": 1272.4, "text": "남2: \"글쎄요, 언젠가는 이걸로 빨래도 할 수 있게 될 겁니다\" 같은 식이었죠."}, {"start": 1272.45, "end": 1275.16, "text": "아니, 아니, 난 못 해요. 저한텐 너무 큰 도약이라서요."}, {"start": 1275.21, "end": 1276.16, "text": "좋습니다."}, {"start": 1276.21, "end": 1281.4, "text": "그래서, 이걸 어떤 식으로 비유해야 할지 모르겠네요."}, {"start": 1281.45, "end": 1288.019, "text": "하지만 제 생각에는, 설령 저희 말이 전적으로 옳아서 지능이 새로운 공공 서비스가 된다고 해도..."}, {"start": 1288.068, "end": 1291.588, "text": "모든 기업, 모든 고객,"}, {"start": 1291.588, "end": 1295.219, "text": "모든 정부가 필요로 하고 온갖 놀라운 방식으로"}, {"start": 1295.269, "end": 1297.86, "text": "사용하게 될 그런 서비스 말이죠. 그리고 마치"}, {"start": 1297.91, "end": 1300.42, "text": "OpenAI 토큰 구독 서비스 같은 걸 갖게 되어서"}, {"start": 1300.47, "end": 1303.058, "text": "모든 것에 연결해 모든 것을 이용하는 데 쓰고,"}, {"start": 1303.108, "end": 1305.459, "text": "항상 가동하면서 이 놀라운 일들을 해내겠죠."}, {"start": 1305.509, "end": 1308.979, "text": "제 생각에, 적어도 지금 당장은 우리가 이걸"}, {"start": 1309.028, "end": 1311.778, "text": "'지능을 판매한다'라고 분석하는 건 맞지 않는 것 같아요. 사람들에게"}, {"start": 1311.828, "end": 1314.43, "text": "왠지 와닿지 않는 모양이거든요."}, {"start": 1314.48, "end": 1318.11, "text": "\"밤에 전기를 판다\"는 말에 상응하는 우리만의 표현이"}, {"start": 1318.16, "end": 1323.15, "text": "무엇이 될지는 모르겠지만, 우리가 새로운 공공 서비스가 되려면 방법을 찾아야 한다고 봅니다."}, {"start": 1323.2, "end": 1328.028, "text": "뭐든 원하는 걸 할 수 있는 이런 '지능의 파이프'를 갖는다는 게"}, {"start": 1328.078, "end": 1336.469, "text": "세상에 어떤 의미인지 설명할 방법을요. 그래서 한 가지 질문이 생겼는데, 다양한 연사가 참여하는"}, {"start": 1336.519, "end": 1341.028, "text": "이 수업의 특징 중 하나가 바로 '공공 서비스' 비유가 여러 번 나왔다는 점입니다."}, {"start": 1341.078, "end": 1347.028, "text": "하지만 서로 다른 대상을 가리키고 있죠. 젠슨 황은 컴퓨팅을 공공 서비스에 비유하며"}, {"start": 1347.078, "end": 1355.028, "text": "왜 접근성이 보장되어야 하는지 등을 설명했고, 스탠퍼드가 예산을 모아 캠퍼스의 모든 이들을 위한 공공 서비스로서 이를 조달해야 한다고 말했습니다."}, {"start": 1355.078, "end": 1358.028, "text": "남: 지능적인 측면에서 보면 유틸리티에 가깝다고 하셨는데..."}, {"start": 1358.078, "end": 1362.028, "text": "남: 두 가지 견해 중 어느 쪽이 맞을까요? 혹은 무엇이 더 가능성이 높을까요?"}, {"start": 1362.078, "end": 1366.028, "text": "남: 컴퓨팅 자원을 유틸리티로 보는 것과 토큰을 유틸리티로 보는 것의 차이를 어떻게 이해해야 할까요?"}, {"start": 1366.078, "end": 1369.028, "text": "남: 그러니까, 칩이냐 토큰이냐의 문제죠. 제 말이 이해가 되시나요?"}, {"start": 1369.078, "end": 1374.548, "text": "여: 제 생각에 기업이나 개인 같은 소비자 입장에서는..."}, {"start": 1374.598, "end": 1380.548, "text": "여: 토큰에 더 가까운 개념이나, 아마 그보다 한 단계 더 높은 차원을 생각하게 될 거예요."}, {"start": 1380.598, "end": 1386.548, "text": "여: 하드웨어가 어디 있는지, 어떤 칩을 쓰는지 같은 건 별로 중요하지 않겠죠."}, {"start": 1386.598, "end": 1389.548, "text": "여: 무엇이 구동하는지도요. 그런 세세한 부분은 전부 추상화될 겁니다."}, {"start": 1389.598, "end": 1395.63, "text": "여: 소비자에게 중요한 건 시스템과 상호작용하는 그 자체예요."}, {"start": 1395.68, "end": 1398.63, "text": "여: 비용이 저렴한지, 제 성능을 내는지 같은 것들이죠."}, {"start": 1398.68, "end": 1408.568, "text": "여: 지금은 토큰 중심이지만, 앞으로 우리 곁에서 항상 도움을 주는 에이전트가 상시 가동되는 세상이 오면..."}, {"start": 1408.618, "end": 1415.719, "text": "여: 한 단계 더 나아간 개념이 되겠지만, 제 생각엔 휴대폰 요금을 내는 것과 비슷할 것 같아요."}, {"start": 1415.769, "end": 1417.308, "text": "여: 이렇게 생각하는 거죠."}, {"start": 1417.358, "end": 1421.93, "text": "여: '통화 시간과 데이터 용량을 사는 거야'라고요."}, {"start": 1421.98, "end": 1429.808, "text": "여: 온갖 앱을 쓰며 많은 걸 하겠지만, 인터넷이라는 유틸리티에 비용을 지불한다는 건 결국..."}, {"start": 1429.858, "end": 1435.028, "text": "여: 전체 시스템과 기지국의 특정 하드웨어에 접근 권한을 얻는 거나 마찬가지거든요."}, {"start": 1435.078, "end": 1437.739, "text": "여: 인터넷이 어떻게 연결되는지 같은 복잡한 건 신경 쓰지 않죠."}, {"start": 1437.788, "end": 1442.14, "text": "남: 유틸리티 인프라에 대해 밤새도록 이야기할 수도 있겠지만,"}, {"start": 1442.19, "end": 1445.34, "text": "남: 학생분들에게 좀 더 와닿는 이야기로 주제를 좀 바꿔보고 싶네요."}, {"start": 1445.39, "end": 1449.739, "text": "남: 보통은 질문을 받는 시간을 갖는데, 여러분만 괜찮으시다면 오늘은 바로 넘어가겠습니다."}, {"start": 1449.788, "end": 1451.739, "text": "남1: 아, 좋습니다. 아주 잘 들리네요. 개선됐어요."}, {"start": 1451.788, "end": 1459.43, "text": "남1: 자, 창의력을 자극할 마지막 질문은 이 수업의 기말 프로젝트에 관한 겁니다."}, {"start": 1459.48, "end": 1463.11, "text": "남1: CS183 과정의 '1인 프런티어 랩' 프로젝트인데요."}, {"start": 1463.16, "end": 1465.028, "text": "남1: 수강생 전원이 각자 프로젝트를 진행 중인데"}, {"start": 1465.078, "end": 1468.989, "text": "남1: 개인이 하나의 연구소처럼 활동하는 상황을 시뮬레이션하고 있죠."}, {"start": 1469.038, "end": 1470.308, "text": "남1: 필요한 도구는 전부 갖춘 채로 말이죠."}, {"start": 1470.358, "end": 1471.509, "text": "남1: 클라우드플레어로부터 수십만 달러 규모의"}, {"start": 1471.558, "end": 1472.95, "text": "남1: 크레딧을 지원받았고"}, {"start": 1473.0, "end": 1475.63, "text": "남1: 아마 오픈AI 토큰도 좀 지원됐을 겁니다."}, {"start": 1475.68, "end": 1478.35, "text": "남1: 마음껏 활용할 수 있는 컴퓨팅 자원이 널려 있는 셈이죠."}, {"start": 1478.4, "end": 1480.509, "text": "남1: 샘, 만약 이 수업을 듣는 학생이라면"}, {"start": 1480.558, "end": 1482.39, "text": "남1: 본인만의 '1인 프런티어 랩' 프로젝트로"}, {"start": 1482.44, "end": 1484.38, "text": "남1: 어떤 연구를 해보고 싶으신가요?"}, {"start": 1484.43, "end": 1488.759, "text": "남2: 우선, 정말 환상적인 프로젝트라고 생각합니다."}, {"start": 1488.808, "end": 1495.63, "text": "남2: 방금 유틸리티 프레임워크 이야기를 나눠서 그런지 이게 가장 먼저 떠오르네요."}, {"start": 1495.68, "end": 1502.65, "text": "남2: 지금 수많은 인재가 훌륭한 학습 방식을 연구하고 있어서"}, {"start": 1502.65, "end": 1504.719, "text": "남2: 조만간 혁신적인 모델들이 등장할 겁니다."}, {"start": 1504.769, "end": 1506.6, "text": "남2: 여러분이 무엇을 하든 대단한 모델이 탄생할 거예요."}, {"start": 1506.65, "end": 1509.59, "text": "남2: 정말 곧 그렇게 될 거라고 장담합니다."}, {"start": 1509.64, "end": 1516.219, "text": "남2: 하지만 방대한 양의 데이터를 대규모로 서비스하는 기술에는 아직 충분한 투자가 이루어지지 않은 것 같아요."}, {"start": 1516.269, "end": 1517.62, "text": "샘: ...저렴한 지능에 대해서요."}, {"start": 1517.67, "end": 1520.62, "text": "샘: 그래서 아마 스택의 추론 계층 같은 걸 연구하게 될 것 같아요."}, {"start": 1520.67, "end": 1525.259, "text": "샘: 어떻게 이 놀라운 지능을 저렴하고 풍부하게 보급할 수 있을까요?"}, {"start": 1525.308, "end": 1527.259, "text": "샘: 제 생각에 그 분야는 아직 투자가 미흡한 것 같아요."}, {"start": 1527.308, "end": 1531.66, "text": "샘: 그리고 모든 프런티어 연구소들은 결국 추론 기업이 되어야 할 겁니다."}, {"start": 1531.71, "end": 1534.229, "text": "샘: 어느 정도 상당한 수준까지 말이죠."}, {"start": 1534.278, "end": 1536.11, "text": "사회자: 좋습니다."}, {"start": 1536.16, "end": 1539.308, "text": "사회자: 프로젝트 방향을 바꾸기엔 좀 늦었을 수도 있겠지만, 안 하는 것보다는 낫죠."}, {"start": 1539.358, "end": 1540.35, "text": "사회자: 뭐든 여러분이 하고 싶은 걸 하세요."}, {"start": 1540.4, "end": 1541.548, "text": "샘: [웃음] 네."}, {"start": 1541.598, "end": 1547.229, "text": "사회자: 이제 질문을 받아보겠습니다. 제가 진행을 맡을 텐데, 가급적 생산적인 질문을 해주세요."}, {"start": 1547.278, "end": 1548.509, "text": "사회자: 너무 자극적이지 않게 부탁드립니다."}, {"start": 1548.558, "end": 1553.229, "text": "사회자: 이게 컴퓨터 과학 수업이라는 점 잊지 마시고요. 샘, 본인이 괜찮다면 자극적인 질문도 좋습니다."}, {"start": 1553.278, "end": 1556.229, "text": "사회자: 오, 질문이 있네요. 좋습니다. 자, 첫 번째 질문입니다."}, {"start": 1556.278, "end": 1563.788, "text": "질문자: 거대언어모델(LLM)이 막다른 길이라는 얀 르쿤의 견해에 대해 어떻게 생각하시나요?"}, {"start": 1563.838, "end": 1568.788, "text": "샘: 우선 인간 수준의 지능을 달성한다는 측면에서 이 모델들은 이미..."}, {"start": 1568.838, "end": 1572.788, "text": "샘: 어떤 면에서는 인간의 지능을 넘어섰지만, 어떤 면에서는 훨씬 뒤처져 있습니다."}, {"start": 1572.838, "end": 1581.68, "text": "샘: 예를 들어, 장기적인 안목이나 고도의 판단력이 필요한 과업에서는..."}, {"start": 1581.68, "end": 1590.519, "text": "샘: 사람보다 훨씬 못하죠. 반면에 어제 저희 모델 중 하나가..."}, {"start": 1590.519, "end": 1595.259, "text": "샘: 똑똑한 사람들이 매달렸던 에르되시 문제 중 하나의 추측이 틀렸음을 입증해 냈습니다."}, {"start": 1595.308, "end": 1599.259, "text": "오랫동안 지속되어 왔죠. 수많은 사람, 그것도 똑똑한 과학자들이..."}, {"start": 1599.308, "end": 1603.538, "text": "얀 르쿤이 그중 하나였는지는 모르겠지만, 꽤 최근까지도 그런 일은..."}, {"start": 1603.588, "end": 1608.34, "text": "일어나지 않을 거라고 단언했었죠. 그런데 모델이 그냥 해낸 거예요. 이제는 모든..."}, {"start": 1608.39, "end": 1613.298, "text": "수학자들이 \"수학은 끝난 건가? 우리 분야에 어떤 의미지?\"라고 말해요. 확실히..."}, {"start": 1613.348, "end": 1619.17, "text": "LLM은 새로운 지식을 찾아낼 능력이 있고, 분명히..."}, {"start": 1619.22, "end": 1624.528, "text": "인간은 할 수 없는 몇몇 지능적 과업들을 수행할 수 있습니다. 앞으로 훨씬 더..."}, {"start": 1624.578, "end": 1628.93, "text": "확장될 거예요. 얼마나 더 나아질지, 인간보다 잘할 수 있는 영역이 어디까지일지는..."}, {"start": 1628.98, "end": 1635.249, "text": "지켜봐야겠지만, 전 아주 많을 거라고 봅니다. 그리고 아까 말했던..."}, {"start": 1635.298, "end": 1638.249, "text": "기하급수적 발전에 대한 불신에 대해 말하자면,"}, {"start": 1638.298, "end": 1640.45, "text": "솔직히 이 분야의 발목을 잡았던 건,"}, {"start": 1640.5, "end": 1642.808, "text": "한 세대의 과학자들이라고 생각해요."}, {"start": 1642.858, "end": 1645.09, "text": "그들은 무엇이 불가능할지에 대해 너무나 확신했죠."}, {"start": 1645.14, "end": 1647.69, "text": "스케일링으로 무엇을 만들어내지 못할지에 대해서요."}, {"start": 1647.74, "end": 1649.528, "text": "하지만 어떤 사람들은 그저 그래프를 보며 말했습니다."}, {"start": 1649.578, "end": 1651.33, "text": "\"음, 아주 아름답게 계속 이어지고 있네.\""}, {"start": 1651.38, "end": 1653.18, "text": "\"계속 가보자.\""}, {"start": 1654.858, "end": 1657.85, "text": "세계 모델(World Models)이 중요하다는 건 명백하고,"}, {"start": 1657.9, "end": 1662.19, "text": "로봇 공학 같은 분야에는 반드시 필요하겠지만,"}, {"start": 1662.24, "end": 1668.95, "text": "지금 시점에서 LLM의 스케일링이 안 될 거라고 내기를 거는 건,"}, {"start": 1669.0, "end": 1670.95, "text": "제가 보기엔 상당히 잘못된 판단인 것 같네요."}, {"start": 1671.0, "end": 1674.19, "text": "남1: '거봐, 내 말이 맞지'라고 말하는 사람 노릇도 이젠 지겹지 않나요?"}, {"start": 1674.24, "end": 1675.19, "text": "남2: 아뇨."}, {"start": 1675.24, "end": 1680.358, "text": "남2: 제 말은, 트위터 트롤들 있잖아요."}, {"start": 1680.358, "end": 1682.308, "text": "남2: 수년 동안 \"이건 안 될 거다\"라고 떠들던 사람들요."}, {"start": 1682.358, "end": 1683.308, "text": "남2: \"절대 안 될 거야.\""}, {"start": 1683.358, "end": 1684.308, "text": "남2: \"안 될 거야, 이건 너무 멍청한 짓이야.\""}, {"start": 1684.358, "end": 1685.308, "text": "남2: 뭐랄까, \"이건 사기다\"라든가."}, {"start": 1685.358, "end": 1686.308, "text": "남2: \"이 회사는 망할 거다.\""}, {"start": 1686.358, "end": 1687.308, "text": "남2: \"이 연구 방식은 실패할 거다\" 같은 소리들이요."}, {"start": 1687.358, "end": 1689.308, "text": "남2: 전에는 그런 말들에 더 신경 쓰이곤 했어요."}, {"start": 1689.358, "end": 1691.308, "text": "남2: 하지만 지금은 '거봐, 내가 말했잖아'라는 생각조차 안 들어요."}, {"start": 1691.358, "end": 1693.308, "text": "남2: 그냥 이런 느낌이죠. \"당신들은 그냥...\" [웃음] \"완전히 틀렸는데...\""}, {"start": 1693.358, "end": 1695.308, "text": "남2: \"아직도 그 소리를 하고 있네\" 싶거든요."}, {"start": 1695.358, "end": 1700.84, "text": "남2: 사실 데이터가 우리 쪽의 정당성을 확실히 보여주고 있잖아요."}, {"start": 1700.89, "end": 1704.259, "text": "남2: \"내 말이 맞지\"라고 말하는 게 딱히 즐거운 일도 아니고요."}, {"start": 1704.308, "end": 1705.9, "text": "남2: 그리고 우리가 틀렸다는 말을 아직도 하고 있다는 사실이..."}, {"start": 1705.95, "end": 1707.62, "text": "남2: 딱히 저를 괴롭히지는 않아요."}, {"start": 1707.67, "end": 1708.979, "text": "남2: 뭐랄까, 이제는 그냥 넘어간 것 같아요."}, {"start": 1709.028, "end": 1711.18, "text": "남2: 그런 격언이 있잖아요. 광기란..."}, {"start": 1711.23, "end": 1713.818, "text": "남2: 데이터를 보고도 똑같은 짓을 계속 반복하는 것이라는 말 말이죠."}, {"start": 1713.868, "end": 1715.58, "text": "잘 돌아가지 않는데도 그걸 계속 반복하죠."}, {"start": 1715.63, "end": 1719.019, "text": "어떤 의미에선 일종의 광기라고 생각해요."}, {"start": 1719.068, "end": 1720.94, "text": "제 생각에 이런 일이 벌어지는 이유는,"}, {"start": 1720.99, "end": 1722.868, "text": "자신의 정체성을"}, {"start": 1722.868, "end": 1728.73, "text": "특정 사안의 성공 여부에 결부시키기 때문입니다."}, {"start": 1728.73, "end": 1731.278, "text": "스스로를 그 믿음과 동일시해 버리면"}, {"start": 1731.328, "end": 1733.318, "text": "과학적인 근거나 실증적인 결과가"}, {"start": 1733.368, "end": 1735.83, "text": "그게 틀렸음을 입증하더라도,"}, {"start": 1735.88, "end": 1737.229, "text": "정체성에 너무 얽매인 나머지"}, {"start": 1737.278, "end": 1739.87, "text": "그걸 놓지 못하고 진실을 외면하게 되죠."}, {"start": 1739.92, "end": 1742.229, "text": "이건 정말 중요한 깨우침이라고 봅니다."}, {"start": 1742.278, "end": 1743.269, "text": "양쪽 모두에게 말이죠."}, {"start": 1743.318, "end": 1745.13, "text": "남: 네."}, {"start": 1745.13, "end": 1748.769, "text": "남: 교육은 어떻게 보시나요?"}, {"start": 1748.769, "end": 1750.719, "text": "교육은 분명 대대적으로 적응해야 합니다."}, {"start": 1750.769, "end": 1754.08, "text": "지금쯤이면 벌써 변했어야 했다고 보는데 우려스럽네요."}, {"start": 1754.13, "end": 1760.358, "text": "우리가 학생들을 가르치고 평가할 때"}, {"start": 1760.358, "end": 1763.94, "text": "여전히 AGI 이전 세상인 것처럼 대한다면,"}, {"start": 1763.99, "end": 1764.86, "text": "제대로 작동하지 않을 겁니다."}, {"start": 1764.91, "end": 1766.1, "text": "그러면 결국..."}, {"start": 1766.15, "end": 1768.219, "text": "사고력의 퇴화라든지 뭐 그런 거요."}, {"start": 1768.269, "end": 1770.538, "text": "그게 워낙 명확한 문제일 거라 생각했기에"}, {"start": 1770.588, "end": 1771.979, "text": "그렇게 크게 걱정하지는 않았어요."}, {"start": 1772.028, "end": 1773.1, "text": "ChatGPT가 출시됐을 때"}, {"start": 1773.15, "end": 1774.818, "text": "전 속으로 그랬죠. \"그래, 한 1년 정도는"}, {"start": 1774.868, "end": 1778.058, "text": "학생들이 부정행위를 하고 공부도 안 하겠지만"}, {"start": 1778.108, "end": 1780.538, "text": "결국 교육 시스템이 스스로를 재설계해서"}, {"start": 1780.588, "end": 1783.058, "text": "훨씬 더 잘 가르치게 될 거야.\""}, {"start": 1783.108, "end": 1786.479, "text": "학생들이 정말 제대로 된 프로젝트를 맡게 될 거예요."}, {"start": 1786.528, "end": 1789.36, "text": "AI를 활용해야만 완수할 수 있는 그런 과제들 말이죠."}, {"start": 1789.41, "end": 1791.239, "text": "하지만 여전히 뇌를 더 많이 써야 하고"}, {"start": 1791.288, "end": 1793.68, "text": "더 깊이 고민해서 새로운 걸 찾아내야 하죠."}, {"start": 1793.73, "end": 1806.298, "text": "솔직히 말하면, ChatGPT 출시 후 3년 반이 지났지만 교육 시스템 전반에서 유의미한 구조적 변화가 일어났는지는 잘 모르겠어요. 제 예측이 빗나간 셈이죠."}, {"start": 1806.348, "end": 1819.08, "text": "당연히 그런 변화가 일어날 줄 알았거든요. 이전의 모든 기술적 도약들이 그랬듯, 교육 방식도 결국 재설계되어 사고하는 법을 가르치게 될 거라 확신합니다."}, {"start": 1819.13, "end": 1826.328, "text": "전 글을 쓰면서 생각하는 사람이라 평소에 글을 아주 많이 써요."}, {"start": 1826.328, "end": 1829.64, "text": "남에겐 절대 보여주지 않을 글들이지만 무언가를 정리하는 데 제겐 여전히 중요하거든요."}, {"start": 1829.69, "end": 1831.92, "text": "그래서 전 글쓰기를 배운 게 정말 다행이라고 생각해요."}, {"start": 1831.97, "end": 1834.719, "text": "프로그래밍에 대해서도 다들 똑같은 말을 하죠."}, {"start": 1834.769, "end": 1838.479, "text": "기계가 더 잘할 수 있는 일이라도 여전히 사람들에게 가르칠 게 있을 겁니다."}, {"start": 1838.528, "end": 1844.318, "text": "사고와 학습이라는 '메타 기술'을 배우는 건 그 자체로 충분히 가치 있는 일이니까요."}, {"start": 1844.368, "end": 1848.86, "text": "하지만 우리가 가르치는 방식에 있어 완전히 새로워져야 할 부분들이 많아요."}, {"start": 1848.91, "end": 1851.42, "text": "가르치는 법, 배우는 법, 그리고 평가하는 법까지요."}, {"start": 1851.47, "end": 1855.979, "text": "그렇게 하지 않는다면, 제 생각엔 심각한 문제가 생길 거예요."}, {"start": 1856.028, "end": 1858.62, "text": "비판적 사고 능력이 퇴화하는 것 같은 문제 말이죠."}, {"start": 1858.67, "end": 1860.66, "text": "질문 하나 할게요. 가장 좋아했던 수업은 무엇이었나요?"}, {"start": 1860.71, "end": 1863.769, "text": "그리고 스탠퍼드 재학 시절, 듣지 못해 아쉬웠던 수업이 있다면요?"}, {"start": 1863.818, "end": 1867.759, "text": "스탠퍼드에는 아직 인트로셈(신입생 세미나)이 있나요? 전 1학년 때 분기마다 세 개씩 들었거든요."}, {"start": 1867.808, "end": 1869.519, "text": "거의 모든 세미나를 다 챙겨 들었던 것 같아요."}, {"start": 1869.568, "end": 1871.558, "text": "정말 모든 수업이 다 좋았어요."}, {"start": 1871.608, "end": 1873.959, "text": "내용도 정말 다양했고요."}, {"start": 1874.009, "end": 1881.1, "text": "하지만 돌이켜보면, 그렇게 폭넓은 경험을 할 수 있었다는 사실이..."}, {"start": 1881.15, "end": 1886.14, "text": "다양한 분야를 얕게나마 이해하고 접해볼 수 있었다는 게 정말 큰 도움이 됐어요."}, {"start": 1886.19, "end": 1889.42, "text": "만약 그렇지 않았다면, 전 그저 컴퓨터 공학이나 물리학 수업만 들었을 거예요."}, {"start": 1889.47, "end": 1896.17, "text": "물론 그것도 좋았겠지만, 지금 제가 하는 일과는 전혀 상관없는..."}, {"start": 1896.22, "end": 1901.729, "text": "당시에 무작위로 들었던 그 수업들이 더 기억에 남아요."}, {"start": 1901.778, "end": 1908.568, "text": "그 수업들이 어떤 중요한 방식으로 제게 새로운 관점을 열어줬거든요. 프로그래밍은 언제든 배울 수 있었겠지만요."}, {"start": 1908.618, "end": 1915.509, "text": "사실 그때는 저도 그렇게 생각했어요. 그냥 \"이것도 재밌네\" 정도였죠."}, {"start": 1915.558, "end": 1920.068, "text": "\"결국 중요한 건 컴퓨터 공학을 배우는 거야\"라고 생각했으니까요."}, {"start": 1920.118, "end": 1925.43, "text": "학교를 2년밖에 안 다녀서 듣고 싶었지만 못 들은 수업이 정말 많아요."}, {"start": 1925.48, "end": 1929.014, "text": "하지만 그건 이제 지나간 일이죠. 감사합니다."}, {"start": 1929.064, "end": 1935.322, "text": "제 질문은, 당신의 가장 파격적인 의견(Spiciest take)은 무엇인가요?"}, {"start": 1935.372, "end": 1939.69, "text": "음, 좀 더 생각할 시간이 필요할 것 같은데요."}, {"start": 1939.74, "end": 1943.59, "text": "더 자극적인 이야기를 할 수도 있겠지만,"}, {"start": 1943.64, "end": 1949.298, "text": "인공지능의 발전은 계속될 것이라고 생각합니다."}, {"start": 1949.298, "end": 1955.48, "text": "제 생각에 이건... 뭐랄까, 아직은"}, {"start": 1955.48, "end": 1956.39, "text": "널리 받아들여지지 않은 사실 같아요."}, {"start": 1956.44, "end": 1958.59, "text": "만약 이게 널리 믿어졌다면,"}, {"start": 1958.64, "end": 1961.759, "text": "현재 우리 사회에는 지금보다"}, {"start": 1961.759, "end": 1963.788, "text": "훨씬 더 큰 파장이 일고 있었을 겁니다."}, {"start": 1963.838, "end": 1965.269, "text": "어쩌면 제 이야기가 그렇게 파격적인 건 아닐지도 모르겠네요."}, {"start": 1965.318, "end": 1966.509, "text": "사실 이게 더 본질적인 부분일 수도 있고요."}, {"start": 1966.558, "end": 1969.72, "text": "하지만 인공지능의 발전이"}, {"start": 1969.72, "end": 1974.229, "text": "지금 같은 기하급수적인 속도로 계속된다면,"}, {"start": 1974.278, "end": 1975.709, "text": "ChatGPT가 나온 지 벌써 3년 반이 지났는데,"}, {"start": 1975.759, "end": 1978.67, "text": "앞으로 3년 반 동안 같은 궤적을 그리며 발전한다면,"}, {"start": 1978.72, "end": 1983.818, "text": "세상과 그 잠재력, 그리고 사회의 모습,"}, {"start": 1983.818, "end": 1986.969, "text": "우리 사회의 역량 자체가 완전히 달라질 겁니다."}, {"start": 1987.019, "end": 1988.13, "text": "남: 그럼 그 부분에 대해서"}, {"start": 1988.18, "end": 1991.6, "text": "남: 당신의 생각을 더 자극할 만한 질문을 드려보죠."}, {"start": 1991.65, "end": 1994.2, "text": "남: 만약 당신을 하나의 모델로 본다면,"}, {"start": 1994.25, "end": 1995.88, "text": "남: 그것도 최전선에 있는 프런티어 모델이라고 할 때,"}, {"start": 1995.93, "end": 1997.92, "text": "남: 당신에겐 어떤 내재된 역량이 있을 텐데,"}, {"start": 1997.97, "end": 2000.43, "text": "앞으로 몇 분 동안 사람들이 잘 모르는"}, {"start": 2000.48, "end": 2003.19, "text": "역량들을 이끌어내 보려고 합니다"}, {"start": 2003.24, "end": 2004.83, "text": "그중 하나는 당신이 현재"}, {"start": 2004.88, "end": 2008.548, "text": "OpenAI 내부뿐만 아니라 지속적으로"}, {"start": 2008.598, "end": 2010.028, "text": "외부의 피드백 루프를 통해"}, {"start": 2010.078, "end": 2013.229, "text": "무엇이 작동하고 무엇이 안 되는지를 세상으로부터 배우고 있다는 점이죠"}, {"start": 2013.278, "end": 2016.33, "text": "이제 당신을 잠시 예측 엔진으로 생각하고 질문하겠습니다"}, {"start": 2016.38, "end": 2019.229, "text": "향후 10년 동안 인류가 맞이할"}, {"start": 2019.278, "end": 2022.13, "text": "가장 가능성 높은 세 가지 시나리오는 무엇일까요?"}, {"start": 2022.18, "end": 2025.63, "text": "그리고 각각에 대한 확률적 평가는 어떻게 내리시나요?"}, {"start": 2025.68, "end": 2027.509, "text": "질문의 의도가 이해되시나요?"}, {"start": 2027.558, "end": 2031.99, "text": "매우 중요하다고 느껴지는 지점은"}, {"start": 2031.99, "end": 2035.068, "text": "이 기술이 얼마나 폭넓게"}, {"start": 2035.068, "end": 2040.17, "text": "보편화될 것인가, 아니면 소수 기업이 독점할 것인가 하는 부분입니다"}, {"start": 2040.22, "end": 2042.568, "text": "기본적으로 이 기술이 소수 기업에"}, {"start": 2042.618, "end": 2045.489, "text": "집중될 것이라고 예상할 수 있는"}, {"start": 2045.538, "end": 2047.009, "text": "온갖 이유가 있다고 봅니다"}, {"start": 2047.058, "end": 2050.128, "text": "그렇게 되면 그 기업들은 지구상 부의"}, {"start": 2050.179, "end": 2051.869, "text": "상당 부분을 차지하게 되겠죠"}, {"start": 2051.92, "end": 2053.068, "text": "그건 분명히 끔찍한 일일 겁니다"}, {"start": 2053.119, "end": 2055.389, "text": "우린 그 흐름에 맞서기 위해 정말 열심히 노력했어요."}, {"start": 2055.44, "end": 2056.588, "text": "하지만 제 생각에는,"}, {"start": 2056.639, "end": 2060.349, "text": "그걸 정말로 피하려면 전 세계적인 의지가 필요할 것 같아요."}, {"start": 2060.4, "end": 2062.23, "text": "일종의 '끌개 상태'가 존재하기 때문이죠."}, {"start": 2062.28, "end": 2064.269, "text": "그리고 우리가 세상을 이런 공공재 모델로"}, {"start": 2064.32, "end": 2066.429, "text": "밀어붙여야 하는 이유 중 하나는,"}, {"start": 2066.48, "end": 2069.699, "text": "첫째, 지금 상태는 꽤 불안정하고 나쁘기 때문이에요."}, {"start": 2069.75, "end": 2074.179, "text": "몇몇 기업이 이 모든 걸 독점한다면 무척 불공평하게 느껴지겠지만, 그건 명백한 정렬 실패이며"}, {"start": 2074.23, "end": 2080.179, "text": "매우 취약한 세상이 될 거예요. 우리가 원하는, 모두가 승리하고 모두의 가치가 반영되며,"}, {"start": 2080.23, "end": 2084.659, "text": "모두가 주체성을 갖는 세상을 만드는 최선의 방법은"}, {"start": 2084.71, "end": 2090.898, "text": "이 기술을 세상 밖으로 널리 퍼뜨리는 것입니다. 하지만 안전과 안정성을 근거로"}, {"start": 2090.949, "end": 2096.418, "text": "이에 반대하는 강력한 주장이 제기될 거예요. 그게 큰 분기점이 될 것이고, 매우 중요합니다."}, {"start": 2096.469, "end": 2098.579, "text": "여러분의 커리어에서도 이 기술이 세상에 퍼질 수 있도록"}, {"start": 2098.63, "end": 2101.46, "text": "강력하게 추진하시길 권합니다."}, {"start": 2101.51, "end": 2104.099, "text": "이건 놀라운 공상 과학 같은 미래를 가져다줄 기술이에요."}, {"start": 2104.15, "end": 2105.739, "text": "삶은 믿을 수 없을 정도로 훨씬 더 좋아질 수 있습니다."}, {"start": 2105.789, "end": 2107.898, "text": "그곳에 도달하기 위해 어느 정도의 위험은 감수해야겠지만,"}, {"start": 2107.949, "end": 2110.5, "text": "이 기술이 소수의 기업에 집중되는 위험은,"}, {"start": 2110.55, "end": 2111.418, "text": "비록 우리 회사가"}, {"start": 2111.469, "end": 2113.539, "text": "그 거대 기업 중 하나가 된다고 하더라도..."}, {"start": 2113.59, "end": 2114.659, "text": "그런 건 우리가 용납해서는 안 되는 일이죠."}, {"start": 2114.71, "end": 2117.218, "text": "그래서 그게 큰 분기점이 될 것 같아요."}, {"start": 2117.268, "end": 2121.128, "text": "확률적으로 말하자면, 제 생각에는..."}, {"start": 2121.179, "end": 2123.128, "text": "전 세계가 이런 관심을 가져야 합니다."}, {"start": 2123.179, "end": 2126.25, "text": "일이 이런 방향으로 흘러가는 것에 대해서요. 제 생각엔..."}, {"start": 2126.3, "end": 2129.099, "text": "우리가 민주적인 길로 갈 확률이 80% 정도 되지만,"}, {"start": 2129.15, "end": 2131.139, "text": "매우 강력한 안전 메시지가 나올 것이고"}, {"start": 2131.19, "end": 2134.019, "text": "권력을 쫓는 사람들이 아주 많아질 겁니다."}, {"start": 2134.07, "end": 2135.938, "text": "권력을 집중시키고 싶어 하는 사람들이죠."}, {"start": 2135.989, "end": 2142.09, "text": "그리고 이것을 예측하는 데 있어서 문제 중 하나는,"}, {"start": 2142.09, "end": 2144.759, "text": "당신이나 우리 인간 모두가 가진 문제인데,"}, {"start": 2144.809, "end": 2145.96, "text": "일단 그런 예측을 하고 나면"}, {"start": 2146.01, "end": 2149.278, "text": "남: 그 예측에 영향을 미칠 힘이 생기죠, 그렇죠?"}, {"start": 2149.329, "end": 2150.119, "text": "남: 예측 그 자체에요."}, {"start": 2150.17, "end": 2152.239, "text": "여: 글쎄요, 제 말은, 우리가 그 힘을 어디에 쓸지는 분명해요."}, {"start": 2152.289, "end": 2153.278, "text": "여: 이게 우리가 믿는 가치거든요."}, {"start": 2153.329, "end": 2157.048, "text": "여: 우리는 이 일을 추진하기 위해 할 수 있는 모든 것을"}, {"start": 2157.099, "end": 2158.048, "text": "여: 이 방향으로 쏟아부을 겁니다."}, {"start": 2158.099, "end": 2160.608, "text": "여: 다만 반대 방향으로 작용하는 힘들도 보이네요."}, {"start": 2160.659, "end": 2164.179, "text": "여: 어쩌면 연관된 다른 갈래일지도 모르죠."}, {"start": 2164.23, "end": 2166.46, "text": "미래의 경제 모델에 대한 이야기가 참 많죠."}, {"start": 2166.51, "end": 2168.739, "text": "보편적 기본 소득을 도입할 것인지,"}, {"start": 2168.789, "end": 2170.338, "text": "아니면 모든 사람이"}, {"start": 2170.389, "end": 2172.338, "text": "모든 기업의 지분을 조금씩 나누어 가질 것인지,"}, {"start": 2172.389, "end": 2175.659, "text": "아니면 지금의 자본주의 체제를 그대로 유지할 것인지 같은 것들이요."}, {"start": 2175.71, "end": 2177.778, "text": "완전히 공산주의로 가야 할까요?"}, {"start": 2177.829, "end": 2179.259, "text": "이런 논의는 정말 활발하게 이뤄지고 있습니다."}, {"start": 2179.309, "end": 2182.659, "text": "하지만 제가 보기에 별로 언급되지 않는 한 가지는"}, {"start": 2182.71, "end": 2186.179, "text": "바로 컴퓨팅 자원을 구체적으로 어떻게 배분하느냐는 것입니다."}, {"start": 2186.23, "end": 2189.378, "text": "어쩌면 미래 경제의 상당 부분이"}, {"start": 2189.429, "end": 2190.318, "text": "여: 음."}, {"start": 2190.369, "end": 2190.918, "text": "그런 방식으로 돌아가게 될지도 모르죠."}, {"start": 2190.969, "end": 2194.119, "text": "사실 전 예전보다 '단기 일자리 종말론'에 덜 비관적이게 됐어요."}, {"start": 2194.17, "end": 2198.278, "text": "우리가 새로운 할 일을 찾아낼 거라는 점에선 항상 낙관적이었지만, [말을 가로막으려는 건 아니고요]"}, {"start": 2198.329, "end": 2201.559, "text": "단기적으로는 당초 생각했던 것만큼 파괴적이지 않을 수도 있거든요."}, {"start": 2201.61, "end": 2205.148, "text": "하지만 지금 우린 컴퓨팅 자원의 부족을 겪고 있습니다."}, {"start": 2205.199, "end": 2210.108, "text": "상황이 훨씬 악화될 수도 있고, 컴퓨팅 자원이 사람들에게 가장 중요한"}, {"start": 2210.159, "end": 2212.389, "text": "공공재 같은 것이 될 수도 있다고 봅니다."}, {"start": 2212.44, "end": 2216.75, "text": "그래서 만약 공급과 수요 관점에서 컴퓨팅 자원의 가격이 걷잡을 수 없이 치솟는다면,"}, {"start": 2216.8, "end": 2221.369, "text": "컴퓨팅 자원을 실제로 공평하게 분배한다는 것이 무엇을 의미하는지에 대해"}, {"start": 2221.42, "end": 2222.369, "text": "매우 흥미로운 갈림길에 서게 될 것입니다."}, {"start": 2222.42, "end": 2224.968, "text": "거기서 아주 흥미로운 일을 하고 계신데요, 말씀하셨듯이"}, {"start": 2225.018, "end": 2227.82, "text": "경제적인 측면에서 보자면"}, {"start": 2227.82, "end": 2229.608, "text": "보편적 기본소득이 필요할 수도 있습니다."}, {"start": 2229.659, "end": 2231.329, "text": "모두가 지분을 나눠 갖길 원하니까요."}, {"start": 2231.38, "end": 2235.639, "text": "이 수업의 강연자 중 한 분인 니콜라이 탕겐 씨는"}, {"start": 2235.69, "end": 2237.48, "text": "노르웨이 국부펀드를 운영하고 계시죠."}, {"start": 2237.53, "end": 2238.278, "text": "남1: 정말 대단한 분이죠."}, {"start": 2238.329, "end": 2239.639, "text": "남2: 정말 멋진 분이에요."}, {"start": 2239.69, "end": 2242.398, "text": "노르웨이 국부펀드는 전 세계 모든 상장 기업의"}, {"start": 2242.449, "end": 2243.918, "text": "1.5%에 달하는 지분을 소유하고 있습니다."}, {"start": 2243.969, "end": 2246.159, "text": "사실상 보편적 기본소득을 실현하고 있는 셈이죠."}, {"start": 2246.21, "end": 2248.119, "text": "오늘날에도 이런 형태가 이미 존재한다고 볼 수 있는데"}, {"start": 2248.17, "end": 2250.838, "text": "현재 미국 내에서 가장 큰 고용주가"}, {"start": 2250.889, "end": 2251.838, "text": "바로 정부이기 때문입니다."}, {"start": 2251.889, "end": 2253.878, "text": "그리고 그 중 상당 부분은"}, {"start": 2253.929, "end": 2257.239, "text": "납세자의 소득을 재분배하기 위한 정부의 방식이라고 볼 수 있죠."}, {"start": 2257.289, "end": 2260.358, "text": "그렇다면 이런 해결책들이 정말로 새로운 것이어야 할까요,"}, {"start": 2260.409, "end": 2263.199, "text": "아니면 그저 이 시대에 맞춰 재구현된 것일까요?"}, {"start": 2263.25, "end": 2265.398, "text": "그런 해결책들의 참신함에 대해 어떻게 생각하시나요?"}, {"start": 2265.449, "end": 2267.599, "text": "저희 실리콘밸리에서는 흔히..."}, {"start": 2267.65, "end": 2270.519, "text": "남1: 사람들은 자꾸만 모든 것을 처음부터"}, {"start": 2270.57, "end": 2272.278, "text": "남1: 다시 만들려는 경향이 있어요. 근본 원칙부터 재정립하려 하죠."}, {"start": 2272.329, "end": 2274.679, "text": "남1: 그럼 단순히 기존 시스템을 보고 조금씩 수정해 나가야 할까요?"}, {"start": 2274.73, "end": 2277.73, "text": "남2: 제 생각에 이런 것들은 아주 새로운 아이디어가"}, {"start": 2277.78, "end": 2282.528, "text": "남2: 필요한 영역은 아니라고 봅니다. 다만 한 가지 말씀드리자면,"}, {"start": 2282.579, "end": 2288.409, "text": "남2: 전 매달 고정된 현금을 배당받는 것보다 사람들이 어떤 식으로든"}, {"start": 2288.46, "end": 2290.449, "text": "남2: 지분을 소유하는 방식에 훨씬 더 흥미를 느낍니다."}, {"start": 2290.5, "end": 2296.088, "text": "남2: 예전에 대규모 기본 소득 연구에 자금을 지원한 적이 있고,"}, {"start": 2296.139, "end": 2300.968, "text": "남2: 사람들이 스타트업에 투자할 때 어떤 일이 일어나는지도 지켜봤거든요."}, {"start": 2301.018, "end": 2304.489, "text": "남2: 인간의 심리에 어떤 모델이 더 잘 맞는지 이제는 알 것 같습니다."}, {"start": 2304.539, "end": 2311.289, "text": "남2: 제가 보고 싶은 건, 세상의 지배력이 노동에서 자본으로 옮겨감에 따라—"}, {"start": 2311.34, "end": 2313.71, "text": "남2: 그건 앞으로도 계속될 현상이라고 보는데요."}, {"start": 2313.76, "end": 2320.199, "text": "남2: 결국 국가나 전 세계적으로 '시민 자산 기금' 같은 걸 운용할 방법을 찾는 겁니다."}, {"start": 2320.25, "end": 2323.838, "text": "남2: 자본주의의 결실을 조금씩 나누어 갖게 되는 거죠, 맞나요?"}, {"start": 2323.889, "end": 2325.239, "text": "남2: 이런 기업들의 지분을 일부 소유하는 식이죠."}, {"start": 2325.289, "end": 2328.599, "text": "남1: 그럼 두 번째 갈래인 컴퓨팅 병목 현상으로 넘어가서,"}, {"start": 2328.65, "end": 2331.718, "text": "남1: 컴퓨팅 가격이 비정상적으로 치솟는 지점에 대해 말씀하셨는데요."}, {"start": 2331.768, "end": 2336.599, "text": "남1: 올해 1월부터 지금까지 제가 파악한 최신 데이터에 따르면,"}, {"start": 2336.65, "end": 2339.878, "text": "남1: H100과 블랙웰(Blackwell)의 가격을 봤을 때"}, {"start": 2339.929, "end": 2343.11, "text": "남1: 장기 예약과 스팟 가격의 차이가 5배나 나더군요."}, {"start": 2343.161, "end": 2345.718, "text": "남2: 지금도 그렇게 높은지는 잘 모르겠네요."}, {"start": 2345.768, "end": 2351.639, "text": "상황이 좀 나아진 것 같긴 한데, 여전히 심각해요. H100은 구할 수나 있는 건지 모르겠네요. 올해 물량은 거의 다 동났거든요."}, {"start": 2351.69, "end": 2353.019, "text": "남1: 제 말이 맞나요?"}, {"start": 2353.07, "end": 2358.438, "text": "남2: 반박할 여지가 없네요. 엄청난 컴퓨팅 자원 부족 사태니까요. 이건 아주 좋은 예시죠."}, {"start": 2358.489, "end": 2361.438, "text": "남2: 지금 실제로 벌어지고 있는 시스템적 문제의요."}, {"start": 2361.489, "end": 2364.438, "text": "남2: 어떤 사람들에게는 마치 코로나 때 같은 기분일 거예요."}, {"start": 2364.489, "end": 2366.807, "text": "남2: 컴퓨팅 시대의 '화장지 품귀 현상' 같은 거죠."}, {"start": 2366.858, "end": 2367.438, "text": "남1: 맞아요."}, {"start": 2367.489, "end": 2370.438, "text": "남1: 그런데 왜 다들 조용한 걸까요?"}, {"start": 2370.489, "end": 2374.909, "text": "남2: 글쎄요, 다들 우리가 가진 하드웨어로 추론 성능을 엄청나게 끌어올릴 수 있을 거라 생각하는 모양이에요."}, {"start": 2374.96, "end": 2377.909, "text": "남2: 하드웨어가 쏟아져 들어올 거라는 생각도 하겠지만,"}, {"start": 2377.96, "end": 2382.909, "text": "남2: 수요라는 쓰나미가 훨씬 더 클 수도 있어요. 그래서 사람들이 어느 정도는 긴장해야 한다고 봅니다."}, {"start": 2382.96, "end": 2384.909, "text": "남1: 그렇다면 이렇게 말해도 될까요?"}, {"start": 2384.96, "end": 2386.909, "text": "남1: 이 컴퓨팅 부족 사태 속에서 우리가 얼마나 더 지내야 할까요?"}, {"start": 2386.96, "end": 2393.76, "text": "남1: 적어도 현재 데이터에 기반해서 본다면요."}, {"start": 2393.76, "end": 2398.989, "text": "남2: 제 생각엔 다른 것들처럼... 전 세계적인 전력 수요를 논할 때"}, {"start": 2399.039, "end": 2400.829, "text": "남2: 가격을 빼놓고 얘기할 수는 없거든요."}, {"start": 2400.88, "end": 2405.628, "text": "남2: 사람들이 필요로 하는 에너지 수요라는 건 상황에 따라 극명하게 달라지니까요."}, {"start": 2405.679, "end": 2409.628, "text": "남2: 가격이 10배 내려가느냐, 혹은 10배 올라가느냐에 따라서요."}, {"start": 2409.679, "end": 2413.429, "text": "남2: AI도 마찬가지라고 생각합니다."}, {"start": 2413.48, "end": 2425.369, "text": "남2: 모델을 충분히 똑똑하게 만들고 비용을 충분히 낮출 수만 있다면, 수요는..."}, {"start": 2425.369, "end": 2427.119, "text": "남2: 사실상 한계가 없을 거예요."}, {"start": 2427.17, "end": 2430.96, "text": "남2: 그런 의미에서 우리가 계속 발전을 거듭하는 한, 부족 현상은 계속될 겁니다."}, {"start": 2431.01, "end": 2431.96, "text": "영원히요."}, {"start": 2432.01, "end": 2438.239, "text": "그리고 물가는 우리가 생각하는 적정 수준보다 약간 더 높게 형성될 겁니다."}, {"start": 2438.289, "end": 2441.96, "text": "사람들이 더 유능해지고 똑똑해지며 지능이 높아진다고 해도 말이죠."}, {"start": 2442.01, "end": 2447.398, "text": "왜냐하면 우리가 정말 훌륭한 개인용 에이전트를 만든다면"}, {"start": 2447.449, "end": 2449.0, "text": "10명의 에이전트를 상시 가동하며 일을 시킬 수 있을 테니까요."}, {"start": 2449.05, "end": 2453.309, "text": "아니면 100명도 가능하죠. 제 생각엔 다들 100명을 원하실 겁니다."}, {"start": 2453.36, "end": 2454.588, "text": "엄청난 양의 추론이 필요할 테니까요."}, {"start": 2454.639, "end": 2455.588, "text": "연산량도 엄청나겠죠."}, {"start": 2455.639, "end": 2456.429, "text": "좋습니다."}, {"start": 2456.48, "end": 2457.668, "text": "이제 여러분께 수업 기념품을 나눠드리며 마무리하겠습니다."}, {"start": 2457.719, "end": 2463.32, "text": "그건 바로... [박수] 와주셔서 정말 감사합니다."}, {"start": 2463.32, "end": 2464.108, "text": "감사합니다."}, {"start": 2464.159, "end": 2465.358, "text": "감사합니다."}];

                // [V160.4] 유튜브 기본 자막이 같이 켜져서 두 개로 겹쳐 보이는 현상 방지 🐾

// [V160.1] AI냥: 유튜브 고유 단축키 무력화 후, 'f' 키 등 사용자 편의 조작을 가로채서 자체 전체화면 실행! 🐱✨
window.addEventListener('keydown', function(e) {
    if (!player || !player.getPlayerState || typeof player.getDuration !== 'function') return;

    // Ctrl + ArrowLeft: Previous Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowLeft') {
        const t = player.getCurrentTime();
        let target = Math.max(0, t - 5);
        for(let i = subs.length - 1; i >= 0; i--) {
            if(subs[i].start < t - 1.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    // Ctrl + ArrowRight: Next Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowRight') {
        const t = player.getCurrentTime();
        let target = t + 5;
        for(let i = 0; i < subs.length; i++) {
            if(subs[i].start > t + 0.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    if (e.key.toLowerCase() === 'f') {
        toggleFullScreen();
        e.preventDefault();
    } else if (e.key === ' ' || e.key.toLowerCase() === 'k') {
        if (player.getPlayerState() === 1) player.pauseVideo();
        else player.playVideo();
        e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
        player.seekTo(player.getCurrentTime() - 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowRight') {
        player.seekTo(player.getCurrentTime() + 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowUp') {
        player.setVolume(player.getVolume() + 5);
        e.preventDefault();
    } else if (e.key === 'ArrowDown') {
        player.setVolume(player.getVolume() - 5);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'm') {
        player.isMuted() ? player.unMute() : player.mute();
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'j') {
        player.seekTo(player.getCurrentTime() - 10, true);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'l') {
        player.seekTo(player.getCurrentTime() + 10, true);
        e.preventDefault();
    } else if (e.key >= '0' && e.key <= '9') {
        const fraction = parseInt(e.key) / 10;
        player.seekTo(player.getDuration() * fraction, true);
        e.preventDefault();
    }
});

// iframe 클릭 시 빼앗긴 포커스를 0.1초 뒤에 훔쳐와서 'f' 등 단축키가 계속 먹히도록 유지! 🕵️‍♂️✨
window.addEventListener('blur', function() {
    setTimeout(() => {
        if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
            window.focus();
        }
    }, 100);
});
let syncInterval;
let activityTimeout;
function resetActivity() {
    const fsBtn = document.getElementById('fs-btn');
    const subsEl = document.getElementById('subtitles');
    if(fsBtn) fsBtn.classList.remove('fade-out');
    if(subsEl) subsEl.classList.remove('ui-hidden');
    clearTimeout(activityTimeout);
    if (player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING) {
        activityTimeout = setTimeout(() => {
            if(fsBtn) fsBtn.classList.add('fade-out');
            if(subsEl) subsEl.classList.add('ui-hidden');
        }, 3000);
    }
}
document.addEventListener('mousemove', resetActivity);
document.addEventListener('touchstart', resetActivity, {passive: true});
document.addEventListener('keydown', resetActivity);
window.addEventListener('blur', resetActivity);
window.addEventListener('focus', resetActivity);

function onPlayerStateChange(event){
    resetActivity();
    if(event.data==YT.PlayerState.PLAYING){
        if(!syncInterval) syncInterval=setInterval(updateSubs,100);
    }else{
        clearInterval(syncInterval); syncInterval=null;
    }
}
function updateSubs(){
    const t=player.getCurrentTime();
    let currentHtml="";
    let activeSubs = [];
    for(let i=0;i<subs.length;i++){
        if(t>=subs[i].start && t<=subs[i].end){
            activeSubs.push(subs[i]);
        }
    }
    if(activeSubs.length > 0){
        // [V160.5] AI 번역 생성 시 자막 시간이 미세하게 겹쳐(Overlap) 동일한 내용이 두 줄로 출력되는 현상 방지! 
        // 겹치는 자막 중 가장 마지막 매칭 항목 하나만 렌더링 🐾
        let bestSub = activeSubs[activeSubs.length - 1];
        currentHtml = `<div class="sub-line">${bestSub.text}</div><br>`;
    }
    if(document.getElementById('subtitles').innerHTML !== currentHtml){
        document.getElementById('subtitles').innerHTML=currentHtml;
    }
}

let isDragging=false, startY, currentBottom, subEl=document.getElementById('subtitles');
document.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchstart', dragStart, {passive:false});
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('touchend', dragEnd);

function dragStart(e) {
    if(!e.target.classList.contains('sub-line')) return;
    isDragging = true;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    startY = clientY;
    let style = window.getComputedStyle(subEl);
    currentBottom = parseFloat(style.bottom) || 0;
    subEl.classList.add('dragging');
    e.preventDefault();
}
function dragMove(e) {
    if(!isDragging) return;
    // [FIX] iframe 등에 의해 mouseup 이벤트를 놓쳤지만 마우스 버튼은 떼어진 경우 강제 드래그 종료! 🛡️✨
    if(e.type.includes('mouse') && e.buttons === 0) {
        dragEnd(e);
        return;
    }
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    let dy = clientY - startY;
    subEl.style.bottom = (currentBottom - dy) + 'px';
    if(e.cancelable) e.preventDefault();
}
function dragEnd(e) {
    isDragging = false;
    subEl.classList.remove('dragging');
}

// [Wheel / Pinch to Zoom for Font Size]
let currentFontSize = 4.5;
let initialDist = 0;
let initialFontSize = 4.5;

document.addEventListener('wheel', (e) => {
    if(e.target.closest('#subtitles') || e.target.classList.contains('sub-line')) {
        e.preventDefault();
        currentFontSize += e.deltaY < 0 ? 0.2 : -0.2;
        currentFontSize = Math.max(1, Math.min(20, currentFontSize));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
    }
}, {passive: false});

document.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialFontSize = currentFontSize;
        e.preventDefault();
    }
}, {passive: false});

document.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        let scale = currentDist / initialDist;
        currentFontSize = Math.max(1, Math.min(20, initialFontSize * scale));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
        e.preventDefault();
    }
}, {passive: false});
