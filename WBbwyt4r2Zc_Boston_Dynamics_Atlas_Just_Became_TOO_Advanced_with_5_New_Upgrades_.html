const subs=[{"start": 2.419, "end": 6.57, "text": "다들 테슬라의 옵티머스가 슬로 모션으로 빨래 개는 모습에 정신이 팔려 있을 때,"}, {"start": 6.62, "end": 11.368, "text": "보스턴 다이내믹스는 아무도 예상치 못한 일을 조용히 해냈습니다. 현대자동차가 진행한"}, {"start": 11.419, "end": 16.769, "text": "2026 FIFA 월드컵 캠페인에서 아틀라스는 단순히 축구장에 발을 들이는 데 그치지 않았습니다."}, {"start": 16.82, "end": 21.669, "text": "프로 선수들도 성공하기 힘든 고난도 기술인 '고스트 라보나'를 선보였죠."}, {"start": 21.719, "end": 27.07, "text": "일론 머스크가 수년 동안 옵티머스를 홍보하며 강조했던 바로 그런 움직임입니다. 하지만 이 화제의 영상 이면에는 모두가 놓친"}, {"start": 27.12, "end": 32.968, "text": "더 큰 이야기가 숨어 있습니다. 아틀라스가 축구를 배우던 바로 그 주에, 이 로봇은 100파운드짜리 미니 냉장고를 들어 올리고 있었습니다."}, {"start": 33.018, "end": 37.669, "text": "잡동사니가 가득해 무게 중심이 계속 변하는, 훈련받은 적 없는 물건이었죠. 그리고"}, {"start": 37.719, "end": 42.669, "text": "이 로봇들을 현장에 배치하려는 회사는 실리콘밸리의 스타트업이 아닙니다. 바로 현대자동차죠."}, {"start": 42.719, "end": 48.669, "text": "현대는 조용히 자사 공장에 2만 5천 대의 아틀라스를 배치하고, 연간 3만 대를 생산할 계획을 세우고 있습니다."}, {"start": 48.719, "end": 54.87, "text": "2028년까지 말이죠. 어떻게 이런 일이 가능했을까요? 왜 구글 딥마인드는 갑자기 제미나이 로보틱스 모델의"}, {"start": 54.92, "end": 61.37, "text": "파트너로 피규어나 테슬라가 아닌 아틀라스를 선택했을까요? 2021년부터 예고된 테슬라의 옵티머스는"}, {"start": 61.42, "end": 66.57, "text": "여전히 걸음마를 배우는 단계처럼 보입니다. 하지만 보스턴 다이내믹스는 차원이 다릅니다. 이제부터"}, {"start": 66.62, "end": 71.87, "text": "어떻게 이 모든 것이 가능한지, 그리고 테슬라 옵티머스를 위협할"}, {"start": 71.92, "end": 76.67099999999999, "text": "신형 아틀라스의 5가지 놀라운 업그레이드에 대해 알아보겠습니다. 축구 시연 영상은 현대자동차의 '스쿨 오브 풋볼'"}, {"start": 76.721, "end": 82.37, "text": "캠페인의 일환으로, 2026년 FIFA 월드컵을 앞두고 보스턴 다이내믹스와 협업해 제작되었습니다."}, {"start": 82.42, "end": 87.668, "text": "아틀라스를 일반적인 로봇 실험실에 두는 대신, 축구를 통해 휴머노이드 로봇이"}, {"start": 87.718, "end": 93.37, "text": "어떻게 신체적 움직임을 학습하는지 직관적으로 보여준 것이죠. 아틀라스는 먼저 실제 월드컵 영상을 보며"}, {"start": 93.42, "end": 98.969, "text": "선수들이 무게 중심을 어떻게 이동시키는지, 균형을 잡고 공에 반응하며 기술을 준비하는 과정을 연구합니다."}, {"start": 99.019, "end": 104.168, "text": "단순히 정해진 명령을 수행하는 기계처럼 공을 차게 만드는 것이 목표가 아닙니다."}, {"start": 104.218, "end": 109.888, "text": "관찰과 연습, 그리고 교정을 통해 아틀라스가 신체적 기술을 직접 습득하는 과정을 보여주려는 것이죠."}, {"start": 109.938, "end": 114.689, "text": "축구는 로봇이 타이밍을 맞추게끔 강요하기 때문에 이번 데모가 더욱 흥미롭습니다."}, {"start": 114.739, "end": 119.78999999999999, "text": "균형 잡기, 신체 자세 변화, 그리고 공과의 정교한 접촉까지 다뤄야 하죠. 총 5부작으로 구성된"}, {"start": 119.84, "end": 125.49, "text": "이 시리즈에서 아틀라스는 기초적인 축구 동작부터 마지막 트릭까지 단계별로 나아갑니다. 우선,"}, {"start": 125.54, "end": 129.988, "text": "아틀라스는 경기장에 들어서기 전 축구의 에너지와 움직임을 관찰합니다."}, {"start": 130.038, "end": 135.287, "text": "그런 다음 풋워크, 균형 잡기, 간단한 킥, 패스, 슈팅, 그리고 정교한"}, {"start": 135.337, "end": 140.487, "text": "볼 컨트롤을 연습하죠. 그다음은 '라보나' 차례인데, 디딤발 뒤로 킥하는 다리를 꼬아 차는 동작으로"}, {"start": 140.538, "end": 145.588, "text": "로봇에게는 꽤 부자연스러운 자세를 요구합니다. 마지막 하이라이트는 '고스트 라보나'인데, 페이크 후"}, {"start": 145.639, "end": 150.989, "text": "스트라이크를 날리는 동작으로 타이밍, 신체 제어, 빠른 적응력이 필수적입니다. 아틀라스는 동작 후"}, {"start": 151.039, "end": 156.388, "text": "세리머니까지 선보이죠. 아틀라스가 실제 월드컵 영상을 보고 축구를 배울 수 있다면, 다음엔"}, {"start": 156.438, "end": 161.689, "text": "보스턴 다이내믹스가 어떤 기술을 가르쳐야 할까요? 댓글로 알려주세요. 미니 냉장고 데모는"}, {"start": 161.74, "end": 167.289, "text": "동일한 로봇의 더 실용적인 측면을 보여줍니다. 보스턴 다이내믹스는 이 테스트를 통해 아틀라스를"}, {"start": 167.34, "end": 172.789, "text": "가벼운 작업이나 깔끔한 움직임, 단순한 손 제어 이상의 단계로 밀어붙였습니다. 실제 현장 작업은 변수가 많기 마련인데,"}, {"start": 172.84, "end": 177.488, "text": "무거운 물체는 다루기 까다롭고 무게 중심이 변할 수 있으며, 로봇이 손가락뿐만 아니라"}, {"start": 177.538, "end": 182.689, "text": "온몸으로 물체와 접촉해야 하기 때문입니다. 냉장고처럼 부피가 큰 물체는 카메라만 보거나"}, {"start": 182.74, "end": 188.689, "text": "들어 올리기 전에 세운 완벽한 계획만으로는 다룰 수 없습니다. 아틀라스는 팔, 몸통, 다리, 그리고"}, {"start": 188.74, "end": 193.689, "text": "신체 피드백을 함께 사용해 작업 중 변하는 하중에 대응해야 합니다. 그래서 냉장고 테스트가"}, {"start": 193.74, "end": 199.188, "text": "중요한 겁니다. 아틀라스는 50~70파운드 하중으로 훈련받았지만, 실제 냉장고는"}, {"start": 199.239, "end": 204.589, "text": "실험실의 무작위 물건들을 채워 넣자 100파운드가 넘었습니다. 무게가"}, {"start": 204.639, "end": 210.789, "text": "불균형해져 예측하기가 더 어려워졌죠. 이를 가능하게 하기 위해 보스턴 다이내믹스는 아틀라스를 강화"}, {"start": 210.84, "end": 216.689, "text": "학습과 '고유 수용 감각'이라 불리는 신체 피드백을 통해 훈련시켰습니다. 단 하나의 완벽한 동작을 암기하는 대신 말이죠."}, {"start": 216.74, "end": 220.488, "text": "아틀라스는 가상 시뮬레이션을 통해 동일한 작업을 수없이 반복 학습했습니다."}, {"start": 220.538, "end": 224.088, "text": "이러한 훈련 덕분에 실제 냉장고를 다룰 때도 더 안정적인 균형을 유지하고,"}, {"start": 224.139, "end": 227.69, "text": "정교한 제어력과 접촉 시 유연한 적응력을 보여줄 수 있었죠."}, {"start": 227.74, "end": 231.79, "text": "그렇다면 아틀라스는 어떻게 축구 동작과 무거운 냉장고 운반을 동시에 해내는 걸까요?"}, {"start": 231.841, "end": 236.89, "text": "그 해답은 소프트웨어뿐만 아니라, 신형 아틀라스에 적용된 다섯 가지 스마트 하드웨어 설계에 있습니다."}, {"start": 236.941, "end": 242.489, "text": "첫째, 보스턴 다이내믹스는 전신에 단 두 종류의 액추에이터만을 사용합니다."}, {"start": 242.539, "end": 248.988, "text": "덕분에 제작과 시뮬레이션 모델링이 쉬워졌고, 수리가 필요할 때도 훨씬 간편해졌죠."}, {"start": 249.038, "end": 254.988, "text": "둘째, 팔, 다리, 발 등 신체 부위의 상당수를 대칭형 공용 부품으로 구성했습니다."}, {"start": 255.038, "end": 260.788, "text": "이는 신체 부위 간의 학습 데이터를 공유할 수 있게 하여 움직임의 효율성을 높여줍니다."}, {"start": 260.838, "end": 266.788, "text": "셋째, 전선 노출이 없는 설계를 통해 관절이 제한 없이 연속 회전할 수 있도록 했습니다."}, {"start": 266.838, "end": 272.389, "text": "이로써 흔한 고장 원인을 제거하고, 인간의 관절로는 불가능한 자유로운 움직임을 구현했죠."}, {"start": 272.439, "end": 277.987, "text": "넷째, 팔, 다리, 손, 머리를 모듈화하여 몇 분 만에 교체할 수 있도록 설계했습니다."}, {"start": 278.038, "end": 282.088, "text": "수리 대기 시간 없이 즉시 현장에 투입되어야 하는 로봇에게 핵심적인 기능이죠."}, {"start": 282.139, "end": 288.088, "text": "다섯째, 강력한 열 관리 시스템을 통해 198파운드의 로봇이 고난도 동작을 계속 수행해도"}, {"start": 288.139, "end": 293.288, "text": "과열되지 않도록 돕습니다. 이 모든 선택이 모여 아틀라스의 축구 같은 민첩함과"}, {"start": 293.338, "end": 297.987, "text": "고된 노동을 견디는 힘, 그리고 실제 현장 투입이 가능한 실용성을 완성했습니다."}, {"start": 298.038, "end": 300.99, "text": "하지만 아틀라스를 더 똑똑하게 만드는 건 하드웨어만이 아닙니다."}, {"start": 301.04, "end": 303.288, "text": "바로 여기서 구글 딥마인드의 기술이 등장하죠."}, {"start": 303.338, "end": 307.588, "text": "CES 2026에서 보스턴 다이내믹스와 구글 딥마인드는 연구 파트너십을 발표하며"}, {"start": 307.639, "end": 312.689, "text": "제미나이 로보틱스 파운데이션 모델을 아틀라스에 탑재하기로 했습니다."}, {"start": 312.74, "end": 316.889, "text": "아틀라스의 하드웨어 위에 더욱 강력한 지능 계층을 구축하는 것이 목표입니다."}, {"start": 316.939, "end": 321.889, "text": "보스턴 다이내믹스가 이미 완성한 신체 말이죠. 즉, 로봇이 단순히 잘 움직이는 법만 배우는 게 아니라,"}, {"start": 321.939, "end": 325.389, "text": "지시를 이해하고 변화하는 환경을 파악하며,"}, {"start": 325.439, "end": 328.788, "text": "과제를 추론하고 움직이기 전에 행동을 계획하는 법을 배우고 있다는 뜻입니다."}, {"start": 328.838, "end": 334.99, "text": "아틀라스의 신체에 구글 딥마인드의 지능이 결합된다면, 다음엔 어떤 일이 가능해질까요?"}, {"start": 335.04, "end": 336.889, "text": "여러분의 생각을 댓글로 공유해 주세요."}, {"start": 336.939, "end": 342.788, "text": "이는 매우 중요한데, 사람들 사이에서 일하는 휴머노이드 로봇은 고정된 루틴에만 의존할 수 없기 때문입니다."}, {"start": 342.838, "end": 348.088, "text": "무슨 일이 일어나고 있는지 이해하고, 적절한 행동을 선택하며, 환경이 변할 때 적응해야 하죠."}, {"start": 348.139, "end": 353.288, "text": "보스턴 다이내믹스는 이미 힘과 균형, 기동성을 갖춘 물리적 플랫폼을 보유하고 있습니다."}, {"start": 353.338, "end": 358.091, "text": "딥마인드는 이러한 능력을 실제 현장에서 유용하게 써먹을 수 있도록 추론 시스템을 추가하려는 것입니다."}, {"start": 358.141, "end": 366.091, "text": "몸체와 두뇌가 결합되면 아틀라스는 단일 작업용 로봇보다는 다양한 육체 노동을 수행할 수 있는 유연한 시스템에 가까워집니다."}, {"start": 366.141, "end": 371.091, "text": "아틀라스의 첫 번째 실제 행선지는 현대차와 기아의 자체 생산 네트워크입니다."}, {"start": 371.141, "end": 380.091, "text": "현대자동차그룹은 단계적 도입 계획을 세웠는데, 난도가 높은 작업에 투입하기 전 안전성과 신뢰성, 가치를 입증할 수 있는 업무부터 시작할 예정입니다."}, {"start": 380.141, "end": 385.288, "text": "첫 주요 거점은 조지아주 사바나에 위치한 현대차그룹 메타플랜트 아메리카(HMGMA)로, 이곳에서 아틀라스 로봇들은"}, {"start": 385.338, "end": 390.091, "text": "로봇 메타플랜트 활용 센터에서 훈련을 거친 뒤 부품 순차 공급 등의"}, {"start": 390.141, "end": 392.091, "text": "작업을 2028년까지 시작할 것으로 예상됩니다."}, {"start": 392.141, "end": 395.689, "text": "즉, 적시에 적재적소에 필요한 부품이 도달하도록 돕는 것인데,"}, {"start": 395.74, "end": 399.091, "text": "이는 자동차 공장 내부에서 통제된 환경이지만 매우 중요한 작업입니다."}, {"start": 399.141, "end": 403.987, "text": "조립 관련 업무를 포함한 더욱 복잡한 공정들은"}, {"start": 404.038, "end": 405.37, "text": "시스템이 개선됨에 따라 추후 도입될 예정입니다."}, {"start": 405.42, "end": 411.271, "text": "최근 보고서에 따르면 현대차는 2만 5천 대 이상의 아틀라스 로봇을 현대차와"}, {"start": 411.321, "end": 416.569, "text": "기아 공장에 배치할 계획이며, 연간 약 3만 대의 아틀라스 로봇을 생산할 수 있는"}, {"start": 416.619, "end": 419.569, "text": "대량 생산 시스템 구축을 2028년까지 목표로 하고 있습니다."}, {"start": 419.619, "end": 424.069, "text": "이 수치는 현대차가 아틀라스를 단순한 연구 프로젝트로만"}, {"start": 424.119, "end": 425.069, "text": "여기지 않는다는 것을 보여줍니다."}, {"start": 425.119, "end": 430.37, "text": "현대차는 제조 역량을 활용해 보스턴 다이내믹스의 로봇을 단순한 시연용 플랫폼에서"}, {"start": 430.42, "end": 435.771, "text": "실제 산업 현장에서 생산 및 테스트할 수 있는 수준으로 확장하고 있습니다."}, {"start": 435.821, "end": 440.269, "text": "이러한 도입은 노조와 근로자들이 안전, 고용 영향, 로봇과 인간의 협업 방식에 대해"}, {"start": 440.319, "end": 447.069, "text": "더 명확한 합의를 원할 것이기 때문에 압박을 동반할 것입니다. 만약 2만 5천 대의 아틀라스 로봇이"}, {"start": 447.12, "end": 452.37, "text": "현대와 기아 공장에 들어온다면, 이것이 제조업의 미래라고 생각하시나요? 댓글로 알려주세요."}, {"start": 452.42, "end": 457.569, "text": "요약하자면, 아틀라스는 이제 단순히 축구 묘기를 부리거나 관심을 끌기 위해"}, {"start": 457.62, "end": 462.67, "text": "냉장고를 들어 올리는 수준 이상의 로봇이 된 것입니다. 이번 시연은 통제된 성능 과시에서"}, {"start": 462.721, "end": 468.17, "text": "스스로 학습하고 적응하며 실제 육체노동을 수행하는 휴머노이드로의 큰 변화를 보여줍니다. 보스턴 다이내믹스가"}, {"start": 468.22, "end": 473.468, "text": "하드웨어를 만들고, 구글 딥마인드가 지능을 더하며, 현대차는 최초의 대규모"}, {"start": 473.519, "end": 479.769, "text": "생산 경로를 준비하고 있습니다. 아틀라스가 오늘의 주인공일지 모르지만, 이는 더 큰 로봇 경쟁의 일부이며"}, {"start": 479.819, "end": 490.218, "text": "새로운 시연이 나올 때마다 그것은 묘기가 아니라 다가올 미래의 예고편처럼 보이기 시작했습니다."}];
let player;
function onYouTubeIframeAPIReady(){
    player=new YT.Player('player',{videoId:videoId,playerVars:{autoplay:1,controls:1,rel:0,modestbranding:1,fs:0},events:{'onStateChange':onPlayerStateChange}});
}
let syncInterval;
function onPlayerStateChange(event){
    if(event.data==YT.PlayerState.PLAYING){
        if(!syncInterval) syncInterval=setInterval(updateSubs,100);
    }else{
        clearInterval(syncInterval); syncInterval=null;
    }
}
function updateSubs(){
    const t=player.getCurrentTime();
    let currentHtml="";
    for(let i=0;i<subs.length;i++){
        if(t>=subs[i].start && t<=subs[i].end){
            currentHtml += `<div class="sub-line">${subs[i].text}</div><br>`;
        }
    }
    if(document.getElementById('subtitles').innerHTML !== currentHtml){
        document.getElementById('subtitles').innerHTML=currentHtml;
    }
}

let isDragging=false, startY, currentBottom, subEl=document.getElementById('subtitles');
document.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchstart', dragStart, {passive:false});
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('touchend', dragEnd);

function dragStart(e) {
    if(!e.target.classList.contains('sub-line')) return;
    isDragging = true;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    startY = clientY;
    let style = window.getComputedStyle(subEl);
    currentBottom = parseFloat(style.bottom) || 0;
    subEl.classList.add('dragging');
    e.preventDefault();
}
function dragMove(e) {
    if(!isDragging) return;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    let dy = clientY - startY;
    subEl.style.bottom = (currentBottom - dy) + 'px';
    if(e.cancelable) e.preventDefault();
}
function dragEnd(e) {
    isDragging = false;
    subEl.classList.remove('dragging');
}

// [Wheel / Pinch to Zoom for Font Size]
let currentFontSize = 4.5;
let initialDist = 0;
let initialFontSize = 4.5;

document.addEventListener('wheel', (e) => {
    if(e.target.closest('#subtitles') || e.target.classList.contains('sub-line')) {
        e.preventDefault();
        currentFontSize += e.deltaY < 0 ? 0.2 : -0.2;
        currentFontSize = Math.max(1, Math.min(20, currentFontSize));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vh');
    }
}, {passive: false});

document.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialFontSize = currentFontSize;
        e.preventDefault();
    }
}, {passive: false});

document.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        let scale = currentDist / initialDist;
        currentFontSize = Math.max(1, Math.min(20, initialFontSize * scale));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vh');
        e.preventDefault();
    }
