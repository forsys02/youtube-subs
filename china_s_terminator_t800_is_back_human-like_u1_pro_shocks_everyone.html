const videoId="4TH89SlhSSU";
const subs=[{"start": 4.15, "end": 9.058, "text": "AI 로봇 기술이 비약적으로 발전한 가운데, 이번 주 로봇 개발 경쟁이 얼마나 치열한지 증명되었습니다."}, {"start": 9.108, "end": 13.779, "text": "중국의 터미네이터 로봇 'T800'이 실제 격투 대회를 앞두고 출전 준비에 박차를 가하고 있는데요."}, {"start": 13.83, "end": 18.579, "text": "한 테스트 경기에서는 로봇이 상대 로봇의 머리를 걷어차 날려버리는 장면까지 포착됐습니다. 동시에,"}, {"start": 18.629, "end": 25.699, "text": "유비테크가 신형 반려 로봇 'U1 프로'를 공개하면서 실제 사람 같은 비주얼의 로봇들이 큰 화제를 모으고 있습니다."}, {"start": 25.75, "end": 31.62, "text": "또한 피규어 AI가 '봇 Q' 공장에서 휴머노이드 로봇 생산 규모를 키우며, '피규어 O3'도 대량 생산 공정에 합류했습니다."}, {"start": 31.67, "end": 36.9, "text": "휴머노이드 로봇이 상대 로봇의 머리를 깔끔하게 날려버리는 장면입니다."}, {"start": 36.95, "end": 41.459, "text": "머리가 날아간 로봇은 그 상태로 몇 초간 공격을 멈추지 않았는데요. 이 일은 중국에서 일어났습니다."}, {"start": 41.509, "end": 47.059, "text": "'엔진 AI'가 주최한 새로운 로봇 격투 리그의 테스트 경기 중이었죠. 이 회사의 휴머노이드 'T800'은"}, {"start": 47.109, "end": 53.22, "text": "7월에 열릴 첫 메이저 대회를 앞두고 실제 격투 상황에서 혹독한 성능 시험을 거치고 있습니다. 'T800'은"}, {"start": 53.27, "end": 58.98, "text": "강력한 충격을 견딜 수 있게 설계된 실물 크기의 휴머노이드 로봇입니다. 키는 약 183cm에 몸무게는"}, {"start": 59.03, "end": 61.22, "text": "최대 85kg에 달하죠."}, {"start": 61.27, "end": 66.62, "text": "본체에는 마그네슘 알루미늄 합금 프레임이 사용되어, 로봇의 무게를 줄이면서도"}, {"start": 66.67, "end": 68.918, "text": "강력한 타격을 견딜 수 있을 만큼의 내구성을 확보했습니다."}, {"start": 68.968, "end": 73.82, "text": "관절 내부를 보면, 'T800'은 최대 450Nm의 토크를 발생시킬 수 있습니다."}, {"start": 73.87, "end": 79.34, "text": "덕분에 펀치와 킥에 강력한 힘을 싣고, 균형 유지 및 빠른 신체 기동이 가능하죠."}, {"start": 79.39, "end": 81.858, "text": "'T800'이라는 이름 또한 우연이 아닙니다."}, {"start": 81.908, "end": 86.299, "text": "엔진 AI는 영화 '터미네이터'를 직접 오마주해 설계했다고 밝혔고, 창립자 조퉁양 역시"}, {"start": 86.349, "end": 91.1, "text": "이런 공격적인 이미지를 적극 활용했습니다. 하지만 대중의 눈길을 사로잡은 건 바로 그 화제의 영상이었죠."}, {"start": 91.15, "end": 96.298, "text": "영상 속 'T800'은 상대 로봇의 머리가 뽑힐 정도로 강력한 일격을 가합니다."}, {"start": 96.348, "end": 100.298, "text": "머리가 없는 로봇은 즉시 멈추지 않고, 쓰러지기 전까지 계속 움직이며 주먹을 휘두릅니다."}, {"start": 100.348, "end": 105.1, "text": "...결국 중심을 잃고 맙니다. 그 순간은 로봇의 몸체가 파손되기 전까지 얼마나 많은 충격을 견딜 수 있는지를 보여주었죠."}, {"start": 105.15, "end": 111.499, "text": "완전히 무너지기 전까지 말이죠. 다른 영상에서는 T-800이 발차기, 회전, 공중 회전, 그리고 복싱 스타일의 공방을 벌이는 모습을 볼 수 있습니다."}, {"start": 111.549, "end": 118.298, "text": "초기의 한 발차기는 Engine AI의 CEO를 쓰러뜨리기까지 했는데, 이는 이러한 움직임이 얼마나 강력해질 수 있는지를 잘 보여줍니다."}, {"start": 118.348, "end": 122.778, "text": "전투 테스트를 목적으로 실물 크기의 휴머노이드 로봇을 제작했을 때 말이죠."}, {"start": 122.828, "end": 127.019, "text": "이 격투는 'Ultimate Robot Knockout Legend'의 약자인 URKL의 일부입니다."}, {"start": 127.069, "end": 133.018, "text": "Engine AI는 2026년 2월 선전에서 이 리그를 출범시켰으며, 세계 최초의 실물 크기 휴머노이드 전문 격투 리그로 홍보되고 있습니다."}, {"start": 133.068, "end": 138.298, "text": "실물 크기의 휴머노이드 로봇을 위한 첫 전문 리그죠. 대학, 연구소, 기업 등 약 16개 팀이 참여하고 있습니다."}, {"start": 138.348, "end": 141.539, "text": "여기에는 대학, 연구실, 그리고 기업 팀들이 포함되어 있습니다."}, {"start": 141.59, "end": 145.138, "text": "Engine AI는 이 팀들에게 T-800 유닛을 무료로 제공하고 있습니다."}, {"start": 145.188, "end": 149.018, "text": "덕분에 각 팀은 소프트웨어, 동작 제어, 전투 전략 및 로봇 성능에만 집중할 수 있습니다."}, {"start": 149.068, "end": 150.539, "text": "로봇의 성능 말이죠."}, {"start": 150.59, "end": 153.578, "text": "이 리그는 12월까지 여러 단계로 진행될 예정입니다."}, {"start": 153.628, "end": 157.97899999999998, "text": "가장 큰 상금은 22파운드의 순금으로 제작된 챔피언 벨트입니다."}, {"start": 158.03, "end": 160.779, "text": "가치는 약 144만 달러에 달합니다."}, {"start": 160.829, "end": 163.81900000000002, "text": "하지만 규칙은 이 대회를 단순한 로봇 쇼 그 이상으로 진지하게 만듭니다."}, {"start": 163.87, "end": 167.659, "text": "원격 제어는 허용되지 않으며, 팀들은 파괴적인 업그레이드를 추가할 수 없습니다."}, {"start": 167.71, "end": 174.659, "text": "각 T-800은 자체 소프트웨어를 사용하여 싸워야 합니다. 즉, 로봇이 스스로 어떻게 움직이고 공격하며, 중심을 잡고 회복할지를 결정해야 한다는 뜻이죠."}, {"start": 174.71, "end": 177.659, "text": "이것이 바로 이 리그가 단순한 오락 이상의 의미를 갖는 이유입니다."}, {"start": 177.71, "end": 184.659, "text": "모든 펀치, 발차기, 넘어짐 및 회복 과정은 Engine AI에 균형, 센서, 안정성 및 충격 저항에 대한 혹독한 테스트 기회를 제공합니다."}, {"start": 184.71, "end": 189.659, "text": "이러한 기술들은 나중에 로봇이 공장, 창고, 그리고 서비스 현장에서 일하는 데 도움이 될 수 있습니다."}, {"start": 189.71, "end": 192.659, "text": "격렬한 움직임과 빠른 회복력이 중요한 분야죠."}, {"start": 192.71, "end": 196.659, "text": "업체 측은 15분마다 로봇 한 대를 제작할 수 있다고 주장합니다."}, {"start": 196.71, "end": 203.06, "text": "2023년 설립된 엔진 AI는 약 3억 5천만 달러의 투자금을 유치했으며, 현재 홍콩 증시 상장을 추진 중입니다."}, {"start": 203.11, "end": 206.5, "text": "기업 가치는 15억 달러에 달할 것으로 평가받고 있죠."}, {"start": 206.55, "end": 209.06, "text": "하지만 이런 행보를 모두가 반기는 것은 아닙니다."}, {"start": 209.11, "end": 214.459, "text": "머리 없는 로봇이 펀치를 날리는 영상은 안전과 오남용에 대한 심각한 우려를 낳고 있습니다."}, {"start": 214.50900000000001, "end": 217.578, "text": "또한 전투 로봇의 다음 행선지에 대한 질문도 던지고 있죠."}, {"start": 217.628, "end": 222.338, "text": "엔진 AI는 더 튼튼하고 똑똑하며 유용한 로봇을 만드는 것이 목표라고 말합니다."}, {"start": 222.389, "end": 225.779, "text": "하지만 로봇 격투를 둘러싼 논쟁은 갈수록 거세지고 있습니다."}, {"start": 225.829, "end": 230.618, "text": "오는 7월 첫 대규모 URKL 대회가 열릴 예정이며, 이는 이제 시작일 뿐입니다."}, {"start": 230.668, "end": 235.338, "text": "엔진 AI가 더 강해 보이는 로봇을 만드는 동안, 중국의 또 다른 로봇 거물은 정반대의 길을 걷고 있습니다."}, {"start": 235.389, "end": 237.178, "text": "완전히 다른 방향으로 가고 있죠."}, {"start": 237.228, "end": 241.858, "text": "유비텍은 휴머노이드 로봇이 무기가 아닌, 집에 함께 사는 누군가처럼 느껴지게 하려 합니다."}, {"start": 241.908, "end": 243.418, "text": "여러분의 가정 안에서 말이죠."}, {"start": 243.468, "end": 247.939, "text": "유비텍은 방금 공장 노동자보다는 인간 같은 동반자에 가까운 로봇을 공개했습니다."}, {"start": 247.99, "end": 249.298, "text": "인간과 닮은 반려 로봇이죠."}, {"start": 249.348, "end": 254.5, "text": "이 새로운 로봇의 명칭은 'U1 프로 시리즈'로, 유비텍의 새로운 소비자 로봇 브랜드인"}, {"start": 254.55, "end": 259.86, "text": "'U 월드'를 통해 출시됩니다. 유비텍이 이미 '워커 시리즈' 같은 산업용 휴머노이드로 유명하다는 점에서 큰 변화죠."}, {"start": 259.91, "end": 265.379, "text": "하지만 U1 프로는 가정과 사회적 상호작용, 그리고 개인적인 연결을 목표로 합니다."}, {"start": 265.43, "end": 271.06, "text": "'U 월드'는 유비텍이 소비자 로봇 시장으로 진출하는 발판입니다. 로봇을 단순히 제작하는 것에서 벗어나..."}, {"start": 271.11, "end": 275.245, "text": "공장 업무용 로봇을 넘어, 유비텍은 대화하고 기억하며 반응할 수 있는"}, {"start": 275.295, "end": 277.778, "text": "가정용 로봇 'U1 프로'를 선보였습니다."}, {"start": 277.829, "end": 280.334, "text": "이 로봇은 가정 환경에 녹아들 수 있도록 설계되었는데요."}, {"start": 280.384, "end": 283.218, "text": "업체 측은 네 가지 핵심 철학을 바탕으로 제작했다고 밝혔습니다."}, {"start": 283.269, "end": 286.168, "text": "감정 기억 AI 모델, 향상된 인간-로봇 상호작용,"}, {"start": 286.218, "end": 288.379, "text": "기억 장치의 로컬 암호화, 그리고..."}, {"start": 288.43, "end": 289.379, "text": "맞춤형 외형 디자인이죠."}, {"start": 289.43, "end": 292.165, "text": "간단히 말해, U1 프로는 사용자를 기억하고"}, {"start": 292.216, "end": 294.139, "text": "훨씬 더 개인적인 방식으로..."}, {"start": 294.189, "end": 295.139, "text": "반응하도록 설계되었습니다."}, {"start": 295.189, "end": 297.139, "text": "가장 눈길을 끄는 부분은 역시 디자인입니다."}, {"start": 297.189, "end": 300.699, "text": "유비텍은 인간과 매우 흡사한 두 가지 버전을 공개했는데요."}, {"start": 300.75, "end": 304.218, "text": "하나는 금발에 안경을 쓰고 검은 정장을 입은 남성 스타일이고,"}, {"start": 304.269, "end": 307.86, "text": "다른 하나는 긴 금발 머리에 검은 드레스를 입은 여성 스타일입니다."}, {"start": 307.91, "end": 312.658, "text": "남성 모델은 키가 약 183cm에 몸무게는 42kg 정도이며,"}, {"start": 312.709, "end": 318.019, "text": "여성 모델은 키 약 168cm에 몸무게는 35kg 정도죠."}, {"start": 318.069, "end": 323.338, "text": "두 버전 모두 88도의 자유도를 갖추고 있어, 로봇이 신체의 많은 부분을"}, {"start": 323.389, "end": 324.338, "text": "더욱 세밀하게 움직일 수 있다는 뜻입니다."}, {"start": 324.389, "end": 329.579, "text": "또한 한 번 충전으로 약 2시간에서 4시간가량 작동이 가능하다고 합니다."}, {"start": 329.629, "end": 331.579, "text": "기억 기능이야말로 이번 발표의 핵심이라 할 수 있는데요."}, {"start": 331.629, "end": 336.42, "text": "U1 프로는 사용자의 취향과 일상, 과거의 대화를 모두 기억하도록 설계되었습니다."}, {"start": 336.47, "end": 340.588, "text": "가정용 반려 로봇이 함께 사는 사람을"}, {"start": 340.588, "end": 341.538, "text": "이해해야 한다는 점이 중요하기 때문입니다."}, {"start": 341.588, "end": 345.052, "text": "유비텍은 프라이버시를 위해 이 기억들이 로컬 암호화로 보호된다고 하는데,"}, {"start": 345.103, "end": 346.459, "text": "이는 매우 중요한 대목입니다."}, {"start": 346.509, "end": 349.42, "text": "하지만 암호화가 곧 완벽한 프라이버시를 보장하는 건 아닙니다."}, {"start": 349.47, "end": 354.18, "text": "유비테크는 모든 데이터 처리가 로봇 자체에서 이루어지는지,"}, {"start": 354.23, "end": 356.259, "text": "아니면 일부 데이터가 클라우드로 전송되는지 명확히 밝히지 않았습니다."}, {"start": 356.31, "end": 358.62, "text": "그래서 이 부분은 계속 주의 깊게 살펴볼 필요가 있죠."}, {"start": 358.67, "end": 362.06, "text": "U1 프로는 정식 공개 전부터 이미 큰 관심을 끌고 있습니다."}, {"start": 362.11, "end": 368.658, "text": "유비테크는 6월 2일 징동닷컴에서 예약 판매를 시작했는데요. 보증금은 3,000위안, 우리 돈으로 약"}, {"start": 368.709, "end": 370.459, "text": "442달러 정도입니다."}, {"start": 370.509, "end": 374.019, "text": "이 로봇은 단 8일 만에 3,000대 이상의 주문을 기록했습니다."}, {"start": 374.069, "end": 376.019, "text": "최종 가격은 아직 공개되지 않았습니다."}, {"start": 376.069, "end": 380.699, "text": "정식 출시는 6월 30일로 예정되어 있으며, 초기 물량은 9월 중순쯤 배송될 것으로 보입니다."}, {"start": 380.75, "end": 383.019, "text": "하지만 여기서 우리는 냉정하게 현실을 따져봐야 합니다."}, {"start": 383.069, "end": 388.459, "text": "U1 프로가 요리, 청소, 계단 오르기나 무거운 짐 운반이 가능하다는 명확한 증거는 아직 없거든요."}, {"start": 388.509, "end": 392.899, "text": "한 보고서에 따르면 기능이 일어서기, 앉기, 그리고 평평한 실내 바닥을 걷는 정도에"}, {"start": 392.949, "end": 393.899, "text": "그칠 수도 있다고 합니다."}, {"start": 393.949, "end": 398.658, "text": "그래서 현재로서는 U1 프로가 진정한 가사 도우미보다는 현실적인 소셜 로봇에 더 가까워 보입니다."}, {"start": 398.709, "end": 401.778, "text": "그럼에도 이 사실이 중요한 이유는 유비테크가 작은 스타트업이 아니기 때문입니다."}, {"start": 401.829, "end": 407.06, "text": "2012년에 설립된 이 회사는 홍콩 증시에 상장된 최초의 휴머노이드 로봇 기업이 되었습니다."}, {"start": 407.11, "end": 412.658, "text": "2023년, 유비테크는 U1 프로를 통해 인간을 닮은 감성형 가정용 로봇이"}, {"start": 412.709, "end": 414.42, "text": "차세대 로봇 산업의 핵심 카테고리가 될 것이라고 확신하고 있습니다."}, {"start": 414.47, "end": 417.379, "text": "한편으로는 로봇들이 점점 더 인간과 닮아가고 있는 셈이죠."}, {"start": 417.43, "end": 421.098, "text": "하지만 다른 한편에선 피규어 AI가 그 못지않게 중요한 것을 보여주고 있습니다."}, {"start": 421.149, "end": 424.098, "text": "이 로봇들을 실제로 얼마나 빨리 대량 생산할 수 있는지를요."}, {"start": 424.149, "end": 428.18, "text": "피규어 AI가 휴머노이드 로봇 경쟁에서 중대한 이정표를 세웠습니다."}, {"start": 428.23, "end": 433.56, "text": "이 회사는 현재 660대 이상의 로봇을 제작했는데, 더 놀라운 사실은"}, {"start": 433.61, "end": 435.098, "text": "피규어가 그 수치에 도달한 속도입니다."}, {"start": 435.149, "end": 438.3, "text": "이 로봇들은 작은 연구실에서 천천히 만들어진 게 아닙니다."}, {"start": 438.35, "end": 442.879, "text": "피규어는 산호세의 봇 Q 공장에서 실제 생산 규모를 확장했고"}, {"start": 442.93, "end": 445.538, "text": "그 비약적인 발전 속도가 지금 이 순간을 특별하게 만듭니다."}, {"start": 445.588, "end": 451.038, "text": "봇 Q 공장에서 피규어는 하루 한 대였던 생산량을 하루 24대로 늘렸습니다."}, {"start": 451.088, "end": 452.899, "text": "단 120일도 안 되는 기간에요."}, {"start": 452.949, "end": 457.139, "text": "불과 4개월 만에 생산량이 24배나 급증했다는 뜻입니다."}, {"start": 457.189, "end": 461.098, "text": "지난 5월은 피규어 역사상 최대 생산량을 기록하며 회사가 나아갈 방향을 보여주었습니다."}, {"start": 461.149, "end": 464.819, "text": "단순한 시연을 넘어 본격적인 제조 단계로 말이죠."}, {"start": 464.87, "end": 469.019, "text": "이것이 중요한 이유는 휴머노이드 로봇이 초기 자동차가 겪었던"}, {"start": 469.069, "end": 469.978, "text": "그런 단계에 진입하고 있기 때문입니다."}, {"start": 470.028, "end": 474.42, "text": "포드의 모델 T 조립 라인은 자동차를 값비싼 기계에서"}, {"start": 474.47, "end": 475.899, "text": "더 많은 사람이 접할 수 있는 제품으로 바꿨습니다."}, {"start": 475.949, "end": 479.139, "text": "피규어 역시 휴머노이드 로봇 분야에서 같은 변화를 꾀하고 있습니다."}, {"start": 479.189, "end": 484.338, "text": "목표는 로봇을 화제성 위주의 시연에서 벗어나 실제 작업 현장으로 투입해"}, {"start": 484.389, "end": 489.379, "text": "매일 유용한 작업을 반복하게 하는 것이죠. 하지만 로봇을 빨리 만드는 건 오직..."}, {"start": 489.43, "end": 494.18, "text": "로봇은 신뢰성 또한 뛰어납니다. 그래서 피규어는 '봇큐(BotQ)' 공정에 엄격한 품질 검사를 도입했죠."}, {"start": 494.23, "end": 498.978, "text": "각 로봇은 조립 과정에서 50개 이상의 점검 항목을 거칩니다. 그 후에는,"}, {"start": 499.028, "end": 504.019, "text": "모든 로봇이 공장에서 출고되기 전 80개 이상의 개별 테스트를 통과해야 합니다. 배터리"}, {"start": 504.069, "end": 510.978, "text": "생산 라인만 봐도 초기 합격률 99.3%를 기록했는데, 이는 대부분의 배터리가 재작업 없이"}, {"start": 511.028, "end": 519.219, "text": "테스트를 통과했다는 뜻입니다. 또한 피규어는 로봇의 신체를 움직이게 하는 모터 시스템인 액추에이터를 9,000개 이상 제작했습니다."}, {"start": 519.269, "end": 526.66, "text": "가장 미래적인 디테일 중 하나는 '피규어 03' 로봇의 생산이 끝났을 때 벌어지는 일입니다. 로봇을 작업자가 직접 옮기지 않습니다."}, {"start": 526.71, "end": 532.979, "text": "대신 피규어 03는 공장에서 본사까지 스스로 걸어서 이동합니다. 내장된 카메라와"}, {"start": 533.028, "end": 537.14, "text": "인지 시스템을 사용해 스스로 경로를 파악하며, 원격 제어나 사람이"}, {"start": 537.19, "end": 538.14, "text": "뒤에서 밀어주지 않아도 스스로 나아갑니다."}, {"start": 538.19, "end": 539.66, "text": "피규어의 도전은 여기서 멈추지 않습니다."}, {"start": 539.71, "end": 542.979, "text": "봇큐는 연간 최대 12,000대의 로봇을 생산할 수 있도록 설계되었습니다."}, {"start": 543.028, "end": 548.259, "text": "회사의 장기적인 계획은 훨씬 더 원대합니다. 4년 안에 로봇 생산량을"}, {"start": 548.308, "end": 549.259, "text": "10만 대까지 늘리는 것이 목표죠."}, {"start": 549.308, "end": 554.02, "text": "피규어는 또한 휴머노이드 로봇이 결국 다른 휴머노이드 로봇을 제작하는 데 기여하길 원합니다."}, {"start": 554.07, "end": 559.06, "text": "이러한 생산량 증대는 매우 중요한데, 실제 환경에 배치된 로봇이 많을수록 더 유용한 데이터가 쌓이기 때문입니다."}, {"start": 559.11, "end": 561.859, "text": "피규어는 이를 '데이터 플라이휠'이라고 부릅니다."}, {"start": 561.908, "end": 566.479, "text": "실제 환경에서 작동하는 로봇이 늘어날수록 AI 시스템이 배우는 교훈도 많아지며, 그러한"}, {"start": 566.528, "end": 570.379, "text": "교훈들은 미래의 로봇들이 동일한 작업을 더 잘 수행할 수 있도록 돕습니다."}, {"start": 570.428, "end": 575.66, "text": "이는 이미 BMW의 스파르탄버그 공장에서 실현되고 있으며, 그곳에서 피규어 02 로봇들이"}, {"start": 575.71, "end": 576.859, "text": "10시간씩 교대 근무를 수행 중입니다."}, {"start": 576.908, "end": 577.859, "text": "주 5일 근무하죠."}, {"start": 577.908, "end": 581.54, "text": "이 로봇들은 이미 수만 대의 차량 부품을 처리하는 데 기여했습니다."}, {"start": 581.59, "end": 587.979, "text": "피규어(Figure)는 2022년에 설립되었으며, 현재 기업 가치는 약 390억 달러에 달합니다."}, {"start": 588.028, "end": 592.3, "text": "진짜 핵심은 명확합니다. 휴머노이드 로봇 공학이 검증 단계를 넘어서고 있다는 거죠."}, {"start": 592.35, "end": 595.3, "text": "이제 더 이상 \"작동이 가능할까?\"가 관건이 아닙니다."}, {"start": 595.35, "end": 598.02, "text": "\"얼마나 빨리 만들 수 있을까?\"가 문제죠."}, {"start": 598.07, "end": 600.66, "text": "현재는 피규어 AI가 그 흐름을 주도하고 있습니다."}, {"start": 600.71, "end": 603.979, "text": "하지만 더 많은 휴머노이드 로봇을 만드는 건 경쟁의 일부일 뿐입니다."}, {"start": 604.028, "end": 608.42, "text": "다음 과제는 인간이 매일 당연하게 여기는 능력을 갖춰"}, {"start": 608.47, "end": 609.42, "text": "로봇을 유용하게 만드는 것입니다."}, {"start": 609.47, "end": 614.14, "text": "바로 '손'이죠. 로봇 공학에서 가장 어려운 문제는 걷기나 세상을 보는 것만이 아닙니다."}, {"start": 614.19, "end": 616.3, "text": "가장 난해한 문제 중 하나는 바로 손입니다."}, {"start": 616.35, "end": 622.379, "text": "비엔나에서 열린 세계 최대 로봇 컨퍼런스 중 하나인 ICRA 2026에서,"}, {"start": 622.428, "end": 624.459, "text": "타스(Tars)라는 회사가 그 이유를 증명했습니다."}, {"start": 624.509, "end": 628.979, "text": "타스는 '덱스핸드(Dexhand)'라는 로봇 손을 공개했는데, 시연회에서 보여준 손가락 제어 수준은"}, {"start": 629.028, "end": 632.379, "text": "대부분의 로봇 손이 여전히 도달하기 힘든 경지였습니다."}, {"start": 632.428, "end": 637.06, "text": "덱스핸드는 무대에서 실시간으로 수어 알파벳 26자를 모두 표현했습니다."}, {"start": 637.11, "end": 641.099, "text": "이건 매우 중요한 성과입니다. 글자마다 손가락과 엄지의 위치를"}, {"start": 641.149, "end": 642.3389999999999, "text": "아주 정밀하게 바꿔야 하니까요."}, {"start": 642.389, "end": 646.82, "text": "인간에게는 쉬워 보일지 몰라도, 손이 자연스럽고 미세하게 움직여야 가능한 일입니다."}, {"start": 646.87, "end": 652.02, "text": "로봇에게 이는 매우 어려운 일입니다. 모든 손가락을 굽히고 위치를 유지하며,"}, {"start": 652.07, "end": 653.54, "text": "적절한 때에 움직여야 하기 때문이죠."}, {"start": 653.59, "end": 657.82, "text": "덱스핸드는 알파벳 전 과정을 마쳤고, 이 시연은 훨씬 더 인상적이었는데"}, {"start": 657.87, "end": 659.979, "text": "사람이 거울을 보듯 조종할 수 있었기 때문입니다."}, {"start": 660.028, "end": 664.099, "text": "사람이 손을 움직이자, 덱스핸드가 그 동작을 실시간으로 따라 했습니다."}, {"start": 664.149, "end": 667.259, "text": "타르스는 세 가지 주요 설계 방식을 통해 이를 가능케 했습니다."}, {"start": 667.308, "end": 669.099, "text": "첫 번째는 손의 구조입니다."}, {"start": 669.149, "end": 674.259, "text": "덱스핸드에는 21개의 독립된 관절이 있으며, 각 관절은 사람 손의 뼈 구조와"}, {"start": 674.308, "end": 678.14, "text": "일치하도록 설계되었습니다. 즉, 단순한 집게처럼 열고 닫기만 하는 게 아니라는 뜻이죠."}, {"start": 678.19, "end": 682.259, "text": "섬세한 손가락 움직임을 통해 실제 사람 손처럼 움직이도록 제작되었습니다."}, {"start": 682.308, "end": 685.02, "text": "두 번째 주요 특징은 손가락 끝 내부에 있습니다."}, {"start": 685.07, "end": 688.18, "text": "타르스는 그 안에 아주 작은 고해상도 카메라를 설치했습니다."}, {"start": 688.23, "end": 693.54, "text": "이 카메라들은 0.05밀리미터 수준의 표면 디테일을 감지할 수 있는데, 이는 사람 머리카락보다"}, {"start": 693.59, "end": 699.7, "text": "얇은 수준입니다. 또한 초당 240회 이상 이 디테일을 캡처하죠. 쉽게 말해,"}, {"start": 699.75, "end": 704.739, "text": "덱스핸드는 물체를 만지는 것뿐만 아니라, 닿아 있는 표면을 시각적으로 읽을 수도 있습니다."}, {"start": 704.788, "end": 711.219, "text": "세 번째는 AI 시스템입니다. 덱스핸드는 'aWE 3.0'이라는 모델을 구동하여"}, {"start": 711.269, "end": 715.859, "text": "접촉 중인 물체를 파악하도록 돕습니다. AI는 물체가 딱딱한지 부드러운지,"}, {"start": 715.908, "end": 720.42, "text": "매끄러운지 거친지, 그리고 손에서 미끄러질지 등을 판단할 수 있습니다. 이러한 조합이 중요한 이유는"}, {"start": 720.47, "end": 724.579, "text": "물체를 다루는 게 보기보다 훨씬 어렵기 때문입니다. 달걀을 집는다고 생각해보세요."}, {"start": 724.629, "end": 729.06, "text": "너무 세게 쥐면 깨지고, 너무 살살 쥐면 떨어뜨리고 말죠. 인간은 이런 것들을..."}, {"start": 729.11, "end": 733.459, "text": "생각하지 않고도 미세하게 그립을 바꾸죠. 덱스핸드는 시각 정보와"}, {"start": 733.509, "end": 737.94, "text": "손가락의 촉감을 결합해 실시간으로 그립을 조정하도록 설계되었습니다."}, {"start": 737.99, "end": 742.82, "text": "그래서 덱스핸드는 피지컬 AI를 둘러싼 거대한 경쟁에 합류하게 된 거죠. 로봇들은 이제"}, {"start": 742.87, "end": 748.02, "text": "걷고, 나르고, 실제 공간을 이동하는 데 능숙해지고 있습니다. 하지만 여전히 많은 로봇이"}, {"start": 748.07, "end": 753.54, "text": "물건을 집거나 다루는 단순한 작업에는 실패하곤 하죠. 덱스핸드는 바로 그 문제를 해결합니다."}, {"start": 753.59, "end": 758.66, "text": "다만 이건 시연일 뿐, 완제품은 아닙니다. 내구성, 비용, 실제 공장 투입 여부와"}, {"start": 758.71, "end": 764.02, "text": "AWE 3.0이 도움 없이 새로운 물체를 다룰 수 있을지에 대한 의문은 남아 있습니다. 하지만"}, {"start": 764.07, "end": 769.06, "text": "비엔나에서 보내온 메시지는 분명합니다. 로봇 손은 큰 진전을 이루었고, 단순히 움직이는 로봇과"}, {"start": 769.11, "end": 774.499, "text": "실제로 일하는 로봇 사이의 간극은 예상보다 빨리 좁혀질 것입니다. 그리고 로봇이"}, {"start": 774.548, "end": 779.379, "text": "물체를 더 잘 만지고, 쥐고, 이해하게 된다면 다음 질문은 더 커질 것입니다."}, {"start": 779.428, "end": 783.78, "text": "로봇이 현실 세계의 실수로부터 어떻게 배울 것인가? 바로 그 지점에서"}, {"start": 783.83, "end": 790.259, "text": "아스트로봇 S1이 등장합니다. S1은 휴머노이드 로봇 공학의 가장 중요한 개념 중 하나를 보여주었습니다."}, {"start": 790.308, "end": 794.579, "text": "로봇이 스스로 작업을 시도하고, 오류가 생기면 인간의 교정을 받아들여"}, {"start": 794.629, "end": 799.619, "text": "이를 더 나은 훈련 데이터로 전환하는 것이죠. 비엔나에서 열린 ICRA-2026에서"}, {"start": 799.668, "end": 803.619, "text": "아스트로봇은 비전-언어 행동 워크플로를 사용하는 S1을 선보였습니다."}, {"start": 803.668, "end": 806.18, "text": "쉽게 말해, S1은 장면을 보고"}, {"start": 806.23, "end": 807.78, "text": "무엇을 해야 할지 이해하며"}, {"start": 807.83, "end": 810.3389999999999, "text": "그 이해를 실제 움직임으로 바꿀 수 있습니다."}, {"start": 810.389, "end": 813.3, "text": "이것은 단순히 정해진 명령을 반복하는 로봇이 아닙니다."}, {"start": 813.35, "end": 816.66, "text": "AI를 사용해 스스로 작업을 완수하는 로봇입니다."}, {"start": 816.71, "end": 820.02, "text": "어려운 작업에서도 인간의 도움을 받을 수 있게 하면서 말이죠."}, {"start": 820.07, "end": 823.14, "text": "가장 중요한 부분은 제어 루프가 얼마나 매끄럽게 보이는가 하는 점입니다."}, {"start": 823.19, "end": 825.14, "text": "S1은 스스로 작업을 시작할 수 있습니다."}, {"start": 825.19, "end": 827.7, "text": "그러다 인간 작업자가 VR을 통해 개입해서,"}, {"start": 827.75, "end": 831.859, "text": "동작을 수정하고 흐름을 끊지 않은 채 로봇에게 다시 제어권을 넘길 수 있습니다. 이는 곧"}, {"start": 831.908, "end": 836.9, "text": "실수 때문에 전체 공정을 멈출 필요가 없다는 뜻이죠. 대신 아스트로봇은 그 실수를"}, {"start": 836.95, "end": 842.499, "text": "유용한 학습 데이터로 바꿉니다. 로봇이 작업을 시도하고 인간이 실패를 바로잡으면, 그 수정된 동작이"}, {"start": 842.548, "end": 847.459, "text": "AI가 학습하기에 더 좋은 예시가 되는 것입니다. 이것이 바로 로봇 공학 경쟁이"}, {"start": 847.509, "end": 853.459, "text": "데이터, 모델, 배포, 그리고 더 많은 데이터의 싸움으로 변모하고 있는 이유입니다. 하드웨어 또한 이 이야기의"}, {"start": 853.509, "end": 860.18, "text": "주요한 부분이죠. S1은 아스트로봇의 주력 모델인 케이블 구동형 AI 로봇입니다. 키는 약 170cm이며"}, {"start": 860.23, "end": 865.459, "text": "양팔을 벌린 길이는 약 193cm에 달합니다. 각 팔은 7자유도를 갖췄고 한 팔로 약 5kg까지"}, {"start": 865.509, "end": 870.739, "text": "들어 올릴 수 있습니다. 배터리 수명은 약 4~6시간이며 유선 연결도 지원하죠."}, {"start": 870.788, "end": 876.9, "text": "S1은 아틀라스처럼 걷는 휴머노이드는 아닙니다. 사람 같은 상체를 가진 바퀴형 모바일 로봇으로,"}, {"start": 876.95, "end": 881.859, "text": "빠르고 정밀한 팔 동작을 위해 제작되었습니다. 케이블 구동형 본체는 S1이"}, {"start": 881.908, "end": 886.579, "text": "인간의 근육처럼 더 유연하게 움직이도록 돕기에 중요합니다. 이 설계는 관절의 불필요한 유격을 줄여주죠."}, {"start": 886.629, "end": 891.859, "text": "모터가 움직이는 데 필요한 무게를 낮추고 힘 제어를 개선하며 사람 주변에서도 더 안전하게 해줍니다."}, {"start": 891.908, "end": 897.619, "text": "덕분에 S1이 물건을 다루거나 옷을 개고, 문을 열고,"}, {"start": 897.668, "end": 904.259, "text": "물건을 정리하며 도구를 사용할 때 매끄러워 보이는 것입니다. 로봇은 단지 빠르게 움직이는 것이 아니라 통제된 움직임을 지향합니다."}, {"start": 904.308, "end": 910.099, "text": "원격 조작 시스템 또한 그만큼 중요합니다. 아스트로봇은 메타 퀘스트"}, {"start": 910.149, "end": 915.859, "text": "3S 헤드셋과 조이스틱을 사용한 VR 설정을 설명합니다. 인간 작업자는 1인칭 시점으로 S1을 제어해 정밀한"}, {"start": 915.908, "end": 921.379, "text": "수작업이나 큰 신체 움직임을 위한 3인칭 시점까지 지원하죠. 시스템은 100Hz의 제어"}, {"start": 921.428, "end": 926.979, "text": "주파수를 보고하며, 명령 실행까지 약 20밀리초, 1인칭 모드에서 약 100밀리초의 지연 시간이 발생합니다."}, {"start": 927.028, "end": 932.42, "text": "거리를 생각하면 더욱 놀라운 결과죠. 이번 시연은 심천과"}, {"start": 932.47, "end": 939.54, "text": "약 5,600마일 떨어진 빈을 연결했습니다. S1이 복잡한 다단계 작업에서는 아직 완벽하지 않지만"}, {"start": 939.59, "end": 944.18, "text": "나아갈 방향은 명확합니다. 로봇 공학의 다음 혁신은 실패할 줄 아는 로봇에서 시작될지도 모릅니다."}, {"start": 944.23, "end": 949.379, "text": "교정받고, 그로부터 배우며, 더 발전해서 돌아오는 거죠. 로봇 격투부터 인간을 닮은"}, {"start": 949.428, "end": 954.66, "text": "동반자, 공장 생산, 정교해진 손, 그리고 인간의 교정을 통해 배우는 로봇까지. 이번"}, {"start": 954.71, "end": 959.94, "text": "주는 물리적 AI의 발전 속도를 여실히 보여줍니다. 이제 질문은 간단합니다. 과연 로봇이"}, {"start": 959.99, "end": 968.19, "text": "유용한 도구가 될까요? 아니면 인간이 감당하기 힘든 문을 열어버린 걸까요?"}];
let player;
function onYouTubeIframeAPIReady(){
    player=new YT.Player('player',{
        videoId:videoId,
        playerVars:{autoplay:1,controls:1,rel:0,modestbranding:1,fs:0,disablekb:1,cc_load_policy:3},
        events:{
            'onReady': function(e){ 
                // [V160.4] 유튜브 기본 자막이 같이 켜져서 두 개로 겹쳐 보이는 현상 방지 🐾
                try { e.target.unloadModule("captions"); } catch(err) {} 
            },
            'onStateChange':onPlayerStateChange
        }
    });
}

// [V160.1] AI냥: 유튜브 고유 단축키 무력화 후, 'f' 키 등 사용자 편의 조작을 가로채서 자체 전체화면 실행! 🐱✨
window.addEventListener('keydown', function(e) {
    if (!player || !player.getPlayerState || typeof player.getDuration !== 'function') return;

    // Ctrl + ArrowLeft: Previous Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowLeft') {
        const t = player.getCurrentTime();
        let target = Math.max(0, t - 5);
        for(let i = subs.length - 1; i >= 0; i--) {
            if(subs[i].start < t - 1.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    // Ctrl + ArrowRight: Next Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowRight') {
        const t = player.getCurrentTime();
        let target = t + 5;
        for(let i = 0; i < subs.length; i++) {
            if(subs[i].start > t + 0.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    if (e.key.toLowerCase() === 'f') {
        toggleFullScreen();
        e.preventDefault();
    } else if (e.key === ' ' || e.key.toLowerCase() === 'k') {
        if (player.getPlayerState() === 1) player.pauseVideo();
        else player.playVideo();
        e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
        player.seekTo(player.getCurrentTime() - 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowRight') {
        player.seekTo(player.getCurrentTime() + 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowUp') {
        player.setVolume(player.getVolume() + 5);
        e.preventDefault();
    } else if (e.key === 'ArrowDown') {
        player.setVolume(player.getVolume() - 5);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'm') {
        player.isMuted() ? player.unMute() : player.mute();
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'j') {
        player.seekTo(player.getCurrentTime() - 10, true);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'l') {
        player.seekTo(player.getCurrentTime() + 10, true);
        e.preventDefault();
    } else if (e.key >= '0' && e.key <= '9') {
        const fraction = parseInt(e.key) / 10;
        player.seekTo(player.getDuration() * fraction, true);
        e.preventDefault();
    }
});

// iframe 클릭 시 빼앗긴 포커스를 0.1초 뒤에 훔쳐와서 'f' 등 단축키가 계속 먹히도록 유지! 🕵️‍♂️✨
window.addEventListener('blur', function() {
    setTimeout(() => {
        if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
            window.focus();
        }
    }, 100);
});
let syncInterval;
let activityTimeout;
function resetActivity() {
    const fsBtn = document.getElementById('fs-btn');
    const subsEl = document.getElementById('subtitles');
    if(fsBtn) fsBtn.classList.remove('fade-out');
    if(subsEl) subsEl.classList.remove('ui-hidden');
    clearTimeout(activityTimeout);
    if (player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING) {
        activityTimeout = setTimeout(() => {
            if(fsBtn) fsBtn.classList.add('fade-out');
            if(subsEl) subsEl.classList.add('ui-hidden');
        }, 3000);
    }
}
document.addEventListener('mousemove', resetActivity);
document.addEventListener('touchstart', resetActivity, {passive: true});
document.addEventListener('keydown', resetActivity);
window.addEventListener('blur', resetActivity);
window.addEventListener('focus', resetActivity);

function onPlayerStateChange(event){
    resetActivity();
    if(event.data==YT.PlayerState.PLAYING){
        if(!syncInterval) syncInterval=setInterval(updateSubs,100);
    }else{
        clearInterval(syncInterval); syncInterval=null;
    }
}
function updateSubs(){
    const t=player.getCurrentTime();
    let currentHtml="";
    let activeSubs = [];
    for(let i=0;i<subs.length;i++){
        if(t>=subs[i].start && t<=subs[i].end){
            activeSubs.push(subs[i]);
        }
    }
    if(activeSubs.length > 0){
        // [V160.5] AI 번역 생성 시 자막 시간이 미세하게 겹쳐(Overlap) 동일한 내용이 두 줄로 출력되는 현상 방지! 
        // 겹치는 자막 중 가장 마지막 매칭 항목 하나만 렌더링 🐾
        let bestSub = activeSubs[activeSubs.length - 1];
        currentHtml = `<div class="sub-line">${bestSub.text}</div><br>`;
    }
    if(document.getElementById('subtitles').innerHTML !== currentHtml){
        document.getElementById('subtitles').innerHTML=currentHtml;
    }
}

let isDragging=false, startY, currentBottom, subEl=document.getElementById('subtitles');
document.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchstart', dragStart, {passive:false});
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('touchend', dragEnd);

function dragStart(e) {
    if(!e.target.classList.contains('sub-line')) return;
    isDragging = true;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    startY = clientY;
    let style = window.getComputedStyle(subEl);
    currentBottom = parseFloat(style.bottom) || 0;
    subEl.classList.add('dragging');
    e.preventDefault();
}
function dragMove(e) {
    if(!isDragging) return;
    // [FIX] iframe 등에 의해 mouseup 이벤트를 놓쳤지만 마우스 버튼은 떼어진 경우 강제 드래그 종료! 🛡️✨
    if(e.type.includes('mouse') && e.buttons === 0) {
        dragEnd(e);
        return;
    }
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    let dy = clientY - startY;
    subEl.style.bottom = (currentBottom - dy) + 'px';
    if(e.cancelable) e.preventDefault();
}
function dragEnd(e) {
    isDragging = false;
    subEl.classList.remove('dragging');
}

// [Wheel / Pinch to Zoom for Font Size]
let currentFontSize = 4.5;
let initialDist = 0;
let initialFontSize = 4.5;

document.addEventListener('wheel', (e) => {
    if(e.target.closest('#subtitles') || e.target.classList.contains('sub-line')) {
        e.preventDefault();
        currentFontSize += e.deltaY < 0 ? 0.2 : -0.2;
        currentFontSize = Math.max(1, Math.min(20, currentFontSize));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
    }
}, {passive: false});

document.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialFontSize = currentFontSize;
        e.preventDefault();
    }
}, {passive: false});

document.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        let scale = currentDist / initialDist;
        currentFontSize = Math.max(1, Math.min(20, initialFontSize * scale));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
        e.preventDefault();
    }
}, {passive: false});
