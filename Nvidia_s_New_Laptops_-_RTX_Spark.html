nd": 95.269, "text": "기존 도구들이 있긴 하지만,"}, {"start": 95.319, "end": 97.57, "text": "어느 정도의 지식이 뒷받침되어야 합니다."}, {"start": 97.62, "end": 100.469, "text": "게다가 여러 도구를 직접 조합해야 해서"}, {"start": 100.519, "end": 102.769, "text": "일반인들이 하기엔 상당히 번거로운 작업이죠."}, {"start": 102.819, "end": 105.07, "text": "이제 엔비디아와 마이크로소프트는"}, {"start": 105.12, "end": 107.67099999999999, "text": "이것이 PC의 새로운 시대가 될 것이라고 확신합니다."}, {"start": 107.721, "end": 109.37, "text": "실제로 그렇게 부르고 있고요."}, {"start": 109.42, "end": 112.269, "text": "핵심은 이런 에이전트들이 클라우드가 아닌"}, {"start": 112.319, "end": 114.07, "text": "기기에서 로컬로 실행된다는 점입니다."}, {"start": 114.12, "end": 116.769, "text": "그러기 위해서는 방대한 통합 메모리가 필요하죠."}, {"start": 116.819, "end": 119.471, "text": "진정으로 유능한 에이전트를 구현하려면"}, {"start": 119.521, "end": 121.62, "text": "상당히 큰 모델이"}, {"start": 121.62, "end": 123.79, "text": "아주 빠른 RAM에 탑재되어야 하기 때문입니다."}, {"start": 123.84, "end": 126.29, "text": "일반 노트북으로는 불가능한 작업이죠."}, {"start": 126.34, "end": 127.59, "text": "게이밍 노트북이라도 안 됩니다."}, {"start": 127.64, "end": 130.19, "text": "초고속 RAM 용량이 충분하지 않기 때문이죠,"}, {"start": 130.24, "end": 131.387, "text": "일반 게이밍 노트북들 말이에요."}, {"start": 131.437, "end": 133.789, "text": "기술적으로는 맥북 프로도 가능합니다."}, {"start": 133.84, "end": 136.588, "text": "통합 메모리를 128GB까지 구성할 수 있으니까요."}, {"start": 136.639, "end": 139.189, "text": "AMD 스트릭스 헤일로 노트북도 마찬가지입니다."}, {"start": 139.24, "end": 141.189, "text": "통합 메모리 용량이 아주 크지만,"}, {"start": 141.24, "end": 143.689, "text": "이 두 장치 모두 지원하지 않는 게 있습니다."}, {"start": 143.74, "end": 145.089, "text": "바로 CUDA 소프트웨어 스택이죠."}, {"start": 145.139, "end": 148.388, "text": "CUDA는 사실상 거의 모든 AI 도구와,"}, {"start": 148.438, "end": 152.387, "text": "프레임워크, 모델이 가장 먼저 구축되고 최적화되는 기반입니다."}, {"start": 152.437, "end": 155.888, "text": "128GB 통합 메모리를 갖춘 RTX 스파크는,"}, {"start": 155.938, "end": 158.289, "text": "이 CUDA 스택을 사용할 수 있죠."}, {"start": 158.34, "end": 158.988, "text": "정말 훌륭합니다."}, {"start": 159.038, "end": 161.588, "text": "이 비전을 위해 특수 제작된 것 같네요."}, {"start": 161.639, "end": 164.388, "text": "하지만 여기서부터 상황이 조금 복잡해집니다."}, {"start": 164.438, "end": 166.388, "text": "왜냐하면 생각해 보면 이건,"}, {"start": 166.438, "end": 169.088, "text": "엔비디아가 넘어야 할 산이 아니거든요."}, {"start": 169.139, "end": 170.588, "text": "실제로는 마이크로소프트의 몫이죠."}, {"start": 170.639, "end": 172.189, "text": "그들이 직접 만들고 구현해야 하는 회사니까요."}, {"start": 172.24, "end": 174.789, "text": "에이전트가 상주할 윈도우의 핵심 영역을 말이죠."}, {"start": 174.84, "end": 176.589, "text": "이건 운영 체제에 완전히 박혀 있는 수준이에요."}, {"start": 176.639, "end": 179.089, "text": "작업 표시줄에서 돌아가며 파일에 접근하고,"}, {"start": 179.139, "end": 182.988, "text": "앱까지 건드리려면 시스템 권한이 엄청나게 필요하죠."}, {"start": 183.038, "end": 186.387, "text": "지금의 코파일럿만 봐도, 다들 어떻게든"}, {"start": 186.437, "end": 187.787, "text": "시스템에서 지워버리려고 안달이잖아요."}, {"start": 187.837, "end": 189.189, "text": "너무 참견이 심하다고 느끼니까요."}, {"start": 189.24, "end": 192.29, "text": "그런데 '코파일럿 익스트림'이라니, 상상이 가세요?"}, {"start": 192.341, "end": 195.589, "text": "이건 훨씬 더 강력한 제어권과 접근 권한이 필요할 겁니다."}, {"start": 195.639, "end": 197.487, "text": "성능도 그만큼 훨씬 뛰어나겠지만요."}, {"start": 197.538, "end": 200.088, "text": "그러니 이런 모든 권한은 필수적일 수밖에 없어요."}, {"start": 200.139, "end": 209.29, "text": "우리가 마이크로소프트 같은 기업에 그런 통제권을 믿고 맡길 수 있을진 모르겠지만, 기능을 구현하려면 어쩔 수 없는 부분이죠."}, {"start": 209.341, "end": 211.388, "text": "제대로만 된다면 정말 환상적일 거예요."}, {"start": 211.438, "end": 217.088, "text": "진짜 혁명적일 겁니다. 우리가 따분하고 시간 아깝다고 여기는 복잡한 작업들을 컴퓨터가 다 알아서 해줄 테니까요."}, {"start": 217.139, "end": 222.588, "text": "하지만 동시에 마이크로소프트가 이런 강력한 도구를 만들면서"}, {"start": 222.639, "end": 224.29, "text": "안 거슬리게 만들 수 있을까 싶기도 해요."}, {"start": 224.341, "end": 225.688, "text": "뭐, 지켜봐야 알겠죠."}, {"start": 225.739, "end": 229.988, "text": "RTX 스파크 칩이 활약할 두 번째 분야는 바로 창작 작업입니다."}, {"start": 230.038, "end": 235.349, "text": "넉넉한 램을 갖춘 5070 기반인데, 어도비도 프리미어와 포토샵에 새로운 아키텍처를 도입했더군요."}, {"start": 235.4, "end": 239.447, "text": "이 칩과 관련된 구체적인 엔지니어링이 필요할 텐데, 꽤 멋지긴 하지만 그게 정확히 어떤 건지는 좀 더 지켜봐야겠네요. 👍"}, {"start": 239.497, "end": 245.048, "text": "자, 세 번째는 게이밍입니다. 확실히 해두자면 '세 번째' 순위가 맞아요. 노트북 목록을 보시면 아시겠지만,"}, {"start": 245.098, "end": 251.149, "text": "이것들은 게이밍 전용 노트북이 아니거든요. 레노버 요가, 델 XPS, 에이수스 프로아트 같은 제품들인데, 이건 크리에이터나"}, {"start": 251.199, "end": 254.049, "text": "생산성에 초점을 맞춘 노트북이고 게이밍은 부가적인 기능일 뿐이죠. 💻"}, {"start": 254.099, "end": 256.949, "text": "하지만 엔비디아는 꽤 흥미로운 수치들을 제시하고 있습니다."}, {"start": 257.0, "end": 258.949, "text": "나중에 이 모든 것들을 직접 테스트해 봐야겠지만요."}, {"start": 259.0, "end": 260.449, "text": "게임하기에도 의외로 훌륭할지도 모릅니다."}, {"start": 260.5, "end": 262.55, "text": "이제 RTX 부분에 대한 제 개인적인 견해를 말씀드리자면,"}, {"start": 262.6, "end": 265.55, "text": "하드웨어 자체는 매우 흥미롭다고 생각합니다. ✨"}, {"start": 265.6, "end": 269.05, "text": "그리고 가격 면에서도, 만약 여러분이 이 제품에 정말 관심이 있으시다면,"}, {"start": 269.1, "end": 272.149, "text": "아직 가격이 공개되지는 않았지만, 마음의 준비를 좀 하셔야 할 것 같아요."}, {"start": 272.199, "end": 276.348, "text": "지금 시장 상황을 보면 상당히 고가로 책정될 것 같거든요. 💸"}, {"start": 276.399, "end": 280.449, "text": "하지만 또 다른 관점에서 보면, 이건 새로운 PC 시대의 비전 같은 겁니다."}, {"start": 280.5, "end": 283.348, "text": "이와 관련된 복잡한 문제들을 생각해 볼 때,"}, {"start": 283.399, "end": 284.949, "text": "기술적인 요소는 일단 제쳐두더라도 말이죠."}, {"start": 284.999, "end": 287.048, "text": "기술적인 부분만 해도 이미 엄청나게 어려운 과제니까요."}, {"start": 287.098, "end": 289.25, "text": "설령 기술적으로 완벽하게 구현해낸다 하더라도,"}, {"start": 289.3, "end": 291.75, "text": "이런 도구가 운영체제에 기본적으로 탑재되는 것에 대한"}, {"start": 291.8, "end": 293.848, "text": "사회적 수용 여부는 또 다른 문제입니다."}, {"start": 293.899, "end": 295.389, "text": "그건 정말 큰 요구사항이죠. 🧐"}, {"start": 295.439, "end": 296.788, "text": "요즘 같은 시대엔,"}, {"start": 296.838, "end": 298.99, "text": "그런 기능을 지금 당장 쓸 수 있다고 해도,"}, {"start": 299.04, "end": 300.588, "text": "제 시스템에 그걸 두고 싶을지는 잘 모르겠어요."}, {"start": 300.639, "end": 304.189, "text": "뭐랄까, 신기하긴 한데... 제가 직접 하나하나 조립해서"}, {"start": 304.24, "end": 305.689, "text": "모든 게 어디 있는지 정확히 알고 있을 때가,"}, {"start": 305.74, "end": 307.788, "text": "조금 더 마음이 편한 것 같거든요."}, {"start": 307.838, "end": 310.189, "text": "그런데 이게 운영체제에 아예 내장되어 있고,"}, {"start": 310.24, "end": 313.189, "text": "사람이 자리에 없어도 알아서 작업을 처리한다면..."}, {"start": 313.24, "end": 316.389, "text": "글쎄요, 정말 생소한 느낌이네요."}, {"start": 316.439, "end": 317.689, "text": "하지만 만약 그런 일을 해낼 회사가 딱 하나 있다면,"}, {"start": 317.74, "end": 320.737, "text": "그만한 영향력과 명성,"}, {"start": 320.838, "end": 324.788, "text": "그리고 파트너로서 감당할 수 있는 규모를 갖춘 곳은,"}, {"start": 324.838, "end": 325.588, "text": "바로 엔비디아일 겁니다."}, {"start": 325.639, "end": 326.389, "text": "자본력도 어마어마하고,"}, {"start": 326.439, "end": 329.389, "text": "AI를 비롯해 여러 산업 분야와 탄탄하게 연결되어 있죠."}, {"start": 329.439, "end": 331.79, "text": "게이밍, 생산성, 워크플로까지요."}, {"start": 331.841, "end": 334.288, "text": "정말 많은 것들이 엔비디아를 중심으로 돌아가고 있어요."}, {"start": 334.338, "end": 336.788, "text": "그러니 그들이라면 충분히 해낼 수 있을지도 모르죠."}, {"start": 336.838, "end": 338.091, "text": "뭐, 누가 알겠어요? 여러분은 어떻게 생각하시나요?"}, {"start": 338.141, "end": 339.829, "text": "여러분이 보시기엔 어떤가요? 한번 생각해 본다면 말이죠."}, {"start": 339.879, "end": 343.629, "text": "이 기능의 성능과 공개된 사례들을 보면 여러분이 실제로"}, {"start": 343.68, "end": 351.079, "text": "사용하고 싶거나 필요한 기능인가요? 영상 재미있게 보셨길 바랍니다."}];
let player;
function onYouTubeIframeAPIReady(){
    player=new YT.Player('player',{videoId:videoId,playerVars:{autoplay:1,controls:1,rel:0,modestbranding:1,fs:0},events:{'onStateChange':onPlayerStateChange}});
}
let syncInterval;
function onPlayerStateChange(event){
    if(event.data==YT.PlayerState.PLAYING){
        if(!syncInterval) syncInterval=setInterval(updateSubs,100);
    }else{
        clearInterval(syncInterval); syncInterval=null;
    }
}
function updateSubs(){
    const t=player.getCurrentTime();
    let currentHtml="";
    for(let i=0;i<subs.length;i++){
        if(t>=subs[i].start && t<=subs[i].end){
            currentHtml += `<div class="sub-line">${subs[i].text}</div><br>`;
        }
    }
    if(document.getElementById('subtitles').innerHTML !== currentHtml){
        document.getElementById('subtitles').innerHTML=currentHtml;
    }
}

let isDragging=false, startY, currentBottom, subEl=document.getElementById('subtitles');
document.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchstart', dragStart, {passive:false});
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('touchend', dragEnd);

function dragStart(e) {
    if(!e.target.classList.contains('sub-line')) return;
    isDragging = true;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    startY = clientY;
    let style = window.getComputedStyle(subEl);
    currentBottom = parseFloat(style.bottom) || 0;
    subEl.classList.add('dragging');
    e.preventDefault();
}
function dragMove(e) {
    if(!isDragging) return;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    let dy = clientY - startY;
    subEl.style.bottom = (currentBottom - dy) + 'px';
    if(e.cancelable) e.preventDefault();
}
function dragEnd(e) {
    isDragging = false;
    subEl.classList.remove('dragging');
}

// [Wheel / Pinch to Zoom for Font Size]
let currentFontSize = 4.5;
let initialDist = 0;
let initialFontSize = 4.5;

document.addEventListener('wheel', (e) => {
    if(e.target.closest('#subtitles') || e.target.classList.contains('sub-line')) {
        e.preventDefault();
        currentFontSize += e.deltaY < 0 ? 0.2 : -0.2;
        currentFontSize = Math.max(1, Math.min(20, currentFontSize));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vh');
    }
}, {passive: false});

document.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialFontSize = currentFontSize;
        e.preventDefault();
    }
}, {passive: false});

document.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        let scale = currentDist / initialDist;
        currentFontSize = Math.max(1, Math.min(20, initialFontSize * scale));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vh');
        e.preventDefault();
    }
}, {passive: false});

</script>
