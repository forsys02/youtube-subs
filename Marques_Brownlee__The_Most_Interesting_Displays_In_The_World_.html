const subs=[{"start": 2.649, "end": 6.25, "text": "맥북에는 터치스크린이 없죠."}, {"start": 6.25, "end": 9.718, "text": "하지만 터치스크린이 있다면 어떨까요?"}, {"start": 9.769, "end": 13.398, "text": "이건 인트리킷(Interkit)에서 만든 '매직 스크린'이라는 제품이에요."}, {"start": 13.448, "end": 17.96, "text": "자석으로 맥북에 딱 붙는 터치 감응형 플렉시블 글라스죠."}, {"start": 18.01, "end": 23.48, "text": "USB-C 포트에 꽂기만 하면 맥북 화면 전체가 즉시..."}, {"start": 23.53, "end": 24.199, "text": "터치스크린이 됩니다."}, {"start": 24.25, "end": 25.8, "text": "성능은 상상했던 그대로예요."}, {"start": 25.85, "end": 29.559, "text": "웹사이트나 앱에서 스크롤을 하거나 여기저기 눌러볼 수 있고,"}, {"start": 29.609, "end": 34.04, "text": "간단한 사진 편집도 가능하죠. macOS 타호의 아이폰 미러링 기능도..."}, {"start": 34.09, "end": 37.879, "text": "훨씬 편해요. 원래 손가락으로 조작하게 만든 앱을..."}, {"start": 37.929, "end": 42.279, "text": "직접 제어할 수 있으니까요. 사실 이건 터치를 구현하기 위한 일종의 '편법'이에요."}, {"start": 42.329, "end": 48.04, "text": "노트북에 트랙패드인 척 신호를 보내는 거거든요. 하지만 편법치고는..."}, {"start": 48.09, "end": 53.16, "text": "정말 잘 만들었습니다. 화면 터치 시 발생하는 흔들림을 방지하려고..."}, {"start": 53.21, "end": 57.8, "text": "디스플레이를 탄탄하게 받쳐주는 전용 폴리오 케이스를 제공하고,"}, {"start": 57.85, "end": 61.52, "text": "휴대하기 편하게 안쪽으로 쏙 들어가도록 아주 영리하게 설계됐죠."}, {"start": 61.57, "end": 65.96, "text": "또, 글라스를 끼운 채 실수로 맥북을 닫아버려 깨지는 일도 없어야 하잖아요?"}, {"start": 66.01, "end": 69.84, "text": "그래서 모서리 USB-C 포트가 스토퍼 역할까지 하도록 디자인했습니다."}, {"start": 69.89, "end": 72.12, "text": "덕분에 그런 실수를 원천 차단해주죠."}, {"start": 72.17, "end": 74.12, "text": "심지어 이런 스타일러스 액세서리까지 있어서,"}, {"start": 74.17, "end": 77.999, "text": "맥북에서 떼어낸 뒤 투명한 별도 기기처럼 사용할 수도 있습니다."}, {"start": 78.049, "end": 78.799, "text": "와콤 태블릿 같은 기능이죠."}, {"start": 78.849, "end": 81.719, "text": "덕분에 호버링과 필압 감지가 가능하고"}, {"start": 81.769, "end": 83.358, "text": "배터리 수명도 100시간이나 됩니다."}, {"start": 83.408, "end": 89.358, "text": "하지만 이 모든 것의 복병은 올해 말로 예상되는 맥북 프로 업데이트입니다."}, {"start": 89.408, "end": 94.559, "text": "이미 들으셨겠지만, OLED와 터치스크린을 탑재한 리디자인이 기대되거든요."}, {"start": 94.60900000000001, "end": 98.959, "text": "그 소식 때문에 이 제품의 유통기한이 다 되어가는 느낌도 듭니다."}, {"start": 99.009, "end": 107.358, "text": "하지만 터치스크린이 필요하다고 해서 꼭 5,000달러짜리 새 노트북을 사야 하는 건 아닙니다."}, {"start": 107.408, "end": 113.2, "text": "특히 지금 쓰는 M2나 M3 모델이 멀쩡하고 앞으로 몇 년은 더 충분하다면 말이죠."}, {"start": 113.25, "end": 119.239, "text": "그리고 맥북 프로가 나오면 오히려 이 제품이 더 좋아질 수도 있어요."}, {"start": 119.289, "end": 123.24, "text": "왜냐하면 지금의 macOS는 터치스크린용이 전혀 아니거든요."}, {"start": 123.29, "end": 124.6, "text": "터치스크린을 썼던 적이 없으니까요."}, {"start": 124.65, "end": 127.12, "text": "모든 게 마우스와 키보드 입력에 맞춰 설계됐죠."}, {"start": 127.17, "end": 132.518, "text": "물론 제어 센터나 일부 기능들은 터치 쪽으로 기우는 듯한 모습도 보입니다."}, {"start": 132.568, "end": 135.319, "text": "가끔은 좀 어처구니없는 컨트롤들도 있지만요."}, {"start": 135.37, "end": 136.879, "text": "그건 나중에 따로 이야기하도록 하죠."}, {"start": 136.93, "end": 139.238, "text": "아무튼 터치스크린 노트북이 출시되면"}, {"start": 139.288, "end": 145.56, "text": "애플도 macOS를 터치 친화적으로 업데이트해야 할 겁니다. 터치 영역을 키우거나"}, {"start": 145.61, "end": 151.56, "text": "UI를 상황에 맞게 최적화하는 식으로요. 그런 변화가 기존 기기들에도 적용되면"}, {"start": 151.61, "end": 155.638, "text": "이 제품도 사용하기 훨씬 편해질 거예요. 너무 작아서 한 번에 누르기 힘들었던 창 제어 버튼도"}, {"start": 155.688, "end": 160.838, "text": "훨씬 조작하기 쉬워질 거고, 창 상단을 잡고 옮기는 것도 아주 간편해지겠죠."}, {"start": 160.889, "end": 166.439, "text": "화면을 이리저리 옮길 때 터치 지점이 너무 작아서 애먹을 일은 이제 없을 거예요. 이게 장점이죠."}, {"start": 166.49, "end": 172.039, "text": "킥스타터 캠페인 이후에 150달러 정도의 버전을 출시할 계획이라고 하는데요."}, {"start": 172.09, "end": 177.159, "text": "올해 말이라니 좀 불안하긴 하지만, 잘되길 빌어보죠. 전 아직도..."}, {"start": 177.21, "end": 181.078, "text": "터치스크린 노트북을 그렇게 좋아하는 편은 아니지만, 분명히 이걸..."}, {"start": 181.128, "end": 186.358, "text": "좋아할 분들이 계실 거예요. 아래에 링크 남겨둘게요. 정말 끝내주는 기술입니다. 이번 영상은..."}, {"start": 186.408, "end": 192.75900000000001, "text": "디스플레이와 관련된 멋진 기술들에 대한 겁니다. 이번 제품은 그 한계를..."}, {"start": 192.81, "end": 196.719, "text": "조금 더 밀어붙였다고 볼 수 있죠. 바로 '볼륨메트릭 디스플레이'니까요."}, {"start": 196.77, "end": 199.209, "text": "일명 홀로그램이라고도 부릅니다."}, {"start": 199.25900000000001, "end": 204.449, "text": "이미 스튜디오 채널에서 이 제품의 원리에 대해 자세히 다룬 영상이 있는데요."}, {"start": 204.5, "end": 207.928, "text": "왜 기술적으로는 엄밀히 홀로그램이 아닌지도 설명했었죠."}, {"start": 207.978, "end": 208.449, "text": "하지만 아시죠?"}, {"start": 208.5, "end": 210.25, "text": "그런 기술적인 정의는 사실 그렇게 중요하지 않아요."}, {"start": 210.3, "end": 216.168, "text": "핵심은 홀로그램 효과를 낸다는 거예요. 멋진 물체가 3D 공간에 구현되어..."}, {"start": 216.21800000000002, "end": 221.769, "text": "사람들이 주변에 모여 거의 360도 모든 각도에서 감상할 수 있죠."}, {"start": 221.81900000000002, "end": 224.529, "text": "그리고 이런 효과를 만들어내는 방식이..."}, {"start": 224.579, "end": 225.849, "text": "사실 좀 경이로운 수준입니다."}, {"start": 225.9, "end": 231.438, "text": "자, 실제로 전원을 껐을 때의 모습은 이렇습니다."}, {"start": 231.438, "end": 232.909, "text": "보시다시피..."}, {"start": 232.96, "end": 236.06900000000002, "text": "사실 두 개의 디스플레이가 서로 등을 맞대고 있는 형태고요."}, {"start": 236.12, "end": 238.988, "text": "여기 중앙 축을 중심으로 회전하는 방식이죠."}, {"start": 239.038, "end": 240.548, "text": "개별 픽셀을 실제로 확인할 수 있는데"}, {"start": 240.598, "end": 242.588, "text": "화면 해상도가 그렇게 높지 않기 때문이죠"}, {"start": 242.639, "end": 244.50900000000001, "text": "잠시 후면 훨씬 더 잘 이해되실 거예요"}, {"start": 244.56, "end": 246.349, "text": "아마 이런 회전형 팬 디스플레이를"}, {"start": 246.4, "end": 249.909, "text": "보신 적이 있을 텐데요, 저 픽셀 한 줄을"}, {"start": 249.96, "end": 252.469, "text": "아주 빠르게 회전시키면 원을 만들 수 있습니다"}, {"start": 252.52, "end": 260.87, "text": "LED를 깜빡여서 켜질 때마다 항상 같은 위치에 오게 하면, 공간에 픽셀처럼 떠 있는 점이 생기죠"}, {"start": 260.92, "end": 266.87, "text": "이렇게 선을 여러 개 쌓으면 깊이감을 주는 Z축이 생기기 시작합니다"}, {"start": 266.92, "end": 270.069, "text": "하지만 이때부터 엄청나게 복잡해지죠"}, {"start": 270.12, "end": 279.17, "text": "자, 다시 켜볼게요. 이 장치는 900 RPM으로 회전하는데, 초당 약 15바퀴를 도는 셈입니다"}, {"start": 279.22, "end": 281.889, "text": "그렇게 빠르게 돌면서 불이 들어오면 보시다시피"}, {"start": 281.939, "end": 286.37, "text": "한 번에 점 하나나 선 하나만 보이는 게 아니라, 떠 있는 단면처럼 보이게 됩니다"}, {"start": 286.42, "end": 292.449, "text": "이제 3D 객체를 완벽한 타이밍에 맞춰 모든 단면을 나란히 배열해 보여줘야 하죠"}, {"start": 292.5, "end": 298.769, "text": "패널이 회전하면서 실제 부피를 가진 3D 객체인 것 같은 착시를 일으켜서"}, {"start": 298.819, "end": 301.329, "text": "마치 공간에 정지해 있는 것처럼 보이게 합니다"}, {"start": 301.379, "end": 305.408, "text": "이건 엄청난 양의 연산이 필요한 대단히 복잡한 기술입니다"}, {"start": 305.459, "end": 312.93, "text": "한 바퀴 회전을 480개의 단면으로 나누기 때문에, 30 FPS 영상을 구현하려면"}, {"start": 312.98, "end": 321.728, "text": "디스플레이를 초당 7,200번 업데이트해야 하죠. 7,200Hz 주사율인 셈입니다"}, {"start": 321.778, "end": 328.259, "text": "단지 이 물체를 초당 30프레임으로 보여주기 위해서요. 정말 말도 안 되는 일이죠. 그리고"}, {"start": 328.31, "end": 331.699, "text": "세계 최고 해상도 디스플레이가 아닌 이유이기도 합니다. 이미 연산량이 어마어마하거든요"}, {"start": 331.75, "end": 336.689, "text": "...이걸 가능하게 하려고 많은 공을 들였죠. 사실, 여기엔 프로세싱 성능에 여유가 좀 더 필요한데"}, {"start": 336.74, "end": 343.329, "text": "오류 수정을 위해서예요. 이 모터들이 반드시 정확히 900RPM으로"}, {"start": 343.379, "end": 349.088, "text": "회전하는 건 아니거든요. 그래서 모든 게 완벽하게 맞물리도록 해야 하죠. 하지만 일단 맞물리면..."}, {"start": 349.139, "end": 352.689, "text": "글쎄요, 제 말을 믿으셔야 할 겁니다. 카메라에 담기가 워낙 어렵거든요. 하지만..."}, {"start": 352.74, "end": 357.968, "text": "정말 근사해 보입니다. 실제로 보면 정말 멋지죠. 보시다시피 디스플레이 일부가"}, {"start": 358.019, "end": 362.93, "text": "유리 돔으로 덮여 있는데, 안전 때문이기도 하지만 공기 저항을 줄여서"}, {"start": 362.98, "end": 367.408, "text": "디스플레이 회전을 유지하려는 목적도 있죠. 정말 복잡한 기술이 들어갔지만, 전용 소프트웨어도 있습니다."}, {"start": 367.459, "end": 373.81, "text": "체적 디스플레이 전용으로 제작된 이미지와 3D 객체들을 보여주기 위해서죠."}, {"start": 373.86, "end": 377.968, "text": "이런 비주얼은 정말 어디서도 본 적이 없어요. 홀로그램 녹화나"}, {"start": 378.019, "end": 382.848, "text": "이걸 홀로그램이라고 불렀다고 절 때리고 싶어 할 분들에 대해 더 궁금하다면"}, {"start": 382.899, "end": 388.05, "text": "아래 링크된 스튜디오 영상을 꼭 보세요. 저희 스튜디오를 거쳐 간 기술 중"}, {"start": 388.1, "end": 392.088, "text": "가장 흥미로운 것 중 하나거든요. 정말 끝내주는 기술입니다."}, {"start": 392.139, "end": 397.288, "text": "자, 제가 닉 디지오반니에게 S등급 셰프라는 평가를 받았는데요. 뭐, 기분은 좋죠."}, {"start": 397.338, "end": 402.649, "text": "소소하게 자랑 좀 해봤습니다. 하지만 전 요리가 아주 쉬운 것도 좋아해요. 그래서..."}, {"start": 402.699, "end": 406.649, "text": "오늘 영상의 후원사인 'Chef IQ'를 소개합니다. 여기 이 부품은 익숙한 기술이지만,"}, {"start": 406.699, "end": 411.528, "text": "미니 오븐과 연결되어 완전히 스마트한 요리 시스템으로 변신합니다."}, {"start": 411.579, "end": 413.449, "text": "오븐 자체만으로도 이미 끝내주죠."}, {"start": 413.5, "end": 416.088, "text": "화면에서 요리하고 싶은 걸 고르기만 하면 됩니다."}, {"start": 416.139, "end": 419.209, "text": "생선, 닭고기, 스테이크, 계란까지 뭐든요."}, {"start": 419.259, "end": 420.968, "text": "그러면 알아서 완벽하게 요리해 줍니다."}, {"start": 421.019, "end": 425.37, "text": "에어프라이어는 물론이고 베이킹, 브로일, 건조까지 다 돼요."}, {"start": 425.42, "end": 427.288, "text": "10가지 이상의 조리 모드가 내장되어 있는데,"}, {"start": 427.338, "end": 428.569, "text": "성능도 하나같이 훌륭하죠."}, {"start": 428.62, "end": 431.129, "text": "주방 조리도구 여러 개를 이거 하나로 치울 수 있어요."}, {"start": 431.18, "end": 433.129, "text": "자, 여기 구워진 것 좀 보세요."}, {"start": 433.18, "end": 435.538, "text": "와, 정말 완벽하게 구워졌네요."}, {"start": 435.588, "end": 438.42, "text": "그런데 이게 또 기가 막히게 잘하는 게 바로 달걀 요리예요."}, {"start": 438.47, "end": 441.939, "text": "예상 못 하셨겠지만, 사실 이렇게 전용 트레이가 들어있거든요."}, {"start": 441.99, "end": 444.819, "text": "여기 구멍 여섯 개에 달걀을 하나씩 깨트려 넣으면"}, {"start": 444.87, "end": 447.379, "text": "취향에 맞춰 매번 완벽한 달걀 프라이를 만들 수 있죠."}, {"start": 447.43, "end": 449.459, "text": "그리고 사람들이 잘 생각 못 하는 장점이 하나 더 있는데,"}, {"start": 449.509, "end": 453.859, "text": "최대 500도까지 올라가면서도 크기는 일반 오븐보다 훨씬 작다는 거예요."}, {"start": 453.909, "end": 457.778, "text": "덕분에 예열이 훨씬 빨라서 요즘은 일반 오븐을 거의 안 쓰게 되더라고요."}, {"start": 457.829, "end": 462.019, "text": "하지만 진짜 대박인 건, 이 IQ 센서 온도계랑 같이 쓰는 거예요."}, {"start": 462.069, "end": 464.019, "text": "그러면 음식이 언제 다 익었는지 정확히 알 수 있거든요."}, {"start": 464.069, "end": 466.978, "text": "예를 들어 치킨을 구울 때 내부 온도가 몇 도여야 하는지 알아서,"}, {"start": 467.028, "end": 469.218, "text": "매번 아주 기가 막히게 익혀내죠."}, {"start": 469.269, "end": 470.218, "text": "당연히 전용 앱도 있습니다."}, {"start": 470.269, "end": 472.42, "text": "조리 시간이 꽤 걸리는 요리를 할 때도,"}, {"start": 472.47, "end": 475.939, "text": "아예 방에서 나가서 언제든 진행 상황을 확인할 수 있으니까 정말 편해요."}, {"start": 475.99, "end": 478.459, "text": "물론 작업이 완료되면 알림도 받을 수 있고요."}, {"start": 478.509, "end": 482.218, "text": "여러분도 훨씬 쉬운 방법으로 S급 셰프가 되고 싶다면,"}, {"start": 482.269, "end": 484.899, "text": "할인 코드 'MKBHD'를 사용해 40% 할인을 받을 수 있습니다."}, {"start": 484.949, "end": 486.538, "text": "설명란의 링크에서 확인해 보세요."}, {"start": 486.588, "end": 489.99, "text": "네, 정말 40%나 할인됩니다."}, {"start": 489.99, "end": 491.269, "text": "천만예요."}, {"start": 491.269, "end": 492.899, "text": "좋습니다, 다음 제품으로 넘어가 보죠."}, {"start": 492.949, "end": 496.689, "text": "자, 이 모니터를 보시죠. 제가 지금 앉아 있는 거리에서는..."}, {"start": 496.74, "end": 499.408, "text": "...꽤 괜찮아 보일지 모르지만 사실은 그렇지 않습니다."}, {"start": 499.459, "end": 508.579, "text": "델의 52인치 울트라 와이드 6K 곡면 120Hz 썬더볼트 모니터입니다."}, {"start": 508.579, "end": 512.608, "text": "델이 올해 흥미로운 디스플레이를 많이 내놓았는데, 제 생각엔..."}, {"start": 512.658, "end": 516.29, "text": "...이게 가장 흥미로운 제품입니다. 그 이유는 제가 오랫동안..."}, {"start": 516.34, "end": 521.729, "text": "...듀얼 모니터만 써왔기 때문이죠. 제 데스크 셋업을 보신 분들은 아실 텐데, 이건..."}, {"start": 521.778, "end": 525.729, "text": "...수많은 울트라 와이드를 써보면서 제가 처음으로..."}, {"start": 525.778, "end": 530.849, "text": "...듀얼 모니터를 완벽하게 대체할 수 있겠다고 느낀 싱글 모니터입니다."}, {"start": 530.899, "end": 535.969, "text": "우선 해상도는 6K로, 6144 x 2560입니다."}, {"start": 536.019, "end": 540.849, "text": "8K는 아니지만 픽셀 밀도가 충분해서 기본적으로..."}, {"start": 540.899, "end": 545.249, "text": "...27인치 4K 모니터와 동일한 129ppi의 픽셀 밀도를 보여줍니다."}, {"start": 545.298, "end": 550.609, "text": "텍스트가 아주 또렷하고 경계선도 깔끔해서, 훨씬 가까이 앉아도 화질이 깨지지 않죠."}, {"start": 550.658, "end": 555.609, "text": "그리고 디자인도 정말 훌륭합니다. OLED가 아닌데도 말이죠."}, {"start": 555.658, "end": 557.609, "text": "전체적으로 베젤이 아주 얇게 빠졌습니다."}, {"start": 557.658, "end": 560.609, "text": "표면은 저반사 처리가 되어 있고 IPS 패널을 탑재했죠."}, {"start": 560.658, "end": 564.609, "text": "sRGB 100%에 DCI-P3 색 영역을 99% 충족합니다."}, {"start": 564.658, "end": 567.609, "text": "전문가용 최상급 컬러 그레이딩 패널까지는 아니지만,"}, {"start": 567.658, "end": 573.609, "text": "3,000달러라는 가격답게 외형만큼은 정말 압도적이고 인상적입니다."}, {"start": 573.658, "end": 577.609, "text": "하지만 이 제품의 진가는 여러 기기를 쓰는 분들에게 드러납니다."}, {"start": 577.658, "end": 582.57, "text": "최대 4대의 컴퓨터를 연결하는 KVM 스위치가 내장된 데다"}, {"start": 582.62, "end": 587.609, "text": "훌륭한 전용 소프트웨어도 지원하거든요. 썬더볼트 4와 HDMI 2.1 포트 2개,"}, {"start": 587.658, "end": 593.129, "text": "DP 1.4 포트 2개를 통해 여러 대를 연결하고 전환할 수 있습니다."}, {"start": 593.178, "end": 597.77, "text": "키보드와 마우스 하나로 말이죠. 그게 이 제품의 핵심입니다."}, {"start": 597.82, "end": 602.009, "text": "흔한 PIP 기능 대신 화면을 분할해서 보여주는"}, {"start": 602.058, "end": 606.89, "text": "다양한 PBP 모드를 지원합니다. 듀얼 모니터 대용으로 딱이죠."}, {"start": 606.94, "end": 610.41, "text": "여러 대의 화면을 모니터 하나에 전부 띄울 수도 있습니다."}, {"start": 610.46, "end": 613.53, "text": "모니터 한 대가 멀티 모니터 세트가 되는 셈이죠."}, {"start": 613.58, "end": 615.849, "text": "완만한 곡률도 아주 마음에 듭니다."}, {"start": 615.899, "end": 617.369, "text": "화면 가장자리를 보면 살짝 휘어 있죠?"}, {"start": 617.418, "end": 620.41, "text": "훨씬 더 많이 휜 울트라 와이드 모니터들도 많고"}, {"start": 620.46, "end": 622.009, "text": "그런 게 보기엔 더 멋질 수도 있지만,"}, {"start": 622.058, "end": 625.05, "text": "이 제품의 곡률은 제가 책상에서 듀얼 모니터를 쓸 때의"}, {"start": 625.1, "end": 628.0889999999999, "text": "실제 각도와 훨씬 더 비슷합니다."}, {"start": 628.139, "end": 630.0889999999999, "text": "큰 디스플레이 두 개를 나란히 두면"}, {"start": 630.139, "end": 632.89, "text": "화면이 평평할 경우 양쪽 끝이 너무 멀게 느껴지거든요"}, {"start": 632.94, "end": 634.009, "text": "가운데 앉아 있을 때 말이죠"}, {"start": 634.058, "end": 636.41, "text": "하지만 약간의 곡률이 있으면... 아주 미세한 차이지만요"}, {"start": 636.46, "end": 639.009, "text": "화면이 눈앞에 더 직관적으로 들어오게 도와줘요"}, {"start": 639.058, "end": 640.0889999999999, "text": "고개를 덜 돌려도 되고요"}, {"start": 640.139, "end": 643.05, "text": "썬더볼트 4 연결로 140W 전력 공급도 가능해서"}, {"start": 643.1, "end": 645.489, "text": "케이블 하나만 노트북에 꽂으면"}, {"start": 645.538, "end": 649.05, "text": "충전과 디스플레이 출력, 2.5기가 이더넷까지"}, {"start": 649.1, "end": 650.41, "text": "한 번에 해결되니 정말 최고죠"}, {"start": 650.46, "end": 652.969, "text": "책상 위의 모든 걸 제어할 단 하나의 디스플레이를 원한다면"}, {"start": 653.019, "end": 656.17, "text": "현재로서는 이 제품이 가장 유력한 후보일 거예요"}, {"start": 656.22, "end": 660.729, "text": "가격은 모니터 두 대 값이지만, 실제로 두 대 분의 역할을 하니까요"}, {"start": 660.778, "end": 661.77, "text": "마음에 쏙 듭니다"}, {"start": 661.82, "end": 662.77, "text": "정말 멋진 기술이에요"}, {"start": 662.82, "end": 664.509, "text": "질문 하나 할게요"}, {"start": 664.558, "end": 669.599, "text": "스마트 안경이랑 VR 헤드셋 중 어느 쪽에 더 끌리나요?"}, {"start": 669.649, "end": 672.599, "text": "작고 가벼운 안경은 하루 종일 쓰고 다닐 수 있잖아요"}, {"start": 672.649, "end": 677.599, "text": "알림이나 길 안내, 번역 같은 편리한 HUD 기능도 제공하고요"}, {"start": 677.649, "end": 679.2, "text": "겉보기에도 튀지 않죠"}, {"start": 679.25, "end": 688.8, "text": "아니면 화질은 최고지만 시야를 완전히 가려버리는 정통 헤드셋이 있죠. 가장 몰입감 넘치고 정밀한 고해상도 콘텐츠를 즐기기에 좋습니다."}, {"start": 688.85, "end": 693.44, "text": "만약 둘 다 아니지만, 각각의 장점만 쏙쏙 골라 누리고 싶다면?"}, {"start": 693.49, "end": 698.16, "text": "그렇다면 '프로젝트 오라(Project Aura)'를 만나보세요. 오늘 여기서 독점으로 첫 모습을 공개합니다."}, {"start": 698.21, "end": 703.599, "text": "사실 두 기기의 딱 중간 지점에 있는 제품이라고 설명하는 게 가장 정확할 거예요."}, {"start": 703.649, "end": 708.079, "text": "엑스리얼, 구글, 퀄컴이 협력해 이 프로젝트를 현실로 구현했습니다."}, {"start": 708.129, "end": 710.879, "text": "엑스리얼의 다른 안경들을 보셨는지 모르겠지만, 사실 구조는 아주 단순합니다."}, {"start": 710.928, "end": 715.28, "text": "기본 원리는 눈앞에 고정된 디스플레이를 장착한다는 개념이죠."}, {"start": 715.33, "end": 720.719, "text": "덕분에 어디를 가든 100인치급 대형 화면을 실제로 눈앞에서 즐길 수 있게 됩니다."}, {"start": 720.769, "end": 724.739, "text": "기발한 방식이지만, 기존 제품은 다른 기기에 연결해서 써야만 했는데요."}, {"start": 724.788, "end": 729.14, "text": "새로운 '프로젝트 오라'는 안드로이드 XR로 구동됩니다. 덕분에 몇 가지 특징이 생겼죠."}, {"start": 729.19, "end": 731.14, "text": "우선, 기기 자체가 하나의 독립된 컴퓨터입니다."}, {"start": 731.19, "end": 734.3, "text": "USB-C 타입으로 스마트폰 크기의 이 '퍽(Puck)'에 연결되어 있죠."}, {"start": 734.35, "end": 741.14, "text": "프레임 주변에 센서가 달려 있어 주변 환경을 인식하고 그래픽을 실제 공간에 고정할 수 있습니다."}, {"start": 741.19, "end": 744.499, "text": "양쪽 바깥쪽 모서리에 있는 두 카메라는 트래킹 전용이고요."}, {"start": 744.548, "end": 747.099, "text": "정중앙에는 한 개의 RGB 카메라가 탑재되어 있습니다."}, {"start": 747.149, "end": 750.459, "text": "그래서 이걸 작동시키면 겉모습은 이렇지만,"}, {"start": 750.509, "end": 753.14, "text": "사용자 눈에는 이게 보입니다."}, {"start": 753.19, "end": 756.579, "text": "눈앞의 허공에 고정되어 떠 있는 안드로이드 XR 화면이죠."}, {"start": 756.629, "end": 758.06, "text": "여기서 모든 작업을 수행할 수 있습니다."}, {"start": 758.11, "end": 760.579, "text": "기존 VR 헤드셋에서 하던 것들을 똑같이 말이죠."}, {"start": 760.629, "end": 762.7, "text": "안드로이드 앱을 실행하거나"}, {"start": 762.75, "end": 766.18, "text": "영상을 시청하고 가상 환경을 돌아다닐 수도 있죠"}, {"start": 766.23, "end": 768.02, "text": "디스플레이도 제가 보기엔 꽤 훌륭합니다"}, {"start": 768.07, "end": 772.739, "text": "눈당 1920x1200 해상도에 72fps 마이크로 OLED를 탑재했거든요"}, {"start": 772.788, "end": 778.979, "text": "물론 70도의 시야각은 안경치곤 괜찮지만 본격적인 VR 헤드셋보다는 좁을 겁니다"}, {"start": 779.028, "end": 783.94, "text": "하지만 핵심은 VR 헤드셋보다 훨씬 저렴하고 가볍다는 점이죠"}, {"start": 783.99, "end": 790.629, "text": "정확히는 91g입니다. 그러니까 몰입감을 조금 포기하는 대신"}, {"start": 790.629, "end": 797.3, "text": "주변을 더 잘 볼 수 있게 된 거죠. UI 너머로 실제 유리를 통해 실제 환경을 보는 거니까요"}, {"start": 797.35, "end": 802.499, "text": "무게가 가볍다 보니 착용감도 더 편안하고, 쓰고 돌아다니고 싶어질지도 모릅니다"}, {"start": 802.548, "end": 804.7, "text": "아니면 그냥 일반 헤드셋을 쓸 때보다"}, {"start": 804.75, "end": 806.219, "text": "훨씬 더 오래 쓰고 있을 수도 있고요"}, {"start": 806.269, "end": 808.579, "text": "영상을 시청하는 동안 사용할 수 있는 기능도 있는데"}, {"start": 808.629, "end": 810.579, "text": "영상을 시야 구석에 고정해두면"}, {"start": 810.629, "end": 813.54, "text": "작은 미니 비디오 플레이어처럼 띄워놓고 돌아다닐 수 있습니다"}, {"start": 813.59, "end": 815.82, "text": "시야 한구석에 작은 HUD가 생기는 셈이죠"}, {"start": 815.87, "end": 818.66, "text": "집안일을 하거나 걸어 다닐 때 쓰기에 딱 좋습니다"}, {"start": 818.71, "end": 821.4590000000001, "text": "'웨이브폼' 팟캐스트를 들으며 설거지를 할 수도 있고요"}, {"start": 821.509, "end": 824.06, "text": "예전에는 VR 헤드셋으로 영상을 보며 이동하려면"}, {"start": 824.11, "end": 825.94, "text": "손가락으로 집어서 고정한 채로"}, {"start": 825.99, "end": 828.3389999999999, "text": "걸어가는 내내 들고 있어야 했거든요"}, {"start": 828.389, "end": 829.66, "text": "아예 몸에 지니고 다니는 거죠."}, {"start": 829.71, "end": 831.82, "text": "일반적인 헤드셋보다 이 안경을 훨씬 더"}, {"start": 831.87, "end": 834.54, "text": "자주 쓰게 될 거라는 점을 노린 게 분명해요."}, {"start": 834.59, "end": 838.54, "text": "그리고 주변 환경 말고 그냥 검은 배경에서 영상이나 영화를 보고 싶을 땐,"}, {"start": 838.59, "end": 843.219, "text": "안경 자체에 '일렉트로크로믹 틴트' 기능이 내장되어 있어서"}, {"start": 843.269, "end": 847.459, "text": "버튼 하나로 화면을 어둡게 만들 수 있는데, 이게 정말 끝내줍니다."}, {"start": 847.509, "end": 852.06, "text": "안경을 투명하게 하면 옅은 선글라스를 낀 것 같은 느낌이에요."}, {"start": 852.11, "end": 856.94, "text": "완전히 투명하진 않지만, AR 요소가 고정된 상태에서도 실제 세상을 확실히 볼 수 있죠."}, {"start": 856.99, "end": 859.9, "text": "반대로 틴트를 최대로 높이면 거의 칠흑같이 어두워집니다."}, {"start": 859.95, "end": 861.54, "text": "그래서 이 제품이 실제로 출시되면,"}, {"start": 861.59, "end": 872.54, "text": "핵심 전략은 '분할 컴퓨팅'이 될 거예요. 쉽게 말해 연산 장치를 안경과 컨트롤러(퍽)로 분리한다는 개념이죠."}, {"start": 872.59, "end": 874.54, "text": "여기엔 몇 가지 독특한 장점이 있습니다."}, {"start": 874.59, "end": 879.54, "text": "컨트롤러 안에는 최신 '스냅드래곤 리얼리티 엘리트' 칩이 탑재되어 성능이 아주 뛰어나요."}, {"start": 879.59, "end": 884.54, "text": "전원 버튼은 지문 인식기 역할도 하고, 전면 전체가 터치패드입니다."}, {"start": 884.59, "end": 888.54, "text": "OS나 AI 기능 같은 대부분의 연산을 여기서 처리하는 거죠."}, {"start": 888.59, "end": 895.54, "text": "나중에 성능이 뒤처지면 안경은 그대로 두고 컨트롤러만 업그레이드해서 USB-C로 연결하면 됩니다."}, {"start": 895.59, "end": 898.54, "text": "아니면 나중에 더 좋은 안경 프레임이 갖고 싶어질 수도 있겠죠."}, {"start": 898.59, "end": 903.54, "text": "시야각이 더 넓거나 해상도가 높은 새 프레임이 나오면요."}, {"start": 903.59, "end": 906.54, "text": "그때는 컴퓨터(컨트롤러)는 그대로 쓰고 안경만 바꾸면 되는 겁니다."}, {"start": 906.59, "end": 911.54, "text": "적은 수의 센서와 카메라만으로 구현한 트래킹 성능에 이미 정말 감탄했어요."}, {"start": 911.59, "end": 913.54, "text": "현재 이 구성을 그대로 써도 지연 시간이 매우 짧습니다."}, {"start": 913.59, "end": 918.979, "text": "비전 프로는 12밀리초 정도인 반면, 이건 말 그대로 3밀리초에 불과하죠."}, {"start": 919.028, "end": 924.979, "text": "네, 이 제품의 핵심은 어느 정도 모듈형이라 부품을 하나씩..."}, {"start": 925.028, "end": 930.82, "text": "나중에 업그레이드할 수 있다는 점인데, 그 자체가 정말 영리합니다. 1년도 채 안 된 제 영상 제목이..."}, {"start": 930.87, "end": 937.219, "text": "'잠깐, 스마트 글래스가 이제 진짜 쓸만해졌나?'였죠. 메타의 최신 AR 글래스를 다뤘는데..."}, {"start": 937.269, "end": 942.499, "text": "겨우 8개월 만에 선택지가 이렇게나 많아졌습니다. 기업들이 안면 컴퓨터를..."}, {"start": 942.548, "end": 950.229, "text": "구현하려는 방식도 아주 다양해졌죠. 정말 흥미롭고 멋진 기술입니다. 시청해 주셔서 감사합니다."}, {"start": 950.278, "end": 955.479, "text": "그럼 다음 영상에서 뵙겠습니다. 안녕히 계세요."}];

// [V160.1] AI냥: 유튜브 고유 단축키 무력화 후, 'f' 키 등 사용자 편의 조작을 가로채서 자체 전체화면 실행! 🐱✨
window.addEventListener('keydown', function(e) {
    if (!player || !player.getPlayerState || typeof player.getDuration !== 'function') return;

    // Ctrl + ArrowLeft: Previous Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowLeft') {
        const t = player.getCurrentTime();
        let target = Math.max(0, t - 5);
        for(let i = subs.length - 1; i >= 0; i--) {
            if(subs[i].start < t - 1.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    // Ctrl + ArrowRight: Next Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowRight') {
        const t = player.getCurrentTime();
        let target = t + 5;
        for(let i = 0; i < subs.length; i++) {
            if(subs[i].start > t + 0.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    if (e.key.toLowerCase() === 'f') {
        toggleFullScreen();
        e.preventDefault();
    } else if (e.key === ' ' || e.key.toLowerCase() === 'k') {
        if (player.getPlayerState() === 1) player.pauseVideo();
        else player.playVideo();
        e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
        player.seekTo(player.getCurrentTime() - 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowRight') {
        player.seekTo(player.getCurrentTime() + 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowUp') {
        player.setVolume(player.getVolume() + 5);
        e.preventDefault();
    } else if (e.key === 'ArrowDown') {
        player.setVolume(player.getVolume() - 5);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'm') {
        player.isMuted() ? player.unMute() : player.mute();
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'j') {
        player.seekTo(player.getCurrentTime() - 10, true);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'l') {
        player.seekTo(player.getCurrentTime() + 10, true);
        e.preventDefault();
    } else if (e.key >= '0' && e.key <= '9') {
        const fraction = parseInt(e.key) / 10;
        player.seekTo(player.getDuration() * fraction, true);
        e.preventDefault();
    }
});

// iframe 클릭 시 빼앗긴 포커스를 0.1초 뒤에 훔쳐와서 'f' 등 단축키가 계속 먹히도록 유지! 🕵️‍♂️✨
window.addEventListener('blur', function() {
    setTimeout(() => {
        if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
            window.focus();
        }
    }, 100);
});
let syncInterval;
let activityTimeout;
function resetActivity() {
    const fsBtn = document.getElementById('fs-btn');
    const subsEl = document.getElementById('subtitles');
    if(fsBtn) fsBtn.classList.remove('fade-out');
    if(subsEl) subsEl.classList.remove('ui-hidden');
    clearTimeout(activityTimeout);
    if (player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING) {
        activityTimeout = setTimeout(() => {
            if(fsBtn) fsBtn.classList.add('fade-out');
            if(subsEl) subsEl.classList.add('ui-hidden');
        }, 3000);
    }
}
document.addEventListener('mousemove', resetActivity);
document.addEventListener('touchstart', resetActivity, {passive: true});
document.addEventListener('keydown', resetActivity);
window.addEventListener('blur', resetActivity);
window.addEventListener('focus', resetActivity);

function onPlayerStateChange(event){
    resetActivity();
    if(event.data==YT.PlayerState.PLAYING){
        if(!syncInterval) syncInterval=setInterval(updateSubs,100);
    }else{
        clearInterval(syncInterval); syncInterval=null;
    }
}
function updateSubs(){
    const t=player.getCurrentTime();
    let currentHtml="";
    let activeSubs = [];
    for(let i=0;i<subs.length;i++){
        if(t>=subs[i].start && t<=subs[i].end){
            activeSubs.push(subs[i]);
        }
    }
    if(activeSubs.length > 0){
        // [V160.5] AI 번역 생성 시 자막 시간이 미세하게 겹쳐(Overlap) 동일한 내용이 두 줄로 출력되는 현상 방지! 
        // 겹치는 자막 중 가장 마지막 매칭 항목 하나만 렌더링 🐾
        let bestSub = activeSubs[activeSubs.length - 1];
        currentHtml = `<div class="sub-line">${bestSub.text}</div><br>`;
    }
    if(document.getElementById('subtitles').innerHTML !== currentHtml){
        document.getElementById('subtitles').innerHTML=currentHtml;
    }
}

let isDragging=false, startY, currentBottom, subEl=document.getElementById('subtitles');
document.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchstart', dragStart, {passive:false});
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('touchend', dragEnd);

function dragStart(e) {
    if(!e.target.classList.contains('sub-line')) return;
    isDragging = true;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    startY = clientY;
    let style = window.getComputedStyle(subEl);
    currentBottom = parseFloat(style.bottom) || 0;
    subEl.classList.add('dragging');
    e.preventDefault();
}
function dragMove(e) {
    if(!isDragging) return;
    // [FIX] iframe 등에 의해 mouseup 이벤트를 놓쳤지만 마우스 버튼은 떼어진 경우 강제 드래그 종료! 🛡️✨
    if(e.type.includes('mouse') && e.buttons === 0) {
        dragEnd(e);
        return;
    }
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    let dy = clientY - startY;
    subEl.style.bottom = (currentBottom - dy) + 'px';
    if(e.cancelable) e.preventDefault();
}
function dragEnd(e) {
    isDragging = false;
    subEl.classList.remove('dragging');
}

// [Wheel / Pinch to Zoom for Font Size]
let currentFontSize = 4.5;
let initialDist = 0;
let initialFontSize = 4.5;

document.addEventListener('wheel', (e) => {
    if(e.target.closest('#subtitles') || e.target.classList.contains('sub-line')) {
        e.preventDefault();
        currentFontSize += e.deltaY < 0 ? 0.2 : -0.2;
        currentFontSize = Math.max(1, Math.min(20, currentFontSize));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
    }
}, {passive: false});

document.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialFontSize = currentFontSize;
        e.preventDefault();
    }
}, {passive: false});

document.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        let scale = currentDist / initialDist;
        currentFontSize = Math.max(1, Math.min(20, initialFontSize * scale));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
        e.preventDefault();
    }
}, {passive: false});
