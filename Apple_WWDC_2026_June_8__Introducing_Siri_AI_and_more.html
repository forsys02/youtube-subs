많은 앱의 수준을 높여주는"}, {"start": 4013.219, "end": 4019.269, "text": "수많은 방법 중 일부일 뿐입니다. 앱 전반에 걸친 이 새로운 기능들은 Apple Intelligence가 지원되는"}, {"start": 4019.32, "end": 4025.668, "text": "모든 언어로 출시될 예정입니다. 최신 소프트웨어 업데이트를 통해 무료로 이용할 수 있죠."}, {"start": 4025.719, "end": 4030.869, "text": "이미지 생성을 포함한 일부 기능은 강력한 서버 모델을 기반으로 하기에 일일 사용량 제한이 있습니다."}, {"start": 4030.92, "end": 4036.068, "text": "더 폭넓은 이용 권한은 대부분의 iCloud+ 구독 플랜을 통해 제공되며,"}, {"start": 4036.119, "end": 4041.971, "text": "여기에는 호환되는 홈 카메라를 위한 Apple Intelligence 지원도 포함됩니다. 지금까지 보신 것이"}, {"start": 4042.021, "end": 4049.25, "text": "차세대 Apple Intelligence입니다. 훨씬 유능하고 대화가 잘 통하는 Siri부터"}, {"start": 4049.3, "end": 4055.148, "text": "웹 브라우징, 창의적 표현, 사진 편집의 새로운 방식까지,"}, {"start": 4055.199, "end": 4058.059, "text": "이 모든 것이 강력한 개인정보 보호를 기반으로 구현됩니다."}, {"start": 4058.11, "end": 4063.259, "text": "플랫폼의 핵심에 강력한 AI를 통합하려는 여정에서"}, {"start": 4063.309, "end": 4068.557, "text": "이는 큰 진전이며 제품을 더욱 개인적이고 유용하게 만들어 줄 것입니다."}, {"start": 4068.608, "end": 4069.86, "text": "그게 다가 아닙니다."}, {"start": 4069.911, "end": 4074.958, "text": "더 많은 애플 인텔리전스 기능을 사용자분들께 선보일 예정입니다."}, {"start": 4075.009, "end": 4080.858, "text": "이번 업데이트는 현재 애플 인텔리전스를 지원하는 모든 모델에 적용됩니다."}, {"start": 4080.909, "end": 4085.157, "text": "가장 강력한 온디바이스 모델과 풍부한 표현력의 음성,"}, {"start": 4085.208, "end": 4092.059, "text": "더욱 진보된 받아쓰기 기능이 최고 사양의 아이폰, 아이패드, 맥에 도입됩니다."}, {"start": 4092.11, "end": 4096.26, "text": "개발자분들은 오늘부터 새로운 버전의 시리를 체험해 보실 수 있습니다."}, {"start": 4096.31, "end": 4100.76, "text": "일반 고객용 시리 AI 베타 서비스는 올해 말 출시될 예정입니다."}, {"start": 4100.81, "end": 4103.358, "text": "여러분의 피드백을 기다리겠습니다."}, {"start": 4103.408, "end": 4109.059, "text": "시리 AI는 초기 출시 시 유럽 연합의 iOS 및 iPadOS에선 제외됩니다."}, {"start": 4109.109, "end": 4114.858, "text": "사용자의 개인 정보와 보안을 지키며 서비스할 방안을 모색 중입니다."}, {"start": 4114.908, "end": 4119.51, "text": "중국에서도 규제 요건을 검토하는 동안에는"}, {"start": 4119.511, "end": 4122.559, "text": "시리 AI와 새로운 애플 인텔리전스 기능을 사용할 수 없습니다."}, {"start": 4122.609, "end": 4126.461, "text": "다음으로 개발자 여러분이 기대하셔도 좋을 소식이 많습니다."}, {"start": 4126.511, "end": 4131.358, "text": "놀라운 앱 제작을 도와줄 새로운 도구와 기술들이 준비됐습니다."}, {"start": 4131.408, "end": 4136.96, "text": "이제 기존 기술을 활용해 앱에 애플 인텔리전스를 바로 적용할 수 있습니다."}, {"start": 4137.01, "end": 4142.259, "text": "'앱 인텐트'를 통해 사용자가 정보를 찾고 작업을 수행하도록"}, {"start": 4142.309, "end": 4143.96, "text": "시리에게 요청만 하면 되죠."}, {"start": 4144.01, "end": 4149.63, "text": "예를 들어 메시지 앱 '라인'이 콘텐츠를 스포트라이트에 색인화하면 사용자는..."}, {"start": 4149.68, "end": 4154.327, "text": "시리에게 앱 내 대화에서 정보를 찾아달라고 요청할 수 있습니다."}, {"start": 4154.377, "end": 4160.329, "text": "혹은 캘린더 앱이 구조화되어 앱 인텐트를 채택했기 때문에, 사용자는 시리에게 요청만 하면 됩니다."}, {"start": 4160.38, "end": 4163.729, "text": "일정을 생성해 타임라인에 바로 추가해 달라고 말이죠."}, {"start": 4163.779, "end": 4165.429, "text": "그럼 완료입니다."}, {"start": 4165.479, "end": 4167.827, "text": "이미 많은 분이 구축하고 계십니다."}, {"start": 4167.877, "end": 4170.729, "text": "차세대 지능형 앱들을 말이죠."}, {"start": 4170.779, "end": 4173.229, "text": "강력하고 빠르며 보안까지 철저한 앱입니다."}, {"start": 4173.279, "end": 4178.229, "text": "파운데이션 모델 프레임워크를 통해 온디바이스 모델을 활용해서요."}, {"start": 4178.279, "end": 4181.929, "text": "이제 텍스트뿐 아니라 이미지도 입력값으로 사용할 수 있고,"}, {"start": 4181.979, "end": 4184.929, "text": "커스텀 스킬로 모델의 기능을 확장할 수도 있습니다."}, {"start": 4184.979, "end": 4188.13, "text": "심지어 서버에서 구동되는 모델도 사용할 수 있죠."}, {"start": 4188.18, "end": 4190.831, "text": "이 모든 것이 동일한 Swift API를 통해 이루어집니다."}, {"start": 4190.881, "end": 4193.429, "text": "예를 들어, 많은 분이 제게 묻곤 합니다."}, {"start": 4193.479, "end": 4196.13, "text": "어떻게 그렇게 많은 발표를 하면서"}, {"start": 4196.18, "end": 4199.429, "text": "항상 다양한 버전의 파란 셔츠만 입고 나오느냐고요."}, {"start": 4199.479, "end": 4202.528, "text": "답은 이겁니다. 첨단 기술을 활용하는 거죠."}, {"start": 4202.578, "end": 4203.831, "text": "'데이드림' 같은 앱을 사용하면,"}, {"start": 4203.881, "end": 4205.729, "text": "행사 사진에서 사진 한 장을 선택했을 때"}, {"start": 4205.779, "end": 4208.329, "text": "앱이 온디바이스 모델을 사용해"}, {"start": 4208.38, "end": 4210.84, "text": "제 착장의 모든 아이템을 식별해 줍니다."}, {"start": 4210.89, "end": 4213.84, "text": "그런 다음 고도의 패션 전문 지식을 활용해"}, {"start": 4213.89, "end": 4218.838, "text": "제 좁은 패션 취향 안에서 딱 맞는 아이템을 찾을 수 있게 도와주죠."}, {"start": 4218.889, "end": 4232.338, "text": "Apple 파운데이션 모델 외에도, 이제 새로운 Core AI 프레임워크를 통해 다른 모델들을 모든 플랫폼에서 Apple Silicon의 강력한 성능으로 앱에서 직접 실행할 수 있습니다."}, {"start": 4232.389, "end": 4236.338, "text": "이것이 바로 앱과 지능이 함께 작동하는 모습입니다."}, {"start": 4236.389, "end": 4240.838, "text": "그리고 이는 여러분이 만드는 앱을 언제나 훌륭하게 만들었던 그 핵심으로 돌아갑니다."}, {"start": 4240.889, "end": 4246.838, "text": "풍부한 네이티브 경험이 지능에 의해 대체되는 것이 아니라, 지능을 통해 더욱 강화되는 것이죠."}, {"start": 4246.889, "end": 4255.838, "text": "우리의 앱 생태계는 그 어느 때보다 활기차며, 더 많은 개발자와 앱, 그리고 전례 없는 혁신이 일어나고 있습니다."}, {"start": 4255.889, "end": 4262.838, "text": "에이전틱 코딩(Agentic Coding)처럼, 앱 개발 방식이 변하고 있으며 Xcode는 이를 위한 최적의 장소입니다."}, {"start": 4262.889, "end": 4268.84, "text": "코딩 어시스턴트는 이제 앱 전체를 현지화하고 시뮬레이션된 기기와 상호작용할 수 있으며,"}, {"start": 4268.89, "end": 4272.84, "text": "커스텀 스킬을 통해 그 기능을 확장할 수도 있습니다."}, {"start": 4272.89, "end": 4276.34, "text": "또한 원하는 모델과 에이전트를 직접 선택할 수도 있는데,"}, {"start": 4276.39, "end": 4281.039, "text": "이제 Gemini를 포함해 Figma나 GitHub 같은 도구와도 연결할 수 있습니다."}, {"start": 4281.09, "end": 4287.34, "text": "또한, 모든 것을 갖춘 새로운 디바이스 허브를 통해 앱 테스트 방식을 재정립하고 있습니다."}, {"start": 4287.39, "end": 4291.84, "text": "시뮬레이션 기기와 실제 기기 모두를 하나의 통합된 인터페이스로 불러올 수 있죠."}, {"start": 4291.89, "end": 4296.34, "text": "이제 스와이프나 핀치 같은 멀티터치 제어를 시뮬레이션할 수 있고,"}, {"start": 4296.39, "end": 4302.838, "text": "클릭 한 번으로 앱의 외관을 바꾸거나 동적으로 크기를 조절하며 전례 없는 방식으로"}, {"start": 4302.889, "end": 4309.639, "text": "반복 작업을 수행할 수 있습니다. Platforms State of the Union 세션에서"}, {"start": 4309.689, "end": 4315.639, "text": "도구, 언어, 프레임워크에 대해 더 자세한 내용을 확인하실 수 있습니다. 기술 세션, 라이브 포럼,"}, {"start": 4315.689, "end": 4324.24, "text": "Apple 엔지니어와 함께하는 그룹 랩 등 풍성한 한 주가 기다리고 있습니다. 정말 멋진 WWDC가 될 것입니다. 이제 다시"}, {"start": 4324.291, "end": 4325.139, "text": "팀에게 마이크를 넘기겠습니다."}, {"start": 4325.189, "end": 4331.608, "text": "팀: 고마워요, 크레이그. 그리고 모든 발표자분께도 감사드립니다. 다양한 소식들을 전해드리게 되어 기쁘네요."}, {"start": 4331.658, "end": 4338.108, "text": "각 플랫폼에 개선 사항을 적용해 훨씬 더 유용하고 즐거운 경험을 선사할 것입니다."}, {"start": 4338.158, "end": 4343.009, "text": "또한 아이들이 애플 제품을 마음껏 즐길 수 있도록 돕는"}, {"start": 4343.059, "end": 4349.108, "text": "더 많은 기능을 계속 제공하면서, 동시에 가장 적절한 경험을 보장하겠습니다."}, {"start": 4349.158, "end": 4354.009, "text": "그리고 차세대 ‘애플 인텔리전스’는 새로운 기능을 도입합니다."}, {"start": 4354.059, "end": 4360.158, "text": "풍부한 대화를 나누고 사용자의 개인적인 상황을 파악하여"}, {"start": 4360.158, "end": 4367.309, "text": "더 많은 일을 처리할 수 있게 돕는 Siri AI가 포함되죠. 다른 새로운 기능들과 함께,"}, {"start": 4367.359, "end": 4373.907, "text": "사용자가 우리 제품을 훨씬 더 잘 활용할 수 있도록 도울 것입니다. 새로운 OS는 오늘"}, {"start": 4373.957, "end": 4382.509, "text": "개발자 베타로 먼저 출시되며, 다음 달 퍼블릭 베타를 거쳐 올가을 정식 출시됩니다."}, {"start": 4382.559, "end": 4388.809, "text": "개인적으로 제가 CEO로서 가장 보람을 느끼는 순간 중 하나는 이런 행사입니다."}, {"start": 4388.859, "end": 4396.009, "text": "강력한 새 도구를 여러분과 공유하고, 여러분이 그것으로 무엇을 만들어내는지 지켜보는 일은"}, {"start": 4396.059, "end": 4402.71, "text": "상상력에는 한계가 없다는 사실을 끊임없이 일깨워 주었습니다. 지난 수년간 여러분은"}, {"start": 4402.76, "end": 4411.309, "text": "사람들이 놀라운 방식으로 세상을 연결하고 창조하며, 배우고 경험하도록 도왔습니다."}, {"start": 4411.359, "end": 4419.809, "text": "오늘 선보인 놀라운 기능들과 앞으로 출시될 수많은 기능을 통해, 최고의 순간은 아직 오지 않았음을 확신합니다."}, {"start": 4419.859, "end": 4425.911, "text": "사람들의 삶을 풍요롭게 하는 경험을 선사하기 위해 세계 최고의 제품을 만드는 것,"}, {"start": 4425.961, "end": 4433.859, "text": "그것은 항상 애플의 북극성이었습니다. 그런 사명을 발전시키기 위해"}, {"start": 4433.859, "end": 4441.869, "text": "창의성과 정성, 신념으로 사람들의 삶에 변화를 일으키는 팀원들과 함께한 것은 평생의 영광입니다."}, {"start": 4441.92, "end": 4445.97, "text": "함께해주신 여러분 감사합니다. 멋진 WWDC가 되길 바랍니다."}, {"start": 4446.02, "end": 4462.42, "text": "[환호와 박수]"}, {"start": 4456.818, "end": 4462.42, "text": "내게 필요한 건 좋은 책과 더 달콤한 잠뿐"}, {"start": 4462.42, "end": 4465.168, "text": "마음을 가라앉혀, 이 가사들이 굳건히 남도록"}, {"start": 4465.219, "end": 4467.949, "text": "난 트랙을 만들었지, 밴드랩, 페르소나를 연달아"}, {"start": 4468.0, "end": 4470.75, "text": "난 게으름 피운 적 없어, 돈을 쫓고 캐시앱을 확인해"}, {"start": 4470.8, "end": 4475.349, "text": "테트리스처럼 힙합과 로보캅, TV, 피콕에 연결되어 왔지"}, {"start": 4475.399, "end": 4478.349, "text": "포토샵, 레터박스, 드롭박스, 허브스팟을 클릭하고"}, {"start": 4478.399, "end": 4480.55, "text": "온갖 곳을 다니며 내 마을에서 비트를 타"}, {"start": 4480.6, "end": 4482.148, "text": "그리고 내 틱톡에 전부 올리지"}, {"start": 4482.198, "end": 4483.75, "text": "화면 속 내가 보이니?"}, {"start": 4483.8, "end": 4486.55, "text": "난 어디에나 있어, 화면 속 내가 보이니?"}, {"start": 4486.6, "end": 4487.55, "text": "널 그곳으로 데려다줄게"}, {"start": 4487.6, "end": 4489.55, "text": "네게 꿈이 많다는 걸 알아"}, {"start": 4489.6, "end": 4493.05, "text": "보면 이뤄내, 난 아주 잘나가, 잘나가, 잘나가"}, {"start": 4493.1, "end": 4496.05, "text": "감사하며 난 여행 중이야, 지오게서, 태국 가이드"}, {"start": 4496.1, "end": 4497.55, "text": "템플 런이 얼마나 멋진지 알아?"}, {"start": 4497.6, "end": 4501.449, "text": "내 눈 때문일 거야, 피어나는 색들, 루미놀, 초록빛 깃털의 감촉까지"}, {"start": 4501.5, "end": 4504.75, "text": "이국적이기도 하지, 델타를 타고, 젯블루로 심야 비행도 해"}, {"start": 4504.8, "end": 4506.75, "text": "공항을 걷느니 차라리 카약을 타겠어"}, {"start": 4506.8, "end": 4509.25, "text": "Gap이 내게 자신감을 주고, 내 시야는 넓어져 가"}, {"start": 4509.3, "end": 4511.05, "text": "7대륙, 다들 주목해"}, {"start": 4511.1, "end": 4514.148, "text": "네 머릿속 리그 오브 레전드, 로버와 함께 천천히 움직여"}, {"start": 4514.198, "end": 4516.25, "text": "하지만 친구들은 알지, 내 팬층이 얼마나 두터운지"}, {"start": 4516.3, "end": 4517.75, "text": "화면 속 내가 보이니?"}, {"start": 4517.8, "end": 4518.75, "text": "난 어디든 가봤지"}, {"start": 4518.8, "end": 4520.75, "text": "네 꿈이 원대하다는 건 알아"}, {"start": 4520.8, "end": 4521.349, "text": "하지만 넌 해내지 못했어"}, {"start": 4521.399, "end": 4524.349, "text": "난 가득 찼어, 가득 찼어, 가득 찼어, 아주 꽉 들어찼지"}, {"start": 4524.399, "end": 4526.75, "text": "StudyPlus, Vision과 Speechify를 다루지"}, {"start": 4526.8, "end": 4529.148, "text": "단계를 밟았어, StockX에서 쇼핑하듯"}, {"start": 4529.198, "end": 4531.55, "text": "스타 메이커, 마천루, 그리고 Sky Guide"}, {"start": 4531.6, "end": 4533.849, "text": "마을 사람들, 진정한 스케이트와 타이다이"}, {"start": 4533.899, "end": 4536.247, "text": "내 롤스로이스를 타고, 누가 진짜 금을 가져갔는지 봐"}, {"start": 4536.297, "end": 4538.55, "text": "DJ Unfold, 내 공연은 끝내줬고, 천천히 파고들어"}, {"start": 4538.6, "end": 4540.25, "text": "Mrs. M-E를 위해 Resy에 있지"}, {"start": 4540.3, "end": 4542.25, "text": "노드스트롬과 NBA를 주목해"}, {"start": 4542.3, "end": 4545.048, "text": "Hell of a time 라이더, 난 계속해서 나아가"}, {"start": 4545.099, "end": 4546.349, "text": "트위치의 트랜스포머들"}, {"start": 4546.399, "end": 4547.747, "text": "내 우버 기사에게 팁을 줬어"}, {"start": 4547.797, "end": 4553.747, "text": "올드 네이비, Waze, Warframe, 우리 중 누가 감시 중일까? 주된 안건은 리얼함이야, AMC에서 영화를 보고 GoodNotes를 쓰지"}, {"start": 4553.797, "end": 4573.398, "text": "마인크래프트, 링크드인, 실력은 비싼 법이지, 집중해, 윔블던, 레터헤드용 Evernote, 후자가 내가 알게 될 것이라면, 나와 내 사람들을 위해 이 앱들을 개발해줘서 고마워"}];
let player;
function onYouTubeIframeAPIReady(){
    player=new YT.Player('player',{
        videoId:videoId,
        playerVars:{autoplay:1,controls:1,rel:0,modestbranding:1,fs:0,disablekb:1,cc_load_policy:3},
        events:{
            'onReady': function(e){ 
                // [V160.4] 유튜브 기본 자막이 같이 켜져서 두 개로 겹쳐 보이는 현상 방지 🐾
                try { e.target.unloadModule("captions"); } catch(err) {} 
            },
            'onStateChange':onPlayerStateChange
        }
    });
}

// [V160.1] AI냥: 유튜브 고유 단축키 무력화 후, 'f' 키 등 사용자 편의 조작을 가로채서 자체 전체화면 실행! 🐱✨
window.addEventListener('keydown', function(e) {
    if (!player || !player.getPlayerState || typeof player.getDuration !== 'function') return;

    // Ctrl + ArrowLeft: Previous Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowLeft') {
        const t = player.getCurrentTime();
        let target = Math.max(0, t - 5);
        for(let i = subs.length - 1; i >= 0; i--) {
            if(subs[i].start < t - 1.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    // Ctrl + ArrowRight: Next Subtitle (Chapter)
    if(e.ctrlKey && e.key === 'ArrowRight') {
        const t = player.getCurrentTime();
        let target = t + 5;
        for(let i = 0; i < subs.length; i++) {
            if(subs[i].start > t + 0.5) {
                target = subs[i].start;
                break;
            }
        }
        player.seekTo(target, true);
        e.preventDefault();
        return;
    }

    if (e.key.toLowerCase() === 'f') {
        toggleFullScreen();
        e.preventDefault();
    } else if (e.key === ' ' || e.key.toLowerCase() === 'k') {
        if (player.getPlayerState() === 1) player.pauseVideo();
        else player.playVideo();
        e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
        player.seekTo(player.getCurrentTime() - 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowRight') {
        player.seekTo(player.getCurrentTime() + 5, true);
        e.preventDefault();
    } else if (e.key === 'ArrowUp') {
        player.setVolume(player.getVolume() + 5);
        e.preventDefault();
    } else if (e.key === 'ArrowDown') {
        player.setVolume(player.getVolume() - 5);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'm') {
        player.isMuted() ? player.unMute() : player.mute();
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'j') {
        player.seekTo(player.getCurrentTime() - 10, true);
        e.preventDefault();
    } else if (e.key.toLowerCase() === 'l') {
        player.seekTo(player.getCurrentTime() + 10, true);
        e.preventDefault();
    } else if (e.key >= '0' && e.key <= '9') {
        const fraction = parseInt(e.key) / 10;
        player.seekTo(player.getDuration() * fraction, true);
        e.preventDefault();
    }
});

// iframe 클릭 시 빼앗긴 포커스를 0.1초 뒤에 훔쳐와서 'f' 등 단축키가 계속 먹히도록 유지! 🕵️‍♂️✨
window.addEventListener('blur', function() {
    setTimeout(() => {
        if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
            window.focus();
        }
    }, 100);
});
let syncInterval;
let activityTimeout;
function resetActivity() {
    const fsBtn = document.getElementById('fs-btn');
    const subsEl = document.getElementById('subtitles');
    if(fsBtn) fsBtn.classList.remove('fade-out');
    if(subsEl) subsEl.classList.remove('ui-hidden');
    clearTimeout(activityTimeout);
    if (player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING) {
        activityTimeout = setTimeout(() => {
            if(fsBtn) fsBtn.classList.add('fade-out');
            if(subsEl) subsEl.classList.add('ui-hidden');
        }, 3000);
    }
}
document.addEventListener('mousemove', resetActivity);
document.addEventListener('touchstart', resetActivity, {passive: true});
document.addEventListener('keydown', resetActivity);
window.addEventListener('blur', resetActivity);
window.addEventListener('focus', resetActivity);

function onPlayerStateChange(event){
    resetActivity();
    if(event.data==YT.PlayerState.PLAYING){
        if(!syncInterval) syncInterval=setInterval(updateSubs,100);
    }else{
        clearInterval(syncInterval); syncInterval=null;
    }
}
function updateSubs(){
    const t=player.getCurrentTime();
    let currentHtml="";
    let activeSubs = [];
    for(let i=0;i<subs.length;i++){
        if(t>=subs[i].start && t<=subs[i].end){
            activeSubs.push(subs[i]);
        }
    }
    if(activeSubs.length > 0){
        // [V160.5] AI 번역 생성 시 자막 시간이 미세하게 겹쳐(Overlap) 동일한 내용이 두 줄로 출력되는 현상 방지! 
        // 겹치는 자막 중 가장 마지막 매칭 항목 하나만 렌더링 🐾
        let bestSub = activeSubs[activeSubs.length - 1];
        currentHtml = `<div class="sub-line">${bestSub.text}</div><br>`;
    }
    if(document.getElementById('subtitles').innerHTML !== currentHtml){
        document.getElementById('subtitles').innerHTML=currentHtml;
    }
}

let isDragging=false, startY, currentBottom, subEl=document.getElementById('subtitles');
document.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);
document.addEventListener('touchstart', dragStart, {passive:false});
document.addEventListener('touchmove', dragMove, {passive:false});
document.addEventListener('touchend', dragEnd);

function dragStart(e) {
    if(!e.target.classList.contains('sub-line')) return;
    isDragging = true;
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    startY = clientY;
    let style = window.getComputedStyle(subEl);
    currentBottom = parseFloat(style.bottom) || 0;
    subEl.classList.add('dragging');
    e.preventDefault();
}
function dragMove(e) {
    if(!isDragging) return;
    // [FIX] iframe 등에 의해 mouseup 이벤트를 놓쳤지만 마우스 버튼은 떼어진 경우 강제 드래그 종료! 🛡️✨
    if(e.type.includes('mouse') && e.buttons === 0) {
        dragEnd(e);
        return;
    }
    let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
    let dy = clientY - startY;
    subEl.style.bottom = (currentBottom - dy) + 'px';
    if(e.cancelable) e.preventDefault();
}
function dragEnd(e) {
    isDragging = false;
    subEl.classList.remove('dragging');
}

// [Wheel / Pinch to Zoom for Font Size]
let currentFontSize = 4.5;
let initialDist = 0;
let initialFontSize = 4.5;

document.addEventListener('wheel', (e) => {
    if(e.target.closest('#subtitles') || e.target.classList.contains('sub-line')) {
        e.preventDefault();
        currentFontSize += e.deltaY < 0 ? 0.2 : -0.2;
        currentFontSize = Math.max(1, Math.min(20, currentFontSize));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
    }
}, {passive: false});

document.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initialFontSize = currentFontSize;
        e.preventDefault();
    }
}, {passive: false});

document.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && (e.target.closest('#subtitles') || e.target.classList.contains('sub-line'))) {
        let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        let scale = currentDist / initialDist;
        currentFontSize = Math.max(1, Math.min(20, initialFontSize * scale));
        document.documentElement.style.setProperty('--fsize', currentFontSize + 'vmin');
        e.preventDefault();
    }
}, {passive: false});
