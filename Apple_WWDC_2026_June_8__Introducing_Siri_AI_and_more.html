const videoId="hF8swzNR1-o";
const subs=[{"start": 27.51, "end": 35.859, "text": "[박수 소리] 반갑습니다. 오늘 애플 파크에 함께해 주신 여러분, WWDC에 오신 것을 환영합니다. 저희 모두는"}, {"start": 35.908, "end": 41.859, "text": "이번 행사와 이번 주를 고대해 왔습니다. 저희의 최신 플랫폼 발전과 혁신을"}, {"start": 41.908, "end": 49.859, "text": "개발자 커뮤니티 및 사용자들과 공유할 수 있기 때문입니다. 또한 WWDC는 우리의"}, {"start": 49.908, "end": 58.101, "text": "놀라운 글로벌 개발자 커뮤니티를 기념하는 자리이기도 합니다. 애플 플랫폼의 열기는 그 어느 때보다 뜨겁습니다."}, {"start": 58.151, "end": 65.82, "text": "개발자들은 매시간 1,000건이 넘는 앱을 제출하며 역대 가장 활발하게 앱을 제작하고 있습니다."}, {"start": 65.87, "end": 71.82, "text": "또한 전 세계 20개의 애플 개발자 아카데미를 통해 차세대에 투자하고 있으며,"}, {"start": 71.87, "end": 76.118, "text": "이미 수만 명의 학생이 그 여정을 시작할 수 있도록 도왔습니다."}, {"start": 76.168, "end": 85.519, "text": "이번 WWDC를 통해 그 기세를 이어가며, 사용자들에게 더욱 놀라운 앱 경험을 선사할 수 있기를 바랍니다."}, {"start": 85.569, "end": 93.019, "text": "애플은 기술이 개인적이고 강력하며 사용하기 쉬워야 한다고 항상 믿어왔습니다."}, {"start": 93.069, "end": 97.67, "text": "하드웨어와 소프트웨어의 긴밀한 통합은"}, {"start": 97.67, "end": 101.62, "text": "저희 각 제품의 잠재력을 최대한으로 끌어올려 줍니다."}, {"start": 101.67, "end": 105.62, "text": "그러한 철학은 저희의 운영 체제를 설계할 때도 반영되어"}, {"start": 105.67, "end": 110.62, "text": "기기 간의 매끄러운 연동과 공통된 기술 기반을 구축함으로써"}, {"start": 110.67, "end": 115.62, "text": "개발자들이 멋진 앱 경험을 구현할 수 있도록 돕습니다."}, {"start": 115.67, "end": 119.62, "text": "우리는 강력한 도구가 사람들의 손에 쥐어졌을 때,"}, {"start": 119.67, "end": 124.31700000000001, "text": "그들이 상상치 못한 곳에서 놀라운 일을 해내는 것을 보았습니다."}, {"start": 124.367, "end": 126.719, "text": "우리가 오직 꿈만 꿀 수 있었던 그런 곳들에서 말이죠."}, {"start": 126.769, "end": 133.218, "text": "이것이 바로 WWDC의 진정한 의미입니다. 새로운 기술과 혁신을 선보이며"}, {"start": 133.269, "end": 136.418, "text": "가능성의 한계를 뛰어넘는 것이죠."}, {"start": 136.468, "end": 140.129, "text": "오늘 여러분과 몇 가지 흥미로운 소식들을 나누게 되어 매우 기쁩니다."}, {"start": 140.18, "end": 144.227, "text": "애플 인텔리전스와 시리의 최신 기술을 비롯해"}, {"start": 144.277, "end": 148.227, "text": "그럼 이제, 크레이그를 모시고 자세한 이야기를 들어보겠습니다"}, {"start": 148.277, "end": 162.478, "text": "[활기찬 음악]"}, {"start": 162.579, "end": 165.73, "text": "다음 신규 릴리스 시리즈에 대해 말씀드리죠"}, {"start": 165.781, "end": 168.73, "text": "정말 흥미진진한 업데이트 소식들이 기다리고 있습니다"}, {"start": 168.781, "end": 171.73, "text": "올해 저희는 세 가지 분야에 집중했습니다"}, {"start": 171.781, "end": 178.73, "text": "첫째, 플랫폼의 반응성을 높여 일상에서 더 편리하게 사용할 수 있도록 개선했습니다"}, {"start": 178.781, "end": 181.73, "text": "둘째, 신뢰 및 안전 관련 업데이트입니다"}, {"start": 181.781, "end": 187.73, "text": "아이들에게 안전하고 믿을 수 있는 플랫폼을 제공하겠다는 약속을 지켜나가고 있죠"}, {"start": 187.781, "end": 191.628, "text": "셋째, 애플 인텔리전스의 비약적인 도약입니다"}, {"start": 191.679, "end": 194.53, "text": "혁신적인 아키텍처를 통해 플랫폼 전반에서"}, {"start": 194.58, "end": 201.649, "text": "새로워진 시리를 선보이며, 매일 쓰는 앱에 수많은 유용한 기능을 통합했습니다"}, {"start": 201.699, "end": 205.909, "text": "이러한 노력은 모든 플랫폼의 신규 릴리스에 적용됩니다"}, {"start": 205.96, "end": 210.007, "text": "iOS와 iPadOS부터 watchOS, tvOS,"}, {"start": 210.057, "end": 212.929, "text": "visionOS와 macOS까지 말이죠"}, {"start": 212.97899999999998, "end": 217.32999999999998, "text": "macOS 얘기가 나와서 말인데, WWDC 단골 시청자분들이라면 다들 아시겠죠"}, {"start": 217.381, "end": 222.13, "text": "지금이 바로 제가 애플 마케팅팀의 최신 활약상을 전해드릴 시간이라는 걸요"}, {"start": 222.18, "end": 228.22899999999998, "text": "소위 '파격적'이라고 할 수 있는 그들만의 macOS 명명 방식에 대해서도요"}, {"start": 228.28, "end": 234.929, "text": "그런데 이번에는 이야기가 좀 덜 끝난 것 같네요. 마지막으로 봤을 때 그들은"}, {"start": 234.97899999999998, "end": 241.929, "text": "애플 파크에 갓 설치된 '체험형 아이디어 유르트'에서 쏟아져 나와 마이크로버스에 올라타더군요"}, {"start": 241.979, "end": 247.988, "text": "뒤쫓아가 보려 했지만, 북쪽으로 떠나기 직전에 창밖으로 이 메모만 던져주고 가버렸습니다"}, {"start": 248.038, "end": 252.639, "text": "이게 제가 가진 전부입니다."}, {"start": 252.639, "end": 260.29, "text": "[몽환적인 음악] 이보게, 우리의 차크라가 정렬되어 나침반이 '사랑의 여름'으로 향하고 있네. 하지만 뭐랄까..."}, {"start": 260.341, "end": 265.187, "text": "더 나아가, 우리의 육신은 지상의 어떤 속박도 알지 못하지."}, {"start": 265.237, "end": 273.088, "text": "우리는 무한한 바다 위 금빛 다리를 건너며 떠다닐 걸세. 아주 높이 날아오를 거야. 마케팅이란 참으로..."}, {"start": 273.139, "end": 276.139, "text": "멋진 직업이지."}, {"start": 276.139, "end": 277.189, "text": "[음악 멈춤] 알겠습니다."}, {"start": 277.24, "end": 279.487, "text": "하지만 유감스럽게도 그들은 돌아오지 않았고,"}, {"start": 279.538, "end": 281.288, "text": "제게는 이 암호를 해독할"}, {"start": 281.338, "end": 282.889, "text": "감각 증폭 장치가 부족하네요."}, {"start": 282.939, "end": 286.389, "text": "그래서 macOS 이름의 위대한 시대는 이제 막을 내려야 할 것 같습니다."}, {"start": 286.439, "end": 287.288, "text": "[환호] 남: 골든 게이트라고요!"}, {"start": 287.338, "end": 288.288, "text": "남: 골든 게이트예요!"}, {"start": 288.338, "end": 297.838, "text": "[박수와 환호] 아, 정말 다행이네요."}, {"start": 297.838, "end": 298.788, "text": "완벽합니다."}, {"start": 298.838, "end": 303.889, "text": "macOS의 다음 버전은 macOS 골든 게이트입니다."}, {"start": 303.939, "end": 304.788, "text": "좋습니다."}, {"start": 304.838, "end": 307.788, "text": "그건 뒤로 하고, 이제 우리 플랫폼을"}, {"start": 307.838, "end": 310.788, "text": "어느 때보다 더 훌륭하게 만들어 줄 개선 사항들부터 시작해 보죠."}, {"start": 310.838, "end": 317.689, "text": "우리 제품은 직장, 학교, 집 등 모든 곳에서 우리를 도우며 일상생활의 필수적인 부분이 되었습니다."}, {"start": 317.74, "end": 324.509, "text": "그 사이의 모든 공간에서요. 그러니 당연히 우리 모두 제품에 거는 기대가 큽니다. 그리고 우리는 항상..."}, {"start": 324.56, "end": 330.709, "text": "저희 제품을 그 어느 때보다 빠르고 안정적이며, 사용하기 훨씬 즐겁게 만들기 위해 노력해 왔습니다."}, {"start": 330.759, "end": 336.608, "text": "그래서 단순히 새로운 기능을 대거 도입하는 대신, 여러분이 이미 익숙하게 사용하고 계신"}, {"start": 336.658, "end": 340.711, "text": "기존 기능들을 한층 더 발전시키기로 했습니다."}, {"start": 340.761, "end": 345.61, "text": "최고의 운영체제는 단순히 거대한 혁신만으로 만들어지는 것이 아니라고 믿기 때문입니다."}, {"start": 345.661, "end": 348.509, "text": "사소한 디테일까지 치열하게 고민할 때 완성되죠."}, {"start": 348.56, "end": 359.06, "text": "더 자세한 내용을 위해 스테이시를 모시겠습니다. [음악 및 박수 소리]"}, {"start": 359.158, "end": 362.911, "text": "디테일에 대한 집착은 항상 애플 DNA의 핵심이었습니다."}, {"start": 362.961, "end": 368.11, "text": "올해 우리 팀은 사용자 경험을 더욱 세련되고 직관적으로 만들기 위해"}, {"start": 368.161, "end": 371.408, "text": "끊임없는 노력을 아끼지 않았습니다."}, {"start": 371.459, "end": 378.807, "text": "UI부터 파운데이션까지 시스템 개선 기회를 찾기 위해 OS의 모든 부분을 샅샅이 살폈습니다."}, {"start": 378.858, "end": 382.608, "text": "어떤 제한도 두지 않았고, 아무리 작은 개선이라도 소홀히 하지 않았죠."}, {"start": 382.658, "end": 388.31, "text": "더 빠르고 매끄럽게, 사용하기 더 쉽게 만들었으며 여러분이 그동안"}, {"start": 388.36, "end": 390.31, "text": "요청하셨던 여러 사항들도 해결했습니다."}, {"start": 390.36, "end": 393.608, "text": "이러한 작업의 하이라이트를 공유하게 되어 매우 기쁩니다."}, {"start": 393.658, "end": 398.31, "text": "먼저 이번 노력의 핵심 테마 중 하나인 디자인에 대해 이야기해 보죠."}, {"start": 398.36, "end": 399.408, "text": "디자인."}, {"start": 399.459, "end": 405.408, "text": "더 자세한 내용을 위해 샤밤을 모시겠습니다. [박수 소리]"}, {"start": 405.459, "end": 411.209, "text": "작년에 우리는 '리퀴드 글래스'로 역대 가장 야심 찬 크로스 플랫폼 디자인 업데이트를 선보였고,"}, {"start": 411.259, "end": 415.411, "text": "이를 통해 앱과 사용자 경험은 더욱 풍부하고 즐거워졌습니다."}, {"start": 415.461, "end": 419.329, "text": "모든 대규모 디자인 업데이트가 그렇듯, 대담하게 시도했던 부분들을..."}, {"start": 419.379, "end": 422.829, "text": "앞으로 나아가며, 계속해서 개선해 나가는 것이죠."}, {"start": 422.879, "end": 426.629, "text": "그 과정의 일환으로 사용자와 개발자의 목소리에 귀를 기울이고 있습니다."}, {"start": 426.68, "end": 431.129, "text": "저희 팀은 여러분의 피드백을 정말 소중하게 생각하며, 새로운 디자인을 다듬는 과정에서"}, {"start": 431.18, "end": 433.228, "text": "지난 1년 동안 이를 깊이 있게 반영해 왔습니다."}, {"start": 433.278, "end": 435.93, "text": "이제 몇 가지 추가적인 개선 사항을 발표하려 합니다."}, {"start": 435.98, "end": 437.93, "text": "우선, '리퀴드 글래스'가 구축되는"}, {"start": 437.98, "end": 440.329, "text": "토대부터 업데이트하는 것에서 시작하죠."}, {"start": 440.379, "end": 442.43, "text": "탁월한 가독성을 보장하기 위해,"}, {"start": 442.48, "end": 443.728, "text": "리퀴드 글래스를 미세하게 조정했습니다."}, {"start": 443.778, "end": 447.43, "text": "뒤에 배치된 복잡한 콘텐츠를 훨씬 더 효과적으로 투과시키면서도,"}, {"start": 447.48, "end": 450.728, "text": "동시에 더 깊이감 있고 뚜렷한 구분감을 만들어 줍니다."}, {"start": 450.778, "end": 453.43, "text": "이것이 훌륭한 새로운 기본 디자인이라고 생각하지만,"}, {"start": 453.48, "end": 455.829, "text": "어떤 사용자분들은 리퀴드 글래스가"}, {"start": 455.879, "end": 460.629, "text": "훨씬 더 투명하길 원하고, 또 어떤 분들은 더 짙은 색감을 선호한다는 점도 알고 있습니다."}, {"start": 460.68, "end": 462.531, "text": "사람마다 선호하는 스타일이 다르기 때문에,"}, {"start": 462.581, "end": 464.228, "text": "설정에 새로운 슬라이더를 추가하여"}, {"start": 464.278, "end": 465.93, "text": "리퀴드 글래스를 조절할 수 있게 했습니다."}, {"start": 465.98, "end": 471.127, "text": "이제 아주 투명한 상태부터 완전히 색이 들어간 상태까지 자유롭게 설정할 수 있습니다."}, {"start": 471.177, "end": 473.329, "text": "앱 전반에 걸쳐 여러분의 경험을 개인화할 수 있는"}, {"start": 473.379, "end": 474.829, "text": "완전히 새로운 방식입니다."}, {"start": 474.879, "end": 477.829, "text": "이미 Liquid Glass를 도입한 개발자라면"}, {"start": 477.879, "end": 481.028, "text": "이러한 커스터마이징이 앱에 즉시 적용됩니다."}, {"start": 481.079, "end": 483.329, "text": "Liquid Glass의 성능 개선과 더불어"}, {"start": 483.379, "end": 486.329, "text": "사용자들이 늘 사랑해 온 macOS 디자인의"}, {"start": 486.379, "end": 489.528, "text": "핵심 요소들을 다시 도입하고자 했습니다."}, {"start": 489.579, "end": 492.627, "text": "예를 들어, 대규모 컨트롤 그룹과 텍스트를"}, {"start": 492.677, "end": 495.43, "text": "하단 콘텐츠와 더 잘 구분할 수 있도록"}, {"start": 495.48, "end": 499.228, "text": "이제 앱 상단에 더욱 통일된 툴바가 제공됩니다."}, {"start": 499.278, "end": 501.728, "text": "덕분에 텍스트 레이블과 헤더의 가독성을 유지하면서도"}, {"start": 501.778, "end": 504.228, "text": "더욱 짜임새 있는 구조를 갖추게 되었죠."}, {"start": 504.278, "end": 507.031, "text": "Mac 앱의 구조를 더욱 정교하게 다듬기 위해"}, {"start": 507.081, "end": 510.43, "text": "사이드바를 윈도우 가장자리까지 확장했습니다."}, {"start": 510.48, "end": 513.43, "text": "이는 왼쪽 가장자리의 시선 분산을 줄여주며"}, {"start": 513.48, "end": 515.93, "text": "하단 콘텐츠가 스크롤될 때 나타나는"}, {"start": 515.98, "end": 517.629, "text": "아름다운 반사 효과를 동일하게 제공하여"}, {"start": 517.678, "end": 520.93, "text": "앱 전체에서 더욱 탁 트인 공간감을 선사합니다."}, {"start": 520.98, "end": 523.43, "text": "사이드바 아이콘도 본연의 색상을 되찾아"}, {"start": 523.48, "end": 529.03, "text": "앱을 구분하고 현재 활성화된 윈도우를 파악하기가 훨씬 쉬워졌습니다."}, {"start": 529.08, "end": 534.628, "text": "또한 모든 macOS 윈도우에 더 좁은 코너 반경을 적용해 일관성을 높였습니다."}, {"start": 534.677, "end": 538.89, "text": "아직 업데이트되지 않은 앱을 포함해 모든 앱에 말이죠."}, {"start": 538.94, "end": 541.69, "text": "남: 마지막으로 앱 아이콘에 대해 알아보겠습니다."}, {"start": 541.74, "end": 546.589, "text": "작년에 저희는 모든 앱과 플랫폼에 걸쳐 더욱 조화로운 디자인을 구축하고자"}, {"start": 546.639, "end": 548.29, "text": "모든 앱 아이콘을 재설계했습니다."}, {"start": 548.34, "end": 553.489, "text": "올해는 아이콘 아트워크 자체에 리퀴드 글래스 레이어를 추가로 통합함으로써"}, {"start": 553.538, "end": 556.59, "text": "이 새로운 디자인을 한 단계 더 발전시켰습니다."}, {"start": 556.639, "end": 561.788, "text": "레이어 사이의 굴절이 각 아이콘에 개성을 더해줄 뿐만 아니라"}, {"start": 561.838, "end": 565.491, "text": "아이콘을 더욱 선명하고 뚜렷하게 만들어 줍니다."}, {"start": 565.541, "end": 571.0889999999999, "text": "독(Dock)이나 홈 화면에서는 물론, '올 클리어' 룩에 적용했을 때도"}, {"start": 571.139, "end": 572.788, "text": "아주 멋져 보이죠."}, {"start": 572.838, "end": 577.788, "text": "이러한 업데이트를 통해 여러분의 앱과 플랫폼 전반에서"}, {"start": 577.838, "end": 580.59, "text": "더욱 집중되고 친숙한 경험을 선사할 것입니다."}, {"start": 580.639, "end": 583.888, "text": "이제 다시 스테이시를 모셔보죠."}, {"start": 583.937, "end": 587.288, "text": "여: 이런 디자인 개선은 시작에 불과합니다."}, {"start": 587.338, "end": 592.69, "text": "제품의 수준을 한층 더 높이기 위한 여정을 시작하면서"}, {"start": 592.74, "end": 596.19, "text": "기본 원칙을 깊이 파고드는 데에도 많은 시간을 투자했습니다."}, {"start": 596.24, "end": 602.39, "text": "메모리 사용량, CPU 활용도, 네트워킹 작업, 디스플레이 렌더링 등"}, {"start": 602.44, "end": 604.488, "text": "나열하자면 끝도 없죠."}, {"start": 604.538, "end": 610.34, "text": "핵심은 제품의 응답성에 큰 차이를 만드는"}, {"start": 610.34, "end": 613.29, "text": "시스템 부문들을 최적화했다는 사실입니다."}, {"start": 613.34, "end": 620.249, "text": "예를 들어, 아이폰의 홈 화면 페이지를 넘길 때처럼 시스템 애니메이션이 훨씬 부드러워졌습니다."}, {"start": 620.298, "end": 626.249, "text": "미션 컨트롤에 접속하여 Mac의 여러 공간 사이를 이동해 보세요. 게다가 더 많은 기능이 빨라졌습니다."}, {"start": 626.298, "end": 635.049, "text": "몇 가지만 예로 들어볼게요. 먼저, iPhone과 iPad 앱의 실행 속도가 최대 30% 더 빨라졌습니다. 믿기 힘들 정도로 빠르지만,"}, {"start": 635.099, "end": 643.049, "text": "개발팀이 앱 실행 시 필요한 핵심 데이터를 미리 불러오는 방법을 찾아내서, 앱을 열자마자 바로 사용할 수 있게 했습니다."}, {"start": 643.099, "end": 649.45, "text": "이는 서드파티 앱에도 적용되며, 시스템 전반의 콘텐츠 로딩 속도도 빨라졌습니다."}, {"start": 649.5, "end": 655.45, "text": "예를 들어, 사진을 찍은 후 라이브러리에 나타나기까지 시간이 좀 걸리곤 했는데요."}, {"start": 655.5, "end": 659.45, "text": "이제 새 사진이 최대 70% 더 빠르게 표시됩니다."}, {"start": 659.5, "end": 666.45, "text": "AirDrop을 사용하여 친구와 사진이나 다른 파일을 공유할 때도 전송 속도가 최대 80% 더 빨라집니다."}, {"start": 666.5, "end": 673.45, "text": "그리고 iPad에서 파일을 검색하거나 외장 드라이브로 파일을 전송하는 속도는 최대 5배 더 빨라졌죠."}, {"start": 673.5, "end": 676.45, "text": "이제 Mac의 Finder만큼이나 빨라진 셈입니다."}, {"start": 676.5, "end": 681.45, "text": "구형 iPhone 모델에서도 반응 속도가 훨씬 더 빨라지도록 개선했는데요."}, {"start": 681.5, "end": 683.45, "text": "이는 저희 CPU 스케줄러와 관련이 있습니다."}, {"start": 683.5, "end": 689.45, "text": "CPU 스케줄러는 일상적으로 iPhone을 사용할 때 다양한 작업에 CPU 자원을 효율적으로 배분하는 핵심 시스템 요소입니다."}, {"start": 689.5, "end": 692.45, "text": "사용자가 하루 종일 iPhone을 사용하는 동안 말이죠."}, {"start": 692.5, "end": 695.45, "text": "한꺼번에 수많은 작업을 처리해야 하거나,"}, {"start": 695.5, "end": 697.45, "text": "엄청난 연산량이 필요한 상황에서도요."}, {"start": 697.5, "end": 702.45, "text": "CPU 스케줄러는 적절한 시점에 정확히 필요한 작업이 실행되도록 보장합니다."}, {"start": 702.5, "end": 708.249, "text": "최신 iPhone 모델의 iOS에는 이미 고급 CPU 스케줄러가 탑재되어 있는데요."}, {"start": 708.298, "end": 714.249, "text": "올해는 이를 더욱 최적화하여 고사양 작업 시 효율성을 한층 더 높였습니다."}, {"start": 714.298, "end": 721.849, "text": "그뿐만 아니라, 이 기능을 iPhone 11까지 거슬러 올라가 구형 모델에도 적용할 방법을 찾아냈습니다."}, {"start": 721.899, "end": 731.339, "text": "네, 맞습니다. iOS 27은 iPhone 11을 포함해 iOS 26이 지원되었던 모든 iPhone 모델을 동일하게 지원한다는 뜻입니다."}, {"start": 731.389, "end": 733.64, "text": "iOS 26처럼 말이죠."}, {"start": 733.69, "end": 739.939, "text": "이는 업계 최고 수준의 지원을 이어가는 것이며, iOS 27을 그 어느 때보다 더 많은 사용자가"}, {"start": 739.989, "end": 743.241, "text": "사용할 수 있게 됨을 의미합니다."}, {"start": 743.291, "end": 746.8389999999999, "text": "또한, 사용자의 방해 요소를 제거하기 위한 노력도 기울였습니다."}, {"start": 746.889, "end": 751.14, "text": "업무와 소통, 그리고 원하는 정보를 찾는 과정에서 막힘이 없도록"}, {"start": 751.19, "end": 753.3389999999999, "text": "장애물들을 제거했죠."}, {"start": 753.389, "end": 758.44, "text": "네트워크 전환의 경우, 아이폰이 더욱 매끄럽게 전환될 수 있도록 개선했습니다."}, {"start": 758.49, "end": 761.44, "text": "셀룰러와 와이파이 네트워크 사이를 말이죠."}, {"start": 761.49, "end": 765.5409999999999, "text": "셀룰러 연결을 강제하기 위해 제어 센터로 들어가"}, {"start": 765.591, "end": 769.3389999999999, "text": "수동으로 와이파이를 끄던 경험, 다들 있으실 겁니다."}, {"start": 769.389, "end": 773.54, "text": "신호가 아주 강한 와이파이가 있는 단골 카페 옆을 지나갈 때나,"}, {"start": 773.59, "end": 776.8389999999999, "text": "비행기에서 내려 온라인에 접속하려는데 여전히 기내 네트워크에"}, {"start": 776.889, "end": 778.939, "text": "연결되어 있을 때처럼 말이죠."}, {"start": 778.989, "end": 783.638, "text": "이런 상황을 방지하고자, 아이폰이 언제 연결을 유지하고"}, {"start": 783.687, "end": 786.44, "text": "언제 전환해야 할지를 더 똑똑하게 판단하도록 했습니다."}, {"start": 786.49, "end": 790.84, "text": "대역폭이 낮은 상황에서 용량이 큰 사진이나 비디오를 보낼 때도"}, {"start": 790.889, "end": 796.94, "text": "더 이상 대화가 끊기지 않습니다. 각 메시지마다 새로운 전송 표시기가 나타나"}, {"start": 796.99, "end": 802.389, "text": "전송이 지연될 때 무엇이 전송되었고"}, {"start": 802.49, "end": 808.8389999999999, "text": "무엇이 아직 전달되지 않았는지 확실히 보여줍니다. 마지막으로 저희가 심혈을 기울인 분야는"}, {"start": 808.889, "end": 816.03, "text": "사용자가 필요한 일을 더 쉽고 안정적으로 마칠 수 있게 돕는 검색 기능입니다. 우리 모두..."}, {"start": 816.08, "end": 821.329, "text": "분명히 있는 걸 아는데 검색해도 안 나와서 답답했던 적, 다들 있으시죠?"}, {"start": 821.379, "end": 828.278, "text": "그래서 iOS, iPadOS, macOS의 스포트라이트와"}, {"start": 828.278, "end": 830.129, "text": "사진, 메일을 지원하는 검색 기반을 새로 구축했습니다."}, {"start": 830.178, "end": 832.729, "text": "그 핵심은 바로 검색 인덱스입니다."}, {"start": 832.778, "end": 838.429, "text": "기기가 모든 콘텐츠의 카탈로그를 생성해, 무엇이 어디에 있는지"}, {"start": 838.479, "end": 839.93, "text": "이해할 수 있게 해주는 기능이죠."}, {"start": 839.98, "end": 845.128, "text": "저희는 이 인덱스를 재설계해 안정성과 효율성을 높이고"}, {"start": 845.177, "end": 852.129, "text": "신구 콘텐츠 모두를 더 포괄적으로 담아냈습니다. 업데이트 후엔 새로운 검색 인프라가 작동하며"}, {"start": 852.178, "end": 857.729, "text": "기기 내 콘텐츠를 인덱싱해 현재 상태를 완벽하게 파악합니다."}, {"start": 857.778, "end": 863.229, "text": "새로운 콘텐츠가 들어오면 거의 즉시 인덱싱되죠. 덕분에 검색만 하면"}, {"start": 863.278, "end": 868.829, "text": "원하는 걸 바로 찾으실 수 있습니다. 메일엔 완전히 새로운 랭킹 시스템이 도입되어"}, {"start": 868.879, "end": 874.129, "text": "'가장 연관성 높은 항목'에 더욱 정확한 결과를 보여줍니다. 찾으시는 메일이"}, {"start": 874.178, "end": 876.23, "text": "맨 위에 보일 확률이 더 높아진 거죠."}, {"start": 876.279, "end": 879.03, "text": "몇 달 전에 받은 메일이라 할지라도요."}, {"start": 879.08, "end": 882.031, "text": "제품을 더 매끄럽고 기민하게 만들기 위해"}, {"start": 882.081, "end": 885.629, "text": "올해 저희가 공들인 작업 중 일부를 소개해 드렸습니다."}, {"start": 885.678, "end": 889.93, "text": "여러 앱과 제품에 걸쳐 선보일 멋진 기능들이"}, {"start": 889.98, "end": 891.677, "text": "정말 많은데요."}, {"start": 891.678, "end": 894.128, "text": "그중에는 여러분의 의견을 반영한 기능들도 있습니다."}, {"start": 894.177, "end": 896.599, "text": "그럼 몇 가지 예를 들어보겠습니다."}, {"start": 896.649, "end": 899.699, "text": "사진 앱의 iCloud 공유 앨범에 이제 다음 항목을 포함할 수 있습니다."}, {"start": 899.749, "end": 902.8, "text": "최근에 다녀온 모든 모험의 사진과 동영상을 말이죠."}, {"start": 902.85, "end": 906.199, "text": "안드로이드나 윈도우를 쓰는 친구들도 참여해서"}, {"start": 906.249, "end": 908.999, "text": "직접 찍은 결과물을 앨범에 추가할 수 있거든요."}, {"start": 909.048, "end": 911.649, "text": "게다가 이제 공유 앨범은"}, {"start": 911.649, "end": 915.299, "text": "풀 해상도 공유를 지원합니다. 건강 앱의 경우,"}, {"start": 915.349, "end": 918.799, "text": "'생리 주기 추적'에서 이제 주위 폐경기와"}, {"start": 918.849, "end": 920.099, "text": "폐경기를 지원합니다."}, {"start": 920.149, "end": 922.1, "text": "생리 주기 패턴이 주위 폐경기를"}, {"start": 922.149, "end": 924.3, "text": "시사할 때 알림을 받을 수 있고,"}, {"start": 924.35, "end": 927.8, "text": "관련 증상을 기록하거나 교육 정보를 확인할 수 있어"}, {"start": 927.85, "end": 929.8, "text": "내 몸에 어떤 변화가 일어나고 있는지"}, {"start": 929.85, "end": 933.998, "text": "더 잘 이해하고 의사와 상담할 준비를 더 철저히 할 수 있습니다."}, {"start": 934.048, "end": 937.4, "text": "AirPods에서는 맞춤형 EQ를 제공하여"}, {"start": 937.45, "end": 943.25, "text": "사운드를 한층 더 취향에 맞게 개인화할 수 있습니다."}, {"start": 947.84, "end": 951.49, "text": "Apple Vision Pro는 직접 촬영한 파노라마 사진을"}, {"start": 951.54, "end": 955.69, "text": "놀라운 깊이감과 사실감을 지닌 공간 장면으로 변환해 줍니다."}, {"start": 955.74, "end": 959.39, "text": "추억을 훨씬 더 몰입감 있게 만들어 주죠."}, {"start": 959.44, "end": 962.489, "text": "이 파노라마를 가상 환경으로 설정해서"}, {"start": 962.538, "end": 967.249, "text": "나만의 특별한 순간 속에 온전히 둘러싸인 기분을 느껴보세요."}, {"start": 967.298, "end": 973.7, "text": "마지막으로 지도 앱에서는 항공 사진을 활용해"}, {"start": 970.298, "end": 973.65, "text": "'플라이오버' 기능을 대폭 강화했습니다"}, {"start": 973.7, "end": 976.449, "text": "시각 지능 모델과 결합하여 말이죠"}, {"start": 976.499, "end": 980.05, "text": "모든 것이 놀라울 정도로 선명하고 정교하게 표현됩니다"}, {"start": 980.1, "end": 986.1, "text": "아름다운 건축물의 디테일부터 개별 나무의 형태"}, {"start": 986.197, "end": 992.751, "text": "고층 빌딩 유리에 반사되는 빛의 질감까지, 전 세계 도시를 전례 없는 방식으로 보게 될 겁니다"}, {"start": 992.801, "end": 999.749, "text": "이러한 개선 사항들이 플랫폼 전반의 사용자 경험에 녹아든 것을 매우 기쁘게 생각합니다"}, {"start": 999.798, "end": 1003.148, "text": "이제 다시 크레이그에게 마이크를 넘기죠"}, {"start": 1003.197, "end": 1008.5, "text": "의미 있는 디자인 개선과 더욱 빨라진 반응성"}, {"start": 1008.399, "end": 1013.549, "text": "그리고 멋진 신기능들을 통해, Apple 제품과 함께하는 시간이"}, {"start": 1013.599, "end": 1015.849, "text": "그 어느 때보다 즐거워질 것입니다"}, {"start": 1015.899, "end": 1020.099, "text": "이제 신뢰와 안전에 대해 이야기해 보죠"}, {"start": 1020.1, "end": 1026.548, "text": "저희는 사용자의 삶을 풍요롭게 하면서도 안전을 지킬 수 있는 제품을 만듭니다"}, {"start": 1026.598, "end": 1030.949, "text": "대화 내용을 보호하기 위해 종단간 암호화 기술을 제공하고"}, {"start": 1030.999, "end": 1033.748, "text": "Safari의 강력한 개인정보 보호 기능과"}, {"start": 1033.798, "end": 1039.651, "text": "위치나 사진 권한을 직접 제어할 수 있는 기능, 그리고 생명을 구하는"}, {"start": 1039.701, "end": 1042.748, "text": "충돌 사고 감지 기능까지 갖추고 있습니다"}, {"start": 1042.798, "end": 1049.5, "text": "안전에 대한 저희의 오랜 약속은 기기에 의지해 소통하고"}, {"start": 1049.5, "end": 1052.15, "text": "창의성을 탐구하며 배움을 넓히고"}, {"start": 1052.2, "end": 1055.5, "text": "성장하며 독립심을 키워나가는"}, {"start": 1055.5, "end": 1059.597, "text": "아이들과 청소년들에게 특히 중요합니다"}, {"start": 1059.528, "end": 1061.18, "text": "저희도 부모인 만큼,"}, {"start": 1061.23, "end": 1065.88, "text": "아이들을 위해 안전하고 신뢰할 수 있는 플랫폼을 만드는 데 최선을 다하고 있습니다."}, {"start": 1065.93, "end": 1069.08, "text": "그래서 올해, 저희는 큰 걸음을 내딛으려 합니다."}, {"start": 1069.13, "end": 1071.381, "text": "아동 안전 기능을 확장하여"}, {"start": 1071.431, "end": 1074.279, "text": "강력하고 직관적인 도구들을 선보일 예정입니다."}, {"start": 1074.329, "end": 1080.08, "text": "저희의 접근 방식에 대해 자세히 설명해 줄 섬불을 소개합니다."}, {"start": 1080.13, "end": 1084.08, "text": "이 분야에서의 저희 작업은 두 가지 핵심 원칙에 기반합니다."}, {"start": 1084.13, "end": 1087.479, "text": "첫째, 모든 아이는 저마다 특별하다는 점을 인식하고 있습니다."}, {"start": 1087.528, "end": 1089.479, "text": "그리고 부모야말로 무엇이 가족에게 최선인지"}, {"start": 1089.528, "end": 1092.081, "text": "결정할 수 있는 가장 적합한 위치에 있죠."}, {"start": 1092.131, "end": 1095.88, "text": "둘째, 애플의 아동 안전 기능은 전문가들의 건강 연구를 바탕으로"}, {"start": 1095.93, "end": 1098.778, "text": "설계되어야 한다고 믿습니다."}, {"start": 1098.827, "end": 1101.978, "text": "임상 및 아동 발달 전문가들의 최신 연구 결과와"}, {"start": 1102.028, "end": 1105.379, "text": "온라인 안전 전문가들의 의견에 따르면,"}, {"start": 1105.429, "end": 1108.479, "text": "학습, 창의성, 유대감 사이의 균형을 유지하면서"}, {"start": 1108.528, "end": 1113.881, "text": "기술 사용에 대한 경계를 설정하는 것이 얼마나 중요한지 강조하고 있습니다."}, {"start": 1113.931, "end": 1119.978, "text": "이는 대면 사회적 상호작용, 학업, 신체 활동, 수면을 위한"}, {"start": 1120.028, "end": 1122.179, "text": "충분한 시간을 확보하는 데 매우 중요합니다."}, {"start": 1122.229, "end": 1125.88, "text": "이 모든 요소는 아이들의 건강한 성장에 필수적이죠."}, {"start": 1125.93, "end": 1131.93, "text": "또한 연구에 따르면, 개인 기기를 사용하는 18세 미만 아이들은 연령별..."}, {"start": 1131.98, "end": 1135.228, "text": "어른의 지도하에 보호받을 수 있도록 말이죠."}, {"start": 1135.278, "end": 1137.13, "text": "13세 미만 아동의 경우,"}, {"start": 1137.18, "end": 1139.729, "text": "개인 기기 사용을 제한해야 하며"}, {"start": 1139.778, "end": 1142.33, "text": "아이가 준비되었을 때 범위를 넓혀줘야 합니다."}, {"start": 1142.38, "end": 1144.131, "text": "부모로서 우리는 아이들이"}, {"start": 1144.181, "end": 1146.729, "text": "건강한 디지털 습관을 기르길 바랍니다."}, {"start": 1146.778, "end": 1148.631, "text": "부모님들이 이를 실천할 수 있도록,"}, {"start": 1148.681, "end": 1150.528, "text": "미국 소아과 학회에서는"}, {"start": 1150.578, "end": 1152.93, "text": "'가족 미디어 계획'을 만들었습니다."}, {"start": 1152.98, "end": 1154.529, "text": "저희는 학회와 협력하여"}, {"start": 1154.579, "end": 1157.13, "text": "이를 부모님들을 위한 가이드로 개편하고 있으며,"}, {"start": 1157.18, "end": 1160.43, "text": "건강한 디지털 습관을 정착시키는 데 도움이 되고자 합니다."}, {"start": 1160.48, "end": 1163.528, "text": "저희의 아동 안전 기능을 활용해서 말이죠."}, {"start": 1163.577, "end": 1166.13, "text": "또한 기술이 아이들의 복지에 미치는"}, {"start": 1166.18, "end": 1170.028, "text": "영향을 파악하기 위해 연구진과 지속적으로 협력 중이며,"}, {"start": 1170.078, "end": 1174.029, "text": "이 분야의 과학적 발전을 위해 최선을 다하고 있습니다."}, {"start": 1174.079, "end": 1176.728, "text": "많은 가족이 도움을 필요로 한다는 것을 잘 압니다."}, {"start": 1176.778, "end": 1178.33, "text": "자녀가 부모님이 허락한 범위 내에서만"}, {"start": 1178.38, "end": 1181.131, "text": "적절한 경험을 할 수 있도록 말이죠."}, {"start": 1181.181, "end": 1185.298, "text": "이제 라자가 어떻게 시작하면 되는지 보여드릴 겁니다."}, {"start": 1185.348, "end": 1187.848, "text": "부모로서 우리 아이들이"}, {"start": 1187.848, "end": 1189.298, "text": "올바른 길로 나아가길 바라죠."}, {"start": 1189.348, "end": 1192.7, "text": "그러려면 무엇보다 가장 중요한 첫 단계는"}, {"start": 1192.75, "end": 1194.7, "text": "자녀 계정을 만드는 것입니다."}, {"start": 1194.75, "end": 1197.7, "text": "계정을 생성하면 즉시 시스템 전반에"}, {"start": 1197.75, "end": 1201.597, "text": "연령별 맞춤 보호 장치가 활성화됩니다. 성인 사이트 차단이나"}, {"start": 1201.647, "end": 1204.097, "text": "연령에 적합한 미디어만 허용하고"}, {"start": 1204.147, "end": 1207.798, "text": "앱 스토어 이용 제한을 설정하는 기능 등이 포함되죠."}, {"start": 1207.848, "end": 1209.499, "text": "또한 자녀 계정을 통해"}, {"start": 1209.548, "end": 1212.097, "text": "강력한 부모 통제 기능을 사용할 수 있습니다."}, {"start": 1212.147, "end": 1215.499, "text": "자녀가 이미 일반 계정을 쓰고 있어도 걱정 마세요."}, {"start": 1215.548, "end": 1218.199, "text": "기존 계정을 간단히 전환할 수 있으니까요."}, {"start": 1218.249, "end": 1220.5, "text": "올해는 자녀 계정 기능을 한층 강화해"}, {"start": 1220.549, "end": 1222.4, "text": "부모님들이 가장 걱정하시는 문제들을"}, {"start": 1222.45, "end": 1225.5, "text": "해결하는 데 집중했습니다. 어떤 콘텐츠를 보여줄지,"}, {"start": 1225.549, "end": 1226.901, "text": "아이들이 무엇을 보는지,"}, {"start": 1226.951, "end": 1228.901, "text": "누구와 대화할 수 있는지부터"}, {"start": 1228.951, "end": 1232.499, "text": "기기 사용 시간과 아이들의 디지털 여정을"}, {"start": 1232.548, "end": 1234.0, "text": "올바르게 가이드하는 방법까지 말이죠."}, {"start": 1234.049, "end": 1236.519, "text": "아울러 부모님들께 다양한 권장 설정을 제공합니다."}, {"start": 1236.568, "end": 1239.12, "text": "전문가의 조언을 바탕으로 부모님들이"}, {"start": 1239.17, "end": 1241.72, "text": "아이들에게 무엇이 최선일지 결정하도록 돕고 있습니다."}, {"start": 1241.769, "end": 1244.921, "text": "먼저 아이들이 어떤 콘텐츠를 볼 수 있는지부터 살펴볼까요?"}, {"start": 1244.971, "end": 1246.719, "text": "한편으로는 아이가 개인 기기를 갖게 되면"}, {"start": 1246.769, "end": 1249.17, "text": "많은 장점이 있습니다."}, {"start": 1249.171, "end": 1251.719, "text": "언제든 연락이 닿으니 부모님은 안심할 수 있고"}, {"start": 1251.769, "end": 1254.419, "text": "아이의 위치를 파악하거나, 학습과 성장에 도움이 되는"}, {"start": 1254.469, "end": 1256.818, "text": "훌륭한 앱들을 제공해 줄 수도 있죠."}, {"start": 1256.868, "end": 1260.219, "text": "하지만 너무 이른 시기에 너무 많은 것에 노출되어"}, {"start": 1260.269, "end": 1264.018, "text": "아이가 아직 준비되지 않은 콘텐츠에 접근하게 될까 봐 걱정되기도 합니다."}, {"start": 1264.067, "end": 1268.121, "text": "올해부터 부모님들은 아이가 올바른 습관을 들일 수 있도록"}, {"start": 1268.171, "end": 1272.419, "text": "부모님이 허용한 콘텐츠만 접근 가능하게 설정할 수 있습니다."}, {"start": 1272.469, "end": 1277.72, "text": "그리고 시간이 지나 적절해지면 점진적으로 늘려가는 거죠."}, {"start": 1277.769, "end": 1280.519, "text": "사용하기 쉬운 '설정 지원' 기능으로 시작되는데,"}, {"start": 1280.569, "end": 1283.62, "text": "여기서 부모님은 허용할 항목을 정확히 선택할 수 있습니다."}, {"start": 1283.67, "end": 1290.519, "text": "필수 앱 몇 가지나 추천 세트, 혹은 직접 원하는 앱을 지정하면 됩니다."}, {"start": 1290.568, "end": 1295.519, "text": "아이가 성장함에 따라 더 추가할 수 있고, 부모님은 계속 관리 권한을 갖게 되죠."}, {"start": 1295.568, "end": 1301.568, "text": "자세한 내용을 듣기 위해 앤을 모셔보겠습니다."}, {"start": 1301.471, "end": 1307.119, "text": "아이들이 무엇을 하는지 파악하는 가장 좋은 방법은 다운로드하는 앱을 관리하는 것입니다."}, {"start": 1307.169, "end": 1314.469, "text": "앱스토어의 모든 앱에는 연령 등급이 표시되어 있어, 부모님이 자녀에게 적합한지 판단하는 데 도움이 됩니다."}, {"start": 1314.519, "end": 1318.469, "text": "아이가 원하는 앱을 찾으면 부모님께 허락을 구해야 합니다"}, {"start": 1318.519, "end": 1323.469, "text": "부모님은 유용한 정보를 참고해 자녀에게 적합한 앱인지 판단하고"}, {"start": 1323.519, "end": 1327.469, "text": "'구입 요청' 기능을 통해 메시지 앱에서 바로 승인할 수 있죠"}, {"start": 1327.519, "end": 1334.469, "text": "올해는 앱을 넘어 웹까지 범위를 넓혀 '탐색 요청' 기능을 도입했습니다"}, {"start": 1334.519, "end": 1337.469, "text": "이제 아이가 새로운 웹사이트를 방문하려면 먼저 허락을 받아야 하며"}, {"start": 1337.519, "end": 1341.067, "text": "부모님은 승인 전 내용을 자세히 살펴볼 수 있습니다"}, {"start": 1341.117, "end": 1346.067, "text": "이 기능은 Safari를 통해 iPhone, iPad, Mac에서 매끄럽게 작동하죠"}, {"start": 1346.117, "end": 1351.571, "text": "13세 미만 아동은 '탐색 요청'과 '구입 요청'이 기본으로 활성화되며"}, {"start": 1351.621, "end": 1355.571, "text": "부모님이 청소년 자녀를 위해 직접 설정할 수도 있습니다"}, {"start": 1355.621, "end": 1360.171, "text": "자녀의 대화 상대는 어떨까요? 이 역시 부모님이 관리할 수 있습니다"}, {"start": 1360.221, "end": 1363.769, "text": "처음에는 가까운 가족으로만 대화 상대를 제한했다가"}, {"start": 1363.818, "end": 1364.769, "text": "조부모님을 추가하는 식으로 말이죠"}, {"start": 1364.818, "end": 1367.769, "text": "자녀가 성장하며 새로운 사람들과 소통하고 싶어질 때도"}, {"start": 1367.818, "end": 1371.769, "text": "앱과 마찬가지로 자녀가 먼저 승인을 요청하도록 할 수 있습니다"}, {"start": 1371.818, "end": 1374.17, "text": "새로운 상대와 연결되기 전에 말이죠"}, {"start": 1374.22, "end": 1378.568, "text": "부모로서 자녀의 대화가 안전하길 바라는 건 당연하죠"}, {"start": 1378.618, "end": 1380.969, "text": "부적절한 콘텐츠가 없는 안전한 환경 말입니다"}, {"start": 1381.019, "end": 1384.671, "text": "이제 자녀가 노출이 포함됐을 가능성이 있는"}, {"start": 1384.721, "end": 1387.67, "text": "이미지나 영상을 주고받으려고 하면"}, {"start": 1387.72, "end": 1391.028, "text": "'커뮤니케이션 안전' 기능이 경고를 띄우고 해당 콘텐츠를 흐리게 처리합니다"}, {"start": 1391.078, "end": 1393.63, "text": "실시간 FaceTime 통화 중에도 작동하죠."}, {"start": 1393.68, "end": 1397.229, "text": "올해 커뮤니케이션 안전 기능은 한층 더 강화되어,"}, {"start": 1397.278, "end": 1399.029, "text": "아이들이 잔인하거나"}, {"start": 1399.079, "end": 1402.229, "text": "폭력적인 콘텐츠가 담긴 이미지나 영상이 공유되면 미리 차단해 줍니다."}, {"start": 1402.278, "end": 1409.93, "text": "다음은 자녀가 개인 기기에서 앱을 사용하는 시간을 관리하는 방법에 대해 말씀드리겠습니다."}, {"start": 1409.98, "end": 1415.93, "text": "현재 스크린 타임 기능을 통해 부모는 자녀가 기기에서 얼마나 많은 시간을 보내는지 확인할 수 있는데요."}, {"start": 1415.98, "end": 1421.93, "text": "저희 집만 해도 아이들이 좋아하는 영상이나 게임을 그만하게 하는 게 참 힘들 때가 많거든요."}, {"start": 1421.98, "end": 1426.93, "text": "부모님들이 자녀의 특정 앱 사용 시간을 더 잘 관리하고 싶어 하신다는 걸 잘 알고 있습니다."}, {"start": 1426.98, "end": 1433.43, "text": "그래서 '시간 허용량'이라는 유연하고 간편한 새로운 관리 방법을 도입했습니다."}, {"start": 1433.48, "end": 1442.93, "text": "이제 엔터테인먼트, 게임, 소셜 미디어가 중심이 되며, 세 카테고리 전체에 적용되는 일일 권장 시간 허용량이 제공됩니다."}, {"start": 1442.98, "end": 1446.83, "text": "부모님들께 아주 유용한 기준점이 될 것입니다."}, {"start": 1446.88, "end": 1451.83, "text": "각 카테고리별로도 처음에 참고할 수 있는 개별 권장 시간 허용량이 있습니다."}, {"start": 1451.88, "end": 1458.33, "text": "이 수치들은 자녀의 연령을 바탕으로 최고의 임상 및 아동 발달 전문가들과 함께 개발했으며,"}, {"start": 1458.38, "end": 1462.83, "text": "아까 숨불이 언급한 미국 소아과 학회도 참여했습니다."}, {"start": 1462.88, "end": 1468.83, "text": "과학이 발전함에 따라 전문가들과 협력하여 권장 사항을 지속적으로 업데이트하고,"}, {"start": 1468.88, "end": 1471.83, "text": "부모님들의 의견도 적극적으로 반영할 예정입니다."}, {"start": 1471.88, "end": 1475.83, "text": "소셜 미디어에 관해서 부모님들의 걱정이 크다는 걸 잘 압니다."}, {"start": 1475.88, "end": 1485.12, "text": "전문가들은 13세 미만 아동의 소셜 미디어 사용 자제를 권하며, 부모님은 자녀가 준비되었을 때를 신중하게 판단해야 합니다."}, {"start": 1485.17, "end": 1495.019, "text": "아이마다 특성이 다르기에, 부모님이 직접 제안된 허용량을 자녀에게 가장 적합한 방식으로 언제든 조정하실 수 있습니다."}, {"start": 1495.068, "end": 1498.67, "text": "또한 매일의 상황이 늘 같지는 않다는 점도 잘 알고 있죠."}, {"start": 1498.72, "end": 1502.788, "text": "학교 가는 날은 주말과 다르죠. 학교생활에 있어서는,"}, {"start": 1502.837, "end": 1506.391, "text": "교실 내 기기가 학습을 돕는 데 사용되어야 한다고 믿습니다."}, {"start": 1506.441, "end": 1512.89, "text": "이제 부모님은 간편하게 일정을 설정하고 자녀가 사용할 수 있는 앱을 선택할 수 있습니다."}, {"start": 1512.94, "end": 1515.389, "text": "하루 중 시간대별로 말이죠."}, {"start": 1515.439, "end": 1519.19, "text": "덕분에 아이들은 학교 수업 시간처럼 중요한 순간에 집중할 수 있습니다."}, {"start": 1519.24, "end": 1524.19, "text": "일정 설정은 시간 제한 기능과 연동되어, 추가 시간을 줄 수도 있습니다."}, {"start": 1524.24, "end": 1526.889, "text": "가령 주말에 영화를 볼 수 있게 말이죠."}, {"start": 1526.939, "end": 1531.538, "text": "물론 부모님은 가족의 일과에 맞춰"}, {"start": 1531.538, "end": 1534.09, "text": "이 일정을 완전히 맞춤 설정할 수 있습니다."}, {"start": 1534.14, "end": 1540.587, "text": "또한 부모님은 자녀의 디지털 여정이 건강하고 긍정적이도록 안내하는 쉽고 직관적인 방법을 원하시죠."}, {"start": 1540.637, "end": 1543.788, "text": "그래서 스크린 타임을 완전히 새롭게 디자인했습니다."}, {"start": 1543.837, "end": 1548.091, "text": "부모님은 자녀의 기기 사용 현황을 한눈에 확인할 수 있으며,"}, {"start": 1548.141, "end": 1553.59, "text": "필요한 순간 탭 한 번으로 즉시 접근 권한을 조정할 수 있습니다."}, {"start": 1553.64, "end": 1558.39, "text": "이제 아이들이 앱을 탐색하며 겪는 경험에 대해 알아볼까요?"}, {"start": 1558.44, "end": 1562.087, "text": "오늘날 앱을 통해 할 수 있는 일은 거의 무한합니다."}, {"start": 1562.137, "end": 1567.09, "text": "타인과 소통하는 새로운 방식부터 AI, 몰입형 게임까지 다양하죠."}, {"start": 1567.14, "end": 1570.288, "text": "하지만 부모로서 우리 아이들이"}, {"start": 1570.337, "end": 1572.99, "text": "이런 경험을 할 준비가 되었는지 확인하고 싶을 겁니다."}, {"start": 1573.039, "end": 1576.489, "text": "Apple의 강력한 제어 기능은 부모님이 다음 사항을 관리하도록 돕습니다."}, {"start": 1576.538, "end": 1579.93, "text": "자녀가 어떤 앱에 언제 접근할 수 있는지 말이죠."}, {"start": 1579.98, "end": 1583.528, "text": "아이들이 앱 내에서 연령에 적합한 경험을 하려면"}, {"start": 1583.578, "end": 1587.98, "text": "개발자들의 역할이 무엇보다 중요합니다."}, {"start": 1587.98, "end": 1590.73, "text": "이미 많은 앱이 자녀 보호 기능을 제공하며"}, {"start": 1590.779, "end": 1594.429, "text": "아이들이 부적절한 콘텐츠에 노출되지 않도록 돕고 있죠."}, {"start": 1594.479, "end": 1598.83, "text": "저희는 모든 앱이 이러한 책임을 다해야 한다고 믿습니다."}, {"start": 1598.88, "end": 1600.929, "text": "개발자분들을 돕기 위해"}, {"start": 1600.979, "end": 1605.131, "text": "다양한 API와 리소스를 제공하고 있습니다."}, {"start": 1605.181, "end": 1608.077, "text": "예를 들어, 노출이나"}, {"start": 1608.18, "end": 1610.528, "text": "폭력적인 콘텐츠로부터 아이들을 보호하거나"}, {"start": 1610.578, "end": 1614.831, "text": "새로운 연락처를 추가할 때 부모의 승인을 받도록 할 수 있죠."}, {"start": 1614.881, "end": 1619.827, "text": "또한 '연령대 선언 API'를 활용할 수도 있습니다."}, {"start": 1619.877, "end": 1628.827, "text": "이를 통해 개인 정보를 보호하면서도 아이의 연령대에 맞춰 앱 경험을 최적화할 수 있습니다."}, {"start": 1628.877, "end": 1635.83, "text": "이외에도 개발자가 안전한 환경을 구축할 수 있도록 돕는 수많은 리소스가 준비되어 있습니다."}, {"start": 1635.88, "end": 1637.83, "text": "이제 다시 크레이그를 불러보죠."}, {"start": 1637.88, "end": 1645.528, "text": "요약하자면, 부모님들께 강력하고 사용하기 쉬운 도구를 제공하여 아이들이 무엇을 보고"}, {"start": 1645.578, "end": 1649.528, "text": "누구와 대화하며, 언제 접속하는지 관리할 수 있게 하려는 것입니다."}, {"start": 1649.578, "end": 1654.331, "text": "더 자세한 정보가 필요한 분들을 위해 새로운 웹사이트도 개설했습니다."}, {"start": 1654.381, "end": 1660.651, "text": "여기서는 아동 안전 기능과 시작 방법 등 자주 묻는 질문에 대한 답을 확인하실 수 있습니다."}, {"start": 1660.701, "end": 1667.351, "text": "이번 대규모 업데이트는 아이들을 위한 안전하고 신뢰할 수 있는 플랫폼을 만들겠다는"}, {"start": 1667.401, "end": 1675.95, "text": "저희의 지속적인 약속을 보여줍니다. 이제 인텔리전스 분야를 살펴보죠. AI는 믿을 수 없을 만큼 강력한 기술입니다."}, {"start": 1676.0, "end": 1681.048, "text": "사회를 근본적으로 변화시킬 잠재력을 지녔으며, 세심한 주의를 기울인다면"}, {"start": 1681.098, "end": 1687.249, "text": "전 세계 사람들에게 유의미한 혜택을 선사할 수 있죠. 하지만 일부는 그저 앞만 보고 달리는 듯합니다."}, {"start": 1687.298, "end": 1693.45, "text": "우리 모두에 대한 배려 없이, 오로지 AI만을 위한 AI를 추구하는 것처럼 보이죠."}, {"start": 1693.5, "end": 1699.748, "text": "결국 AI가 섬겨야 할 대상은 사람인데 말입니다. 애플의 사명은 언제나 첨단 기술의 잠재력을"}, {"start": 1699.798, "end": 1705.85, "text": "모두를 위한 유용하고 직관적인 제품으로 승화시키는 것이었습니다. 이는 개인용 컴퓨팅 시대의"}, {"start": 1705.9, "end": 1711.051, "text": "서막이 오른 이래로 변함없는 사실이며, 오늘날 그 중요성은 어느 때보다 커졌습니다."}, {"start": 1711.101, "end": 1717.347, "text": "저희는 진정으로 유용한 AI란 사용자와 사용자의 필요에 집중해야 한다고 믿습니다."}, {"start": 1717.397, "end": 1722.548, "text": "즉, 여러분이 매일 쓰는 제품 속에 AI를 깊숙이 통합해야 한다는 뜻이죠."}, {"start": 1722.598, "end": 1727.347, "text": "사용자의 개인적인 상황과 평소 의존하는 앱을 기반으로 삼고,"}, {"start": 1727.397, "end": 1731.85, "text": "당연히 모든 단계에서 철저하게 개인정보를 보호하며 설계해야 합니다."}, {"start": 1731.9, "end": 1735.35, "text": "이것이 바로 애플 인텔리전스가 지향하는 미래입니다."}, {"start": 1735.4, "end": 1741.65, "text": "그리고 오늘, 저희는 한 단계 더 도약하려 합니다. 애플 제품을 더욱 개인적이고"}, {"start": 1741.7, "end": 1745.649, "text": "유용하게 만들어 줄 차세대 애플 인텔리전스를 통해서 말이죠."}, {"start": 1745.699, "end": 1748.85, "text": "먼저 이 혁신적이고 새로운 아키텍처에 대해 소개해 드리겠습니다."}, {"start": 1748.9, "end": 1754.15, "text": "사용자의 요구에 훨씬 더 기민하게 반응하는 완전히 새로운 Siri와,"}, {"start": 1754.2, "end": 1757.548, "text": "앱을 더 똑똑하고 유용하게 만들어 줄 방법들을 살펴보시죠."}, {"start": 1757.598, "end": 1760.95, "text": "그럼 새로운 아키텍처부터 시작해 볼까요?"}, {"start": 1761.0, "end": 1765.45, "text": "이는 사용자와 여러분이 매일 사용하는 애플 제품을 중심에 두고 설계되었습니다."}, {"start": 1765.5, "end": 1770.151, "text": "그리고 애플 인텔리전스의 심장부에는 애플 파운데이션 모델이 자리 잡고 있죠."}, {"start": 1770.201, "end": 1774.91, "text": "올해 저희는 구글과 긴밀한 협력을 시작하여, 기술력을 활용해..."}, {"start": 1774.96, "end": 1777.91, "text": "Gemini 모델 제품군의 기술을 기반으로 합니다."}, {"start": 1777.96, "end": 1783.11, "text": "우리는 통합된 Apple Intelligence 경험을 위해 차세대 Apple 파운데이션 모델을 함께 구축했습니다."}, {"start": 1783.16, "end": 1789.21, "text": "또한 이 새로운 모델들이 온디바이스와 서버에서 구동되도록 최적화했죠."}, {"start": 1789.259, "end": 1791.808, "text": "프라이빗 클라우드 컴퓨팅을 활용해서 말이죠."}, {"start": 1791.858, "end": 1794.307, "text": "이 강력한 서버 및 온디바이스 모델들은"}, {"start": 1794.357, "end": 1797.308, "text": "Apple Intelligence를 대대적으로 업그레이드합니다."}, {"start": 1797.358, "end": 1799.807, "text": "최첨단 수준의 이해와 추론 능력은 물론"}, {"start": 1799.857, "end": 1803.909, "text": "강력한 이미지 이해 및 생성과 같은 멀티모달 기능까지 갖췄죠."}, {"start": 1803.959, "end": 1807.759, "text": "덕분에 실사 같은 이미지를 만들고"}, {"start": 1807.759, "end": 1809.709, "text": "예전과는 차원이 다른 방식으로 사진을 편집하며"}, {"start": 1809.759, "end": 1812.909, "text": "시각적 콘텐츠에 대한 답변을 얻을 수 있습니다."}, {"start": 1812.959, "end": 1814.508, "text": "우리는 여기서 더 나아갔습니다."}, {"start": 1814.557, "end": 1818.209, "text": "가장 성능이 뛰어난 Apple 실리콘 시스템에 맞춰 최적화된"}, {"start": 1818.259, "end": 1822.209, "text": "한층 더 강력한 두 번째 온디바이스 모델 버전을 선보입니다."}, {"start": 1822.259, "end": 1828.61, "text": "이 모델은 지원 기기가 텍스트와 이미지뿐만 아니라 음성까지 이해하고 생성할 수 있게 해줍니다."}, {"start": 1828.66, "end": 1835.009, "text": "또한 시스템 전반의 받아쓰기 정확도를 높이고 자연어 이해력을 향상시키며,"}, {"start": 1835.058, "end": 1839.209, "text": "놀라울 정도로 표현력이 풍부한 목소리를 구현하죠."}, {"start": 1839.259, "end": 1845.41, "text": "그다음으로 우리는 모델을 플랫폼에 깊숙이 통합하여 시스템 전반의 다양한 기능을 가능하게 했습니다."}, {"start": 1845.46, "end": 1852.008, "text": "Apple Intelligence는 새로운 시스템 오케스트레이터를 통해 이 기능들을 안전하게 조율합니다."}, {"start": 1852.057, "end": 1857.759, "text": "이러한 기능은 개인적 맥락을 이해하는 것부터 시작됩니다."}, {"start": 1857.808, "end": 1862.21, "text": "수년 전 사진이든 최근에 작성한 메모든,"}, {"start": 1862.21, "end": 1867.459, "text": "질문만 하면 원하는 정보를 바로 찾을 수 있습니다. 그 이면에는 'Apple Intelligence'가 있죠."}, {"start": 1867.509, "end": 1872.759, "text": "강력한 시맨틱 인덱스가 탑재된 Spotlight를 통해 필요한 정보를"}, {"start": 1872.808, "end": 1877.259, "text": "즉각적으로 찾아내며, 연동된 모든 앱에서 작동합니다."}, {"start": 1877.309, "end": 1883.057, "text": "또한 폭넓은 지식을 바탕으로 웹에서 최신 정보를 가져오고,"}, {"start": 1883.107, "end": 1888.259, "text": "'프라이빗 클라우드 컴퓨팅'을 활용해 답을 생성합니다. 과제 연구든,"}, {"start": 1888.309, "end": 1891.91, "text": "파티 브레인스토밍이든 상관없죠."}, {"start": 1891.91, "end": 1897.659, "text": "'앱 동작' 기능을 통해 앱 툴박스에서 요청을 수행할"}, {"start": 1897.709, "end": 1900.258, "text": "적절한 도구를 직접 찾아내기도 합니다."}, {"start": 1900.307, "end": 1905.258, "text": "이메일을 처음부터 새로 쓰거나, 사진 여러 장을 편집하고 공유할 때처럼요."}, {"start": 1905.307, "end": 1910.759, "text": "마지막으로 '화면 내용 인지'를 통해 사용 중인 앱과 작업 내용에 맞춰"}, {"start": 1910.809, "end": 1914.561, "text": "상황에 최적화된 도움을 제공합니다."}, {"start": 1914.611, "end": 1919.759, "text": "이 강력하고 새로운 아키텍처는 폭넓고 유용한 경험을 선사합니다."}, {"start": 1919.808, "end": 1925.16, "text": "완전히 새로워진 Siri부터, 가장 자주 쓰는 앱들의 지능형 기능들까지 말이죠."}, {"start": 1925.21, "end": 1929.71, "text": "시스템 전반에 적용되어 일상적인 작업들이"}, {"start": 1929.611, "end": 1937.459, "text": "훨씬 더 편리해집니다. 물론 Apple의 모든 서비스가 그렇듯, 철저히 개인정보 보호를 우선으로 설계되었습니다."}, {"start": 1937.509, "end": 1943.759, "text": "오늘날 많은 AI 기업이 개인정보 보호를 말하지만, 기본적으로 사용자의 상호작용 데이터를 보유하며"}, {"start": 1943.808, "end": 1949.759, "text": "보호의 책임을 사용자에게 전가하곤 합니다. 일시적 채팅 모드를 쓰거나,"}, {"start": 1949.809, "end": 1956.258, "text": "대화 내역을 삭제하거나, 아예 특정 기능을 꺼야만 하죠. 하지만 Apple은 AI의 개인정보 보호가"}, {"start": 1956.307, "end": 1964.14, "text": "결코 타협할 수 없는 가치라고 믿습니다. Apple Intelligence는 온디바이스 처리와 프라이빗 클라우드 컴퓨팅을 모두 활용합니다."}, {"start": 1964.19, "end": 1970.739, "text": "이를 통해 여러분의 데이터는 저장되지 않으며, 애플이나 그 누구도 접근할 수 없습니다. 데이터는 오직"}, {"start": 1970.788, "end": 1978.64, "text": "여러분의 요청을 수행하는 데만 사용됩니다. 외부 전문가들이 언제든 이 약속이 지켜지는지 확인할 수 있죠. 이제,"}, {"start": 1978.69, "end": 1983.94, "text": "애플 인텔리전스가 애플 제품을 어떤 방식으로 진화시키는지 보여드리게 되어 정말 기쁩니다."}, {"start": 1983.99, "end": 1986.94, "text": "완전히 새로워진 Siri부터 시작해 보죠."}, {"start": 1986.99, "end": 1988.64, "text": "자세한 설명을 위해 마이크를 모시겠습니다."}, {"start": 1988.69, "end": 2006.588, "text": "[신나는 비트의 음악과 효과음]"}, {"start": 2006.587, "end": 2008.238, "text": "Siri는 개인 비서로서"}, {"start": 2008.288, "end": 2011.239, "text": "말 한마디로 여러분의 업무 처리를 도와줍니다."}, {"start": 2011.288, "end": 2013.14, "text": "하지만 저희는 여러분이"}, {"start": 2013.19, "end": 2015.439, "text": "Siri에게 그 이상의 것을 기대할 때가 있다는 걸 알고 있죠."}, {"start": 2015.489, "end": 2019.038, "text": "그래서 강력한 AI를 핵심으로 하여 Siri를 완전히 다시 구축했습니다."}, {"start": 2019.088, "end": 2023.039, "text": "오늘 저희는 완전히 새로운 버전의 Siri를 선보입니다."}, {"start": 2023.089, "end": 2025.64, "text": "애플 인텔리전스로 가능해진 기능이죠."}, {"start": 2025.69, "end": 2028.939, "text": "저희는 이를 'Siri AI'라고 부릅니다."}, {"start": 2028.989, "end": 2032.841, "text": "Siri AI는 새로운 애플 인텔리전스 성능을 활용하며,"}, {"start": 2032.891, "end": 2034.94, "text": "여러분은 기존과 같은 방식으로"}, {"start": 2034.99, "end": 2039.44, "text": "Siri를 이용하실 수 있습니다. \"Siri야\"라고 부르는 것처럼 말이죠."}, {"start": 2039.49, "end": 2042.689, "text": "여기에는 개인적 맥락 이해,"}, {"start": 2042.69, "end": 2046.939, "text": "앱 동작, 화면 인지, 이미지 이해는 물론"}, {"start": 2046.989, "end": 2049.639, "text": "방대한 세상의 지식에 대한 접근까지 포함됩니다."}, {"start": 2049.69, "end": 2053.21, "text": "이제 Siri는 훨씬 더 유능한 비서가 되었습니다."}, {"start": 2053.26, "end": 2057.009, "text": "발표자: 필요한 정보를 찾고 업무 효율을 높여주는 도구입니다."}, {"start": 2057.059, "end": 2059.21, "text": "발표자: 대화 방식도 한층 더 자연스러워졌죠."}, {"start": 2059.26, "end": 2065.009, "text": "발표자: 덕분에 이전과는 비교할 수 없을 만큼 상세하고 몰입감 있는 답변을 주고받을 수 있습니다."}, {"start": 2065.059, "end": 2069.71, "text": "발표자: 풍부한 대화 기록은 새롭게 도입된 전용"}, {"start": 2069.76, "end": 2070.71, "text": "발표자: Siri 앱에서 언제든 다시 확인할 수 있습니다."}, {"start": 2070.76, "end": 2077.608, "text": "발표자: 그뿐만 아니라, 이제 여러 플랫폼에서 Siri의 유용한 시각 지능을 경험할 수 있죠."}, {"start": 2077.659, "end": 2082.608, "text": "발표자: 통합 도구들이 제공되어, 글을 쓸 수 있는 곳이라면 어디서든 Siri와 함께"}, {"start": 2082.659, "end": 2084.208, "text": "발표자: 작성과 편집을 할 수 있습니다."}, {"start": 2084.259, "end": 2088.909, "text": "발표자: Siri를 활용할수록, 디자인이 얼마나 유려하고 직관적인지 실감하게 될 겁니다."}, {"start": 2088.96, "end": 2092.71, "text": "발표자: Apple Intelligence의 강력함을 담아낸 완전히 새로운 모습이죠."}, {"start": 2092.76, "end": 2097.409, "text": "발표자: 그럼 더욱 강력해진 Siri의 기능을 자세히 살펴볼까요?"}, {"start": 2097.46, "end": 2102.009, "text": "발표자: 곧바로 본론으로 들어가서, 여러분의 일상에 도움이 될"}, {"start": 2102.059, "end": 2103.21, "text": "발표자: 몇 가지 기능들을 보여드리겠습니다."}, {"start": 2103.26, "end": 2106.307, "text": "발표자: 간단하지만 아주 유용한 기능부터 시작해 보죠."}, {"start": 2106.358, "end": 2109.11, "text": "발표자: 근처에서 열리는 콘서트 소식을 들었다고 가정해 봅시다."}, {"start": 2109.161, "end": 2111.509, "text": "사용자: 샌프란시스코 수키 워터하우스 공연이 언제야?"}, {"start": 2111.559, "end": 2115.21, "text": "발표자: Siri는 최신 정보를 바탕으로 여러분의 질문에"}, {"start": 2115.26, "end": 2117.108, "text": "발표자: 정확한 근거가 있는 답변을 제공합니다."}, {"start": 2117.159, "end": 2121.809, "text": "Siri: 확인해 보니 공연은 7월 26일입니다."}, {"start": 2121.86, "end": 2125.059, "text": "사용자: 티켓은 어떻게 구해?"}, {"start": 2129.26, "end": 2133.128, "text": "Siri: 티켓을 구하려면 추첨에 응모하셔야 합니다."}, {"start": 2133.179, "end": 2142.579, "text": "남: 추첨 시작하면 신청하라고 알려줘."}, {"start": 2142.579, "end": 2144.931, "text": "시리: 알겠습니다, 알림을 설정했습니다."}, {"start": 2144.981, "end": 2148.73, "text": "남: 이제 그녀의 신곡 중 하나를 들어보죠."}, {"start": 2148.78, "end": 2152.73, "text": "남: 미리 알림, 음악 등 시리에게 기대하는 기능들이죠."}, {"start": 2152.78, "end": 2157.128, "text": "남: 하지만 이제 훨씬 더 유능해졌습니다."}, {"start": 2157.179, "end": 2161.88, "text": "[음악 연주 중]"}, {"start": 2161.78, "end": 2164.23, "text": "남: 다음으로 시리가 어떻게 화면상의 정보를"}, {"start": 2164.28, "end": 2166.23, "text": "남: 인식하고 활용하는지 살펴보겠습니다."}, {"start": 2166.28, "end": 2168.829, "text": "남: 여기가 정확히 어디야?"}, {"start": 2168.88, "end": 2171.429, "text": "남: 여기서 시리는 산타크루즈 해안을 따라 찍힌"}, {"start": 2171.48, "end": 2174.929, "text": "남: 이 아름다운 사진의 위치를 파악할 수 있습니다."}, {"start": 2174.98, "end": 2180.427, "text": "남: 멋지네요, 내추럴 브릿지 주립 해변이군요. 제 친구가 최근 이 근처로 이사했는데,"}, {"start": 2180.478, "end": 2182.73, "text": "남: 근처에 있는지 궁금하네요."}, {"start": 2182.78, "end": 2184.73, "text": "남: \"제프의 새 집이 어디야?\""}, {"start": 2184.78, "end": 2187.829, "text": "남: 주소를 보내준 건 기억나는데, 사실"}, {"start": 2187.88, "end": 2193.528, "text": "남: 어딘지 잘 모르겠고 따로 저장도 안 해뒀거든요. 하지만 시리는 그냥 찾아낼 수 있죠."}, {"start": 2193.579, "end": 2196.628, "text": "남: 정말 좋네요. 만약 즉흥적으로 행동한다면 이렇게 말할 수도 있겠죠."}, {"start": 2196.679, "end": 2199.829, "text": "남: \"제프네 집을 들러서 아치까지 가는 길 알려줘.\""}, {"start": 2199.88, "end": 2206.829, "text": "남: 약간의 지식과 개인적인 맥락을 활용해 시리가 이 모든 것을 연결해 줍니다."}, {"start": 2206.88, "end": 2210.227, "text": "남: 자, 제 경로가 나왔네요. 아주 간단하죠?"}, {"start": 2210.277, "end": 2216.327, "text": "남: 시리가 개인적인 맥락을 사용해 일을 도와주는 또 다른 예를 보여드릴게요."}, {"start": 2216.378, "end": 2223.277, "text": "남: \"지난 주말 샤스타에서 찍은 사진 보여줘.\""}, {"start": 2223.179, "end": 2229.431, "text": "남: 시리가 제 사진을 검색해 최근 가족들과 다녀온 목장 여행 사진을 찾아줍니다."}, {"start": 2229.481, "end": 2232.73, "text": "남: 어디 보자... 와, 소가 정말 많네요."}, {"start": 2232.78, "end": 2237.53, "text": "남: \"브라이스, 매디슨, 퀸이 나온 사진만 우리 공유 가족 앨범에 추가해줘.\""}, {"start": 2237.581, "end": 2244.889, "text": "남: 사진 앱에 전혀 들어갈 필요도 없이 시리가 찾아줄 수 있습니다."}, {"start": 2244.94, "end": 2246.688, "text": "...제가 생각했던 바로 그 사진들이에요."}, {"start": 2246.739, "end": 2249.688, "text": "좋습니다, 정말 멋진 사진들이네요."}, {"start": 2249.739, "end": 2252.989, "text": "이제 온 가족과 공유해 보세요."}, {"start": 2253.039, "end": 2254.94, "text": "아주 간단하죠?"}, {"start": 2254.94, "end": 2256.59, "text": "이건 Siri AI가 훨씬 더 유능해졌음을"}, {"start": 2256.641, "end": 2259.789, "text": "보여주는 몇 가지 예시에 불과합니다."}, {"start": 2259.84, "end": 2263.387, "text": "가장 진보된 온디바이스 모델을 지원하는 제품들을 위해,"}, {"start": 2263.438, "end": 2265.689, "text": "일상에서 정말 유용하게 쓰일"}, {"start": 2265.739, "end": 2267.188, "text": "두 가지 기능 개선을 준비했습니다."}, {"start": 2267.239, "end": 2269.59, "text": "첫 번째는 완전히 새로운 음성 경험입니다."}, {"start": 2269.641, "end": 2272.489, "text": "Siri의 목소리가 훨씬 더 놀랍고"}, {"start": 2272.539, "end": 2274.289, "text": "풍부한 감정을 표현할 수 있게 되었죠."}, {"start": 2274.34, "end": 2276.588, "text": "한번 직접 들어보세요."}, {"start": 2276.639, "end": 2280.588, "text": "조시가 말하길, \"얘들아, 이 살구 진짜 제철이야."}, {"start": 2280.639, "end": 2282.389, "text": "원래 이렇게 맛있었나?"}, {"start": 2282.44, "end": 2283.887, "text": "왜 아무도 나한테 말 안 해준 거야?"}, {"start": 2283.938, "end": 2286.188, "text": "진심으로, 나 완전 반해버렸어."}, {"start": 2286.239, "end": 2287.389, "text": "냉장고 비워 놔."}, {"start": 2287.44, "end": 2290.789, "text": "아니, 냉장고란 냉장고는 싹 다 비워버려.\""}, {"start": 2290.84, "end": 2292.84, "text": "알겠어, 조시."}, {"start": 2292.78, "end": 2294.528, "text": "이제 Siri의 목소리를"}, {"start": 2294.579, "end": 2297.829, "text": "이전에 없던 방식으로, 표현력과 속도를"}, {"start": 2297.88, "end": 2301.329, "text": "마음에 쏙 들 때까지 조절할 수 있습니다."}, {"start": 2301.38, "end": 2303.927, "text": "시리: 안녕하세요, 당신에게 딱 맞는 목소리를 찾아봐요."}, {"start": 2303.978, "end": 2307.128, "text": "시리: 제가 평소에 하는 말들을 들려드릴게요."}, {"start": 2307.179, "end": 2308.23, "text": "시리: 이건 어때요?"}, {"start": 2308.28, "end": 2310.829, "text": "시리: 새 메시지가 한 건 있습니다. 여기 또 있네요."}, {"start": 2310.88, "end": 2312.628, "text": "시리: 타이머를 1분으로 설정했습니다."}, {"start": 2312.679, "end": 2314.628, "text": "시리: 이번엔 길 안내입니다."}, {"start": 2314.679, "end": 2318.628, "text": "시리: 다음 정지 표지판에서 우회전하세요."}, {"start": 2318.679, "end": 2321.028, "text": "또한, 시스템 전반의 받아쓰기 기능이"}, {"start": 2321.079, "end": 2324.931, "text": "정확도 면에서 획기적으로 업데이트됩니다."}, {"start": 2324.981, "end": 2327.528, "text": "사용자가 말하는 내용을 훨씬 정교하게 파악해"}, {"start": 2327.579, "end": 2330.929, "text": "철자와 문장 부호, 대소문자까지 정확히 짚어내죠."}, {"start": 2330.98, "end": 2333.431, "text": "키보드에 기본으로 탑재되어 있어"}, {"start": 2333.481, "end": 2335.13, "text": "어디서든 편리하게 사용할 수 있습니다."}, {"start": 2335.181, "end": 2337.128, "text": "그룹 채팅에 메시지를 보낼 때나"}, {"start": 2337.179, "end": 2338.727, "text": "지하철을 타고 이동 중일 때,"}, {"start": 2338.777, "end": 2342.73, "text": "혹은 일기 앱을 쓰며 생각을 소리 내어 말할 때도 유용하죠."}, {"start": 2342.78, "end": 2347.418, "text": "Siri의 이 모든 업데이트는 CarPlay와 AirPods에서도 경험하실 수 있습니다."}, {"start": 2347.469, "end": 2348.818, "text": "이게 전부가 아닙니다."}, {"start": 2348.869, "end": 2350.619, "text": "한 걸음 더 나아가 보죠."}, {"start": 2350.67, "end": 2355.019, "text": "자세한 내용을 들려주기 위해 저스틴을 모셨습니다."}, {"start": 2355.07, "end": 2357.818, "text": "저희는 Siri가 훨씬 더 대화에 능숙해지도록 만들고 있습니다."}, {"start": 2357.869, "end": 2361.119, "text": "덕분에 더 풍부한 답변을 제공하고, 더 많은 일을 처리해 주죠."}, {"start": 2361.17, "end": 2364.519, "text": "이는 단순히 빠른 질문이나 단발성 작업에만 국한되지 않습니다."}, {"start": 2364.57, "end": 2367.519, "text": "Siri AI와 함께라면 심도 있는 계획을 세워달라고 할 수도 있고,"}, {"start": 2367.57, "end": 2369.92, "text": "아이디어 회의를 하며 의견을 주고받을 수도 있으며,"}, {"start": 2369.971, "end": 2371.818, "text": "문서에 대한 피드백을 받을 수도 있습니다."}, {"start": 2371.869, "end": 2373.519, "text": "그 외에도 훨씬 더 많은 것들이 가능하죠."}, {"start": 2373.57, "end": 2376.519, "text": "그리고 이 기능은 시스템 전반에서 사용하실 수 있습니다."}, {"start": 2376.57, "end": 2380.218, "text": "게다가 각 플랫폼에 맞춰 이 경험을 최적화했습니다."}, {"start": 2380.268, "end": 2383.717, "text": "iOS에서는 다이내믹 아일랜드를 아래로 쓸어내려 검색하거나,"}, {"start": 2383.768, "end": 2386.318, "text": "텍스트 입력으로 Siri와 대화를 시작할 수 있습니다."}, {"start": 2386.369, "end": 2388.519, "text": "물론 \"Siri야\"라고 부를 수도 있고,"}, {"start": 2388.57, "end": 2391.619, "text": "측면 버튼을 눌러 심도 있는 답변을 얻을 수도 있습니다."}, {"start": 2391.67, "end": 2396.869, "text": "직접 보여드리겠습니다."}, {"start": 2396.771, "end": 2398.32, "text": "저스틴: 월드컵 경기가 정말 기대되네요."}, {"start": 2398.371, "end": 2402.418, "text": "저스틴: 월드컵 개막 주말 일정이 어떻게 되는지"}, {"start": 2402.469, "end": 2408.668, "text": "저스틴: Siri에게 물어보겠습니다."}, {"start": 2408.699, "end": 2410.449, "text": "자, 여기 일정이 나왔네요."}, {"start": 2410.5, "end": 2411.55, "text": "이제 이걸 한번 보세요."}, {"start": 2411.601, "end": 2414.048, "text": "하단을 아래로 쓸어내리면"}, {"start": 2414.099, "end": 2416.347, "text": "완전히 새로운 대화형 환경이 펼쳐지며"}, {"start": 2416.398, "end": 2417.847, "text": "훨씬 더 많은 정보를 보여줍니다."}, {"start": 2417.898, "end": 2422.398, "text": "이번 브라질 대 모로코 경기는"}, {"start": 2422.4, "end": 2425.65, "text": "워치 파티를 하기에 정말 좋겠네요."}, {"start": 2425.701, "end": 2427.447, "text": "브라질 대 모로코 경기를 위한"}, {"start": 2427.498, "end": 2429.75, "text": "워치 파티를 계획해 줘."}, {"start": 2429.8, "end": 2439.498, "text": "두 나라의 대표 요리들을 알려줘."}, {"start": 2439.5, "end": 2440.75, "text": "자, 여기 있습니다."}, {"start": 2440.8, "end": 2442.447, "text": "이제 이걸 확인해 보죠."}, {"start": 2442.498, "end": 2445.498, "text": "이미지까지 포함되어 있네요."}, {"start": 2447.19, "end": 2447.939, "text": "정말 대단하죠."}, {"start": 2447.989, "end": 2450.139, "text": "타진을 직접 만들어 보고 싶네요."}, {"start": 2450.19, "end": 2452.137, "text": "제 딸도 이 만찬을 위해"}, {"start": 2452.188, "end": 2455.439, "text": "자신이 만든 요리를 가져오고 싶어 할 거예요."}, {"start": 2455.489, "end": 2456.838, "text": "그 디저트 이름이 뭐였더라?"}, {"start": 2456.889, "end": 2462.088, "text": "마리아가 최근에 언급했던 거 말이에요."}, {"start": 2462.09, "end": 2468.789, "text": "Siri가 휴대폰 전체를 검색해서 찾아내고 있네요."}, {"start": 2468.75, "end": 2471.201, "text": "메시지를 대화창으로 바로 끌어옵니다."}, {"start": 2471.251, "end": 2472.898, "text": "오, 코코넛 쿠키네요."}, {"start": 2472.949, "end": 2475.248, "text": "정말 맛있겠는데요."}, {"start": 2475.15, "end": 2478.798, "text": "이제 이 모든 걸 하나로 합쳐보죠."}, {"start": 2478.849, "end": 2481.0, "text": "특별한 파티 메뉴를 만들기 위해"}, {"start": 2481.05, "end": 2488.648, "text": "이것들을 한데 모아봤습니다."}, {"start": 2488.65, "end": 2493.55, "text": "좋아요, 시리가 뭘 준비했는지 볼까요?"}, {"start": 2493.55, "end": 2495.697, "text": "메뉴 이름들이 참 재치 있네요."}, {"start": 2495.748, "end": 2498.248, "text": "정말 멋진데요."}, {"start": 2498.15, "end": 2502.4, "text": "디저트로 마리아의 코코넛 쿠키도 포함됐군요."}, {"start": 2502.451, "end": 2504.597, "text": "시리를 통해 메뉴를 더 다듬거나,"}, {"start": 2504.648, "end": 2506.599, "text": "요리들의 레시피를 물어볼 수도 있습니다."}, {"start": 2506.65, "end": 2511.197, "text": "하지만 지금은 친구들에게 이 계획을 공유해 보죠."}, {"start": 2511.248, "end": 2513.699, "text": "'골 체이서즈' 단톡방에 메시지를 보냅니다."}, {"start": 2513.75, "end": 2515.898, "text": "같이 경기를 볼 건지 물어보면서요."}, {"start": 2515.949, "end": 2516.898, "text": "메뉴도 함께 넣어서 말이죠."}, {"start": 2516.949, "end": 2530.547, "text": "자, 어디 한번 볼까요?"}, {"start": 2530.451, "end": 2533.497, "text": "시리가 경기를 안내해 주네요. 화면을 넘겨보며"}, {"start": 2533.547, "end": 2536.0, "text": "원하는 대로 수정할 수도 있습니다."}, {"start": 2536.05, "end": 2541.547, "text": "완벽하네요. 이대로 전송하겠습니다."}, {"start": 2541.518, "end": 2542.668, "text": "됐습니다, 다 됐어요."}, {"start": 2542.719, "end": 2544.068, "text": "방금 보신 것처럼"}, {"start": 2544.119, "end": 2545.468, "text": "Siri는 해박한 지식을 활용해"}, {"start": 2545.518, "end": 2547.068, "text": "개인적인 정보를 찾아주고"}, {"start": 2547.119, "end": 2549.467, "text": "저와 협업하여 파티를 위한"}, {"start": 2549.518, "end": 2551.968, "text": "아주 독창적인 메뉴를 정해줬죠."}, {"start": 2552.018, "end": 2554.168, "text": "이제 macOS에서의 Siri에 대해 알아보겠습니다."}, {"start": 2554.219, "end": 2555.668, "text": "대화형 경험을 제공하는데"}, {"start": 2555.719, "end": 2558.068, "text": "큰 화면에 아주 딱 맞죠."}, {"start": 2558.119, "end": 2560.769, "text": "Mac 어디서든 바로 불러낼 수 있습니다."}, {"start": 2560.82, "end": 2563.57, "text": "Siri를 Spotlight에 통합했거든요."}, {"start": 2563.621, "end": 2567.369, "text": "Spotlight은 이미 앱이나 파일 등을 찾는 데 쓰고 계실 텐데요."}, {"start": 2567.42, "end": 2571.168, "text": "이제 질문에 대한 답을 찾는 것도 도와줍니다."}, {"start": 2571.219, "end": 2574.468, "text": "시스템 전반의 컨텍스트 메뉴로 대화를 시작할 수도 있죠."}, {"start": 2574.518, "end": 2578.468, "text": "컨트롤 클릭만으로 이미지나 파일, 텍스트에 대해 Siri에게 물어보세요."}, {"start": 2578.518, "end": 2581.367, "text": "더 자세히 보여드리겠습니다."}, {"start": 2581.418, "end": 2586.869, "text": "Spotlight은 당연히 Mac에 있는 거의 모든 걸 찾는 데 유용합니다."}, {"start": 2586.92, "end": 2591.468, "text": "가족 관련 자료를 보관하는 이 폴더처럼 말이죠."}, {"start": 2591.518, "end": 2594.168, "text": "제 아들이 요즘 3D 프린팅에 푹 빠졌거든요."}, {"start": 2594.219, "end": 2598.218, "text": "아들 학교에 시설이 있는데, 전용 공간으로 확장하는 걸 도와주고 싶네요."}, {"start": 2598.268, "end": 2602.721, "text": "스포트라이트에서 바로 Siri에게 도움을 요청할 수 있습니다."}, {"start": 2602.771, "end": 2609.869, "text": "\"창고에 메이커 스페이스를 만드는 방법에 대해 알려줘.\""}, {"start": 2611.349, "end": 2613.099, "text": "제가 입력을 시작하자 스포트라이트가 인식합니다."}, {"start": 2613.15, "end": 2616.0, "text": "이게 Siri를 향한 질문이라는 걸요."}, {"start": 2616.05, "end": 2623.15, "text": "엔터를 누르고 바로 대화를 시작할 수 있습니다."}, {"start": 2623.15, "end": 2624.298, "text": "물론 이건 Mac이니까,"}, {"start": 2624.349, "end": 2631.701, "text": "창을 어디로든 옮길 수 있고 크기를 조절해 더 많은 정보를 볼 수 있죠."}, {"start": 2631.751, "end": 2635.097, "text": "시작하는 데 도움이 될 만한 좋은 정보들이 많네요."}, {"start": 2635.148, "end": 2637.097, "text": "이제 Siri는 구체적인 질문에도 대답할 수 있습니다."}, {"start": 2637.148, "end": 2640.099, "text": "제 Mac 안에 있는 콘텐츠에 관한 질문 말이죠."}, {"start": 2640.15, "end": 2644.398, "text": "예를 들어, 제가 받은 서로 다른 창고 견적서들처럼요."}, {"start": 2644.449, "end": 2646.701, "text": "포맷이 다 제각각이라,"}, {"start": 2646.751, "end": 2656.65, "text": "비교하기가 정말 어렵죠. 파일을 여러 개 선택하고 컨텍스트 메뉴를 열면,"}, {"start": 2656.65, "end": 2664.139, "text": "선택 항목에 대해 빠르게 물어볼 수 있는 새로운 Siri 필드가 나타납니다. \"이것들을 비교해서,"}, {"start": 2664.19, "end": 2673.588, "text": "하나를 골라 줘.\" Siri가 세 파일을 분석 중인데, 여기 보세요. 정말 멋진"}, {"start": 2673.489, "end": 2679.239, "text": "표를 보여주며 한눈에 비교해 주고 차이점을 설명해 줍니다. 아들이 겪었던 문제도 고려해 보죠."}, {"start": 2679.289, "end": 2692.989, "text": "\"루크가 전기 문제를 언급했는데, 어떤 게 그걸 해결해 줄까?\" 자,"}, {"start": 2692.989, "end": 2698.74, "text": "보세요, Siri는 제 오타도 알아서 처리해 줍니다."}, {"start": 2698.791, "end": 2701.739, "text": "메시지와 이메일을 검색해서 아들이 공유한 내용을 찾아냈네요."}, {"start": 2701.789, "end": 2709.489, "text": "좋아요, 여기 있습니다."}, {"start": 2709.489, "end": 2713.639, "text": "Siri가 메시지를 찾아서 명확한 제안을 해주네요."}, {"start": 2713.69, "end": 2717.137, "text": "이 제안을 따르면 리드 타임이 꽤 길어집니다."}, {"start": 2717.188, "end": 2724.989, "text": "Siri한테 이메일 초안을 정중하게 써달라고 부탁해볼게요. 혹시..."}, {"start": 2724.889, "end": 2729.188, "text": "배송을 좀 앞당길 수 있는지 말이죠."}, {"start": 2729.19, "end": 2732.739, "text": "이제 Siri가 '모듈러 워크숍'에 보낼 이메일을 처음부터 작성합니다."}, {"start": 2732.789, "end": 2738.639, "text": "보시는 것처럼 Siri가 담당자의 이름과 이메일을 추출하고 왜 그들을 선택했는지 언급하며,"}, {"start": 2738.69, "end": 2741.539, "text": "리드 타임을 단축해 달라고 요청하죠."}, {"start": 2741.59, "end": 2743.338, "text": "정말 대단하네요."}, {"start": 2743.389, "end": 2748.438, "text": "아이폰과 맥에서 Siri AI로 더 많은 일을 처리하는 방법 중 몇 가지를 살펴봤습니다."}, {"start": 2748.489, "end": 2750.34, "text": "이제 마이크에게 넘길게요."}, {"start": 2750.391, "end": 2756.438, "text": "마이크: 풍부한 대화 경험을 포함한 Siri AI를 더 많은 플랫폼에 도입하고 있습니다."}, {"start": 2756.489, "end": 2758.139, "text": "iPadOS처럼 말이죠."}, {"start": 2758.19, "end": 2763.039, "text": "상세한 답변을 다시 확인하고 싶을 때는 전용 앱을 활용하면 됩니다."}, {"start": 2763.09, "end": 2765.739, "text": "애플 기기 어디서나 Siri 앱을 사용할 수 있죠."}, {"start": 2765.789, "end": 2772.239, "text": "Siri 앱을 통해 이전 대화를 다시 보거나 새로운 대화를 쉽게 시작할 수 있습니다."}, {"start": 2772.289, "end": 2776.739, "text": "앱을 열면 대화 내역의 개요를 볼 수 있는데, 이 내역은..."}, {"start": 2776.789, "end": 2778.539, "text": "iCloud를 통해 비공개로 동기화됩니다."}, {"start": 2778.59, "end": 2784.34, "text": "그래서 아이폰에서 Siri와 대화하다가 아이패드에서 이어서 할 수 있고,"}, {"start": 2784.391, "end": 2786.938, "text": "맥에서 마무리할 수도 있죠."}, {"start": 2786.989, "end": 2789.73, "text": "watchOS를 위한 Siri AI도 최적화하고 있습니다."}, {"start": 2789.78, "end": 2796.679, "text": "이제 손목 위에서 바로 질문하고 동작을 실행할 수 있습니다."}, {"start": 2796.681, "end": 2801.63, "text": "애플 워치의 새로운 앱 격자 화면에서 Siri 앱을 바로 실행할 수도 있죠."}, {"start": 2801.681, "end": 2808.927, "text": "visionOS에서 Siri AI는 공간 컴퓨팅의 성능을 십분 활용합니다."}, {"start": 2808.978, "end": 2813.927, "text": "공간 어디에나 배치할 수 있는 3D 시각화된 Siri와 함께 말이죠."}, {"start": 2813.978, "end": 2818.929, "text": "\"Siri야\"라고 부를 필요 없이, 그저 Siri를 바라보며 말을 걸면 됩니다."}, {"start": 2818.98, "end": 2824.028, "text": "여: 드라마 '사일로'에 대해 알려주고, 첫 방송 때 내 일정이 비어 있는지 확인해 줘."}, {"start": 2824.079, "end": 2828.73, "text": "Siri와의 풍성한 대화가 여러분의 경험을 한층 더 높여줄 것입니다."}, {"start": 2828.78, "end": 2830.73, "text": "우리 플랫폼 전반에 걸쳐 말이죠."}, {"start": 2830.78, "end": 2835.679, "text": "이제 세브에게 마이크를 넘기겠습니다."}, {"start": 2835.679, "end": 2840.028, "text": "Siri AI로 할 수 있는 일들은 이뿐만이 아닙니다."}, {"start": 2840.079, "end": 2844.63, "text": "우선, Siri는 이제 우리 플랫폼 전반에 강력한 시각 지능을 제공합니다."}, {"start": 2844.681, "end": 2849.63, "text": "아이폰 카메라 앱에는 완전히 새로운 'Siri 모드'가 통합되었습니다."}, {"start": 2849.681, "end": 2853.829, "text": "이를 통해 눈앞에 보이는 대상의 정보를 얻고 관련 동작을 수행할 수 있죠."}, {"start": 2853.88, "end": 2859.827, "text": "셔터 버튼을 누르면 Siri가 여러분이 보는 것을 함께 보고 유용한 답변을 제공합니다."}, {"start": 2859.878, "end": 2864.827, "text": "화면을 아래로 당겨 상세 정보를 확인하거나 추가 질문을 할 수도 있습니다."}, {"start": 2864.878, "end": 2869.628, "text": "이미지와 대화 내용은 Siri 앱에 저장되어 언제든 쉽게 다시 확인할 수 있습니다."}, {"start": 2869.679, "end": 2873.73, "text": "이러한 심층적인 이미지 이해 기술은 애플 파운데이션 모델을 통해 구현되며"}, {"start": 2873.78, "end": 2877.628, "text": "개인 정보 보호를 위해 프라이빗 클라우드 컴퓨팅에서 구동됩니다."}, {"start": 2877.679, "end": 2881.431, "text": "또한 Siri 모드는 현재 상황에 가장 적합한 동작들을 제안합니다."}, {"start": 2881.481, "end": 2882.869, "text": "여러분의 눈앞에 있는 내용을 바탕으로 말이죠."}, {"start": 2882.92, "end": 2887.869, "text": "예를 들어, 아이폰으로 음식 사진을 찍어 영양 정보를 얻을 수 있고"}, {"start": 2887.92, "end": 2891.568, "text": "친구들과 식사할 때는 영수증을 비춘 다음"}, {"start": 2891.619, "end": 2895.468, "text": "주문한 메뉴를 선택해 애플 캐시로 더치페이를 할 수도 있죠."}, {"start": 2895.518, "end": 2900.57, "text": "맥OS에도 비주얼 인텔리전스 기능이 추가되어 전용 단축키로"}, {"start": 2900.621, "end": 2902.57, "text": "간편하게 실행할 수 있습니다."}, {"start": 2902.621, "end": 2912.867, "text": "맥 화면에서 원하는 대상을 선택하고 시리에게 직접 물어보면 유용한 답변을 바로 받을 수 있죠."}, {"start": 2912.918, "end": 2918.269, "text": "대화를 주고받으며 더 자세히 알아볼 수도 있습니다."}, {"start": 2918.32, "end": 2920.769, "text": "또한 화면 속 정보로 바로 동작을 수행하기도 쉬워졌는데요."}, {"start": 2920.82, "end": 2924.967, "text": "가령 일정을 확인하다가 비주얼 인텔리전스를 실행하면"}, {"start": 2925.018, "end": 2929.07, "text": "여러 이벤트를 캘린더에 한 번에 추가하는 등 유용한 기능을"}, {"start": 2929.121, "end": 2930.818, "text": "추천해 줍니다."}, {"start": 2930.82, "end": 2935.57, "text": "아이패드에서는 비주얼 인텔리전스로 화면 내용을 시리에게 묻거나 시각적으로 검색하고"}, {"start": 2935.621, "end": 2937.568, "text": "필요한 동작을 바로 실행할 수 있습니다."}, {"start": 2937.619, "end": 2941.369, "text": "스크린샷 기능에도 완벽하게 통합되어 있죠."}, {"start": 2941.42, "end": 2945.67, "text": "시리를 통한 비주얼 인텔리전스는 비전OS에도 도입되어, 무엇이든 바라보는 것만으로"}, {"start": 2945.721, "end": 2947.668, "text": "관련 정보를 물어볼 수 있습니다."}, {"start": 2947.719, "end": 2952.168, "text": "여: \"이 가방이 9월에 탈 비행기에 기내 수하물로 괜찮을까?\""}, {"start": 2952.219, "end": 2955.968, "text": "시리는 사용자가 무엇을 보는지 인식하고, 세상 지식과 개인적인 상황을"}, {"start": 2956.018, "end": 2959.619, "text": "결합해 최적의 답변을 제공합니다."}, {"start": 2959.719, "end": 2964.778, "text": "시리: \"네, REI Flash 22 팩은 9월 아이슬란드행 비행기에 기내 수하물로 충분히 가능합니다.\""}, {"start": 2964.829, "end": 2968.53, "text": "오는 9월에 출시됩니다."}, {"start": 2968.53, "end": 2972.88, "text": "주변 사물에 대해 Siri에게 물어볼 수도 있죠."}, {"start": 2972.931, "end": 2979.278, "text": "Siri: 네, 로와 등산화가 REI 플래시 22 배낭에 들어가긴 하겠지만..."}, {"start": 2979.329, "end": 2981.179, "text": "Siri: 아주 꽉 낄 거예요."}, {"start": 2981.23, "end": 2986.179, "text": "시각 지능에 더해 글쓰기 도구가 더욱 강력해졌고"}, {"start": 2986.23, "end": 2987.677, "text": "Siri 환경에 유기적으로 통합되었습니다."}, {"start": 2987.728, "end": 2991.778, "text": "이제 텍스트를 입력하는 곳이라면 어디서든 Siri와 함께 글을 쓸 수 있습니다."}, {"start": 2991.829, "end": 2994.179, "text": "직장에서 문서를 새로 작성하는 경우를 예로 들어보죠."}, {"start": 2994.23, "end": 2996.48, "text": "필요한 내용을 자연스럽게 설명하기만 하면"}, {"start": 2996.53, "end": 2998.677, "text": "Siri가 즉석에서 초안을 생성해"}, {"start": 2998.728, "end": 3002.228, "text": "업무의 물꼬를 터 줍니다."}, {"start": 3002.228, "end": 3004.88, "text": "메일이나 메시지에서 Siri로 글을 쓸 때는"}, {"start": 3004.931, "end": 3006.98, "text": "상대방에 따른 평소 대화 스타일을"}, {"start": 3007.03, "end": 3008.98, "text": "그대로 반영할 수도 있습니다."}, {"start": 3009.03, "end": 3011.179, "text": "가령, 상사에게 보낼 때 평소처럼 간결하고"}, {"start": 3011.23, "end": 3013.579, "text": "명확하게 요점만 짚어 보낸다면"}, {"start": 3013.63, "end": 3015.98, "text": "Siri가 이메일 초안을 그렇게 작성해 주죠."}, {"start": 3016.03, "end": 3018.577, "text": "쓴 글에 대한 피드백을 받는 것도 가능합니다."}, {"start": 3018.628, "end": 3019.778, "text": "작성한 내용을 선택하고"}, {"start": 3019.829, "end": 3021.699, "text": "어조가 어떤지 Siri에게 물어보세요."}, {"start": 3021.75, "end": 3024.599, "text": "시리는 여러분에게 유용한 팁과 제안을 제공하여"}, {"start": 3024.65, "end": 3026.5, "text": "업무 효율을 높여줍니다."}, {"start": 3026.55, "end": 3029.798, "text": "놀라운 점은 시스템 전반의 앱에서 타이핑할 때"}, {"start": 3029.849, "end": 3033.099, "text": "애플 인텔리전스가 자동으로 교정해 준다는 것입니다."}, {"start": 3033.15, "end": 3035.0, "text": "별도의 단계를 거칠 필요가 없죠."}, {"start": 3035.05, "end": 3038.197, "text": "자동 교정 기능은 시스템 전체에서 사용 가능하며"}, {"start": 3038.248, "end": 3042.248, "text": "대부분의 서드파티 앱도 지원합니다."}, {"start": 3042.15, "end": 3044.097, "text": "이는 시리 AI가 우리 플랫폼에"}, {"start": 3044.148, "end": 3047.9, "text": "깊이 통합되어 있는 몇 가지 방법일 뿐입니다."}, {"start": 3047.951, "end": 3052.099, "text": "손가락 끝에서 바로 다양한 유용한 도구를 사용할 수 있게 하죠."}, {"start": 3052.15, "end": 3055.798, "text": "이제 다시 크레이그에게 넘기겠습니다."}, {"start": 3055.849, "end": 3057.798, "text": "여러분께 이 소식을 전하게 되어 정말 기쁩니다."}, {"start": 3057.849, "end": 3062.4, "text": "애플 인텔리전스로 구동되는 시리의 새로운 버전, 시리 AI입니다."}, {"start": 3062.451, "end": 3066.298, "text": "더욱 지능적이고 해박하며 유능해졌습니다."}, {"start": 3066.349, "end": 3069.599, "text": "풍부한 대화가 가능하며 전용 앱을 통해"}, {"start": 3069.65, "end": 3071.497, "text": "이전 대화 내용을 다시 참조할 수 있습니다."}, {"start": 3071.547, "end": 3075.099, "text": "또한, 시리 AI는 광범위한 시각적 지능과"}, {"start": 3075.15, "end": 3078.398, "text": "글쓰기를 위한 통합 도구 등을 갖추고 있습니다."}, {"start": 3078.449, "end": 3081.5, "text": "시리 AI는 우선 영어로 출시될 예정이며,"}, {"start": 3081.55, "end": 3085.318, "text": "빠르게 더 많은 언어 지원을 확대할 것입니다."}, {"start": 3085.369, "end": 3088.119, "text": "이제 Apple Intelligence가"}, {"start": 3088.17, "end": 3091.42, "text": "여러 앱에 얼마나 깊숙이 통합되는지 살펴보겠습니다"}, {"start": 3091.471, "end": 3093.82, "text": "새로운 아키텍처와 기능을 바탕으로"}, {"start": 3093.871, "end": 3095.82, "text": "수많은 유용한 기능들을 제공하여"}, {"start": 3095.871, "end": 3098.918, "text": "여러분의 일상을 아주 단순하게 만들어 주죠"}, {"start": 3098.969, "end": 3101.119, "text": "Safari에서의 웹 서핑부터"}, {"start": 3101.17, "end": 3104.268, "text": "커뮤니케이션 및 일정 관리"}, {"start": 3104.268, "end": 3107.217, "text": "그리고 사진 편집까지 아주 다양합니다"}, {"start": 3107.268, "end": 3108.818, "text": "앱에서 구현되는 몇 가지 기능을"}, {"start": 3108.869, "end": 3111.818, "text": "소개해 드릴게요. Beth, 부탁해요"}, {"start": 3111.869, "end": 3128.869, "text": "[경쾌한 음악]"}, {"start": 3129.369, "end": 3131.721, "text": "여: Apple Intelligence를 통해 Safari 등 여러 앱에"}, {"start": 3131.771, "end": 3135.721, "text": "암호, 메시지 등 흥미로운 신기능을 도입했습니다. 우선 Safari부터 보시죠"}, {"start": 3135.771, "end": 3141.721, "text": "Safari는 사용자가 빠르게 움직이고 중요한 것에 집중할 수 있도록 설계되었어요"}, {"start": 3141.771, "end": 3147.721, "text": "올해 저희가 준비한 것 중 하나는 바로 더 간편하고 스마트한 탭 관리 방식입니다"}, {"start": 3147.771, "end": 3151.721, "text": "브라우징을 하다 보면 순식간에 탭이 수십 개씩 열리곤 하잖아요"}, {"start": 3151.771, "end": 3158.721, "text": "현재 Safari는 프로필이나 탭 그룹 같은 유용한 도구로 관리를 돕지만"}, {"start": 3158.771, "end": 3161.721, "text": "그 모든 걸 파악하기란 여전히 손이 많이 가는 일입니다"}, {"start": 3161.771, "end": 3168.721, "text": "이제 Safari는 Apple Intelligence를 활용해 탭을 주제별로 분류하고 정리해 줍니다"}, {"start": 3168.771, "end": 3174.721, "text": "각 페이지를 분석해 유사성을 파악하고 관련 탭들을 한데 모아주기 때문에"}, {"start": 3174.771, "end": 3177.73, "text": "원하는 정보를 훨씬 더 쉽게 찾을 수 있어요"}, {"start": 3177.78, "end": 3180.73, "text": "Safari는 여러분의 검색 환경을 깔끔하게 정리해 줍니다."}, {"start": 3180.78, "end": 3184.73, "text": "브라우징 중에도 주제와 관련된 새로운 탭을 자동으로 추가하죠."}, {"start": 3184.78, "end": 3190.73, "text": "일과를 마칠 때 주제 전체를 닫거나 나중에 볼 수 있게 탭 그룹으로 저장할 수 있습니다."}, {"start": 3190.78, "end": 3195.73, "text": "또한 Safari는 Apple Intelligence를 활용해 중요한 업데이트를 놓치지 않게 도와줍니다."}, {"start": 3195.78, "end": 3203.23, "text": "캠프 신청이나 상품 재입고를 기다리느라 탭을 계속 열어두는 경우가 있죠."}, {"start": 3203.28, "end": 3208.028, "text": "그러면 업데이트 여부를 확인하려고 계속 새로고침을 하게 됩니다."}, {"start": 3208.079, "end": 3215.128, "text": "이제 Safari의 '알림 받기' 기능을 통해 페이지를 자동으로 모니터링할 수 있습니다."}, {"start": 3215.179, "end": 3219.128, "text": "일상적인 언어로 Safari에게 무엇을 찾고 있는지 말하기만 하면 됩니다."}, {"start": 3219.179, "end": 3221.829, "text": "그러고 나서 마음 편히 탭을 닫으세요."}, {"start": 3221.88, "end": 3227.829, "text": "나중에 Safari가 변화를 감지하면 알림을 보내주어 바로 조치를 취할 수 있습니다."}, {"start": 3227.88, "end": 3233.63, "text": "물론 Safari에 추가되는 모든 지능형 기능은 개인정보 보호를 최우선으로 설계되었습니다."}, {"start": 3233.681, "end": 3236.63, "text": "모든 움직임을 추적하는 일부 AI 브라우저와는 다릅니다."}, {"start": 3236.681, "end": 3240.23, "text": "Safari는 민감한 브라우징 데이터를 사용자가 직접 제어할 수 있게 돕습니다."}, {"start": 3240.28, "end": 3243.829, "text": "누구와도 데이터를 공유하지 않으며 Apple조차 알 수 없죠."}, {"start": 3243.88, "end": 3248.23, "text": "다음으로 Safari가 어떻게 더욱 개인화되었는지 살펴보겠습니다."}, {"start": 3248.28, "end": 3251.429, "text": "웹 페이지의 콘텐츠를 자신의 필요와 취향에 맞춰"}, {"start": 3251.48, "end": 3253.829, "text": "직접 구성할 수 있다면 정말 좋겠죠?"}, {"start": 3253.88, "end": 3257.73, "text": "가령 툴바에 버튼을 추가해 레시피를 저장하고 평가하는 것처럼요."}, {"start": 3257.78, "end": 3261.73, "text": "이제 'Describe an Extension' 기능을 통해 이 모든 것이 가능해집니다."}, {"start": 3261.78, "end": 3264.318, "text": "그저 일상적인 언어로 원하는 것을 설명하기만 하면 됩니다."}, {"start": 3264.369, "end": 3266.918, "text": "Safari에서는 나만을 위한 맞춤형 확장 프로그램을 생성해"}, {"start": 3266.969, "end": 3270.117, "text": "웹 페이지를 내게 딱 맞는 방식으로 바꿀 수 있습니다."}, {"start": 3270.168, "end": 3273.518, "text": "또한 Safari는 '암호' 앱과 연동되어"}, {"start": 3273.568, "end": 3277.019, "text": "Apple Intelligence를 통해 보안 등급을 높여줍니다."}, {"start": 3277.07, "end": 3279.217, "text": "'암호' 앱은 보안이 취약하거나"}, {"start": 3279.268, "end": 3281.018, "text": "유출된 암호를 이미 알려주지만,"}, {"start": 3281.068, "end": 3284.42, "text": "사이트마다 일일이 들어가서 변경하려면 시간이 꽤 걸리죠."}, {"start": 3284.471, "end": 3287.67, "text": "이제 지원되는 계정의 암호를"}, {"start": 3287.67, "end": 3291.217, "text": "탭 한 번으로 강력한 암호로 자동 업데이트할 수 있습니다."}, {"start": 3291.268, "end": 3295.418, "text": "백그라운드에서 '암호' 앱은 Apple Intelligence와 Safari를 사용하여"}, {"start": 3295.469, "end": 3299.318, "text": "사용자를 대신해 능동적으로 동작하며, 각 웹사이트를"}, {"start": 3299.369, "end": 3303.418, "text": "안전하게 탐색하고 로그인하여 암호를 수정합니다. 덕분에"}, {"start": 3303.469, "end": 3306.019, "text": "번거로움 없이 안심하고 사용할 수 있죠."}, {"start": 3306.07, "end": 3309.418, "text": "Apple Intelligence는 커뮤니케이션과 일정을"}, {"start": 3309.469, "end": 3313.217, "text": "효율적으로 관리할 수 있도록 도와주며, 관련 정보를 바로 확인할 수 있는"}, {"start": 3313.268, "end": 3318.218, "text": "유용한 기능들을 메시지, 메일, 캘린더, 전화 앱 등에서"}, {"start": 3318.268, "end": 3318.718, "text": "제공합니다."}, {"start": 3318.768, "end": 3320.218, "text": "꼭 필요한 그 순간에요."}, {"start": 3320.268, "end": 3326.318, "text": "이제 '메시지' 앱은 Apple Intelligence를 사용해 대화 문맥을 파악하고"}, {"start": 3326.369, "end": 3331.898, "text": "원탭 제안을 제공하여, 리마인더 생성 같은 일들을 그 어느 때보다 쉽게 처리할 수 있게 해줍니다."}, {"start": 3331.949, "end": 3339.0, "text": "메모를 하거나, 누군가 사진을 요청할 때 메시지 앱이 적절한 사진을 찾도록 도와줍니다."}, {"start": 3339.05, "end": 3344.701, "text": "'사진 검색'을 탭하기만 하면 메시지 앱이 키워드, 장소, 그리고 라이브러리에 저장된..."}, {"start": 3344.751, "end": 3348.398, "text": "인물들을 인식하여 최적의 옵션을 찾아줍니다."}, {"start": 3348.449, "end": 3354.5, "text": "이메일을 받으면 메일 앱 또한 문맥에 따라 더 유용한 제안을 제공합니다."}, {"start": 3354.55, "end": 3359.599, "text": "서드파티 앱을 포함해 즐겨 사용하는 앱으로 작업을 빠르게 처리할 수 있게 하죠."}, {"start": 3359.65, "end": 3365.099, "text": "또한, 이제 캘린더는 Apple Intelligence를 활용해 일상적인 언어로..."}, {"start": 3365.15, "end": 3367.599, "text": "설명하는 것만으로도 일정을 추가할 수 있습니다."}, {"start": 3367.65, "end": 3373.099, "text": "내용을 입력하면 캘린더가 연락처의 '엘레나'를 인식하고, '매직 도넛'을..."}, {"start": 3373.15, "end": 3376.298, "text": "위치 정보에 추가한 뒤 제목까지 달아줍니다."}, {"start": 3376.349, "end": 3378.497, "text": "일정 편집도 한결 쉬워졌습니다."}, {"start": 3378.547, "end": 3381.697, "text": "매주 있는 팀 점심 식사를 격주로 변경하면,"}, {"start": 3381.748, "end": 3385.398, "text": "캘린더 앱이 알아서 빈도를 조정해 줍니다."}, {"start": 3385.449, "end": 3389.599, "text": "Apple Intelligence는 전화 앱의 유용한 기능에도 활용됩니다."}, {"start": 3389.65, "end": 3392.697, "text": "이제 업체에 전화를 걸면 '통화 컨텍스트'가..."}, {"start": 3392.748, "end": 3395.398, "text": "여러 앱에 흩어져 있는 관련 정보를..."}, {"start": 3395.449, "end": 3397.0, "text": "선제적으로 찾아 화면에 띄워줍니다."}, {"start": 3397.05, "end": 3399.398, "text": "항공편 변경을 위해 항공사에 전화를 건다면,"}, {"start": 3399.449, "end": 3400.8, "text": "전화 앱이 자동으로..."}, {"start": 3400.851, "end": 3404.199, "text": "메일 앱에서 예약 확정 코드를 찾아내죠."}, {"start": 3404.25, "end": 3408.718, "text": "덕분에 통화가 시작되는 즉시 필요한 정보를 바로 확인할 수 있습니다."}, {"start": 3408.768, "end": 3410.818, "text": "전화 앱은 통화 중인 상대방을 파악합니다."}, {"start": 3410.869, "end": 3413.918, "text": "대화 내용이 아니라 통화 대상을 인식해 유용한 정보를 제공하죠."}, {"start": 3413.969, "end": 3415.717, "text": "모든 과정은 기기 내에서만 처리되므로,"}, {"start": 3415.768, "end": 3419.519, "text": "애플을 포함한 그 누구와도 정보가 공유되지 않습니다."}, {"start": 3419.57, "end": 3422.82, "text": "이제 세실리아가 새로운 인텔리전스가 적용된"}, {"start": 3422.871, "end": 3429.268, "text": "더 많은 앱을 소개해 드릴 겁니다."}, {"start": 3429.369, "end": 3432.218, "text": "'홈'과 '단축어' 앱에서 애플 인텔리전스를 활용해"}, {"start": 3432.268, "end": 3434.42, "text": "일상적인 업무를 효율적으로 처리하는 방법을 알아보죠."}, {"start": 3434.471, "end": 3436.969, "text": "[배경 음악 고조]"}, {"start": 3436.971, "end": 3439.918, "text": "이제 애플 인텔리전스를 통해 집안의 상황을"}, {"start": 3439.969, "end": 3441.818, "text": "훨씬 더 수월하게 파악할 수 있습니다."}, {"start": 3441.869, "end": 3444.318, "text": "먼저 액세서리 알림 기능부터 살펴볼까요?"}, {"start": 3444.369, "end": 3447.018, "text": "집안 상황을 실시간으로 알 수 있는 유용한 기능이지만,"}, {"start": 3447.068, "end": 3449.619, "text": "알림이 너무 많이 쌓일 수도 있죠. 그래서 '홈' 앱은"}, {"start": 3449.67, "end": 3451.82, "text": "애플 인텔리전스를 통해 관련 알림들을"}, {"start": 3451.871, "end": 3455.218, "text": "하나의 활동으로 통합하여 이해합니다."}, {"start": 3455.268, "end": 3458.218, "text": "덕분에 하나의 알림만으로도 상황 변화에 따라"}, {"start": 3458.268, "end": 3460.721, "text": "실시간으로 업데이트되는 정보를 확인할 수 있죠."}, {"start": 3460.771, "end": 3462.718, "text": "가장 인기 있는 홈 액세서리인 카메라를 위한"}, {"start": 3462.768, "end": 3466.369, "text": "멋진 신기능들도 준비되어 있습니다."}, {"start": 3466.42, "end": 3468.769, "text": "이제 홈 앱에서 애플 인텔리전스를 활용해"}, {"start": 3468.82, "end": 3471.867, "text": "호환되는 카메라의 녹화된 클립을 분석하고"}, {"start": 3471.918, "end": 3475.67, "text": "그 안에서 어떤 일이 있었는지 요약 설명을 생성합니다"}, {"start": 3475.721, "end": 3479.769, "text": "영상 내용을 이해하므로 모든 카메라에서"}, {"start": 3479.82, "end": 3482.369, "text": "관련된 푸티지를 불러올 수 있죠"}, {"start": 3482.42, "end": 3486.668, "text": "클립을 재생하면 홈 앱이 이를 매끄럽게 연결해"}, {"start": 3486.719, "end": 3487.668, "text": "전체적인 상황을 보여줍니다"}, {"start": 3487.719, "end": 3491.369, "text": "뒷마당에서 정확히 무슨 일이 있었는지처럼 말이죠"}, {"start": 3491.42, "end": 3495.369, "text": "이런 심층적인 이해를 통해 촬영된 내용을 바탕으로"}, {"start": 3495.42, "end": 3496.769, "text": "카메라 클립을 검색할 수도 있습니다"}, {"start": 3496.82, "end": 3501.07, "text": "검색어를 입력하기도 전에 확인이 필요한 주요 클립을"}, {"start": 3501.121, "end": 3507.971, "text": "검색 결과 최상단에 띄워줍니다. 택배 배송 같은 특정 순간을 찾고 있다면"}, {"start": 3508.021, "end": 3514.471, "text": "여러 카메라를 넘나들며 원하는 장면을 정확히 찾을 수 있죠. 이것이 애플 인텔리전스가"}, {"start": 3514.521, "end": 3520.568, "text": "가정 내 상황 파악을 돕는 방식입니다. 또한 녹화된 클립을"}, {"start": 3520.619, "end": 3527.269, "text": "지원되는 카메라에서 4K 해상도의 더 세밀한 화질로 볼 수 있습니다. 애플 인텔리전스가"}, {"start": 3527.32, "end": 3534.869, "text": "일상의 워크플로를 개선하는 또 다른 곳은 단축어입니다. 단축어는 다양한 작업을 자동화해"}, {"start": 3534.92, "end": 3540.968, "text": "업무 처리를 더 빠르고 효율적으로 돕죠. 저희는 단축어의 접근성을"}, {"start": 3541.018, "end": 3546.968, "text": "어느 때보다 높였습니다. 이미 수백 개의 시스템 및 앱 동작을 연결해"}, {"start": 3547.018, "end": 3552.57, "text": "자주 쓰는 복잡한 작업을 단순화할 수 있지만, 단축어 생성 과정은"}, {"start": 3552.621, "end": 3559.389, "text": "다소 복잡하게 느껴질 수 있습니다. 그래서 설명만으로 단축어를 훨씬 쉽게 만들 수 있게 했죠"}, {"start": 3559.44, "end": 3565.088, "text": "남: 이제 '단축어'는 Apple Intelligence를 통해 사용자의 자연어 설명을 이해하고"}, {"start": 3565.139, "end": 3569.989, "text": "남: 필요한 모든 단계를 즉석에서 구성해 줍니다. 예를 들어, 퇴근할 때마다"}, {"start": 3570.039, "end": 3575.489, "text": "남: 파트너에게 귀가 시간을 알리고 싶다면, 간단히 이렇게 입력해 보세요."}, {"start": 3575.539, "end": 3581.289, "text": "남: \"퇴근할 때 페드로에게 도착 예정 시간과 함께 가는 중이라고 메시지 보내줘.\" 그러면 단축어가"}, {"start": 3581.34, "end": 3587.188, "text": "남: 필요한 시스템 및 앱 동작을 한데 모아 줍니다. 여기서는 단축어를 실행하는"}, {"start": 3587.239, "end": 3592.989, "text": "남: 자동화가 생성되어, 직장에서 나설 때 도착 시간을 계산해 메시지로 보내죠."}, {"start": 3593.039, "end": 3598.59, "text": "남: 수정하거나 추가하고 싶은 게 있다면 설명만 하세요. 단축어가 바로 반영해 줍니다."}, {"start": 3598.641, "end": 3604.188, "text": "남: 즐겨 듣는 팟캐스트를 자동으로 재생하는 것처럼요. 매일 일상을 스마트하게"}, {"start": 3604.239, "end": 3610.688, "text": "남: 관리하기 위한 최고의 기능이죠. 지금 바로 단축어를 사용해 보세요. 이제 마이크를 넘겨서"}, {"start": 3610.739, "end": 3617.389, "text": "남: 레슬리 씨가 Apple Intelligence로 자신을 표현하는 새로운 방법에 대해 소개해 드릴 겁니다."}, {"start": 3617.44, "end": 3622.489, "text": "여: Apple Intelligence는 여러분의 창의성을 한 차원 높여줍니다. 완전히 새로워진"}, {"start": 3622.539, "end": 3625.688, "text": "여: Image Playground를 통해서 말이죠."}, {"start": 3625.739, "end": 3631.088, "text": "여: 올해 저희는 강력한 이미지 모델을 핵심으로 하는 새로운 경험을 설계했습니다."}, {"start": 3631.139, "end": 3637.188, "text": "여: 이제 Image Playground로 원하는 거의 모든 스타일의 고화질 이미지를 만들 수 있습니다."}, {"start": 3637.239, "end": 3638.59, "text": "여: 실사 같은 스타일도 포함해서요."}, {"start": 3638.641, "end": 3642.489, "text": "여: 프라이빗 클라우드 컴퓨팅에서 구동되는 새로운 생성 모델 덕분이죠."}, {"start": 3642.539, "end": 3647.688, "text": "여: 이는 모든 플랫폼의 이미지 생성 기능에서 이루어진 대대적인 업그레이드로,"}, {"start": 3647.739, "end": 3654.688, "text": "여: 여러분의 상상을 현실로 구현하는 더 강력한 방법을 제공합니다. 멋진 자연 풍경부터"}, {"start": 3654.739, "end": 3657.489, "text": "여: 사진 보관함의 인물들을 활용한 재미있는 이미지까지 가능하죠."}, {"start": 3657.539, "end": 3662.778, "text": "여: 원하는 내용을 설명하는 것만으로 사진을 무궁무진한 스타일로 변신시킬 수도 있습니다."}, {"start": 3662.829, "end": 3664.179, "text": "...자연어 방식으로 말이죠."}, {"start": 3664.23, "end": 3669.98, "text": "프라이빗 클라우드 컴퓨팅 덕분에 사진은 애플을 포함해 그 어디에도 저장되거나 공유되지 않습니다."}, {"start": 3670.03, "end": 3673.977, "text": "또한 이미지를 수정하는 완전히 새로운 방식들을 선보입니다."}, {"start": 3674.027, "end": 3678.179, "text": "친구의 생일 파티를 계획 중인데, 초대장에 쓸 이미지를"}, {"start": 3678.23, "end": 3679.477, "text": "만들고 싶다고 해보죠."}, {"start": 3679.527, "end": 3684.177, "text": "사진 보관함의 인물 사진과 간단한 설명만으로 그녀가 생일 케이크를"}, {"start": 3684.228, "end": 3686.977, "text": "들고 있는 재미있는 이미지를 만들 수 있습니다."}, {"start": 3687.027, "end": 3689.778, "text": "그다음 원하는 변경 사항을 설명하면 되죠."}, {"start": 3689.829, "end": 3694.878, "text": "이번 파티 테마가 미스터리인 만큼, 분위기에 걸맞은 모습으로 바꿔볼까요?"}, {"start": 3694.929, "end": 3698.679, "text": "터치만으로도 이미지를 정교하게 다듬는 건 정말 쉽습니다."}, {"start": 3698.73, "end": 3704.278, "text": "케이크처럼 개체 위에 원을 그려 강조하면 위치를 옮기거나 크기를 조절할 수 있고,"}, {"start": 3704.329, "end": 3709.579, "text": "자연어로 변경 사항을 설명할 수도 있죠. 케이크를 선택한 상태에서 촛불을 추가해"}, {"start": 3709.63, "end": 3715.778, "text": "완벽한 마무리를 할 수 있습니다. 직접 만든 이미지를 활용하는 방법도 더 다양해졌는데요,"}, {"start": 3715.829, "end": 3720.477, "text": "작업물에 맞는 규격을 선택할 수도 있습니다. 소규모 비즈니스 웹사이트용 가로형 이미지나"}, {"start": 3720.527, "end": 3727.079, "text": "전단지용 세로형 이미지처럼 말이죠. 이미지 플레이그라운드는 시스템 전반에 통합되어 있어"}, {"start": 3727.13, "end": 3732.878, "text": "메시지 배경화면 등을 만들기에 최적입니다. 또한 더 많은 경험에 이 기능을 접목하여"}, {"start": 3732.929, "end": 3738.679, "text": "연락처 포스터나 잠금 화면 배경화면도 생성할 수 있도록 지원할 예정입니다."}, {"start": 3738.73, "end": 3745.48, "text": "게다가 사용자의 사진에서 영감을 얻어, 선호하는 장소나 활동을 바탕으로"}, {"start": 3745.53, "end": 3751.878, "text": "맞춤형 제안도 제공합니다. 개발자분들은 이미지 플레이그라운드 API를 통해"}, {"start": 3751.929, "end": 3758.409, "text": "이 새로운 기능들을 활용하실 수 있습니다. 이미지 플레이그라운드는 완전히 새로운 가능성의 세계를 열어줄 것입니다."}, {"start": 3758.46, "end": 3764.009, "text": "여러분의 창의성을 발휘해 보세요. 이제 알록에게 넘기겠습니다."}, {"start": 3764.059, "end": 3769.409, "text": "여러분이 상상하시는 이미지뿐만 아니라, 직접 촬영하신 사진을 위해서도"}, {"start": 3769.46, "end": 3776.208, "text": "새로운 Apple Intelligence 기능을 선보입니다. Apple은 사진이라는 예술을 깊이 존중합니다."}, {"start": 3776.259, "end": 3781.809, "text": "사진 앱에 AI를 도입한 목적은 사진작가가 사진을 보정할 때"}, {"start": 3781.86, "end": 3786.01, "text": "본래의 순간을 해치지 않는 방식으로 도움을 드리기 위함입니다."}, {"start": 3786.061, "end": 3791.907, "text": "이제 사진 앱은 Apple Intelligence의 더 강력해진 새로운 이미지 모델을 통해"}, {"start": 3791.958, "end": 3794.809, "text": "놀라운 편집을 가능하게 해줍니다."}, {"start": 3794.86, "end": 3799.907, "text": "구도를 작품처럼 만들어 줄 세 가지 기능을 소개합니다."}, {"start": 3799.958, "end": 3804.409, "text": "첫 번째로, 인기 있는 '클린업' 도구가 대폭 업그레이드됩니다."}, {"start": 3804.46, "end": 3809.61, "text": "더 뛰어난 품질과 사실적인 채우기 기능으로 방해 요소를 깔끔하게 제거할 수 있죠."}, {"start": 3809.661, "end": 3814.46, "text": "이처럼 복잡한 장면에서도 문제없습니다."}, {"start": 3814.46, "end": 3821.11, "text": "가끔은 피사체 주변에 여유 공간이 더 필요하거나, 프로젝트를 위해 다른 화면비가 필요할 때가 있죠."}, {"start": 3821.161, "end": 3827.009, "text": "이제 '확장' 도구로 이미지를 늘려 피사체에 시각적 여유를 주거나,"}, {"start": 3827.059, "end": 3832.909, "text": "중요한 부분을 잘라내지 않고도 기울어진 수평을 바로잡을 수 있습니다."}, {"start": 3832.96, "end": 3839.909, "text": "그리고 '클린업'과 '확장'을 기반으로 한 또 하나의 인상적인 편집 도구가 있습니다."}, {"start": 3839.96, "end": 3845.009, "text": "Apple Vision Pro를 통해 쌓은 공간 모델에 대한 깊은 이해를 바탕으로 탄생했죠."}, {"start": 3845.059, "end": 3851.009, "text": "사진을 보면서 '촬영할 때 구도를 좀 더 고민할 시간이 있었다면' 하고 아쉬워하신 적 있나요?"}, {"start": 3851.059, "end": 3854.71, "text": "누군가의 머리 위에 실수로 표지판이 걸리게 찍었거나,"}, {"start": 3854.76, "end": 3858.809, "text": "오른쪽으로 조금만 더 갔더라면 구도가 훨씬 대칭적이었을 사진 말이죠."}, {"start": 3858.86, "end": 3862.949, "text": "혹은 찰나의 차이로 피사체와 시선을 맞추지 못했을 수도 있습니다."}, {"start": 3863.0, "end": 3869.048, "text": "이제 '공간 재구성' 기능을 통해, 사진을 찍은 후에도 구도를 자유롭게 수정할 수 있습니다."}, {"start": 3869.099, "end": 3870.75, "text": "어떻게 작동하는지 직접 보여드릴게요."}, {"start": 3870.8, "end": 3874.847, "text": "최근에 저희 아이들을 찍은 사진을 한 장 보시죠."}, {"start": 3874.898, "end": 3880.447, "text": "학기 마지막 날을 축하하는 아들과 딸의 모습이 정말 귀엽게 잘 나왔죠?"}, {"start": 3880.498, "end": 3884.349, "text": "하지만 구도를 좀 더 신경 써서 잡을 걸 그랬다는 아쉬움이 남네요."}, {"start": 3884.4, "end": 3889.25, "text": "'편집'을 누르면 우측 하단에 새로운 '도구' 옵션이 나타납니다."}, {"start": 3889.3, "end": 3894.5, "text": "여기에는 애플 인텔리전스 이미지 모델과"}, {"start": 3894.599, "end": 3898.847, "text": "프라이빗 클라우드 컴퓨팅을 활용한 공간 재구성 등 모든 편집 기능이 들어있습니다."}, {"start": 3898.898, "end": 3900.349, "text": "그럼 '재구성'을 눌러보겠습니다."}, {"start": 3900.4, "end": 3905.15, "text": "이미지가 로드되면 아주 심플한 UI가 나타납니다."}, {"start": 3905.201, "end": 3908.65, "text": "사진을 직접 조작하면서 구도를 조정할 수 있습니다."}, {"start": 3908.701, "end": 3917.449, "text": "터치해서 드래그하면, 마치 실제 촬영 현장에서 카메라 위치를 바꾼 듯 원근감이 살아납니다."}, {"start": 3917.5, "end": 3924.849, "text": "이 기능은 온디바이스 공간 모델을 사용하므로 효과를 실시간으로 미리 볼 수 있습니다."}, {"start": 3924.9, "end": 3929.849, "text": "사진을 조정하다 보면 원본 이미지 가장자리에 블러 처리가 생기는데요,"}, {"start": 3929.9, "end": 3932.849, "text": "이 빈 공간은 나중에 생성형 모델이 채워줍니다."}, {"start": 3932.9, "end": 3939.949, "text": "핀치 제스처로 줌을 당겨서... 조금 더 가까이... 네, 됐습니다."}, {"start": 3940.0, "end": 3941.349, "text": "아주 멋지네요."}, {"start": 3941.4, "end": 3944.349, "text": "이제 '재구성'을 적용하겠습니다."}, {"start": 3944.4, "end": 3947.247, "text": "이 기능이 정말 놀라운 이유는"}, {"start": 3947.297, "end": 3949.668, "text": "고도의 온디바이스 공간 모델을 결합했기 때문입니다."}, {"start": 3949.719, "end": 3951.769, "text": "강력한 이미지 생성 모델과"}, {"start": 3951.82, "end": 3955.469, "text": "프라이빗 클라우드 컴퓨팅을 활용해 최종 사진을 완성합니다."}, {"start": 3955.519, "end": 3958.469, "text": "더욱 놀라운 점은, 새로운 콘텐츠를 직접 생성해서"}, {"start": 3958.519, "end": 3962.068, "text": "시점을 이동하며 생긴 빈 공간을 자연스럽게 채워준다는 것이죠."}, {"start": 3962.119, "end": 3965.269, "text": "덕분에 구도를 다시 잡은 사진도"}, {"start": 3965.32, "end": 3973.668, "text": "원래 장면과 완벽하게 어우러집니다. 완성된 결과물을 보시죠, 정말 멋지지 않나요? 전후를 비교해 보면,"}, {"start": 3973.719, "end": 3979.168, "text": "카메라 위치를 아래로 옮긴 덕분에 아이들의 구도가 훨씬 좋아진 걸 볼 수 있습니다."}, {"start": 3979.219, "end": 3985.32, "text": "채워진 부분도 아주 자연스럽죠. 마치 시간을 되돌려"}, {"start": 3985.221, "end": 3991.668, "text": "셔터를 누르는 그 순간에 카메라를 조정한 것만 같습니다. 이것이 사진 앱의 새로운 Apple Intelligence 기능입니다."}, {"start": 3991.719, "end": 3997.42, "text": "무엇보다 이 기능은 보관함에 있는 거의 모든 사진에"}, {"start": 3997.32, "end": 4007.467, "text": "적용할 수 있습니다. 오래된 사진이나 다른 카메라로 찍은 사진도 말이죠. 이제 다시 크레이그를 모시겠습니다."}, {"start": 4007.518, "end": 4013.168, "text": "남: 방금 보신 것들은 Apple Intelligence가 여러분이 매일 쓰는 수
