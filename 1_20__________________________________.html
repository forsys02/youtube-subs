start": 136.131, "end": 139.97899999999998, "text": "거리가 좀 있긴 하지만 엘리베이터 같은 게 잘 되어 있어서"}, {"start": 140.03, "end": 146.329, "text": "거동이 불편하신 분들도 전혀 문제없을 것 같네요."}, {"start": 146.329, "end": 150.278, "text": "복도 밖 풍경도 잘 보이도록 신경 써서 만든 것 같군요."}, {"start": 150.329, "end": 157.027, "text": "초여름 하코네의 선선한 바람이 불어오고 있습니다."}, {"start": 157.031, "end": 161.57999999999998, "text": "오가는 분들과 꽤 자주 마주치게 되는데요."}, {"start": 161.631, "end": 163.57999999999998, "text": "마주치는 분들마다 가볍게 목례를 하거나"}, {"start": 163.631, "end": 165.57999999999998, "text": "\"안녕하세요\"라며 인사를 건네주셔서"}, {"start": 165.631, "end": 169.678, "text": "투숙객들끼리도 서로 예의를 갖추는 분위기인 듯합니다."}, {"start": 169.728, "end": 172.379, "text": "다양한 국적의 사람들이 보이는데"}, {"start": 172.43, "end": 174.379, "text": "다들 환한 미소로 인사를 해주네요."}, {"start": 174.43, "end": 177.077, "text": "마치 해외 호텔에 와 있는 듯한 기분입니다."}, {"start": 177.127, "end": 179.077, "text": "이게 바로 후지야 호텔의 매력이겠죠?"}, {"start": 179.127, "end": 181.077, "text": "그럼 여기서부터는... 어라, 발에 닿는 느낌이 좀 바뀌었네요."}, {"start": 181.127, "end": 185.829, "text": "방금 전까지는 바닥이 나무였는데"}, {"start": 185.729, "end": 189.43, "text": "여기서부터는 건물이 바뀌면서"}, {"start": 189.53, "end": 192.388, "text": "콘크리트 바닥으로 되어 있네요."}, {"start": 192.438, "end": 193.888, "text": "마침 여기에 지도가 있는데요."}, {"start": 193.938, "end": 194.689, "text": "후지야 호텔은"}, {"start": 194.74, "end": 197.487, "text": "본관과 서양관이 메이지 시대,"}, {"start": 197.538, "end": 199.487, "text": "여기 하나고텐과 식당은"}, {"start": 199.538, "end": 201.189, "text": "쇼와 시대 전반기에 지어졌죠."}, {"start": 201.24, "end": 202.387, "text": "시대에 따라"}, {"start": 202.437, "end": 204.088, "text": "건물 양식이 조금씩 다릅니다."}, {"start": 204.139, "end": 206.887, "text": "여기서부터가 제가 묵을 하나고텐"}, {"start": 206.937, "end": 208.387, "text": "객실 구역입니다."}, {"start": 208.437, "end": 211.489, "text": "아까와는 분위기가 좀 달라졌죠?"}, {"start": 211.539, "end": 214.688, "text": "지금으로부터 90년 전인 1936년에"}, {"start": 214.739, "end": 215.888, "text": "지어진 건물이에요."}, {"start": 215.938, "end": 219.337, "text": "'기쿠' 객실은 3층에 있어서"}, {"start": 219.437, "end": 221.188, "text": "엘리베이터가 있으니까"}, {"start": 221.239, "end": 224.639, "text": "이걸 타고 3층으로 가보죠."}, {"start": 224.639, "end": 226.588, "text": "[벨소리] 엘리베이터도 리뉴얼됐네요."}, {"start": 226.639, "end": 227.589, "text": "안내음: 위로 올라갑니다."}, {"start": 227.639, "end": 232.589, "text": "내부에 나무를 사용하는 등 세심하게 공을 들였습니다."}, {"start": 232.639, "end": 234.588, "text": "예전 분위기를 그대로 간직하고 있는 것 같아요."}, {"start": 234.639, "end": 236.189, "text": "[벨소리] 안내음: 3층입니다."}, {"start": 236.24, "end": 243.438, "text": "네, 드디어 3층 객실에 도착했습니다."}, {"start": 243.441, "end": 247.24, "text": "조금 어둡긴 합니다만..."}, {"start": 247.31, "end": 248.358, "text": "콘크리트에는"}, {"start": 248.408, "end": 250.25900000000001, "text": "하얗게 칠이 정성껏 되어 있고"}, {"start": 250.31, "end": 252.357, "text": "큰 창으로 빛도 잘 들어와서"}, {"start": 252.407, "end": 255.508, "text": "어둡다는 인상은 별로 없네요"}, {"start": 255.50900000000001, "end": 259.809, "text": "쇼와 초기 대일본제국 시대의"}, {"start": 259.81, "end": 264.61, "text": "일본의 분위기를 외부에 전달하려는"}, {"start": 264.61, "end": 266.91, "text": "공기도 느껴집니다"}, {"start": 266.91, "end": 268.709, "text": "이 앞이..."}, {"start": 268.709, "end": 274.009, "text": "마침 지금 옆방에서 점검 중인 모양입니다만"}, {"start": 274.009, "end": 279.509, "text": "제가 묵을 '키쿠노마'는 이곳입니다"}, {"start": 279.509, "end": 285.808, "text": "그럼, 객실에 도착했습니다"}, {"start": 285.808, "end": 287.758, "text": "여기가 후지야 호텔의 '키쿠노마'입니다"}, {"start": 287.808, "end": 292.408, "text": "아마 전전 일본, 소위 대일본제국에서"}, {"start": 292.31, "end": 294.259, "text": "가장 호화로운 리조트 호텔은"}, {"start": 294.31, "end": 296.259, "text": "이곳이 아니었을까 싶습니다"}, {"start": 296.31, "end": 299.408, "text": "천장은 모모야마 양식으로"}, {"start": 299.509, "end": 303.509, "text": "일본 전통의 분위기를 자아내는"}, {"start": 303.509, "end": 304.459, "text": "우물천장입니다"}, {"start": 304.509, "end": 309.908, "text": "그리고 객실은 요즘의 스위트룸 같은 구조인데"}, {"start": 309.91, "end": 319.709, "text": "침실과 거실이 지금은 하나로 되어 있지만, 이 판자로 된 미닫이문을 닫으면..."}, {"start": 319.639, "end": 331.639, "text": "이걸로 방을 둘로 나눌 수 있습니다. 이쪽은 침실, 그리고 이쪽은 거실로 사용할 수 있죠."}, {"start": 331.641, "end": 345.591, "text": "이 객실은 창문을 아주 넓게 낸 것이 특징인데요. 창밖으로 보이는 풍경도 다양하지만, 역시 이 건물 전체를 조망할 수 있다는 점이 이 방만의 매력인 것 같습니다."}, {"start": 345.641, "end": 352.24, "text": "문을 열면 일본에서 격식이 가장 높다고 알려진,"}, {"start": 352.24, "end": 356.29, "text": "전전(戰前) 시대의 대표적인 경관이 그대로 남아 있습니다."}, {"start": 356.341, "end": 360.389, "text": "메이지 시대의 서양식 건물, 그리고 메이지 중기의 본관."}, {"start": 360.439, "end": 363.79, "text": "안쪽에는 호화로운 저녁 식사가 제공되는,"}, {"start": 363.841, "end": 367.79, "text": "식당도 마련되어 있죠. 그리고 1번 국도로 이어집니다."}, {"start": 367.841, "end": 371.889, "text": "아래쪽에는 연못이 있어 물 흐르는 소리도 들려오고,"}, {"start": 371.939, "end": 373.889, "text": "온천의 향기도 감돕니다."}, {"start": 373.939, "end": 377.338, "text": "마침 도쿄 방면으로 돌아가는,"}, {"start": 377.338, "end": 379.689, "text": "1번 국도를 내려가는 차들이 보기 좋네요."}, {"start": 379.74, "end": 382.687, "text": "방금 드라이브하러 온 스포츠카도 올라가고 있습니다."}, {"start": 382.737, "end": 385.737, "text": "저는 배가 좀 고파져서,"}, {"start": 385.641, "end": 386.99, "text": "저녁 식사를 하러 가보겠습니다."}, {"start": 387.04, "end": 388.889, "text": "현재 이곳에 머물고 있습니다만,"}, {"start": 388.939, "end": 390.79, "text": "메이지 시대의 건물을 지나,"}, {"start": 390.841, "end": 391.889, "text": "이 안쪽에 있는,"}, {"start": 391.939, "end": 394.389, "text": "이번에는 '캐스케이드'라는 곳에서 식사를 하겠습니다."}, {"start": 394.439, "end": 395.889, "text": "또 한 군데, 이쪽에도,"}, {"start": 395.939, "end": 398.06, "text": "훌륭한 식당이 하나 더 있습니다만."}, {"start": 398.11, "end": 400.359, "text": "여기가 내일 조식을 먹을 예정인 곳입니다."}, {"start": 400.409, "end": 400.961, "text": "아니, 그보다..."}, {"start": 401.011, "end": 402.158, "text": "원하신다면 여기서도 보이니까,"}, {"start": 402.209, "end": 405.057, "text": "여기서 레스토랑 분위기를 살짝 살펴볼까요?"}, {"start": 405.108, "end": 408.459, "text": "오층탑 같은 타워 아래에 위치한..."}, {"start": 408.509, "end": 409.258, "text": "이곳이 바로,"}, {"start": 409.308, "end": 413.258, "text": "후지야 호텔의 메인 다이닝입니다. 식사 중인 분들이 계시네요."}, {"start": 413.308, "end": 416.459, "text": "전쟁 전 시대, \"대일본제국에는 무엇이 있나\" 하고"}, {"start": 416.509, "end": 421.259, "text": "구경하러 온 외국인들이 저곳에서 식사를 했던 장소입니다."}, {"start": 421.31, "end": 424.86, "text": "그럼 이제 카스케이드까지 관내를 돌아보며 이동하겠습니다."}, {"start": 424.91, "end": 430.158, "text": "엘리베이터 대신 이번에는 계단으로 가보려고 해요."}, {"start": 430.209, "end": 438.31, "text": "쇼와 초기의 콘크리트 공법이네요. 자, 그럼..."}, {"start": 438.31, "end": 441.661, "text": "지금부터 서양관을 통과하겠습니다."}, {"start": 441.711, "end": 445.06, "text": "서양관은 메이지 39년에 지어진 건물로,"}, {"start": 445.11, "end": 447.56, "text": "내부는 이런 식으로 꾸며져 있는 것 같습니다."}, {"start": 447.61, "end": 451.461, "text": "하룻밤 숙박에 5만 엔 정도인 것 같네요."}, {"start": 451.511, "end": 455.258, "text": "이 근방은 1906년부터 영업을 시작했다고 하는데,"}, {"start": 455.308, "end": 459.209, "text": "마침 러일전쟁 바로 다음 해네요."}, {"start": 459.209, "end": 461.858, "text": "러일전쟁에서 일본이 승리하면서 \"일본이...\""}, {"start": 461.908, "end": 463.75, "text": "\"그렇게 대단한 곳이라면 한번 가볼까\" 하는..."}, {"start": 463.8, "end": 465.348, "text": "한번 둘러볼까 합니다."}, {"start": 465.399, "end": 469.348, "text": "1906년경 일본에 관광 붐이 일었다고 하는데요."}, {"start": 469.399, "end": 472.149, "text": "어쩌면 그것과 관련이 있을지도 모르겠네요."}, {"start": 472.199, "end": 478.6, "text": "내부를 조금만 둘러보겠습니다."}, {"start": 478.6, "end": 483.699, "text": "이 문 뒤쪽이 현재의 객실이군요."}, {"start": 483.8, "end": 485.449, "text": "건물이 2층이라서..."}, {"start": 485.5, "end": 490.899, "text": "2층 투숙객은 이 계단을 이용하시면 됩니다."}, {"start": 490.901, "end": 494.449, "text": "서양관은 지어진 지 120년 된 건물입니다."}, {"start": 494.5, "end": 498.25, "text": "요즘은 날이 더워 냉방이 필수이다 보니"}, {"start": 498.3, "end": 503.25, "text": "눈에 띄지 않는 곳에 에어컨 실외기가 설치돼 있네요."}, {"start": 503.3, "end": 505.75, "text": "메이지 시대의 하코네는 훨씬 시원해서"}, {"start": 505.8, "end": 508.848, "text": "여름에도 냉방이 전혀 필요 없었다고 해요."}, {"start": 508.899, "end": 512.151, "text": "하코네가 피서지로 번성했던 역사가 있죠."}, {"start": 512.201, "end": 517.798, "text": "이쪽은 정문 쪽인 본관입니다."}, {"start": 517.801, "end": 520.549, "text": "1891년에 지어진 건물이죠."}, {"start": 520.599, "end": 524.05, "text": "청일전쟁보다도 더 전에 지어졌네요."}, {"start": 524.1, "end": 526.05, "text": "일본이 아직 가난하던 시절에"}, {"start": 526.1, "end": 528.55, "text": "가난한 나라를 풍요롭게 만들려고"}, {"start": 528.6, "end": 530.55, "text": "정성을 다해 만든 호텔입니다."}, {"start": 530.6, "end": 532.55, "text": "지금까지도 사용되고 있죠."}, {"start": 532.6, "end": 534.55, "text": "그럼 여기서부터는요."}, {"start": 534.6, "end": 539.5, "text": "이 은색 방화 셔터가 있는 곳을 지나면..."}, {"start": 539.5, "end": 542.45, "text": "여기서부터는 건물의 느낌이 좀 달라집니다."}, {"start": 542.5, "end": 544.95, "text": "여기는 '카스케이드 윙'이라고 하네요."}, {"start": 545.0, "end": 550.499, "text": "레이와 시대에 새로 지은 건물이라고 합니다."}, {"start": 550.499, "end": 552.449, "text": "아, 계단이 있는데 한번 가볼까요?"}, {"start": 552.499, "end": 553.949, "text": "확실히 요즘 느낌이 나죠?"}, {"start": 553.999, "end": 560.6, "text": "센서 덕분에 자동으로 밝아졌네요. 아, 밝다."}, {"start": 560.6, "end": 563.55, "text": "새 건물에서 최신 서비스를 받고 싶은 분들은,"}, {"start": 563.6, "end": 566.55, "text": "후지야 호텔의 신관 객실도 있으니까요."}, {"start": 566.6, "end": 569.55, "text": "메이지 시대나 전전(戰前)의 고전적인 느낌이 아닌,"}, {"start": 569.6, "end": 573.148, "text": "이런 현대적인 건물을 선택하시는 것도 좋을 것 같네요."}, {"start": 573.197, "end": 578.298, "text": "자, 카스케이드 3층에 도착했습니다."}, {"start": 578.298, "end": 580.249, "text": "레스토랑 '카스케이드'에 도착했네요."}, {"start": 580.298, "end": 583.749, "text": "가격대가 꽤 있는 메뉴가 많은 것 같긴 한데..."}, {"start": 583.798, "end": 588.749, "text": "코스 요리가 12,000엔. 가짓수는 상당히 많네요."}, {"start": 588.798, "end": 592.15, "text": "아니면 15,000엔짜리 코스 요리도 있고요."}, {"start": 592.2, "end": 596.648, "text": "원래 고풍스러운 호텔은 코스 요리가 기본이었겠지만,"}, {"start": 596.697, "end": 598.15, "text": "단품 메뉴도 준비되어 있습니다."}, {"start": 598.2, "end": 603.719, "text": "메인 요리 중에 저렴한 건 스파게티 같은 것도 있고..."}, {"start": 603.769, "end": 605.42, "text": "도미 같은 메뉴도 있네요"}, {"start": 605.47, "end": 607.369, "text": "치킨 커틀릿입니다"}, {"start": 607.37, "end": 610.419, "text": "일부러 조금 저렴한 메뉴로 가볼게요"}, {"start": 610.469, "end": 614.42, "text": "후지야 호텔에 있는 레스토랑 두 곳 중 하나인"}, {"start": 614.47, "end": 615.92, "text": "'캐스케이드'입니다"}, {"start": 615.97, "end": 618.619, "text": "건물은 레이와 시대의 새 건물이지만"}, {"start": 618.668, "end": 624.219, "text": "내부는 원래 다이쇼 시대에 있던 옛 레스토랑을 그대로 옮겨온 것 같네요"}, {"start": 624.269, "end": 629.421, "text": "당시의 화려한 스테인드글라스와 정교한 조각이 그대로 쓰이고 있어요"}, {"start": 629.471, "end": 636.421, "text": "새 건물이지만 다이쇼 시대 당시 외국인들이 본 일본의 미를 간직하고 있네요"}, {"start": 636.471, "end": 639.719, "text": "소나무 가로수가 그려져 있습니다"}, {"start": 639.769, "end": 643.52, "text": "'도카이도 53차'가 테마인 걸까요?"}, {"start": 643.57, "end": 646.52, "text": "여기는 낚시하는 옛날 사람이 보이네요"}, {"start": 646.57, "end": 649.118, "text": "하나하나가 정교한 투조 조각입니다"}, {"start": 649.168, "end": 652.421, "text": "그럼 단품으로 주문해 볼게요, 우선 전채 요리인 샐러드부터!"}, {"start": 652.471, "end": 657.619, "text": "이건 코마츠나 샐러드인데 위에 절임 같은 게 올라가 있어요"}, {"start": 657.668, "end": 661.92, "text": "아삭아삭하니 먹기 좋아서 순식간에 다 비워 버렸네요"}, {"start": 661.97, "end": 666.621, "text": "이 기둥도 꽤 오래돼 보여요, 옛날 흔적인지 흠집이 남아있네요"}, {"start": 666.671, "end": 670.219, "text": "이게 가장 저렴한 메뉴라서 한번 시켜봤는데요"}, {"start": 670.269, "end": 673.219, "text": "밥이랑 세트인데 궁합이 아주 좋아 보이죠?"}, {"start": 673.269, "end": 676.989, "text": "치킨이 두툼한 게 아주 육즙 가득해 보이는 비주얼입니다"}, {"start": 677.038, "end": 680.29, "text": "실제로 정말 부드러워서 먹기 편했어요."}, {"start": 680.34, "end": 683.689, "text": "튀김옷은 얇게 입혀져 있습니다."}, {"start": 683.739, "end": 687.189, "text": "이 정도 퀄리티에 2,000엔대라면 꽤 괜찮지 않나요?"}, {"start": 687.239, "end": 691.03, "text": "당시의 품격 있는 분위기도 충분히 만끽할 수 있습니다."}, {"start": 691.08, "end": 696.729, "text": "천장 조각을 보면 비둘기 장식품이 여기저기 놓여 있네요."}, {"start": 696.778, "end": 701.129, "text": "옛날 레스토랑에도 이런 장난기 어린 감각이 있었나 봅니다."}, {"start": 701.178, "end": 705.83, "text": "세밀한 조각들을 살펴보면, 후지야 호텔이 해외 부호들에게..."}, {"start": 705.879, "end": 708.83, "text": "일본의 전통문화를 전하려고 노력했던..."}, {"start": 708.879, "end": 710.93, "text": "옛 시절의 정취가 느껴집니다."}, {"start": 710.98, "end": 713.128, "text": "이건 당시의 실제 물건이네요."}, {"start": 713.177, "end": 716.677, "text": "자, 잘 먹었습니다."}, {"start": 717.11, "end": 720.06, "text": "이대로 바깥 층으로 나갈 수 있는 것 같네요."}, {"start": 720.11, "end": 723.16, "text": "아무래도 산이라 벌레가 가끔 나오긴 하지만..."}, {"start": 723.21, "end": 726.959, "text": "후지야 호텔 측에서도 꽤 노력하고 있는 모양이네요."}, {"start": 727.009, "end": 729.258, "text": "레이와 시대의 최신 건물인데도..."}, {"start": 729.307, "end": 732.66, "text": "옛 하코네의 분위기가 잘 보존되어 있습니다."}, {"start": 732.71, "end": 736.158, "text": "그럼 야외 계단을 따라서 다시..."}, {"start": 736.207, "end": 746.509, "text": "[물소리와 발걸음 소리]"}, {"start": 746.509, "end": 751.261, "text": "메이지 시대의 가장 오래된 본관으로 돌아왔습니다."}, {"start": 751.311, "end": 754.9590000000001, "text": "정원은 밤에 꽤 어두운 상태입니다."}, {"start": 755.009, "end": 757.849, "text": "옛날 호텔의 정취를 그대로 간직하고 있군요."}, {"start": 757.899, "end": 759.849, "text": "예전엔 전기가 거의 없었기에"}, {"start": 759.899, "end": 765.599, "text": "이런 호텔은 원래 어두운 게 정석입니다"}, {"start": 765.599, "end": 769.05, "text": "그럼 1891년에 만들어진 돌계단을 올라"}, {"start": 769.1, "end": 772.349, "text": "다시 건물 안으로 들어가 보겠습니다"}, {"start": 772.399, "end": 786.1, "text": "[거친 숨소리]"}, {"start": 786.1, "end": 789.45, "text": "지금은 관내 곳곳에 전등이 설치되어 있지만"}, {"start": 789.5, "end": 794.648, "text": "메이지 시대 초기에는 이렇게 전등이 많지 않았겠죠"}, {"start": 794.697, "end": 799.0, "text": "관내에 유리로 된 곳이 꽤 많은데"}, {"start": 799.0, "end": 801.197, "text": "자연광을 받아들여서"}, {"start": 801.2, "end": 804.349, "text": "낮 동안 실내를 밝게 유지하기 위한 지혜인 것 같습니다"}, {"start": 804.399, "end": 821.499, "text": "[발자국 소리]"}, {"start": 821.5, "end": 825.65, "text": "하코네는 역시 추우니까 이런 회전문이 일반적이죠"}, {"start": 825.7, "end": 830.899, "text": "옛날 서구의 호화 호텔들이 대개 그랬거든요"}, {"start": 830.899, "end": 834.65, "text": "이곳이 후지야 호텔에서 가장 오래된 건물의 현관입니다"}, {"start": 834.7, "end": 838.349, "text": "주목할 부분은 현관 바로 윗부분, 여기인데요"}, {"start": 838.399, "end": 843.751, "text": "일본식 카라하후 지붕이 있고 지금은 커튼이 쳐져 있네요"}, {"start": 843.801, "end": 850.95, "text": "이 안에 가장 오래된 건물의 가장 좋은 방, 히스토릭 주니어 스위트가 있는 것 같습니다"}, {"start": 851.0, "end": 857.05, "text": "호텔 공식 사이트를 보면 내부가 어떻게 생겼는지 볼 수 있는데"}, {"start": 857.1, "end": 863.697, "text": "창가에는 벤치가 있고 안에는 트윈 베드가 놓여 있죠"}, {"start": 863.697, "end": 868.65, "text": "양옆에는 커튼이 있고, 이 창문의 형태가 아주 특징적이에요"}, {"start": 868.7, "end": 872.0889999999999, "text": "숙박 요금을 공식 사이트에서 확인해 보면..."}, {"start": 872.139, "end": 875.89, "text": "1박에 104,500엔부터 시작합니다."}, {"start": 875.94, "end": 878.39, "text": "아마 지금 저기에 머물고 계신 분은"}, {"start": 878.44, "end": 881.69, "text": "식사 포함해서 1박에 13만 엔 정도를"}, {"start": 881.74, "end": 884.19, "text": "두 분이서 지불하고 계시지 않을까 싶네요."}, {"start": 884.24, "end": 887.69, "text": "제가 지금 묵고 있는 방은 바로 저기입니다."}, {"start": 887.74, "end": 895.0889999999999, "text": "'하나고텐 키쿠노마', 이곳은 1박에 142,500엔부터라고 하네요."}, {"start": 895.139, "end": 908.589, "text": "이곳은 1891년에 지어진 본관 옆에 1906년산 서양관이 있는 구조인데요. 여기가 아마... 여기일까요? 이곳에 가장 좋은 객실이 있는 모양입니다. 바로 '히스토릭 스위트'죠."}, {"start": 908.639, "end": 912.589, "text": "공식 사이트에 소개되어 있더라고요. 아마..."}, {"start": 912.639, "end": 916.29, "text": "이런 느낌인데, 이거 참 흥미롭네요."}, {"start": 916.34, "end": 918.989, "text": "후지야 호텔 공식 사이트에서 확인하실 수 있는데,"}, {"start": 919.038, "end": 922.19, "text": "대략 이런 구조로 되어 있는 것 같습니다."}, {"start": 922.24, "end": 927.139, "text": "아마 이런 거실과 TV 같은 공간이"}, {"start": 927.139, "end": 930.888, "text": "이 뒤편 공간에 마련되어 있지 않을까 싶습니다."}, {"start": 930.937, "end": 931.89, "text": "제가 좀 알아봤는데요,"}, {"start": 931.94, "end": 934.29, "text": "역시 1905년까지 후지야 호텔은"}, {"start": 934.34, "end": 937.29, "text": "이 본관 하나로만 영업을 했었다고 합니다."}, {"start": 937.34, "end": 939.989, "text": "그러다 러일전쟁의 동해 해전에서"}, {"start": 940.038, "end": 941.888, "text": "발틱 함대가 침몰했다는"}, {"start": 941.937, "end": 943.689, "text": "승전보가 전해지자마자,"}, {"start": 943.739, "end": 947.999, "text": "그 직후 곧바로 이 서양관의 건설이 시작된 모양입니다."}, {"start": 948.048, "end": 952.8, "text": "그야말로 러일전쟁 이후 일본의 관광 붐과 관련이 있었던 모양입니다."}, {"start": 952.85, "end": 957.699, "text": "그래서인지 입구도 일본 전통 건축 양식인 '카라하후'를 사용했네요."}, {"start": 957.749, "end": 964.9, "text": "서양관은 똑같이 생긴 건물이 여기 1호관, 그리고 저 뒤에 2호관으로 두 채가 있습니다."}, {"start": 964.95, "end": 971.7, "text": "별명이 붙어 있는데, 1호관은 '콤피 롯지', '락락 산장' 같은 느낌이랄까요?"}, {"start": 971.75, "end": 977.998, "text": "또 하나는 '레스토풀 코티지', '편히 쉬는 별장' 같은 느낌이죠."}, {"start": 978.048, "end": 981.901, "text": "'콤피 롯지' 쪽으로 들어가 봅시다."}, {"start": 981.951, "end": 984.548, "text": "문이 잠겨 있네요."}, {"start": 984.548, "end": 987.1, "text": "예전에는 여기서 바로 들어갈 수 있었던 것 같은데..."}, {"start": 987.149, "end": 990.649, "text": "역시 안 들어가지나 보네요."}, {"start": 990.649, "end": 993.299, "text": "아마 옆으로 들어가는 곳이 있을 겁니다."}, {"start": 993.349, "end": 995.349, "text": "여기 있네요."}, {"start": 995.349, "end": 1002.849, "text": "이 뒤쪽에 사실 서양관 3호관이 한 채 더 있습니다."}, {"start": 1002.85, "end": 1006.2, "text": "그럼 이 뒤쪽 3호관 입구로 들어갑시다."}, {"start": 1006.25, "end": 1008.901, "text": "어? 그런데 여기만 좀 이상하네."}, {"start": 1008.951, "end": 1010.4, "text": "좀 이상한 부분을 발견했어요."}, {"start": 1010.45, "end": 1014.649, "text": "이 문이라든가..."}, {"start": 1014.649, "end": 1017.199, "text": "이 부분의 방화문 같은 곳에"}, {"start": 1017.249, "end": 1018.7, "text": "철제로 된 것도 있긴 한데"}, {"start": 1018.75, "end": 1020.2, "text": "여기만 말이죠..."}, {"start": 1020.25, "end": 1021.53, "text": "실례하겠습니다."}, {"start": 1021.58, "end": 1024.68, "text": "약간 현대적인 느낌이네요."}, {"start": 1024.68, "end": 1025.827, "text": "현재 로비입니다."}, {"start": 1025.877, "end": 1029.83, "text": "여기는 1891년에 지어진 본관인데요."}, {"start": 1029.88, "end": 1033.98, "text": "여기서 본관이 끝나는군요."}, {"start": 1033.98, "end": 1036.63, "text": "방화 셔터 하나를 사이에 두고..."}, {"start": 1036.68, "end": 1037.728, "text": "이 너머는"}, {"start": 1037.778, "end": 1040.077, "text": "아마 1960년에"}, {"start": 1039.98, "end": 1042.18, "text": "연결 통로를 건설한"}, {"start": 1042.181, "end": 1043.827, "text": "증축된 구역입니다."}, {"start": 1043.877, "end": 1046.528, "text": "그래서 여기는 엘리베이터도 있고"}, {"start": 1046.578, "end": 1049.578, "text": "화장실도 있네요."}, {"start": 1049.578, "end": 1053.528, "text": "여기에도 방화 셔터가 설치되어 있습니다."}, {"start": 1053.578, "end": 1057.528, "text": "화장실 외관은 옛날 풍이지만 내부는 상당히 신식인 것 같네요."}, {"start": 1057.578, "end": 1062.68, "text": "그렇네요, 전혀 오래된 느낌이 안 들어요."}, {"start": 1062.679, "end": 1069.179, "text": "참고로 TOTO 비데에 탈의용 발판까지 있네요."}, {"start": 1069.181, "end": 1073.93, "text": "이걸 앞으로 당기면 옷을 갈아입을 수 있는 발판인데,"}, {"start": 1073.98, "end": 1077.629, "text": "아주 살짝만 건드려도 원래대로 돌아가는 것 같군요."}, {"start": 1077.679, "end": 1084.578, "text": "화장실이 있는 이 구역이 나중에 만들어진 연결 통로고,"}, {"start": 1084.578, "end": 1093.278, "text": "조금 더 가다 보면 여기서 증축된 연결 통로가 끝납니다."}, {"start": 1093.279, "end": 1095.249, "text": "그리고 이 방화문이 있네요."}, {"start": 1095.298, "end": 1098.749, "text": "이 문을 사이에 두고 건너편부터는 다시 메이지 시대입니다."}, {"start": 1098.798, "end": 1105.298, "text": "1906년 러일전쟁 승리 당시에 지어진 서양관,"}, {"start": 1105.299, "end": 1112.298, "text": "지금 있는 곳이 서양관 1호동입니다만, 여기서부터..."}, {"start": 1112.298, "end": 1115.048, "text": "안으로 들어가면 목조 건물이라"}, {"start": 1115.097, "end": 1116.048, "text": "소리가 울리기 때문에"}, {"start": 1116.097, "end": 1117.351, "text": "여기서는 조심하는 게 좋겠네요."}, {"start": 1117.401, "end": 1125.199, "text": "이쪽이 서양관 3호동으로 이어지는 걸까요? 한번 가보시죠."}, {"start": 1125.201, "end": 1126.25, "text": "여기는 메이지 시대 건물이라서"}, {"start": 1126.299, "end": 1153.298, "text": "[발소리] 소리가 울리네요. 독특한 공간입니다. 참고로 이런 난방 장치가 설치되어 있습니다."}, {"start": 1153.298, "end": 1155.15, "text": "이건 다이쇼 시대쯤에"}, {"start": 1155.2, "end": 1156.749, "text": "증설된 것이라고 하네요."}, {"start": 1156.798, "end": 1158.749, "text": "지금은 여름이라 사용하지 않지만"}, {"start": 1158.798, "end": 1161.051, "text": "이걸 돌리면 증기가 나와서"}, {"start": 1161.101, "end": 1162.95, "text": "건물 안을 따뜻하게 데울 수 있습니다."}, {"start": 1163.0, "end": 1166.597, "text": "후지야 호텔은 일본에서도"}, {"start": 1166.598, "end": 1168.95, "text": "가장 뛰어난 건축물 중 하나였기에"}, {"start": 1169.0, "end": 1172.651, "text": "상당히 이른 시기부터 전기를 사용했던 모양입니다."}, {"start": 1172.701, "end": 1182.897, "text": "1923년 간토 대지진 때도 대규모 화재 등은 전혀 발생하지 않았다고 합니다."}, {"start": 1182.897, "end": 1195.5, "text": "그리고 여긴 계단인데, 요즘은 안전 기준이 강화되어 난간을 증설했습니다."}, {"start": 1195.4, "end": 1200.4, "text": "자, 이쯤에서 메이지 시대의 서양관은 끝이네요."}, {"start": 1200.45, "end": 1203.4, "text": "증기 난방이 설치되어 있습니다"}, {"start": 1203.45, "end": 1210.147, "text": "바로 이 방화문 너머부터는 다음 구역으로 넘어가요"}, {"start": 1210.147, "end": 1213.95, "text": "이 앞은 막다른 길인 십자로예요"}, {"start": 1213.95, "end": 1218.2, "text": "여기가 막다른 길인데 오른쪽으로 가면..."}, {"start": 1218.25, "end": 1220.25, "text": "전후 건축물이네요"}, {"start": 1220.25, "end": 1221.9, "text": "이쪽은 나중에 가보도록 하죠"}, {"start": 1221.95, "end": 1228.249, "text": "왼쪽으로 가면 제 방인 '하나고텐'으로 돌아가게 됩니다"}, {"start": 1228.25, "end": 1230.999, "text": "이 하나고텐 입구 쪽에는..."}, {"start": 1231.048, "end": 1233.4, "text": "무료 드링크 바 코너가 있어요"}, {"start": 1233.45, "end": 1236.798, "text": "드링크 바 기계가 꽤 좋은 것 같더라고요"}, {"start": 1236.848, "end": 1239.1, "text": "드링크 바는 다 거기서 거기 아닐까 싶었는데..."}, {"start": 1239.15, "end": 1240.1, "text": "제 생각이 틀렸네요"}, {"start": 1240.15, "end": 1241.199, "text": "정말 맛있어요"}, {"start": 1241.249, "end": 1247.65, "text": "잔이 예뻐서 더 그런 걸까요? [음료 따르는 소리]"}, {"start": 1247.65, "end": 1257.548, "text": "이걸로 한번 마셔볼까요? [기계 작동음]"}, {"start": 1257.548, "end": 1262.147, "text": "[음료 따르는 소리] 탄산음료가 나왔네요"}, {"start": 1262.147, "end": 1263.899, "text": "토닉 워터 같은 맛이에요"}, {"start": 1263.949, "end": 1267.65, "text": "아주 훌륭합니다"}, {"start": 1267.548, "end": 1272.2, "text": "여기서부터는 예전에 영상으로 한번 보여드렸던 곳인데"}, {"start": 1272.25, "end": 1276.15, "text": "밤이 되면 분위기가 확 달라져요"}, {"start": 1276.098, "end": 1278.45, "text": "조명을 함부로 추가하지 않고"}, {"start": 1278.5, "end": 1281.249, "text": "쇼와 초기 특유의 어스름을 그대로 간직하고 있습니다"}, {"start": 1281.298, "end": 1283.598, "text": "운치가 있네요"}, {"start": 1293.901, "end": 1296.749, "text": "그럼 다시 한번 '기쿠노마'의 내부를 살펴보겠습니다"}, {"start": 1296.798, "end": 1303.098, "text": "밤에 보는 모습이 가장 아름다울 거예요"}, {"start": 1303.098, "end": 1303.847, "text": "오오"}, {"start": 1303.897, "end": 1311.598, "text": "역시 밤에 보는 풍경은 각별하네요"}, {"start": 1311.5, "end": 1317.45, "text": "낮에는 햇빛이 들어와 실내가 너무 밝아지는데, 밤의 조명이 정말 근사한 것 같습니다"}, {"start": 1317.5, "end": 1320.598, "text": "인테리어도 눈길을 사로잡네요"}, {"start": 1320.598, "end": 1322.95, "text": "바닥 카펫의 문양은 국화입니다"}, {"start": 1323.0, "end": 1325.85, "text": "국화는 여권에도 그려져 있고"}, {"start": 1325.9, "end": 1327.95, "text": "경찰의 상징도 국화죠"}, {"start": 1328.0, "end": 1329.75, "text": "일본이라는 나라의 상징입니다"}, {"start": 1329.799, "end": 1333.199, "text": "부채 모양을 조각한 테이블은"}, {"start": 1333.2, "end": 1337.44, "text": "90년 전쯤 만든 것을 지금까지도 계속 사용하고 있다고 하네요"}, {"start": 1337.49, "end": 1341.44, "text": "참고로 이 방은 현관에서부터 이중문으로 닫을 수 있게 되어 있습니다"}, {"start": 1341.49, "end": 1343.44, "text": "이것도 옛날 문손잡이네요"}, {"start": 1343.49, "end": 1352.69, "text": "천장 부근의 조각에는 소나무가 심어진 산의 모습이 그려져 있습니다"}, {"start": 1352.691, "end": 1359.99, "text": "후지산도 있네요. 옛 하코네의 풍경 아닐까요?"}, {"start": 1359.989, "end": 1366.087, "text": "이 조각에 그려진 산들을 보면 꽤 민둥산인 곳이 많네요"}, {"start": 1366.028, "end": 1375.479, "text": "이 방이 만들어진 90년 전쯤에는 일본의 산들이 임업 문제로 나무를 많이 벌채하는 바람에 별로 심겨 있지 않았다고 합니다."}, {"start": 1375.528, "end": 1378.479, "text": "당시의 풍경을 그대로 느낄 수 있을지도 모르겠네요."}, {"start": 1378.528, "end": 1382.929, "text": "그리고 이건 아시노코 호수일까요?"}, {"start": 1382.929, "end": 1387.13, "text": "호수에 돛단배가 떠 있습니다만,"}, {"start": 1387.13, "end": 1390.879, "text": "90년 전의 아시노코는 아직 이런 느낌이었을 겁니다."}, {"start": 1390.929, "end": 1393.979, "text": "지금은 하코네 해적선이 다니고 있죠."}, {"start": 1394.028, "end": 1396.381, "text": "또한 이 방 천장에 매달려 있는 조명이"}, {"start": 1396.431, "end": 1399.478, "text": "무척 밝고 편리하긴 합니다만,"}, {"start": 1399.528, "end": 1404.479, "text": "아마 조명을 끄면 옛날의 정취가 느껴질 겁니다."}, {"start": 1404.528, "end": 1406.18, "text": "[딸깍] 그러네요."}, {"start": 1406.23, "end": 1407.73, "text": "어떤가요?"}, {"start": 1407.73, "end": 1412.581, "text": "아마 옛날 일본의 풍경은 이런 곳이었을 겁니다."}, {"start": 1412.631, "end": 1415.327, "text": "여기도 한번 꺼 보죠."}, {"start": 1415.429, "end": 1423.479, "text": "[딸깍] 꺼 봤습니다. 글쎄요, 전쟁 전에는 이런 풍경이지 않았을까 싶네요."}, {"start": 1423.528, "end": 1434.327, "text": "대일본제국에 여행 온 외국인들은 이곳에서 최상급의 대접을 받았던 게 아닐까요?"}, {"start": 1434.329, "end": 1438.381, "text": "[딸깍] 마저 다 꺼 봤습니다. 이것도 분위기가 사네요."}, {"start": 1438.431, "end": 1441.93, "text": "이 책상 조명이 마지막입니다."}, {"start": 1441.931, "end": 1444.979, "text": "이 방에는 미시마 유키오가 투숙한 적이 있다고 하더군요."}, {"start": 1445.028, "end": 1448.778, "text": "여기서 무언가 집필했을지도 모르겠네요."}, {"start": 1448.828, "end": 1450.808, "text": "[딸깍] 모든 조명을 끄겠습니다."}, {"start": 1450.858, "end": 1454.61, "text": "창밖으로는 지금 머물고 있는 후지야 호텔의 야경이 펼쳐져 있습니다."}, {"start": 1454.66, "end": 1457.858, "text": "이쪽이 본관이고요."}, {"start": 1457.959, "end": 1460.209, "text": "왼쪽은 나무에 가려져 있네요."}, {"start": 1460.259, "end": 1461.811, "text": "이쪽이 서양관입니다."}, {"start": 1461.861, "end": 1468.46, "text": "창문도 한번 열어봤습니다."}, {"start": 1468.461, "end": 1469.611, "text": "절에 있는 것처럼"}, {"start": 1469.661, "end": 1472.759, "text": "등이 대롱대롱 매달려 있고"}, {"start": 1472.759, "end": 1473.96, "text": "바로 앞에는"}, {"start": 1473.961, "end": 1475.911, "text": "국도 1호선을 따라 올라가는"}, {"start": 1475.961, "end": 1479.209, "text": "차 불빛까지 즐길 수 있습니다."}, {"start": 1479.259, "end": 1481.209, "text": "역시 이게 있어야 하코네답네요."}, {"start": 1481.259, "end": 1484.759, "text": "그럼 이제 슬슬"}, {"start": 1484.759, "end": 1486.11, "text": "잘 준비를 하러 가보겠습니다."}, {"start": 1486.16, "end": 1489.009, "text": "이제 와서 옷장을 여는 느낌이긴 하지만"}, {"start": 1489.058, "end": 1490.609, "text": "불이 들어오네요."}, {"start": 1490.659, "end": 1492.558, "text": "이것저것 많네."}, {"start": 1492.558, "end": 1496.959, "text": "정장용 솔이랑 구두 닦는 도구들,"}, {"start": 1496.96, "end": 1500.209, "text": "구두 주걱이랑 기념품 쇼핑백으로 써도 될 종이 가방도 있고요."}, {"start": 1500.259, "end": 1505.558, "text": "그리고 사이즈별로 구두 모양을 잡아주는 슈트리와"}, {"start": 1505.558, "end": 1513.18, "text": "여행 갈 때 유용한 압축 팩도 있네요. 뒷면에는 설명서도 적혀 있습니다."}, {"start": 1513.23, "end": 1516.58, "text": "그리고 2인용 슬리퍼가 놓여 있습니다."}, {"start": 1516.63, "end": 1517.979, "text": "들어가 보겠습니다."}, {"start": 1518.028, "end": 1523.879, "text": "그럼 이대로... 방이 전반적으로 좀 어둡긴 한데, 제가 어둡게 해 놓은 것뿐이에요."}, {"start": 1523.929, "end": 1525.879, "text": "네, 욕실로 들어가 보죠."}, {"start": 1525.929, "end": 1531.68, "text": "문은 옛날 그대로네요. 일자 나사를 사용하고 있습니다."}, {"start": 1531.73, "end": 1537.778, "text": "열쇠도 90년 전 물건 같지만, 잘 작동하는 것 같네요."}, {"start": 1537.828, "end": 1541.881, "text": "다만 90년 전에는 없었던 추가 설비로"}, {"start": 1541.931, "end": 1544.279, "text": "문이 천천히 닫히게 하는..."}, {"start": 1544.329, "end": 1548.73, "text": "이... 뭐라고 하죠?"}, {"start": 1548.73, "end": 1551.381, "text": "이건 나중에 설치된 모양입니다."}, {"start": 1551.431, "end": 1558.73, "text": "욕실 벽 타일은 2020년 리뉴얼 때 새것으로 교체됐다고 하네요."}, {"start": 1558.73, "end": 1563.68, "text": "이미 아까 물을 받아 뒀는데요. 물은 이 두 수도꼭지에서..."}, {"start": 1563.73, "end": 1566.68, "text": "상당히 뜨거운 물이 나옵니다. 옆에 쓰여 있네요."}, {"start": 1566.73, "end": 1574.381, "text": "'온천, 뜨거운 물 주의'. 미야노시타에서 옛날부터 솟아나던 온천을 그대로 끌어다 쓸 수 있습니다."}, {"start": 1574.431, "end": 1576.381, "text": "이게 후지야 호텔의 전통이죠."}, {"start": 1576.431, "end": 1580.08, "text": "그럼 샤워하고 목욕 좀 하겠습니다."}, {"start": 1580.13, "end": 1582.13, "text": "이 창문 말인데요."}, {"start": 1582.13, "end": 1584.08, "text": "[물기 닦는 소리] 우선 손에 물기 좀 닦고..."}, {"start": 1584.13, "end": 1586.68, "text": "일단 열어 보는 게 가능합니다."}, {"start": 1586.73, "end": 1590.327, "text": "바깥 공기가 약간 들어오네요."}, {"start": 1590.4, "end": 1592.35, "text": "약간 노천탕 같은 느낌이에요."}, {"start": 1592.4, "end": 1594.35, "text": "여기에 이런 창문이 있다는 건"}, {"start": 1594.4, "end": 1598.35, "text": "90년 정도 전부터 이 방은 욕실이었나 보네요."}, {"start": 1598.4, "end": 1601.4, "text": "사실 옛날 고급 호텔은"}, {"start": 1601.4, "end": 1604.35, "text": "객실에 욕실이 딸려 있지 않은 경우도 꽤 있었다고 하던데"}, {"start": 1604.4, "end": 1607.35, "text": "여기는 역시 최상급 클래스의 호텔이라 욕실이 있네요."}, {"start": 1607.4, "end": 1611.2, "text": "그럼 이제 자러 가 보겠습니다."}, {"start": 1611.201, "end": 1619.45, "text": "일본에도 다양한 호텔이 있지만, 후지야 호텔의 '기쿠노마'에 묵고 나면 이제 충분한 것 같아요."}, {"start": 1619.5, "end": 1627.851, "text": "하지만 그런 말을 했다간 닛코 가나야 호텔 쪽에서 '닛코를 보지 않고는 훌륭하다 말하지 마라'는 옛 속담이 날아올지도 모르겠네요."}, {"start": 1627.901, "end": 1631.347, "text": "가나야 호텔도 언젠가 묵어볼 기회가 생기면 좋겠습니다."}, {"start": 1631.397, "end": 1632.351, "text": "그럼, 실례하겠습니다."}, {"start": 1632.401, "end": 1636.149, "text": "안녕하세요. 다음 날 아침 7시입니다."}, {"start": 1636.199, "end": 1637.149, "text": "다음 날 아침 7..."}, {"start": 1637.199, "end": 1637.551, "text": "시입니다."}, {"start": 1637.601, "end": 1641.851, "text": "아침 5시쯤 창문으로 강한 빛이 들어왔는데"}, {"start": 1641.901, "end": 1643.749, "text": "이 파티션이 있어서"}, {"start": 1643.798, "end": 1646.75, "text": "이걸 사용하면 방이 금방 어두워집니다."}, {"start": 1646.799, "end": 1650.25, "text": "덕분에 아주 푹 잘 수 있었네요."}, {"start": 1650.299, "end": 1651.75, "text": "그럼 풍경을 한번 볼까요?"}, {"start": 1651.799, "end": 1666.4, "text": "[바람 소리] 마침 직원분이 국기를 게양하는 참이네요."}, {"start": 1666.38, "end": 1672.33, "text": "오다와라에서 불어오는 골짜기 바람이 오색 깃발을 휘날리게 하고 있습니다."}, {"start": 1672.38, "end": 1676.228, "text": "오늘도 후지야 호텔이 일본의 상징으로서 제 역할을 다해주길 바랍니다."}, {"start": 1676.278, "end": 1682.18, "text": "끝까지 올라가는 걸 볼까요? 좋네요."}, {"start": 1682.079, "end": 1685.778, "text": "객실에 신문이 배달되어 있네요."}, {"start": 1685.778, "end": 1691.377, "text": "전 일본인이라 일본어 신문인 니케이 신문이네요."}, {"start": 1691.48, "end": 1694.48, "text": "'금·백금 가격 급락'"}, {"start": 1694.479, "end": 1698.429, "text": "제가 묵고 있는 곳은 350호실 '키쿠(국화)'인데,"}, {"start": 1698.479, "end": 1701.929, "text": "옆의 351호실도 꽤 좋은 객실인 것 같더라고요."}, {"start": 1701.979, "end": 1704.979, "text": "아마 이 351호실은"}, {"start": 1704.98, "end": 1708.93, "text": "'스즈란(은방울꽃)의 방', 히스토릭 주니어 스위트로 판매되고 있을 거예요."}, {"start": 1708.98, "end": 1711.93, "text": "꽤 넓어 보이고 구조도 비슷하지만,"}, {"start": 1711.98, "end": 1715.93, "text": "천장은 아마 '키쿠' 쪽이 더 격조 높게 만들어졌을 겁니다."}, {"start": 1715.98, "end": 1719.38, "text": "이 두 스위트룸 같은 방이"}, {"start": 1719.38, "end": 1721.33, "text": "이 앞쪽 문으로 해서"}, {"start": 1721.38, "end": 1723.33, "text": "차단할 수 있는 구조군요."}, {"start": 1723.38, "end": 1727.38, "text": "창밖으로도 골짜기 풍경이 보이는데,"}, {"start": 1727.279, "end": 1731.83, "text": "여기 손잡이가 있는데, 이건 '오토시마도(떨굼창)'네요."}, {"start": 1731.88, "end": 1735.827, "text": "아, 잠시만요... 어, 오토시... 나사 방식인가? 캡이네요."}, {"start": 1735.877, "end": 1739.327, "text": "이건 투숙객이 조작할 수 없겠네요."}, {"start": 1739.377, "end": 1745.377, "text": "아마 여기에 크랭크 같은 걸 가져와서 빙글빙글 돌리면"}, {"start": 1745.38, "end": 1750.729, "text": "이게 위에서 내려올 것 같아요. 거대한 창문이네요."}, {"start": 1750.778, "end": 1755.259, "text": "냉방 시설이 없던 시절엔 아마 이걸 돌려서 열었나 봅니다."}, {"start": 1755.308, "end": 1760.459, "text": "지금 당장 열 일은 없을 것 같네요. 호텔 내부를 좀 둘러보겠습니다."}, {"start": 1760.509, "end": 1762.459, "text": "제가 묵는 곳은 3층인데요."}, {"start": 1762.509, "end": 1765.459, "text": "엘리베이터로는 갈 수 없는 4층도 있더라고요."}, {"start": 1765.509, "end": 1770.959, "text": "4층은 대체 뭘까요? 아마 별다른 건 없지 않을까 싶은데..."}, {"start": 1771.009, "end": 1779.808, "text": "[발소리] 어, 방이 있네요. 자, 최상층인 4층에 도착했습니다."}, {"start": 1779.808, "end": 1781.861, "text": "객실은 우선 첫 번째,"}, {"start": 1781.911, "end": 1784.259, "text": "이건 업무용 공간 같고요."}, {"start": 1784.308, "end": 1787.259, "text": "그리고 계단 다섯 개를 올라간 끝에 또 하나가 나옵니다."}, {"start": 1787.308, "end": 1791.009, "text": "이곳은 4층에 유일하게 마련된,"}, {"start": 1791.009, "end": 1794.659, "text": "4501호, '나팔꽃의 방'인 듯하네요."}, {"start": 1794.709, "end": 1798.709, "text": "요즘은 이 방이,"}, {"start": 1798.71, "end": 1801.359, "text": "가장 비싼 객실로 판매되고 있다고 합니다."}, {"start": 1801.409, "end": 1802.758, "text": "하룻밤에 18만 엔."}, {"start": 1802.807, "end": 1805.41, "text": "저 방 안에는,"}, {"start": 1805.409, "end": 1809.409, "text": "펜트하우스 스위트 투베드룸이 있어서,"}, {"start": 1809.409, "end": 1812.359, "text": "아마 여럿이서 숙박할 수 있는 모양이에요."}, {"start": 1812.409, "end": 1817.807, "text": "거실이랑 욕실도 아주 큼지막하고요."}, {"start": 1817.807, "end": 1822.307, "text": "전망도 아주 좋은 것 같네요."}, {"start": 1822.309, "end": 1824.259, "text": "뭐, 좀 세속적인 이야기긴 합니다만,"}, {"start": 1824.309, "end": 1827.278, "text": "저 '나팔꽃의 방'과 제가 묵는 방의..."}, {"start": 1827.328, "end": 1831.278, "text": "키쿠노마(국화의 방)는 가격을 따져 보면 키쿠 쪽이 좀 더 저렴하긴 한데..."}, {"start": 1831.328, "end": 1834.278, "text": "아마 이쪽을 더 격조 높은 방으로 대우해 온"}, {"start": 1834.328, "end": 1836.978, "text": "역사가 더 길어서 그렇지 않을까 싶네요."}, {"start": 1837.028, "end": 1840.978, "text": "대일본제국에서 국화보다 귀한 꽃은 존재하지 않았을 테니까요."}, {"start": 1841.028, "end": 1847.18, "text": "자, 이제 아침을 먹으러 가겠습니다. 일단 방으로 돌아왔어요."}, {"start": 1847.23, "end": 1853.679, "text": "무료 생수가 있네요. 그리고 제가 이미 꽤 많이 먹어버렸는데, 과자 서비스도 있습니다."}, {"start": 1853.729, "end": 1857.278, "text": "호두를 초콜릿으로 감싼 거라고 하네요."}, {"start": 1857.327, "end": 1859.68, "text": "이거 당 떨어질 때 먹으면 딱 좋겠네요."}, {"start": 1859.73, "end": 1862.778, "text": "그럼 아침 식사를 하러 출발해 보겠습니다."}, {"start": 1862.828, "end": 1867.279, "text": "여기 하나고텐에서 서양관 연락 통로를 지나 본관을 통과해서"}, {"start": 1867.329, "end": 1870.881, "text": "1936년에 지어졌다는 다이닝 룸으로 향합니다."}, {"start": 1870.931, "end": 1873.88, "text": "이곳은 꼭 봐두셔야 하는 장소예요."}, {"start": 1873.93, "end": 1877.778, "text": "아침 식사 장소는 두 곳인데, 양식의 경우는 이곳 다이닝 룸이 되고요."}, {"start": 1877.828, "end": 1881.88, "text": "일식의 경우에는 국도 1호선을 사이에 둔 '키카소'라는 곳,"}, {"start": 1881.93, "end": 1885.479, "text": "예전 쇼와 천황의 별장 등으로 쓰였던 곳에서 식사를 하게 됩니다."}, {"start": 1885.528, "end": 1886.98, "text": "네, 거기서 식사를 하게 됩니다."}, {"start": 1887.029, "end": 1889.379, "text": "이번에는 식당에서 먹을게요."}, {"start": 1889.429, "end": 1892.73, "text": "[발걸음 소리]"}, {"start": 1892.828, "end": 1896.328, "text": "네, 본관에 도착했습니다."}, {"start": 1896.328, "end": 1899.581, "text": "벌써 체크아웃 절차를 밟는 분들도 계시는 것 같네요."}, {"start": 1899.631, "end": 1902.38, "text": "저도 예전에 오전 6시에 체크아웃한 적이 있는데,"}, {"start": 1902.43, "end": 1904.028, "text": "호텔 직원분이 걱정하시더라고요."}, {"start": 1904.078, "end": 1906.63, "text": "역시 너무 이른 시간이라 그런지 사람이 아무도 없네요."}, {"start": 1906.68, "end": 1909.63, "text": "네, 그럼 로비 옆에 있는 홀로 이동해 보겠습니다."}, {"start": 1909.68, "end": 1914.629, "text": "아마 메이지 시대 같은 때에는 여기서 사교계 모임 같은 게 열리지 않았을까 싶어요."}, {"start": 1914.679, "end": 1916.831, "text": "여기가 조식 식당입니다."}, {"start": 1916.881, "end": 1920.728, "text": "조식은, 뭐 이번에는 포함되어 있긴 한데..."}, {"start": 1920.778, "end": 1923.43, "text": "'브렉퍼스트 후지야' 아니면 '스페셜' 등이 있고요."}, {"start": 1923.48, "end": 1935.877, "text": "여러 가지 단품 메뉴로도 주문할 수 있습니다."}, {"start": 1935.88, "end": 1938.028, "text": "모모야마 양식 같은 느낌이네요."}, {"start": 1938.077, "end": 1941.83, "text": "전쟁 전의 일본이 \"일본 문화는 정말 대단하다!\"라며"}, {"start": 1941.88, "end": 1945.929, "text": "전 세계에 보여주려 했던 당시의 분위기가 느껴집니다."}, {"start": 1945.979, "end": 1951.479, "text": "네, 그럼 안내받은 자리로 가볼게요."}, {"start": 1951.479, "end": 1954.18, "text": "거대한 유리창 너머로"}, {"start": 1954.18, "end": 1957.83, "text": "후지야 호텔의 건물들이 늘어서 있고"}, {"start": 1957.88, "end": 1958.83, "text": "내부 인테리어는"}, {"start": 1958.88, "end": 1959.83, "text": "위엄 있는 우물반자 천장으로 되어 있네요."}, {"start": 1959.88, "end": 1964.528, "text": "전 세계에 대일본의 문화를 전파하려던 시절의 모습이군요."}, {"start": 1964.577, "end": 1968.33, "text": "천장에는 일본의 식물들이 그려져 있습니다."}, {"start": 1968.38, "end": 1972.33, "text": "서양에는 이런 종류의 식물이 별로 없지 않을까 싶네요."}, {"start": 1972.38, "end": 1975.83, "text": "새들도 동양에서 흔히 볼 수 있는 종류로 그려져 있어서"}, {"start": 1975.88, "end": 1977.86, "text": "서양에서 건너온..."}, {"start": 1977.91, "end": 1978.86, "text": "외국인 관광객들에게"}, {"start": 1978.91, "end": 1980.86, "text": "비일상적인 느낌을 주려고 하는 게 아닐까 싶네요."}, {"start": 1980.91, "end": 1985.459, "text": "또한, 이건 일본인만 읽을 수 있는, 아니 일본인이라도 좀 읽기 어려워 보입니다만"}, {"start": 1985.509, "end": 1988.459, "text": "메이지 천황의 시, 어제(御製)가 장식되어 있었습니다."}, {"start": 1988.509, "end": 1991.459, "text": "이것도 당시부터 장식되어 있었나 보네요."}, {"start": 1991.509, "end": 1995.96, "text": "일본의 국가적인 중추 시설이었다는 걸 알 수 있습니다."}, {"start": 1996.009, "end": 1999.96, "text": "그러고 나서 조식을 주문하자 아이스 커피, 그리고 방금 짠 토마토"}, {"start": 2000.009, "end": 2002.96, "text": "주스와 오믈렛 세트, 그리고 핑거 볼인가요?"}, {"start": 2003.009, "end": 2006.41, "text": "손 씻는 거 있잖아요. 샐러드,"}, {"start": 2006.509, "end": 2009.459, "text": "온도가 잘 안 변하는 요거트, 구운 빵 등을 가져다주었습니다."}, {"start": 2009.509, "end": 2014.86, "text": "그럼 이걸 정중하게 나이프와 포크로 잘라 가며 먹어 보겠습니다."}, {"start": 2014.91, "end": 2017.361, "text": "아메리칸 브렉퍼스트라는 거네요."}, {"start": 2017.411, "end": 2021.361, "text": "토마토에는 이렇게 레몬즙을 짤 수 있게 되어 있네요."}, {"start": 2021.411, "end": 2026.359, "text": "이렇게 하는 사람도 있나 보네요. 확실히 깔끔해서 훨씬 마시기 편해졌어요."}, {"start": 2026.409, "end": 2030.308, "text": "너무 달지 않다는 점도 좋았네요."}, {"start": 2030.308, "end": 2038.859, "text": "오믈렛 안에는 잘게 썬 재료가 들어 있고, 빵도 달콤하고 고급스러운 것과 일반적인 빵 등 여러 종류가 있습니다."}, {"start": 2038.909, "end": 2040.859, "text": "두껍게 썬 토스트부터 먹어 보겠습니다."}, {"start": 2040.909, "end": 2044.558, "text": "이 공간은 거대한 목조 건축물처럼 보입니다만,"}, {"start": 2044.608, "end": 2053.559, "text": "사실 여기 세로로 철근 콘크리트가 들어 있습니다. 1930년대 당시에는 최첨단 건물이었다고 생각합니다."}, {"start": 2053.61, "end": 2059.559, "text": "그리고 이 천장의 이 부분도 가로로 아마 콘크리트를 조합해서 만든 가로보가 있습니다."}, {"start": 2059.61, "end": 2066.36, "text": "일본풍 목재를 많이 사용했는데요, 실제로는 현대에도 통용될 만큼 견고한 건축물이네요."}, {"start": 2066.411, "end": 2073.057, "text": "역시 창밖으로 이 호텔의 전경을 한눈에 담아두는 게 좋겠어요."}, {"start": 2073.108, "end": 2076.159, "text": "후지야 호텔은 후지산 같은 게 보이는 건 아니지만,"}, {"start": 2076.21, "end": 2079.659, "text": "호텔 자체가 일본을 대표하는 명승지라고 할 수 있죠."}, {"start": 2079.71, "end": 2081.509, "text": "잘 먹었습니다."}, {"start": 2081.509, "end": 2082.96, "text": "식당에는 좀 늦게 갔어요."}, {"start": 2083.01, "end": 2085.619, "text": "9시 30분이 마지막 주문이에요."}, {"start": 2085.67, "end": 2088.918, "text": "이다음에는 12시부터 점심 영업을 합니다."}, {"start": 2088.969, "end": 2092.918, "text": "코스 요리는 9,000엔부터고, 그 외에도..."}, {"start": 2092.969, "end": 2096.119, "text": "메인 요리가 이런 식으로 다양하게 있는 것 같네요."}, {"start": 2096.17, "end": 2101.168, "text": "음료는 커피가 1,500엔 정도 하네요."}, {"start": 2101.17, "end": 2104.418, "text": "방금 다녀온 조식 식당이 이 안쪽인데요,"}, {"start": 2104.469, "end": 2107.218, "text": "아래쪽으로도 여러 건물이 쭉 이어져 있어요."}, {"start": 2107.268, "end": 2113.17, "text": "여기도 1936년경에 지어진 건물 같네요."}, {"start": 2113.17, "end": 2116.418, "text": "여기 철근이 보이네요, 철근 콘크리트 구조로 되어 있어요."}, {"start": 2116.469, "end": 2118.519, "text": "직선적인 인테리어가 돋보이네요."}, {"start": 2118.57, "end": 2124.57, "text": "왼쪽에서 빛이 아주 잘 들어오는데,"}, {"start": 2124.57, "end": 2126.019, "text": "아마 매점인 것 같아요."}, {"start": 2126.07, "end": 2128.218, "text": "오른편은 화장실입니다."}, {"start": 2128.268, "end": 2132.23, "text": "여긴 여성 전용이라 들어갈 수는 없지만요."}, {"start": 2132.28, "end": 2137.679, "text": "물론 남성용도 있습니다."}, {"start": 2137.679, "end": 2140.23, "text": "이 화장실은 옛 분위기가 잘 남아 있네요."}, {"start": 2140.28, "end": 2141.23, "text": "한번 보시죠."}, {"start": 2141.28, "end": 2145.128, "text": "화장실엔 지금 아무도 없는 것 같네요."}, {"start": 2145.179, "end": 2151.579, "text": "이곳도 지금으로부터 90년 정도 된 화장실입니다."}, {"start": 2151.581, "end": 2153.73, "text": "천장이 굉장히 높은 게 특징이죠."}, {"start": 2153.78, "end": 2159.179, "text": "아마 90년 전 당시에도"}, {"start": 2159.179, "end": 2161.628, "text": "수세식 화장실이었던 것 같은데요."}, {"start": 2161.679, "end": 2163.98, "text": "천장이 아주 높아서"}, {"start": 2163.98, "end": 2165.827, "text": "위생적인 인상도 주네요."}, {"start": 2165.878, "end": 2170.378, "text": "그리고 개별 칸..."}, {"start": 2170.28, "end": 2172.73, "text": "안은 최신식 비데로 되어 있습니다."}, {"start": 2172.78, "end": 2177.777, "text": "이런 문이나 손잡이 같은 것도"}, {"start": 2177.78, "end": 2182.179, "text": "전부 예전 것 그대로인 것 같네요."}, {"start": 2182.179, "end": 2184.13, "text": "자, 화장실 옆에는 바가 있습니다."}, {"start": 2184.181, "end": 2185.528, "text": "바 빅토리아."}, {"start": 2185.579, "end": 2187.63, "text": "지금은 영업시간이 아니네요."}, {"start": 2187.681, "end": 2192.48, "text": "이곳은 철근 콘크리트의"}, {"start": 2192.481, "end": 2194.528, "text": "들보 구조가 잘 보이네요."}, {"start": 2194.579, "end": 2195.878, "text": "내부는..."}, {"start": 2195.88, "end": 2196.628, "text": "잘은 모르겠지만"}, {"start": 2196.679, "end": 2199.128, "text": "예전 영국풍으로 꾸며진 것 같네요"}, {"start": 2199.179, "end": 2205.128, "text": "영국인들은 세계 여행을 하는 사람이 꽤 많았다고 하더군요"}, {"start": 2205.179, "end": 2210.227, "text": "이 술 저장고에는 일본식 지붕이 설치되어 있습니다"}, {"start": 2210.277, "end": 2214.579, "text": "외국인들끼리 교류하는 장소로도 쓰였겠죠"}, {"start": 2214.579, "end": 2215.73, "text": "다트 화살이 있네요"}, {"start": 2215.78, "end": 2218.179, "text": "수제 느낌이 나네요"}, {"start": 2218.181, "end": 2221.427, "text": "이 다트판도 동물의 가죽 등을 써서 만든"}, {"start": 2221.478, "end": 2222.431, "text": "고급품인 것 같습니다"}, {"start": 2222.481, "end": 2225.777, "text": "자, 이제 방으로 돌아왔습니다"}, {"start": 2225.88, "end": 2228.929, "text": "아직 이 방에도 수수께끼가 몇 가지 남아 있거든요"}, {"start": 2228.98, "end": 2230.73, "text": "우선 첫 번째로 여기 있는..."}, {"start": 2230.78, "end": 2233.628, "text": "미시마 유키오가 사용했을 법한 책상인데"}, {"start": 2233.679, "end": 2236.931, "text": "이건 작업용으로 폭을 넓힐 수 있는 구조인 것 같아요"}, {"start": 2236.981, "end": 2241.931, "text": "하지만 모서리 부분이 걸려서 실제로는 넓힐 수가 없습니다"}, {"start": 2241.981, "end": 2247.628, "text": "반대편에도 공기청정기 등이 놓여 있어서 넓힐 전제는 아닌 것 같네요"}, {"start": 2247.679, "end": 2251.03, "text": "처음부터 이 자리에 있었던 건 아니라는 걸 알 수 있죠"}, {"start": 2251.081, "end": 2254.327, "text": "이 방이 만들어졌을 당시에는 이 가구가 다른 곳에 있었고"}, {"start": 2254.378, "end": 2256.929, "text": "그럼 대체 어디 있었느냐 하면, 아마도..."}, {"start": 2256.98, "end": 2260.369, "text": "저쪽 벽 쪽에 있었을 것으로 보입니다"}, {"start": 2260.42, "end": 2263.068, "text": "현재 이곳엔 TV가 놓여 있습니다만"}, {"start": 2263.119, "end": 2267.369, "text": "당연히 1936년 당시엔 TV가 발명되기 전이었으니까"}, {"start": 2267.42, "end": 2268.968, "text": "예전엔 없었겠죠"}, {"start": 2269.018, "end": 2273.048, "text": "그래서 이 넓은 공간에 사무용 책상이 있었던 게 아닐까 싶네요"}, {"start": 2273.099, "end": 2278.148, "text": "TV가 발명되면서 저 자리에 TV를 설치해야 했고"}, {"start": 2278.199, "end": 2282.447, "text": "그 결과, 유서 깊은 책상은 이쪽으로 옮겨진 것 같습니다"}, {"start": 2282.498, "end": 2285.75, "text": "이 가구들은 리뉴얼을 거치긴 했지만"}, {"start": 2285.8, "end": 2288.55, "text": "예전부터 쓰던 걸 계속 사용하고 있는 거죠"}, {"start": 2288.601, "end": 2295.75, "text": "그리고 여기 식기류가 여러 점 있는데, 후지야 호텔의 자랑인... 이건 정말 멋지네요!"}, {"start": 2295.8, "end": 2299.048, "text": "요세기 자이쿠 스타일의 술잔도 있습니다"}, {"start": 2299.099, "end": 2300.548, "text": "하코네의 명물이죠"}, {"start": 2300.599, "end": 2303.498, "text": "써보고 싶긴 합니다만"}, {"start": 2303.599, "end": 2307.05, "text": "미니바는 유료라서 이번엔 참기로 하겠습니다"}, {"start": 2307.101, "end": 2310.25, "text": "그리고... 여기는 냉장고네요"}, {"start": 2310.3, "end": 2313.747, "text": "냉장고 안에도 아마 미니바 상품들이 이것저것 들어있나 봅니다"}, {"start": 2313.797, "end": 2316.747, "text": "코카콜라 같은 건 아래층 드링크 바에서도 마실 수 있으니"}, {"start": 2316.797, "end": 2318.65, "text": "그걸로 충분하지 않나 싶기도 한데"}, {"start": 2318.701, "end": 2320.15, "text": "뭐, 이런..."}, {"start": 2320.201, "end": 2323.048, "text": "이런 방을 평소처럼 이용하는 분들에겐"}, {"start": 2323.099, "end": 2324.318, "text": "또 얘기가 다르겠죠... 아!"}, {"start": 2324.369, "end": 2326.318, "text": "그리고 차 세트가 있네요. 🍵"}, {"start": 2326.369, "end": 2329.119, "text": "이건 한번 써 봐도 좋겠어요. 👍"}, {"start": 2329.17, "end": 2334.619, "text": "일본 호텔에서 따뜻한 차가 유료인 경우는 없으니까요."}, {"start": 2334.67, "end": 2338.019, "text": "여기 마침 후지야 호텔만의 독특한 그릇을 쓰고 있네요. ✨"}, {"start": 2338.07, "end": 2341.619, "text": "이 그림은 아마 이 호텔의 전통이었던 걸로 기억해요."}, {"start": 2341.67, "end": 2344.717, "text": "깨지지 않게 조심해야겠지만요. 😅"}, {"start": 2344.768, "end": 2348.318, "text": "어렴풋이 보이는 후지산과 아시노호의 모습이에요. 🗻"}, {"start": 2348.369, "end": 2353.119, "text": "후지야 호텔에서 코스 석식을 주문하면 이런 접시에 나온대요. 🍽️"}, {"start": 2353.17, "end": 2354.82, "text": "조심스럽게 들어 볼게요."}, {"start": 2354.871, "end": 2356.519, "text": "'FUJIYA'라고 적혀 있네요."}, {"start": 2356.57, "end": 2359.617, "text": "이걸로 차를 우리는 모양이네요."}, {"start": 2359.668, "end": 2368.07, "text": "물이 얼마나 들어갔는지 보여서 정말 편리하네요! 😊"}, {"start": 2367.969, "end": 2370.221, "text": "이제 차를 우려둘게요."}, {"start": 2370.271, "end": 2374.17, "text": "이 정도면 됐을까요? 🤔"}, {"start": 2374.168, "end": 2378.418, "text": "차 맛 자체는 아마 평범한 차일 것 같긴 한데..."}, {"start": 2378.469, "end": 2381.418, "text": "안에 찻잎을 바로 넣어서 우려도 되겠어요. 🌿"}, {"start": 2381.469, "end": 2386.519, "text": "[기계 소음] 뭔가 하고 있네요. 요란한 소리가 나요. 🔊"}, {"start": 2386.57, "end": 2388.718, "text": "아, 소리가 들리네요."}, {"start": 2388.768, "end": 2391.221, "text": "호텔 앞마당의 전정 작업을 하고 있나 봐요. 🌳"}, {"start": 2391.271, "end": 2393.929, "text": "나무가 너무 많이 자라버리면..."}, {"start": 2393.98, "end": 2396.329, "text": "풍경이 달라질 수 있어서 이게 중요하거든요."}, {"start": 2396.38, "end": 2398.179, "text": "그리고요."}, {"start": 2398.28, "end": 2400.528, "text": "아, 잠옷을 소개해 드리지 않았었네요."}, {"start": 2400.579, "end": 2403.628, "text": "여기 오래된 서랍장 안에 들어 있어요."}, {"start": 2403.679, "end": 2406.378, "text": "이건 L 사이즈고요."}, {"start": 2406.28, "end": 2409.931, "text": "사실 세 종류나 있는 것 같은데, 상하의 분리형 잠옷이랑..."}, {"start": 2409.981, "end": 2411.431, "text": "이건 유카타 스타일인가?"}, {"start": 2411.481, "end": 2412.628, "text": "그런 잠옷이랑..."}, {"start": 2412.679, "end": 2415.329, "text": "그리고 맨 밑에 있는 건 제가 이미 써 버렸는데요."}, {"start": 2415.38, "end": 2418.03, "text": "이것도 상하의 분리형인 것 같네요."}, {"start": 2418.081, "end": 2419.23, "text": "왜 세 종류나 있는 걸까요?"}, {"start": 2419.28, "end": 2421.23, "text": "음, 촉감이 달라서 그런가?"}, {"start": 2421.28, "end": 2422.628, "text": "L 사이즈구나."}, {"start": 2422.679, "end": 2424.327, "text": "그 외에도 이런..."}, {"start": 2424.378, "end": 2425.429, "text": "뭐라고 해야 할까요?"}, {"start": 2425.48, "end": 2427.128, "text": "음, 세트가 구비되어 있는데..."}, {"start": 2427.179, "end": 2429.329, "text": "정장 바지 다리미 같은 것도 쓸 수 있지만..."}, {"start": 2429.38, "end": 2432.23, "text": "이번에는 정말 볼거리가 너무 많았네요."}, {"start": 2432.28, "end": 2434.73, "text": "11시 체크아웃 시간도 다 되어 가니..."}, {"start": 2434.78, "end": 2438.277, "text": "이제 슬슬 출발해 볼까 합니다."}, {"start": 2438.369, "end": 2441.369, "text": "현재 이곳인데요"}, {"start": 2441.369, "end": 2444.17, "text": "경치도 좀 구경해 보려고요"}, {"start": 2444.17, "end": 2445.918, "text": "마침 점심 식사 중이시네요"}, {"start": 2445.969, "end": 2449.92, "text": "외국인 단체 관광객을 태우러 온 듯한 버스가 와 있습니다"}, {"start": 2449.971, "end": 2451.818, "text": "버스가 와 있어서 알아보기 쉬운데요"}, {"start": 2451.869, "end": 2455.318, "text": "이 후지야 호텔에는 사실 수수께끼 같은 부분이 하나 있습니다"}, {"start": 2455.369, "end": 2458.318, "text": "바로 현관이 이중 구조로 되어 있다는 거죠"}, {"start": 2458.369, "end": 2462.519, "text": "위쪽은 1891년부터 줄곧 사용해 온 옛 현관이고요"}, {"start": 2462.57, "end": 2465.418, "text": "반면 버스가 서 있는 곳은 그 아래가 아닌"}, {"start": 2465.469, "end": 2466.918, "text": "지하 1층 현관입니다"}, {"start": 2466.969, "end": 2469.519, "text": "왜 현관이 두 개나 있는 걸까요?"}, {"start": 2469.57, "end": 2475.619, "text": "조사를 좀 해봤는데, 1935년에 만주국 황제였던 푸이 있잖아요"}, {"start": 2475.67, "end": 2480.619, "text": "푸이 황제가 후지야 호텔에 국빈으로 방문해 묵었다고 하더라고요"}, {"start": 2480.67, "end": 2486.019, "text": "그 일정에 맞춰 자동차가 드나들기 편하도록 정문 현관을 개조했다고 합니다"}, {"start": 2486.07, "end": 2489.418, "text": "예전에는 여기 아래쪽 현관은 없었고"}, {"start": 2489.469, "end": 2493.918, "text": "지금 사람들이 걷고 있는 저 근처에서 인력거라든지"}, {"start": 2493.969, "end": 2496.721, "text": "택시에서 내린 사람들이 이 계단을 올라와서"}, {"start": 2496.771, "end": 2499.519, "text": "여기 위로 들어갔던 모양이에요"}, {"start": 2499.57, "end": 2503.318, "text": "그러다 1935년부터는 지금 보시는 것처럼"}, {"start": 2503.369, "end": 2507.139, "text": "차를 타고 현관 바로 옆까지 올 수 있게 됐다고 합니다"}, {"start": 2507.19, "end": 2510.139, "text": "자, 그래서 정체불명의 입구 부근에 도착했습니다."}, {"start": 2510.19, "end": 2512.938, "text": "이 앞이 꽤 넓게 되어 있는데요."}, {"start": 2512.989, "end": 2516.539, "text": "이곳은 말이죠, 1935년 만주국 황제가"}, {"start": 2516.59, "end": 2519.239, "text": "방문하는 것에 맞춰 무도장으로 정비한 모양입니다."}, {"start": 2519.289, "end": 2521.539, "text": "여기서 춤을 출 수 있는 공간이 있는 것 같네요."}, {"start": 2521.59, "end": 2525.338, "text": "예전에는 이 현관에서 밖으로 나가서"}, {"start": 2525.389, "end": 2528.389, "text": "이 돌계단 쪽을 내려가서,"}, {"start": 2528.389, "end": 2531.74, "text": "계단을 내려가면 여기에 인력거나,"}, {"start": 2531.791, "end": 2533.838, "text": "택시가 데리러 왔던 것 같네요."}, {"start": 2533.889, "end": 2536.438, "text": "여기서 오다와라까지 인력거로 갔다고 하니,"}, {"start": 2536.489, "end": 2539.24, "text": "옛날 분들은 참 대단한 시대에"}, {"start": 2539.291, "end": 2541.038, "text": "살았구나 하는 생각이 드네요."}, {"start": 2541.088, "end": 2543.889, "text": "지하 입구에 도착했습니다."}, {"start": 2543.789, "end": 2547.088, "text": "현재는 완전한 자동차 시대라,"}, {"start": 2547.09, "end": 2548.438, "text": "자동차에 대응하고 있네요."}, {"start": 2548.489, "end": 2549.438, "text": "마침 후지야 호텔의"}, {"start": 2549.489, "end": 2550.938, "text": "셔틀버스가 왔습니다."}, {"start": 2550.989, "end": 2553.137, "text": "후지야 호텔은 무료 셔틀 같은 건"}, {"start": 2553.188, "end": 2554.838, "text": "기본적으로 없는데요,"}, {"start": 2554.889, "end": 2556.989, "text": "아마 무언가..."}, {"start": 2556.98, "end": 2557.829, "text": "저걸까?"}, {"start": 2557.88, "end": 2559.829, "text": "골프장에 가시는 분들이라든가..."}, {"start": 2559.88, "end": 2562.827, "text": "송영 서비스가 일부 있을지도 모르겠네요"}, {"start": 2562.878, "end": 2565.827, "text": "그럼 가까운 입구로 다시 한번 들어가 보겠습니다"}, {"start": 2565.878, "end": 2568.827, "text": "이 부분은 아마 1935년도 건물이겠네요"}, {"start": 2568.878, "end": 2577.38, "text": "메이지 시대 건물은 아닌 것 같습니다"}, {"start": 2577.38, "end": 2578.329, "text": "[발소리] 자, 들어갑니다"}, {"start": 2578.38, "end": 2584.98, "text": "클라크 벨 분들도 와 계시네요"}, {"start": 2584.98, "end": 2587.579, "text": "직선적인 들보가 있네요"}, {"start": 2587.579, "end": 2589.528, "text": "철근 콘크리트 구조군요"}, {"start": 2589.579, "end": 2592.579, "text": "이 지하 입구에서..."}, {"start": 2592.579, "end": 2596.528, "text": "위로 올라온 곳이 지상 1층이 되는 셈인데"}, {"start": 2596.579, "end": 2603.478, "text": "여기는 철근 콘크리트가 아니네요, 완전 목조예요"}, {"start": 2603.48, "end": 2608.63, "text": "아까 봤던 거대한 철근 들보가 지나는 것과는 좀 다르죠?"}, {"start": 2608.681, "end": 2616.329, "text": "이쪽은 전부 나무 기둥이네요. 만약 불이라도 나면... 그건 정말 생각하고 싶지 않네요"}, {"start": 2616.38, "end": 2624.73, "text": "그럼 다시 지하 층부터 가보죠. 지하 1층은 이렇게 햇살이 비쳐 드는 공간이라서"}, {"start": 2624.78, "end": 2631.528, "text": "꽤 밝습니다. 쇼와 초기인 1935년경에는 아직 전력이 그리 강하지 않았기 때문에"}, {"start": 2631.579, "end": 2634.628, "text": "빛을 받아들이는 게 중요했겠죠"}, {"start": 2634.679, "end": 2636.13, "text": "지하는 박물관으로 되어 있습니다"}, {"start": 2636.181, "end": 2636.759, "text": "그렇게 적혀 있네요"}, {"start": 2636.809, "end": 2640.059, "text": "후지야 호텔의 야마구치 센노스케 초대 사장입니다."}, {"start": 2640.11, "end": 2642.259, "text": "이분은 하코네를 지금과 같은 관광지로 만든 사람으로,"}, {"start": 2642.309, "end": 2644.96, "text": "후지야 호텔을 세운 분이죠."}, {"start": 2645.01, "end": 2650.559, "text": "그리고 '하나고텐' 전 객실의 열쇠가 전부 한눈에 보이게 정리되어 있습니다."}, {"start": 2650.61, "end": 2656.76, "text": "이번에 숙박한 '키쿠노마(국화의 방)' 열쇠는 제일 왼쪽 위에 있네요."}, {"start": 2656.811, "end": 2660.96, "text": "원래 후지야 호텔은 외국인을 위해 운영되어 온 호텔이라서"}, {"start": 2661.01, "end": 2665.909, "text": "모든 안내가 영어로 표기되어 있습니다."}, {"start": 2665.911, "end": 2668.157, "text": "이 앞쪽에는 아마 수영장 같은 게 있는 것 같은데,"}, {"start": 2668.208, "end": 2670.157, "text": "이번에는 시간이 너무 부족해서"}, {"start": 2670.208, "end": 2672.157, "text": "다 둘러보지는 못하고 있네요."}, {"start": 2672.208, "end": 2675.157, "text": "여기 1층 현관 쪽에서 들어와서"}, {"start": 2675.208, "end": 2677.157, "text": "지금 지하 통로를 통해"}, {"start": 2677.208, "end": 2679.157, "text": "하나고텐 지하 1층에 도착했습니다."}, {"start": 2679.208, "end": 2686.309, "text": "[발자국 소리] 교회가 있네요."}, {"start": 2686.21, "end": 2688.159, "text": "결혼식장으로 사용되고 있는 것 같습니다."}, {"start": 2688.21, "end": 2692.409, "text": "지금 뭔가를 준비하고 있는 걸까요?"}, {"start": 2692.409, "end": 2693.358, "text": "원래 후지야 호텔은"}, {"start": 2693.409, "end": 2694.358, "text": "서구권의 부유층들이"}, {"start": 2694.409, "end": 2696.358, "text": "장기 체류하던 호텔이었거든요."}, {"start": 2696.409, "end": 2698.358, "text": "그러다 보니 일요일에는..."}, {"start": 2698.409, "end": 2699.358, "text": "예배가 필요하니까요."}, {"start": 2699.409, "end": 2702.858, "text": "역시 교회도 만들 필요가 있어서 말이죠."}, {"start": 2702.909, "end": 2710.259, "text": "타이타닉호나 퀸 메리호 같은 호화 여객선 안에도 교회가 있곤 한데, 거기엔 다 합당한 이유가 있다고 합니다."}, {"start": 2710.309, "end": 2713.96, "text": "이 교회 바로 옆에는 도서실과 피아노도 있습니다."}, {"start": 2714.01, "end": 2717.96, "text": "도서실에 비치된 책들은 아마 대부분 영어 원서일 거예요."}, {"start": 2718.01, "end": 2719.96, "text": "일본어 책은 없지 않을까 싶네요."}, {"start": 2720.01, "end": 2722.057, "text": "우선 성경책이네요, 중요하죠."}, {"start": 2722.108, "end": 2727.909, "text": "이건 하버드 대학교 출판물이네요."}, {"start": 2727.911, "end": 2732.26, "text": "세계적으로 유명한 현자들의 다양한 저서가 모여 있습니다."}, {"start": 2732.311, "end": 2736.559, "text": "이건 아담 스미스의 경제학, 다윈의 생물학."}, {"start": 2736.61, "end": 2741.11, "text": "대일본제국의 문화를 알리는 책도 있네요."}, {"start": 2741.11, "end": 2747.559, "text": "미카도(천황)의 궁전에서, 뭐, '황거에서' 같은 느낌일까요?"}, {"start": 2747.61, "end": 2749.559, "text": "일본어 책도 일부 있네요."}, {"start": 2749.61, "end": 2753.659, "text": "원색 원예 식물 도감, 우치다 햐켄... 아."}, {"start": 2753.71, "end": 2756.96, "text": "그런 철도 마니아 같은 분의 책도 있나요?"}, {"start": 2757.01, "end": 2760.96, "text": "오자키 유키오 전집, 시마자키 도손 전집."}, {"start": 2761.01, "end": 2764.46, "text": "여기서 교양을 쌓는 공간이라는 느낌이네요."}, {"start": 2764.51, "end": 2767.96, "text": "옛날 부자들은 노는 것에는 별로 관심이 없었나 봅니다."}, {"start": 2768.01, "end": 2771.559, "text": "교회 같은 곳 아래에 더 내려가면..."}, {"start": 2771.61, "end": 2773.71, "text": "지하 2층 입구가 있는 모양이네요."}, {"start": 2773.76, "end": 2775.36, "text": "토끼가 뛰고"}, {"start": 2775.36, "end": 2776.76, "text": "거북이가..."}, {"start": 2776.659, "end": 2777.608, "text": "기어 올라가네요"}, {"start": 2777.659, "end": 2779.21, "text": "훌륭한 조각상이 있습니다"}, {"start": 2779.26, "end": 2783.86, "text": "이런 곳은 저도 처음 와보네요"}, {"start": 2783.86, "end": 2788.21, "text": "아마 이 공간은 현재 전혀 사용되지 않는 것 같은데"}, {"start": 2788.26, "end": 2790.809, "text": "예전 하나고텐의 정문이었던 곳이죠"}, {"start": 2790.86, "end": 2793.76, "text": "1936년에 지어진 건물로"}, {"start": 2793.76, "end": 2796.059, "text": "일부 손님들은"}, {"start": 2796.159, "end": 2798.909, "text": "이곳을 통해 특별히 입장했던 게 아닐까 싶어요"}, {"start": 2798.96, "end": 2805.509, "text": "비상구라서 아주 오래전부터 일반인들은 거의 이용하지 않았을 겁니다"}, {"start": 2805.559, "end": 2809.809, "text": "승하차장이 있어서 이렇게 차를 댈 수 있습니다"}, {"start": 2809.86, "end": 2815.21, "text": "존 레논이나 미시마 유키오 같은 유명 인사들은 이곳에서 체크인을 했을지도 모르죠"}, {"start": 2815.26, "end": 2822.559, "text": "2층으로 된 호텔 구조가 아래에서 아주 잘 보입니다"}, {"start": 2822.559, "end": 2828.509, "text": "이 현관은 대일본제국의 집대성으로서 만들어진 것 같습니다"}, {"start": 2828.559, "end": 2832.009, "text": "중앙에는 커다란 벚나무가 꽃을 피우고 있네요"}, {"start": 2832.059, "end": 2839.509, "text": "그리고 그 아래엔 서양풍의, 약간 르네상스 느낌이 나는 조각상이 있는데"}, {"start": 2839.559, "end": 2846.71, "text": "이건 '아마노 이와토'네요. 일본 신화 속 천황의 조상인 아마테라스 오미카미가"}, {"start": 2846.76, "end": 2853.01, "text": "이 바위 동굴 뒤편에 숨어버리셔서, 그걸 열어드리려고 하는"}, {"start": 2853.061, "end": 2855.318, "text": "그런 장면을 묘사한 겁니다"}, {"start": 2855.369, "end": 2861.418, "text": "서양의 조각 기술을 사용하여 일본의 고대 신화를 전하는..."}, {"start": 2861.469, "end": 2864.918, "text": "당시의 분위기가 꽤 잘 느껴지네요"}, {"start": 2864.969, "end": 2872.369, "text": "이 시대의 일본 미술은 유럽에서 배울 점은 배우되"}, {"start": 2872.469, "end": 2881.018, "text": "우리 문화를 그 위에 잘 겹쳐 나가자는 방향성이 있었던 것 같아요. 그래서 서양 조각 같으면서도 일본 신화인..."}, {"start": 2881.068, "end": 2883.92, "text": "좀처럼 보기 드문 미술 작품들이라고 생각합니다"}, {"start": 2883.971, "end": 2888.519, "text": "매우 서구적인 육체 조각이지만, 자세히 보면 여기에..."}, {"start": 2888.57, "end": 2895.019, "text": "곡옥이 달려 있기도 하고, 자세히 살펴보면 이 인물도 일본인의 얼굴을 하고 있네요"}, {"start": 2895.07, "end": 2899.318, "text": "이 아마노이와토 안쪽에서 아마테라스 오미카미가..."}, {"start": 2899.369, "end": 2902.869, "text": "이쪽을 엿보고 있어야 하는데,"}, {"start": 2902.869, "end": 2905.918, "text": "아마테라스는 조각되어 있지 않은 것 같네요. 뭐, 아마도..."}, {"start": 2905.969, "end": 2909.218, "text": "그걸 조각으로 만드는 게 황송하다는 생각도 있었을까요?"}, {"start": 2909.268, "end": 2916.617, "text": "그 밖에도 여러 조각이 있는데, 잘 살펴보면 다 일본을 테마로 하고 있습니다"}, {"start": 2916.668, "end": 2918.918, "text": "이건 아마 시즈오카현의 시미즈인 것 같은데요"}, {"start": 2918.969, "end": 2923.519, "text": "미호노마츠바라 위에서 춤추는 선녀의 날개옷 이야기네요"}, {"start": 2923.57, "end": 2926.57, "text": "자세히 적혀 있지는 않지만,"}, {"start": 2926.57, "end": 2927.519, "text": "아마 그럴 겁니다"}, {"start": 2927.57, "end": 2932.57, "text": "그리고 당시엔 일본에서 말을 많이 사용해서,"}, {"start": 2932.768, "end": 2934.718, "text": "노마오이(말 축제)의 모습을 묘사하고 있습니다"}, {"start": 2934.768, "end": 2937.918, "text": "지금 시대의 가치관으로 보면 좀 어떨지 모르겠네요"}, {"start": 2937.969, "end": 2941.818, "text": "서양의 동물 보호 가치관이 널리 퍼져 있으니까요"}, {"start": 2941.869, "end": 2944.668, "text": "이건 좀... 하는 반응이 나올지도 모르겠지만요"}, {"start": 2944.719, "end": 2947.269, "text": "역사적인 가치를 존중해서 그대로..."}, {"start": 2947.32, "end": 2950.269, "text": "원형을 그대로 보존하고 있다는 뜻이죠"}, {"start": 2950.32, "end": 2952.269, "text": "자, 그럼 이어서 지하 1층 화장실이 있으니"}, {"start": 2952.32, "end": 2953.869, "text": "한번 가보도록 하겠습니다"}, {"start": 2953.92, "end": 2955.468, "text": "이 화장실은 아마도"}, {"start": 2955.518, "end": 2957.668, "text": "그렇게 낡은 느낌은 아닐 거예요"}, {"start": 2957.719, "end": 2958.769, "text": "그렇네요"}, {"start": 2958.82, "end": 2960.869, "text": "원래는 훨씬 더 오래된 곳이었겠지만"}, {"start": 2960.92, "end": 2963.869, "text": "내부는 현대식으로 리모델링됐습니다"}, {"start": 2963.92, "end": 2967.17, "text": "그리고 화장실을 나오면 바로 옆에... 도착했습니다"}, {"start": 2967.221, "end": 2968.369, "text": "수영장이 있어요"}, {"start": 2968.42, "end": 2970.968, "text": "갑자기 수영장이 나타나는데"}, {"start": 2971.018, "end": 2972.818, "text": "이 위를 보시면"}, {"start": 2972.82, "end": 2974.82, "text": "계단이 있고"}, {"start": 2974.82, "end": 2976.82, "text": "2층이 탈의실로"}, {"start": 2976.82, "end": 2978.269, "text": "구성되어 있는데요"}, {"start": 2978.32, "end": 2981.269, "text": "지금은 위층을 탈의실로 쓰지 않는 모양이네요"}, {"start": 2981.32, "end": 2985.369, "text": "그런데 이 수영장을 어떻게 이용해야 할지"}, {"start": 2985.42, "end": 2988.42, "text": "전 아직 잘 모르겠어요"}, {"start": 2988.42, "end": 2992.349, "text": "여기까지 수영복 차림으로 복도를 지나 들어와야 하니까요..."}, {"start": 2992.4, "end": 2993.349, "text": "사용되고 있는 거 아닐까요?"}, {"start": 2993.4, "end": 2995.349, "text": "시간대에 따라 다른 걸지도 모르겠네요."}, {"start": 2995.4, "end": 2997.349, "text": "입장하는 건 가능합니다."}, {"start": 2997.4, "end": 3000.349, "text": "내부는 적당한 온도로 유지되고 있어요."}, {"start": 3000.4, "end": 3005.297, "text": "지금으로부터 90년 전의 수영장이네요."}, {"start": 3005.3, "end": 3009.25, "text": "아마 이곳이 대일본제국을 대표하는 수영장이었을 겁니다."}, {"start": 3009.3, "end": 3013.797, "text": "옆에 풀장용 선베드 같은 게 있네요."}, {"start": 3013.8, "end": 3016.75, "text": "아마 예전부터 있었던 게 아닐까요?"}, {"start": 3016.8, "end": 3017.75, "text": "옆에는 조각도 있고요."}, {"start": 3017.8, "end": 3023.75, "text": "죄송하지만, 이건 저로서도 무엇을 묘사한 건지 알기 어렵네요."}, {"start": 3023.8, "end": 3026.75, "text": "하지만 일본의 모습을 그린 것 같아요."}, {"start": 3026.8, "end": 3030.75, "text": "닭새우라든가, 일본의 등푸른생선 등을 잡는 아이들이네요."}, {"start": 3030.8, "end": 3035.5, "text": "도미를 잡았네요."}, {"start": 3035.5, "end": 3042.048, "text": "해설이 적혀 있네요. 제목은 '바다의 진미, 산의 진미'라는 뜻입니다."}, {"start": 3042.099, "end": 3045.449, "text": "일본의 산과 바다에서 난 음식들이죠."}, {"start": 3045.5, "end": 3047.849, "text": "남쪽 지방의 바나나가 있는 게 좀..."}, {"start": 3047.9, "end": 3049.25, "text": "이게 좀 신경 쓰이긴 하는데,"}, {"start": 3049.3, "end": 3053.048, "text": "그건가? 당시 일본이 해외 영토를 여러 곳 가지고 있었으니까,"}, {"start": 3053.099, "end": 3056.648, "text": "남쪽 지방의 바나나도 일본 특산품으로 취급한 게 아닐까 싶네요."}, {"start": 3056.699, "end": 3059.119, "text": "포도는 나가노현이나 야마나시현에서 재배하고 있고요."}, {"start": 3059.17, "end": 3061.918, "text": "남1: 위에는 감 같은 열매가 맺혀 있네요."}, {"start": 3061.969, "end": 3067.019, "text": "남1: 서양의 가치관을 수용하면서 일본 문명을 전하고 있죠."}, {"start": 3067.07, "end": 3071.217, "text": "남1: 참고로 이 온수 풀은 일본 호텔에 있는 것 중 가장..."}, {"start": 3071.268, "end": 3071.92, "text": "남1: 가장 오래된 곳이라고 합니다."}, {"start": 3071.971, "end": 3074.92, "text": "남2: 90년 전이나 된 거군요."}, {"start": 3074.971, "end": 3082.119, "text": "남1: 온천수를 사용해서 수온이 아주 적당한데, 그래서 온수 풀이라 불립니다."}, {"start": 3082.17, "end": 3085.918, "text": "남1: 이 벽화는 바다에서 도미가 아주 많이 잡혔던..."}, {"start": 3085.969, "end": 3088.519, "text": "남1: 풍어의 모습을 그린 그림이네요."}, {"start": 3088.57, "end": 3092.318, "text": "남1: 뒤편으로는 후지산과 이즈반도의 오무로산이 보입니다."}, {"start": 3092.369, "end": 3096.119, "text": "남1: 아마 시즈오카현 사람들이 지금 물고기를 잡는 장면일 거예요."}, {"start": 3096.17, "end": 3098.721, "text": "남2: 90년 전에는 정말 이런 느낌이었을 것 같네요."}, {"start": 3098.771, "end": 3101.217, "text": "남2: 구명조끼도 없이 나무배를 타고..."}, {"start": 3101.268, "end": 3104.519, "text": "남2: 지금 시대에 비하면 역시 고생이 많으셨겠구나 싶네요."}, {"start": 3104.57, "end": 3106.617, "text": "남1: 강해 보이네요."}, {"start": 3106.668, "end": 3109.019, "text": "남2: 이런 옛날 분들의 노력 덕분에..."}, {"start": 3109.07, "end": 3111.119, "text": "남2: 지금의 풍요로운 일본이 있는 거구나 하고..."}, {"start": 3111.17, "end": 3113.989, "text": "남2: 여기 오면 확실히 그런 게 가슴 깊이 느껴지네요."}, {"start": 3114.039, "end": 3116.789, "text": "남2: 그냥 놀고만 있을 때가 아니라는 생각이 듭니다."}, {"start": 3116.84, "end": 3119.789, "text": "남1: 객실은 풀사이드 바로 옆에 있는 모양이네요."}, {"start": 3119.84, "end": 3123.088, "text": "남1: 증기 난방도 가동 중이라 방 안이 아주 따뜻해 보여요."}, {"start": 3123.139, "end": 3126.289, "text": "그렇군요, 옛날 수영장은 이런 느낌이었군요."}, {"start": 3126.34, "end": 3131.639, "text": "원래 여기는 샤워 부스가 아니었을까 싶네요."}, {"start": 3131.639, "end": 3133.889, "text": "옆에는 체육관도 있습니다."}, {"start": 3133.94, "end": 3139.389, "text": "간단한 웨이트 기구랑 유산소 운동 기구들이 있네요."}, {"start": 3139.44, "end": 3146.44, "text": "다음에 오면 이 수영장에서 꼭 수영해 보고 싶어요."}, {"start": 3146.44, "end": 3147.688, "text": "여기 적혀 있네요."}, {"start": 3147.739, "end": 3153.387, "text": "보시다시피 온천이라서, 온천 분석표가 붙은 수영장은 참 희귀하죠."}, {"start": 3153.438, "end": 3155.489, "text": "그럼 수영장 견학은 이쯤 하고"}, {"start": 3155.539, "end": 3156.588, "text": "다음은"}, {"start": 3156.639, "end": 3159.189, "text": "호텔 뮤지엄으로 가 보겠습니다."}, {"start": 3159.239, "end": 3161.489, "text": "여긴 원래 뭐 하던 곳이었을까요?"}, {"start": 3161.539, "end": 3169.84, "text": "아마 연회장 같은 곳이었던 것 같은데, 지금은 박물관입니다."}, {"start": 3169.84, "end": 3172.489, "text": "그렇네요, 쇼와 시대 느낌이 나는 계단도 있군요."}, {"start": 3172.539, "end": 3186.739, "text": "여러 볼거리가 있지만, 만일의 비상시에도 이것만큼은 꼭 지켜야 한다는 호텔의 보물이 여기 있습니다."}, {"start": 3186.639, "end": 3191.588, "text": "비상시 반출 1순위, 어떤 손님이 묵었는지 기록한 숙박 명부예요."}, {"start": 3191.639, "end": 3197.588, "text": "당시 일본을 찾은 외국인들은 거의 다 이 호텔에 묵었을 정도라"}, {"start": 3197.639, "end": 3203.588, "text": "일본 방문객들의 역사가 고스란히 남아 있다고 해도 과언이 아니죠."}, {"start": 3203.639, "end": 3210.088, "text": "이 명부 자체가 하코네정에서 문화재로 지정했을 정도라고 합니다."}, {"start": 3210.139, "end": 3213.088, "text": "지금도 호텔 입구에 숙박 명부가 비치되어 있는데요."}, {"start": 3213.139, "end": 3217.088, "text": "이름을 적어 두면 이렇게 오랫동안 보존해 주는 모양입니다."}, {"start": 3217.139, "end": 3224.139, "text": "그러니까, 뭐랄까? 자기가 이름을 남기려고 직접 쓰기보다는"}, {"start": 3224.139, "end": 3228.49, "text": "정말로 호텔 측에서 기록을 남기고 싶어 한다면"}, {"start": 3228.541, "end": 3233.689, "text": "호텔 쪽에서 '존 레논이 묵었다'는 식으로 알아서 이름을 남겨줄 거예요"}, {"start": 3233.739, "end": 3238.889, "text": "이름을 남기고 싶다면 그만한 수준이 되도록 노력하는 게 좋을지도 모르겠네요, 전 괜찮습니다만"}, {"start": 3238.94, "end": 3242.289, "text": "아, 저기에 이름이 남은 분들에 대해 적혀 있네요"}, {"start": 3242.34, "end": 3246.289, "text": "귀빈으로는 헬렌 켈러, 찰리 채플린..."}, {"start": 3246.34, "end": 3250.088, "text": "죄송합니다, 이분은 잘 모르겠네요. 그리고 미시마 유키오"}, {"start": 3250.139, "end": 3253.088, "text": "그 외에도 나츠메 소세키라든가"}, {"start": 3253.139, "end": 3255.59, "text": "존 레논도 있네요, 뭐 존 레논은..."}, {"start": 3255.641, "end": 3256.99, "text": "위에는 안 나오는 것 같지만요"}, {"start": 3257.041, "end": 3258.789, "text": "아인슈타인도 왔었나 보네요?"}, {"start": 3258.84, "end": 3263.59, "text": "피터 드러커와 장제스 등도 다녀간 모양입니다"}, {"start": 3263.641, "end": 3268.84, "text": "옛날엔 일본의 관광지가 그리 많지 않았거든요"}, {"start": 3268.84, "end": 3270.989, "text": "동일본에서 관광지라고 하면"}, {"start": 3271.039, "end": 3278.389, "text": "닛코 아니면 여기 후지야 호텔 정도였을 테니, 그 시절 일본 여행객은 대부분 묵었을 거예요"}, {"start": 3278.44, "end": 3281.938, "text": "옛날 포스터들이 여러 장 있는데"}, {"start": 3281.94, "end": 3288.489, "text": "이건 전후 시대 것이네요, 아직 연락 통로가 없어서 건물들이 다 따로 놀아요"}, {"start": 3288.539, "end": 3301.489, "text": "하나고텐이랑 서양관, 그리고... 이건 뭐였더라, 아직 안 가본 곳인데... 1960년에 증축된 구역이랑 본관, 그리고 식당까지. 이때는 전혀 이어져 있지 않았나 보네요"}, {"start": 3301.539, "end": 3307.088, "text": "이 시절엔 일일이 밖으로 나갔었나 봐요. 꽤 귀중해 보이는 책도 비치되어 있네요"}, {"start": 3307.139, "end": 3312.039, "text": "후지야 호텔에서 한 3박 정도 묵으면서 이걸 아주 꼼꼼히 읽어보는 것도 좋겠어요"}, {"start": 3312.09, "end": 3320.139, "text": "쇼와 시대의 접객 매뉴얼입니다. 이걸 전부 외우면 인간으로서 3단계 정도는 레벨 업할 수 있을 것 같네요."}, {"start": 3320.19, "end": 3328.59, "text": "아마 갓 졸업한 18세나 16세 정도 되는 분들에게 읽혔을 교과서겠죠."}, {"start": 3328.59, "end": 3333.539, "text": "후지야 호텔의 직원으로서, 또 사회인으로서 새로운 환경에서의 생활이 시작됩니다."}, {"start": 3333.59, "end": 3336.539, "text": "사람을 대할 일이 많으니 아무래도 여러모로 남의 이목을 끌기 마련이고,"}, {"start": 3336.59, "end": 3339.838, "text": "익숙지 않은 곳에서 숙식하며 단체 생활을 해야 하니까요."}, {"start": 3339.889, "end": 3341.938, "text": "첫째로 건강에 유의하십시오."}, {"start": 3341.989, "end": 3343.538, "text": "아, 역시 그게 제일 중요하구나."}, {"start": 3343.588, "end": 3346.137, "text": "직장에서는 공사를 명확히 구분하고,"}, {"start": 3346.188, "end": 3348.139, "text": "호텔 비품이나 소모품 등을"}, {"start": 3348.19, "end": 3352.139, "text": "사적인 용도로 쓰는 건 절대 삼가 주십시오."}, {"start": 3352.19, "end": 3353.539, "text": "그 말은 반대로 말하면,"}, {"start": 3353.59, "end": 3359.139, "text": "아마 직원 개인 소지품으로 일하게 하는 일도 없었단 거 아닐까요?"}, {"start": 3359.19, "end": 3360.739, "text": "그런 점을 철저히 했네요."}, {"start": 3360.789, "end": 3363.639, "text": "주머니에 손을 넣거나 하지 말 것."}, {"start": 3363.69, "end": 3365.34, "text": "반드시 가볍게 인사할 것."}, {"start": 3365.391, "end": 3367.838, "text": "규칙이 정해져 있으니 알기 쉽고 좋네요."}, {"start": 3367.889, "end": 3370.439, "text": "대화에는 충분히 관심을 갖고 경청할 것."}, {"start": 3370.489, "end": 3372.739, "text": "실수를 노골적으로 지적하지 말 것."}, {"start": 3372.789, "end": 3376.639, "text": "그리고 저 같은 손님의 수상한 행동에 대해서는,"}, {"start": 3376.69, "end": 3378.679, "text": "상사에게 즉시 보고할 것."}, {"start": 3378.73, "end": 3379.878, "text": "정말 감사합니다."}, {"start": 3379.929, "end": 3382.179, "text": "영상을 찍고 있으면 수상해 보일 수도 있겠지만,"}, {"start": 3382.23, "end": 3385.079, "text": "말투나 용어에 대해서도 안내가 되어 있어요."}, {"start": 3385.13, "end": 3388.78, "text": "와, 이건 정말 하루아침에 익힐 수 있는 게 아니네요."}, {"start": 3388.831, "end": 3392.378, "text": "지금도 통용되는 부분이 많은 것 같습니다."}, {"start": 3392.429, "end": 3397.079, "text": "이 매뉴얼 옆에는요, 이건 쇼와 13년의..."}, {"start": 3397.13, "end": 3398.88, "text": "그러니까 제2차 세계 대전 전의 책이라고 하는데요."}, {"start": 3398.931, "end": 3400.778, "text": "외국인을 대상으로 발행된,"}, {"start": 3400.829, "end": 3402.778, "text": "'일본의 호텔은 어디를 선택하면 좋을까'라는 책입니다."}, {"start": 3402.829, "end": 3405.78, "text": "여기에는 에도 시대 이래로 계승되어 온"}, {"start": 3405.831, "end": 3411.579, "text": "일본의 숙박 문화가 아주 상세하게 소개되어 있습니다."}, {"start": 3411.63, "end": 3413.677, "text": "'Generally speaking(일반적으로 말해서)'이라는 대목부터 시작되는데요."}, {"start": 3413.728, "end": 3417.177, "text": "일반적으로 일본에는 여관을 부르는 세 가지 명칭이 있다고 합니다."}, {"start": 3417.228, "end": 3421.477, "text": "'야도야', 혹은 '하타고', 아니면 '키친야도'."}, {"start": 3421.527, "end": 3423.677, "text": "이 구분을 확실히 하는 게 중요하다고 하네요."}, {"start": 3423.728, "end": 3426.98, "text": "야도야나 하타고는 풀 서비스 여관이고,"}, {"start": 3427.03, "end": 3429.509, "text": "그리고 키친야도라는 곳은..."}, {"start": 3429.559, "end": 3432.509, "text": "뭐랄까, 유스호스텔처럼 저렴한 곳이라서"}, {"start": 3432.559, "end": 3437.509, "text": "\"이곳에 묵을 때는 최소한의 서비스밖에 없다는 점을 각오하고 가라\""}, {"start": 3437.559, "end": 3440.5, "text": "대략 이런 맥락인 것 같습니다."}, {"start": 3440.55, "end": 3444.5, "text": "진무 천황의 역사에 대해서도 일본 신화에 기초해..."}, {"start": 3444.55, "end": 3447.5, "text": "기원전 660년부터 이어져 오고 있습니다만..."}, {"start": 3447.55, "end": 3453.5, "text": "일본 문화에 상당히 해박해서, '외국인이 이렇게까지 공부하고 오는구나'라는 걸 알 수 있습니다."}, {"start": 3453.55, "end": 3460.197, "text": "그리고 숙소 문화, 도카이도 53차의 숙소들을 묘사하고 있는 것 같네요."}, {"start": 3460.248, "end": 3464.599, "text": "53차 숙소의 개념에 대해서도 상세한 설명이 있습니다."}, {"start": 3464.65, "end": 3468.199, "text": "역시 유럽 사람들은 정말 공부를 많이 하고 오네요."}, {"start": 3468.25, "end": 3471.298, "text": "이런 고급 호텔에 묵는 분들은요,"}, {"start": 3471.349, "end": 3474.298, "text": "어설픈 일본인보다 더 잘 아는 분들이 꽤 많거든요."}, {"start": 3474.349, "end": 3477.949, "text": "지지 않도록 분발해야겠어요."}, {"start": 3477.949, "end": 3479.599, "text": "그리고 외국인 대상 서비스를"}, {"start": 3479.65, "end": 3481.298, "text": "제공하고 있는 호텔은"}, {"start": 3481.349, "end": 3483.798, "text": "일본과 만주국에 57곳이 있다,"}, {"start": 3483.849, "end": 3486.199, "text": "그것이 이 목록에 나와 있습니다."}, {"start": 3486.25, "end": 3488.599, "text": "즉, 쇼와 13년 시점에"}, {"start": 3488.65, "end": 3491.798, "text": "외국인이 영어를 사용하며 숙박할 수 있는 호텔은"}, {"start": 3491.849, "end": 3496.4, "text": "일본과 만주국 전체를 합쳐서 57곳뿐이었죠."}, {"start": 3496.451, "end": 3499.798, "text": "57곳 중에서 말이죠, 후지야 호텔과"}, {"start": 3499.849, "end": 3501.597, "text": "후지 뷰 호텔, 그리고..."}, {"start": 3501.648, "end": 3505.0, "text": "하코네 호텔은 아직 개업 전이었나 보네요."}, {"start": 3505.05, "end": 3507.079, "text": "그쪽이 후지야 호텔 그룹에 해당합니다."}, {"start": 3507.13, "end": 3509.878, "text": "당시 후지야 호텔의 모습을 알 수 있는 자료를... 실례지만 이건"}, {"start": 3509.929, "end": 3513.079, "text": "박물관 소장품이 아니라 제 개인 소장품입니다만"}, {"start": 3513.13, "end": 3515.38, "text": "이번에 특별히 가져와 봤습니다"}, {"start": 3515.431, "end": 3518.88, "text": "옛날에 후지야 호텔에 묵는 사람들은 이런 배를 타고"}, {"start": 3518.931, "end": 3520.278, "text": "미국 같은 곳에서 말이죠"}, {"start": 3520.329, "end": 3523.679, "text": "태평양을 건너 일본에 도착하곤 했는데요"}, {"start": 3523.73, "end": 3527.679, "text": "그렇게 바다를 건너온 외국인들을 위해 발행된"}, {"start": 3527.73, "end": 3532.027, "text": "일본유선의 관광 팸플릿입니다"}, {"start": 3531.929, "end": 3533.98, "text": "이건 전전 당시의 물건이에요"}, {"start": 3534.03, "end": 3536.429, "text": "여기 보시면"}, {"start": 3536.429, "end": 3540.079, "text": "전전의 일본이 마련했던 관광지 목록이 있는데요"}, {"start": 3540.13, "end": 3541.977, "text": "관광지 선택지는 그리 많지 않습니다"}, {"start": 3542.027, "end": 3548.177, "text": "오사카, 나라, 교토 그리고 여기에 '미야노시타'라고 적혀 있죠"}, {"start": 3548.228, "end": 3554.378, "text": "당시에는 하코네가 아니라 미야노시타가 외국인 관광지로 알려졌던 겁니다"}, {"start": 3554.429, "end": 3557.378, "text": "지금 같은 하코네 브랜드가 확립되기 전 시대죠"}, {"start": 3557.429, "end": 3560.628, "text": "후지야 호텔이 여기 있네요"}, {"start": 3560.63, "end": 3564.98, "text": "이 팸플릿의 첫 페이지를 펼치면 당시 국철 노선도와"}, {"start": 3565.03, "end": 3569.03, "text": "일본의 대표적인 관광 코스가 나오는데"}, {"start": 3569.128, "end": 3571.48, "text": "이건 5일간의 관광 일정입니다"}, {"start": 3571.53, "end": 3572.778, "text": "남1: 여기 적혀 있네요"}, {"start": 3572.829, "end": 3577.46, "text": "남2: \"여행 3일째는 도쿄에서 9시 25분 열차로 출발할 것\""}, {"start": 3577.51, "end": 3587.26, "text": "\"...하고 오다와라로 향하십시오. 그리고 오다와라에서는 자동차, 즉 택시를 타고 미야노시타의 후지야 호텔로 향하십시오.\""}, {"start": 3587.311, "end": 3600.858, "text": "라고 적혀 있습니다. 후지야 호텔에서 저녁 식사를 마친 뒤, 이 일정에선 숙박하지 않고 코즈에서 야간열차를 타고 교토로 가라는데... 이거 꽤 강행군이네요. 교토에 아침 8시라니."}, {"start": 3600.909, "end": 3603.159, "text": "이런 일정이 정말 괜찮은 걸까요?"}, {"start": 3603.21, "end": 3605.26, "text": "참고로 미야노시타 후지야 호텔의"}, {"start": 3605.311, "end": 3610.01, "text": "객실 요금표 같은 것도 있습니다만,"}, {"start": 3610.01, "end": 3614.159, "text": "가격을 보면 '객실 내 욕실 없음(Rooms without private baths)', 즉"}, {"start": 3614.21, "end": 3617.659, "text": "욕실 없는 방과 욕실 있는 방으로 가격이 나뉘어 있습니다."}, {"start": 3617.71, "end": 3620.057, "text": "예전 후지야 호텔은 꽤 많은 객실에"}, {"start": 3620.108, "end": 3621.659, "text": "욕실이 없었던 모양입니다."}, {"start": 3621.71, "end": 3626.909, "text": "그게 옛날 고급 호텔의 일반적인 모습이었죠."}, {"start": 3627.01, "end": 3631.358, "text": "제가 예전에 후지야 호텔에서 일하셨다는 분을"}, {"start": 3631.409, "end": 3633.657, "text": "지인 중에 한 분 알고 지내는데,"}, {"start": 3633.708, "end": 3637.657, "text": "아마 방금 그 매뉴얼로 교육받은 세대가 아닐까 싶습니다."}, {"start": 3637.708, "end": 3644.259, "text": "그분은 영어를 정말 잘하시고, 일본항공에 입사해 국제선 승무원이 되셨다가"}, {"start": 3644.309, "end": 3648.259, "text": "현재는 미국에서 우아하게 지내고 계시는..."}, {"start": 3648.309, "end": 3650.259, "text": "그런 세대의 분입니다."}, {"start": 3650.309, "end": 3652.659, "text": "후지야 호텔에서 일한다는 건,"}, {"start": 3652.71, "end": 3657.659, "text": "매너의 수행과도 같았던 시대가 아니었나 싶습니다."}, {"start": 3657.71, "end": 3663.159, "text": "그럼 지금까지 1936년의 하나고텐을 둘러보았는데요,"}, {"start": 3663.21, "end": 3666.769, "text": "여기서부터 이쪽은 전후에 새로 만들어진 곳이네요."}, {"start": 3666.82, "end": 3670.369, "text": "숙박동 중에서 가장 최신인 포레스트 윙으로 가보겠습니다"}, {"start": 3670.42, "end": 3675.769, "text": "일본 경제가 부활하고 올림픽을 개최하던 시기에 지어진"}, {"start": 3675.82, "end": 3678.867, "text": "후지야 호텔의 가장 새로운 숙박동입니다"}, {"start": 3678.918, "end": 3682.92, "text": "아, 이런 느낌이군요. 상당히 넓네요"}, {"start": 3682.92, "end": 3684.269, "text": "정말 꽤 넓어요"}, {"start": 3684.32, "end": 3687.768, "text": "전후 시대가 되면서 일본인들이 상당히 부유해지고"}, {"start": 3687.818, "end": 3689.568, "text": "여행을 다닐 수 있는 사람이 늘어났기 때문에"}, {"start": 3689.619, "end": 3691.619, "text": "대규모로 손님들을"}, {"start": 3691.619, "end": 3694.568, "text": "안내할 수 있는 공간이 필요했던 게 아닐까 싶네요"}, {"start": 3694.619, "end": 3697.367, "text": "그래서 엘리베이터도 2대나 운행 중입니다"}, {"start": 3697.418, "end": 3701.719, "text": "그리고 이 건물은 6층 건물입니다"}, {"start": 3701.721, "end": 3704.67, "text": "그럼 우선 6층으로 가보겠습니다"}, {"start": 3704.721, "end": 3708.068, "text": "6층에는 '스파 젠'이 있다고 하네요"}, {"start": 3708.119, "end": 3709.367, "text": "아마 저거겠죠?"}, {"start": 3709.418, "end": 3711.168, "text": "온천이 있지 않을까 싶습니다"}, {"start": 3711.219, "end": 3713.32, "text": "안내음: 6층입니다"}, {"start": 3713.82, "end": 3717.82, "text": "아, 청소 중이네요"}, {"start": 3717.82, "end": 3722.469, "text": "여기는 온천 휴게 공간인가 보네요. 아, 이런 곳도 있었구나"}, {"start": 3722.519, "end": 3729.918, "text": "경사면에 나란히 늘어선 후지야 호텔을"}, {"start": 3729.918, "end": 3730.869, "text": "후지야 호텔을..."}, {"start": 3730.92, "end": 3733.168, "text": "뒤편에서 내려다보는 듯한 구조입니다"}, {"start": 3733.219, "end": 3735.519, "text": "쇼와 시대 전전."}, {"start": 3735.519, "end": 3736.568, "text": "레이와 시대."}, {"start": 3736.619, "end": 3737.67, "text": "이건 메이지 시대."}, {"start": 3737.721, "end": 3738.67, "text": "메이지 시대네요."}, {"start": 3738.721, "end": 3743.168, "text": "에, 이건 쇼와 전후, 이쪽도 쇼와 전전이네요."}, {"start": 3743.219, "end": 3749.168, "text": "여러 시대에 걸쳐 증축된 건물의 변천사를 엿볼 수 있습니다."}, {"start": 3749.219, "end": 3755.168, "text": "참고로 지금 묵고 있는 '키쿠노마(菊の間)'는 저기예요."}, {"start": 3755.219, "end": 3761.019, "text": "그리고 가장 높은 방은 저기네요, 펜트하우스 스위트."}, {"start": 3771.219, "end": 3774.42, "text": "네, 이어서 3층입니다."}, {"start": 3774.42, "end": 3777.168, "text": "복도가 넓고 여유로운 설계네요."}, {"start": 3777.219, "end": 3779.668, "text": "방들이 다 근사해 보여요. 이쪽이 아마 산 쪽,"}, {"start": 3779.719, "end": 3781.068, "text": "이쪽이 계곡 쪽."}, {"start": 3781.119, "end": 3782.369, "text": "계곡 쪽 방이 아마 전망이 더 좋지 않을까 싶네요."}, {"start": 3782.42, "end": 3783.967, "text": "살짝 보이긴 합니다만, 뭐 이쯤 해두죠."}, {"start": 3784.018, "end": 3788.971, "text": "역시 전후에 관광업 규모가 거대해지면서 객실 수를 최대한 확보하려 한 노력이 엿보이네요."}, {"start": 3789.021, "end": 3790.268, "text": "복도 양쪽에 방이 배치된 게 특징이에요."}, {"start": 3790.318, "end": 3790.869, "text": "자, 계단으로 내려가 볼까요?"}, {"start": 3790.92, "end": 3796.269, "text": "아, 좋네요. 1960년대 일본 특유의 고급스러운 공간이라는 느낌이 듭니다."}, {"start": 3796.32, "end": 3800.719, "text": "바로 이런 느낌 말이죠."}, {"start": 3800.719, "end": 3801.971, "text": "[경적 소리] 방금 '빵' 하고 들려왔네요."}, {"start": 3802.021, "end": 3803.668, "text": "등산 열차의 경적 소리예요."}, {"start": 3803.719, "end": 3809.769, "text": "고도 경제 성장기부터는 이런 금속 소재 같은 것들을 굳이 숨기지 않고..."}, {"start": 3809.82, "end": 3815.467, "text": "소재 본연의 느낌을 살리는 게 유행이었던 시대였습니다."}, {"start": 3815.518, "end": 3818.42, "text": "자, 2층입니다."}, {"start": 3818.38, "end": 3822.53, "text": "여기도 전후 건물이지만 전전 시대풍 장식으로 꾸며져 있네요."}, {"start": 3822.581, "end": 3824.528, "text": "피트니스 센터가 여기에도 있군요."}, {"start": 3824.579, "end": 3828.528, "text": "수영장 쪽에도 있었는데 시설이 아주 잘 갖춰져 있네요."}, {"start": 3828.579, "end": 3831.23, "text": "원래 여긴 뭐 하던 곳이었을까요?"}, {"start": 3831.28, "end": 3835.528, "text": "아마 처음부터 헬스장은 아니었을 것 같은데 말이죠."}, {"start": 3835.579, "end": 3839.43, "text": "덤벨도 꽤 무거운 것까지, 20kg짜리도 있네요."}, {"start": 3839.48, "end": 3842.128, "text": "이런 공간도 있었군요. 널찍한 소파와..."}, {"start": 3842.179, "end": 3845.827, "text": "그리고 여긴 간단히 업무를 볼 수 있는 곳이네요."}, {"start": 3845.878, "end": 3847.429, "text": "프린터도 설치되어 있습니다."}, {"start": 3847.48, "end": 3851.429, "text": "직접 유선이나 무선으로 연결해서 쓰면 되나 봐요."}, {"start": 3851.48, "end": 3854.227, "text": "화장실이 있네요. 한번 살펴볼까요?"}, {"start": 3854.277, "end": 3858.93, "text": "이건 1960년대에 만들어진 꽤 신식 화장실인 것 같은데"}, {"start": 3858.98, "end": 3862.929, "text": "내부 인테리어는 전부 새롭게 바뀌었네요."}, {"start": 3862.98, "end": 3865.53, "text": "역시 아까 봤던 화장실들보다는"}, {"start": 3865.581, "end": 3868.03, "text": "확실히 공간이 좀 더 여유롭네요."}, {"start": 3868.081, "end": 3871.327, "text": "지금 머물고 있는 포레스트 윙의 외관은 이렇습니다."}, {"start": 3871.378, "end": 3873.53, "text": "다른 후지야 호텔 건물들에 비하면"}, {"start": 3873.581, "end": 3875.53, "text": "좀 무미건조하다고 해야 할까요?"}, {"start": 3875.581, "end": 3877.53, "text": "그냥 평범한 건물 같다는 느낌도 들지만"}, {"start": 3877.581, "end": 3878.548, "text": "그 당시에는..."}, {"start": 3878.599, "end": 3879.548, "text": "당시는"}, {"start": 3879.599, "end": 3881.548, "text": "군더더기 없는 합리적인 건물이"}, {"start": 3881.599, "end": 3883.548, "text": "최첨단으로 여겨지던 시대였습니다"}, {"start": 3883.599, "end": 3885.148, "text": "뭐, 요즘 세상은"}, {"start": 3885.199, "end": 3887.148, "text": "그런 합리적인 건물이 너무 많아져서"}, {"start": 3887.199, "end": 3889.148, "text": "개성이 없어 보이기도 하지만"}, {"start": 3889.199, "end": 3891.148, "text": "당시에는 이것이 개성이었죠"}, {"start": 3891.199, "end": 3892.949, "text": "자, 이제 밖으로 나왔습니다"}, {"start": 3893.0, "end": 3894.949, "text": "이곳은 하나고텐 입구입니다"}, {"start": 3895.0, "end": 3895.949, "text": "옛날에는"}, {"start": 3896.0, "end": 3898.949, "text": "건물 간의 연결 통로가 없던 시절에는"}, {"start": 3899.0, "end": 3899.951, "text": "하나고텐을 이용하는 분들이 여기에"}, {"start": 3900.001, "end": 3902.0, "text": "차를 대고"}, {"start": 3902.001, "end": 3902.951, "text": "바로 들어갔던 것 같네요"}, {"start": 3903.001, "end": 3906.951, "text": "이 안쪽에는 '아마노이와토' 조각이 있습니다"}, {"start": 3907.001, "end": 3909.951, "text": "그리고 왼쪽에도 서양식 건물이 하나 더 있네요"}, {"start": 3910.001, "end": 3913.951, "text": "이건 아마 카나야... 아, 죄송합니다. 후지야 호텔, 후지야 호텔의..."}, {"start": 3914.001, "end": 3916.951, "text": "지금은 사무실로 쓰고 있는 것 같은데"}, {"start": 3917.001, "end": 3920.449, "text": "원래는 경영자분의 자택이었을 거예요"}, {"start": 3920.5, "end": 3923.479, "text": "이 후지야 호텔 주변의 미야노시타 거리는"}, {"start": 3923.529, "end": 3927.479, "text": "원래 이 마을의 역사는 메이지 시대에 시작되었다고 하는데요."}, {"start": 3927.529, "end": 3929.479, "text": "이곳은 후지야 호텔의 '성하 마을'인 셈이죠."}, {"start": 3929.529, "end": 3934.278, "text": "마을 정장님도 처음에는 후지야 호텔의 사장이었다고 합니다."}, {"start": 3934.329, "end": 3938.278, "text": "후지야 호텔 건물은 거의 다 둘러본 것 같은데,"}, {"start": 3938.329, "end": 3941.278, "text": "하나 더 봐둬야 할 곳이 있습니다."}, {"start": 3941.329, "end": 3945.68, "text": "여기 국도 1号선 후지야 호텔 앞 버스 정류장인데요."}, {"start": 3945.73, "end": 3950.579, "text": "맞은편에는 조식 장소로 쓰이는 레스토랑 '킷카소'가 있어요."}, {"start": 3950.63, "end": 3959.128, "text": "이곳이 참 특이한 게, 국도 1호선을 걸어서 건너간 곳에"}, {"start": 3959.13, "end": 3963.278, "text": "호텔 레스토랑이 있는 묘한 구조로 되어 있거든요."}, {"start": 3963.329, "end": 3966.878, "text": "후지야 호텔은 외관이 굉장히 화려한 반면,"}, {"start": 3966.929, "end": 3969.88, "text": "이곳은 입구가 상당히 수수한 편입니다."}, {"start": 3969.931, "end": 3973.13, "text": "원래 황실 별장이었던 곳이라"}, {"start": 3973.13, "end": 3977.278, "text": "굳이 화려하게 꾸밀 필요가 없었을 테고,"}, {"start": 3977.329, "end": 3981.478, "text": "눈에 띄지 않는 편이 더 나았을지도 모르겠네요."}, {"start": 3981.528, "end": 3986.177, "text": "지금은 아마 점심 영업을 준비 중인 것 같은데,"}, {"start": 3986.228, "end": 3989.679, "text": "여기서 점심을 먹으려면 7~8천 엔은 줘야 할 거예요."}, {"start": 3989.73, "end": 3993.679, "text": "음료까지 곁들이면 만 엔을 훌쩍 넘길 수도 있어서"}, {"start": 3993.73, "end": 4004.028, "text": "오늘은 그냥 지나가기로 하죠. 입구에는 차를 돌리는 커다란 로터리도 있네요."}, {"start": 4004.029, "end": 4009.38, "text": "옛날에 천황 폐하 같은 고위 인사들이 올 땐 차를 타고 왔으니까요."}, {"start": 4009.431, "end": 4015.559, "text": "그리고 드디어 이곳에 도착했습니다. 바로 '고요테이'입니다."}, {"start": 4015.61, "end": 4019.409, "text": "황실 별장인 깃카소입니다."}, {"start": 4019.411, "end": 4022.36, "text": "원래 종전 전까지는 황실 별장이었는데요."}, {"start": 4022.411, "end": 4025.409, "text": "대일본 제국이 붕괴하면서"}, {"start": 4025.411, "end": 4031.159, "text": "그런 황족들이 막대한 재산을 소유하는 게 맞는지 의문이 제기되던 시대도 있어서"}, {"start": 4031.21, "end": 4033.759, "text": "여러모로 민간에 매각된 것 같더라고요."}, {"start": 4033.809, "end": 4036.509, "text": "마침 점심 영업 중이라서"}, {"start": 4036.51, "end": 4038.46, "text": "손님이 꽤 많이 온 모양이네요."}, {"start": 4038.51, "end": 4041.71, "text": "살짝 엿보는 정도는 괜찮겠죠?"}, {"start": 4041.809, "end": 4043.759, "text": "이곳은 외국인을 수용하기 위해서가 아니라"}, {"start": 4043.809, "end": 4046.309, "text": "황족분들을 위해 지어진"}, {"start": 4046.309, "end": 4047.759, "text": "일본식 건축물입니다."}, {"start": 4047.809, "end": 4052.76, "text": "보시는 것처럼 정통 일본식 정원이 이 앞에 펼쳐져 있습니다."}, {"start": 4052.811, "end": 4059.21, "text": "여기서부터는 객실입니다."}, {"start": 4059.21, "end": 4069.909, "text": "객실에 너무 가까이 가면 식사 중인 분들 눈에 띌 텐데... 뭐, 괜찮겠죠?"}, {"start": 4070.01, "end": 4071.057, "text": "여기가 정원입니다."}, {"start": 4071.108, "end": 4074.759, "text": "정원은 산책하기 좋게 아주 잘 꾸며져 있어요."}, {"start": 4074.809, "end": 4078.26, "text": "나무 한 그루 한 그루도 정성껏 다듬어져 있죠."}, {"start": 4078.311, "end": 4081.309, "text": "잘 보이긴 합니다만, 사실"}, {"start": 4081.311, "end": 4084.259, "text": "이 정원을 가장 아름답게 감상하시려면"}, {"start": 4084.309, "end": 4088.679, "text": "건물 안에서 유리창 너머로 보는 게 제일 예쁘도록 설계됐거든요."}, {"start": 4088.73, "end": 4090.679, "text": "대개 이런 곳은 그렇게 설계되어 있거든요."}, {"start": 4090.73, "end": 4095.23, "text": "이곳의 진면목을 제대로 보고 싶다면"}, {"start": 4095.23, "end": 4098.777, "text": "이 레스토랑에서 식사해 보시는 것도 좋을 것 같네요. 2박 하시는 분들은..."}, {"start": 4098.827, "end": 4102.479, "text": "일식을 선택하시면 여기서 조식을 드실 수 있습니다."}, {"start": 4102.529, "end": 4108.179, "text": "참고로 건물 앞 로터리인데, 예전에는 자갈이 깔린 길이었다고 하더라고요."}, {"start": 4108.229, "end": 4111.979, "text": "쇼와 천황이 여기서 스모 연습을 했다는 이야기도 있는 모양입니다."}, {"start": 4112.029, "end": 4115.38, "text": "주차장 옆에 작은 계단을 발견해서,"}, {"start": 4115.43, "end": 4117.78, "text": "여기를 통해 호텔로 돌아가려고 합니다."}, {"start": 4117.831, "end": 4125.229, "text": "여기는 아마 킷카소 어용저에서 시중을 들던"}, {"start": 4125.229, "end": 4132.229, "text": "후지야 호텔 여종업원 같은 분들이 다니던 길이 아닐까 싶네요."}, {"start": 4132.229, "end": 4139.179, "text": "결국 이 어용저가 후지야 호텔 옆에 있는 건 서비스를 제공하기 편해서겠죠."}, {"start": 4139.229, "end": 4146.729, "text": "아마 서비스 업무는 후지야 호텔에서 외주를 줬던 것 같습니다."}, {"start": 4146.729, "end": 4153.729, "text": "일단 이런... [영차] 이런 통로가 있는데,"}, {"start": 4153.729, "end": 4166.729, "text": "낮에는 잠그지 않는다고 해서 이걸로 밖으로 나올 수 있었습니다."}, {"start": 4166.729, "end": 4180.327, "text": "국도 1호선이네요."}, {"start": 4180.328, "end": 4183.179, "text": "그 후에 정말 뜻밖에도 송영 차량으로 하코네유모토역까지 데려다주셨습니다."}, {"start": 4183.229, "end": 4186.079, "text": "왜냐하면 조금 전에 후지야 호텔 사장님이 나타나셔서,"}, {"start": 4186.13, "end": 4187.679, "text": "회사로 초대해 주셨거든요."}, {"start": 4187.729, "end": 4192.179, "text": "사무실에서 대화도 나누고 배웅까지 받는 그런 특별한 경험을 했습니다."}, {"start": 4192.229, "end": 4195.63, "text": "다들 정말 친절한 분들이셨어요."}, {"start": 4195.529, "end": 4199.278, "text": "사무실도 아주 활기차고 깔끔하더라고요."}, {"start": 4199.328, "end": 4201.979, "text": "후지야 호텔은 여기 말고도 체인이 여러 군데 있는데요."}, {"start": 4202.029, "end": 4204.777, "text": "마침 지금 하코네유모토역에 내렸는데,"}, {"start": 4204.827, "end": 4207.479, "text": "
